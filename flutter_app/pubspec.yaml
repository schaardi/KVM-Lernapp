name: kvm_trainer
description: KVM-Trainer – Prüfungsvorbereitung zur IHK-Fortbildung Geprüfte/r Kraftverkehrsmeister/-in.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  shared_preferences: ^2.2.3
  flutter_tts: ^4.0.2
  speech_to_text: ^7.0.0
  # Login (Google) + geräteübergreifender Fortschritt. Aktiv nur, wenn zur
  # Build-Zeit SUPABASE_URL/SUPABASE_ANON_KEY/GOOGLE_WEB_CLIENT_ID per
  # --dart-define gesetzt sind (siehe SUPABASE_SETUP.md). Ohne Config: Offline-App.
  supabase_flutter: ^2.8.0
  google_sign_in: ^6.2.1

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/data/questions.json
    - assets/data/cases.json
    - assets/data/formulas.json
