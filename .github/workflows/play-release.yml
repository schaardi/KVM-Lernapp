name: Play-Release (Android)

# Kontinuierliche Auslieferung an Google Play:
# Push auf main (oder manueller Start) -> signiertes AAB bauen, versionCode
# automatisch hochzählen, Patch-Notes aus den Commits erzeugen und in einen
# Play-Track hochladen. Danach aktualisieren sich die Geräte automatisch.
#
# Ohne hinterlegte Secrets läuft der Workflow bewusst „grün" durch und
# überspringt nur die Veröffentlichung (Einrichtung siehe RELEASE.md).

on:
  push:
    branches: [ main ]
    paths:
      - 'flutter_app/**'
      - '.github/workflows/play-release.yml'
  workflow_dispatch:
    inputs:
      track:
        description: 'Play-Track'
        required: true
        default: 'internal'
        type: choice
        options: [ internal, alpha, beta, production ]

permissions:
  contents: write

concurrency:
  group: play-release
  cancel-in-progress: false

env:
  PACKAGE_NAME: com.kvmtrainer.kvm_trainer
  AAB_PATH: flutter_app/build/app/outputs/bundle/release/app-release.aab

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secrets prüfen
        id: guard
        env:
          SA: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          KS: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$SA" ] && [ -n "$KS" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Play-Release übersprungen::Es fehlen Secrets (PLAY_SERVICE_ACCOUNT_JSON / ANDROID_KEYSTORE_BASE64). Einrichtung siehe RELEASE.md."
          fi

      - name: Java (JDK 17) einrichten
        if: steps.guard.outputs.ready == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Flutter (stable) einrichten
        if: steps.guard.outputs.ready == 'true'
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Abhängigkeiten holen
        if: steps.guard.outputs.ready == 'true'
        working-directory: flutter_app
        run: flutter pub get

      - name: Inhalt prüfen (Datenvertrag)
        if: steps.guard.outputs.ready == 'true'
        run: python3 tools/sync_content.py --validate-assets

      - name: Version bestimmen (versionCode = Commit-Anzahl)
        if: steps.guard.outputs.ready == 'true'
        id: ver
        run: |
          CODE=$(git rev-list --count HEAD)
          NAME=$(grep -E '^version:' flutter_app/pubspec.yaml | head -1 | sed -E 's/^version:[[:space:]]*//; s/\+.*//')
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "versionName=$NAME  versionCode=$CODE"

      - name: Patch-Notes erzeugen
        if: steps.guard.outputs.ready == 'true'
        run: |
          python3 tools/gen_patch_notes.py \
            --out-whatsnew distribution/whatsnew/whatsnew-de-DE \
            --out-changelog build/changelog.md
          echo "----- Play (What's new) -----"; cat distribution/whatsnew/whatsnew-de-DE

      - name: Keystore & key.properties schreiben
        if: steps.guard.outputs.ready == 'true'
        working-directory: flutter_app
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KS_PW: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PW: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$KS_B64" | base64 -d > android/app/upload-keystore.jks
          {
            echo "storeFile=upload-keystore.jks"
            echo "storePassword=$KS_PW"
            echo "keyAlias=$KEY_ALIAS"
            echo "keyPassword=$KEY_PW"
          } > android/key.properties

      - name: Signiertes AAB bauen
        if: steps.guard.outputs.ready == 'true'
        working-directory: flutter_app
        run: |
          flutter build appbundle --release \
            --build-number=${{ steps.ver.outputs.code }} \
            --build-name=${{ steps.ver.outputs.name }} \
            --dart-define=SUPABASE_URL="${{ secrets.SUPABASE_URL }}" \
            --dart-define=SUPABASE_ANON_KEY="${{ secrets.SUPABASE_ANON_KEY }}" \
            --dart-define=GOOGLE_WEB_CLIENT_ID="${{ secrets.GOOGLE_WEB_CLIENT_ID }}"

      - name: AAB als Artefakt sichern (für die erste manuelle Play-Veröffentlichung)
        if: steps.guard.outputs.ready == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: kvm-trainer-aab
          path: ${{ env.AAB_PATH }}
          if-no-files-found: error

      - name: An Google Play hochladen
        if: steps.guard.outputs.ready == 'true'
        continue-on-error: true
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ env.PACKAGE_NAME }}
          releaseFiles: ${{ env.AAB_PATH }}
          track: ${{ github.event.inputs.track || 'internal' }}
          status: completed
          whatsNewDirectory: distribution/whatsnew

      - name: GitHub-Release mit Changelog anlegen
        if: steps.guard.outputs.ready == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ steps.ver.outputs.name }}+${{ steps.ver.outputs.code }}"
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "KVM-Trainer $TAG" \
            --notes-file build/changelog.md \
          || echo "Hinweis: Release-Tag $TAG existiert evtl. schon – übersprungen."

      - name: Aufräumen (Signaturdateien entfernen)
        if: always()
        working-directory: flutter_app
        run: rm -f android/key.properties android/app/upload-keystore.jks

      - name: Zusammenfassung
        if: always()
        run: |
          {
            echo "## Play-Release"
            if [ "${{ steps.guard.outputs.ready }}" = "true" ]; then
              echo "- Version **${{ steps.ver.outputs.name }} (Code ${{ steps.ver.outputs.code }})** gebaut und an Track **${{ github.event.inputs.track || 'internal' }}** gesendet."
              echo "- Patch-Notes automatisch aus den Commits erzeugt."
            else
              echo "- Übersprungen: Play-Secrets fehlen. Einrichtung siehe **RELEASE.md**."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
