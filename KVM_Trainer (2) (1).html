:"Ab 21 Jahren"},{"t":"Ab 25 Jahren"}],"e":"Seit der BetrVG-Reform ist wahlberechtigt, wer das 16. Lebensjahr vollendet hat (§ 7 BetrVG). Wählbar (passives Wahlrecht) ist grundsätzlich, wer 18 Jahre alt ist und dem Betrieb 6 Monate angehört (§ 8)."},{"id":"R-BR-003","f":1,"sub":"Betriebsverfassung","t":"mc","q":"Welche Voraussetzung gilt für die Wählbarkeit (passives Wahlrecht) zum Betriebsrat?","o":[{"t":"Volljährigkeit und in der Regel sechs Monate Betriebszugehörigkeit","ok":1},{"t":"Mindestens fünf Jahre Betriebszugehörigkeit"},{"t":"Mitgliedschaft in einer Gewerkschaft"},{"t":"Leitende Stellung im Betrieb"}],"e":"§ 8 BetrVG: Wählbar sind Wahlberechtigte, die das 18. Lebensjahr vollendet haben und dem Betrieb mindestens sechs Monate angehören."},{"id":"R-BR-004","f":1,"sub":"Betriebsverfassung","t":"mc","q":"Wie lange dauert die regelmäßige Amtszeit des Betriebsrats?","o":[{"t":"4 Jahre","ok":1},{"t":"2 Jahre"},{"t":"5 Jahre"},{"t":"1 Jahr"}],"e":"§ 21 BetrVG: Die regelmäßige Amtszeit beträgt vier Jahre; die regelmäßigen Betriebsratswahlen finden alle vier Jahre statt."},{"id":"R-BR-005","f":1,"sub":"Betriebsverfassung","t":"mc","q":"Wovon hängt die Zahl der Betriebsratsmitglieder ab?","o":[{"t":"Von der Zahl der wahlberechtigten Arbeitnehmer (gestaffelt nach § 9 BetrVG)","ok":1},{"t":"Vom Umsatz des Betriebs"},{"t":"Von der Zahl der Gewerkschaftsmitglieder"},{"t":"Sie ist immer gleich groß"}],"e":"§ 9 BetrVG staffelt die Mitgliederzahl nach der Belegschaftsgröße – z. B. 1 Person bei 5–20 Arbeitnehmern, 3 Personen bei 21–50 Arbeitnehmern usw."},{"id":"R-BR-006","f":1,"sub":"Betriebsverfassung","t":"mc","q":"Ab welcher Betriebsgröße sind Betriebsratsmitglieder von der Arbeit freizustellen (§ 38 BetrVG)?","o":[{"t":"Ab 200 Arbeitnehmern (mindestens ein Mitglied)","ok":1},{"t":"Ab 50 Arbeitnehmern"},{"t":"Ab 100 Arbeitnehmern"},{"t":"Erst ab 500 Arbeitnehmern"}],"e":"§ 38 BetrVG: Ab 200 Arbeitnehmern ist mindestens ein Betriebsratsmitglied freizustellen; die Zahl steigt gestaffelt mit der Belegschaftsgröße."},{"id":"R-BR-007","f":1,"sub":"Betriebsverfassung","t":"mc","q":"Ist das Amt des Betriebsrats ein bezahltes Amt?","o":[{"t":"Nein, das Amt wird ehrenamtlich und unentgeltlich geführt; Arbeitsversäumnis wird aber vergütet","ok":1},{"t":"Ja, Betriebsratsmitglieder erhalten eine gesonderte Amtsvergütung"},{"t":"Ja, das Gehalt verdoppelt sich"},{"t":"Nein, sie verlieren jeden Entgeltanspruch"}],"e":"§ 37 BetrVG: Das Betriebsratsamt ist ein unentgeltliches Ehrenamt. Erforderliche Betriebsratstätigkeit während der Arbeitszeit wird jedoch ohne Minderung des Entgelts freigestellt."},{"id":"R-BR-008","f":1,"sub":"Betriebsverfassung","t":"mc","q":"Nach welchem Grundsatz müssen Arbeitgeber und Betriebsrat zusammenarbeiten (§ 2 BetrVG)?","o":[{"t":"Vertrauensvolle Zusammenarbeit zum Wohl der Arbeitnehmer und des Betriebs","ok":1},{"t":"Strikte Gegnerschaft"},{"t":"Weisungsgebundenheit des Betriebsrats"},{"t":"Ausschließlich schriftlicher Verkehr"}],"e":"§ 2 BetrVG verpflichtet beide Seiten zur vertrauensvollen Zusammenarbeit im Zusammenwirken mit den Gewerkschaften und Arbeitgeberverbänden."},{"id":"R-BR-009","f":1,"sub":"Betriebsverfassung","t":"mc","q":"Was gilt nach dem BetrVG als Friedenspflicht im Betrieb (§ 74 Abs. 2)?","o":[{"t":"Arbeitgeber und Betriebsrat dürfen keine Maßnahmen des Arbeitskampfes gegeneinander führen","ok":1},{"t":"Der Betriebsrat darf jederzeit zum Streik aufrufen"},{"t":"Der Arbeitgeber darf die Belegschaft aussperren"},{"t":"Es dürfen keine Betriebsversammlungen stattfinden"}],"e":"§ 74 Abs. 2 BetrVG: Zwischen Arbeitgeber und Betriebsrat sind Arbeitskampfmaßnahmen unzulässig; ebenso ist parteipolitische Betätigung im Betrieb zu unterlassen (Arbeitskämpfe führen die Tarifvertragsparteien, nicht der Betriebsrat)."},{"id":"R-BR-010","f":1,"sub":"Betriebsverfassung","t":"mc","q":"Welche Abstufung der Beteiligungsrechte des Betriebsrats ist – von schwach nach stark – richtig?","o":[{"t":"Informations- < Anhörungs- < Beratungs- < Mitbestimmungsrecht","ok":1},{"t":"Mitbestimmung < Beratung < Anhörung < Information"},{"t":"Anhörung < Information < Mitbestimmung < Beratung"},{"t":"Beratung < Mitbestimmung < Information < Anhörung"}],"e":"Die Beteiligungsrechte reichen von bloßer Information über Anhörung und Beratung bis zur (erzwingbaren) Mitbestimmung – das stärkste Recht."},{"id":"R-BR-011","f":1,"sub":"Betriebsverfassung","t":"mc","q":"In welchem Bereich hat der Betriebsrat ein echtes (erzwingbares) Mitbestimmungsrecht?","o":[{"t":"In sozialen Angelegenheiten nach § 87 BetrVG","ok":1},{"t":"Bei der Preisgestaltung der Produkte"},{"t":"Bei der Wahl des Steuerberaters"},{"t":"Bei Investitionsentscheidungen der Eigentümer"}],"e":"In den sozialen Angelegenheiten des § 87 BetrVG ist die Mitbestimmung erzwingbar; kommt keine Einigung zustande, entscheidet die Einigungsstelle."},{"id":"R-BR-012","f":1,"sub":"Betriebsverfassung","t":"mc","q":"Welche Angelegenheit unterliegt der Mitbestimmung in sozialen Angelegenheiten (§ 87 BetrVG)?","o":[{"t":"Beginn und Ende der täglichen Arbeitszeit einschließlich der Pausen","ok":1},{"t":"Die Höhe des Grundkapitals"},{"t":"Die Auswahl der Rohstofflieferanten"},{"t":"Die Produktgestaltung"}],"e":"§ 87 Abs. 1 Nr. 2 BetrVG: Lage der Arbeitszeit und Pausen sind mitbestimmungspflichtig – ebenso u. a. Urlaubsgrundsätze, betriebliche Ordnung, technische Überwachung und Lohngestaltung."},{"id":"R-BR-013","f":1,"sub":"Betriebsverfassung","t":"mc","q":"Welche der folgenden Angelegenheiten ist NICHT mitbestimmungspflichtig nach § 87 BetrVG?","o":[{"t":"Die unternehmerische Entscheidung über die Produktpalette","ok":1},{"t":"Die Lage der Pausen"},{"t":"Urlaubsgrundsätze und Urlaubsplan"},{"t":"Einführung technischer Überwachungseinrichtungen"}],"e":"Wirtschaftliche und unternehmerische Grundentscheidungen (was produziert wird) sind mitbestimmungsfrei. § 87 erfasst nur die sozialen Angelegenheiten."},{"id":"R-BR-014","f":1,"sub":"Betriebsverfassung","t":"mc","q":"Die Einführung einer elektronischen Zeiterfassung, die das Verhalten der Mitarbeiter überwachen kann, ist …","o":[{"t":"mitbestimmungspflichtig (§ 87 Abs. 1 Nr. 6 BetrVG)","ok":1},{"t":"allein vom Arbeitgeber zu entscheiden"},{"t":"nur mit Zustimmung jedes einzelnen Mitarbeiters zulässig"},{"t":"generell verboten"}],"e":"§ 87 Abs. 1 Nr. 6 BetrVG: Die Einführung und Anwendung technischer Einrichtungen, die zur Überwachung von Verhalten oder Leistung bestimmt sind, ist mitbestimmungspflichtig."},{"id":"R-BR-015","f":1,"sub":"Betriebsverfassung","t":"mc","q":"Wer entscheidet, wenn sich Arbeitgeber und Betriebsrat in einer mitbestimmungspflichtigen Angelegenheit nicht einigen?","o":[{"t":"Die Einigungsstelle; ihr Spruch ersetzt die Einigung","ok":1},{"t":"Allein der Arbeitgeber"},{"t":"Das Finanzamt"},{"t":"Die IHK"}],"e":"§ 76 BetrVG: Die Einigungsstelle (paritätisch besetzt, mit unparteiischem Vorsitz) entscheidet; in erzwingbaren Mitbestimmungsangelegenheiten ist ihr Spruch verbindlich."},{"id":"R-BR-016","f":1,"sub":"Betriebsverfassung","t":"mc","q":"Wie ist die Einigungsstelle nach § 76 BetrVG besetzt?","o":[{"t":"Paritätisch mit Beisitzern beider Seiten und einem unparteiischen Vorsitzenden","ok":1},{"t":"Nur mit Vertretern des Arbeitgebers"},{"t":"Nur mit Vertretern des Betriebsrats"},{"t":"Mit Richtern des Arbeitsgerichts"}],"e":"Die Einigungsstelle besteht aus einer gleichen Zahl von Beisitzern des Arbeitgebers und des Betriebsrats sowie einem unparteiischen Vorsitzenden, auf den sich beide Seiten einigen."},{"id":"R-BR-017","f":1,"sub":"Betriebsverfassung","t":"mc","q":"Bei welcher personellen Einzelmaßnahme hat der Betriebsrat ein Mitbestimmungsrecht nach § 99 BetrVG?","o":[{"t":"Bei Einstellung, Versetzung, Ein- und Umgruppierung (in Betrieben mit i. d. R. mehr als 20 Arbeitnehmern)","ok":1},{"t":"Bei der Wahl des Aufsichtsrats"},{"t":"Bei der Festlegung der Dividende"},{"t":"Bei der Bestellung des Geschäftsführers"}],"e":"§ 99 BetrVG: In Betrieben mit i. d. R. mehr als 20 wahlberechtigten Arbeitnehmern ist der Betriebsrat bei Einstellung, Eingruppierung, Umgruppierung und Versetzung zu beteiligen; er kann die Zustimmung aus den gesetzlichen Gründen verweigern."},{"id":"R-BR-018","f":1,"sub":"Betriebsverfassung","t":"mc","q":"Welche Folge hat eine Kündigung, die ohne Anhörung des Betriebsrats ausgesprochen wird (§ 102 BetrVG)?","o":[{"t":"Sie ist unwirksam","ok":1},{"t":"Sie ist wirksam, aber anfechtbar"},{"t":"Sie wird automatisch in eine Abmahnung umgewandelt"},{"t":"Sie verlängert die Kündigungsfrist"}],"e":"§ 102 Abs. 1 Satz 3 BetrVG: Eine ohne Anhörung des Betriebsrats ausgesprochene Kündigung ist unwirksam. Der Betriebsrat ist vor jeder Kündigung zu hören."},{"id":"R-BR-019","f":1,"sub":"Betriebsverfassung","t":"mc","q":"Innerhalb welcher Frist kann der Betriebsrat einer ordentlichen Kündigung widersprechen?","o":[{"t":"Innerhalb einer Woche","ok":1},{"t":"Innerhalb von drei Tagen"},{"t":"Innerhalb von zwei Wochen"},{"t":"Innerhalb eines Monats"}],"e":"§ 102 Abs. 2 BetrVG: Bedenken gegen eine ordentliche Kündigung sind spätestens innerhalb einer Woche, bei außerordentlicher Kündigung innerhalb von drei Tagen schriftlich mitzuteilen."},{"id":"R-BR-020","f":1,"sub":"Betriebsverfassung","t":"mc","q":"Welche Interessenvertretung wählen die jugendlichen und die zur Berufsausbildung Beschäftigten?","o":[{"t":"Die Jugend- und Auszubildendenvertretung (JAV)","ok":1},{"t":"Den Aufsichtsrat"},{"t":"Die Schwerbehindertenvertretung"},{"t":"Den Wirtschaftsausschuss"}],"e":"§ 60 ff. BetrVG: In Betrieben mit mindestens fünf Arbeitnehmern unter 18 Jahren oder Auszubildenden unter 25 Jahren wird eine JAV gewählt, die deren besondere Interessen gegenüber dem Betriebsrat vertritt."},{"id":"R-BR-021","f":1,"sub":"Betriebsverfassung","t":"mc","q":"Ab welcher Betriebsgröße ist ein Wirtschaftsausschuss zu bilden (§ 106 BetrVG)?","o":[{"t":"In Unternehmen mit in der Regel mehr als 100 ständig Beschäftigten","ok":1},{"t":"Ab 20 Beschäftigten"},{"t":"Ab 50 Beschäftigten"},{"t":"In jedem Unternehmen"}],"e":"§ 106 BetrVG: In Unternehmen mit i. d. R. mehr als 100 ständig beschäftigten Arbeitnehmern ist ein Wirtschaftsausschuss zu bilden, der wirtschaftliche Angelegenheiten mit dem Unternehmer berät."},{"id":"R-BR-022","f":1,"sub":"Betriebsverfassung","t":"mc","q":"Wie oft hat der Betriebsrat in der Regel eine Betriebsversammlung einzuberufen?","o":[{"t":"Einmal in jedem Kalendervierteljahr","ok":1},{"t":"Einmal im Jahr"},{"t":"Einmal im Monat"},{"t":"Nur auf Verlangen des Arbeitgebers"}],"e":"§ 43 BetrVG: Der Betriebsrat hat einmal in jedem Kalendervierteljahr eine Betriebsversammlung einzuberufen und dort einen Tätigkeitsbericht zu erstatten."},{"id":"R-BR-023","f":1,"sub":"Betriebsverfassung","t":"open","q":"Der Arbeitgeber möchte eine neue Mitarbeiterin einstellen. Der Betrieb hat 60 Arbeitnehmer. Welches Beteiligungsrecht hat der Betriebsrat, und was muss der Arbeitgeber beachten?","a":"Bei einer Einstellung in einem Betrieb mit in der Regel mehr als 20 wahlberechtigten Arbeitnehmern hat der Betriebsrat ein Mitbestimmungsrecht nach § 99 BetrVG. Der Arbeitgeber muss den Betriebsrat vor der Einstellung unterrichten, ihm die Bewerbungsunterlagen vorlegen und seine Zustimmung einholen. Der Betriebsrat kann die Zustimmung nur aus den in § 99 Abs. 2 BetrVG genannten Gründen verweigern (z. B. Gesetzesverstoß, Benachteiligung anderer Arbeitnehmer). Verweigert er die Zustimmung, kann der Arbeitgeber diese beim Arbeitsgericht ersetzen lassen.","e":"Da der Betrieb mehr als 20 Arbeitnehmer hat, greift § 99 BetrVG mit Vorlage-, Unterrichtungs- und Zustimmungserfordernis."},{"id":"R-BR-024","f":1,"sub":"Betriebsverfassung","t":"mc","q":"Zwischen wem wird eine Betriebsvereinbarung geschlossen?","o":[{"t":"Zwischen Arbeitgeber und Betriebsrat","ok":1},{"t":"Zwischen Gewerkschaft und Arbeitgeberverband"},{"t":"Zwischen Arbeitgeber und einzelnem Arbeitnehmer"},{"t":"Zwischen Betriebsrat und Gewerkschaft"}],"e":"§ 77 BetrVG: Die Betriebsvereinbarung ist ein Vertrag zwischen Arbeitgeber und Betriebsrat; sie gilt unmittelbar und zwingend für die Arbeitsverhältnisse des Betriebs."},{"id":"R-BR-025","f":1,"sub":"Betriebsverfassung","t":"mc","q":"Wie wirkt eine Betriebsvereinbarung auf die einzelnen Arbeitsverhältnisse?","o":[{"t":"Unmittelbar und zwingend (normative Wirkung)","ok":1},{"t":"Nur als unverbindliche Empfehlung"},{"t":"Erst nach Zustimmung jedes Arbeitnehmers"},{"t":"Gar nicht, sie bindet nur den Betriebsrat"}],"e":"Betriebsvereinbarungen gelten unmittelbar und zwingend wie Gesetze für die Arbeitsverhältnisse (§ 77 Abs. 4 BetrVG) – vergleichbar der normativen Wirkung des Tarifvertrags."},{"id":"R-BR-026","f":1,"sub":"Betriebsverfassung","t":"mc","q":"Was besagt der Tarifvorrang / die Regelungssperre des § 77 Abs. 3 BetrVG?","o":[{"t":"Inhalte, die üblicherweise tariflich geregelt werden, dürfen grundsätzlich nicht Gegenstand einer Betriebsvereinbarung sein","ok":1},{"t":"Betriebsvereinbarungen gehen Tarifverträgen stets vor"},{"t":"Tarifverträge sind unwirksam, wenn eine Betriebsvereinbarung besteht"},{"t":"Der Betriebsrat schließt Tarifverträge ab"}],"e":"§ 77 Abs. 3 BetrVG: Arbeitsentgelte und sonstige Arbeitsbedingungen, die tariflich geregelt sind oder üblicherweise geregelt werden, können nicht durch Betriebsvereinbarung geregelt werden (Schutz der Tarifautonomie)."},{"id":"R-BR-027","f":1,"sub":"Betriebsverfassung","t":"mc","q":"Wer sind die Tarifvertragsparteien?","o":[{"t":"Gewerkschaften und Arbeitgeberverbände bzw. einzelne Arbeitgeber","ok":1},{"t":"Betriebsrat und Arbeitgeber"},{"t":"IHK und Gewerkschaft"},{"t":"Staat und Gewerkschaft"}],"e":"Tarifverträge werden von Gewerkschaften mit Arbeitgeberverbänden (Verbandstarifvertrag) oder einzelnen Arbeitgebern (Firmen-/Haustarifvertrag) geschlossen (§ 2 TVG)."},{"id":"R-BR-028","f":1,"sub":"Betriebsverfassung","t":"mc","q":"Auf welcher verfassungsrechtlichen Grundlage beruht die Tarifautonomie?","o":[{"t":"Auf der Koalitionsfreiheit (Art. 9 Abs. 3 GG)","ok":1},{"t":"Auf der Berufsfreiheit (Art. 12 GG)"},{"t":"Auf dem Eigentumsrecht (Art. 14 GG)"},{"t":"Auf der Meinungsfreiheit (Art. 5 GG)"}],"e":"Art. 9 Abs. 3 GG garantiert das Recht, zur Wahrung der Arbeits- und Wirtschaftsbedingungen Koalitionen (Gewerkschaften, Arbeitgeberverbände) zu bilden – Grundlage der Tarifautonomie."},{"id":"R-BR-029","f":1,"sub":"Betriebsverfassung","t":"mc","q":"Welche Wirkung haben die Rechtsnormen eines Tarifvertrags auf tarifgebundene Arbeitsverhältnisse?","o":[{"t":"Unmittelbare und zwingende Wirkung (§ 4 Abs. 1 TVG)","ok":1},{"t":"Nur empfehlenden Charakter"},{"t":"Wirkung erst nach Zustimmung des Betriebsrats"},{"t":"Keine rechtliche Bindung"}],"e":"§ 4 Abs. 1 TVG: Die Rechtsnormen des Tarifvertrags gelten unmittelbar und zwingend zwischen den beiderseits Tarifgebundenen; ungünstigere Abmachungen sind unwirksam."},{"id":"R-BR-030","f":1,"sub":"Betriebsverfassung","t":"mc","q":"Was versteht man unter der Friedenspflicht im Tarifrecht?","o":[{"t":"Während der Laufzeit eines Tarifvertrags dürfen über die geregelten Gegenstände keine Arbeitskämpfe geführt werden","ok":1},{"t":"Es darf niemals gestreikt werden"},{"t":"Der Arbeitgeber muss dauerhaft Lohn zahlen"},{"t":"Der Betriebsrat muss neutral bleiben"}],"e":"Aus dem laufenden Tarifvertrag folgt die (relative) Friedenspflicht: Über die tariflich geregelten Fragen darf während der Laufzeit nicht gestreikt oder ausgesperrt werden."},{"id":"R-BR-031","f":1,"sub":"Betriebsverfassung","t":"mc","q":"Welche Arten von Tarifverträgen werden typischerweise unterschieden?","o":[{"t":"Manteltarifvertrag (Rahmenbedingungen) und Entgelt-/Lohntarifvertrag","ok":1},{"t":"Kauf- und Werktarifvertrag"},{"t":"Miet- und Pachttarifvertrag"},{"t":"Einzel- und Gruppentarifvertrag"}],"e":"Der Manteltarifvertrag regelt allgemeine, länger geltende Bedingungen (Arbeitszeit, Urlaub, Kündigungsfristen); der Entgelt-/Lohn- und Gehaltstarifvertrag regelt die Vergütung und wird häufiger neu verhandelt."},{"id":"R-BR-032","f":1,"sub":"Betriebsverfassung","t":"mc","q":"Was bedeutet die Allgemeinverbindlicherklärung eines Tarifvertrags?","o":[{"t":"Der Tarifvertrag gilt auch für nicht tarifgebundene Arbeitgeber und Arbeitnehmer der Branche","ok":1},{"t":"Der Tarifvertrag wird aufgehoben"},{"t":"Er gilt nur noch für Gewerkschaftsmitglieder"},{"t":"Er wird auf das ganze EU-Gebiet ausgeweitet"}],"e":"Durch die Allgemeinverbindlicherklärung (§ 5 TVG) durch das Bundesarbeitsministerium erfasst ein Tarifvertrag auch die nicht organisierten Arbeitgeber und Arbeitnehmer des Geltungsbereichs."},{"id":"R-BR-033","f":1,"sub":"Betriebsverfassung","t":"mc","q":"Was gilt, wenn für ein Arbeitsverhältnis sowohl Tarifvertrag als auch eine günstigere Einzelabrede bestehen?","o":[{"t":"Die für den Arbeitnehmer günstigere Regelung setzt sich durch (Günstigkeitsprinzip)","ok":1},{"t":"Immer der Tarifvertrag"},{"t":"Immer die Einzelabrede, auch wenn sie ungünstiger ist"},{"t":"Beide Regelungen entfallen"}],"e":"§ 4 Abs. 3 TVG: Abweichende Abmachungen sind nur zulässig, soweit sie zugunsten des Arbeitnehmers wirken – der Tarifvertrag bildet die Untergrenze."},{"id":"R-BR-034","f":1,"sub":"Betriebsverfassung","t":"mc","q":"Welche Kampfmittel stehen den Tarifparteien im Arbeitskampf typischerweise gegenüber?","o":[{"t":"Streik (Arbeitnehmer) und Aussperrung (Arbeitgeber)","ok":1},{"t":"Abmahnung und Kündigung"},{"t":"Betriebsversammlung und Einigungsstelle"},{"t":"Klage und Widerspruch"}],"e":"Der Streik ist die kollektive Arbeitsniederlegung der Arbeitnehmer; die Aussperrung ist die vom Arbeitgeber ausgehende Verweigerung von Beschäftigung und Lohn."},{"id":"R-BR-035","f":1,"sub":"Betriebsverfassung","t":"mc","q":"Welche Voraussetzung muss ein rechtmäßiger Streik erfüllen?","o":[{"t":"Er muss von einer Gewerkschaft getragen, auf ein tariflich regelbares Ziel gerichtet und verhältnismäßig sein","ok":1},{"t":"Er muss vom Betriebsrat ausgerufen werden"},{"t":"Er muss gegen den Staat gerichtet sein"},{"t":"Er darf jederzeit auch während der Friedenspflicht erfolgen"}],"e":"Rechtmäßig ist ein Streik grundsätzlich nur als gewerkschaftlich getragener Arbeitskampf um ein tariflich regelbares Ziel, nach Ablauf der Friedenspflicht und unter Wahrung der Verhältnismäßigkeit (ultima ratio)."},{"id":"R-BR-036","f":1,"sub":"Betriebsverfassung","t":"mc","q":"Was kennzeichnet einen „wilden Streik“?","o":[{"t":"Eine nicht von einer Gewerkschaft getragene und daher rechtswidrige Arbeitsniederlegung","ok":1},{"t":"Einen von der Gewerkschaft genehmigten Warnstreik"},{"t":"Eine Aussperrung durch den Arbeitgeber"},{"t":"Einen Streik im öffentlichen Dienst"}],"e":"Ein wilder Streik wird ohne gewerkschaftliche Trägerschaft geführt und ist grundsätzlich rechtswidrig; die Teilnehmer verletzen ihre arbeitsvertraglichen Pflichten."},{"id":"R-BR-037","f":1,"sub":"Betriebsverfassung","t":"mc","q":"Was geschieht mit dem Entgeltanspruch während eines rechtmäßigen Streiks?","o":[{"t":"Er entfällt für die Dauer der Arbeitsniederlegung (keine Arbeit, kein Lohn)","ok":1},{"t":"Er bleibt in voller Höhe bestehen"},{"t":"Er wird vom Staat übernommen"},{"t":"Er verdoppelt sich als Ausgleich"}],"e":"Da während des Streiks nicht gearbeitet wird, ruht die Hauptleistungspflicht des Arbeitgebers; streikende Gewerkschaftsmitglieder können Streikgeld von ihrer Gewerkschaft erhalten."},{"id":"R-BR-038","f":1,"sub":"Betriebsverfassung","t":"mc","q":"Welcher Grundsatz begrenzt Arbeitskampfmaßnahmen?","o":[{"t":"Der Grundsatz der Verhältnismäßigkeit (Arbeitskampf als letztes Mittel)","ok":1},{"t":"Der Grundsatz der Gewinnmaximierung"},{"t":"Das Mehrheitsprinzip im Betriebsrat"},{"t":"Das Rangprinzip"}],"e":"Arbeitskämpfe müssen verhältnismäßig sein: geeignet, erforderlich und angemessen. Der Arbeitskampf ist ultima ratio – erst nach Ausschöpfung der Verhandlungsmöglichkeiten zulässig."},{"id":"R-AR-041","f":1,"sub":"Arbeitsrecht","t":"mc","q":"Wie lange darf ein Arbeitsvertrag ohne sachlichen Grund befristet werden (§ 14 Abs. 2 TzBfG)?","o":[{"t":"Bis zu 2 Jahre, mit höchstens dreimaliger Verlängerung innerhalb dieser Zeit","ok":1},{"t":"Bis zu 5 Jahre"},{"t":"Unbegrenzt"},{"t":"Höchstens 6 Monate"}],"e":"§ 14 Abs. 2 TzBfG: Ohne Sachgrund ist eine Befristung bis zu zwei Jahren zulässig; innerhalb dieser Zeit darf der Vertrag höchstens dreimal verlängert werden. Voraussetzung ist, dass zuvor kein Arbeitsverhältnis mit demselben Arbeitgeber bestand."},{"id":"R-AR-042","f":1,"sub":"Arbeitsrecht","t":"mc","q":"Welche Form ist für die Befristung eines Arbeitsvertrags erforderlich?","o":[{"t":"Die Schriftform (§ 14 Abs. 4 TzBfG)","ok":1},{"t":"Mündliche Vereinbarung genügt"},{"t":"Textform per E-Mail reicht aus"},{"t":"Keine besondere Form"}],"e":"§ 14 Abs. 4 TzBfG: Die Befristungsabrede bedarf zu ihrer Wirksamkeit der Schriftform. Fehlt sie, gilt der Vertrag als auf unbestimmte Zeit geschlossen."},{"id":"R-AR-043","f":1,"sub":"Arbeitsrecht","t":"mc","q":"Was ist ein Beispiel für einen Sachgrund, der eine Befristung rechtfertigt (§ 14 Abs. 1 TzBfG)?","o":[{"t":"Vertretung eines erkrankten oder in Elternzeit befindlichen Mitarbeiters","ok":1},{"t":"Der Wunsch, Kündigungsschutz zu umgehen"},{"t":"Die schlechte Konjunktur allgemein"},{"t":"Die Rechtsform des Unternehmens"}],"e":"Sachgründe sind u. a. vorübergehender Bedarf, Vertretung, Erprobung, Eigenart der Tätigkeit oder befristete Haushaltsmittel. Der bloße Wunsch, den Kündigungsschutz auszuschließen, ist kein Sachgrund."},{"id":"R-AR-044","f":1,"sub":"Arbeitsrecht","t":"mc","q":"Was geschieht, wenn eine Befristung unwirksam ist?","o":[{"t":"Der Arbeitsvertrag gilt als auf unbestimmte Zeit (unbefristet) geschlossen","ok":1},{"t":"Der Vertrag endet sofort"},{"t":"Die Befristung verlängert sich automatisch"},{"t":"Der Arbeitnehmer muss eine Vertragsstrafe zahlen"}],"e":"Ist die Befristung rechtsunwirksam (z. B. wegen Formmangel oder fehlendem Sachgrund), besteht ein unbefristetes Arbeitsverhältnis."},{"id":"R-AR-045","f":1,"sub":"Arbeitsrecht","t":"mc","q":"Unter welchen Voraussetzungen besteht ein Anspruch auf Verringerung der Arbeitszeit (Teilzeit) nach dem TzBfG?","o":[{"t":"Arbeitsverhältnis länger als 6 Monate und mehr als 15 Arbeitnehmer im Betrieb","ok":1},{"t":"Ab dem ersten Arbeitstag in jedem Betrieb"},{"t":"Nur in Betrieben mit Betriebsrat"},{"t":"Nur für Eltern"}],"e":"§ 8 TzBfG: Der Teilzeitanspruch setzt voraus, dass das Arbeitsverhältnis länger als sechs Monate bestanden hat und der Arbeitgeber in der Regel mehr als 15 Arbeitnehmer beschäftigt."},{"id":"R-AR-046","f":1,"sub":"Arbeitsrecht","t":"mc","q":"Was regelt die sogenannte Brückenteilzeit (§ 9a TzBfG)?","o":[{"t":"Einen Anspruch auf zeitlich begrenzte Teilzeit mit Rückkehrrecht zur früheren Arbeitszeit","ok":1},{"t":"Eine dauerhafte Vollzeitgarantie"},{"t":"Die Überbrückung von Kurzarbeit"},{"t":"Eine besondere Form der Rente"}],"e":"§ 9a TzBfG (seit 1.1.2019): In Betrieben mit mehr als 45 Arbeitnehmern können Beschäftigte eine befristete Teilzeit (1–5 Jahre) verlangen und kehren danach zur ursprünglichen Arbeitszeit zurück."},{"id":"R-AR-047","f":1,"sub":"Arbeitsrecht","t":"mc","q":"Wie hoch ist die wöchentliche Höchstarbeitszeit für Jugendliche nach dem JArbSchG?","o":[{"t":"40 Stunden bei einer Fünf-Tage-Woche","ok":1},{"t":"48 Stunden"},{"t":"35 Stunden"},{"t":"Wie bei Erwachsenen"}],"e":"§ 8 JArbSchG: Jugendliche dürfen höchstens 8 Stunden täglich und 40 Stunden wöchentlich beschäftigt werden."},{"id":"R-AR-048","f":1,"sub":"Arbeitsrecht","t":"mc","q":"Welche Beschäftigung ist für Jugendliche nach dem JArbSchG grundsätzlich unzulässig?","o":[{"t":"Akkord- und tempoabhängige Arbeit sowie in der Regel Nachtarbeit","ok":1},{"t":"Jede Tätigkeit im Büro"},{"t":"Arbeit an Werktagen"},{"t":"Arbeit unter Aufsicht"}],"e":"Das JArbSchG verbietet Jugendlichen u. a. Akkordarbeit und tempoabhängige Arbeiten (§ 23) sowie grundsätzlich Nachtarbeit (§ 14) und gefährliche Arbeiten (§ 22)."},{"id":"R-AR-049","f":1,"sub":"Arbeitsrecht","t":"mc","q":"Wie viel Urlaub steht Jugendlichen zu, die zu Jahresbeginn noch nicht 16 Jahre alt sind?","o":[{"t":"30 Werktage","ok":1},{"t":"24 Werktage"},{"t":"27 Werktage"},{"t":"20 Werktage"}],"e":"§ 19 JArbSchG staffelt den Urlaub nach Alter: unter 16 Jahren 30, unter 17 Jahren 27, unter 18 Jahren 25 Werktage – jeweils mehr als der Mindesturlaub Erwachsener."},{"id":"R-AR-050","f":1,"sub":"Arbeitsrecht","t":"mc","q":"Ab welchem Alter gilt eine Person nach dem JArbSchG als „Jugendlicher“?","o":[{"t":"Wer 15, aber noch nicht 18 Jahre alt ist","ok":1},{"t":"Wer 14, aber noch nicht 16 Jahre alt ist"},{"t":"Wer 16, aber noch nicht 21 Jahre alt ist"},{"t":"Wer unter 14 Jahren ist"}],"e":"§ 2 JArbSchG: Kind ist, wer noch nicht 15 ist; Jugendlicher ist, wer 15, aber noch nicht 18 Jahre alt ist. Kinderarbeit ist grundsätzlich verboten."},{"id":"R-AR-051","f":1,"sub":"Arbeitsrecht","t":"mc","q":"Was regelt § 613a BGB (Betriebsübergang)?","o":[{"t":"Der Erwerber tritt in die bestehenden Arbeitsverhältnisse mit allen Rechten und Pflichten ein","ok":1},{"t":"Alle Arbeitsverträge enden automatisch"},{"t":"Die Löhne werden halbiert"},{"t":"Der Betriebsrat wird aufgelöst"}],"e":"§ 613a BGB: Beim Übergang eines Betriebs auf einen neuen Inhaber gehen die Arbeitsverhältnisse auf diesen über. Rechte und Pflichten bleiben erhalten."},{"id":"R-AR-052","f":1,"sub":"Arbeitsrecht","t":"mc","q":"Ist eine Kündigung „wegen des Betriebsübergangs“ zulässig?","o":[{"t":"Nein, eine Kündigung wegen des Übergangs ist unwirksam","ok":1},{"t":"Ja, jederzeit"},{"t":"Nur durch den bisherigen Inhaber"},{"t":"Nur mit Zustimmung des Betriebsrats"}],"e":"§ 613a Abs. 4 BGB: Eine Kündigung wegen des Betriebsübergangs ist unwirksam. Kündigungen aus anderen Gründen (z. B. betriebsbedingt) bleiben möglich."},{"id":"R-AR-053","f":1,"sub":"Arbeitsrecht","t":"mc","q":"Welches Recht hat der Arbeitnehmer beim Betriebsübergang?","o":[{"t":"Ein Widerspruchsrecht gegen den Übergang seines Arbeitsverhältnisses","ok":1},{"t":"Ein Recht auf sofortige Abfindung"},{"t":"Ein Recht, den Kaufpreis zu bestimmen"},{"t":"Kein besonderes Recht"}],"e":"§ 613a Abs. 6 BGB: Der Arbeitnehmer kann dem Übergang seines Arbeitsverhältnisses schriftlich innerhalb eines Monats nach Unterrichtung widersprechen; dann bleibt das Arbeitsverhältnis beim bisherigen Inhaber (mit Kündigungsrisiko)."},{"id":"R-AR-054","f":1,"sub":"Arbeitsrecht","t":"mc","q":"Worauf hat ein Arbeitnehmer bei Beendigung des Arbeitsverhältnisses Anspruch (§ 109 GewO)?","o":[{"t":"Auf ein schriftliches Zeugnis (einfaches oder auf Verlangen qualifiziertes)","ok":1},{"t":"Auf eine Abfindung in jedem Fall"},{"t":"Auf Weiterbeschäftigung"},{"t":"Auf Auszahlung des Resturlaubs in doppelter Höhe"}],"e":"§ 109 GewO: Der Arbeitnehmer hat Anspruch auf ein schriftliches Zeugnis. Das einfache Zeugnis nennt Art und Dauer der Tätigkeit; das qualifizierte Zeugnis bewertet zusätzlich Leistung und Verhalten."},{"id":"R-AR-055","f":1,"sub":"Arbeitsrecht","t":"mc","q":"Welche zwei Grundsätze müssen bei einem Arbeitszeugnis in Einklang gebracht werden?","o":[{"t":"Zeugniswahrheit und Zeugnisklarheit einerseits, wohlwollende Beurteilung andererseits","ok":1},{"t":"Kürze und Anonymität"},{"t":"Strenge und Geheimhaltung"},{"t":"Formfreiheit und Mündlichkeit"}],"e":"Das Zeugnis muss wahr und klar sein, zugleich aber wohlwollend formuliert werden, um das berufliche Fortkommen nicht unnötig zu erschweren. Aus diesem Spannungsverhältnis entstand die verschlüsselte „Zeugnissprache“."},{"id":"R-AR-056","f":1,"sub":"Arbeitsrecht","t":"mc","q":"Was darf ein Arbeitszeugnis nicht enthalten?","o":[{"t":"Versteckte Hinweise oder Merkmale, die dem Arbeitnehmer schaden (Geheimcodes zum Nachteil)","ok":1},{"t":"Die Dauer der Beschäftigung"},{"t":"Die ausgeübte Tätigkeit"},{"t":"Eine Leistungsbewertung"}],"e":"Das Zeugnis darf keine Formulierungen enthalten, die einen anderen als den aus dem Wortlaut ersichtlichen Zweck verfolgen (§ 109 Abs. 2 GewO) – etwa versteckte negative Botschaften."},{"id":"R-AR-057","f":1,"sub":"Arbeitsrecht","t":"mc","q":"Wie endet ein Arbeitsverhältnis durch einen Aufhebungsvertrag?","o":[{"t":"Durch einvernehmliche Vereinbarung beider Parteien in Schriftform","ok":1},{"t":"Durch einseitige Erklärung des Arbeitgebers"},{"t":"Durch Beschluss des Betriebsrats"},{"t":"Automatisch nach 6 Monaten"}],"e":"Der Aufhebungsvertrag beendet das Arbeitsverhältnis einvernehmlich; er bedarf nach § 623 BGB der Schriftform. Kündigungsfristen und Kündigungsschutz gelten nicht, es droht aber ggf. eine Sperrzeit beim Arbeitslosengeld."},{"id":"R-AR-058","f":1,"sub":"Arbeitsrecht","t":"mc","q":"Welcher mögliche Nachteil ist mit einem Aufhebungsvertrag für den Arbeitnehmer verbunden?","o":[{"t":"Eine Sperrzeit beim Arbeitslosengeld","ok":1},{"t":"Der Verlust jeglicher Rentenansprüche"},{"t":"Eine automatische Vertragsstrafe"},{"t":"Der Ausschluss vom Zeugnisanspruch"}],"e":"Da der Arbeitnehmer aktiv an der Beendigung mitwirkt, kann die Agentur für Arbeit eine Sperrzeit von bis zu 12 Wochen verhängen (§ 159 SGB III)."},{"id":"R-AR-059","f":1,"sub":"Arbeitsrecht","t":"mc","q":"Nach welchen Grundsätzen haftet ein Arbeitnehmer für betrieblich verursachte Schäden (innerbetrieblicher Schadensausgleich)?","o":[{"t":"Abgestuft nach dem Grad des Verschuldens (leichte, mittlere, grobe Fahrlässigkeit/Vorsatz)","ok":1},{"t":"Immer in voller Höhe, unabhängig vom Verschulden"},{"t":"Nie, der Arbeitnehmer haftet grundsätzlich gar nicht"},{"t":"Nur bei Schäden über 10.000 €"}],"e":"Nach der Rechtsprechung zum innerbetrieblichen Schadensausgleich haftet der Arbeitnehmer bei betrieblich veranlasster Tätigkeit gestuft: bei leichtester Fahrlässigkeit gar nicht, bei mittlerer anteilig, bei grober Fahrlässigkeit/Vorsatz grundsätzlich voll."},{"id":"R-AR-060","f":1,"sub":"Arbeitsrecht","t":"mc","q":"Wie haftet ein Arbeitnehmer typischerweise bei leichtester Fahrlässigkeit im Rahmen betrieblicher Tätigkeit?","o":[{"t":"Gar nicht – der Schaden trägt der Arbeitgeber","ok":1},{"t":"In voller Höhe"},{"t":"Zur Hälfte"},{"t":"Nur mit dem Monatslohn begrenzt"}],"e":"Bei leichtester (geringfügiger) Fahrlässigkeit haftet der Arbeitnehmer nach den Grundsätzen des innerbetrieblichen Schadensausgleichs regelmäßig nicht; das Schadensrisiko liegt beim Betrieb (Betriebsrisiko)."},{"id":"R-AR-061","f":1,"sub":"Arbeitsrecht","t":"mc","q":"Welche Benachteiligungen soll das Allgemeine Gleichbehandlungsgesetz (AGG) verhindern?","o":[{"t":"Benachteiligungen wegen Rasse/ethnischer Herkunft, Geschlecht, Religion/Weltanschauung, Behinderung, Alter oder sexueller Identität","ok":1},{"t":"Benachteiligungen nur wegen des Geschlechts"},{"t":"Benachteiligungen wegen der Betriebszugehörigkeit"},{"t":"Benachteiligungen wegen der Gehaltshöhe"}],"e":"§ 1 AGG nennt abschließend die Merkmale Rasse/ethnische Herkunft, Geschlecht, Religion oder Weltanschauung, Behinderung, Alter und sexuelle Identität."},{"id":"R-AR-062","f":1,"sub":"Arbeitsrecht","t":"mc","q":"Ab wann greift das AGG im Beschäftigungsverhältnis?","o":[{"t":"Bereits im Bewerbungsverfahren (Stellenausschreibung, Auswahl)","ok":1},{"t":"Erst nach Ablauf der Probezeit"},{"t":"Erst nach 6 Monaten"},{"t":"Nur bei der Kündigung"}],"e":"Das AGG gilt für den gesamten Beschäftigungsprozess – von der (geschlechtsneutralen) Stellenausschreibung über Auswahl und Einstellung bis zu Aufstieg und Beendigung."},{"id":"R-AR-063","f":1,"sub":"Arbeitsrecht","t":"mc","q":"Was gilt für das Wettbewerbsverbot während des bestehenden Arbeitsverhältnisses?","o":[{"t":"Der Arbeitnehmer darf dem Arbeitgeber keine Konkurrenz machen (§ 60 HGB, allgemeine Treuepflicht)","ok":1},{"t":"Der Arbeitnehmer darf uneingeschränkt für Wettbewerber tätig sein"},{"t":"Ein Wettbewerbsverbot besteht nie"},{"t":"Es gilt nur für leitende Angestellte"}],"e":"Während des Arbeitsverhältnisses folgt aus der Treuepflicht (für Handlungsgehilfen ausdrücklich § 60 HGB) ein Wettbewerbsverbot: keine Konkurrenztätigkeit im Handelszweig des Arbeitgebers."},{"id":"R-AR-064","f":1,"sub":"Arbeitsrecht","t":"mc","q":"Welche Voraussetzung muss ein wirksames nachvertragliches Wettbewerbsverbot erfüllen (§ 74 HGB)?","o":[{"t":"Es muss schriftlich vereinbart sein und eine Karenzentschädigung von mindestens der Hälfte der zuletzt bezogenen Leistungen vorsehen","ok":1},{"t":"Es gilt automatisch nach jeder Kündigung ohne Vergütung"},{"t":"Es darf zeitlich unbegrenzt sein"},{"t":"Es bedarf keiner Gegenleistung"}],"e":"§ 74 HGB: Das nachvertragliche Wettbewerbsverbot ist nur wirksam bei Schriftform und Zahlung einer Karenzentschädigung von mindestens 50 % der zuletzt bezogenen vertragsmäßigen Leistungen; es darf höchstens zwei Jahre dauern."},{"id":"R-AR-065","f":1,"sub":"Arbeitsrecht","t":"mc","q":"Wie lange kann die Pflegezeit nach dem Pflegezeitgesetz (PflegeZG) höchstens in Anspruch genommen werden?","o":[{"t":"Bis zu 6 Monate (vollständige oder teilweise Freistellung)","ok":1},{"t":"Bis zu 3 Jahre"},{"t":"Bis zu 12 Monate"},{"t":"Nur 2 Wochen"}],"e":"§ 3 PflegeZG: Beschäftigte können sich für die Pflege naher Angehöriger bis zu sechs Monate ganz oder teilweise freistellen lassen (in Betrieben mit mehr als 15 Beschäftigten)."},{"id":"R-AR-066","f":1,"sub":"Arbeitsrecht","t":"mc","q":"Welches kurzfristige Recht sieht das PflegeZG bei akuter Pflegesituation vor?","o":[{"t":"Kurzzeitige Arbeitsverhinderung von bis zu 10 Arbeitstagen","ok":1},{"t":"Sofortige Kündigung ohne Frist"},{"t":"Unbegrenzte bezahlte Freistellung"},{"t":"Ein Recht auf Versetzung"}],"e":"§ 2 PflegeZG: Beschäftigte dürfen bei akut auftretender Pflegesituation bis zu 10 Arbeitstage der Arbeit fernbleiben, um eine bedarfsgerechte Pflege zu organisieren; hierfür kann Pflegeunterstützungsgeld beansprucht werden."},{"id":"R-AR-067","f":1,"sub":"Arbeitsrecht","t":"mc","q":"Wie lange kann Elternzeit je Kind höchstens genommen werden (BEEG)?","o":[{"t":"Bis zu 3 Jahre","ok":1},{"t":"Bis zu 1 Jahr"},{"t":"Bis zu 5 Jahre"},{"t":"Bis zu 6 Monate"}],"e":"§ 15 BEEG: Anspruch auf bis zu drei Jahre Elternzeit je Kind; ein Anteil von bis zu 24 Monaten ist auf die Zeit zwischen dem 3. und 8. Geburtstag übertragbar."},{"id":"R-AR-068","f":1,"sub":"Arbeitsrecht","t":"mc","q":"Wie lange vor Beginn muss Elternzeit für die Zeit bis zum 3. Geburtstag angemeldet werden?","o":[{"t":"Spätestens 7 Wochen vor Beginn","ok":1},{"t":"Spätestens 2 Wochen vor Beginn"},{"t":"Spätestens 6 Monate vor Beginn"},{"t":"Eine Anmeldung ist nicht nötig"}],"e":"§ 16 BEEG: Die Elternzeit ist grundsätzlich spätestens sieben Wochen vor Beginn schriftlich zu verlangen; dabei ist verbindlich zu erklären, für welche Zeiten innerhalb von zwei Jahren Elternzeit genommen wird."},{"id":"R-AR-069","f":1,"sub":"Arbeitsrecht","t":"mc","q":"Was verlangt das Nachweisgesetz (NachwG) vom Arbeitgeber?","o":[{"t":"Die wesentlichen Vertragsbedingungen sind schriftlich niederzulegen und auszuhändigen","ok":1},{"t":"Jeder Arbeitsvertrag muss notariell beurkundet werden"},{"t":"Es sind keine schriftlichen Angaben nötig"},{"t":"Nur der Lohn ist mündlich mitzuteilen"}],"e":"Das NachwG verpflichtet den Arbeitgeber, die wesentlichen Arbeitsbedingungen (u. a. Parteien, Beginn, Tätigkeit, Entgelt, Arbeitszeit, Urlaub, Kündigungsfristen) schriftlich festzuhalten und dem Arbeitnehmer auszuhändigen."},{"id":"R-AR-070","f":1,"sub":"Arbeitsrecht","t":"mc","q":"Wer legt die Höhe des gesetzlichen Mindestlohns nach dem Mindestlohngesetz fest?","o":[{"t":"Die Bundesregierung auf Vorschlag der ständigen Mindestlohnkommission","ok":1},{"t":"Jeder Arbeitgeber selbst"},{"t":"Der Betriebsrat"},{"t":"Die IHK"}],"e":"Das MiLoG sieht eine ständige Mindestlohnkommission (Vertreter der Sozialpartner) vor, die die Anpassung des allgemeinen gesetzlichen Mindestlohns vorschlägt; die Bundesregierung setzt ihn per Verordnung in Kraft. (Der konkrete Betrag wird regelmäßig angepasst – Stand 2025: 12,82 € brutto/Stunde.)"},{"id":"R-AR-071","f":1,"sub":"Arbeitsrecht","t":"open","q":"Erläutern Sie den Unterschied zwischen einem einfachen und einem qualifizierten Arbeitszeugnis.","a":"Das einfache Arbeitszeugnis enthält nur Angaben zur Person sowie zu Art und Dauer der Tätigkeit (Tätigkeitsbeschreibung). Das qualifizierte Arbeitszeugnis enthält darüber hinaus eine Bewertung von Leistung und Verhalten (Führung) des Arbeitnehmers. Auf Verlangen des Arbeitnehmers muss der Arbeitgeber ein qualifiziertes Zeugnis ausstellen (§ 109 GewO). Beide müssen wahr, klar und wohlwollend formuliert sein.","e":"Der Anspruch ergibt sich aus § 109 GewO; das qualifizierte Zeugnis wird nur auf Verlangen erteilt."},{"id":"R-AR-072","f":1,"sub":"Arbeitsrecht","t":"open","q":"Nennen Sie die drei Verschuldensstufen des innerbetrieblichen Schadensausgleichs und beschreiben Sie kurz die jeweilige Haftung des Arbeitnehmers.","a":"1) Leichteste/leichte Fahrlässigkeit: Der Arbeitnehmer haftet grundsätzlich nicht; der Arbeitgeber trägt den Schaden. 2) Mittlere (normale) Fahrlässigkeit: Der Schaden wird zwischen Arbeitgeber und Arbeitnehmer nach den Umständen (Quotelung) aufgeteilt. 3) Grobe Fahrlässigkeit oder Vorsatz: Der Arbeitnehmer haftet grundsätzlich in voller Höhe (bei grober Fahrlässigkeit kann in Härtefällen eine Begrenzung erfolgen). Voraussetzung ist jeweils eine betrieblich veranlasste Tätigkeit.","e":"Diese Abstufung ist Richterrecht des BAG und mildert die volle zivilrechtliche Haftung des § 276 BGB im Arbeitsverhältnis ab."},{"id":"R-AR-073","f":1,"sub":"Arbeitsrecht","t":"mc","q":"Was versteht man unter einem faktischen Arbeitsverhältnis?","o":[{"t":"Ein in Vollzug gesetztes, aber fehlerhaftes Arbeitsverhältnis, das für die Vergangenheit wie ein wirksames behandelt wird","ok":1},{"t":"Ein Arbeitsverhältnis ohne jede Arbeitsleistung"},{"t":"Ein rein mündlicher Beratungsvertrag"},{"t":"Ein Praktikum ohne Vergütung"}],"e":"Wird ein nichtiger oder anfechtbarer Arbeitsvertrag bereits vollzogen, kann er nicht rückwirkend abgewickelt werden. Für die geleistete Zeit wird er als faktisches Arbeitsverhältnis wie ein wirksames behandelt (Lohn- und Sozialversicherungsansprüche bleiben)."},{"id":"R-AR-074","f":1,"sub":"Arbeitsrecht","t":"mc","q":"Welche Rechtsfolge hat ein sittenwidriger Arbeitsvertrag (§ 138 BGB), der noch nicht vollzogen wurde?","o":[{"t":"Er ist von Anfang an nichtig","ok":1},{"t":"Er bleibt voll wirksam"},{"t":"Er ist nur anfechtbar"},{"t":"Er wird automatisch angepasst"}],"e":"Ein sittenwidriges Rechtsgeschäft ist nach § 138 BGB nichtig. Erst wenn der Vertrag in Vollzug gesetzt wurde, greifen die Grundsätze des faktischen Arbeitsverhältnisses für die Vergangenheit."},{"id":"R-AR-075","f":1,"sub":"Arbeitsrecht","t":"mc","q":"Welche Angabe gehört zwingend in eine ordnungsgemäße (schriftliche) Kündigung?","o":[{"t":"Die eigenhändige Unterschrift des Kündigenden (Schriftform nach § 623 BGB)","ok":1},{"t":"Eine ausführliche Begründung in jedem Fall"},{"t":"Die Zustimmung des Arbeitnehmers"},{"t":"Ein Stempel der IHK"}],"e":"Zwingend ist die Schriftform mit eigenhändiger Unterschrift (§ 623 BGB). Eine Begründung ist – außer in Sonderfällen wie Berufsausbildung oder auf Verlangen bei fristloser Kündigung – gesetzlich nicht generell erforderlich."},{"id":"R-SV-001","f":1,"sub":"Sozialversicherung","t":"mc","q":"Welche fünf Zweige bilden die gesetzliche Sozialversicherung?","o":[{"t":"Kranken-, Renten-, Arbeitslosen-, Pflege- und Unfallversicherung","ok":1},{"t":"Kranken-, Haftpflicht- und Lebensversicherung"},{"t":"Nur Renten- und Krankenversicherung"},{"t":"Kfz-, Gebäude- und Rechtsschutzversicherung"}],"e":"Die fünf Säulen der Sozialversicherung sind Kranken-, Renten-, Arbeitslosen-, Pflege- und Unfallversicherung. Sie beruhen auf gesetzlicher Pflichtmitgliedschaft."},{"id":"R-SV-002","f":1,"sub":"Sozialversicherung","t":"mc","q":"Welche der fünf Sozialversicherungen wird allein vom Arbeitgeber finanziert?","o":[{"t":"Die Unfallversicherung","ok":1},{"t":"Die Krankenversicherung"},{"t":"Die Rentenversicherung"},{"t":"Die Arbeitslosenversicherung"}],"e":"Die gesetzliche Unfallversicherung (SGB VII) trägt allein der Arbeitgeber. Die übrigen vier Zweige finanzieren Arbeitgeber und Arbeitnehmer grundsätzlich paritätisch."},{"id":"R-SV-003","f":1,"sub":"Sozialversicherung","t":"mc","q":"Wie werden die Beiträge zu Kranken-, Renten-, Arbeitslosen- und Pflegeversicherung grundsätzlich getragen?","o":[{"t":"Paritätisch von Arbeitgeber und Arbeitnehmer (je zur Hälfte)","ok":1},{"t":"Allein vom Arbeitnehmer"},{"t":"Allein vom Arbeitgeber"},{"t":"Vollständig vom Staat"}],"e":"Diese vier Zweige werden grundsätzlich paritätisch finanziert. Ausnahmen bestehen z. B. beim kassenindividuellen Zusatzbeitrag und beim Pflege-Beitragszuschlag für Kinderlose."},{"id":"R-SV-004","f":1,"sub":"Sozialversicherung","t":"mc","q":"Wer ist Träger der gesetzlichen Unfallversicherung?","o":[{"t":"Die Berufsgenossenschaften (bzw. Unfallkassen)","ok":1},{"t":"Die gesetzlichen Krankenkassen"},{"t":"Die Deutsche Rentenversicherung"},{"t":"Die Bundesagentur für Arbeit"}],"e":"Träger der Unfallversicherung sind die gewerblichen und landwirtschaftlichen Berufsgenossenschaften sowie die Unfallkassen der öffentlichen Hand."},{"id":"R-SV-005","f":1,"sub":"Sozialversicherung","t":"mc","q":"Wer ist Träger der Arbeitslosenversicherung?","o":[{"t":"Die Bundesagentur für Arbeit","ok":1},{"t":"Die Krankenkassen"},{"t":"Die Berufsgenossenschaften"},{"t":"Die Deutsche Rentenversicherung"}],"e":"Die Bundesagentur für Arbeit trägt die Arbeitslosenversicherung und erbringt u. a. Arbeitslosengeld, Vermittlung und Förderleistungen."},{"id":"R-SV-006","f":1,"sub":"Sozialversicherung","t":"mc","q":"Nach welchem Grundprinzip finanziert sich die gesetzliche Rentenversicherung?","o":[{"t":"Umlageverfahren (Generationenvertrag)","ok":1},{"t":"Kapitaldeckungsverfahren"},{"t":"Reine Steuerfinanzierung"},{"t":"Losverfahren"}],"e":"Im Umlageverfahren finanzieren die laufenden Beiträge der Erwerbstätigen unmittelbar die aktuellen Renten. Es besteht kein individuell angesparter Kapitalstock."},{"id":"R-SV-007","f":1,"sub":"Sozialversicherung","t":"mc","q":"Welche Stelle zieht die Gesamtsozialversicherungsbeiträge ein (Einzugsstelle)?","o":[{"t":"Die gesetzliche Krankenkasse des Arbeitnehmers","ok":1},{"t":"Das Finanzamt"},{"t":"Die Deutsche Rentenversicherung"},{"t":"Die Berufsgenossenschaft"}],"e":"Die Krankenkasse ist Einzugsstelle: Der Arbeitgeber führt den Gesamtsozialversicherungsbeitrag (KV, RV, ALV, PV) an sie ab, sie verteilt ihn an die übrigen Träger."},{"id":"R-SV-008","f":1,"sub":"Sozialversicherung","t":"mc","q":"Welches Prinzip beschreibt, dass Leistungsstarke für Leistungsschwache mit einstehen?","o":[{"t":"Das Solidaritätsprinzip","ok":1},{"t":"Das Äquivalenzprinzip"},{"t":"Das Kausalprinzip"},{"t":"Das Verursacherprinzip"}],"e":"Das Solidaritätsprinzip prägt die Sozialversicherung: Die Beiträge richten sich nach dem Einkommen, die Leistungen nach dem Bedarf – anders als beim Äquivalenzprinzip privater Versicherungen (Beitrag nach Risiko)."},{"id":"R-SV-009","f":1,"sub":"Sozialversicherung","t":"mc","q":"Was besagt das Sachleistungsprinzip in der gesetzlichen Krankenversicherung?","o":[{"t":"Der Versicherte erhält Leistungen (z. B. Behandlung) direkt, ohne in Vorleistung zu treten","ok":1},{"t":"Der Versicherte zahlt zuerst und bekommt Geld erstattet"},{"t":"Es werden nur Geldleistungen gewährt"},{"t":"Leistungen gibt es nur gegen Zuzahlung des vollen Betrags"}],"e":"Nach dem Sachleistungsprinzip rechnen Leistungserbringer (Ärzte, Krankenhäuser) direkt mit der Krankenkasse ab; der Versicherte muss die Behandlung nicht vorfinanzieren (Gegenmodell: Kostenerstattung in der PKV)."},{"id":"R-SV-010","f":1,"sub":"Sozialversicherung","t":"mc","q":"Wie hoch ist der allgemeine Beitragssatz zur gesetzlichen Krankenversicherung (ohne Zusatzbeitrag)? (Stand 2025)","o":[{"t":"14,6 %","ok":1},{"t":"18,6 %"},{"t":"7,3 %"},{"t":"2,6 %"}],"e":"Der allgemeine KV-Beitragssatz beträgt 14,6 % (paritätisch je 7,3 %). Hinzu kommt ein kassenindividueller Zusatzbeitrag (2025 durchschnittlich rund 2,5 %), der ebenfalls paritätisch getragen wird."},{"id":"R-SV-011","f":1,"sub":"Sozialversicherung","t":"mc","q":"Wie hoch ist der Beitragssatz zur allgemeinen Rentenversicherung? (Stand 2025)","o":[{"t":"18,6 %","ok":1},{"t":"14,6 %"},{"t":"9,3 %"},{"t":"3,6 %"}],"e":"Der RV-Beitragssatz beträgt 18,6 %; Arbeitgeber und Arbeitnehmer tragen je 9,3 %."},{"id":"R-SV-012","f":1,"sub":"Sozialversicherung","t":"mc","q":"Wie hoch ist der Beitragssatz zur Arbeitslosenversicherung? (Stand 2025)","o":[{"t":"2,6 %","ok":1},{"t":"3,0 %"},{"t":"1,5 %"},{"t":"5,2 %"}],"e":"Der ALV-Beitragssatz beträgt 2,6 % (paritätisch je 1,3 %)."},{"id":"R-SV-013","f":1,"sub":"Sozialversicherung","t":"mc","q":"Wie hoch ist der Beitragssatz zur sozialen Pflegeversicherung für Versicherte mit Kindern? (Stand 2025)","o":[{"t":"3,6 %","ok":1},{"t":"2,6 %"},{"t":"1,8 %"},{"t":"4,2 %"}],"e":"Der PV-Beitragssatz beträgt 3,6 %. Kinderlose zahlen einen Zuschlag von 0,6 % (also 4,2 %); ab dem 2. bis 5. Kind wird der Beitrag während der Erziehungsphase um je 0,25 Punkte gesenkt."},{"id":"R-SV-014","f":1,"sub":"Sozialversicherung","t":"mc","q":"Welchen Zuschlag zahlen kinderlose Mitglieder in der Pflegeversicherung zusätzlich? (Stand 2025)","o":[{"t":"0,6 Prozentpunkte","ok":1},{"t":"1,0 Prozentpunkte"},{"t":"0,25 Prozentpunkte"},{"t":"Keinen Zuschlag"}],"e":"Kinderlose Versicherte ab 23 Jahren zahlen einen Beitragszuschlag von 0,6 Prozentpunkten, sodass ihr Pflegeversicherungsbeitrag 4,2 % beträgt (Stand 2025)."},{"id":"R-SV-015","f":1,"sub":"Sozialversicherung","t":"mc","q":"Was bezeichnet die Beitragsbemessungsgrenze?","o":[{"t":"Das Höchsteinkommen, bis zu dem Beiträge erhoben werden; darüber hinaus bleibt das Einkommen beitragsfrei","ok":1},{"t":"Den Mindestlohn"},{"t":"Die Grenze für die Steuerpflicht"},{"t":"Die Höhe der Rente"}],"e":"Die Beitragsbemessungsgrenze legt fest, bis zu welchem Bruttoentgelt Beiträge berechnet werden. Einkommen oberhalb dieser Grenze ist beitragsfrei."},{"id":"R-SV-016","f":1,"sub":"Sozialversicherung","t":"mc","q":"Was versteht man unter der Versicherungspflichtgrenze (Jahresarbeitsentgeltgrenze) in der Krankenversicherung?","o":[{"t":"Das Einkommen, ab dem sich ein Arbeitnehmer privat krankenversichern darf","ok":1},{"t":"Das Mindesteinkommen für eine Beschäftigung"},{"t":"Die Grenze für die Rentenhöhe"},{"t":"Die Obergrenze des Krankengeldes"}],"e":"Übersteigt das regelmäßige Jahresarbeitsentgelt die Versicherungspflichtgrenze (JAEG), wird der Arbeitnehmer in der GKV versicherungsfrei und kann in die private Krankenversicherung wechseln."},{"id":"R-SV-017","f":1,"sub":"Sozialversicherung","t":"mc","q":"Welche Leistung erbringt die gesetzliche Unfallversicherung?","o":[{"t":"Entschädigung und Rehabilitation bei Arbeitsunfällen und Berufskrankheiten","ok":1},{"t":"Zahlung von Arbeitslosengeld"},{"t":"Auszahlung der Altersrente"},{"t":"Erstattung privater Zahnbehandlungen"}],"e":"Die Unfallversicherung leistet bei Arbeits- und Wegeunfällen sowie Berufskrankheiten: Heilbehandlung, berufliche Wiedereingliederung und ggf. Verletztenrente. Sie verfolgt zugleich die Prävention (Unfallverhütungsvorschriften)."},{"id":"R-SV-018","f":1,"sub":"Sozialversicherung","t":"mc","q":"Wer trägt die Beiträge bei einer geringfügig entlohnten Beschäftigung (Minijob) überwiegend?","o":[{"t":"Der Arbeitgeber zahlt Pauschalbeiträge; der Arbeitnehmer ist weitgehend beitragsfrei (Rentenversicherung mit Aufstockungsoption)","ok":1},{"t":"Ausschließlich der Arbeitnehmer"},{"t":"Niemand, es fallen keine Abgaben an"},{"t":"Der Staat"}],"e":"Beim Minijob zahlt der Arbeitgeber Pauschalbeiträge zur Kranken- und Rentenversicherung sowie eine Pauschsteuer. In der Rentenversicherung besteht Versicherungspflicht mit Befreiungsmöglichkeit; die übrigen Zweige sind für den Minijobber beitragsfrei."},{"id":"R-SV-019","f":1,"sub":"Sozialversicherung","t":"mc","q":"Woran ist die Minijob-Entgeltgrenze seit 2022 gekoppelt?","o":[{"t":"An den gesetzlichen Mindestlohn (dynamische Grenze)","ok":1},{"t":"An den Verbraucherpreisindex"},{"t":"An den durchschnittlichen Tariflohn"},{"t":"Sie ist gesetzlich unveränderlich festgeschrieben"}],"e":"Die Geringfügigkeitsgrenze ist seit Oktober 2022 dynamisch an den Mindestlohn gekoppelt und steigt mit ihm (Stand 2025: 556 € monatlich)."},{"id":"R-SV-020","f":1,"sub":"Sozialversicherung","t":"mc","q":"Was besagt das Selbstverwaltungsprinzip der Sozialversicherung?","o":[{"t":"Die Träger verwalten sich eigenständig durch Vertreter der Versicherten und Arbeitgeber","ok":1},{"t":"Der Staat verwaltet alle Kassen unmittelbar"},{"t":"Jeder Versicherte verwaltet seine Beiträge selbst"},{"t":"Die Arbeitgeber allein bestimmen die Leistungen"}],"e":"Die Sozialversicherungsträger sind Körperschaften des öffentlichen Rechts mit Selbstverwaltung: Versicherten- und Arbeitgebervertreter (Sozialwahlen) entscheiden in den Selbstverwaltungsorganen über wesentliche Angelegenheiten."},{"id":"R-SV-021","f":1,"sub":"Sozialversicherung","t":"mc","q":"Welche Aufgabe hat die Berufsgenossenschaft neben der Entschädigung?","o":[{"t":"Prävention – Erlass von Unfallverhütungsvorschriften und Beratung der Betriebe","ok":1},{"t":"Festsetzung der Lohnsteuer"},{"t":"Auszahlung der Altersrente"},{"t":"Vermittlung von Arbeitsplätzen"}],"e":"Die Berufsgenossenschaften wirken mit „allen geeigneten Mitteln“ auf die Verhütung von Arbeitsunfällen und Berufskrankheiten hin: Vorschriften (DGUV), Überwachung, Beratung und Ausbildung."},{"id":"R-SV-022","f":1,"sub":"Sozialversicherung","t":"mc","q":"Was ist ein Wegeunfall im Sinne der Unfallversicherung?","o":[{"t":"Ein Unfall auf dem direkten Weg zwischen Wohnung und Arbeitsstätte","ok":1},{"t":"Ein Unfall im Urlaub"},{"t":"Jeder Unfall in der Freizeit"},{"t":"Ein Unfall beim privaten Einkauf"}],"e":"Zum Versicherungsschutz gehören auch Wegeunfälle auf dem unmittelbaren Weg von und zur Arbeit. Umwege aus eigenwirtschaftlichen Gründen sind grundsätzlich nicht versichert."},{"id":"R-SV-023","f":1,"sub":"Sozialversicherung","t":"open","q":"Ein Arbeitnehmer verdient 3.000 € brutto im Monat. Der Rentenversicherungsbeitrag beträgt 18,6 % und wird paritätisch getragen. Berechnen Sie den Arbeitnehmeranteil zur Rentenversicherung.","a":"Der Gesamtbeitrag beträgt 18,6 % von 3.000 € = 558 €. Da paritätisch getragen, entfällt auf den Arbeitnehmer die Hälfte: 558 € ÷ 2 = 279 €. Alternativ direkt: 3.000 € × 9,3 % = 279 €. Der Arbeitnehmeranteil zur Rentenversicherung beträgt somit 279 €.","e":"Paritätische Finanzierung bedeutet, dass Arbeitgeber und Arbeitnehmer je die Hälfte des Beitragssatzes tragen (hier je 9,3 %)."},{"id":"R-SV-024","f":1,"sub":"Sozialversicherung","t":"mc","q":"Welche Versicherung springt ein, wenn die Entgeltfortzahlung des Arbeitgebers nach 6 Wochen endet?","o":[{"t":"Die gesetzliche Krankenversicherung mit Krankengeld","ok":1},{"t":"Die Unfallversicherung"},{"t":"Die Arbeitslosenversicherung"},{"t":"Die Pflegeversicherung"}],"e":"Nach Ablauf der sechswöchigen Entgeltfortzahlung zahlt die Krankenkasse bei fortbestehender Arbeitsunfähigkeit Krankengeld (grundsätzlich bis zu 78 Wochen wegen derselben Krankheit innerhalb von drei Jahren)."},{"id":"R-SV-025","f":1,"sub":"Sozialversicherung","t":"mc","q":"Worin unterscheidet sich das Äquivalenzprinzip der Privatversicherung vom Solidaritätsprinzip?","o":[{"t":"Beim Äquivalenzprinzip richtet sich der Beitrag nach dem individuellen Risiko, beim Solidaritätsprinzip nach dem Einkommen","ok":1},{"t":"Beide berechnen den Beitrag identisch"},{"t":"Das Äquivalenzprinzip kennt keine Beiträge"},{"t":"Das Solidaritätsprinzip gilt nur für Selbstständige"}],"e":"Private Versicherungen kalkulieren risikoäquivalent (höheres Risiko = höherer Beitrag). Die Sozialversicherung erhebt einkommensabhängige Beiträge und gewährt bedarfsorientierte Leistungen (sozialer Ausgleich)."},{"id":"R-BR-039","f":1,"sub":"Betriebsverfassung","t":"mc","q":"Wer vertritt den Betriebsrat im Rahmen der gefassten Beschlüsse nach außen?","o":[{"t":"Der Betriebsratsvorsitzende","ok":1},{"t":"Der dienstälteste Arbeitnehmer"},{"t":"Der Arbeitgeber"},{"t":"Die Gewerkschaft"}],"e":"§ 26 BetrVG: Der Vorsitzende vertritt den Betriebsrat im Rahmen der gefassten Beschlüsse. Er ist Erklärungsvertreter, nicht Entscheidungsträger – entschieden wird im Gremium."},{"id":"R-BR-040","f":1,"sub":"Betriebsverfassung","t":"mc","q":"Ab welcher Größe muss der Betriebsrat einen Betriebsausschuss bilden?","o":[{"t":"Ab 9 Betriebsratsmitgliedern","ok":1},{"t":"Ab 3 Mitgliedern"},{"t":"Ab 5 Mitgliedern"},{"t":"Erst ab 15 Mitgliedern"}],"e":"§ 27 BetrVG: Betriebsräte mit neun oder mehr Mitgliedern bilden einen Betriebsausschuss, der die laufenden Geschäfte führt."},{"id":"R-BR-041","f":1,"sub":"Betriebsverfassung","t":"mc","q":"Wie werden Beschlüsse des Betriebsrats grundsätzlich gefasst?","o":[{"t":"Mit der Mehrheit der Stimmen der anwesenden Mitglieder","ok":1},{"t":"Nur einstimmig"},{"t":"Durch Entscheidung des Vorsitzenden allein"},{"t":"Mit Zustimmung des Arbeitgebers"}],"e":"§ 33 BetrVG: Beschlüsse werden mit einfacher Mehrheit der anwesenden Mitglieder gefasst; der Betriebsrat ist beschlussfähig, wenn mindestens die Hälfte der Mitglieder teilnimmt."},{"id":"R-BR-042","f":1,"sub":"Betriebsverfassung","t":"mc","q":"Wer trägt die durch die Tätigkeit des Betriebsrats entstehenden Kosten (§ 40 BetrVG)?","o":[{"t":"Der Arbeitgeber","ok":1},{"t":"Der Betriebsrat aus eigenen Mitteln"},{"t":"Die Gewerkschaft"},{"t":"Die Belegschaft anteilig"}],"e":"§ 40 BetrVG: Die Kosten der Betriebsratstätigkeit trägt der Arbeitgeber. Er stellt auch Räume, sachliche Mittel und Informations-/Kommunikationstechnik zur Verfügung."},{"id":"R-BR-043","f":1,"sub":"Betriebsverfassung","t":"mc","q":"Worauf haben Betriebsratsmitglieder nach § 37 Abs. 6 BetrVG Anspruch?","o":[{"t":"Auf Freistellung für erforderliche Schulungen (unter Fortzahlung des Entgelts)","ok":1},{"t":"Auf eine zusätzliche Amtsvergütung"},{"t":"Auf eine garantierte Beförderung"},{"t":"Auf verkürzte Arbeitszeit generell"}],"e":"§ 37 Abs. 6 BetrVG: Für Schulungen, die erforderliche Kenntnisse für die Betriebsratsarbeit vermitteln, sind die Mitglieder unter Fortzahlung des Arbeitsentgelts freizustellen; die Kosten trägt der Arbeitgeber."},{"id":"R-BR-044","f":1,"sub":"Betriebsverfassung","t":"mc","q":"Welche allgemeine Aufgabe hat der Betriebsrat nach § 80 BetrVG?","o":[{"t":"Zu überwachen, dass die zugunsten der Arbeitnehmer geltenden Gesetze, Tarifverträge und Betriebsvereinbarungen eingehalten werden","ok":1},{"t":"Die Geschäftsführung des Unternehmens zu übernehmen"},{"t":"Die Bilanz zu erstellen"},{"t":"Die Löhne selbst festzusetzen"}],"e":"§ 80 Abs. 1 BetrVG zählt allgemeine Aufgaben auf: u. a. Überwachung der einschlägigen Vorschriften, Förderung der Gleichstellung, Eingliederung Schwerbehinderter, Entgegennahme von Anregungen der Belegschaft."},{"id":"R-BR-045","f":1,"sub":"Betriebsverfassung","t":"mc","q":"Welches Beteiligungsrecht hat der Betriebsrat bei der Personalplanung (§ 92 BetrVG)?","o":[{"t":"Rechtzeitige und umfassende Unterrichtung sowie Beratung","ok":1},{"t":"Ein Vetorecht gegen jede Einstellung"},{"t":"Das Recht, Personal selbst einzustellen"},{"t":"Kein Beteiligungsrecht"}],"e":"§ 92 BetrVG: Der Arbeitgeber hat den Betriebsrat über die Personalplanung rechtzeitig und umfassend zu unterrichten und mit ihm über Art und Umfang der Maßnahmen zu beraten."},{"id":"R-BR-046","f":1,"sub":"Betriebsverfassung","t":"mc","q":"Welche Mitbestimmung besteht bei der Gestaltung von Arbeitsplätzen, die den Menschen besonders belasten (§ 91 BetrVG)?","o":[{"t":"Der Betriebsrat kann angemessene Maßnahmen zur Abwendung/Milderung der Belastung verlangen, wenn gesicherte arbeitswissenschaftliche Erkenntnisse offensichtlich missachtet werden","ok":1},{"t":"Er darf den Betrieb schließen"},{"t":"Er hat keinerlei Mitspracherecht"},{"t":"Er entscheidet allein über die Maschinenauswahl"}],"e":"§ 91 BetrVG gibt dem Betriebsrat ein korrigierendes Mitbestimmungsrecht, wenn Arbeitnehmer durch offensichtlich gegen arbeitswissenschaftliche Erkenntnisse verstoßende Gestaltung besonders belastet werden."},{"id":"R-BR-047","f":1,"sub":"Betriebsverfassung","t":"mc","q":"Welche Mitbestimmung hat der Betriebsrat bei der betrieblichen Berufsbildung (§ 98 BetrVG)?","o":[{"t":"Mitbestimmung bei der Durchführung von Maßnahmen der betrieblichen Berufsbildung","ok":1},{"t":"Er bestimmt die Ausbildungsvergütung im Tarifvertrag"},{"t":"Er stellt die Prüfungszeugnisse aus"},{"t":"Er hat kein Mitspracherecht"}],"e":"§ 98 BetrVG: Bei der Durchführung betrieblicher Bildungsmaßnahmen und der Bestellung von Ausbildern hat der Betriebsrat mitzubestimmen; nach § 96 wirkt er allgemein an der Förderung der Berufsbildung mit."},{"id":"R-BR-048","f":1,"sub":"Betriebsverfassung","t":"mc","q":"Ab welcher Betriebsgröße bestehen Beteiligungsrechte bei einer Betriebsänderung (§ 111 BetrVG)?","o":[{"t":"In Unternehmen mit in der Regel mehr als 20 wahlberechtigten Arbeitnehmern","ok":1},{"t":"Ab 5 Arbeitnehmern"},{"t":"Ab 100 Arbeitnehmern"},{"t":"In jedem Betrieb"}],"e":"§ 111 BetrVG: In Unternehmen mit i. d. R. mehr als 20 wahlberechtigten Arbeitnehmern muss der Unternehmer den Betriebsrat über geplante Betriebsänderungen unterrichten und mit ihm beraten."},{"id":"R-BR-049","f":1,"sub":"Betriebsverfassung","t":"mc","q":"Was regelt ein Interessenausgleich bei einer Betriebsänderung?","o":[{"t":"Ob, wann und wie die geplante Betriebsänderung durchgeführt wird","ok":1},{"t":"Die Höhe der Abfindungen"},{"t":"Die Gewinnverteilung"},{"t":"Die Urlaubsplanung"}],"e":"Der Interessenausgleich betrifft das „Ob, Wann und Wie“ der Betriebsänderung. Er ist nicht erzwingbar; der Unternehmer muss aber ernsthaft verhandeln (sonst Nachteilsausgleich)."},{"id":"R-BR-050","f":1,"sub":"Betriebsverfassung","t":"mc","q":"Welchen Zweck hat ein Sozialplan (§ 112 BetrVG)?","o":[{"t":"Ausgleich oder Milderung der wirtschaftlichen Nachteile für die betroffenen Arbeitnehmer","ok":1},{"t":"Regelung der Produktionsmenge"},{"t":"Festlegung der Arbeitszeit"},{"t":"Bestimmung der Lieferanten"}],"e":"Der Sozialplan gleicht die den Arbeitnehmern durch die Betriebsänderung entstehenden wirtschaftlichen Nachteile aus (z. B. Abfindungen). Anders als der Interessenausgleich ist er über die Einigungsstelle erzwingbar."},{"id":"R-BR-051","f":1,"sub":"Betriebsverfassung","t":"mc","q":"Welche Aussage zum Verhältnis von Interessenausgleich und Sozialplan ist richtig?","o":[{"t":"Der Interessenausgleich ist nicht erzwingbar, der Sozialplan kann über die Einigungsstelle erzwungen werden","ok":1},{"t":"Beide sind stets freiwillig"},{"t":"Beide sind immer erzwingbar"},{"t":"Der Interessenausgleich ist erzwingbar, der Sozialplan nicht"}],"e":"Der Interessenausgleich (Ob/Wann/Wie) ist nicht erzwingbar; kommt kein Sozialplan zustande, entscheidet die Einigungsstelle verbindlich – der Sozialplan ist damit erzwingbar."},{"id":"R-BR-052","f":1,"sub":"Betriebsverfassung","t":"mc","q":"Was ist ein Gesamtbetriebsrat (§ 47 BetrVG)?","o":[{"t":"Ein für mehrere Betriebe eines Unternehmens gebildetes übergeordnetes Gremium","ok":1},{"t":"Der Betriebsrat des größten Betriebs"},{"t":"Ein Zusammenschluss mehrerer Unternehmen"},{"t":"Die Gewerkschaftsvertretung"}],"e":"§ 47 BetrVG: Bestehen in einem Unternehmen mehrere Betriebsräte, ist ein Gesamtbetriebsrat zu errichten; er ist für Angelegenheiten zuständig, die das Gesamtunternehmen oder mehrere Betriebe betreffen und nicht durch die einzelnen Betriebsräte geregelt werden können."},{"id":"R-BR-053","f":1,"sub":"Betriebsverfassung","t":"mc","q":"Was kann in einem Konzern nach § 54 BetrVG errichtet werden?","o":[{"t":"Ein Konzernbetriebsrat","ok":1},{"t":"Ein Konzernvorstand der Arbeitnehmer"},{"t":"Eine Konzerngewerkschaft"},{"t":"Ein Konzernaufsichtsrat der Belegschaft"}],"e":"§ 54 BetrVG: Für einen Konzern kann durch Beschluss der Gesamtbetriebsräte ein Konzernbetriebsrat errichtet werden, zuständig für konzernweite Angelegenheiten."},{"id":"R-BR-054","f":1,"sub":"Betriebsverfassung","t":"mc","q":"Wer wird durch den Sprecherausschuss vertreten (SprAuG)?","o":[{"t":"Die leitenden Angestellten","ok":1},{"t":"Die Auszubildenden"},{"t":"Die schwerbehinderten Menschen"},{"t":"Alle Arbeiter"}],"e":"Leitende Angestellte werden nicht vom Betriebsrat, sondern nach dem Sprecherausschussgesetz durch den Sprecherausschuss vertreten."},{"id":"R-BR-055","f":1,"sub":"Betriebsverfassung","t":"mc","q":"Ab wie vielen schwerbehinderten Beschäftigten wird eine Schwerbehindertenvertretung gewählt (§ 177 SGB IX)?","o":[{"t":"Ab 5 nicht nur vorübergehend beschäftigten schwerbehinderten Menschen","ok":1},{"t":"Ab 1 schwerbehinderten Menschen"},{"t":"Ab 20 schwerbehinderten Menschen"},{"t":"Ab 50 schwerbehinderten Menschen"}],"e":"§ 177 SGB IX: In Betrieben mit wenigstens fünf nicht nur vorübergehend beschäftigten schwerbehinderten Menschen wird eine Schwerbehindertenvertretung gewählt."},{"id":"R-BR-056","f":1,"sub":"Betriebsverfassung","t":"open","q":"Ein Unternehmen plant, einen von drei Standorten zu schließen; betroffen sind 40 Arbeitnehmer. Welche zwei Instrumente der Betriebsverfassung kommen zum Tragen, und worin unterscheiden sie sich?","a":"Es handelt sich um eine Betriebsänderung nach § 111 BetrVG (das Unternehmen hat mehr als 20 Arbeitnehmer). Zwei Instrumente greifen: (1) der Interessenausgleich – er regelt das Ob, Wann und Wie der Betriebsänderung und ist nicht erzwingbar; (2) der Sozialplan – er gleicht die wirtschaftlichen Nachteile der betroffenen Arbeitnehmer aus (z. B. Abfindungen) und kann über die Einigungsstelle erzwungen werden. Der Unternehmer muss den Betriebsrat rechtzeitig unterrichten und mit ihm beraten.","e":"Kernunterschied: Interessenausgleich (nicht erzwingbar) betrifft die Maßnahme selbst, der Sozialplan (erzwingbar) deren soziale Folgen."},{"id":"R-BR-057","f":1,"sub":"Betriebsverfassung","t":"mc","q":"Was regelt das Drittelbeteiligungsgesetz (DrittelbG)?","o":[{"t":"In Kapitalgesellschaften mit mehr als 500 Arbeitnehmern besteht der Aufsichtsrat zu einem Drittel aus Arbeitnehmervertretern","ok":1},{"t":"Ein Drittel des Gewinns geht an die Belegschaft"},{"t":"Der Betriebsrat erhält ein Drittel der Stimmen"},{"t":"Ein Drittel der Belegschaft muss gewerkschaftlich organisiert sein"}],"e":"Das DrittelbG betrifft die Unternehmensmitbestimmung: In Kapitalgesellschaften mit i. d. R. mehr als 500 bis 2000 Arbeitnehmern setzt sich der Aufsichtsrat zu einem Drittel aus Arbeitnehmervertretern zusammen."},{"id":"R-BR-058","f":1,"sub":"Betriebsverfassung","t":"mc","q":"Was gilt nach dem Mitbestimmungsgesetz (MitbestG 1976) für große Kapitalgesellschaften?","o":[{"t":"Ab in der Regel mehr als 2000 Arbeitnehmern ist der Aufsichtsrat paritätisch besetzt (mit Stichentscheid des Vorsitzenden)","ok":1},{"t":"Der Aufsichtsrat besteht nur aus Arbeitnehmern"},{"t":"Es gibt keinen Aufsichtsrat"},{"t":"Die Anteilseigner haben keine Sitze"}],"e":"Nach dem MitbestG 1976 (i. d. R. mehr als 2000 Arbeitnehmer) ist der Aufsichtsrat je zur Hälfte mit Anteilseigner- und Arbeitnehmervertretern besetzt; bei Stimmengleichheit gibt die zweite Stimme des (von der Anteilseignerseite gestellten) Vorsitzenden den Ausschlag."},{"id":"R-BR-059","f":1,"sub":"Betriebsverfassung","t":"mc","q":"Was versteht man unter der Nachwirkung eines Tarifvertrags (§ 4 Abs. 5 TVG)?","o":[{"t":"Nach Ablauf gelten die Rechtsnormen weiter, bis sie durch eine andere Abmachung ersetzt werden","ok":1},{"t":"Der Tarifvertrag verliert sofort jede Wirkung"},{"t":"Er gilt automatisch fünf Jahre länger"},{"t":"Er wird auf andere Branchen ausgedehnt"}],"e":"§ 4 Abs. 5 TVG: Nach Ablauf eines Tarifvertrags wirken seine Rechtsnormen weiter, bis sie durch eine andere Abmachung (neuer Tarifvertrag, Betriebsvereinbarung, Einzelvertrag) ersetzt werden – wichtig für die Kontinuität der Arbeitsbedingungen."},{"id":"R-BR-060","f":1,"sub":"Betriebsverfassung","t":"mc","q":"Was bestimmt das Tarifeinheitsgesetz (2015) bei kollidierenden Tarifverträgen in einem Betrieb?","o":[{"t":"Es gilt grundsätzlich der Tarifvertrag der Gewerkschaft mit den meisten Mitgliedern im Betrieb (Mehrheitsprinzip)","ok":1},{"t":"Alle Tarifverträge gelten gleichzeitig nebeneinander"},{"t":"Der älteste Tarifvertrag setzt sich durch"},{"t":"Der Arbeitgeber wählt aus"}],"e":"Das Tarifeinheitsgesetz löst Tarifkollisionen im Betrieb nach dem Mehrheitsprinzip: Anwendbar ist der Tarifvertrag der Gewerkschaft, die im Betrieb die meisten Mitglieder hat."},{"id":"R-BR-061","f":1,"sub":"Betriebsverfassung","t":"mc","q":"Was bedeutet Tarifbindung?","o":[{"t":"Die unmittelbare Geltung eines Tarifvertrags für Mitglieder der tarifschließenden Verbände","ok":1},{"t":"Die Pflicht jedes Betriebs, einem Verband beizutreten"},{"t":"Das Verbot, Tarifverträge zu schließen"},{"t":"Die Bindung an den Mindestlohn"}],"e":"Tarifgebunden sind die Mitglieder der Tarifvertragsparteien (Gewerkschaftsmitglieder und Mitglieder des Arbeitgeberverbands bzw. der tarifschließende Arbeitgeber). Für sie gilt der Tarif unmittelbar und zwingend."},{"id":"R-BR-062","f":1,"sub":"Betriebsverfassung","t":"mc","q":"Was ist ein Firmen-(Haus-)tarifvertrag?","o":[{"t":"Ein Tarifvertrag zwischen einer Gewerkschaft und einem einzelnen Arbeitgeber","ok":1},{"t":"Ein Vertrag zwischen zwei Unternehmen"},{"t":"Eine Betriebsvereinbarung"},{"t":"Ein Arbeitsvertrag"}],"e":"Beim Firmen-/Haustarifvertrag ist auf Arbeitgeberseite ein einzelnes Unternehmen Vertragspartei (nicht ein Arbeitgeberverband). Gegenmodell ist der Verbands-(Flächen-)tarifvertrag."},{"id":"R-BR-063","f":1,"sub":"Betriebsverfassung","t":"mc","q":"Welche Funktion erfüllt ein Manteltarifvertrag?","o":[{"t":"Er regelt grundlegende, längerfristig geltende Arbeitsbedingungen wie Arbeitszeit, Urlaub und Kündigungsfristen","ok":1},{"t":"Er legt ausschließlich die Löhne fest"},{"t":"Er regelt nur Einmalzahlungen"},{"t":"Er ersetzt das Arbeitsschutzgesetz"}],"e":"Der Manteltarifvertrag (Rahmentarifvertrag) enthält die grundlegenden, meist über Jahre geltenden Bedingungen; der Entgelttarifvertrag wird häufiger neu verhandelt."},{"id":"R-BR-064","f":1,"sub":"Betriebsverfassung","t":"mc","q":"Was ist ein Warnstreik?","o":[{"t":"Eine kurze, befristete Arbeitsniederlegung während laufender Tarifverhandlungen, um dem Verhandlungsziel Nachdruck zu verleihen","ok":1},{"t":"Ein Streik ohne Beteiligung der Gewerkschaft"},{"t":"Eine dauerhafte Betriebsschließung"},{"t":"Eine Aussperrung durch den Arbeitgeber"}],"e":"Warnstreiks sind kurze, gewerkschaftlich getragene Arbeitsniederlegungen während der Tarifverhandlungen. Sie sind nach der Rechtsprechung grundsätzlich zulässig, sofern die Friedenspflicht abgelaufen ist."},{"id":"R-BR-065","f":1,"sub":"Betriebsverfassung","t":"mc","q":"Was versteht man unter einer Urabstimmung?","o":[{"t":"Eine Abstimmung der Gewerkschaftsmitglieder über die Aufnahme (oder Beendigung) eines Erzwingungsstreiks","ok":1},{"t":"Die Wahl des Betriebsrats"},{"t":"Die Abstimmung über einen Sozialplan"},{"t":"Die Wahl des Aufsichtsrats"}],"e":"Vor einem regulären (Erzwingungs-)Streik führen Gewerkschaften satzungsgemäß eine Urabstimmung durch; üblich ist ein hohes Zustimmungsquorum. Zur Beendigung erfolgt erneut eine Urabstimmung."},{"id":"R-BR-066","f":1,"sub":"Betriebsverfassung","t":"mc","q":"Was ist das Ziel einer Schlichtung im Arbeitskampf?","o":[{"t":"Eine Einigung der Tarifparteien mithilfe eines neutralen Schlichters herbeizuführen und so einen Arbeitskampf zu vermeiden","ok":1},{"t":"Den Streik zu verlängern"},{"t":"Die Aussperrung zu organisieren"},{"t":"Den Betriebsrat abzuwählen"}],"e":"Bei der Schlichtung versucht eine unparteiische Stelle, zwischen den festgefahrenen Tarifparteien zu vermitteln und einen Einigungsvorschlag zu erarbeiten – Arbeitskampf als letztes Mittel soll vermieden werden."},{"id":"R-BR-067","f":1,"sub":"Betriebsverfassung","t":"mc","q":"Was besagt das Maßregelungsverbot (§ 612a BGB) im Zusammenhang mit zulässiger Rechtsausübung?","o":[{"t":"Der Arbeitgeber darf einen Arbeitnehmer nicht benachteiligen, weil dieser in zulässiger Weise seine Rechte ausübt","ok":1},{"t":"Der Arbeitnehmer darf nie abgemahnt werden"},{"t":"Streiks sind grundsätzlich verboten"},{"t":"Der Arbeitgeber darf jederzeit kündigen"}],"e":"§ 612a BGB verbietet es dem Arbeitgeber, einen Arbeitnehmer bei einer Vereinbarung oder Maßnahme zu benachteiligen, weil dieser in zulässiger Weise seine Rechte ausübt (Maßregelungsverbot)."},{"id":"R-BR-068","f":1,"sub":"Betriebsverfassung","t":"mc","q":"Dürfen während eines rechtmäßigen Streiks Notdienst- bzw. Erhaltungsarbeiten verweigert werden?","o":[{"t":"Nein – zur Erhaltung der Betriebsanlagen und zur Sicherung lebenswichtiger Bedürfnisse müssen Notdienstarbeiten gewährleistet werden","ok":1},{"t":"Ja, sämtliche Arbeiten dürfen eingestellt werden"},{"t":"Nur der Arbeitgeber entscheidet darüber"},{"t":"Notdienste sind nie erforderlich"}],"e":"Auch im Arbeitskampf sind Erhaltungs- und Notdienstarbeiten sicherzustellen (z. B. um irreparable Schäden an Anlagen oder Gefahren für die Allgemeinheit zu vermeiden). Sie werden i. d. R. zwischen den Parteien vereinbart."},{"id":"R-BR-069","f":1,"sub":"Betriebsverfassung","t":"mc","q":"Welche Personen zählen nach dem BetrVG NICHT zu den Arbeitnehmern im Sinne des Gesetzes?","o":[{"t":"Leitende Angestellte","ok":1},{"t":"Auszubildende"},{"t":"Teilzeitbeschäftigte"},{"t":"Aushilfen"}],"e":"§ 5 BetrVG: Leitende Angestellte sind vom Arbeitnehmerbegriff des BetrVG ausgenommen; für sie gilt das Sprecherausschussgesetz."},{"id":"R-BR-070","f":1,"sub":"Betriebsverfassung","t":"mc","q":"Wie oft finden die regelmäßigen Betriebsratswahlen statt?","o":[{"t":"Alle vier Jahre","ok":1},{"t":"Jedes Jahr"},{"t":"Alle zwei Jahre"},{"t":"Alle fünf Jahre"}],"e":"§ 13 BetrVG: Die regelmäßigen Betriebsratswahlen finden alle vier Jahre im Zeitraum vom 1. März bis 31. Mai statt."},{"id":"R-BR-071","f":1,"sub":"Betriebsverfassung","t":"mc","q":"Was gilt für Betriebsratsmitglieder hinsichtlich einer ordentlichen Kündigung?","o":[{"t":"Sie sind während der Amtszeit und ein Jahr danach vor ordentlicher Kündigung besonders geschützt","ok":1},{"t":"Sie können jederzeit ordentlich gekündigt werden"},{"t":"Sie sind unkündbar auf Lebenszeit"},{"t":"Für sie gelten kürzere Fristen"}],"e":"§ 15 KSchG: Betriebsratsmitglieder sind während der Amtszeit und ein Jahr danach vor ordentlicher Kündigung geschützt; zulässig bleibt die außerordentliche Kündigung (mit Zustimmung des Betriebsrats oder deren gerichtlicher Ersetzung)."},{"id":"R-BR-072","f":1,"sub":"Betriebsverfassung","t":"mc","q":"Welche Angelegenheit fällt unter die wirtschaftlichen Angelegenheiten und wird im Wirtschaftsausschuss behandelt?","o":[{"t":"Die wirtschaftliche und finanzielle Lage sowie Produktions- und Absatzlage des Unternehmens","ok":1},{"t":"Die Lage der täglichen Pausen"},{"t":"Die Urlaubsplanung einzelner Mitarbeiter"},{"t":"Die Auswahl der Betriebsratsschulung"}],"e":"§ 106 BetrVG: Der Wirtschaftsausschuss berät mit dem Unternehmer wirtschaftliche Angelegenheiten wie Produktions-, Absatz-, Finanz- und Investitionsplanung und unterrichtet den Betriebsrat."},{"id":"R-BR-073","f":1,"sub":"Betriebsverfassung","t":"mc","q":"Welche Schweigepflicht trifft Betriebsratsmitglieder?","o":[{"t":"Sie müssen Betriebs- und Geschäftsgeheimnisse sowie persönliche Angaben vertraulich behandeln","ok":1},{"t":"Sie dürfen alle Informationen frei veröffentlichen"},{"t":"Sie unterliegen keiner Verschwiegenheit"},{"t":"Nur der Vorsitzende schweigt"}],"e":"§ 79 BetrVG (Betriebs-/Geschäftsgeheimnisse) und § 82/99 (persönliche Verhältnisse): Betriebsratsmitglieder sind zur Verschwiegenheit über ausdrücklich als geheimhaltungsbedürftig bezeichnete Tatsachen verpflichtet."},{"id":"R-BR-074","f":1,"sub":"Betriebsverfassung","t":"mc","q":"Was ist eine freiwillige Betriebsvereinbarung?","o":[{"t":"Eine Vereinbarung über Gegenstände, zu denen kein erzwingbares Mitbestimmungsrecht besteht","ok":1},{"t":"Eine Vereinbarung, die der Arbeitgeber allein aufstellt"},{"t":"Ein Tarifvertrag"},{"t":"Eine mündliche Absprache"}],"e":"Neben den erzwingbaren (§ 87) gibt es freiwillige Betriebsvereinbarungen (§ 88 BetrVG) über Gegenstände wie Sozialeinrichtungen oder betriebliche Umweltschutzmaßnahmen; ihr Abschluss ist nicht erzwingbar."},{"id":"R-BR-075","f":1,"sub":"Betriebsverfassung","t":"mc","q":"Welche Beteiligung hat der Betriebsrat bei der Aufstellung von Urlaubsgrundsätzen und des Urlaubsplans?","o":[{"t":"Ein Mitbestimmungsrecht (§ 87 Abs. 1 Nr. 5 BetrVG)","ok":1},{"t":"Nur ein Informationsrecht"},{"t":"Gar kein Beteiligungsrecht"},{"t":"Ein bloßes Vorschlagsrecht"}],"e":"§ 87 Abs. 1 Nr. 5 BetrVG: Die Aufstellung allgemeiner Urlaubsgrundsätze und des Urlaubsplans sowie die Festlegung der zeitlichen Lage des Urlaubs bei fehlender Einigung sind mitbestimmungspflichtig."},{"id":"R-AS-001","f":1,"sub":"Arbeitsschutz","t":"mc","q":"Wer trägt nach dem Arbeitsschutzgesetz (§ 3 ArbSchG) die Grundverantwortung für den Arbeitsschutz?","o":[{"t":"Der Arbeitgeber","ok":1},{"t":"Der Betriebsrat"},{"t":"Jeder Beschäftigte allein"},{"t":"Die Berufsgenossenschaft"}],"e":"§ 3 ArbSchG: Der Arbeitgeber ist verpflichtet, die erforderlichen Maßnahmen des Arbeitsschutzes zu treffen und auf ihre Wirksamkeit zu prüfen. Aufgaben können delegiert werden, die Verantwortung bleibt beim Arbeitgeber."},{"id":"R-AS-002","f":1,"sub":"Arbeitsschutz","t":"mc","q":"Welches Instrument ist zentrale Grundlage des betrieblichen Arbeitsschutzes (§ 5 ArbSchG)?","o":[{"t":"Die Gefährdungsbeurteilung","ok":1},{"t":"Die Gewinn- und Verlustrechnung"},{"t":"Der Betriebsabrechnungsbogen"},{"t":"Die Bilanz"}],"e":"§ 5 ArbSchG: Der Arbeitgeber hat die mit der Arbeit verbundenen Gefährdungen zu beurteilen und die erforderlichen Schutzmaßnahmen abzuleiten. Die Gefährdungsbeurteilung ist zu dokumentieren."},{"id":"R-AS-003","f":1,"sub":"Arbeitsschutz","t":"mc","q":"Welche Schritte umfasst die Gefährdungsbeurteilung in der richtigen Reihenfolge?","o":[{"t":"Gefährdungen ermitteln → beurteilen → Maßnahmen festlegen → durchführen → Wirksamkeit prüfen → dokumentieren","ok":1},{"t":"Maßnahmen durchführen → Gefährdungen ermitteln → dokumentieren"},{"t":"Dokumentieren → beurteilen → ignorieren"},{"t":"Wirksamkeit prüfen → Gefährdungen erzeugen"}],"e":"Die Gefährdungsbeurteilung ist ein fortlaufender Regelkreis: Ermitteln, Beurteilen, Festlegen und Umsetzen von Maßnahmen, Wirksamkeitskontrolle, Dokumentation und Fortschreibung."},{"id":"R-AS-004","f":1,"sub":"Arbeitsschutz","t":"mc","q":"Auf welchen zwei Säulen beruht das duale Arbeitsschutzsystem in Deutschland?","o":[{"t":"Staatlicher Arbeitsschutz (z. B. Gewerbeaufsicht) und Unfallversicherungsträger (Berufsgenossenschaften)","ok":1},{"t":"Arbeitgeber und Betriebsrat"},{"t":"Bund und Gemeinden"},{"t":"Gewerkschaft und Arbeitgeberverband"}],"e":"Der Arbeitsschutz wird getragen vom Staat (Arbeitsschutzgesetze, Aufsicht durch die Länderbehörden) und den Unfallversicherungsträgern (DGUV-Vorschriften, Beratung und Überwachung durch die Berufsgenossenschaften)."},{"id":"R-AS-005","f":1,"sub":"Arbeitsschutz","t":"mc","q":"Welche zwei Personen muss der Arbeitgeber nach dem Arbeitssicherheitsgesetz (ASiG) bestellen?","o":[{"t":"Betriebsarzt und Fachkraft für Arbeitssicherheit","ok":1},{"t":"Betriebsrat und Datenschutzbeauftragten"},{"t":"Steuerberater und Wirtschaftsprüfer"},{"t":"Brandschutzhelfer und Ersthelfer"}],"e":"Das ASiG verpflichtet den Arbeitgeber, Betriebsärzte und Fachkräfte für Arbeitssicherheit (Sicherheitsfachkräfte) zu bestellen, die ihn beim Arbeits- und Gesundheitsschutz beraten und unterstützen."},{"id":"R-AS-006","f":1,"sub":"Arbeitsschutz","t":"mc","q":"Welche Rolle hat die Fachkraft für Arbeitssicherheit?","o":[{"t":"Sie berät und unterstützt den Arbeitgeber im Arbeitsschutz – ohne eigene Weisungsbefugnis gegenüber den Beschäftigten","ok":1},{"t":"Sie ersetzt den Arbeitgeber in seiner Verantwortung"},{"t":"Sie ist Vorgesetzte aller Mitarbeiter"},{"t":"Sie führt die Lohnbuchhaltung"}],"e":"Die Sicherheitsfachkraft hat eine beratende, unterstützende Funktion (Stabsstelle). Die Verantwortung für den Arbeitsschutz verbleibt beim Arbeitgeber bzw. den Führungskräften."},{"id":"R-AS-007","f":1,"sub":"Arbeitsschutz","t":"mc","q":"Ab welcher Beschäftigtenzahl ist ein Arbeitsschutzausschuss (ASA) zu bilden (§ 11 ASiG)?","o":[{"t":"Bei regelmäßig mehr als 20 Beschäftigten","ok":1},{"t":"Bei mehr als 5 Beschäftigten"},{"t":"Bei mehr als 100 Beschäftigten"},{"t":"In jedem Betrieb"}],"e":"§ 11 ASiG: In Betrieben mit i. d. R. mehr als 20 Beschäftigten ist ein Arbeitsschutzausschuss zu bilden; er tritt mindestens einmal vierteljährlich zusammen."},{"id":"R-AS-008","f":1,"sub":"Arbeitsschutz","t":"mc","q":"Wie oft muss der Arbeitsschutzausschuss (ASA) mindestens tagen?","o":[{"t":"Mindestens einmal vierteljährlich","ok":1},{"t":"Einmal jährlich"},{"t":"Einmal monatlich"},{"t":"Nur bei Unfällen"}],"e":"Der ASA tagt mindestens vierteljährlich. Ihm gehören u. a. Arbeitgeber, Betriebsratsmitglieder, Betriebsarzt, Sicherheitsfachkraft und Sicherheitsbeauftragte an."},{"id":"R-AS-009","f":1,"sub":"Arbeitsschutz","t":"mc","q":"Ab welcher Beschäftigtenzahl sind Sicherheitsbeauftragte zu bestellen (§ 22 SGB VII)?","o":[{"t":"Bei regelmäßig mehr als 20 Beschäftigten","ok":1},{"t":"Ab dem ersten Beschäftigten"},{"t":"Ab 50 Beschäftigten"},{"t":"Ab 200 Beschäftigten"}],"e":"§ 22 SGB VII: In Unternehmen mit regelmäßig mehr als 20 Beschäftigten sind Sicherheitsbeauftragte zu bestellen. Sie unterstützen ehrenamtlich bei der Unfallverhütung."},{"id":"R-AS-010","f":1,"sub":"Arbeitsschutz","t":"mc","q":"Welche Rangfolge gilt bei Schutzmaßnahmen nach dem STOP-Prinzip?","o":[{"t":"Substitution → Technische → Organisatorische → Personenbezogene Maßnahmen","ok":1},{"t":"Personenbezogen → Organisatorisch → Technisch → Substitution"},{"t":"Persönliche Schutzausrüstung zuerst"},{"t":"Technisch → Substitution → Personenbezogen"}],"e":"Das STOP-Prinzip legt die Rangfolge fest: zuerst Substitution (Gefahrstoff/Verfahren ersetzen), dann technische, dann organisatorische und zuletzt personenbezogene Maßnahmen (PSA). PSA ist immer nachrangig."},{"id":"R-AS-011","f":1,"sub":"Arbeitsschutz","t":"mc","q":"Welche Schutzmaßnahme ist grundsätzlich nachrangig gegenüber technischen und organisatorischen Maßnahmen?","o":[{"t":"Die persönliche Schutzausrüstung (PSA)","ok":1},{"t":"Die Substitution des Gefahrstoffs"},{"t":"Eine geschlossene Absauganlage"},{"t":"Die Kapselung einer Maschine"}],"e":"PSA (z. B. Helm, Gehörschutz, Schutzbrille) wirkt nur am einzelnen Beschäftigten und wird erst eingesetzt, wenn die Gefährdung nicht durch vorrangige Maßnahmen beseitigt werden kann."},{"id":"R-AS-012","f":1,"sub":"Arbeitsschutz","t":"mc","q":"Was sind DGUV-Vorschriften (früher UVV/BGV)?","o":[{"t":"Unfallverhütungsvorschriften der Unfallversicherungsträger, die für die Mitgliedsbetriebe verbindlich sind","ok":1},{"t":"Empfehlungen ohne Verbindlichkeit"},{"t":"Steuerrichtlinien"},{"t":"Tarifverträge"}],"e":"Die Deutsche Gesetzliche Unfallversicherung erlässt über die Berufsgenossenschaften autonome Unfallverhütungsvorschriften; sie sind für die Mitgliedsunternehmen und Versicherten verbindlich."},{"id":"R-AS-013","f":1,"sub":"Arbeitsschutz","t":"mc","q":"Wie häufig müssen Beschäftigte im Arbeitsschutz mindestens unterwiesen werden (§ 12 ArbSchG / DGUV V1)?","o":[{"t":"Mindestens einmal jährlich sowie bei Bedarf (z. B. neue Tätigkeit, neue Gefährdung)","ok":1},{"t":"Nur einmal bei der Einstellung"},{"t":"Alle fünf Jahre"},{"t":"Nur nach einem Unfall"}],"e":"§ 12 ArbSchG verlangt Unterweisung bei Einstellung, Veränderung des Aufgabenbereichs, Einführung neuer Arbeitsmittel/Verfahren; sie ist regelmäßig – nach DGUV Vorschrift 1 mindestens jährlich – zu wie
