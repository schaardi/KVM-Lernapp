derholen und zu dokumentieren."},{"id":"R-AS-014","f":1,"sub":"Arbeitsschutz","t":"mc","q":"Welche Pflichten treffen die Beschäftigten nach §§ 15, 16 ArbSchG?","o":[{"t":"Weisungen und Schutzmaßnahmen befolgen, PSA benutzen und festgestellte Mängel/Gefahren melden","ok":1},{"t":"Keinerlei Pflichten"},{"t":"Die Gefährdungsbeurteilung selbst erstellen"},{"t":"Den Arbeitsschutz allein finanzieren"}],"e":"§§ 15, 16 ArbSchG: Beschäftigte müssen für ihre eigene und die Sicherheit anderer sorgen, Weisungen befolgen, Schutzeinrichtungen bestimmungsgemäß verwenden und unmittelbare Gefahren sowie Defekte melden."},{"id":"R-AS-015","f":1,"sub":"Arbeitsschutz","t":"mc","q":"Welche Verordnung regelt Anforderungen an Arbeitsstätten (Räume, Beleuchtung, Sanitäreinrichtungen)?","o":[{"t":"Die Arbeitsstättenverordnung (ArbStättV)","ok":1},{"t":"Die Gefahrstoffverordnung"},{"t":"Die Betriebssicherheitsverordnung"},{"t":"Die Straßenverkehrsordnung"}],"e":"Die ArbStättV konkretisiert das ArbSchG für die Gestaltung und den Betrieb von Arbeitsstätten (u. a. Raumabmessungen, Beleuchtung, Klima, Fluchtwege, Sanitärräume)."},{"id":"R-AS-016","f":1,"sub":"Arbeitsschutz","t":"mc","q":"Was regelt die Betriebssicherheitsverordnung (BetrSichV)?","o":[{"t":"Die Bereitstellung und sichere Benutzung von Arbeitsmitteln sowie überwachungsbedürftige Anlagen","ok":1},{"t":"Die Höhe des Mindestlohns"},{"t":"Die Urlaubsansprüche"},{"t":"Die Kündigungsfristen"}],"e":"Die BetrSichV stellt Anforderungen an die Bereitstellung und Benutzung von Arbeitsmitteln (Maschinen, Geräte) und an den Betrieb überwachungsbedürftiger Anlagen (z. B. Prüfpflichten, Prüffristen)."},{"id":"R-AS-017","f":1,"sub":"Arbeitsschutz","t":"mc","q":"Was schreibt die Gefahrstoffverordnung (GefStoffV) bei Tätigkeiten mit Gefahrstoffen vor?","o":[{"t":"U. a. Substitutionsprüfung, Gefährdungsbeurteilung und eine Betriebsanweisung","ok":1},{"t":"Nur das Tragen von Handschuhen"},{"t":"Ausschließlich die Lagerung im Freien"},{"t":"Keine besonderen Maßnahmen"}],"e":"Die GefStoffV verlangt eine tätigkeitsbezogene Gefährdungsbeurteilung, die Prüfung, ob der Gefahrstoff ersetzt werden kann (Substitution), Schutzmaßnahmen nach STOP und eine Betriebsanweisung mit Unterweisung."},{"id":"R-AS-018","f":1,"sub":"Arbeitsschutz","t":"mc","q":"Wonach richtet sich die einheitliche Kennzeichnung von Gefahrstoffen mit Piktogrammen (z. B. Totenkopf, Flamme)?","o":[{"t":"Nach dem global harmonisierten System (GHS) bzw. der CLP-Verordnung","ok":1},{"t":"Nach der DIN A4-Norm"},{"t":"Nach der Straßenverkehrsordnung"},{"t":"Nach dem Betriebsverfassungsgesetz"}],"e":"Die Einstufung, Kennzeichnung und Verpackung von Chemikalien folgt der europäischen CLP-Verordnung, die das global harmonisierte System (GHS) umsetzt – mit standardisierten Gefahrenpiktogrammen, Signalwörtern sowie H- und P-Sätzen."},{"id":"R-AS-019","f":1,"sub":"Arbeitsschutz","t":"mc","q":"Was ist eine Betriebsanweisung im Gefahrstoffrecht?","o":[{"t":"Eine arbeitsplatz-/tätigkeitsbezogene schriftliche Anweisung zu Gefahren und Schutzmaßnahmen als Grundlage der Unterweisung","ok":1},{"t":"Eine Anweisung des Betriebsrats an den Arbeitgeber"},{"t":"Ein Tarifvertrag"},{"t":"Die Bedienungsanleitung des Herstellers"}],"e":"§ 14 GefStoffV: Die Betriebsanweisung informiert tätigkeits- und arbeitsplatzbezogen über Gefahren, Schutzmaßnahmen und Verhaltensregeln (auch im Gefahrfall) und bildet die Grundlage der mündlichen Unterweisung."},{"id":"R-AS-020","f":1,"sub":"Arbeitsschutz","t":"mc","q":"Ab welcher Dauer der Arbeitsunfähigkeit ist ein Arbeitsunfall der Berufsgenossenschaft zu melden?","o":[{"t":"Wenn die Arbeitsunfähigkeit mehr als 3 Tage beträgt","ok":1},{"t":"Erst ab 6 Wochen"},{"t":"Jeder Unfall, auch ohne Ausfall"},{"t":"Nie"}],"e":"§ 193 SGB VII: Unfälle, die zu einer Arbeitsunfähigkeit von mehr als drei Kalendertagen oder zum Tod führen, sind vom Unternehmer der zuständigen Berufsgenossenschaft anzuzeigen."},{"id":"R-AS-021","f":1,"sub":"Arbeitsschutz","t":"mc","q":"Wozu dient das Verbandbuch (bzw. die Dokumentation von Erste-Hilfe-Leistungen)?","o":[{"t":"Zur Dokumentation auch kleiner Verletzungen – wichtig als Nachweis für spätere Ansprüche gegenüber der Unfallversicherung","ok":1},{"t":"Zur Erfassung der Arbeitszeit"},{"t":"Zur Lohnabrechnung"},{"t":"Zur Bestellung von Material"}],"e":"Jede Erste-Hilfe-Leistung ist zu dokumentieren (Verbandbuch/Meldeblock). Dies dient als Nachweis, falls aus einer zunächst geringfügigen Verletzung später ein Versicherungsfall wird."},{"id":"R-AS-022","f":1,"sub":"Arbeitsschutz","t":"mc","q":"Wie viele Ersthelfer sind in einem Verwaltungs-/Handelsbetrieb mit mehr als 20 anwesenden Versicherten mindestens vorzuhalten?","o":[{"t":"Mindestens 5 % der anwesenden Versicherten","ok":1},{"t":"1 % der Versicherten"},{"t":"50 % der Versicherten"},{"t":"Keine Ersthelfer nötig"}],"e":"Nach DGUV Vorschrift 1: bei mehr als 20 anwesenden Versicherten mindestens 5 % in Verwaltungs- und Handelsbetrieben bzw. 10 % in sonstigen Betrieben; bei 2–20 Anwesenden genügt ein Ersthelfer."},{"id":"R-AS-023","f":1,"sub":"Arbeitsschutz","t":"mc","q":"Kann der Arbeitgeber Arbeitsschutzpflichten auf Führungskräfte (z. B. Meister) übertragen?","o":[{"t":"Ja, die Pflichtenübertragung ist möglich (§ 13 ArbSchG); die Gesamtverantwortung bleibt jedoch beim Arbeitgeber","ok":1},{"t":"Nein, eine Übertragung ist ausgeschlossen"},{"t":"Nur auf den Betriebsrat"},{"t":"Nur auf externe Firmen"}],"e":"§ 13 ArbSchG erlaubt die schriftliche Übertragung von Arbeitgeberpflichten auf zuverlässige, fachkundige Personen (z. B. Meister). Diese werden dann verantwortlich; die Auswahl- und Aufsichtsverantwortung bleibt beim Arbeitgeber."},{"id":"R-AS-024","f":1,"sub":"Arbeitsschutz","t":"open","q":"Nennen Sie das STOP-Prinzip und erläutern Sie kurz die Rangfolge der Schutzmaßnahmen an einem Beispiel.","a":"Das STOP-Prinzip legt die Rangfolge von Schutzmaßnahmen fest: S = Substitution (Gefahrstoff oder Verfahren durch ein weniger gefährliches ersetzen), T = Technische Maßnahmen (z. B. geschlossene Anlage, Absaugung), O = Organisatorische Maßnahmen (z. B. Expositionszeit begrenzen, Zutritt beschränken), P = Personenbezogene Maßnahmen (persönliche Schutzausrüstung wie Atemschutz). Beispiel Lösemittel: Zuerst prüfen, ob ein ungefährlicheres Mittel eingesetzt werden kann (S); ist das nicht möglich, eine Absaugung installieren (T); zusätzlich die Arbeitszeit am Gefahrstoff begrenzen (O); erst zuletzt Atemschutzmaske tragen (P).","e":"Persönliche Schutzausrüstung ist immer nachrangig, weil sie nur den einzelnen Beschäftigten schützt und Anwendungsfehler wahrscheinlicher sind als bei technischen Lösungen."},{"id":"R-AS-025","f":1,"sub":"Arbeitsschutz","t":"mc","q":"Welche Aufgabe hat der Betriebsarzt nach dem ASiG NICHT?","o":[{"t":"Behandlung erkrankter Mitarbeiter wie ein Hausarzt","ok":1},{"t":"Beratung des Arbeitgebers bei der Gestaltung der Arbeitsplätze"},{"t":"Arbeitsmedizinische Vorsorgeuntersuchungen"},{"t":"Mitwirkung bei der Gefährdungsbeurteilung"}],"e":"Der Betriebsarzt hat eine beratende und präventive Funktion (Vorsorge, Begehungen, Beratung). Die kurative Behandlung von Krankheiten gehört nicht zu seinen Aufgaben – dafür sind die behandelnden Ärzte zuständig."},{"id":"R-UW-001","f":1,"sub":"Umweltrecht","t":"mc","q":"Welche drei Grundprinzipien prägen das deutsche Umweltrecht?","o":[{"t":"Verursacher-, Vorsorge- und Kooperationsprinzip","ok":1},{"t":"Angebots-, Nachfrage- und Preisprinzip"},{"t":"Minimal-, Maximal- und Optimalprinzip"},{"t":"Solidaritäts-, Äquivalenz- und Sachleistungsprinzip"}],"e":"Das Umweltrecht beruht auf dem Verursacherprinzip (wer Umweltbelastungen verursacht, trägt die Kosten), dem Vorsorgeprinzip (Belastungen vorbeugend vermeiden) und dem Kooperationsprinzip (Staat und Wirtschaft wirken zusammen)."},{"id":"R-UW-002","f":1,"sub":"Umweltrecht","t":"mc","q":"Was besagt das Verursacherprinzip?","o":[{"t":"Wer eine Umweltbelastung verursacht, hat die Kosten ihrer Vermeidung und Beseitigung zu tragen","ok":1},{"t":"Die Allgemeinheit trägt stets alle Umweltkosten"},{"t":"Umweltschäden werden nicht ausgeglichen"},{"t":"Nur der Staat haftet für Umweltschäden"}],"e":"Nach dem Verursacherprinzip werden die Kosten der Umweltbelastung demjenigen zugeordnet, der sie verursacht. Gegenmodell ist das Gemeinlastprinzip, bei dem die Allgemeinheit die Kosten trägt."},{"id":"R-UW-003","f":1,"sub":"Umweltrecht","t":"mc","q":"Was besagt das Vorsorgeprinzip im Umweltrecht?","o":[{"t":"Umweltbelastungen sollen von vornherein vermieden oder verringert werden, bevor Schäden entstehen","ok":1},{"t":"Schäden werden erst behoben, wenn sie eingetreten sind"},{"t":"Umweltschutz ist freiwillig"},{"t":"Nur nachweisbare Schäden zählen"}],"e":"Das Vorsorgeprinzip zielt auf vorbeugenden Umweltschutz: Risiken sind frühzeitig zu minimieren, auch wenn ein Schaden noch nicht sicher feststeht."},{"id":"R-UW-004","f":1,"sub":"Umweltrecht","t":"mc","q":"Welche Rangfolge legt die fünfstufige Abfallhierarchie des KrWG (§ 6) fest?","o":[{"t":"Vermeidung → Vorbereitung zur Wiederverwendung → Recycling → sonstige Verwertung → Beseitigung","ok":1},{"t":"Beseitigung → Recycling → Vermeidung"},{"t":"Recycling → Beseitigung → Vermeidung"},{"t":"Verbrennung → Deponierung → Vermeidung"}],"e":"§ 6 KrWG: Oberste Priorität hat die Vermeidung, gefolgt von Vorbereitung zur Wiederverwendung, Recycling, sonstiger (z. B. energetischer) Verwertung und – als letztes Mittel – der Beseitigung."},{"id":"R-UW-005","f":1,"sub":"Umweltrecht","t":"mc","q":"Welche Stufe der Abfallhierarchie hat die höchste Priorität?","o":[{"t":"Die Abfallvermeidung","ok":1},{"t":"Die energetische Verwertung"},{"t":"Die Deponierung"},{"t":"Das Recycling"}],"e":"Die beste Abfallwirtschaft ist die Vermeidung – Abfall, der gar nicht erst entsteht, muss weder verwertet noch beseitigt werden. Erst danach folgen Wiederverwendung und Recycling."},{"id":"R-UW-006","f":1,"sub":"Umweltrecht","t":"mc","q":"Welches Ziel verfolgt das Kreislaufwirtschaftsgesetz (KrWG)?","o":[{"t":"Ressourcen zu schonen und Abfälle möglichst als Rohstoffe im Kreislauf zu halten","ok":1},{"t":"Möglichst viel Abfall zu deponieren"},{"t":"Die Produktion von Verpackungen zu steigern"},{"t":"Import von Abfall zu fördern"}],"e":"Das KrWG soll die Kreislaufwirtschaft fördern, natürliche Ressourcen schonen und den Schutz von Mensch und Umwelt bei der Abfallbewirtschaftung sicherstellen (Produktverantwortung der Hersteller)."},{"id":"R-UW-007","f":1,"sub":"Umweltrecht","t":"mc","q":"Worin unterscheiden sich Emission und Immission?","o":[{"t":"Emission ist der Ausstoß an der Quelle, Immission die Einwirkung auf die Umgebung","ok":1},{"t":"Beide bezeichnen dasselbe"},{"t":"Emission ist die Einwirkung, Immission der Ausstoß"},{"t":"Nur Immissionen entstehen in Betrieben"}],"e":"Emissionen (z. B. Abgase, Lärm, Erschütterungen) treten aus einer Anlage aus; als Immissionen wirken sie auf Menschen, Tiere und Umwelt in der Umgebung ein (Regelungsgegenstand des BImSchG)."},{"id":"R-UW-008","f":1,"sub":"Umweltrecht","t":"mc","q":"Was regelt das Bundes-Immissionsschutzgesetz (BImSchG)?","o":[{"t":"Den Schutz vor schädlichen Umwelteinwirkungen durch Luftverunreinigungen, Lärm, Erschütterungen u. Ä.","ok":1},{"t":"Ausschließlich den Gewässerschutz"},{"t":"Nur die Abfallentsorgung"},{"t":"Die Höhe der Umweltsteuer"}],"e":"Das BImSchG schützt vor schädlichen Umwelteinwirkungen (Luft, Lärm, Erschütterungen, Licht, Wärme, Strahlen) und regelt u. a. die Genehmigung emissionsträchtiger Anlagen."},{"id":"R-UW-009","f":1,"sub":"Umweltrecht","t":"mc","q":"Welche Anlagen bedürfen nach dem BImSchG einer besonderen Genehmigung?","o":[{"t":"Genehmigungsbedürftige Anlagen, die in besonderem Maße geeignet sind, schädliche Umwelteinwirkungen hervorzurufen","ok":1},{"t":"Jeder Bürocomputer"},{"t":"Alle Wohngebäude"},{"t":"Nur landwirtschaftliche Felder"}],"e":"§ 4 BImSchG: Anlagen, die in besonderem Maße Umweltbelastungen verursachen können (in einer Verordnung aufgeführt), dürfen nur mit immissionsschutzrechtlicher Genehmigung errichtet und betrieben werden."},{"id":"R-UW-010","f":1,"sub":"Umweltrecht","t":"mc","q":"Was regelt das Wasserhaushaltsgesetz (WHG)?","o":[{"t":"Den Schutz und die Bewirtschaftung der Gewässer (Oberflächen- und Grundwasser)","ok":1},{"t":"Die Luftreinhaltung"},{"t":"Die Abfallverbrennung"},{"t":"Die Lärmbekämpfung"}],"e":"Das WHG dient dem Schutz der Gewässer als Bestandteil des Naturhaushalts. Die Benutzung von Gewässern (z. B. Einleiten von Abwasser) bedarf grundsätzlich einer behördlichen Erlaubnis."},{"id":"R-UW-011","f":1,"sub":"Umweltrecht","t":"mc","q":"Welchen Betriebsbeauftragten kann das Umweltrecht bei bestimmten Anlagen verlangen?","o":[{"t":"Immissionsschutz-, Gewässerschutz- und Abfallbeauftragte","ok":1},{"t":"Datenschutzbeauftragte"},{"t":"Gleichstellungsbeauftragte"},{"t":"Betriebsratsvorsitzende"}],"e":"Je nach Anlage sind betriebliche Umweltbeauftragte zu bestellen: Immissionsschutzbeauftragter (BImSchG), Gewässerschutzbeauftragter (WHG) und Abfallbeauftragter (KrWG). Sie beraten und überwachen, ohne eigene Weisungsbefugnis."},{"id":"R-UW-012","f":1,"sub":"Umweltrecht","t":"mc","q":"Welche Aufgabe hat ein betrieblicher Umweltbeauftragter typischerweise?","o":[{"t":"Beraten und Überwachen der Einhaltung umweltrechtlicher Vorschriften sowie Hinwirken auf Verbesserungen","ok":1},{"t":"Er ersetzt die Umweltbehörde"},{"t":"Er entscheidet allein über Investitionen"},{"t":"Er stellt Bußgeldbescheide aus"}],"e":"Umweltbeauftragte haben eine beratende und kontrollierende Funktion (Stabsstelle): Sie überwachen die Einhaltung der Vorschriften, informieren die Betriebsleitung und regen Verbesserungen an."},{"id":"R-UW-013","f":1,"sub":"Umweltrecht","t":"mc","q":"Was versteht man unter Produktverantwortung im Sinne des KrWG?","o":[{"t":"Hersteller und Vertreiber sind für die umweltverträgliche Gestaltung, Rücknahme und Verwertung ihrer Produkte mitverantwortlich","ok":1},{"t":"Nur der Endverbraucher ist verantwortlich"},{"t":"Die Produktverantwortung endet mit dem Verkauf"},{"t":"Der Staat entsorgt alle Produkte"}],"e":"Nach dem KrWG erstreckt sich die Verantwortung der Hersteller auf den gesamten Lebensweg des Produkts – von abfallarmer Gestaltung über Rücknahme bis zur Verwertung (Grundlage z. B. für Verpackungs-, Elektro- und Batteriegesetz)."},{"id":"R-UW-014","f":1,"sub":"Umweltrecht","t":"mc","q":"Was regelt das Verpackungsgesetz (VerpackG)?","o":[{"t":"Rücknahme- und Verwertungspflichten für Verpackungen; Beteiligung an einem dualen System","ok":1},{"t":"Die Höhe der Mehrwertsteuer auf Verpackungen"},{"t":"Das Design von Werbeanzeigen"},{"t":"Die Arbeitszeit in Verpackungsbetrieben"}],"e":"Das VerpackG verpflichtet Inverkehrbringer, sich an einem dualen System zu beteiligen (Lizenzierung) und Verpackungen der Verwertung zuzuführen; es soll Verpackungsabfälle vermeiden und recyceln."},{"id":"R-UW-015","f":1,"sub":"Umweltrecht","t":"mc","q":"Welche freiwilligen Umweltmanagementsysteme sind verbreitet?","o":[{"t":"EMAS und die ISO 14001","ok":1},{"t":"HACCP und ISO 9001"},{"t":"BGB und HGB"},{"t":"REFA und MTM"}],"e":"Betriebe können ihr Umweltmanagement nach der internationalen Norm ISO 14001 oder nach dem EU-System EMAS (Eco-Management and Audit Scheme) aufbauen und zertifizieren/validieren lassen."},{"id":"R-UW-016","f":1,"sub":"Umweltrecht","t":"mc","q":"Wozu dient ein Umweltmanagementsystem nach ISO 14001 / EMAS?","o":[{"t":"Zur systematischen Steuerung und kontinuierlichen Verbesserung der Umweltleistung eines Betriebs","ok":1},{"t":"Zur Erhöhung des Ausstoßes"},{"t":"Zur Umgehung von Umweltvorschriften"},{"t":"Zur Berechnung der Lohnsteuer"}],"e":"Ein Umweltmanagementsystem etabliert Ziele, Verantwortlichkeiten und Prozesse (PDCA-Zyklus), um die Umweltauswirkungen fortlaufend zu erfassen, rechtssicher zu handeln und die Umweltleistung stetig zu verbessern."},{"id":"R-UW-017","f":1,"sub":"Umweltrecht","t":"mc","q":"Wer muss beim Transport gefährlicher Güter (ab bestimmten Mengen) einen Gefahrgutbeauftragten bestellen?","o":[{"t":"Unternehmen, die gefährliche Güter befördern oder am Transport beteiligt sind (GbV)","ok":1},{"t":"Nur reine Bürobetriebe"},{"t":"Jeder private Haushalt"},{"t":"Ausschließlich Behörden"}],"e":"Nach der Gefahrgutbeauftragtenverordnung müssen Unternehmen, die an der Beförderung gefährlicher Güter beteiligt sind, einen Gefahrgutbeauftragten bestellen, der die Einhaltung der Vorschriften überwacht (besonders relevant im Kraftverkehr)."},{"id":"R-UW-018","f":1,"sub":"Umweltrecht","t":"mc","q":"Wonach richtet sich der Transport gefährlicher Güter auf der Straße international?","o":[{"t":"Nach dem ADR (Europäisches Übereinkommen über die Beförderung gefährlicher Güter auf der Straße)","ok":1},{"t":"Nach der DSGVO"},{"t":"Nach dem BUrlG"},{"t":"Nach dem HGB"}],"e":"Das ADR regelt Klassifizierung, Verpackung, Kennzeichnung und Beförderung gefährlicher Güter im Straßenverkehr; national umgesetzt u. a. durch die GGVSEB (für den Kraftverkehr ein zentrales Regelwerk)."},{"id":"R-UW-019","f":1,"sub":"Umweltrecht","t":"mc","q":"Was ist ein Abfall im rechtlichen Sinne (KrWG)?","o":[{"t":"Jeder Stoff oder Gegenstand, dessen sich der Besitzer entledigt, entledigen will oder muss","ok":1},{"t":"Nur radioaktives Material"},{"t":"Ausschließlich Verpackungen"},{"t":"Nur flüssige Stoffe"}],"e":"§ 3 KrWG: Abfall ist jeder Stoff oder Gegenstand, dessen sich sein Besitzer entledigt, entledigen will oder entledigen muss. Man unterscheidet Abfälle zur Verwertung und Abfälle zur Beseitigung."},{"id":"R-UW-020","f":1,"sub":"Umweltrecht","t":"mc","q":"Welche Bedeutung hat die getrennte Sammlung von Abfällen?","o":[{"t":"Sie ist Voraussetzung für hochwertiges Recycling und Verwertung","ok":1},{"t":"Sie ist umweltrechtlich bedeutungslos"},{"t":"Sie erhöht die Abfallmenge"},{"t":"Sie ist nur in Privathaushalten vorgeschrieben"}],"e":"Die getrennte Erfassung von Abfallfraktionen (z. B. Papier, Glas, Bioabfall, Wertstoffe) ermöglicht ein hochwertiges Recycling und ist Teil der Getrennthaltungspflichten des KrWG."},{"id":"R-UW-021","f":1,"sub":"Umweltrecht","t":"mc","q":"Was regelt das Bundes-Bodenschutzgesetz (BBodSchG)?","o":[{"t":"Den Schutz des Bodens vor schädlichen Veränderungen und die Sanierung von Altlasten","ok":1},{"t":"Die Luftreinhaltung"},{"t":"Die Arbeitszeit im Freien"},{"t":"Die Verpackungslizenzierung"}],"e":"Das BBodSchG schützt die Funktionen des Bodens, wehrt schädliche Bodenveränderungen ab und regelt die Verantwortlichkeit für die Sanierung von Altlasten (Verursacher- und Zustandsverantwortlichkeit)."},{"id":"R-UW-022","f":1,"sub":"Umweltrecht","t":"mc","q":"Was versteht man unter dem Kooperationsprinzip im Umweltschutz?","o":[{"t":"Staat, Wirtschaft und Gesellschaft wirken beim Umweltschutz partnerschaftlich zusammen","ok":1},{"t":"Der Staat ordnet alles allein an"},{"t":"Umweltschutz ist ausschließlich Aufgabe der Unternehmen"},{"t":"Die Bürger tragen keine Verantwortung"}],"e":"Das Kooperationsprinzip setzt auf Zusammenwirken statt einseitiger Anordnung: freiwillige Vereinbarungen, Beteiligung und Zusammenarbeit von Staat, Betrieben und Öffentlichkeit."},{"id":"R-UW-023","f":1,"sub":"Umweltrecht","t":"mc","q":"Welchen wirtschaftlichen Vorteil kann betrieblicher Umweltschutz bieten?","o":[{"t":"Kosteneinsparungen durch geringeren Ressourcen- und Energieverbrauch sowie Imagegewinn","ok":1},{"t":"Er verursacht ausschließlich Kosten ohne Nutzen"},{"t":"Er ist stets gesetzlich verboten"},{"t":"Er verschlechtert immer die Wettbewerbsfähigkeit"}],"e":"Umweltschutz senkt oft Material-, Energie- und Entsorgungskosten, verringert Haftungsrisiken und verbessert das Image – Ökologie und Ökonomie können sich ergänzen (Öko-Effizienz)."},{"id":"R-UW-024","f":1,"sub":"Umweltrecht","t":"open","q":"Nennen Sie die fünf Stufen der Abfallhierarchie nach dem KrWG in der richtigen Rangfolge und erläutern Sie kurz das Ziel dieser Rangfolge.","a":"Die Abfallhierarchie nach § 6 KrWG lautet: 1. Vermeidung, 2. Vorbereitung zur Wiederverwendung, 3. Recycling, 4. sonstige Verwertung (insbesondere energetische Verwertung), 5. Beseitigung. Ziel der Rangfolge ist es, Ressourcen zu schonen und Umweltbelastungen zu minimieren: Die jeweils höhere Stufe ist vorrangig, sofern sie technisch möglich und wirtschaftlich zumutbar ist sowie den besseren Umweltschutz gewährleistet. Am besten ist Abfall, der gar nicht erst entsteht.","e":"Die Rangfolge ist nicht starr: Maßgeblich ist, welche Option unter Berücksichtigung von Technik, Wirtschaftlichkeit und Umweltschutz insgesamt am besten ist (§ 6 Abs. 2 KrWG)."},{"id":"R-UW-025","f":1,"sub":"Umweltrecht","t":"mc","q":"Welche Behörden überwachen im Rahmen des staatlichen Umweltschutzes die Betriebe?","o":[{"t":"Die zuständigen Umwelt- bzw. Gewerbeaufsichtsbehörden der Länder","ok":1},{"t":"Ausschließlich die Krankenkassen"},{"t":"Die IHK allein"},{"t":"Die Berufsgenossenschaften allein"}],"e":"Der Vollzug des Umweltrechts liegt überwiegend bei den Ländern; Umwelt-/Gewerbeaufsichtsbehörden überwachen die Einhaltung der Vorschriften, erteilen Genehmigungen und können Anordnungen treffen."},{"id":"R-PH-001","f":1,"sub":"Produkthaftung/Datenschutz","t":"mc","q":"Welche Art der Haftung begründet das Produkthaftungsgesetz (ProdHaftG)?","o":[{"t":"Eine verschuldensunabhängige Gefährdungshaftung des Herstellers","ok":1},{"t":"Eine reine Verschuldenshaftung"},{"t":"Gar keine Haftung"},{"t":"Eine Haftung nur bei Vorsatz"}],"e":"Das ProdHaftG regelt eine Gefährdungshaftung: Der Hersteller haftet für Schäden durch fehlerhafte Produkte unabhängig davon, ob ihn ein Verschulden trifft."},{"id":"R-PH-002","f":1,"sub":"Produkthaftung/Datenschutz","t":"mc","q":"Wann ist ein Produkt im Sinne des ProdHaftG fehlerhaft?","o":[{"t":"Wenn es nicht die Sicherheit bietet, die berechtigterweise erwartet werden darf","ok":1},{"t":"Wenn es teurer ist als vergleichbare Produkte"},{"t":"Wenn es nicht mehr modern ist"},{"t":"Wenn der Käufer es nicht mag"}],"e":"§ 3 ProdHaftG: Ein Fehler liegt vor, wenn das Produkt nicht die Sicherheit bietet, die unter Berücksichtigung aller Umstände (Darbietung, üblicher Gebrauch, Zeitpunkt des Inverkehrbringens) berechtigt erwartet werden darf."},{"id":"R-PH-003","f":1,"sub":"Produkthaftung/Datenschutz","t":"mc","q":"Welche drei Fehlerarten werden bei der Produkthaftung typischerweise unterschieden?","o":[{"t":"Konstruktions-, Fabrikations- und Instruktionsfehler","ok":1},{"t":"Preis-, Design- und Werbefehler"},{"t":"Liefer-, Zahlungs- und Terminfehler"},{"t":"Mengen-, Qualitäts- und Sortimentsfehler"}],"e":"Konstruktionsfehler betreffen die gesamte Serie (fehlerhafte Planung), Fabrikationsfehler einzelne Stücke (Herstellungsmangel, „Ausreißer“), Instruktionsfehler die unzureichende Anleitung/Warnung."},{"id":"R-PH-004","f":1,"sub":"Produkthaftung/Datenschutz","t":"mc","q":"Was ist ein Instruktionsfehler?","o":[{"t":"Eine unzureichende Gebrauchsanleitung oder fehlende Warnung vor Gefahren","ok":1},{"t":"Ein Fehler in der Serienkonstruktion"},{"t":"Ein einzelner Herstellungsmangel"},{"t":"Ein zu hoher Verkaufspreis"}],"e":"Beim Instruktionsfehler ist das Produkt selbst technisch in Ordnung, aber die Anleitung oder Warnung ist unzureichend, sodass der Nutzer Gefahren nicht erkennt (z. B. fehlender Warnhinweis)."},{"id":"R-PH-005","f":1,"sub":"Produkthaftung/Datenschutz","t":"mc","q":"Wer gilt neben dem eigentlichen Hersteller nach dem ProdHaftG ebenfalls als Hersteller?","o":[{"t":"Der Quasihersteller (Marke) und der Importeur in den EWR","ok":1},{"t":"Der Endkunde"},{"t":"Der Spediteur"},{"t":"Der Betriebsrat"}],"e":"§ 4 ProdHaftG: Als Hersteller gelten auch derjenige, der sich durch Anbringen seiner Marke als Hersteller ausgibt (Quasihersteller), und der Importeur, der das Produkt in den Europäischen Wirtschaftsraum einführt."},{"id":"R-PH-006","f":1,"sub":"Produkthaftung/Datenschutz","t":"mc","q":"Worin unterscheidet sich die Produzentenhaftung nach § 823 BGB von der Haftung nach dem ProdHaftG?","o":[{"t":"Die Produzentenhaftung setzt Verschulden voraus (allerdings mit Beweislastumkehr), die ProdHaftG-Haftung nicht","ok":1},{"t":"Beide sind völlig identisch"},{"t":"Die Produzentenhaftung kennt kein Verschulden"},{"t":"Die ProdHaftG-Haftung verlangt Vorsatz"}],"e":"Die deliktische Produzentenhaftung (§ 823 BGB) ist eine Verschuldenshaftung; die Rechtsprechung kehrt jedoch die Beweislast zulasten des Herstellers um. Das ProdHaftG haftet dagegen verschuldensunabhängig."},{"id":"R-PH-007","f":1,"sub":"Produkthaftung/Datenschutz","t":"mc","q":"Haftet der Hersteller nach dem ProdHaftG auch für einen einzelnen „Ausreißer“ in der Produktion?","o":[{"t":"Ja, auch ein einzelner Fabrikationsfehler löst die Haftung aus","ok":1},{"t":"Nein, nur bei Serienfehlern"},{"t":"Nur wenn Vorsatz vorliegt"},{"t":"Nur bei mehr als 100 betroffenen Stücken"}],"e":"Da die Haftung verschuldensunabhängig ist, haftet der Hersteller auch für einen einzelnen fehlerhaften „Ausreißer“, der trotz Sorgfalt entstanden ist."},{"id":"R-PH-008","f":1,"sub":"Produkthaftung/Datenschutz","t":"mc","q":"Welche Schäden werden nach dem ProdHaftG grundsätzlich ersetzt?","o":[{"t":"Personenschäden sowie bestimmte Sachschäden an privat genutzten Sachen (mit Selbstbeteiligung)","ok":1},{"t":"Ausschließlich Vermögensschäden"},{"t":"Nur Schäden am fehlerhaften Produkt selbst"},{"t":"Gar keine Schäden"}],"e":"Ersetzt werden Personenschäden (Tod, Körper-/Gesundheitsverletzung) und Sachschäden an anderen, überwiegend privat genutzten Sachen. Bei Sachschäden gilt eine Selbstbeteiligung (500 €); der Schaden am Produkt selbst wird nicht ersetzt."},{"id":"R-PH-009","f":1,"sub":"Produkthaftung/Datenschutz","t":"mc","q":"Welche Selbstbeteiligung sieht das ProdHaftG bei Sachschäden vor?","o":[{"t":"500 Euro","ok":1},{"t":"50 Euro"},{"t":"5.000 Euro"},{"t":"Keine Selbstbeteiligung"}],"e":"§ 11 ProdHaftG: Bei Sachschäden trägt der Geschädigte einen Selbstbehalt von 500 €. Personenschäden werden ohne Selbstbeteiligung ersetzt."},{"id":"R-PH-010","f":1,"sub":"Produkthaftung/Datenschutz","t":"mc","q":"Innerhalb welcher Frist verjähren Ansprüche nach dem ProdHaftG (ab Kenntnis)?","o":[{"t":"In 3 Jahren ab Kenntnis von Schaden und Ersatzpflichtigem","ok":1},{"t":"In 6 Monaten"},{"t":"In 30 Jahren"},{"t":"Sie verjähren nie"}],"e":"§ 12 ProdHaftG: Der Anspruch verjährt in drei Jahren ab Kenntnis von Schaden, Fehler und Ersatzpflichtigem. Unabhängig davon erlischt er zehn Jahre nach Inverkehrbringen des Produkts (§ 13)."},{"id":"R-PH-011","f":1,"sub":"Produkthaftung/Datenschutz","t":"mc","q":"Nach welcher Frist erlischt der Anspruch aus dem ProdHaftG spätestens nach Inverkehrbringen?","o":[{"t":"Nach 10 Jahren","ok":1},{"t":"Nach 3 Jahren"},{"t":"Nach 20 Jahren"},{"t":"Nach 5 Jahren"}],"e":"§ 13 ProdHaftG: Der Anspruch erlischt zehn Jahre nach dem Inverkehrbringen des schadensverursachenden Produkts (Ausschlussfrist), unabhängig von der Kenntnis des Geschädigten."},{"id":"R-PH-012","f":1,"sub":"Produkthaftung/Datenschutz","t":"mc","q":"Was ist ein „Produkt“ im Sinne des ProdHaftG?","o":[{"t":"Grundsätzlich jede bewegliche Sache sowie Elektrizität","ok":1},{"t":"Nur Dienstleistungen"},{"t":"Nur Grundstücke"},{"t":"Nur Software"}],"e":"§ 2 ProdHaftG: Produkt ist jede bewegliche Sache (auch wenn Teil einer anderen Sache) sowie Elektrizität. (Durch die EU-Novelle 2024/2853, umzusetzen bis 9.12.2026, wird der Produktbegriff u. a. auf Software erweitert.)"},{"id":"R-PH-013","f":1,"sub":"Produkthaftung/Datenschutz","t":"mc","q":"Was sind personenbezogene Daten im Sinne der DSGVO?","o":[{"t":"Alle Informationen, die sich auf eine identifizierte oder identifizierbare natürliche Person beziehen","ok":1},{"t":"Nur Bankverbindungen"},{"t":"Ausschließlich Gesundheitsdaten"},{"t":"Nur Daten von Unternehmen"}],"e":"Art. 4 DSGVO: Personenbezogene Daten sind alle Informationen, die sich auf eine bestimmte oder bestimmbare natürliche Person beziehen (z. B. Name, Adresse, Kennnummer, Standortdaten)."},{"id":"R-PH-014","f":1,"sub":"Produkthaftung/Datenschutz","t":"mc","q":"Welche Grundsätze für die Verarbeitung personenbezogener Daten nennt Art. 5 DSGVO?","o":[{"t":"U. a. Rechtmäßigkeit, Zweckbindung, Datenminimierung, Richtigkeit, Speicherbegrenzung, Integrität/Vertraulichkeit","ok":1},{"t":"Nur Gewinnmaximierung"},{"t":"Ausschließlich Öffentlichkeit"},{"t":"Beliebige Weitergabe"}],"e":"Art. 5 DSGVO: Daten sind rechtmäßig, nach Treu und Glauben und transparent zu verarbeiten, zweckgebunden, auf das Nötige beschränkt (Datenminimierung), richtig, nur begrenzt speicherbar und angemessen zu sichern; hinzu kommt die Rechenschaftspflicht."},{"id":"R-PH-015","f":1,"sub":"Produkthaftung/Datenschutz","t":"mc","q":"Was besagt der Grundsatz der Datenminimierung?","o":[{"t":"Es dürfen nur so viele Daten verarbeitet werden, wie für den Zweck erforderlich sind","ok":1},{"t":"Es sollen möglichst viele Daten gesammelt werden"},{"t":"Daten müssen dauerhaft gespeichert werden"},{"t":"Alle Daten sind zu veröffentlichen"}],"e":"Die Verarbeitung ist auf das für den jeweiligen Zweck notwendige Maß zu beschränken (Art. 5 Abs. 1 lit. c DSGVO) – überflüssige Daten dürfen nicht erhoben oder gespeichert werden."},{"id":"R-PH-016","f":1,"sub":"Produkthaftung/Datenschutz","t":"mc","q":"Auf welche Rechtsgrundlagen kann eine Datenverarbeitung nach Art. 6 DSGVO gestützt werden?","o":[{"t":"U. a. Einwilligung, Vertragserfüllung, rechtliche Verpflichtung, berechtigtes Interesse","ok":1},{"t":"Nur die Einwilligung"},{"t":"Nur die Zustimmung des Betriebsrats"},{"t":"Es ist keine Rechtsgrundlage nötig"}],"e":"Art. 6 DSGVO: Rechtmäßig ist die Verarbeitung u. a. bei Einwilligung, zur Vertragserfüllung, zur Erfüllung einer rechtlichen Verpflichtung, zum Schutz lebenswichtiger Interessen, zur Wahrnehmung öffentlicher Aufgaben oder aufgrund überwiegender berechtigter Interessen."},{"id":"R-PH-017","f":1,"sub":"Produkthaftung/Datenschutz","t":"mc","q":"Welche Rechte haben betroffene Personen nach der DSGVO?","o":[{"t":"U. a. Auskunft, Berichtigung, Löschung, Einschränkung, Datenübertragbarkeit und Widerspruch","ok":1},{"t":"Nur ein Recht auf Werbung"},{"t":"Gar keine Rechte"},{"t":"Nur das Recht zu schweigen"}],"e":"Betroffene haben u. a. Rechte auf Auskunft (Art. 15), Berichtigung (16), Löschung/„Recht auf Vergessenwerden“ (17), Einschränkung (18), Datenübertragbarkeit (20) und Widerspruch (21)."},{"id":"R-PH-018","f":1,"sub":"Produkthaftung/Datenschutz","t":"mc","q":"Was wird als „Recht auf Vergessenwerden“ bezeichnet?","o":[{"t":"Das Recht auf Löschung personenbezogener Daten (Art. 17 DSGVO)","ok":1},{"t":"Das Recht, seinen Namen zu ändern"},{"t":"Das Recht auf bezahlten Urlaub"},{"t":"Das Recht auf Akteneinsicht der Behörde"}],"e":"Art. 17 DSGVO gibt der betroffenen Person unter bestimmten Voraussetzungen einen Anspruch auf Löschung ihrer Daten (z. B. wenn der Zweck entfallen ist oder die Einwilligung widerrufen wurde)."},{"id":"R-PH-019","f":1,"sub":"Produkthaftung/Datenschutz","t":"mc","q":"Ab wann muss ein Unternehmen in Deutschland grundsätzlich einen Datenschutzbeauftragten benennen (§ 38 BDSG)?","o":[{"t":"Wenn in der Regel mindestens 20 Personen ständig mit automatisierter Verarbeitung personenbezogener Daten beschäftigt sind","ok":1},{"t":"Ab dem ersten Beschäftigten immer"},{"t":"Erst ab 250 Beschäftigten"},{"t":"Nur Behörden brauchen einen"}],"e":"§ 38 BDSG: Zusätzlich zu den Fällen des Art. 37 DSGVO ist ein Datenschutzbeauftragter zu benennen, wenn i. d. R. mindestens 20 Personen ständig mit automatisierter Verarbeitung befasst sind (bzw. bei umfangreicher besonderer Verarbeitung)."},{"id":"R-PH-020","f":1,"sub":"Produkthaftung/Datenschutz","t":"mc","q":"Was ist eine Auftragsverarbeitung (Art. 28 DSGVO)?","o":[{"t":"Ein Dienstleister verarbeitet personenbezogene Daten im Auftrag und nach Weisung des Verantwortlichen (mit Vertrag)","ok":1},{"t":"Der Verkauf von Daten an Dritte"},{"t":"Die Löschung aller Daten"},{"t":"Die anonyme Marktforschung"}],"e":"Bei der Auftragsverarbeitung (z. B. externer Lohnabrechner, Cloud-Anbieter) verarbeitet ein Auftragsverarbeiter Daten weisungsgebunden für den Verantwortlichen; erforderlich ist ein Auftragsverarbeitungsvertrag mit festgelegten Pflichten."},{"id":"R-PH-021","f":1,"sub":"Produkthaftung/Datenschutz","t":"mc","q":"Innerhalb welcher Frist ist eine meldepflichtige Verletzung des Schutzes personenbezogener Daten der Aufsichtsbehörde zu melden?","o":[{"t":"Innerhalb von 72 Stunden nach Bekanntwerden","ok":1},{"t":"Innerhalb von 6 Monaten"},{"t":"Innerhalb von 30 Tagen"},{"t":"Es besteht keine Meldepflicht"}],"e":"Art. 33 DSGVO: Der Verantwortliche muss eine Datenschutzverletzung, die ein Risiko für die Rechte der Betroffenen birgt, unverzüglich und möglichst binnen 72 Stunden der Aufsichtsbehörde melden."},{"id":"R-PH-022","f":1,"sub":"Produkthaftung/Datenschutz","t":"mc","q":"Was sind technische und organisatorische Maßnahmen (TOM) im Datenschutz?","o":[{"t":"Maßnahmen zum Schutz der Daten wie Zugriffskontrolle, Verschlüsselung, Berechtigungskonzepte und Schulungen","ok":1},{"t":"Marketingmaßnahmen"},{"t":"Steuerliche Abschreibungen"},{"t":"Maßnahmen der Lohnbuchhaltung"}],"e":"Art. 32 DSGVO: Der Verantwortliche muss durch geeignete technische (z. B. Verschlüsselung, Zugriffskontrolle) und organisatorische Maßnahmen (z. B. Berechtigungskonzepte, Unterweisung) ein angemessenes Schutzniveau sicherstellen."},{"id":"R-PH-023","f":1,"sub":"Produkthaftung/Datenschutz","t":"mc","q":"Wie hoch können Geldbußen bei schweren Verstößen gegen die DSGVO maximal ausfallen?","o":[{"t":"Bis zu 20 Mio. € oder 4 % des weltweiten Jahresumsatzes (der höhere Betrag gilt)","ok":1},{"t":"Höchstens 500 €"},{"t":"Höchstens 5.000 €"},{"t":"Es gibt keine Bußgelder"}],"e":"Art. 83 DSGVO: Bei schweren Verstößen drohen Geldbußen von bis zu 20 Mio. € oder bis zu 4 % des gesamten weltweit erzielten Jahresumsatzes des vorangegangenen Geschäftsjahres – je nachdem, welcher Betrag höher ist."},{"id":"R-PH-024","f":1,"sub":"Produkthaftung/Datenschutz","t":"mc","q":"Welche Vorschrift regelt in Deutschland speziell den Beschäftigtendatenschutz?","o":[{"t":"§ 26 BDSG","ok":1},{"t":"§ 611 BGB"},{"t":"§ 1 ArbZG"},{"t":"§ 87 BetrVG"}],"e":"§ 26 BDSG erlaubt die Verarbeitung von Beschäftigtendaten, soweit sie für Begründung, Durchführung oder Beendigung des Arbeitsverhältnisses erforderlich ist; er konkretisiert die DSGVO für den Beschäftigungskontext."},{"id":"R-PH-025","f":1,"sub":"Produkthaftung/Datenschutz","t":"open","q":"Erläutern Sie den Unterschied zwischen der Haftung nach dem Produkthaftungsgesetz und der Produzentenhaftung nach § 823 BGB.","a":"Die Haftung nach dem Produkthaftungsgesetz (ProdHaftG) ist eine Gefährdungshaftung: Der Hersteller haftet für Schäden durch ein fehlerhaftes Produkt unabhängig von einem Verschulden. Ersetzt werden Personenschäden und bestimmte private Sachschäden (mit 500 € Selbstbeteiligung), nicht aber der Schaden am Produkt selbst; es gilt eine Höchstgrenze bei Personenschäden. Die Produzentenhaftung nach § 823 BGB ist dagegen eine Verschuldenshaftung (deliktische Haftung) – allerdings mit Beweislastumkehr zulasten des Herstellers, der sich entlasten muss. Beide Haftungsgrundlagen können nebeneinander bestehen; das ProdHaftG erleichtert dem Geschädigten die Durchsetzung, da er kein Verschulden nachweisen muss.","e":"Merksatz: ProdHaftG = ohne Verschulden (Gefährdungshaftung); § 823 BGB = mit Verschulden, aber Beweislast beim Hersteller."},{"id":"R-AR-076","f":1,"sub":"Arbeitsrecht","t":"open","q":"Nennen Sie die drei Kündigungsgründe, die das Kündigungsschutzgesetz als sozial gerechtfertigt anerkennt, und geben Sie zu jedem ein Beispiel.","a":"1) Personenbedingte Kündigung – Gründe liegen in der Person des Arbeitnehmers, ohne dass ihn ein Verschulden trifft (Beispiel: langanhaltende oder häufige Krankheit, dauerhafter Verlust einer erforderlichen Fahrerlaubnis). 2) Verhaltensbedingte Kündigung – der Arbeitnehmer verletzt schuldhaft seine Pflichten, i. d. R. nach vorheriger Abmahnung (Beispiel: wiederholtes unentschuldigtes Fehlen, Arbeitsverweigerung). 3) Betriebsbedingte Kündigung – der Arbeitsplatz fällt aus betrieblichen Gründen weg, unter Beachtung der Sozialauswahl (Beispiel: Auftragsrückgang, Stilllegung einer Abteilung, Rationalisierung).","e":"Grundlage ist § 1 KSchG. Bei der verhaltensbedingten Kündigung ist regelmäßig eine Abmahnung, bei der betriebsbedingten die Sozialauswahl zu beachten."},{"id":"R-AR-077","f":1,"sub":"Arbeitsrecht","t":"open","q":"Erläutern Sie den Unterschied zwischen einer ordentlichen und einer außerordentlichen Kündigung.","a":"Die ordentliche Kündigung erfolgt unter Einhaltung der gesetzlichen, tariflichen oder vertraglichen Kündigungsfrist (§ 622 BGB) und beendet das Arbeitsverhältnis erst zum Ablauf dieser Frist; im Geltungsbereich des KSchG muss sie sozial gerechtfertigt sein. Die außerordentliche (in der Regel fristlose) Kündigung nach § 626 BGB beendet das Arbeitsverhältnis sofort oder mit kurzer Auslauffrist. Sie setzt einen wichtigen Grund voraus, der die Fortsetzung bis zum Ablauf der ordentlichen Frist unzumutbar macht, und muss innerhalb von zwei Wochen ab Kenntnis des Grundes erklärt werden. Beide bedürfen der Schriftform (§ 623 BGB).","e":"Merksatz: ordentlich = mit Frist und (bei KSchG) sozialer Rechtfertigung; außerordentlich = wichtiger Grund, 2-Wochen-Frist, sofortige Wirkung."},{"id":"R-AR-078","f":1,"sub":"Arbeitsrecht","t":"open","q":"Beschreiben Sie die Rangfolge der arbeitsrechtlichen Rechtsquellen und erläutern Sie, was das Günstigkeitsprinzip bewirkt.","a":"Die Rangfolge (Normenpyramide) lautet von oben nach unten: EU-Recht, Grundgesetz, formelle Gesetze, Tarifvertrag, Betriebsvereinbarung, Arbeitsvertrag und schließlich das Weisungsrecht des Arbeitgebers. Grundsätzlich verdrängt die höherrangige die rangniedrigere Regelung (Rangprinzip). Das Günstigkeitsprinzip durchbricht diese Regel: Eine rangniedrigere Regelung setzt sich durch, wenn sie für den Arbeitnehmer günstiger ist. Weicht z. B. der Arbeitsvertrag zugunsten des Arbeitnehmers vom Tarifvertrag ab, gilt die günstigere vertragliche Regelung.","e":"Das Günstigkeitsprinzip stellt sicher, dass tarifliche oder gesetzliche Mindeststandards nach oben – zugunsten des Arbeitnehmers – überschritten werden dürfen."},{"id":"R-AR-079","f":1,"sub":"Arbeitsrecht","t":"open","q":"Welche Funktion hat eine Abmahnung, und welche Bedeutung hat sie für eine verhaltensbedingte Kündigung?","a":"Die Abmahnung hat zwei Funktionen: die Rügefunktion (sie beanstandet ein konkretes Fehlverhalten und hält es dem Arbeitnehmer vor) und die Warnfunktion (sie kündigt an, dass im Wiederholungsfall arbeitsrechtliche Konsequenzen bis zur Kündigung drohen). Für eine verhaltensbedingte Kündigung ist sie regelmäßig Voraussetzung: Der Arbeitnehmer muss zuvor Gelegenheit gehabt haben, sein Verhalten zu ändern. Erst wenn er trotz einschlägiger Abmahnung erneut gleichartig gegen seine Pflichten verstößt, ist eine verhaltensbedingte Kündigung in der Regel wirksam. Eine Abmahnung ist nur bei schweren Pflichtverletzungen entbehrlich.","e":"Ohne vorherige (einschlägige) Abmahnung ist eine verhaltensbedingte Kündigung meist unwirksam, weil das mildere Mittel nicht ausgeschöpft wurde."},{"id":"R-BR-076","f":1,"sub":"Betriebsverfassung","t":"open","q":"Nennen Sie vier Angelegenheiten, in denen der Betriebsrat nach § 87 BetrVG ein erzwingbares Mitbestimmungsrecht hat.","a":"Zum Beispiel: (1) Fragen der Ordnung des Betriebs und des Verhaltens der Arbeitnehmer; (2) Beginn und Ende der täglichen Arbeitszeit einschließlich der Pausen sowie die Verteilung auf die Wochentage; (3) vorübergehende Verkürzung oder Verlängerung der Arbeitszeit (z. B. Überstunden, Kurzarbeit); (4) Aufstellung allgemeiner Urlaubsgrundsätze und des Urlaubsplans; (5) Einführung und Anwendung technischer Einrichtungen zur Überwachung von Verhalten oder Leistung; (6) Fragen der betrieblichen Lohngestaltung und Festlegung von Akkord-/Prämiensätzen. Kommt keine Einigung zustande, entscheidet die Einigungsstelle.","e":"§ 87 BetrVG betrifft die sozialen Angelegenheiten; die Mitbestimmung ist erzwingbar (Ersetzung der Einigung durch die Einigungsstelle)."},{"id":"R-BR-077","f":1,"sub":"Betriebsverfassung","t":"open","q":"Erläutern Sie die Abstufung der Beteiligungsrechte des Betriebsrats von der schwächsten bis zur stärksten Form.","a":"Die Beteiligungsrechte sind abgestuft: (1) Informationsrecht – der Betriebsrat wird lediglich unterrichtet; (2) Anhörungsrecht – er kann vor einer Maßnahme Stellung nehmen, die Entscheidung trifft aber der Arbeitgeber (z. B. Anhörung vor jeder Kündigung, § 102); (3) Beratungsrecht – Arbeitgeber und Betriebsrat müssen die Angelegenheit gemeinsam erörtern; (4) Mitbestimmungsrecht – die stärkste Form: Der Arbeitgeber kann ohne Zustimmung des Betriebsrats nicht handeln; bei Nichteinigung entscheidet die Einigungsstelle (z. B. soziale Angelegenheiten nach § 87). Je stärker das Recht, desto größer der Einfluss des Betriebsrats.","e":"Faustregel: Information < Anhörung < Beratung < Mitbestimmung. Nur die Mitbestimmung ist erzwingbar."},{"id":"R-BR-078","f":1,"sub":"Betriebsverfassung","t":"open","q":"Grenzen Sie Betriebsvereinbarung und Tarifvertrag voneinander ab (Vertragsparteien und Geltungsbereich).","a":"Der Tarifvertrag wird zwischen den Tarifvertragsparteien geschlossen – also einer Gewerkschaft und einem Arbeitgeberverband (Verbandstarif) oder einem einzelnen Arbeitgeber (Firmentarif). Er gilt unmittelbar und zwingend für die beiderseits Tarifgebundenen (Gewerkschaftsmitglieder und tarifgebundene Arbeitgeber) und regelt überbetrieblich Arbeitsbedingungen wie Entgelt, Arbeitszeit und Urlaub. Die Betriebsvereinbarung wird dagegen zwischen Arbeitgeber und Betriebsrat geschlossen und gilt unmittelbar und zwingend für alle Arbeitnehmer des jeweiligen Betriebs. Nach dem Tarifvorrang (§ 77 Abs. 3 BetrVG) dürfen Gegenstände, die üblicherweise tariflich geregelt werden, grundsätzlich nicht durch Betriebsvereinbarung geregelt werden.","e":"Kurz: Tarifvertrag = Gewerkschaft/Arbeitgeber(-verband), überbetrieblich, für Tarifgebundene; Betriebsvereinbarung = Arbeitgeber/Betriebsrat, betriebsbezogen, für alle Beschäftigten."},{"id":"R-BR-079","f":1,"sub":"Betriebsverfassung","t":"open","q":"Erläutern Sie die Beteiligung des Betriebsrats bei einer Kündigung nach § 102 BetrVG und die Folge einer unterlassenen Anhörung.","a":"Nach § 102 BetrVG ist der Betriebsrat vor jeder Kündigung anzuhören. Der Arbeitgeber muss ihm die Person des zu Kündigenden, die Art der Kündigung und die Kündigungsgründe mitteilen. Der Betriebsrat kann bei einer ordentlichen Kündigung innerhalb einer Woche (bei außerordentlicher innerhalb von drei Tagen) Bedenken äußern oder widersprechen. Die Anhörung ist ein reines Beteiligungsrecht – der Arbeitgeber kann trotz Widerspruchs kündigen. Wird der Betriebsrat jedoch überhaupt nicht oder nicht ordnungsgemäß angehört, ist die Kündigung unwirksam.","e":"Die Anhörung ist Wirksamkeitsvoraussetzung: Fehlt sie, ist die Kündigung unwirksam – unabhängig davon, ob ein Kündigungsgrund vorlag."},{"id":"R-BR-080","f":1,"sub":"Betriebsverfassung","t":"open","q":"Nennen und erläutern Sie die wesentlichen Voraussetzungen eines rechtmäßigen Streiks.","a":"Ein rechtmäßiger Streik muss mehrere Voraussetzungen erfüllen: (1) Gewerkschaftliche Trägerschaft – er muss von einer Gewerkschaft getragen oder übernommen werden (ein „wilder Streik“ ohne Gewerkschaft ist rechtswidrig). (2) Tariflich regelbares Ziel – gestreikt werden darf nur für Ziele, die durch Tarifvertrag geregelt werden können (kein politischer Streik). (3) Ablauf der Friedenspflicht – während der Laufzeit eines Tarifvertrags darf über dessen Gegenstände nicht gestreikt werden. (4) Verhältnismäßigkeit – der Streik muss geeignet, erforderlich und angemessen sein und ist letztes Mittel (ultima ratio), nachdem Verhandlungen gescheitert sind. Zudem sind Not- und Erhaltungsarbeiten sicherzustellen.","e":"Fehlt eine dieser Voraussetzungen, ist der Arbeitskampf rechtswidrig; die Teilnehmer verletzen dann ihre arbeitsvertraglichen Pflichten."},{"id":"R-SV-026","f":1,"sub":"Sozialversicherung","t":"open","q":"Nennen Sie die fünf Zweige der gesetzlichen Sozialversicherung und geben Sie an, welcher Zweig allein vom Arbeitgeber finanziert wird.","a":"Die fünf Zweige sind: 1) Krankenversicherung, 2) Rentenversicherung, 3) Arbeitslosenversicherung, 4) Pflegeversicherung und 5) Unfallversicherung. Die Kranken-, Renten-, Arbeitslosen- und Pflegeversicherung werden grundsätzlich paritätisch von Arbeitgeber und Arbeitnehmer getragen. Die gesetzliche Unfallversicherung (Träger: Berufsgenossenschaften) wird dagegen allein vom Arbeitgeber finanziert.","e":"Merkhilfe: Nur die Unfallversicherung zahlt der Arbeitgeber allein – die übrigen vier teilen sich beide Seiten (mit Sonderregeln beim KV-Zusatzbeitrag und beim Pflege-Zuschlag für Kinderlose)."},{"id":"R-SV-027","f":1,"sub":"Sozialversicherung","t":"open","q":"Erläutern Sie den Unterschied zwischen dem Solidaritätsprinzip der Sozialversicherung und dem Äquivalenzprinzip der Privatversicherung.","a":"Beim Solidaritätsprinzip der gesetzlichen Sozialversicherung richten sich die Beiträge nach dem Einkommen (leistungsfähige Versicherte zahlen mehr), die Leistungen dagegen nach dem Bedarf und sind grundsätzlich für alle gleich. Es findet ein sozialer Ausgleich statt (Gesunde für Kranke, Gutverdiener für Geringverdiener, Kinderlose für Familien). Beim Äquivalenzprinzip der Privatversicherung bemisst sich der Beitrag dagegen nach dem individuellen Risiko: Wer ein höheres Risiko hat (z. B. Vorerkrankungen, höheres Alter), zahlt einen höheren Beitrag; Beitrag und erwartete Leistung entsprechen einander.","e":"Kurz: Sozialversicherung = einkommensabhängiger Beitrag, bedarfsorientierte Leistung (Solidarausgleich); Privatversicherung = risikoäquivalenter Beitrag."},{"id":"R-AS-026","f":1,"sub":"Arbeitsschutz","t":"open","q":"Beschreiben Sie die Schritte einer Gefährdungsbeurteilung nach dem Arbeitsschutzgesetz.","a":"Die Gefährdungsbeurteilung ist ein fortlaufender Regelkreis: 1) Arbeitsbereiche und Tätigkeiten erfassen; 2) Gefährdungen ermitteln (z. B. mechanische, elektrische, chemische, psychische Belastungen); 3) Gefährdungen beurteilen (Risiko einschätzen); 4) geeignete Schutzmaßnahmen festlegen (nach der Rangfolge Substitution – technisch – organisatorisch – personenbezogen); 5) Maßnahmen durchführen; 6) Wirksamkeit der Maßnahmen überprüfen; 7) das Ergebnis dokumentieren und die Beurteilung bei Änderungen fortschreiben. Verantwortlich ist der Arbeitgeber (§ 5 ArbSchG).","e":"Die Gefährdungsbeurteilung ist Grundlage des betrieblichen Arbeitsschutzes und muss dokumentiert und regelmäßig aktualisiert werden."},{"id":"R-AS-027","f":1,"sub":"Arbeitsschutz","t":"open","q":"Erläutern Sie, was unter dem dualen Arbeitsschutzsystem in Deutschland zu verstehen ist.","a":"Der Arbeitsschutz wird in Deutschland von zwei Säulen getragen. Die erste Säule ist der staatliche Arbeitsschutz: Der Staat erlässt Gesetze und Verordnungen (z. B. ArbSchG, ArbStättV, BetrSichV, GefStoffV), und die Behörden der Länder (Gewerbeaufsicht/Arbeitsschutzbehörden) überwachen deren Einhaltung. Die zweite Säule sind die Unfallversicherungsträger (Berufsgenossenschaften und Unfallkassen): Sie erlassen autonome Unfallverhütungsvorschriften (DGUV-Vorschriften), beraten und überwachen die Betriebe und übernehmen Prävention, Rehabilitation und Entschädigung bei Arbeitsunfällen und Berufskrankheiten. Beide Systeme greifen ineinander.","e":"Zwei Träger, ein Ziel: Staat (Gesetze/Aufsicht) und Unfallversicherung (DGUV-Vorschriften/Prävention) sichern gemeinsam den Arbeitsschutz."},{"id":"R-UW-026","f":1,"sub":"Umweltrecht","t":"open","q":"Nennen Sie die drei Grundprinzipien des Umweltrechts und erläutern Sie das Verursacherprinzip.","a":"Die drei Grundprinzipien sind das Verursacherprinzip, das Vorsorgeprinzip und das Kooperationsprinzip. Das Verursacherprinzip besagt, dass derjenige, der eine Umweltbelastung verursacht, die Kosten für ihre Vermeidung, Beseitigung und den Ausgleich zu tragen hat. Es ordnet die Umweltkosten also demjenigen zu, der sie auslöst, und schafft dadurch einen Anreiz zu umweltschonendem Verhalten. Das Gegenmodell ist das Gemeinlastprinzip, bei dem die Allgemeinheit (der Staat) die Kosten trägt.","e":"Vorsorgeprinzip = Belastungen vorbeugend vermeiden; Kooperationsprinzip = Staat, Wirtschaft und Gesellschaft wirken zusammen."},{"id":"R-PH-026","f":1,"sub":"Produkthaftung/Datenschutz","t":"open","q":"Nennen Sie die drei Fehlerarten der Produkthaftung und erläutern Sie jede kurz.","a":"1) Konstruktionsfehler – der Fehler liegt bereits in der Planung/Konstruktion und betrifft daher die gesamte Serie (das Produkt ist von Grund auf unsicher gestaltet). 2) Fabrikationsfehler – ein Fehler entsteht bei der Herstellung und betrifft einzelne Stücke, auch als „Ausreißer“ trotz sorgfältiger Produktion (die Konstruktion war korrekt, die Ausführung nicht). 3) Instruktionsfehler – das Produkt ist technisch in Ordnung, aber die Gebrauchsanleitung oder Warnung ist unzureichend, sodass der Nutzer Gefahren nicht erkennt (fehlende Bedienungshinweise oder Warnhinweise).","e":"Nach dem ProdHaftG haftet der Hersteller verschuldensunabhängig für alle drei Fehlerarten – auch für einen einzelnen Fabrikations-„Ausreißer“."},{"id":"R-PH-027","f":1,"sub":"Produkthaftung/Datenschutz","t":"open","q":"Nennen Sie vier Grundsätze für die Verarbeitung personenbezogener Daten nach Art. 5 DSGVO.","a":"Zum Beispiel: (1) Rechtmäßigkeit, Verarbeitung nach Treu und Glauben und Transparenz – Verarbeitung nur auf einer Rechtsgrundlage und nachvollziehbar; (2) Zweckbindung – Daten werden nur für festgelegte, eindeutige und legitime Zwecke erhoben; (3) Datenminimierung – nur so viele Daten wie für den Zweck erforderlich; (4) Richtigkeit – Daten müssen sachlich richtig und aktuell sein; (5) Speicherbegrenzung – Daten werden nur so lange gespeichert, wie es der Zweck erfordert; (6) Integrität und Vertraulichkeit – angemessener Schutz vor unbefugtem Zugriff, Verlust oder Beschädigung. Hinzu kommt die Rechenschaftspflicht des Verantwortlichen.","e":"Diese Grundsätze bilden das Fundament der DSGVO; der Verantwortliche muss ihre Einhaltung nachweisen können (Rechenschaftspflicht)."},{"id":"Z-MO-001","f":4,"sub":"Motivation","t":"mc","q":"Was versteht man unter Motivation?","o":[{"t":"Die Gesamtheit der Beweggründe, die das Verhalten auf ein Ziel hin antreiben","ok":1},{"t":"Die Höhe des Gehalts"},{"t":"Die Zahl der Mitarbeiter"},{"t":"Die Rechtsform des Betriebs"}],"e":"Motivation ist der innere Antrieb, ein Ziel zu verfolgen. Sie entsteht aus Motiven (Bedürfnissen) und Anreizen. Führungskräfte versuchen, die Leistungsbereitschaft der Mitarbeiter zu fördern."},{"id":"Z-MO-002","f":4,"sub":"Motivation","t":"mc","q":"Worin unterscheiden sich intrinsische und extrinsische Motivation?","o":[{"t":"Intrinsische Motivation kommt aus der Tätigkeit selbst, extrinsische aus äußeren Anreizen (z. B. Geld, Lob)","ok":1},{"t":"Beide sind identisch"},{"t":"Intrinsische Motivation ist immer Geld"},{"t":"Extrinsische Motivation kommt aus Freude an der Aufgabe"}],"e":"Intrinsisch motiviert ist, wer eine Aufgabe um ihrer selbst willen gern tut (Interesse, Sinn, Freude). Extrinsische Motivation entsteht durch äußere Anreize wie Entgelt, Anerkennung, Beförderung oder Vermeidung von Nachteilen."},{"id":"Z-MO-003","f":4,"sub":"Motivation","t":"mc","q":"Worin unterscheiden sich Motiv und Motivation?","o":[{"t":"Ein Motiv ist ein einzelner Beweggrund (Bedürfnis), Motivation das aktivierte Zusammenwirken mehrerer Motive","ok":1},{"t":"Beide bedeuten dasselbe"},{"t":"Ein Motiv ist das Gehalt"},{"t":"Motivation ist ein einzelnes Bedürfnis"}],"e":"Motive sind einzelne Bedürfnisse oder Antriebe (z. B. Sicherheit, Anerkennung). Werden sie durch Anreize aktiviert und auf ein Ziel gerichtet, entsteht Motivation als handlungsleitender Zustand."},{"id":"Z-MO-004","f":4,"sub":"Motivation","t":"mc","q":"In welcher Reihenfolge sind die Bedürfnisse in der Maslow-Pyramide (von unten nach oben) angeordnet?","o":[{"t":"Physiologische → Sicherheit → soziale → Wertschätzung → Selbstverwirklichung","ok":1},{"t":"Selbstverwirklichung → Sicherheit → physiologische"},{"t":"Soziale → physiologische → Sicherheit"},{"t":"Wertschätzung → soziale → Sicherheit → physiologische"}],"e":"Maslow ordnet die Bedürfnisse hierarchisch: physiologische (Grund-), Sicherheits-, soziale (Zugehörigkeit), Wertschätzungs- (Anerkennung) und ganz oben Selbstverwirklichungsbedürfnisse."},{"id":"Z-MO-005","f":4,"sub":"Motivation","t":"mc","q":"Welche Bedürfnisse bilden die Basis (unterste Stufe) der Maslow-Pyramide?","o":[{"t":"Die physiologischen Grundbedürfnisse (z. B. Essen, Trinken, Schlaf)","ok":1},{"t":"Die Selbstverwirklichung"},{"t":"Die Wertschätzung"},{"t":"Die sozialen Bedürfnisse"}],"e":"An der Basis stehen die physiologischen Grundbedürfnisse (Nahrung, Schlaf, Wärme). Erst wenn diese hinreichend befriedigt sind, werden die höheren Stufen verhaltenswirksam."},{"id":"Z-MO-006","f":4,"sub":"Motivation","t":"mc","q":"Was besagt das Prinzip der Maslow-Bedürfnishierarchie hinsichtlich der Motivationswirkung?","o":[{"t":"Ein weitgehend befriedigtes Bedürfnis motiviert nicht mehr; die nächsthöhere Stufe wird wirksam","ok":1},{"t":"Alle Bedürfnisse wirken immer gleich stark"},{"t":"Nur die oberste Stufe motiviert"},{"t":"Befriedigte Bedürfnisse motivieren am stärksten"}],"e":"Nach Maslow motiviert vor allem das jeweils nächste, noch unbefriedigte Bedürfnis. Ist eine Stufe (weitgehend) erfüllt, verliert sie ihre Antriebskraft, und die darüberliegende rückt in den Vordergrund."},{"id":"Z-MO-007","f":4,"sub":"Motivation","t":"mc","q":"Wie unterscheidet Maslow Defizit- und Wachstumsbedürfnisse?","o":[{"t":"Defizitbedürfnisse (Stufe 1–4) müssen gestillt werden; das Wachstumsbedürfnis (Selbstverwirklichung) ist nie ganz erfüllt","ok":1},{"t":"Beide sind identisch"},{"t":"Wachstumsbedürfnisse sind physiologisch"},{"t":"Defizitbedürfnisse sind nie erfüllbar"}],"e":"Die unteren vier Stufen sind Defizit- (Mangel-)bedürfnisse: Ihr Ausbleiben erzeugt Unzufriedenheit. Die Selbstverwirklichung ist ein Wachstumsbedürfnis, das immer weiter wächst und nicht dauerhaft gesättigt wird."},{"id":"Z-MO-008","f":4,"sub":"Motivation","t":"mc","q":"Welchem Maslow-Bedürfnis entspricht am ehesten ein sicherer, unbefristeter Arbeitsplatz?","o":[{"t":"Dem Sicherheitsbedürfnis","ok":1},{"t":"Der Selbstverwirklichung"},{"t":"Dem sozialen Bedürfnis"},{"t":"Dem physiologischen Bedürfnis"}],"e":"Ein sicherer Arbeitsplatz, geregeltes Einkommen und Schutz vor Risiken sprechen das Sicherheitsbedürfnis an (Stufe 2). Kollegialität würde das soziale, eine verantwortungsvolle Aufgabe eher das Selbstverwirklichungsbedürfnis ansprechen."},{"id":"Z-MO-009","f":4,"sub":"Motivation","t":"mc","q":"Welche Maßnahme spricht am ehesten das Bedürfnis nach Wertschätzung/Anerkennung an?","o":[{"t":"Lob für gute Leistung und öffentliche Anerkennung","ok":1},{"t":"Ein sicherer Arbeitsvertrag"},{"t":"Eine warme Kantinenmahlzeit"},{"t":"Ein Feuerlöscher am Arbeitsplatz"}],"e":"Anerkennung, Lob, Status und Respekt bedienen das Wertschätzungsbedürfnis (Stufe 4). Ein sicherer Vertrag adressiert die Sicherheit, Verpflegung die physiologische Ebene."},{"id":"Z-MO-010","f":4,"sub":"Motivation","t":"mc","q":"Welche zwei Faktorengruppen unterscheidet die Zwei-Faktoren-Theorie von Herzberg?","o":[{"t":"Hygienefaktoren und Motivatoren","ok":1},{"t":"Angebot und Nachfrage"},{"t":"Fixe und variable Kosten"},{"t":"Theorie X und Theorie Y"}],"e":"Herzberg unterscheidet Hygienefaktoren (Arbeitsumfeld/Kontext) und Motivatoren (Arbeitsinhalt). Beide wirken unterschiedlich auf Zufriedenheit und Unzufriedenheit."},{"id":"Z-MO-011","f":4,"sub":"Motivation","t":"mc","q":"Was bewirken Hygienefaktoren nach Herzberg?","o":[{"t":"Ihr Fehlen erzeugt Unzufriedenheit; ihr Vorhandensein verhindert Unzufriedenheit, motiviert aber nicht","ok":1},{"t":"Sie erzeugen dauerhaft hohe Motivation"},{"t":"Sie haben keine Wirkung"},{"t":"Sie ersetzen die Motivatoren"}],"e":"Hygienefaktoren (z. B. Gehalt, Arbeitsbedingungen, Sicherheit, Beziehungen, Unternehmenspolitik) beugen Unzufriedenheit vor. Sind sie schlecht, entsteht Unzufriedenheit; sind sie gut, entsteht aber noch keine echte Motivation."},{"id":"Z-MO-012","f":4,"sub":"Motivation","t":"mc","q":"Was zählt nach Herzberg zu den Motivatoren?","o":[{"t":"Leistungserfolg, Anerkennung, verantwortungsvolle Aufgaben und Aufstieg","ok":1},{"t":"Gehalt und Arbeitsplatzsicherheit"},{"t":"Arbeitsbedingungen und Firmenwagen"},{"t":"Kantine und Parkplatz"}],"e":"Motivatoren liegen im Arbeitsinhalt: die Arbeit selbst, Leistungserfolg, Anerkennung, Verantwortung, Entwicklungs- und Aufstiegsmöglichkeiten. Sie erzeugen echte Zufriedenheit und Motivation."},{"id":"Z-MO-013","f":4,"sub":"Motivation","t":"mc","q":"Ist das Gehalt nach Herzberg ein Motivator oder ein Hygienefaktor?","o":[{"t":"In der Regel ein Hygienefaktor","ok":1},{"t":"Ein reiner Motivator"},{"t":"Beides gleichzeitig und dauerhaft motivierend"},{"t":"Weder noch"}],"e":"Das Gehalt zählt Herzberg zu den Hygienefaktoren: Ein als unfair empfundenes Gehalt demotiviert, ein angemessenes verhindert Unzufriedenheit – dauerhaft motivierend wirkt es aber meist nicht. Anerkennung und interessante Aufgaben motivieren nachhaltiger."},{"id":"Z-MO-014","f":4,"sub":"Motivation","t":"mc","q":"Welche praktische Folgerung ergibt sich aus Herzbergs Theorie für die Führung?","o":[{"t":"Gute Arbeitsbedingungen allein reichen nicht – Motivation entsteht durch interessante, anerkannte und verantwortungsvolle Aufgaben","ok":1},{"t":"Nur das Gehalt entscheidet über Motivation"},{"t":"Motivatoren sind unwichtig"},{"t":"Hygienefaktoren dürfen vernachlässigt werden"}],"e":"Führungskräfte müssen zunächst die Hygienefaktoren in Ordnung halten (sonst droht Unzufriedenheit), zusätzlich aber gezielt Motivatoren fördern – etwa durch Aufgabenbereicherung, Anerkennung und Übertragung von Verantwortung."},{"id":"Z-MO-015","f":4,"sub":"Motivation","t":"mc","q":"Was besagt die Theorie X von McGregor über den Menschen?","o":[{"t":"Der Mensch ist von Natur aus arbeitsunlustig, muss geführt, kontrolliert und ggf. gezwungen werden","ok":1},{"t":"Der Mensch arbeitet gern und übernimmt Verantwortung"},{"t":"Der Mensch braucht keine Führung"},{"t":"Der Mensch ist immer hochmotiviert"}],"e":"Nach Theorie X scheut der Mensch die Arbeit, meidet Verantwortung und muss durch Kontrolle, Anweisung und Druck zur Leistung gebracht werden. Dieses Menschenbild führt zu autoritärer Führung."},{"id":"Z-MO-016","f":4,"sub":"Motivation","t":"mc","q":"Was besagt die Theorie Y von McGregor?","o":[{"t":"Der Mensch ist von Natur aus leistungsbereit, sucht Verantwortung und findet in der Arbeit Erfüllung","ok":1},{"t":"Der Mensch ist grundsätzlich faul"},{"t":"Nur Geld motiviert"},{"t":"Kontrolle ist die einzige Motivation"}],"e":"Nach Theorie Y ist Arbeit ein natürliches Bedürfnis; der Mensch ist eigeninitiativ, übernimmt gern Verantwortung und entfaltet Kreativität, wenn man ihm Freiraum gibt. Dieses Menschenbild führt zu kooperativer Führung."},{"id":"Z-MO-017","f":4,"sub":"Motivation","t":"mc","q":"Welchen Führungsstil legt das Menschenbild der Theorie Y nahe?","o":[{"t":"Einen kooperativen, delegierenden Führungsstil","ok":1},{"t":"Einen streng autoritären Stil"},{"t":"Führung durch ständige Kontrolle und Druck"},{"t":"Gar keine Führung"}],"e":"Wer von einem leistungsbereiten, verantwortungsbewussten Menschen ausgeht (Theorie Y), führt kooperativ: Er delegiert, beteiligt und schafft Freiräume. Theorie X würde dagegen zu autoritärer Kontrolle führen. Das Menschenbild kann zur selbsterfüllenden Prophezeiung werden."},{"id":"Z-MO-018","f":4,"sub":"Motivation","t":"mc","q":"Worin unterscheiden sich materielle und immaterielle Anreize?","o":[{"t":"Materielle Anreize sind geldwert (z. B. Lohn, Prämie), immaterielle nicht (z. B. Lob, Aufstieg, gutes Klima)","ok":1},{"t":"Beide sind identisch"},{"t":"Immaterielle Anreize sind stets Geld"},{"t":"Materielle Anreize sind nur Lob"}],"e":"Materielle (finanzielle) Anreize umfassen Lohn, Prämien, Zulagen und Sachleistungen. Immaterielle Anreize wirken über Anerkennung, interessante Aufgaben, Aufstiegs- und Entwicklungsmöglichkeiten, Mitbestimmung und Betriebsklima."},{"id":"Z-MO-019","f":4,"sub":"Motivation","t":"mc","q":"Was versteht man unter Betriebsklima?","o":[{"t":"Die von den Mitarbeitern erlebte Qualität der Zusammenarbeit und Atmosphäre im Betrieb","ok":1},{"t":"Die Raumtemperatur in der Werkstatt"},{"t":"Die Zahl der Urlaubstage"},{"t":"Die Höhe des Umsatzes"}],"e":"Das Betriebsklima ist die subjektiv wahrgenommene Stimmung und Beziehungsqualität im Unternehmen (Führung, Kollegialität, Kommunikation, Wertschätzung). Ein gutes Klima fördert Zufriedenheit, Motivation und Bindung."},{"id":"Z-MO-020","f":4,"sub":"Motivation","t":"mc","q":"Welche Folge hat dauerhaft geringe Motivation und Unzufriedenheit häufig?","o":[{"t":"Höhere Fehlzeiten, Fluktuation, innere Kündigung und sinkende Leistung","ok":1},{"t":"Automatisch höhere Gewinne"},{"t":"Bessere Qualität ohne Zutun"},{"t":"Keinerlei Auswirkung"}],"e":"Anhaltende Demotivation zeigt sich in Fehlzeiten, hoher Fluktuation, „innerer Kündigung“ (Dienst nach Vorschrift), sinkender Produktivität und Qualität. Motivierende Führung und ein gutes Klima wirken dem entgegen."},{"id":"Z-MO-021","f":4,"sub":"Motivation","t":"mc","q":"Was bedeutet „innere Kündigung“?","o":[{"t":"Ein Mitarbeiter hat innerlich abgeschlossen und leistet nur noch das Nötigste (Dienst nach Vorschrift)","ok":1},{"t":"Die schriftliche Kündigung durch den Arbeitgeber"},{"t":"Eine besonders hohe Motivation"},{"t":"Ein Aufhebungsvertrag"}],"e":"Bei der inneren Kündigung bleibt der Mitarbeiter zwar im Betrieb, hat sich aber emotional und im Engagement zurückgezogen. Ursachen sind oft mangelnde Anerkennung, Frust oder schlechte Führung. Sie ist ein Warnsignal für Führungskräfte."},{"id":"Z-MO-022","f":4,"sub":"Motivation","t":"mc","q":"Welche Maßnahme kann die intrinsische Motivation fördern?","o":[{"t":"Interessante, abwechslungsreiche Aufgaben mit Handlungsspielraum und Verantwortung","ok":1},{"t":"Ausschließlich Kontrolle und Druck"},{"t":"Monotone Fließbandarbeit ohne Mitsprache"},{"t":"Verbot jeder Eigeninitiative"}],"e":"Intrinsische Motivation wächst, wenn Aufgaben als sinnvoll, herausfordernd und selbstbestimmt erlebt werden. Handlungsspielraum, Verantwortung, Feedback und Entwicklungsmöglichkeiten (Job Enrichment/Enlargement) stärken sie."},{"id":"Z-MO-023","f":4,"sub":"Motivation","t":"mc","q":"Was versteht man unter „Job Enrichment“ (Aufgabenbereicherung)?","o":[{"t":"Die Erweiterung einer Stelle um anspruchsvollere Aufgaben mit mehr Verantwortung und Entscheidungsspielraum","ok":1},{"t":"Die Erhöhung nur der Stückzahl gleichartiger Tätigkeiten"},{"t":"Die Kürzung des Gehalts"},{"t":"Die Verkürzung der Pausen"}],"e":"Job Enrichment reichert die Tätigkeit qualitativ an (vertikale Erweiterung): Planung, Entscheidung und Kontrolle kommen hinzu. Job Enlargement erweitert dagegen quantitativ um gleichartige Aufgaben, Job Rotation bedeutet planmäßigen Aufgabenwechsel."},{"id":"Z-MO-024","f":4,"sub":"Motivation","t":"mc","q":"Was bezeichnet „Job Rotation“?","o":[{"t":"Den planmäßigen, regelmäßigen Wechsel zwischen verschiedenen Arbeitsplätzen/Aufgaben","ok":1},{"t":"Die dauerhafte Ausübung derselben Tätigkeit"},{"t":"Die Entlassung von Mitarbeitern"},{"t":"Die Drehung der Maschinen"}],"e":"Job Rotation ist der geplante Arbeitsplatzwechsel. Vorteile: mehr Abwechslung, breitere Qualifikation, geringere einseitige Belastung und höhere Flexibilität des Personaleinsatzes."},{"id":"Z-MO-025","f":4,"sub":"Motivation","t":"mc","q":"Welche Aussage zum Zusammenhang von Zufriedenheit und Leistung ist am ehesten zutreffend?","o":[{"t":"Zufriedenheit und ein gutes Klima begünstigen die Leistungsbereitschaft, garantieren aber nicht automatisch Höchstleistung","ok":1},{"t":"Zufriedene Mitarbeiter leisten grundsätzlich am wenigsten"},{"t":"Leistung hängt nur vom Gehalt ab"},{"t":"Zufriedenheit ist für die Leistung völlig bedeutungslos"}],"e":"Zufriedenheit, Motivation und ein gutes Klima fördern Engagement und Bindung; der Zusammenhang zur tatsächlichen Leistung ist jedoch nicht linear und hängt von vielen Faktoren ab (Fähigkeiten, Zielklarheit, Rahmenbedingungen)."},{"id":"Z-MO-026","f":4,"sub":"Motivation","t":"mc","q":"Was ist ein Anreizsystem?","o":[{"t":"Die geplante Kombination materieller und immaterieller Anreize zur Förderung erwünschten Verhaltens","ok":1},{"t":"Eine Liste der Fehlzeiten"},{"t":"Ein Verzeichnis der Maschinen"},{"t":"Die Bilanz des Unternehmens"}],"e":"Ein Anreizsystem bündelt gezielt Anreize (z. B. Prämien, Aufstiegschancen, Weiterbildung, Anerkennung, flexible Arbeitszeit), um Leistung, Motivation und Bindung zu steigern und Unternehmensziele zu unterstützen."},{"id":"Z-MO-027","f":4,"sub":"Motivation","t":"mc","q":"Warum kann übermäßige Kontrolle die Motivation senken?","o":[{"t":"Sie signalisiert Misstrauen, engt den Handlungsspielraum ein und schwächt Eigenverantwortung","ok":1},{"t":"Sie erhöht immer die Motivation"},{"t":"Sie hat keine Wirkung"},{"t":"Sie ersetzt jede Führung"}],"e":"Ständige, kleinteilige Kontrolle (Mikromanagement) vermittelt Misstrauen und nimmt den Mitarbeitern Selbstständigkeit und Verantwortungsgefühl. Angemessene Freiräume und Vertrauen wirken dagegen motivierend."},{"id":"Z-MO-028","f":4,"sub":"Motivation","t":"mc","q":"Welcher Kritikpunkt wird an der Maslow-Pyramide häufig geäußert?","o":[{"t":"Die starre Rangfolge lässt sich empirisch nicht immer bestätigen; Bedürfnisse können gleichzeitig oder in anderer Reihenfolge wirken","ok":1},{"t":"Sie enthält keine Bedürfnisse"},{"t":"Sie ist mathematisch berechenbar"},{"t":"Sie gilt nur für Maschinen"}],"e":"Kritisiert wird, dass die strenge Stufenfolge nicht bei allen Menschen und Kulturen gilt: Mehrere Bedürfnisse können gleichzeitig wirken oder die Reihenfolge kann abweichen. Dennoch ist das Modell als Denkhilfe verbreitet."},{"id":"Z-MO-029","f":4,"sub":"Motivation","t":"open","q":"Erläutern Sie die Bedürfnispyramide von Maslow und ihre Bedeutung für die Mitarbeiterführung.","a":"Maslow ordnet die menschlichen Bedürfnisse in fünf hierarchischen Stufen an: (1) physiologische Grundbedürfnisse (z. B. Nahrung, Schlaf), (2) Sicherheitsbedürfnisse (z. B. sicherer Arbeitsplatz, geregeltes Einkommen), (3) soziale Bedürfnisse (Zugehörigkeit, Kollegialität), (4) Wertschätzungsbedürfnisse (Anerkennung, Status) und (5) Selbstverwirklichung (Entfaltung der eigenen Fähigkeiten). Die unteren vier sind Defizitbedürfnisse, deren Fehlen unzufrieden macht; die Selbstverwirklichung ist ein Wachstumsbedürfnis, das nie ganz gesättigt ist. Der Grundgedanke: Vor allem das jeweils nächste, noch unbefriedigte Bedürfnis motiviert; ein weitgehend erfülltes verliert seine Antriebskraft. Für die Führung bedeutet das, die Bedürfnislage der Mitarbeiter zu erkennen und passende Anreize zu setzen: Ist die Existenz gesichert, wirken Lohnerhöhungen weniger als etwa Anerkennung, Zugehörigkeit oder verantwortungsvolle Aufgaben. Zu beachten ist die Kritik, dass die starre Rangfolge nicht immer zutrifft – Bedürfnisse können gleichzeitig oder in anderer Reihenfolge wirken.","e":"Merksatz: physiologisch → Sicherheit → sozial → Wertschätzung → Selbstverwirklichung; motivierend ist das jeweils nächste unbefriedigte Bedürfnis. Führung sollte Anreize an der Bedürfnislage ausrichten."},{"id":"Z-MO-030","f":4,"sub":"Motivation","t":"open","q":"Erläutern Sie die Zwei-Faktoren-Theorie von Herzberg und leiten Sie eine Konsequenz für die Führung ab.","a":"Herzberg unterscheidet zwei Gruppen von Einflussgrößen auf die Arbeitszufriedenheit. Die Hygienefaktoren betreffen das Arbeitsumfeld (den Kontext): z. B. Gehalt, Arbeitsbedingungen, Arbeitsplatzsicherheit, Beziehungen zu Kollegen und Vorgesetzten sowie die Unternehmenspolitik. Sind sie schlecht, entsteht Unzufriedenheit; sind sie gut, wird Unzufriedenheit vermieden – echte Motivation entsteht dadurch aber noch nicht. Die Motivatoren betreffen den Arbeitsinhalt: die Arbeit selbst, Leistungserfolg, Anerkennung, Verantwortung sowie Entwicklungs- und Aufstiegsmöglichkeiten. Sie erzeugen echte Zufriedenheit und Motivation. Wichtig ist: Zufriedenheit und Unzufriedenheit sind nach Herzberg keine Gegenpole einer Skala, sondern werden von unterschiedlichen Faktoren beeinflusst. Konsequenz für die Führung: Zuerst müssen die Hygienefaktoren stimmen (faire Bezahlung, gute Bedingungen), sonst droht Unzufriedenheit. Um darüber hinaus zu motivieren, muss die Führungskraft gezielt Motivatoren fördern – etwa durch Aufgabenbereicherung (Job Enrichment), das Übertragen von Verantwortung, Lob und Anerkennung sowie Entwicklungsperspektiven.","e":"Kern: Hygienefaktoren (Kontext) verhindern nur Unzufriedenheit; Motivatoren (Inhalt) schaffen Motivation. Führung muss beides beachten, echte Motivation kommt aus dem Arbeitsinhalt."},{"id":"Z-MO-031","f":4,"sub":"Motivation","t":"open","q":"Erläutern Sie die Menschenbilder der Theorie X und der Theorie Y (McGregor) und welche Führungshaltung sich jeweils ergibt.","a":"McGregor beschreibt zwei gegensätzliche Menschenbilder, die das Führungsverhalten prägen. Theorie X geht davon aus, dass der Mensch von Natur aus arbeitsscheu ist, Verantwortung meidet, Sicherheit sucht und nur durch Anweisung, Kontrolle und Druck (bzw. materielle Anreize) zur Leistung zu bewegen ist. Wer so denkt, führt autoritär: eng anweisend, streng kontrollierend, mit wenig Freiraum. Theorie Y nimmt an, dass Arbeit dem Menschen ein natürliches Bedürfnis ist, dass er eigeninitiativ und leistungsbereit ist, gern Verantwortung übernimmt und Kreativität entfaltet, wenn man ihm Vertrauen und Spielraum gibt. Daraus folgt eine kooperative, delegierende Führung: Ziele werden gemeinsam vereinbart, Aufgaben und Verantwortung übertragen, Mitarbeiter beteiligt. Bedeutsam ist, dass das Menschenbild zur selbsterfüllenden Prophezeiung werden kann: Wer Mitarbeiter wie in Theorie X behandelt, erzeugt oft genau das Verhalten, das er erwartet – und umgekehrt. In der Praxis gilt eine an Theorie Y orientierte, situativ angepasste Führung meist als förderlicher.","e":"Theorie X = negatives Menschenbild → autoritäre Führung (Kontrolle/Druck); Theorie Y = positives Menschenbild → kooperative Führung (Vertrauen/Delegation). Das Menschenbild kann sich selbst bestätigen."},{"id":"Z-MO-032","f":4,"sub":"Motivation","t":"mc","q":"Welche Aussage über Motivatoren und Hygienefaktoren ist nach Herzberg richtig?","o":[{"t":"Zufriedenheit und Unzufriedenheit werden von unterschiedlichen Faktoren beeinflusst und sind keine bloßen Gegenpole","ok":1},{"t":"Nur ein einziger Faktor bestimmt beides"},{"t":"Hygienefaktoren erzeugen dauerhafte Motivation"},{"t":"Motivatoren verhindern nur Unzufriedenheit"}],"e":"Herzbergs Kerngedanke: Das Gegenteil von Unzufriedenheit ist nicht automatisch Zufriedenheit, sondern zunächst „keine Unzufriedenheit“. Hygienefaktoren wirken auf die Unzufriedenheit, Motivatoren auf die Zufriedenheit – es sind zwei getrennte Dimensionen."},{"id":"Z-MO-033","f":4,"sub":"Motivation","t":"mc","q":"Welche Maßnahme spricht das soziale Bedürfnis (Maslow, Stufe 3) an?","o":[{"t":"Teamarbeit, Betriebsfeiern und ein gutes kollegiales Miteinander","ok":1},{"t":"Eine Gehaltserhöhung"},{"t":"Ein sicherer Arbeitsvertrag"},{"t":"Eine warme Mahlzeit"}],"e":"Das Bedürfnis nach Zugehörigkeit und sozialen Kontakten wird durch Teamarbeit, Kollegialität, gemeinsame Aktivitäten und ein gutes Miteinander befriedigt. Gehalt und Vertrag betreffen niedrigere Stufen."},{"id":"Z-MO-034","f":4,"sub":"Motivation","t":"mc","q":"Was ist ein Beispiel für einen immateriellen Anreiz?","o":[{"t":"Lob und öffentliche Anerkennung guter Leistung","ok":1},{"t":"Eine Leistungsprämie"},{"t":"Ein Firmenwagen"},{"t":"Eine Gehaltserhöhung"}],"e":"Immaterielle Anreize wirken ohne direkten Geldwert: Lob, Anerkennung, interessante Aufgaben, Mitbestimmung, Weiterbildung und Aufstiegschancen. Prämie, Firmenwagen und Gehalt sind dagegen materielle Anreize."},{"id":"Z-MO-035","f":4,"sub":"Motivation","t":"mc","q":"Warum ist Anerkennung ein wirksames Führungsinstrument?","o":[{"t":"Sie befriedigt das Wertschätzungsbedürfnis, ist kostenlos und stärkt Motivation und Bindung","ok":1},{"t":"Sie ersetzt jedes Gehalt vollständig"},{"t":"Sie ist gesetzlich vorgeschrieben"},{"t":"Sie wirkt nur bei neuen Mitarbeitern"}],"e":"Ehrliche, konkrete Anerkennung kostet nichts, spricht aber ein starkes Bedürfnis an (Wertschätzung). Sie erhöht Zufriedenheit, Selbstwertgefühl und Leistungsbereitschaft. Wichtig ist, dass sie glaubwürdig und leistungsbezogen erfolgt."},{"id":"Z-MO-036","f":4,"sub":"Motivation","t":"mc","q":"Was ist bei materiellen Anreizen (z. B. Prämien) im Sinne der Motivation zu beachten?","o":[{"t":"Ihre Wirkung lässt oft nach (Gewöhnung); sie sollten mit immateriellen Anreizen kombiniert werden","ok":1},{"t":"Sie motivieren dauerhaft am stärksten"},{"t":"Sie sind völlig wirkungslos"},{"t":"Sie ersetzen jede Anerkennung"}],"e":"Rein finanzielle Anreize wirken oft nur kurzfristig, weil ein Gewöhnungseffekt eintritt und sie schnell als selbstverständlich gelten (Hygienefaktor). Nachhaltige Motivation entsteht in Kombination mit immateriellen Faktoren wie Anerkennung, Sinn und Entwicklung."},{"id":"Z-MO-037","f":4,"sub":"Motivation","t":"mc","q":"Welche Aussage beschreibt die extrinsische Motivation zutreffend?","o":[{"t":"Die Tätigkeit wird um einer äußeren Folge willen ausgeführt (z. B. Belohnung, Vermeidung von Strafe)","ok":1},{"t":"Die Tätigkeit macht aus sich heraus Freude"},{"t":"Sie entsteht nur aus Interesse an der Sache"},{"t":"Sie ist unabhängig von jeder Konsequenz"}],"e":"Bei extrinsischer Motivation ist nicht die Tätigkeit selbst der Antrieb, sondern eine damit verbundene äußere Konsequenz – z. B. Entgelt, Anerkennung, Aufstieg oder das Vermeiden von Nachteilen. Intrinsische Motivation entsteht dagegen aus der Sache selbst."},{"id":"Z-MO-038","f":4,"sub":"Motivation","t":"mc","q":"Welche Führungsmaßnahme wirkt bei einem Mitarbeiter, dessen untere Bedürfnisstufen gesichert sind, am ehesten motivierend?","o":[{"t":"Übertragung anspruchsvoller Aufgaben und Entwicklungsmöglichkeiten (höhere Bedürfnisstufen)","ok":1},{"t":"Eine weitere kleine Gehaltserhöhung"},{"t":"Verschärfte Kontrolle"},{"t":"Kürzere Pausen"}],"e":"Sind Existenz und Sicherheit gedeckt, motivieren vor allem höhere Bedürfnisse: Zugehörigkeit, Anerkennung und Selbstverwirklichung. Verantwortungsvolle Aufgaben, Weiterbildung und Aufstiegsperspektiven sprechen diese Ebenen an."},{"id":"Z-MO-039","f":4,"sub":"Motivation","t":"mc","q":"Was versteht man unter Frustration im Arbeitskontext?","o":[{"t":"Das Erleben, dass wichtige Bedürfnisse oder Ziele dauerhaft nicht erfüllt bzw. blockiert werden","ok":1},{"t":"Ein Zustand hoher Zufriedenheit"},{"t":"Eine Form der Beförderung"},{"t":"Ein Anreizsystem"}],"e":"Frustration entsteht, wenn Bedürfnisse oder Ziele blockiert bleiben (z. B. ausbleibende Anerkennung, verwehrter Aufstieg). Sie kann zu Resignation, Aggression oder innerer Kündigung führen. Gute Führung erkennt Ursachen und wirkt gegen."},{"id":"Z-MO-040","f":4,"sub":"Motivation","t":"mc","q":"Welche Bedeutung hat ein gutes Betriebsklima für das Unternehmen?","o":[{"t":"Es erhöht Zufriedenheit, Motivation und Bindung und senkt Fehlzeiten und Fluktuation","ok":1},{"t":"Es ist wirtschaftlich bedeutungslos"},{"t":"Es erhöht immer die Kosten ohne Nutzen"},{"t":"Es verschlechtert die Zusammenarbeit"}],"e":"Ein gutes Betriebsklima fördert Wohlbefinden, Kooperation und Identifikation mit dem Unternehmen. Das steigert Leistungsbereitschaft und Qualität und verringert Fehlzeiten, Fluktuation und Konflikte – ein spürbarer wirtschaftlicher Vorteil."},{"id":"Z-FS-001","f":4,"sub":"Führungsstile","t":"mc","q":"Was versteht man unter Führung im betrieblichen Sinn?","o":[{"t":"Die zielorientierte Einflussnahme auf das Verhalten von Mitarbeitern","ok":1},{"t":"Die Berechnung der Löhne"},{"t":"Das Führen der Buchhaltung"},{"t":"Die Wartung der Maschinen"}],"e":"Führung ist die bewusste, zielgerichtete Einflussnahme auf Menschen, um gemeinsame Ziele zu erreichen. Sie umfasst das Motivieren, Informieren, Koordinieren und Beurteilen der Mitarbeiter."},{"id":"Z-FS-002","f":4,"sub":"Führungsstile","t":"mc","q":"Was bezeichnet der Begriff „Führungsstil“?","o":[{"t":"Das typische, wiederkehrende Muster des Führungsverhaltens einer Führungskraft","ok":1},{"t":"Die Kleidung der Führungskraft"},{"t":"Die Höhe des Gehalts"},{"t":"Die Rechtsform des Unternehmens"}],"e":"Der Führungsstil ist die grundsätzliche, über Situationen hinweg erkennbare Art, wie eine Führungskraft ihre Mitarbeiter führt (z. B. eher autoritär oder kooperativ)."},{"id":"Z-FS-003","f":4,"sub":"Führungsstile","t":"mc","q":"Welche drei klassischen Führungsstile unterscheidet Kurt Lewin?","o":[{"t":"Autoritär, kooperativ (demokratisch) und laissez-faire","ok":1},{"t":"Theorie X, Theorie Y und Theorie Z"},{"t":"Autoritär, monetär und sozial"},{"t":"Zentral, dezentral und neutral"}],"e":"Lewin unterscheidet den autoritären (Vorgesetzter entscheidet allein), den kooperativen/demokratischen (Mitarbeiter werden beteiligt) und den Laissez-faire-Stil (Mitarbeiter weitgehend sich selbst überlassen)."},{"id":"Z-FS-004","f":4,"sub":"Führungsstile","t":"mc","q":"Was kennzeichnet den autoritären Führungsstil?","o":[{"t":"Der Vorgesetzte entscheidet und weist an, die Mitarbeiter führen aus","ok":1},{"t":"Die Mitarbeiter entscheiden allein"},{"t":"Es gibt keine Entscheidungen"},{"t":"Jeder macht, was er will"}],"e":"Beim autoritären Stil trifft die Führungskraft Entscheidungen allein und gibt Anweisungen; Mitspracherechte der Mitarbeiter gibt es kaum. Vorteil: schnelle Entscheidungen, klare Verantwortung. Nachteil: geringe Motivation und Eigeninitiative."},{"id":"Z-FS-005","f":4,"sub":"Führungsstile","t":"mc","q":"Welcher Vorteil wird dem autoritären Führungsstil zugeschrieben?","o":[{"t":"Schnelle Entscheidungen und klare Zuständigkeiten","ok":1},{"t":"Hohe Mitarbeitermotivation"},{"t":"Optimale Nutzung des Mitarbeiterwissens"},{"t":"Große Eigenverantwortung der Mitarbeiter"}],"e":"Der autoritäre Stil ermöglicht rasche, eindeutige Entscheidungen und klare Verantwortlichkeiten – vorteilhaft z. B. in Krisen oder bei Zeitdruck. Die Kehrseite sind geringe Motivation, fehlende Eigeninitiative und Abhängigkeit vom Vorgesetzten."},{"id":"Z-FS-006","f":4,"sub":"Führungsstile","t":"mc","q":"Was kennzeichnet den kooperativen Führungsstil?","o":[{"t":"Die Mitarbeiter werden an Entscheidungen beteiligt und dürfen mitreden","ok":1},{"t":"Der Vorgesetzte entscheidet stets allein"},{"t":"Die Mitarbeiter sind völlig sich selbst überlassen"},{"t":"Es werden keine Ziele gesetzt"}],"e":"Beim kooperativen (demokratischen) Stil bezieht die Führungskraft die Mitarbeiter in Entscheidungen ein, delegiert und fördert Eigenverantwortung. Vorteile: Motivation, Nutzung von Wissen, Entlastung. Nachteil: höherer Zeitaufwand."},{"id":"Z-FS-007","f":4,"sub":"Führungsstile","t":"mc","q":"Welcher Nachteil kann mit dem kooperativen Führungsstil verbunden sein?","o":[{"t":"Entscheidungen können länger dauern (Abstimmungsaufwand)","ok":1},{"t":"Die Mitarbeiter sind grundsätzlich demotiviert"},{"t":"Das Wissen der Mitarbeiter wird nicht genutzt"},{"t":"Es gibt keine Beteiligung"}],"e":"Durch Beteiligung und Abstimmung dauern Entscheidungen tendenziell länger, und in Krisen kann rasches Durchgreifen erschwert sein. Dem stehen höhere Motivation, bessere Entscheidungsqualität und Entlastung der Führungskraft gegenüber."},{"id":"Z-FS-008","f":4,"sub":"Führungsstil
