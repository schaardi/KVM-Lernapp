{"t":"Das Lastenheft kommt vom Auftraggeber (Was/Wofür?), das Pflichtenheft vom Auftragnehmer (Wie/Womit?)","ok":1},{"t":"Beide erstellt der Auftragnehmer"},{"t":"Beide sind identisch"},{"t":"Das Pflichtenheft enthält nur Preise"}],"e":"Der Auftraggeber beschreibt im Lastenheft die Anforderungen und Ziele (lösungsneutral). Der Auftragnehmer beschreibt im Pflichtenheft, wie er diese konkret umsetzt (Realisierung)."},{"id":"M-PM-009","f":3,"sub":"Projektmanagement","t":"mc","q":"Wer erstellt das Pflichtenheft?","o":[{"t":"Der Auftragnehmer","ok":1},{"t":"Der Auftraggeber"},{"t":"Der Betriebsrat"},{"t":"Die IHK"}],"e":"Das Pflichtenheft wird vom Auftragnehmer als Antwort auf das Lastenheft erstellt. Es konkretisiert die technische und organisatorische Umsetzung der geforderten Leistungen."},{"id":"M-PM-010","f":3,"sub":"Projektmanagement","t":"mc","q":"Was ist ein Meilenstein in einem Projekt?","o":[{"t":"Ein wichtiges Zwischenereignis mit der Dauer null, das einen Abschnitt markiert","ok":1},{"t":"Ein besonders langer Vorgang"},{"t":"Der teuerste Arbeitsschritt"},{"t":"Ein Mitarbeiter mit Sonderrechten"}],"e":"Meilensteine sind Ereignisse (keine Vorgänge) ohne Dauer, die bedeutende Etappen kennzeichnen (z. B. „Konzept genehmigt“). Sie dienen der Fortschrittskontrolle (u. a. Meilensteintrendanalyse)."},{"id":"M-PM-011","f":3,"sub":"Projektmanagement","t":"mc","q":"Was zeigt ein Gantt-Diagramm (Balkenplan)?","o":[{"t":"Vorgänge als Balken über einer Zeitachse mit ihrer Dauer und Lage","ok":1},{"t":"Die Aufbauorganisation"},{"t":"Ursache-Wirkungs-Beziehungen"},{"t":"Die Kostenstruktur"}],"e":"Der Balkenplan ist anschaulich und zeigt Beginn, Dauer und Ende der Vorgänge auf einer Zeitachse. Logische Abhängigkeiten und Puffer bildet der Netzplan jedoch genauer ab."},{"id":"M-PM-012","f":3,"sub":"Projektmanagement","t":"mc","q":"Worin liegt ein Vorteil des Netzplans gegenüber dem einfachen Balkenplan?","o":[{"t":"Er stellt logische Abhängigkeiten, Puffer und den kritischen Pfad genau dar","ok":1},{"t":"Er ist bunter"},{"t":"Er benötigt keine Vorgangsdauern"},{"t":"Er zeigt nur den Endtermin"}],"e":"Der Netzplan macht Abhängigkeiten zwischen Vorgängen, Zeitreserven (Puffer) und den kritischen Pfad sichtbar – wichtig für die Steuerung. Der Balkenplan ist übersichtlicher, aber weniger analytisch."},{"id":"M-PM-013","f":3,"sub":"Projektmanagement","t":"mc","q":"Wofür stehen im Netzplan die Abkürzungen FAZ und FEZ?","o":[{"t":"Frühester Anfangszeitpunkt und frühester Endzeitpunkt eines Vorgangs","ok":1},{"t":"Fester Anfangstermin und fester Endtermin"},{"t":"Freier Anfang und freies Ende"},{"t":"Fertigungsanfang und Fertigungsende"}],"e":"FAZ = frühester Anfangszeitpunkt, FEZ = frühester Endzeitpunkt. Ergänzt werden sie um SAZ (spätester Anfang) und SEZ (spätestes Ende). Aus ihnen ergeben sich die Puffer."},{"id":"M-PM-014","f":3,"sub":"Projektmanagement","t":"mc","q":"Wie berechnet sich der früheste Endzeitpunkt (FEZ) eines Vorgangs?","o":[{"t":"FEZ = FAZ + Dauer","ok":1},{"t":"FEZ = FAZ − Dauer"},{"t":"FEZ = SAZ + SEZ"},{"t":"FEZ = Dauer ÷ 2"}],"e":"Der früheste Endzeitpunkt ergibt sich aus dem frühesten Anfangszeitpunkt zuzüglich der Vorgangsdauer: FEZ = FAZ + D."},{"id":"M-PM-015","f":3,"sub":"Projektmanagement","t":"mc","q":"Wie wird bei der Vorwärtsrechnung der FAZ eines Vorgangs mit mehreren Vorgängern bestimmt?","o":[{"t":"Als größter FEZ aller unmittelbaren Vorgänger (Maximum)","ok":1},{"t":"Als kleinster FEZ der Vorgänger"},{"t":"Als Summe aller FEZ der Vorgänger"},{"t":"Als Durchschnitt der Vorgängerdauern"}],"e":"Ein Vorgang kann erst beginnen, wenn alle Vorgänger abgeschlossen sind. Daher ist sein FAZ der größte (späteste) FEZ seiner Vorgänger."},{"id":"M-PM-016","f":3,"sub":"Projektmanagement","t":"mc","q":"Wie wird bei der Rückwärtsrechnung der SEZ eines Vorgangs mit mehreren Nachfolgern bestimmt?","o":[{"t":"Als kleinster SAZ aller unmittelbaren Nachfolger (Minimum)","ok":1},{"t":"Als größter SAZ der Nachfolger"},{"t":"Als Summe der Nachfolger"},{"t":"Als FAZ des ersten Vorgangs"}],"e":"In der Rückwärtsrechnung ist der SEZ eines Vorgangs der kleinste (früheste) spätest zulässige Anfang (SAZ) seiner Nachfolger, damit kein Nachfolger verzögert wird."},{"id":"M-PM-017","f":3,"sub":"Projektmanagement","t":"mc","q":"Wie berechnet sich der Gesamtpuffer (GP) eines Vorgangs?","o":[{"t":"GP = SAZ − FAZ (bzw. SEZ − FEZ)","ok":1},{"t":"GP = FAZ + FEZ"},{"t":"GP = Dauer × 2"},{"t":"GP = FEZ − FAZ"}],"e":"Der Gesamtpuffer ist die Differenz zwischen spätester und frühester Lage: GP = SAZ − FAZ = SEZ − FEZ. Er gibt an, um wie viel sich der Vorgang verschieben darf, ohne den Endtermin zu gefährden."},{"id":"M-PM-018","f":3,"sub":"Projektmanagement","t":"mc","q":"Was ist der kritische Pfad in einem Netzplan?","o":[{"t":"Die längste Vorgangsfolge mit Gesamtpuffer null – sie bestimmt die Projektdauer","ok":1},{"t":"Der kürzeste Weg durch das Projekt"},{"t":"Der teuerste Vorgang"},{"t":"Der Vorgang mit dem meisten Personal"}],"e":"Der kritische Pfad besteht aus den Vorgängen ohne Puffer (GP = 0). Er ist der längste Weg vom Start zum Ende und legt die Gesamtdauer fest. Jede Verzögerung auf ihm verschiebt den Endtermin."},{"id":"M-PM-019","f":3,"sub":"Projektmanagement","t":"mc","q":"Welche Aussage über Vorgänge auf dem kritischen Pfad ist richtig?","o":[{"t":"Sie besitzen keinen Puffer und müssen besonders überwacht werden","ok":1},{"t":"Sie haben den größten Puffer"},{"t":"Sie sind unwichtig"},{"t":"Sie können beliebig verschoben werden"}],"e":"Kritische Vorgänge haben Gesamtpuffer null. Verzögert sich einer, verschiebt sich das Projektende. Deshalb ist der kritische Pfad im Projektcontrolling besonders zu beobachten."},{"id":"M-PM-020","f":3,"sub":"Projektmanagement","t":"mc","q":"Ein Vorgang hat den frühesten Anfangszeitpunkt (FAZ) 5 und die Dauer 8. Wie hoch ist sein frühester Endzeitpunkt (FEZ)?","o":[{"t":"13","ok":1},{"t":"3"},{"t":"40"},{"t":"8"}],"e":"FEZ = FAZ + Dauer = 5 + 8 = 13."},{"id":"M-PM-021","f":3,"sub":"Projektmanagement","t":"mc","q":"Ein Vorgang hat FAZ 4 und SAZ 9. Wie groß ist der Gesamtpuffer?","o":[{"t":"5","ok":1},{"t":"13"},{"t":"36"},{"t":"0"}],"e":"Gesamtpuffer = SAZ − FAZ = 9 − 4 = 5. Der Vorgang darf sich um 5 Zeiteinheiten verschieben, ohne den Endtermin zu gefährden."},{"id":"M-PM-022","f":3,"sub":"Projektmanagement","t":"mc","q":"Vorgang A (Dauer 3) ist Vorgänger von B (Dauer 4) und C (Dauer 6). B und C sind Vorgänger von D (Dauer 2). Wie lange dauert das Projekt mindestens?","o":[{"t":"11","ok":1},{"t":"9"},{"t":"15"},{"t":"13"}],"e":"Weg über B: 3 + 4 + 2 = 9. Weg über C: 3 + 6 + 2 = 11 (länger). Die Projektdauer wird vom längeren Weg (kritischer Pfad A–C–D) bestimmt: 11 Zeiteinheiten."},{"id":"M-PM-023","f":3,"sub":"Projektmanagement","t":"mc","q":"Im Netz A(3) → B(4)/C(6) → D(2) laufen B und C parallel nach A und münden in D. Wie groß ist der Gesamtpuffer von Vorgang B?","o":[{"t":"2","ok":1},{"t":"0"},{"t":"4"},{"t":"6"}],"e":"FAZ_B = 3, FEZ_B = 7. Rückwärts: Projektdauer 11 → SEZ_D = 11, SAZ_D = 9 → SEZ_B = 9, SAZ_B = 9 − 4 = 5. GP_B = SAZ_B − FAZ_B = 5 − 3 = 2. (C liegt mit GP = 0 auf dem kritischen Pfad.)"},{"id":"M-PM-024","f":3,"sub":"Projektmanagement","t":"mc","q":"Welcher ist im Netz A(3) → B(4)/C(6) → D(2) der kritische Pfad?","o":[{"t":"A – C – D","ok":1},{"t":"A – B – D"},{"t":"B – C"},{"t":"A – D"}],"e":"Der kritische Pfad ist der längste Weg: A–C–D = 3 + 6 + 2 = 11. Er hat keinen Puffer und bestimmt die Projektdauer. Der Weg A–B–D (9) besitzt 2 Zeiteinheiten Puffer."},{"id":"M-PM-025","f":3,"sub":"Projektmanagement","t":"mc","q":"Zwei parallele Vorgänge starten nach demselben Ereignis und münden in dasselbe Folgeereignis: B dauert 4, C dauert 7. Wie groß ist der Gesamtpuffer von B?","o":[{"t":"3","ok":1},{"t":"0"},{"t":"7"},{"t":"11"}],"e":"B darf so spät enden wie C. Gesamtpuffer von B = Dauer(C) − Dauer(B) = 7 − 4 = 3. Der längere Vorgang C liegt auf dem kritischen Pfad (Puffer 0)."},{"id":"M-PM-026","f":3,"sub":"Projektmanagement","t":"mc","q":"Was bedeutet es für die Projektdauer, wenn ein Vorgang mit einem Gesamtpuffer von 4 sich um 2 Zeiteinheiten verzögert?","o":[{"t":"Die Projektdauer ändert sich nicht, da der Puffer ausreicht","ok":1},{"t":"Das Projekt verlängert sich um 2 Zeiteinheiten"},{"t":"Das Projekt verlängert sich um 4 Zeiteinheiten"},{"t":"Das Projekt wird kürzer"}],"e":"Solange die Verzögerung (2) den Gesamtpuffer (4) nicht übersteigt, bleibt der Endtermin unverändert. Erst eine Verzögerung über den Puffer hinaus verschiebt das Projektende."},{"id":"M-PM-027","f":3,"sub":"Projektmanagement","t":"mc","q":"Was gibt der freie Puffer eines Vorgangs an?","o":[{"t":"Um wie viel er sich verschieben darf, ohne den frühesten Anfang seiner Nachfolger zu beeinflussen","ok":1},{"t":"Um wie viel das ganze Projekt verschoben werden darf"},{"t":"Die reine Bearbeitungsdauer"},{"t":"Die Kosten des Vorgangs"}],"e":"Der freie Puffer ist der Spielraum, ohne dass ein nachfolgender Vorgang seinen frühesten Anfangszeitpunkt verliert. Er ist stets kleiner oder gleich dem Gesamtpuffer."},{"id":"M-PM-028","f":3,"sub":"Projektmanagement","t":"mc","q":"Welche Aufgabe hat der Projektleiter?","o":[{"t":"Das Projekt planen, steuern, überwachen und die Beteiligten koordinieren","ok":1},{"t":"Nur die Buchhaltung führen"},{"t":"Ausschließlich Kaffee kochen"},{"t":"Die Bilanz erstellen"}],"e":"Der Projektleiter verantwortet die Zielerreichung: Er plant Struktur, Termine, Kosten und Ressourcen, steuert und kontrolliert den Fortschritt (Soll-Ist) und führt bzw. koordiniert das Projektteam."},{"id":"M-PM-029","f":3,"sub":"Projektmanagement","t":"mc","q":"Wozu dient ein Kick-off-Meeting?","o":[{"t":"Zum offiziellen Projektstart: Ziele, Rollen, Vorgehen und Regeln werden gemeinsam geklärt","ok":1},{"t":"Zum Projektabschluss"},{"t":"Zur Entlassung von Mitarbeitern"},{"t":"Zur Bilanzierung"}],"e":"Das Kick-off-Meeting eröffnet das Projekt: Es schafft ein gemeinsames Verständnis von Zielen, Aufgaben, Verantwortlichkeiten, Terminen und Kommunikationsregeln und fördert die Teambildung."},{"id":"M-PM-030","f":3,"sub":"Projektmanagement","t":"mc","q":"Was wird bei der Meilensteintrendanalyse verfolgt?","o":[{"t":"Die Entwicklung der geschätzten Meilensteintermine über die Projektlaufzeit","ok":1},{"t":"Die Zahl der Mitarbeiter"},{"t":"Der Lagerbestand"},{"t":"Die Umsatzrentabilität"}],"e":"Die Meilensteintrendanalyse zeigt grafisch, wie sich die prognostizierten Termine wichtiger Meilensteine im Zeitverlauf verändern. Steigende Linien signalisieren Verzögerungen, fallende eine Beschleunigung."},{"id":"M-PM-031","f":3,"sub":"Projektmanagement","t":"mc","q":"Was versteht man unter Projektcontrolling?","o":[{"t":"Die laufende Überwachung von Terminen, Kosten und Leistung mit Soll-Ist-Vergleich und Steuerungsmaßnahmen","ok":1},{"t":"Die einmalige Planung zu Beginn"},{"t":"Die reine Endabrechnung"},{"t":"Die Wahl der Rechtsform"}],"e":"Projektcontrolling begleitet das Projekt fortlaufend: Es vergleicht Plan und Ist bei Terminen, Kosten und Leistung, analysiert Abweichungen und leitet Korrekturmaßnahmen ein."},{"id":"M-PM-032","f":3,"sub":"Projektmanagement","t":"mc","q":"Welche Angaben enthält ein Projektauftrag typischerweise?","o":[{"t":"Projektziel, Umfang, Termine, Budget, Verantwortlichkeiten und Rahmenbedingungen","ok":1},{"t":"Nur den Namen des Projektleiters"},{"t":"Ausschließlich die Farbe der Präsentation"},{"t":"Die private Telefonnummer aller Beteiligten"}],"e":"Der Projektauftrag ist die formale Beauftragung: Er legt Ziel, Inhalt/Umfang, Termine, Budget, Projektleitung und -team sowie Rahmenbedingungen verbindlich fest und autorisiert das Projekt."},{"id":"M-PM-033","f":3,"sub":"Projektmanagement","t":"mc","q":"Was gehört zur Projektabschlussphase?","o":[{"t":"Abnahme/Übergabe, Abschlussdokumentation und Auswertung (Lessons Learned)","ok":1},{"t":"Die Zieldefinition"},{"t":"Die erste Grobplanung"},{"t":"Das Kick-off"}],"e":"Zum Abschluss gehören die Abnahme der Ergebnisse, die Übergabe, die Dokumentation sowie die kritische Auswertung (was lief gut/schlecht – Lessons Learned) für künftige Projekte."},{"id":"M-PM-034","f":3,"sub":"Projektmanagement","t":"mc","q":"Wozu dient die Ressourcenplanung im Projekt?","o":[{"t":"Zur Zuordnung von Personal, Betriebsmitteln und Material zu den Vorgängen und zur Vermeidung von Überlastungen","ok":1},{"t":"Zur Festlegung des Firmennamens"},{"t":"Zur Bilanzierung"},{"t":"Zur Berechnung der Umsatzsteuer"}],"e":"Die Ressourcenplanung ordnet den Arbeitspaketen die benötigten Kapazitäten zu (Personal, Maschinen, Material) und gleicht Engpässe und Überlastungen aus (Kapazitätsabgleich)."},{"id":"M-PM-035","f":3,"sub":"Projektmanagement","t":"mc","q":"Was beschreibt ein Risiko im Projektmanagement?","o":[{"t":"Ein mögliches zukünftiges Ereignis, das die Projektziele negativ (oder positiv) beeinflussen kann","ok":1},{"t":"Eine bereits eingetretene Rechnung"},{"t":"Den fertigen Projektbericht"},{"t":"Die Wahl der Schriftart"}],"e":"Ein Risiko ist ein unsicheres Ereignis mit möglichen Auswirkungen auf Termine, Kosten oder Leistung. Im Risikomanagement werden Risiken identifiziert, bewertet (Eintrittswahrscheinlichkeit × Auswirkung) und mit Maßnahmen behandelt."},{"id":"M-PM-036","f":3,"sub":"Projektmanagement","t":"mc","q":"Was ist bei der Formulierung von Projektzielen mit „SMART“ gemeint?","o":[{"t":"Spezifisch, messbar, attraktiv/akzeptiert, realistisch und terminiert","ok":1},{"t":"Schnell, modern, agil, riskant, teuer"},{"t":"Sozial, marktnah, aktiv, rechtssicher, transparent"},{"t":"Sicher, mobil, analog, robust, technisch"}],"e":"SMART-Ziele sind spezifisch (eindeutig), messbar, attraktiv/akzeptiert, realistisch (erreichbar) und terminiert (mit klarem Endtermin). Klare Ziele erleichtern Steuerung und Erfolgskontrolle."},{"id":"M-PM-037","f":3,"sub":"Projektmanagement","t":"mc","q":"Nach welchem Kriterium kann ein Projektstrukturplan gegliedert werden?","o":[{"t":"Objektorientiert, funktionsorientiert oder gemischt","ok":1},{"t":"Nur nach dem Alphabet"},{"t":"Nur nach dem Gehalt"},{"t":"Nur nach der Raumnummer"}],"e":"Der PSP kann nach Objekten (Teilprodukten/Baugruppen), nach Funktionen/Verrichtungen (Phasen, Tätigkeiten) oder gemischt gegliedert werden – je nachdem, was die Planung am besten unterstützt."},{"id":"M-PM-038","f":3,"sub":"Projektmanagement","t":"mc","q":"Was ist der Vorteil, den kritischen Pfad zu kennen?","o":[{"t":"Man weiß, welche Vorgänge die Projektdauer bestimmen und vorrangig zu überwachen bzw. zu beschleunigen sind","ok":1},{"t":"Man kennt den Gewinn"},{"t":"Man kann die Bilanz erstellen"},{"t":"Man spart Umsatzsteuer"}],"e":"Der kritische Pfad zeigt die terminbestimmenden Vorgänge. Will man das Projekt verkürzen, muss man dort ansetzen; zugleich sind diese Vorgänge besonders zu kontrollieren, da sie keinen Puffer haben."},{"id":"M-PM-039","f":3,"sub":"Projektmanagement","t":"mc","q":"Welche Projektorganisationsform löst die Mitarbeiter für die Projektdauer vollständig aus der Linie heraus?","o":[{"t":"Die reine Projektorganisation","ok":1},{"t":"Die Einfluss-(Stab-)Projektorganisation"},{"t":"Die Matrix-Projektorganisation"},{"t":"Die Linienorganisation"}],"e":"In der reinen Projektorganisation sind die Mitarbeiter voll dem Projektleiter unterstellt. Vorteil: klare Verantwortung und Schlagkraft; Nachteil: Wiedereingliederung nach Projektende und mögliche Auslastungslücken."},{"id":"M-PM-040","f":3,"sub":"Projektmanagement","t":"open","q":"Erläutern Sie das magische Dreieck des Projektmanagements und den Zusammenhang seiner Ecken.","a":"Das magische Dreieck beschreibt die drei zentralen, miteinander konkurrierenden Zielgrößen eines Projekts: Zeit (Termine/Dauer), Kosten (Budget/Ressourcen) und Qualität bzw. Leistung (Umfang/Ergebnis). Das eigentliche Projektziel liegt im Zentrum. „Magisch“ ist das Dreieck, weil sich die drei Ziele nicht unabhängig voneinander optimieren lassen: Wird an einer Ecke gedreht, wirkt sich das auf die anderen aus. Verkürzt man zum Beispiel die Zeit, muss man meist mehr Ressourcen einsetzen (höhere Kosten) oder Abstriche bei Umfang/Qualität machen. Senkt man die Kosten, leiden oft Qualität oder Termin. Die Projektleitung muss daher zwischen den Zielen bewusst abwägen und mit dem Auftraggeber Prioritäten festlegen.","e":"Merksatz: Zeit, Kosten, Qualität stehen im Zielkonflikt – eine Änderung wirkt immer auf die beiden anderen Größen."},{"id":"M-PM-041","f":3,"sub":"Projektmanagement","t":"open","q":"Erläutern Sie den Unterschied zwischen Lastenheft und Pflichtenheft und geben Sie an, wer sie jeweils erstellt.","a":"Das Lastenheft wird vom Auftraggeber erstellt. Es beschreibt die Gesamtheit der Anforderungen an die zu erbringende Leistung aus Sicht des Auftraggebers – also das „Was“ und „Wofür“, möglichst lösungsneutral (welche Ziele, Funktionen und Rahmenbedingungen erfüllt werden sollen). Das Pflichtenheft wird anschließend vom Auftragnehmer erstellt. Es ist die Antwort auf das Lastenheft und beschreibt konkret, „Wie“ und „Womit“ die Anforderungen umgesetzt werden – also die technische und organisatorische Realisierung. Das Lastenheft steht am Anfang (Anforderungsdefinition), das Pflichtenheft konkretisiert die Lösung und ist Grundlage für Vertrag und Abnahme.","e":"Kurz: Lastenheft = Auftraggeber, Anforderungen (Was?); Pflichtenheft = Auftragnehmer, Umsetzung (Wie?)."},{"id":"M-PM-042","f":3,"sub":"Projektmanagement","t":"open","q":"In einem Netzplan folgt auf Vorgang A (Dauer 4) sowohl Vorgang B (Dauer 3) als auch Vorgang C (Dauer 7); B und C sind Vorgänger von D (Dauer 2). Bestimmen Sie die Projektdauer, den kritischen Pfad und den Gesamtpuffer von B.","a":"Vorwärtsrechnung: FAZ_A = 0, FEZ_A = 4. FAZ_B = 4, FEZ_B = 4 + 3 = 7. FAZ_C = 4, FEZ_C = 4 + 7 = 11. FAZ_D = größter FEZ der Vorgänger = max(7, 11) = 11, FEZ_D = 11 + 2 = 13. Die Projektdauer beträgt somit 13 Zeiteinheiten. Kritischer Pfad: der längste Weg A–C–D = 4 + 7 + 2 = 13; diese Vorgänge haben den Gesamtpuffer 0. Gesamtpuffer von B: Rückwärtsrechnung SEZ_D = 13, SAZ_D = 11 → SEZ_B = 11, SAZ_B = 11 − 3 = 8. Gesamtpuffer_B = SAZ_B − FAZ_B = 8 − 4 = 4 (bzw. SEZ_B − FEZ_B = 11 − 7 = 4). Vorgang B darf sich also um 4 Zeiteinheiten verschieben, ohne den Endtermin zu gefährden.","e":"Vorgehen: erst vorwärts (FAZ/FEZ, Maximum der Vorgänger), dann rückwärts (SAZ/SEZ, Minimum der Nachfolger); Gesamtpuffer = SAZ − FAZ. Der kritische Pfad ist der längste Weg mit Puffer 0."},{"id":"M-PM-043","f":3,"sub":"Projektmanagement","t":"mc","q":"Was ist ein Vorgang im Netzplan?","o":[{"t":"Ein zeitbeanspruchendes Geschehen mit definiertem Anfang und Ende (eine Tätigkeit mit Dauer)","ok":1},{"t":"Ein Zeitpunkt ohne Dauer"},{"t":"Eine reine Kostenangabe"},{"t":"Ein Mitarbeiter"}],"e":"Ein Vorgang ist eine Tätigkeit mit einer bestimmten Dauer. Davon zu unterscheiden ist das Ereignis – ein Zeitpunkt ohne Dauer (z. B. das Erreichen eines Meilensteins)."},{"id":"M-PM-044","f":3,"sub":"Projektmanagement","t":"mc","q":"Warum sollte man vor Projektbeginn die Stakeholder (Interessengruppen) analysieren?","o":[{"t":"Um Erwartungen, Einfluss und mögliche Widerstände frühzeitig zu erkennen und einzubeziehen","ok":1},{"t":"Um die Umsatzsteuer zu berechnen"},{"t":"Um die Bilanz zu erstellen"},{"t":"Das ist nicht nötig"}],"e":"Die Stakeholderanalyse identifiziert alle vom Projekt betroffenen oder daran interessierten Personen/Gruppen, bewertet deren Einfluss und Erwartungen und hilft, Unterstützung zu gewinnen und Widerstände rechtzeitig zu managen."},{"id":"M-PM-045","f":3,"sub":"Projektmanagement","t":"mc","q":"Was versteht man unter „Terminplanung“ im Projekt?","o":[{"t":"Die zeitliche Anordnung der Vorgänge mit Anfangs-/Endterminen (z. B. per Netzplan oder Balkenplan)","ok":1},{"t":"Die Festlegung des Firmennamens"},{"t":"Die Erstellung der Lohnabrechnung"},{"t":"Die Wahl des Aufsichtsrats"}],"e":"Die Terminplanung ordnet die Vorgänge zeitlich unter Beachtung ihrer Abhängigkeiten und Dauern an und ermittelt Anfangs- und Endtermine, Puffer und den kritischen Pfad – dargestellt z. B. im Netz- oder Balkenplan."},{"id":"M-PM-046","f":3,"sub":"Projektmanagement","t":"mc","q":"Was ist eine Anordnungsbeziehung im Netzplan (z. B. Normalfolge/Ende-Anfang)?","o":[{"t":"Die logische Abhängigkeit zwischen zwei Vorgängen (z. B. B beginnt, wenn A endet)","ok":1},{"t":"Der Preis eines Vorgangs"},{"t":"Die Zahl der Mitarbeiter"},{"t":"Die Farbe des Balkens"}],"e":"Anordnungsbeziehungen legen fest, in welcher Reihenfolge Vorgänge ablaufen. Am häufigsten ist die Normalfolge (Ende-Anfang): Ein Vorgang kann erst beginnen, wenn der vorhergehende beendet ist."},{"id":"M-PM-047","f":3,"sub":"Projektmanagement","t":"mc","q":"Welche Folge hat es, wenn ein Vorgang auf dem kritischen Pfad um 3 Tage verspätet fertig wird?","o":[{"t":"Das Projektende verschiebt sich um 3 Tage nach hinten","ok":1},{"t":"Nichts, es gibt Puffer"},{"t":"Das Projekt wird 3 Tage kürzer"},{"t":"Nur die Kosten sinken"}],"e":"Kritische Vorgänge haben keinen Puffer. Eine Verzögerung wirkt sich daher unmittelbar auf den Endtermin aus – hier verschiebt sich das Projektende um 3 Tage."},{"id":"M-PM-048","f":3,"sub":"Projektmanagement","t":"mc","q":"Wie kann ein Projekt bei Terminverzug beschleunigt werden (ohne den Umfang zu ändern)?","o":[{"t":"Durch zusätzliche Ressourcen auf dem kritischen Pfad oder Parallelisierung von Vorgängen","ok":1},{"t":"Durch Beschleunigung von Vorgängen mit hohem Puffer"},{"t":"Durch Verlängerung aller Vorgänge"},{"t":"Durch Abbruch des Projekts"}],"e":"Wirksam ist eine Verkürzung dort, wo sie zählt: auf dem kritischen Pfad (mehr Personal/Mittel) oder durch das teilweise parallele Ausführen von bisher nacheinander geplanten Vorgängen. Puffer-behaftete Vorgänge zu beschleunigen bringt für den Endtermin nichts."},{"id":"M-PM-049","f":3,"sub":"Projektmanagement","t":"mc","q":"Wozu dient die Nachkalkulation eines Projekts?","o":[{"t":"Zum Vergleich der geplanten mit den tatsächlichen Kosten und zur Auswertung für künftige Projekte","ok":1},{"t":"Zur Festlegung des Projektziels"},{"t":"Zur ersten Grobplanung"},{"t":"Zur Wahl der Rechtsform"}],"e":"Die Nachkalkulation stellt nach Projektende die Ist-Kosten den geplanten Kosten gegenüber. Abweichungen werden analysiert; die Erkenntnisse verbessern die Schätzgenauigkeit künftiger Projekte."},{"id":"M-PM-050","f":3,"sub":"Projektmanagement","t":"open","q":"Nennen Sie die vier Phasen eines Projekts und beschreiben Sie kurz, was in jeder Phase geschieht.","a":"1) Definitions-/Initiierungsphase: Das Projekt wird ins Leben gerufen. Ziele werden formuliert (möglichst SMART), Nutzen und Rahmenbedingungen geklärt, ein grober Zeit- und Kostenrahmen abgesteckt und der Projektauftrag erteilt. 2) Planungsphase: Das Projekt wird detailliert geplant – Projektstrukturplan (Arbeitspakete), Ablauf- und Terminplanung (z. B. Netzplan mit kritischem Pfad), Ressourcen-, Kosten- und Risikoplanung. 3) Durchführungs-/Steuerungsphase: Die Arbeitspakete werden umgesetzt; parallel läuft das Projektcontrolling mit Soll-Ist-Vergleichen bei Terminen, Kosten und Leistung, und bei Abweichungen wird gegengesteuert. 4) Abschlussphase: Die Ergebnisse werden abgenommen und übergeben, die Dokumentation erstellt und das Projekt ausgewertet (Lessons Learned), bevor das Team entlastet wird.","e":"Merkfolge: Definition → Planung → Durchführung/Steuerung → Abschluss. Jede Phase baut auf der vorherigen auf und endet oft mit einem Meilenstein."},{"id":"M-KT-001","f":3,"sub":"Kreativitätstechniken","t":"mc","q":"Welche Grundregel gilt in der Ideenfindungsphase des Brainstormings?","o":[{"t":"Kritik ist zunächst verboten – Quantität geht vor Qualität","ok":1},{"t":"Nur der Moderator nennt Ideen"},{"t":"Jede Idee wird sofort bewertet"},{"t":"Es sind maximal fünf Ideen erlaubt"}],"e":"Beim Brainstorming (nach Osborn) werden zunächst möglichst viele Ideen frei gesammelt – auch ungewöhnliche. Kritik und Bewertung sind in dieser Phase verboten; sie erfolgen getrennt in einer zweiten Phase."},{"id":"M-KT-002","f":3,"sub":"Kreativitätstechniken","t":"mc","q":"In welche zwei Phasen gliedert sich das Brainstorming?","o":[{"t":"Ideenfindung (Sammeln) und Ideenbewertung (Ordnen/Auswählen)","ok":1},{"t":"Planung und Kontrolle"},{"t":"Einkauf und Verkauf"},{"t":"Analyse und Abrechnung"}],"e":"Zuerst werden ohne Kritik viele Ideen produziert (Ideenfindung), danach werden die Ideen gesichtet, geordnet und bewertet (Ideenbewertung). Die Trennung schützt den kreativen Fluss."},{"id":"M-KT-003","f":3,"sub":"Kreativitätstechniken","t":"mc","q":"Was kennzeichnet die 6-3-5-Methode (Brainwriting)?","o":[{"t":"6 Teilnehmer schreiben je 3 Ideen auf und geben das Blatt 5-mal weiter","ok":1},{"t":"6 Minuten, 3 Themen, 5 Regeln"},{"t":"6 Manager entscheiden in 3 bis 5 Runden"},{"t":"Eine Kalkulationsmethode"}],"e":"Die 6-3-5-Methode ist eine schriftliche Kreativtechnik: 6 Teilnehmer notieren je 3 Ideen und reichen das Blatt 5-mal weiter. Die Nachbarn greifen die Ideen auf und entwickeln sie weiter – rechnerisch bis zu 108 Ideen."},{"id":"M-KT-004","f":3,"sub":"Kreativitätstechniken","t":"mc","q":"Wie viele Ideen können bei der 6-3-5-Methode rechnerisch maximal entstehen?","o":[{"t":"108","ok":1},{"t":"18","ok":0},{"t":"90"},{"t":"635"}],"e":"6 Teilnehmer × 3 Ideen × 6 Blattdurchläufe (Ausgangsrunde + 5 Weitergaben) = 108 Ideen. Die „5“ steht für die Anzahl der Weitergaben."},{"id":"M-KT-005","f":3,"sub":"Kreativitätstechniken","t":"mc","q":"Was ist ein morphologischer Kasten (nach Zwicky)?","o":[{"t":"Eine Matrix aus Parametern (Merkmalen) und deren möglichen Ausprägungen zur systematischen Lösungssuche","ok":1},{"t":"Ein Ursache-Wirkungs-Diagramm"},{"t":"Ein Balkenplan"},{"t":"Eine Bilanz"}],"e":"Im morphologischen Kasten werden die relevanten Parameter eines Problems (Zeilen) mit ihren möglichen Ausprägungen (Spalten) aufgelistet. Eine Gesamtlösung entsteht, indem man je Parameter eine Ausprägung auswählt und kombiniert."},{"id":"M-KT-006","f":3,"sub":"Kreativitätstechniken","t":"mc","q":"Wozu dient eine Mindmap?","o":[{"t":"Zur strukturierten, verzweigten Sammlung und Ordnung von Gedanken um ein zentrales Thema","ok":1},{"t":"Zur Berechnung von Kosten"},{"t":"Zur Darstellung eines Netzplans"},{"t":"Zur Erstellung der Lohnabrechnung"}],"e":"Die Mindmap (nach Buzan) stellt ein zentrales Thema in der Mitte dar; davon zweigen Hauptäste und Unteräste ab. Sie eignet sich zum Sammeln, Strukturieren und Merken von Informationen."},{"id":"M-KT-007","f":3,"sub":"Kreativitätstechniken","t":"mc","q":"Was ist typisch für die Synektik als Kreativitätstechnik?","o":[{"t":"Die Lösungssuche über Verfremdung und Analogiebildung (z. B. Vergleiche mit der Natur)","ok":1},{"t":"Das reine Auflisten von Zahlen"},{"t":"Die Berechnung des Deckungsbeitrags"},{"t":"Die Wahl der Rechtsform"}],"e":"Die Synektik verfremdet das Problem bewusst und bildet Analogien (etwa zu Vorgängen in der Natur – Stichwort Bionik), um durch den Umweg auf neue, unkonventionelle Lösungsansätze zu kommen."},{"id":"M-KT-008","f":3,"sub":"Kreativitätstechniken","t":"mc","q":"Warum ist während der Ideenfindung Kritik schädlich?","o":[{"t":"Sie blockiert den kreativen Fluss und hält Teilnehmer davon ab, ungewöhnliche Ideen zu äußern","ok":1},{"t":"Sie ist gesetzlich verboten"},{"t":"Sie erhöht die Kosten"},{"t":"Sie verlängert die Lieferzeit"}],"e":"Frühe Bewertung führt dazu, dass Teilnehmer aus Angst vor Ablehnung nur „sichere“ Ideen nennen. Erst die kritikfreie Phase ermöglicht viele und kreative Vorschläge; bewertet wird später."},{"id":"M-KT-009","f":3,"sub":"Kreativitätstechniken","t":"mc","q":"Wozu dient das Ishikawa-(Fischgräten-)Diagramm?","o":[{"t":"Zur systematischen Analyse möglicher Ursachen eines Problems","ok":1},{"t":"Zur Darstellung von Terminen auf einer Zeitachse"},{"t":"Zur Preisberechnung"},{"t":"Zur Personalplanung"}],"e":"Das Ursache-Wirkungs-Diagramm ordnet mögliche Ursachen eines Problems (die „Wirkung“ am Kopf der Gräte) systematisch Kategorien zu. Es ist eines der sieben Qualitätswerkzeuge."},{"id":"M-KT-010","f":3,"sub":"Kreativitätstechniken","t":"mc","q":"Welche Kategorien werden im Ishikawa-Diagramm klassischerweise verwendet (4M/6M)?","o":[{"t":"Mensch, Maschine, Material, Methode (ergänzt um Milieu/Mitwelt und Messung)","ok":1},{"t":"Preis, Menge, Termin, Ort"},{"t":"Zeit, Kosten, Qualität, Umfang"},{"t":"Beschaffung, Produktion, Absatz, Finanzierung"}],"e":"Die klassischen 4M sind Mensch, Maschine, Material und Methode. In der Praxis werden sie oft zu 6M erweitert um Milieu/Mitwelt (Umgebung) und Messung."},{"id":"M-KT-011","f":3,"sub":"Kreativitätstechniken","t":"mc","q":"Was besagt das Pareto-Prinzip?","o":[{"t":"Rund 80 % der Wirkung gehen häufig auf etwa 20 % der Ursachen zurück","ok":1},{"t":"Alle Ursachen wirken gleich stark"},{"t":"Die Hälfte der Aufgaben erledigt sich selbst"},{"t":"Qualität und Kosten sind stets gleich"}],"e":"Die 80/20-Regel besagt, dass ein kleiner Teil der Ursachen einen großen Teil der Wirkung erzeugt. Sie hilft, die wenigen entscheidenden Faktoren zuerst anzugehen (Grundlage u. a. der ABC-Analyse)."},{"id":"M-KT-012","f":3,"sub":"Kreativitätstechniken","t":"mc","q":"Was stellt ein Pareto-Diagramm dar?","o":[{"t":"Die nach Häufigkeit/Bedeutung geordneten Ursachen als Säulen mit kumulierter Linie","ok":1},{"t":"Die Aufbauorganisation"},{"t":"Einen Netzplan"},{"t":"Die Bilanz"}],"e":"Im Pareto-Diagramm werden die Fehlerursachen absteigend nach Häufigkeit als Säulen dargestellt, ergänzt um eine kumulierte Summenlinie. So erkennt man schnell die „wenigen wichtigen“ Ursachen."},{"id":"M-KT-013","f":3,"sub":"Kreativitätstechniken","t":"mc","q":"Wonach klassifiziert die ABC-Analyse?","o":[{"t":"Nach dem wertmäßigen Anteil der Objekte am Gesamtwert","ok":1},{"t":"Nach dem Alphabet"},{"t":"Nach dem Gewicht"},{"t":"Nach der Farbe"}],"e":"Die ABC-Analyse ordnet Objekte (z. B. Materialien, Kunden) nach ihrem Wertanteil in A- (hoher Wert, geringe Menge), B- und C-Klassen und lenkt die Aufmerksamkeit auf die wertintensiven A-Positionen."},{"id":"M-KT-014","f":3,"sub":"Kreativitätstechniken","t":"mc","q":"Eine Position hat einen Jahreswert von 80.000 € bei einem Gesamtwert aller Positionen von 400.000 €. Welchen Wertanteil hat die Position?","o":[{"t":"20 %","ok":1},{"t":"5 %"},{"t":"80 %"},{"t":"25 %"}],"e":"Wertanteil = Positionswert ÷ Gesamtwert × 100 = 80.000 ÷ 400.000 × 100 = 20 %. Solche wertintensiven Positionen sind meist A-Güter."},{"id":"M-KT-015","f":3,"sub":"Kreativitätstechniken","t":"mc","q":"Was leistet eine Nutzwertanalyse (Entscheidungsmatrix)?","o":[{"t":"Die Bewertung von Alternativen anhand gewichteter Kriterien mit einer Gesamtpunktsumme","ok":1},{"t":"Die Berechnung der Umsatzsteuer"},{"t":"Die Erstellung eines Organigramms"},{"t":"Die Messung der Raumtemperatur"}],"e":"Bei der Nutzwertanalyse (nach Zangemeister) werden Zielkriterien gewichtet, jede Alternative je Kriterium bepunktet und mit dem Gewicht multipliziert. Die Alternative mit dem höchsten gewichteten Gesamtnutzwert gewinnt."},{"id":"M-KT-016","f":3,"sub":"Kreativitätstechniken","t":"mc","q":"In welcher Reihenfolge geht man bei einer Nutzwertanalyse vor?","o":[{"t":"Kriterien festlegen → gewichten → Alternativen bewerten → gewichtete Punkte summieren → auswählen","ok":1},{"t":"Auswählen → gewichten → Kriterien festlegen"},{"t":"Bewerten → auswählen → Kriterien festlegen"},{"t":"Summieren → gewichten → bewerten"}],"e":"Man bestimmt zuerst die Bewertungskriterien, gewichtet sie (Summe der Gewichte z. B. 100 %), bewertet jede Alternative je Kriterium mit Punkten, multipliziert Punkte mit Gewicht und summiert. Höchster Nutzwert = beste Alternative."},{"id":"M-KT-017","f":3,"sub":"Kreativitätstechniken","t":"mc","q":"Eine Alternative wird bewertet: Kriterium A (Gewicht 50 %) 8 Punkte, Kriterium B (30 %) 6 Punkte, Kriterium C (20 %) 9 Punkte. Wie hoch ist der Nutzwert?","o":[{"t":"7,6 Punkte","ok":1},{"t":"23 Punkte"},{"t":"7,0 Punkte"},{"t":"8,0 Punkte"}],"e":"Nutzwert = Σ (Gewicht × Punkte) = 0,5×8 + 0,3×6 + 0,2×9 = 4,0 + 1,8 + 1,8 = 7,6 Punkte."},{"id":"M-KT-018","f":3,"sub":"Kreativitätstechniken","t":"mc","q":"Alternative X erreicht in der Nutzwertanalyse 7,6 Punkte, Alternative Y 6,9 Punkte. Welche wird gewählt?","o":[{"t":"Alternative X (höchster Nutzwert)","ok":1},{"t":"Alternative Y"},{"t":"Beide gleichermaßen"},{"t":"Keine"}],"e":"In der Nutzwertanalyse wird die Alternative mit dem höchsten gewichteten Gesamtnutzwert gewählt – hier X mit 7,6 Punkten."},{"id":"M-KT-019","f":3,"sub":"Kreativitätstechniken","t":"mc","q":"Was untersucht eine SWOT-Analyse?","o":[{"t":"Interne Stärken/Schwächen und externe Chancen/Risiken","ok":1},{"t":"Nur die Kosten"},{"t":"Nur die Termine"},{"t":"Die Aufbauorganisation"}],"e":"Die SWOT-Analyse stellt die internen Stärken (Strengths) und Schwächen (Weaknesses) den externen Chancen (Opportunities) und Risiken (Threats) gegenüber – Grundlage für strategische Entscheidungen."},{"id":"M-KT-020","f":3,"sub":"Kreativitätstechniken","t":"mc","q":"Welche Faktoren der SWOT-Analyse sind intern (unternehmensbezogen)?","o":[{"t":"Stärken und Schwächen","ok":1},{"t":"Chancen und Risiken"},{"t":"Nur die Chancen"},{"t":"Nur die Risiken"}],"e":"Stärken und Schwächen betreffen das Unternehmen selbst (intern, beeinflussbar). Chancen und Risiken kommen aus dem Umfeld (extern, z. B. Markt, Wettbewerb, Recht)."},{"id":"M-KT-021","f":3,"sub":"Kreativitätstechniken","t":"mc","q":"Wozu dient der paarweise Vergleich?","o":[{"t":"Zur Priorisierung: Jede Option wird mit jeder anderen verglichen, um eine Rangfolge zu bilden","ok":1},{"t":"Zur Berechnung der Abschreibung"},{"t":"Zur Darstellung eines Balkenplans"},{"t":"Zur Lohnabrechnung"}],"e":"Beim paarweisen Vergleich werden alle Optionen jeweils zu zweit gegenübergestellt und die jeweils wichtigere gewählt. Durch Auszählen der „Siege“ entsteht eine Rangfolge – hilfreich, wenn Kriterien schwer direkt zu gewichten sind."},{"id":"M-KT-022","f":3,"sub":"Kreativitätstechniken","t":"mc","q":"Was zeigt ein Entscheidungsbaum?","o":[{"t":"Entscheidungsalternativen und ihre möglichen Folgen als verzweigte Struktur","ok":1},{"t":"Die Aufbauorganisation"},{"t":"Die Bilanz"},{"t":"Den Materialfluss"}],"e":"Der Entscheidungsbaum stellt Entscheidungen, mögliche Ereignisse und deren Konsequenzen (ggf. mit Wahrscheinlichkeiten und Werten) als Verzweigungen dar und hilft, die vorteilhafteste Alternative zu bestimmen."},{"id":"M-KT-023","f":3,"sub":"Kreativitätstechniken","t":"mc","q":"Was betrachtet die Kraftfeldanalyse (nach Lewin)?","o":[{"t":"Die fördernden und die hemmenden Kräfte einer geplanten Veränderung","ok":1},{"t":"Die Höhe der Fixkosten"},{"t":"Die Umschlagshäufigkeit"},{"t":"Die Rechtsform"}],"e":"Die Kraftfeldanalyse stellt die Kräfte, die eine Veränderung unterstützen, den Kräften gegenüber, die sie behindern. Ziel ist es, fördernde Kräfte zu stärken und hemmende zu verringern."},{"id":"M-KT-024","f":3,"sub":"Kreativitätstechniken","t":"mc","q":"In welcher Reihenfolge verläuft ein systematischer Entscheidungsprozess?","o":[{"t":"Problem erkennen → Ziele/Kriterien festlegen → Alternativen suchen → bewerten → entscheiden → umsetzen → kontrollieren","ok":1},{"t":"Entscheiden → Problem erkennen → umsetzen"},{"t":"Umsetzen → bewerten → Ziele festlegen"},{"t":"Kontrollieren → entscheiden → Problem erkennen"}],"e":"Ein rationaler Entscheidungsprozess beginnt mit der Problemerkennung, führt über Zielbestimmung, Alternativensuche und -bewertung zur Entscheidung und schließt mit Umsetzung und Erfolgskontrolle."},{"id":"M-KT-025","f":3,"sub":"Kreativitätstechniken","t":"mc","q":"Welches Verfahren gehört zu den „sieben Qualitätswerkzeugen“ (Q7)?","o":[{"t":"Das Ursache-Wirkungs-(Ishikawa-)Diagramm","ok":1},{"t":"Die Bilanz"},{"t":"Der Netzplan"},{"t":"Die Gewinn- und Verlustrechnung"}],"e":"Zu den sieben Qualitätswerkzeugen zählen u. a. Fehlersammelliste, Histogramm, Qualitätsregelkarte, Pareto-Diagramm, Ursache-Wirkungs-Diagramm, Korrelationsdiagramm und Flussdiagramm."},{"id":"M-KT-026","f":3,"sub":"Kreativitätstechniken","t":"mc","q":"Was ist der Vorteil, Kreativitäts- und Bewertungsphase zu trennen?","o":[{"t":"Es entstehen zunächst mehr Ideen, die anschließend sachlich bewertet werden können","ok":1},{"t":"Es spart Umsatzsteuer"},{"t":"Es verkürzt die Lieferzeit"},{"t":"Es erhöht den Lagerbestand"}],"e":"Werden zuerst ohne Kritik viele Ideen gesammelt und erst danach bewertet, bleibt der kreative Fluss erhalten und man verwirft keine Idee vorschnell. Die Bewertung erfolgt dann strukturiert (z. B. mit Nutzwertanalyse)."},{"id":"M-KT-027","f":3,"sub":"Kreativitätstechniken","t":"mc","q":"Wozu dient ein Flussdiagramm (Flowchart)?","o":[{"t":"Zur grafischen Darstellung von Abläufen/Prozessen mit standardisierten Symbolen","ok":1},{"t":"Zur Berechnung des Gewinns"},{"t":"Zur Darstellung der Bilanz"},{"t":"Zur Personalauswahl"}],"e":"Das Flussdiagramm bildet einen Prozess Schritt für Schritt mit genormten Symbolen ab (z. B. Start/Ende, Tätigkeit, Verzweigung/Entscheidung). Es macht Abläufe verständlich und deckt Schwachstellen auf."},{"id":"M-KT-028","f":3,"sub":"Kreativitätstechniken","t":"mc","q":"Was ist der Zweck einer Fehlersammelliste (Strichliste)?","o":[{"t":"Das systematische Erfassen von Fehlerarten und deren Häufigkeit","ok":1},{"t":"Die Berechnung der Abschreibung"},{"t":"Die Wahl der Rechtsform"},{"t":"Die Terminplanung"}],"e":"Die Fehlersammelliste erfasst, welche Fehler wie oft auftreten. Sie liefert die Datenbasis, um daraus z. B. ein Pareto-Diagramm zu erstellen und die häufigsten Fehler gezielt anzugehen."},{"id":"M-KT-029","f":3,"sub":"Kreativitätstechniken","t":"mc","q":"Was ist das Ziel der Methode „5-mal Warum“ (5 Why)?","o":[{"t":"Durch wiederholtes Fragen nach dem „Warum“ die eigentliche Grundursache eines Problems zu finden","ok":1},{"t":"Fünf Angebote einzuholen"},{"t":"Fünf Mitarbeiter zu befragen"},{"t":"Den Preis fünfmal zu senken"}],"e":"Bei „5 Why“ fragt man ausgehend vom Problem mehrfach „Warum?“, um von den Symptomen zur eigentlichen Grundursache vorzudringen, statt nur an der Oberfläche zu bleiben."},{"id":"M-KT-030","f":3,"sub":"Kreativitätstechniken","t":"mc","q":"Welche Aussage zur ABC-Analyse ist richtig?","o":[{"t":"A-Güter haben hohen Wert- und geringen Mengenanteil und verdienen die größte Aufmerksamkeit","ok":1},{"t":"C-Güter sind die wertvollsten"},{"t":"Alle Klassen sind gleich zu behandeln"},{"t":"A-Güter haben den geringsten Wert"}],"e":"A-Güter binden den größten Wert bei kleiner Menge – hier lohnt sich intensive Disposition und Preisverhandlung. C-Güter (viel Menge, wenig Wert) werden einfacher (z. B. pauschal) bewirtschaftet."},{"id":"M-KT-031","f":3,"sub":"Kreativitätstechniken","t":"open","q":"Nennen Sie die wichtigsten Regeln des Brainstormings und erläutern Sie, warum die Ideenfindung von der Bewertung getrennt wird.","a":"Die wichtigsten Regeln des Brainstormings sind: (1) Während der Ideenfindung ist jede Kritik und Bewertung verboten. (2) Quantität geht vor Qualität – es sollen möglichst viele Ideen entstehen. (3) Auch ungewöhnliche, spontane oder scheinbar unrealistische Ideen sind willkommen. (4) Die Ideen anderer dürfen aufgegriffen, kombiniert und weiterentwickelt werden. Die Trennung von Ideenfindung und Bewertung ist wichtig, weil frühe Kritik den kreativen Fluss blockiert: Aus Angst vor Ablehnung äußern die Teilnehmer dann nur noch „sichere“, naheliegende Ideen, und ungewöhnliche – oft besonders wertvolle – Vorschläge bleiben ungenannt. Erst wenn genügend Ideen gesammelt sind, werden sie in einer zweiten Phase sachlich geordnet und bewertet (z. B. mit einer Nutzwertanalyse).","e":"Kernidee: erst viele Ideen ohne Kritik sammeln, dann strukturiert bewerten – so bleibt die Kreativität erhalten und keine Idee wird vorschnell verworfen."},{"id":"M-KT-032","f":3,"sub":"Kreativitätstechniken","t":"open","q":"Erläutern Sie den Aufbau und Zweck eines Ishikawa-Diagramms und nennen Sie die klassischen Kategorien.","a":"Das Ishikawa- oder Ursache-Wirkungs-Diagramm (wegen seiner Form auch Fischgräten-Diagramm genannt) dient der systematischen Suche nach den Ursachen eines Problems. Am Kopf der „Gräte“ steht die Wirkung (das Problem, z. B. „häufige Reklamationen“). Von der Mittellinie zweigen als Hauptgräten die Ursachenkategorien ab; an ihnen werden die einzelnen möglichen Ursachen als Nebengräten eingetragen (oft ergänzt durch die 5-Why-Technik). Die klassischen Kategorien sind die 4M: Mensch, Maschine, Material und Methode; in der Praxis werden sie häufig zu 6M erweitert um Milieu/Mitwelt (Umgebung) und Messung. Zweck ist es, alle denkbaren Ursachen strukturiert zu sammeln, sichtbar zu machen und anschließend die wahrscheinlichsten gezielt zu untersuchen. Das Diagramm ist eines der sieben Qualitätswerkzeuge.","e":"Kurz: Wirkung am Kopf, Ursachen nach Kategorien (4M/6M: Mensch, Maschine, Material, Methode, Milieu, Messung) geordnet – ein Werkzeug der Ursachenanalyse."},{"id":"M-KT-033","f":3,"sub":"Kreativitätstechniken","t":"open","q":"Eine Führungskraft vergleicht zwei Fahrzeuge mit einer Nutzwertanalyse. Kriterien und Gewichte: Wirtschaftlichkeit 50 %, Zuverlässigkeit 30 %, Umweltfreundlichkeit 20 %. Fahrzeug A erhält 8/7/6 Punkte, Fahrzeug B 6/9/8 Punkte (Skala 0–10). Berechnen Sie die Nutzwerte und geben Sie eine Empfehlung.","a":"Nutzwert = Summe aus (Gewicht × Punktzahl) je Kriterium. Fahrzeug A: 0,5×8 + 0,3×7 + 0,2×6 = 4,0 + 2,1 + 1,2 = 7,3 Punkte. Fahrzeug B: 0,5×6 + 0,3×9 + 0,2×8 = 3,0 + 2,7 + 1,6 = 7,3 Punkte. Beide Fahrzeuge erreichen denselben Nutzwert von 7,3 Punkten – die Nutzwertanalyse ergibt hier einen Gleichstand. In diesem Fall sollte die Entscheidung durch zusätzliche Überlegungen ergänzt werden, etwa durch eine feinere Gewichtung, weitere Kriterien (z. B. Anschaffungspreis, Servicenetz), eine genauere Punktbewertung oder ein K.-o.-Kriterium. Die Nutzwertanalyse macht die Bewertung transparent, ersetzt aber bei einem Gleichstand nicht das abschließende Urteil.","e":"Rechenweg: je Kriterium Gewicht × Punkte, dann summieren. Wichtig ist auch die richtige Interpretation – bei Gleichstand sind ergänzende Kriterien nötig."},{"id":"M-KT-034","f":3,"sub":"Kreativitätstechniken","t":"mc","q":"Warum wird die ABC-Analyse häufig mit der XYZ-Analyse kombiniert?","o":[{"t":"Weil ABC den Wert und XYZ die Vorhersagbarkeit des Verbrauchs bewertet – zusammen ergibt sich eine bessere Steuerung","ok":1},{"t":"Weil beide dasselbe messen"},{"t":"Weil XYZ die Rechtsform bestimmt"},{"t":"Weil ABC den Gewinn berechnet"}],"e":"Die ABC-Analyse gewichtet nach Wert, die XYZ-Analyse nach der Regelmäßigkeit/Vorhersagbarkeit des Verbrauchs. Kombiniert (z. B. AX, CZ) lässt sich die Beschaffungs- und Bevorratungsstrategie differenziert festlegen."},{"id":"M-KT-035","f":3,"sub":"Kreativitätstechniken","t":"mc","q":"Was ist das Ergebnis, wenn man im morphologischen Kasten je Parameter eine Ausprägung auswählt?","o":[{"t":"Eine mögliche Gesamtlösung (Kombination), die man mit anderen Kombinationen vergleichen kann","ok":1},{"t":"Ein fertiger Netzplan"},{"t":"Eine Bilanz"},{"t":"Ein Organigramm"}],"e":"Durch die Auswahl je einer Ausprägung pro Parameter (Zeile) entsteht eine konkrete Lösungsvariante. Aus den vielen möglichen Kombinationen wählt man die sinnvollsten aus und bewertet sie weiter."},{"id":"M-KT-036","f":3,"sub":"Kreativitätstechniken","t":"mc","q":"Welche Technik eignet sich besonders, um in einer Gruppe ohne Wortbeiträge (schriftlich) viele Ideen zu erzeugen?","o":[{"t":"Die 6-3-5-Methode (Brainwriting)","ok":1},{"t":"Die Bilanzanalyse"},{"t":"Die Netzplantechnik"},{"t":"Die Amortisationsrechnung"}],"e":"Beim Brainwriting (6-3-5) werden Ideen schriftlich festgehalten und weitergereicht. Das ist vorteilhaft, wenn dominante Redner den mündlichen Austausch prägen würden oder Teilnehmer zurückhaltend sind."},{"id":"M-KT-037","f":3,"sub":"Kreativitätstechniken","t":"mc","q":"Was ist ein Vorteil visueller Techniken wie Mindmap oder Diagramm gegenüber reinem Fließtext?","o":[{"t":"Zusammenhänge werden schneller erfassbar und besser erinnert","ok":1},{"t":"Sie sind immer rechtlich vorgeschrieben"},{"t":"Sie senken die Umsatzsteuer"},{"t":"Sie ersetzen die Buchhaltung"}],"e":"Visualisierungen bündeln Informationen, zeigen Strukturen und Beziehungen auf einen Blick und sprechen das bildhafte Gedächtnis an. Dadurch werden komplexe Inhalte verständlicher und einprägsamer."},{"id":"M-KT-038","f":3,"sub":"Kreativitätstechniken","t":"mc","q":"Wozu dient eine Qualitätsregelkarte (Kontrollkarte)?","o":[{"t":"Zur Überwachung eines Prozesses anhand von Messwerten und Eingriffsgrenzen im Zeitverlauf","ok":1},{"t":"Zur Berechnung des Gewinns"},{"t":"Zur Wahl des Aufsichtsrats"},{"t":"Zur Terminplanung"}],"e":"Die Qualitätsregelkarte trägt Messwerte eines Prozesses über die Zeit ein und vergleicht sie mit Warn- und Eingriffsgrenzen. Verlässt der Prozess diese Grenzen, wird eingegriffen – ein Werkzeug der statistischen Prozesslenkung (SPC)."},{"id":"M-KT-039","f":3,"sub":"Kreativitätstechniken","t":"mc","q":"Was ist der Zweck eines Korrelationsdiagramms (Streudiagramm)?","o":[{"t":"Den möglichen Zusammenhang zwischen zwei Merkmalen sichtbar zu machen","ok":1},{"t":"Die Bilanz darzustellen"},{"t":"Einen Netzplan zu zeichnen"},{"t":"Die Lohnabrechnung zu erstellen"}],"e":"Im Korrelations-/Streudiagramm werden Wertepaare zweier Merkmale als Punkte aufgetragen. Die Punktwolke zeigt, ob und wie stark ein Zusammenhang besteht (z. B. je höher X, desto höher Y)."},{"id":"M-KT-040","f":3,"sub":"Kreativitätstechniken","t":"open","q":"Beschreiben Sie die Schritte eines systematischen Entscheidungsprozesses.","a":"Ein systematischer Entscheidungsprozess läuft in mehreren Schritten ab: (1) Problem erkennen und abgrenzen – die Ausgangssituation und der Entscheidungsbedarf werden klar beschrieben. (2) Ziele und Bewertungskriterien festlegen – woran soll die Lösung gemessen werden, ggf. mit Gewichtung. (3) Alternativen suchen – mögliche Lösungswege werden gesammelt (z. B. mit Kreativitätstechniken). (4) Alternativen bewerten – die Optionen werden anhand der Kriterien beurteilt (z. B. mit einer Nutzwertanalyse oder einem paarweisen Vergleich), einschließlich ihrer Vor- und Nachteile und Risiken. (5) Entscheidung treffen – die Alternative mit dem besten Gesamtergebnis wird ausgewählt. (6) Umsetzung – die Entscheidung wird geplant und durchgeführt. (7) Kontrolle – es wird überprüft, ob das Ziel erreicht wurde, und bei Abweichungen nachgesteuert.","e":"Merkfolge: Problem → Ziele/Kriterien → Alternativen → Bewertung → Entscheidung → Umsetzung → Kontrolle. Kreativitäts- und Bewertungstechniken unterstützen die einzelnen Schritte."},{"id":"M-ST-001","f":3,"sub":"Statistik","t":"mc","q":"Womit beschäftigt sich die deskriptive (beschreibende) Statistik?","o":[{"t":"Mit dem Aufbereiten und übersichtlichen Darstellen von erhobenen Daten","ok":1},{"t":"Mit dem Schließen von der Stichprobe auf die Grundgesamtheit"},{"t":"Mit der Buchführung"},{"t":"Mit der Rechtsformwahl"}],"e":"Die deskriptive Statistik ordnet, verdichtet und stellt vorhandene Daten dar (Tabellen, Kennzahlen, Diagramme). Die induktive (schließende) Statistik zieht dagegen Rückschlüsse von einer Stichprobe auf die Grundgesamtheit."},{"id":"M-ST-002","f":3,"sub":"Statistik","t":"mc","q":"Was versteht man unter der Grundgesamtheit?","o":[{"t":"Die Gesamtheit aller Elemente/Merkmalsträger, über die eine Aussage getroffen werden soll","ok":1},{"t":"Eine einzelne Messung"},{"t":"Den Mittelwert"},{"t":"Die Häufigkeit eines Wertes"}],"e":"Die Grundgesamtheit umfasst alle Untersuchungsobjekte (Merkmalsträger). Wird nur ein Teil erhoben, spricht man von einer Stichprobe – aus ihr wird auf die Grundgesamtheit geschlossen."},{"id":"M-ST-003","f":3,"sub":"Statistik","t":"mc","q":"Worin unterscheiden sich qualitative und quantitative Merkmale?","o":[{"t":"Qualitative Merkmale sind artmäßig (z. B. Farbe, Beruf), quantitative sind zahlenmäßig messbar (z. B. Gewicht, Alter)","ok":1},{"t":"Beide sind identisch"},{"t":"Qualitative Merkmale sind immer Zahlen"},{"t":"Quantitative Merkmale kann man nicht messen"}],"e":"Qualitative (artmäßige) Merkmale beschreiben Eigenschaften wie Farbe oder Geschlecht; quantitative (zahlenmäßige) Merkmale sind messbar/zählbar (z. B. Länge, Stückzahl). Quantitative Merkmale können diskret oder stetig sein."},{"id":"M-ST-004","f":3,"sub":"Statistik","t":"mc","q":"Worin unterscheiden sich diskrete und stetige Merkmale?","o":[{"t":"Diskrete Merkmale nehmen nur abzählbare Werte an (z. B. Stückzahl), stetige jeden Zwischenwert (z. B. Länge)","ok":1},{"t":"Beide sind identisch"},{"t":"Diskrete Merkmale sind immer Kommazahlen"},{"t":"Stetige Merkmale sind nicht messbar"}],"e":"Diskrete Merkmale haben klar getrennte, abzählbare Ausprägungen (z. B. Zahl der Fahrzeuge). Stetige Merkmale können innerhalb eines Bereichs jeden Wert annehmen (z. B. Gewicht, Zeit)."},{"id":"M-ST-005","f":3,"sub":"Statistik","t":"mc","q":"Was ist die relative Häufigkeit eines Merkmalswerts?","o":[{"t":"Der Anteil des Wertes an der Gesamtzahl (absolute Häufigkeit ÷ Gesamtzahl)","ok":1},{"t":"Die reine Anzahl der Nennungen"},{"t":"Der größte gemessene Wert"},{"t":"Der Mittelwert"}],"e":"Die relative Häufigkeit = absolute Häufigkeit ÷ Anzahl aller Werte. Sie wird oft in Prozent angegeben und macht Verteilungen unterschiedlicher Größe vergleichbar."},{"id":"M-ST-006","f":3,"sub":"Statistik","t":"mc","q":"Von 60 gelieferten Sendungen waren 15 verspätet. Wie hoch ist die relative Häufigkeit der Verspätungen?","o":[{"t":"25 %","ok":1},{"t":"15 %"},{"t":"40 %"},{"t":"4 %"}],"e":"Relative Häufigkeit = 15 ÷ 60 = 0,25 = 25 %. Ein Viertel der Sendungen war verspätet."},{"id":"M-ST-007","f":3,"sub":"Statistik","t":"mc","q":"Wie berechnet sich das arithmetische Mittel?","o":[{"t":"Summe aller Werte ÷ Anzahl der Werte","ok":1},{"t":"Größter Wert − kleinster Wert"},{"t":"Der mittlere Wert der geordneten Reihe"},{"t":"Der häufigste Wert"}],"e":"Das arithmetische Mittel (Durchschnitt) = Summe aller Werte ÷ Anzahl. Es ist empfindlich gegenüber Ausreißern; dann ist der Median oft aussagekräftiger."},{"id":"M-ST-008","f":3,"sub":"Statistik","t":"mc","q":"Berechnen Sie das arithmetische Mittel der Werte 4, 6, 8, 10, 12.","o":[{"t":"8","ok":1},{"t":"10"},{"t":"6"},{"t":"40"}],"e":"Arithmetisches Mittel = (4 + 6 + 8 + 10 + 12) ÷ 5 = 40 ÷ 5 = 8."},{"id":"M-ST-009","f":3,"sub":"Statistik","t":"mc","q":"Was ist der Median (Zentralwert)?","o":[{"t":"Der Wert in der Mitte der der Größe nach geordneten Datenreihe","ok":1},{"t":"Die Summe aller Werte"},{"t":"Der häufigste Wert"},{"t":"Der größte Wert"}],"e":"Der Median teilt die geordnete Reihe in zwei gleich große Hälften. Bei ungerader Anzahl ist es der mittlere Wert, bei gerader Anzahl der Durchschnitt der beiden mittleren Werte. Er ist robust gegen Ausreißer."},{"id":"M-ST-010","f":3,"sub":"Statistik","t":"mc","q":"Bestimmen Sie den Median der Werte 3, 5, 7, 9, 11.","o":[{"t":"7","ok":1},{"t":"9"},{"t":"5"},{"t":"35"}],"e":"Bei 5 (ungerade Anzahl) geordneten Werten ist der Median der 3. Wert: 3, 5, [7], 9, 11 → Median = 7."},{"id":"M-ST-011","f":3,"sub":"Statistik","t":"mc","q":"Bestimmen Sie den Median der Werte 2, 4, 6, 8.","o":[{"t":"5","ok":1},{"t":"4"},{"t":"6"},{"t":"20"}],"e":"Bei gerader Anzahl ist der Median der Durchschnitt der beiden mittleren Werte: (4 + 6) ÷ 2 = 5."},{"id":"M-ST-012","f":3,"sub":"Statistik","t":"mc","q":"Was ist der Modus (Modalwert)?","o":[{"t":"Der am häufigsten vorkommende Wert einer Datenreihe","ok":1},{"t":"Der mittlere Wert"},{"t":"Der Durchschnitt"},{"t":"Die Spannweite"}],"e":"Der Modus ist der Wert mit der größten Häufigkeit. Es kann mehrere Modalwerte geben (mehrgipflig) oder keinen eindeutigen. Er eignet sich auch für qualitative Merkmale."},{"id":"M-ST-013","f":3,"sub":"Statistik","t":"mc","q":"Bestimmen Sie den Modus der Werte 3, 5, 5, 7, 9.","o":[{"t":"5","ok":1},{"t":"7"},{"t":"29"},{"t":"9"}],"e":"Der Modus ist der häufigste Wert. Die 5 kommt zweimal vor, alle anderen nur einmal → Modus = 5."},{"id":"M-ST-014","f":3,"sub":"Statistik","t":"mc","q":"Warum ist bei stark abweichenden Ausreißern der Median oft aussagekräftiger als das arithmetische Mittel?","o":[{"t":"Weil der Median von einzelnen extremen Werten kaum beeinflusst wird","ok":1},{"t":"Weil der Median immer größer ist"},{"t":"Weil das Mittel nicht berechenbar ist"},{"t":"Weil der Median die Summe zeigt"}],"e":"Ein einzelner sehr großer oder kleiner Wert zieht das arithmetische Mittel stark in seine Richtung. Der Median als „mittlerer“ Wert bleibt davon weitgehend unberührt und beschreibt die typische Lage besser."},{"id":"M-ST-015","f":3,"sub":"Statistik","t":"mc","q":"Wie berechnet sich das gewogene (gewichtete) arithmetische Mittel?","o":[{"t":"Summe aus (Wert × Gewicht) ÷ Summe der Gewichte","ok":1},{"t":"Summe der Werte ÷ Anzahl der Gewichte"},{"t":"Größter Wert × Gewicht"},{"t":"Summe der Gewichte ÷ Summe der Werte"}],"e":"Beim gewogenen Mittel werden die Werte mit ihren Gewichten multipliziert, aufsummiert und durch die Summe der Gewichte geteilt. Es wird verwendet, wenn die Werte unterschiedlich stark ins Gewicht fallen (z. B. Mengen, Bedeutung)."},{"id":"M-ST-016","f":3,"sub":"Statistik","t":"mc","q":"Note 2 zählt dreifach, Note 3 zählt einfach. Wie hoch ist das gewogene arithmetische Mittel?","o":[{"t":"2,25","ok":1},{"t":"2,5"},{"t":"2,0"},{"t":"5,0"}],"e":"Gewogenes Mittel = (2×3 + 3×1) ÷ (3 + 1) = (6 + 3) ÷ 4 = 9 ÷ 4 = 2,25."},{"id":"M-ST-017","f":3,"sub":"Statistik","t":"mc","q":"Was ist die Spannweite (Range) einer Datenreihe?","o":[{"t":"Die Differenz zwischen größtem und kleinstem Wert","ok":1},{"t":"Der Durchschnitt aller Werte"},{"t":"Der häufigste Wert"},{"t":"Die Summe der Werte"}],"e":"Spannweite = Maximum − Minimum. Sie ist das einfachste Streuungsmaß, berücksichtigt aber nur die beiden Extremwerte. Genauer messen Varianz und Standardabweichung die Streuung um den Mittelwert."},{"id":"M-ST-018","f":3,"sub":"Statistik","t":"mc","q":"Die kleinste gemessene Lieferzeit beträgt 12 Stunden, die größte 48 Stunden. Wie hoch ist die Spannweite?","o":[{"t":"36 Stunden","ok":1},{"t":"60 Stunden"},{"t":"30 Stunden"},{"t":"24 Stunden"}],"e":"Spannweite = größter Wert − kleinster Wert = 48 − 12 = 36 Stunden."},{"id":"M-ST-019","f":3,"sub":"Statistik","t":"mc","q":"Was misst die Standardabweichung?","o":[{"t":"Die durchschnittliche Abweichung der Werte vom arithmetischen Mittel (Streuung)","ok":1},{"t":"Den häufigsten Wert"},{"t":"Die Summe aller Werte"},{"t":"Den mittleren Wert der Reihe"}],"e":"Die Standardabweichung (Wurzel aus der Varianz) gibt an, wie stark die Werte im Durchschnitt um den Mittelwert streuen. Eine kleine Standardabweichung bedeutet eng beieinanderliegende, eine große weit gestreute Werte."},{"id":"M-ST-020","f":3,"sub":"Statistik","t":"mc","q":"Welches Diagramm eignet sich am besten zur Darstellung von Anteilen an einem Ganzen (z. B. Marktanteile)?","o":[{"t":"Das Kreis-(Torten-)diagramm","ok":1},{"t":"Das Liniendiagramm"},{"t":"Der Netzplan"},{"t":"Das Streudiagramm"}],"e":"Das Kreisdiagramm zeigt anschaulich, wie sich ein Ganzes (100 %) auf Teile verteilt. Für Anteile ist es ideal; für Zeitverläufe eignet sich das Liniendiagramm, für Vergleiche das Säulendiagramm."},{"id":"M-ST-021","f":3,"sub":"Statistik","t":"mc","q":"Welches Diagramm ist am besten geeignet, um eine Entwicklung über die Zeit (Trend) darzustellen?","o":[{"t":"Das Liniendiagramm","ok":1},{"t":"Das Kreisdiagramm"},{"t":"Das Organigramm"},{"t":"Die Fehlersammelliste"}],"e":"Das Liniendiagramm verbindet Messpunkte über eine Zeitachse und macht Trends und Verläufe (z. B. Umsatzentwicklung) gut sichtbar."},{"id":"M-ST-022","f":3,"sub":"Statistik","t":"mc","q":"Welches Diagramm eignet sich gut zum Vergleich diskreter Werte (z. B. Umsatz mehrerer Filialen)?","o":[{"t":"Das Säulen-/Balkendiagramm","ok":1},{"t":"Das Kreisdiagramm"},{"t":"Das Streudiagramm"},{"t":"Der Netzplan"}],"e":"Säulen- oder Balkendiagramme stellen einzelne Werte als Säulen/Balken nebeneinander und erlauben so den direkten Größenvergleich verschiedener Kategorien."},{"id":"M-ST-023","f":3,"sub":"Statistik","t":"mc","q":"Was stellt ein Histogramm dar?","o":[{"t":"Die Häufigkeitsverteilung eines Merkmals über Klassen (Wertebereiche)","ok":1},{"t":"Die Aufbauorganisation"},{"t":"Einen Projektablauf"},{"t":"Anteile an einem Ganzen"}],"e":"Das Histogramm zeigt, wie häufig Werte in bestimmten Klassen (Intervallen) auftreten. Die Säulenhöhe entspricht der Häufigkeit – geeignet zur Beurteilung von Verteilungen (z. B. Streuung, Symmetrie)."},{"id":"M-ST-024","f":3,"sub":"Statistik","t":"mc","q":"Wodurch können Diagramme unbewusst oder bewusst irreführen?","o":[{"t":"Durch eine abgeschnittene bzw. nicht bei null beginnende Werteachse, die Unterschiede übertrieben groß erscheinen lässt","ok":1},{"t":"Durch die Verwendung einer Legende"},{"t":"Durch eine Achsenbeschriftung"},{"t":"Durch klare Farben"}],"e":"Beginnt die y-Achse nicht bei null oder wird der Maßstab verzerrt, wirken kleine Unterschiede dramatisch. Seriöse Diagramme haben klare Skalen, vollständige Beschriftungen und einen unverzerrten Maßstab."},{"id":"M-ST-025","f":3,"sub":"Statistik","t":"mc","q":"Was gehört zu einem korrekt aufgebauten Diagramm?","o":[{"t":"Aussagekräftiger Titel, beschriftete Achsen mit Einheiten und ggf. eine Legende","ok":1},{"t":"Möglichst viele verschiedene Farben ohne Erklärung"},{"t":"Keine Achsenbeschriftung"},{"t":"Nur die Überschrift"}],"e":"Ein gutes Diagramm ist selbsterklärend: Titel, beschriftete Achsen mit Einheiten, passende Skalen und – bei mehreren Datenreihen – eine Legende. So sind die Aussagen eindeutig nachvollziehbar."},{"id":"M-ST-026","f":3,"sub":"Statistik","t":"mc","q":"Was versteht man unter Betriebsdatenerfassung (BDE)?","o":[{"t":"Das systematische Erfassen von Ist-Daten aus dem Betriebsgeschehen (z. B. Zeiten, Mengen, Zustände)","ok":1},{"t":"Die Erstellung der Bilanz"},{"t":"Die Wahl der Rechtsform"},{"t":"Die Lohnabrechnung"}],"e":"BDE erfasst betriebliche Ist-Daten (Auftrags-, Maschinen-, Personal-, Materialdaten) – oft automatisiert per Terminal, Barcode oder Sensoren. Sie liefert die Grundlage für Steuerung, Auswertung und Controlling."},{"id":"M-ST-027","f":3,"sub":"Statistik","t":"mc","q":"Welche Technik dient der automatischen Identifikation und Datenerfassung von Objekten per Funk?","o":[{"t":"RFID","ok":1},{"t":"GuV"},{"t":"AfA"},{"t":"BAB"}],"e":"RFID (Radio-Frequency Identification) erfasst Daten kontaktlos über Funk-Transponder – z. B. zur Verfolgung von Waren und Ladungsträgern in Lager und Logistik. Auch Barcode/QR-Code dienen der automatischen Identifikation."},{"id":"M-ST-028","f":3,"sub":"Statistik","t":"mc","q":"Was ist der Vorteil einer automatischen gegenüber der manuellen Datenerfassung?","o":[{"t":"Weniger Übertragungsfehler, höhere Geschwindigkeit und aktuellere Daten","ok":1},{"t":"Sie ist immer kostenlos"},{"t":"Sie ist gesetzlich verboten"},{"t":"Sie liefert weniger Daten"}],"e":"Automatische Erfassung (z. B. per Scanner, Sensor, RFID) reduziert Eingabefehler, spart Zeit und liefert Daten in Echtzeit. Manuelle Erfassung ist fehleranfälliger und langsamer, aber flexibler bei Sonderfällen."},{"id":"M-ST-029","f":3,"sub":"Statistik","t":"mc","q":"Was versteht man unter der Aufbereitung von Daten?","o":[{"t":"Das Ordnen, Verdichten und Darstellen von Rohdaten, damit sie auswertbar und verständlich werden","ok":1},{"t":"Das Löschen aller Daten"},{"t":"Das Erfinden von Daten"},{"t":"Die Verschlüsselung von Passwörtern"}],"e":"Bei der Datenaufbereitung werden Rohdaten sortiert, gruppiert (z. B. Klassenbildung), zu Kennzahlen verdichtet und in Tabellen oder Diagrammen dargestellt – die Voraussetzung für eine aussagekräftige Auswertung."},{"id":"M-ST-030","f":3,"sub":"Statistik","t":"mc","q":"Was ist eine Verhältniszahl?","o":[{"t":"Eine Kennzahl, die zwei Größen zueinander in Beziehung setzt (z. B. Gliederungs-, Beziehungs- oder Indexzahl)","ok":1},{"t":"Eine reine Anzahl"},{"t":"Der größte Wert"},{"t":"Ein Diagramm"}],"e":"Verhältniszahlen setzen zwei Werte ins Verhältnis: Gliederungszahlen (Teil zu Ganzem, z. B. Anteil in %), Beziehungszahlen (verschiedene Größen, z. B. Umsatz je Mitarbeiter) und Indexzahlen (Zeit-/Ortsvergleich mit Basiswert)."},{"id":"M-ST-031","f":3,"sub":"Statistik","t":"mc","q":"Ein Index steht bei 120, die Basis ist 100. Was bedeutet das?","o":[{"t":"Der Wert ist gegenüber der Basis um 20 % gestiegen","ok":1},{"t":"Der Wert ist um 120 % gestiegen"},{"t":"Der Wert ist um 20 % gesunken"},{"t":"Es gab keine Veränderung"}],"e":"Indexzahlen setzen einen Basiswert = 100. Ein Index von 120 bedeutet eine Steigerung um 20 % gegenüber dem Basiszeitpunkt. Indexreihen erleichtern Zeit- und Preisvergleiche."},{"id":"M-ST-032","f":3,"sub":"Statistik","t":"mc","q":"Was ist eine Beziehungszahl (Beispiel)?","o":[{"t":"Umsatz je Mitarbeiter","ok":1},{"t":"Der Anteil der Frauen an der Belegschaft in Prozent"},{"t":"Der Verbraucherpreisindex"},{"t":"Die absolute Zahl der Fahrzeuge"}],"e":"Beziehungszahlen verknüpfen zwei verschiedenartige, aber sachlich zusammenhängende Größen (z. B. Umsatz ÷ Mitarbeiterzahl = Umsatz je Mitarbeiter). Der prozentuale Frauenanteil wäre eine Gliederungszahl."},{"id":"M-ST-033","f":3,"sub":"Statistik","t":"mc","q":"Was versteht man unter Klassenbildung bei der Datenaufbereitung?","o":[{"t":"Das Zusammenfassen von Einzelwerten zu Wertebereichen (Klassen), um die Übersicht zu erhöhen","ok":1},{"t":"Die Einteilung der Mitarbeiter in Gehaltsgruppen"},{"t":"Die Wahl der Rechtsform"},{"t":"Das Löschen von Ausreißern"}],"e":"Bei vielen Einzelwerten fasst man diese zu Klassen (Intervallen) zusammen (z. B. Lieferzeiten 0–10 h, 10–20 h …). Das reduziert die Datenmenge und macht die Verteilung im Histogramm anschaulich."},{"id":"M-ST-034","f":3,"sub":"Statistik","t":"mc","q":"Was zeigt eine kumulierte (aufsummierte) Häufigkeit?","o":[{"t":"Wie viele Werte bis zu einer bestimmten Grenze insgesamt vorliegen","ok":1},{"t":"Nur den häufigsten Wert"},{"t":"Die Spannweite"},{"t":"Den Mittelwert"}],"e":"Die kumulierte Häufigkeit addiert die Häufigkeiten fortlaufend auf. So lässt sich z. B. ablesen, wie viel Prozent der Sendungen innerhalb von 24 Stunden zugestellt wurden (Summenkurve)."},{"id":"M-ST-035","f":3,"sub":"Statistik","t":"mc","q":"Welche Skala erlaubt eine Rangordnung, aber keine gleichen Abstände (z. B. Schulnoten, Zufriedenheit)?","o":[{"t":"Die Ordinalskala","ok":1},{"t":"Die Nominalskala"},{"t":"Die Verhältnisskala"},{"t":"Keine Skala"}],"e":"Die Ordinalskala ordnet Ausprägungen nach Rang (z. B. gut > mittel > schlecht), ohne dass die Abstände gleich groß sind. Die Nominalskala kennt nur Gleichheit/Verschiedenheit (z. B. Farbe), metrische Skalen auch gleiche Abstände."},{"id":"M-ST-036","f":3,"sub":"Statistik","t":"mc","q":"Was ist eine Urliste?","o":[{"t":"Die ungeordnete Aufstellung aller Einzelwerte in der Reihenfolge der Erhebung","ok":1},{"t":"Die fertige grafische Auswertung"},{"t":"Der Mittelwert aller Daten"},{"t":"Eine Rangliste der Mitarbeiter"}],"e":"Die Urliste enthält die Rohdaten in der Reihenfolge ihrer Erfassung. Aus ihr werden durch Ordnen und Zusammenfassen die Häufigkeitsverteilung und weitere Auswertungen erstellt."},{"id":"M-ST-037","f":3,"sub":"Statistik","t":"mc","q":"Welche Kennzahl ist eine Gliederungszahl?","o":[{"t":"Der prozentuale Anteil der Eilsendungen an allen Sendungen","ok":1},{"t":"Umsatz je Fahrzeug"},{"t":"Der Preisindex"},{"t":"Die absolute Fahrzeugzahl"}],"e":"Gliederungszahlen drücken das Verhältnis eines Teils zum Ganzen aus (z. B. Anteil der Eilsendungen in %). Umsatz je Fahrzeug wäre eine Beziehungszahl, der Preisindex eine Indexzahl."},{"id":"M-ST-038","f":3,"sub":"Statistik","t":"mc","q":"Wozu dient eine Trendlinie in einem Diagramm?","o":[{"t":"Die grundlegende Entwicklungsrichtung der Daten sichtbar zu machen und Prognosen zu unterstützen","ok":1},{"t":"Die Farben zu ordnen"},{"t":"Die Legende zu ersetzen"},{"t":"Die Achse zu verkürzen"}],"e":"Eine Trendlinie glättet Schwankungen und zeigt die grundsätzliche Richtung (steigend, fallend, gleichbleibend). Sie hilft, Entwicklungen zu erkennen und – mit Vorsicht – fortzuschreiben."},{"id":"M-ST-039","f":3,"sub":"Statistik","t":"open","q":"Erläutern Sie die drei Lagemaße arithmetisches Mittel, Median und Modus und geben Sie an, wann der Median dem arithmetischen Mittel vorzuziehen ist.","a":"Das arithmetische Mittel (Durchschnitt) ergibt sich aus der Summe aller Werte geteilt durch ihre Anzahl. Es nutzt alle Werte, reagiert aber empfindlich auf Ausreißer. Der Median (Zentralwert) ist der Wert in der Mitte der der Größe nach geordneten Reihe (bei gerader Anzahl der Durchschnitt der beiden mittleren Werte). Er teilt die Daten in zwei gleich große Hälften und ist robust gegenüber Extremwerten. Der Modus (Modalwert) ist der am häufigsten vorkommende Wert; er eignet sich auch für qualitative Merkmale und kann mehrfach oder gar nicht eindeutig auftreten. Der Median ist dem arithmetischen Mittel vorzuziehen, wenn die Daten einzelne starke Ausreißer oder eine schiefe Verteilung aufweisen – etwa bei Einkommen oder Lieferzeiten. Dann verzerrt ein einzelner extremer Wert das arithmetische Mittel stark, während der Median die typische Lage besser wiedergibt.","e":"Merksatz: Mittel = Durchschnitt (ausreißerempfindlich); Median = Mitte der geordneten Reihe (robust); Modus = häufigster Wert. Bei Ausreißern/Schiefe ist der Median aussagekräftiger."},{"id":"M-ST-040","f":3,"sub":"Statistik","t":"open","q":"Bei einer Qualitätsprüfung wurden folgende Fehlerzahlen je Tag erfasst: 2, 4, 4, 6, 9. Berechnen Sie arithmetisches Mittel, Median, Modus und Spannweite.","a":"Die Werte sind bereits geordnet: 2, 4, 4, 6, 9 (n = 5). Arithmetisches Mittel = (2 + 4 + 4 + 6 + 9) ÷ 5 = 25 ÷ 5 = 5. Median = mittlerer (3.) Wert der geordneten Reihe = 4. Modus = häufigster Wert = 4 (kommt zweimal vor). Spannweite = größter − kleinster Wert = 9 − 2 = 7. Ergebnis: Im Durchschnitt traten 5 Fehler pro Tag auf, der typische (mittlere und häufigste) Wert liegt bei 4, und die Werte streuen über einen Bereich von 7 Fehlern.","e":"Vorgehen: Werte ordnen; Mittel = Summe ÷ Anzahl; Median = mittlerer Wert; Modus = häufigster Wert; Spannweite = Max − Min."},{"id":"M-ST-041","f":3,"sub":"Statistik","t":"open","q":"Nennen Sie drei gängige Diagrammtypen und erläutern Sie jeweils, wofür sie sich am besten eignen.","a":"1) Kreis-(Torten-)diagramm: Es stellt die Aufteilung eines Ganzen (100 %) in seine Teile dar und eignet sich am besten für Anteile, z. B. die Verteilung der Sendungen auf verschiedene Verkehrsträger. 2) Liniendiagramm: Es verbindet Messpunkte über eine Zeitachse und eignet sich am besten für die Darstellung von Entwicklungen und Trends über die Zeit, z. B. den Umsatzverlauf eines Jahres. 3) Säulen-/Balkendiagramm: Es zeigt einzelne Werte als Säulen bzw. Balken nebeneinander und eignet sich am besten für den Vergleich von Kategorien, z. B. den Umsatz mehrerer Standorte. (Ergänzend: das Histogramm für Häufigkeitsverteilungen und das Streudiagramm für Zusammenhänge zwischen zwei Merkmalen.) Wichtig ist stets die richtige Wahl des Diagramms passend zur Aussage sowie eine klare, unverzerrte Darstellung mit Titel und beschrifteten Achsen.","e":"Faustregel: Anteile → Kreis, Zeitverlauf/Trend → Linie, Vergleich → Säule/Balken, Häufigkeitsverteilung → Histogramm, Zusammenhang → Streudiagramm."},{"id":"M-ST-042","f":3,"sub":"Statistik","t":"mc","q":"Welche Datenreihe hat die größere Streuung? Reihe A: 49, 50, 51 – Reihe B: 10, 50, 90 (beide Mittelwert 50).","o":[{"t":"Reihe B, weil die Werte weiter vom Mittelwert entfernt liegen","ok":1},{"t":"Reihe A"},{"t":"Beide gleich"},{"t":"Lässt sich nicht sagen"}],"e":"Obwohl beide denselben Mittelwert (50) haben, liegen die Werte von Reihe B (Spannweite 80) viel weiter auseinander als die von Reihe A (Spannweite 2). Reihe B streut also deutlich stärker – der Mittelwert allein sagt nichts über die Streuung."},{"id":"M-ST-043","f":3,"sub":"Statistik","t":"mc","q":"Warum sollte man neben dem Mittelwert auch ein Streuungsmaß angeben?","o":[{"t":"Weil der Mittelwert allein nichts darüber aussagt, wie stark die Einzelwerte um ihn schwanken","ok":1},{"t":"Weil der Mittelwert immer falsch ist"},{"t":"Weil Streuungsmaße gesetzlich vorgeschrieben sind"},{"t":"Weil man dann keinen Mittelwert braucht"}],"e":"Zwei Datenreihen mit gleichem Mittelwert können völlig unterschiedlich streuen. Erst ein Streuungsmaß (Spannweite, Varianz, Standardabweichung) zeigt, wie einheitlich oder unterschiedlich die Werte sind – wichtig z. B. für die Prozessqualität."},{"id":"M-ST-044","f":3,"sub":"Statistik","t":"mc","q":"Welche Aussage über absolute und relative Häufigkeiten ist richtig?","o":[{"t":"Die absolute Häufigkeit ist die Anzahl, die relative der Anteil an der Gesamtzahl","ok":1},{"t":"Beide sind identisch"},{"t":"Die relative Häufigkeit ist immer größer als 1"},{"t":"Die absolute Häufigkeit wird in Prozent angegeben"}],"e":"Die absolute Häufigkeit zählt, wie oft ein Wert vorkommt. Die relative Häufigkeit setzt diese Zahl ins Verhältnis zur Gesamtzahl (Anteil, oft in %) und liegt zwischen 0 und 1 (0–100 %). Relative Häufigkeiten machen unterschiedlich große Datenmengen vergleichbar."},{"id":"M-ST-045","f":3,"sub":"Statistik","t":"mc","q":"Was ist bei der Auswahl einer Stichprobe besonders wichtig?","o":[{"t":"Dass sie repräsentativ ist, also die Grundgesamtheit in ihren Merkmalen möglichst gut abbildet","ok":1},{"t":"Dass sie möglichst klein ist"},{"t":"Dass nur die besten Werte enthalten sind"},{"t":"Dass sie zufällig verfälscht wird"}],"e":"Nur eine repräsentative (meist zufällig und ausreichend groß gewählte) Stichprobe erlaubt zuverlässige Rückschlüsse auf die Grundgesamtheit. Eine verzerrte Auswahl führt zu falschen Ergebnissen."},{"id":"M-PR-001","f":3,"sub":"Präsentation","t":"mc","q":"In welche drei Phasen gliedert sich eine Präsentation grundsätzlich?","o":[{"t":"Vorbereitung, Durchführung und Nachbereitung","ok":1},{"t":"Einkauf, Produktion, Absatz"},{"t":"Planung, Kontrolle, Abrechnung"},{"t":"Anfrage, Angebot, Auftrag"}],"e":"Eine Präsentation umfasst die Vorbereitung (Ziel, Zielgruppe, Inhalt, Medien), die Durchführung (Vortrag) und die Nachbereitung (Auswertung, Feedback, Follow-up)."},{"id":"M-PR-002","f":3,"sub":"Präsentation","t":"mc","q":"Warum ist die Zielgruppenanalyse vor einer Präsentation wichtig?","o":[{"t":"Um Inhalt, Sprache und Niveau auf Vorwissen und Erwartungen der Zuhörer abzustimmen","ok":1},{"t":"Um die Umsatzsteuer zu berechnen"},{"t":"Um die Rechtsform festzulegen"},{"t":"Das ist nicht nötig"}],"e":"Nur wer seine Zielgruppe kennt (Vorwissen, Interessen, Erwartungen, Entscheidungsbefugnis), kann Inhalt, Fachsprache, Detailtiefe und Argumentation passend wählen – entscheidend für den Erfolg der Präsentation."},{"id":"M-PR-003","f":3,"sub":"Präsentation","t":"mc","q":"Was sollte am Anfang jeder Präsentationsvorbereitung stehen?","o":[{"t":"Die klare Festlegung des Ziels (Was soll erreicht werden?)","ok":1},{"t":"Die Wahl der Schriftfarbe"},{"t":"Der Druck der Handouts"},{"t":"Die Sitzordnung"}],"e":"Zuerst ist das Ziel zu klären: Soll informiert, überzeugt oder eine Entscheidung herbeigeführt werden? Vom Ziel hängen Inhalt, Aufbau, Argumentation und Medienwahl ab."},{"id":"M-PR-004","f":3,"sub":"Präsentation","t":"mc","q":"Wie ist eine Präsentation inhaltlich klassisch aufgebaut?","o":[{"t":"Einleitung, Hauptteil und Schluss","ok":1},{"t":"Nur Hauptteil"},{"t":"Schluss, Einleitung, Hauptteil"},{"t":"Anhang, Titel, Quellen"}],"e":"Der klassische Dreiteiler: Die Einleitung weckt Interesse und nennt Thema/Ziel/roten Faden, der Hauptteil vermittelt strukturiert die Inhalte, der Schluss fasst zusammen und endet mit Fazit/Appell."},{"id":"M-PR-005","f":3,"sub":"Präsentation","t":"mc","q":"Welche Aufgabe hat die Einleitung einer Präsentation?","o":[{"t":"Kontakt herstellen, Thema und Ziel nennen und Interesse wecken (roter Faden)","ok":1},{"t":"Alle Detailzahlen präsentieren"},{"t":"Sofort zum Fazit kommen"},{"t":"Die Quellen auflisten"}],"e":"Die Einleitung stellt den Kontakt zum Publikum her, nennt Thema, Ziel und Ablauf (roter Faden) und weckt mit einem Aufhänger (Frage, Beispiel, Zahl) die Aufmerksamkeit."},{"id":"M-PR-006","f":3,"sub":"Präsentation","t":"mc","q":"Womit sollte eine Präsentation wirkungsvoll enden?","o":[{"t":"Mit einer Zusammenfassung der Kernaussagen und einem Fazit bzw. Handlungsappell","ok":1},{"t":"Mit einer neuen, bisher unerwähnten Detailfrage"},{"t":"Mit einem abrupten Abbruch"},{"t":"Mit einer langen Quellenliste"}],"e":"Ein guter Schluss bündelt die Kernbotschaften, zieht ein klares Fazit und formuliert – je nach Ziel – eine Handlungsaufforderung. So bleibt die zentrale Aussage im Gedächtnis."},{"id":"M-PR-007","f":3,"sub":"Präsentation","t":"mc","q":"Welches Medium eignet sich besonders für die spontane, gemeinsame Erarbeitung von Inhalten vor der Gruppe?","o":[{"t":"Flipchart oder Pinnwand (Metaplan)","ok":1},{"t":"Eine fertige, unveränderliche Videoaufzeichnung"},{"t":"Ein gedrucktes Buch"},{"t":"Eine Tonaufnahme ohne Bild"}],"e":"Flipchart und Pinnwand lassen sich live beschriften und umgestalten – ideal, um Ergebnisse gemeinsam zu entwickeln und festzuhalten. Beamer-Folien eignen sich eher für vorbereitete, strukturierte Inhalte."},{"id":"M-PR-008","f":3,"sub":"Präsentation","t":"mc","q":"Was besagt die „6-mal-6-Regel“ für Präsentationsfolien?","o":[{"t":"Höchstens etwa 6 Zeilen mit je etwa 6 Wörtern pro Folie","ok":1},{"t":"6 Folien in 6 Minuten"},{"t":"6 Farben und 6 Bilder"},{"t":"6 Redner in 6 Runden"}],"e":"Die 6-mal-6-Regel begrenzt die Textmenge je Folie (rund 6 Zeilen à 6 Wörter), damit Folien lesbar und nicht überladen sind. Folien sollen unterstützen, nicht den gesprochenen Text ersetzen."},{"id":"M-PR-009","f":3,"sub":"Präsentation","t":"mc","q":"Welcher Grundsatz gilt für die Foliengestaltung?","o":[{"t":"Weniger ist mehr: wenig Text, große Schrift, klare Struktur und aussagekräftige Visualisierungen","ok":1},{"t":"Möglichst viel Text in kleiner Schrift"},{"t":"So viele Farben und Effekte wie möglich"},{"t":"Jede Folie komplett vorlesen"}],"e":"Gute Folien sind übersichtlich: wenig Text in gut lesbarer Schriftgröße, einheitliches Layout, sinnvolle Bilder/Diagramme und ausreichende Kontraste. Sie visualisieren die Kernaussage, statt sie in Fließtext zu ertränken."},{"id":"M-PR-010","f":3,"sub":"Präsentation","t":"mc","q":"Warum sollten Inhalte möglichst visualisiert (Bilder, Diagramme) statt nur als Text dargestellt werden?","o":[{"t":"Weil Bilder schneller erfasst und besser erinnert werden als reiner Text","ok":1},{"t":"Weil Text verboten ist"},{"t":"Weil Bilder die Umsatzsteuer senken"},{"t":"Weil das die Vorbereitung verkürzt"}],"e":"Das Publikum erfasst gut gestaltete Grafiken schneller und behält sie länger als lange Textpassagen. Visualisierungen verdeutlichen Zusammenhänge und lockern den Vortrag auf."},{"id":"M-PR-011","f":3,"sub":"Präsentation","t":"mc","q":"Wann sollte ein Handout (Teilnehmerunterlage) idealerweise ausgeteilt werden?","o":[{"t":"In der Regel am Ende, damit es während des Vortrags nicht ablenkt","ok":1},{"t":"Grundsätzlich nie"},{"t":"Immer schon eine Woche vorher"},{"t":"Nur an den Chef"}],"e":"Wird das Handout vorab verteilt, lesen viele Zuhörer statt zuzuhören. Meist ist es sinnvoll, es am Ende auszugeben (Ausnahme: wenn aktiv damit gearbeitet werden soll). So bleibt die Aufmerksamkeit beim Vortrag."},{"id":"M-PR-012","f":3,"sub":"Präsentation","t":"mc","q":"Was bedeutet das KISS-Prinzip in der Präsentation?","o":[{"t":"„Keep it short and simple“ – einfach und verständlich bleiben","ok":1},{"t":"Möglichst kompliziert formulieren"},{"t":"Alle Fachbegriffe verwenden"},{"t":"So lange wie möglich reden"}],"e":"KISS („Keep it short and simple“) mahnt zu Klarheit und Einfachheit: kurze Sätze, verständliche Sprache, aufs Wesentliche konzentriert. Überladene, komplizierte Darstellungen verlieren das Publikum."},{"id":"M-PR-013","f":3,"sub":"Präsentation","t":"mc","q":"Welches Verhalten stärkt beim Vortrag den Kontakt zum Publikum?","o":[{"t":"Blickkontakt halten und sich dem Publikum zuwenden","ok":1},{"t":"Ausschließlich auf die Folien schauen"},{"t":"Dem Publikum den Rücken zuwenden"},{"t":"Monoton und ohne Pausen sprechen"}],"e":"Blickkontakt signalisiert Zuwendung und Sicherheit und bindet die Zuhörer ein. Wer nur auf Folien oder Notizen starrt oder sich abwendet, verliert den Kontakt und wirkt unsicher."},{"id":"M-PR-014","f":3,"sub":"Präsentation","t":"mc","q":"Was gehört zur nonverbalen Kommunikation eines Vortragenden?","o":[{"t":"Gestik, Mimik, Körperhaltung und Blickkontakt","ok":1},{"t":"Nur die Wortwahl"},{"t":"Nur die Foliengestaltung"},{"t":"Die Höhe des Honorars"}],"e":"Nonverbale Signale – Gestik, Mimik, Haltung, Stand und Blickkontakt – unterstreichen (oder widersprechen) dem Gesagten. Sie beeinflussen die Wirkung oft stärker als der reine Wortinhalt und sollten zur Botschaft passen."},{"id":"M-PR-015","f":3,"sub":"Präsentation","t":"mc","q":"Wie kann man durch die Stimme die Verständlichkeit erhöhen?","o":[{"t":"Deutlich sprechen, Tempo variieren, betonen und bewusst Pausen setzen","ok":1},{"t":"Möglichst schnell und monoton sprechen"},{"t":"Sehr leise sprechen"},{"t":"Alles im gleichen Ton ohne Pausen"}],"e":"Deutliche Aussprache, angemessene Lautstärke, wechselndes Tempo, sinnvolle Betonungen und Pausen machen den Vortrag lebendig und verständlich. Pausen geben den Zuhörern Zeit, das Gesagte zu verarbeiten."},{"id":"M-PR-016","f":3,"sub":"Präsentation","t":"mc","q":"Wie geht man am besten mit Lampenfieber (Nervosität) um?","o":[{"t":"Gute Vorbereitung, Übung, ruhiges Atmen und positive Einstellung nutzen","ok":1},{"t":"Den Vortrag absagen"},{"t":"So schnell wie möglich durchhetzen"},{"t":"Nervosität ignorieren und improvisieren"}],"e":"Ein gewisses Lampenfieber ist normal und aktiviert sogar. Gründliche Vorbereitung, Proben, bewusste Atmung und eine positive Grundhaltung geben Sicherheit. Wichtig ist, nicht zu hetzen, sondern ruhig zu beginnen."},{"id":"M-PR-017","f":3,"sub":"Präsentation","t":"mc","q":"Wie sollte man mit Zwischenfragen aus dem Publikum umgehen?","o":[{"t":"Sie ernst nehmen, sachlich beantworten oder auf einen passenden Zeitpunkt verweisen","ok":1},{"t":"Sie grundsätzlich ignorieren"},{"t":"Den Fragenden bloßstellen"},{"t":"Die Präsentation sofort abbrechen"}],"e":"Fragen zeigen Interesse. Man beantwortet sie sachlich und wertschätzend oder verweist – wenn sie den Ablauf stören würden – höflich auf einen späteren Zeitpunkt (z. B. die Diskussionsrunde). Respektloser Umgang schadet der Wirkung."},{"id":"M-PR-018","f":3,"sub":"Präsentation","t":"mc","q":"Was versteht man unter dem „roten Faden“ einer Präsentation?","o":[{"t":"Die klare, nachvollziehbare Gliederung, die sich durch den ganzen Vortrag zieht","ok":1},{"t":"Eine rote Linie auf jeder Folie"},{"t":"Die Farbe des Layouts"},{"t":"Ein Zeigegerät"}],"e":"Der rote Faden ist die logische Struktur, die die einzelnen Teile verbindet und dem Publikum die Orientierung erleichtert. Er wird zu Beginn angekündigt und zieht sich durch Einleitung, Hauptteil und Schluss."},{"id":"M-PR-019","f":3,"sub":"Präsentation","t":"mc","q":"Was gehört zur Nachbereitung einer Präsentation?","o":[{"t":"Auswertung/Reflexion, Einholen von Feedback und Erledigung offener Punkte (Follow-up)","ok":1},{"t":"Die Zieldefinition"},{"t":"Das Erstellen der ersten Folie"},{"t":"Die Wahl der Rechtsform"}],"e":"Nach der Präsentation reflektiert man, was gut lief und was verbessert werden kann, holt Feedback ein, beantwortet offene Fragen und leitet zugesagte Maßnahmen ein. So steigt die Qualität künftiger Präsentationen."},{"id":"M-PR-020","f":3,"sub":"Präsentation","t":"mc","q":"Worin unterscheidet sich die Rolle des Moderators von der eines Referenten?","o
