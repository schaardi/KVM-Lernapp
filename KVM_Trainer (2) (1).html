ailkontrolle jeder Handlung"},{"t":"Autoritäres Eingreifen in alle Abläufe"},{"t":"Völliger Rückzug ohne Ansprechbarkeit"}],"e":"In der Leistungsphase arbeitet das Team eigenständig; die Führungskraft kann sich zurücknehmen, Freiräume lassen und delegieren, bleibt aber ansprechbar und unterstützt bei Bedarf. Übermäßige Kontrolle würde die eingespielte Zusammenarbeit stören."},{"id":"Z-GR-040","f":4,"sub":"Gruppen","t":"mc","q":"Was versteht man unter Teamentwicklung?","o":[{"t":"Gezielte Maßnahmen, um Zusammenarbeit, Vertrauen und Leistungsfähigkeit eines Teams zu verbessern","ok":1},{"t":"Die Auflösung eines Teams"},{"t":"Die Berechnung von Löhnen"},{"t":"Die Wahl der Rechtsform"}],"e":"Teamentwicklung umfasst geplante Aktivitäten (z. B. Workshops, gemeinsame Ziel- und Rollenklärung, Feedback, Teambuilding), die das Vertrauen, die Kommunikation und die Zusammenarbeit stärken und das Team durch die Entwicklungsphasen begleiten."},{"id":"Z-GR-041","f":4,"sub":"Gruppen","t":"mc","q":"Welche Aussage über die Zuordnung von Verantwortlichkeiten im Team beugt sozialem Faulenzen vor?","o":[{"t":"Klare, individuell zurechenbare Aufgaben und Beiträge","ok":1},{"t":"Völlig unklare Zuständigkeiten"},{"t":"Anonyme Gruppenleistung ohne Zurechnung"},{"t":"Möglichst große, unübersichtliche Gruppen"}],"e":"Wenn jeder Beitrag sichtbar und einer Person zurechenbar ist, sinkt die Versuchung zum Trittbrettfahren. Klare Aufgaben, individuelle Verantwortlichkeit und überschaubare Gruppengrößen fördern das Engagement jedes Einzelnen."},{"id":"Z-GR-042","f":4,"sub":"Gruppen","t":"mc","q":"Warum ist die Adjourning-(Auflösungs-)Phase bewusst zu gestalten?","o":[{"t":"Um Ergebnisse zu sichern, Erfahrungen auszuwerten und den Abschluss für die Mitglieder wertschätzend zu gestalten","ok":1},{"t":"Weil sie unwichtig ist"},{"t":"Um Konflikte zu erzeugen"},{"t":"Um Ergebnisse zu vernichten"}],"e":"Beim (Projekt-)Abschluss sollten die Ergebnisse dokumentiert, die Zusammenarbeit ausgewertet (Lessons Learned) und die Leistung der Mitglieder anerkannt werden. Ein guter Abschluss würdigt das Team und erleichtert künftige Zusammenarbeit."},{"id":"Z-GR-043","f":4,"sub":"Gruppen","t":"mc","q":"Welche Aussage über die Beziehung von Gruppen- und Unternehmenszielen ist richtig?","o":[{"t":"Stimmen Gruppen- und Unternehmensziele überein, wirkt ein starker Zusammenhalt besonders positiv","ok":1},{"t":"Gruppenziele sind immer gegen das Unternehmen gerichtet"},{"t":"Unternehmensziele spielen keine Rolle"},{"t":"Zusammenhalt ist immer schädlich"}],"e":"Hoher Zusammenhalt ist dann besonders förderlich, wenn die Ziele der Gruppe mit denen des Unternehmens übereinstimmen – dann ziehen alle an einem Strang. Laufen die Ziele auseinander, kann starke Kohäsion die Unternehmensziele sogar behindern."},{"id":"Z-GR-044","f":4,"sub":"Gruppen","t":"mc","q":"Was ist ein Zeichen für ein gut funktionierendes Team?","o":[{"t":"Offene Kommunikation, klare Rollen, gegenseitiges Vertrauen und gemeinsame Zielorientierung","ok":1},{"t":"Ständige ungelöste Konflikte"},{"t":"Unklare Zuständigkeiten und Misstrauen"},{"t":"Jeder arbeitet gegen die anderen"}],"e":"Leistungsfähige Teams zeichnen sich durch offene, wertschätzende Kommunikation, geklärte Rollen und Regeln, Vertrauen, gegenseitige Unterstützung und ein gemeinsames Ziel aus. Konflikte werden konstruktiv gelöst statt verdrängt."},{"id":"Z-GR-045","f":4,"sub":"Gruppen","t":"open","q":"Ein neu zusammengestelltes Projektteam gerät nach anfänglicher Höflichkeit in heftige Konflikte um Zuständigkeiten. Ordnen Sie dies einer Phase der Gruppenentwicklung zu und beschreiben Sie, wie die Führungskraft reagieren sollte.","a":"Die beschriebene Situation ist typisch für die Storming-Phase (Konfrontationsphase) nach Tuckman. Nach der anfänglichen, vorsichtig-höflichen Orientierung (Forming) treten nun unterschiedliche Vorstellungen, Interessen und Machtansprüche offen zutage; es kommt zu Konflikten um Rollen und Zuständigkeiten. Diese Phase ist unangenehm, aber ein normaler und notwendiger Schritt der Teamentwicklung. Die Führungskraft sollte die Konflikte nicht unterdrücken oder ignorieren, sondern konstruktiv begleiten: Sie schafft einen Rahmen, in dem die Beteiligten ihre Sichtweisen sachlich äußern können, hört aktiv zu und moderiert. Sie klärt gemeinsam mit dem Team die Ziele, die Rollen und Zuständigkeiten sowie die Spielregeln der Zusammenarbeit (Wer macht was? Wie gehen wir miteinander um?). Dabei achtet sie auf einen fairen, wertschätzenden Umgang, wirkt Ausgrenzung entgegen und sorgt dafür, dass die Auseinandersetzung sachlich bleibt. Gelingt dies, kann das Team in die Norming-Phase übergehen, in der sich gemeinsame Regeln und Zusammenhalt festigen, und schließlich in die produktive Performing-Phase.","e":"Zuordnung: Storming-Phase (normal und notwendig). Reaktion: Konflikte konstruktiv moderieren, Ziele/Rollen/Regeln klären, für fairen Umgang sorgen und so den Übergang zu Norming/Performing ermöglichen."},{"id":"Z-KK-001","f":4,"sub":"Konflikte","t":"mc","q":"Was versteht man unter einem Konflikt?","o":[{"t":"Ein Zusammentreffen unvereinbarer Ziele, Interessen, Meinungen oder Bedürfnisse","ok":1},{"t":"Eine reine Meinungsübereinstimmung"},{"t":"Eine mathematische Berechnung"},{"t":"Ein technischer Defekt"}],"e":"Ein Konflikt liegt vor, wenn Ziele, Interessen, Meinungen oder Bedürfnisse aufeinandertreffen, die (scheinbar) nicht miteinander vereinbar sind, und dies als belastend erlebt wird. Konflikte sind normal und können konstruktiv gelöst werden."},{"id":"Z-KK-002","f":4,"sub":"Konflikte","t":"mc","q":"Worin unterscheiden sich Sach- und Beziehungskonflikt?","o":[{"t":"Der Sachkonflikt betrifft die Aufgabe/Sache, der Beziehungskonflikt die persönliche Ebene zwischen den Beteiligten","ok":1},{"t":"Beide sind identisch"},{"t":"Der Sachkonflikt ist immer persönlich"},{"t":"Der Beziehungskonflikt betrifft nur Zahlen"}],"e":"Beim Sachkonflikt gehen die Meinungen über eine Sache oder das richtige Vorgehen auseinander. Beim Beziehungskonflikt geht es um die persönliche Ebene (Antipathie, verletzte Gefühle, mangelnder Respekt). Oft überlagern sich beide Ebenen."},{"id":"Z-KK-003","f":4,"sub":"Konflikte","t":"mc","q":"Was ist ein Zielkonflikt?","o":[{"t":"Zwei oder mehr angestrebte Ziele lassen sich nicht gleichzeitig vollständig erreichen","ok":1},{"t":"Ein Konflikt über die Kantinenwahl"},{"t":"Ein technischer Fehler"},{"t":"Eine Übereinstimmung der Ziele"}],"e":"Beim Zielkonflikt behindern sich Ziele gegenseitig – z. B. maximale Qualität bei minimalen Kosten. Man muss abwägen und priorisieren. Zielkonflikte können innerhalb einer Person, zwischen Personen oder zwischen Abteilungen auftreten."},{"id":"Z-KK-004","f":4,"sub":"Konflikte","t":"mc","q":"Was ist ein Verteilungskonflikt?","o":[{"t":"Ein Konflikt um die Aufteilung knapper Ressourcen (z. B. Budget, Personal, Zeit)","ok":1},{"t":"Ein Konflikt über die Rechtsform"},{"t":"Ein Streit ohne Gegenstand"},{"t":"Ein Konflikt über das Wetter"}],"e":"Verteilungskonflikte entstehen, wenn begrenzte Mittel (Geld, Personal, Räume, Zeit) beansprucht werden und nicht alle Wünsche erfüllbar sind. Sie erfordern faire Verteilungsregeln und transparente Entscheidungen."},{"id":"Z-KK-005","f":4,"sub":"Konflikte","t":"mc","q":"Warum ist es wichtig, zwischen Sach- und Beziehungsebene eines Konflikts zu unterscheiden?","o":[{"t":"Weil ungelöste Beziehungsprobleme oft die Sachklärung blockieren und getrennt bearbeitet werden müssen","ok":1},{"t":"Weil die Sachebene unwichtig ist"},{"t":"Weil beide Ebenen nie zusammenhängen"},{"t":"Weil nur die Beziehungsebene zählt"}],"e":"Häufig wird auf der Sachebene gestritten, obwohl die eigentliche Ursache auf der Beziehungsebene liegt (vgl. Eisbergmodell). Solange die Beziehung gestört ist, gelingt keine sachliche Einigung – daher müssen Störungen der Beziehung zuerst geklärt werden."},{"id":"Z-KK-006","f":4,"sub":"Konflikte","t":"mc","q":"Was ist eine häufige Ursache betrieblicher Konflikte?","o":[{"t":"Unklare Zuständigkeiten, Kommunikationsstörungen, knappe Ressourcen oder unterschiedliche Interessen","ok":1},{"t":"Zu klare Absprachen"},{"t":"Zu gute Kommunikation"},{"t":"Ausreichende Ressourcen für alle"}],"e":"Typische Konfliktursachen sind unklare Rollen/Zuständigkeiten, Informations- und Kommunikationsmängel, konkurrierende Ziele und Interessen, knappe Ressourcen, Zeitdruck sowie persönliche Spannungen. Klare Strukturen und offene Kommunikation beugen vor."},{"id":"Z-KK-007","f":4,"sub":"Konflikte","t":"mc","q":"Worin unterscheiden sich latente und offene (manifeste) Konflikte?","o":[{"t":"Latente Konflikte schwelen verdeckt, offene sind sichtbar ausgebrochen","ok":1},{"t":"Beide sind identisch"},{"t":"Latente Konflikte sind immer sichtbar"},{"t":"Offene Konflikte gibt es nicht"}],"e":"Ein latenter Konflikt besteht unter der Oberfläche, ohne offen ausgetragen zu werden (Spannungen, Unbehagen). Wird er nicht bearbeitet, kann er zum offenen Konflikt eskalieren. Frühes Erkennen latenter Konflikte erleichtert die Lösung."},{"id":"Z-KK-008","f":4,"sub":"Konflikte","t":"mc","q":"Welche Aussage zur Konflikteskalation ist richtig?","o":[{"t":"Ohne Bearbeitung verschärfen sich Konflikte häufig stufenweise – von der Sachebene hin zu persönlichen Verletzungen","ok":1},{"t":"Konflikte lösen sich immer von selbst"},{"t":"Eskalation ist nicht möglich"},{"t":"Eskalation verbessert die Zusammenarbeit"}],"e":"Unbearbeitete Konflikte eskalieren oft stufenweise: von sachlichen Differenzen über Verhärtung und persönliche Angriffe bis zu offener Feindschaft, bei der es nicht mehr um die Sache, sondern ums „Gewinnen“ oder Schädigen geht. Frühzeitiges Eingreifen ist daher wichtig."},{"id":"Z-KK-009","f":4,"sub":"Konflikte","t":"mc","q":"Welche Chancen können in Konflikten liegen, wenn sie konstruktiv bearbeitet werden?","o":[{"t":"Sie decken Probleme auf, fördern Veränderung, Klärung und bessere Lösungen","ok":1},{"t":"Konflikte haben nur negative Folgen"},{"t":"Konflikte sollten immer unterdrückt werden"},{"t":"Konflikte verhindern jede Entwicklung"}],"e":"Konstruktiv genutzte Konflikte machen auf Missstände aufmerksam, bringen unterschiedliche Sichtweisen zusammen, fördern Klärung, Innovation und bessere Entscheidungen und können Beziehungen sogar stärken. Entscheidend ist der Umgang mit ihnen."},{"id":"Z-KK-010","f":4,"sub":"Konflikte","t":"mc","q":"Welche fünf Grundstrategien im Umgang mit Konflikten werden häufig unterschieden (nach Thomas/Kilmann)?","o":[{"t":"Durchsetzen, Nachgeben, Vermeiden, Kompromiss und Zusammenarbeit (Kooperation)","ok":1},{"t":"Kaufen, Verkaufen, Tauschen, Leihen, Schenken"},{"t":"Planen, Steuern, Kontrollieren"},{"t":"Nur Gewinnen oder Verlieren"}],"e":"Die fünf Grundmuster: Durchsetzen (Konkurrenz, eigene Interessen), Nachgeben (Anpassung), Vermeiden (Rückzug), Kompromiss (beide geben nach) und Zusammenarbeit/Kooperation (gemeinsame Win-Win-Lösung). Je nach Situation ist ein anderes Muster sinnvoll."},{"id":"Z-KK-011","f":4,"sub":"Konflikte","t":"mc","q":"Was ist eine „Win-Win-Lösung“?","o":[{"t":"Eine Lösung, bei der beide Seiten ihre wesentlichen Interessen erfüllt sehen","ok":1},{"t":"Eine Lösung, bei der eine Seite verliert"},{"t":"Eine Lösung, bei der beide verlieren"},{"t":"Der Abbruch jeder Verhandlung"}],"e":"Bei einer Win-Win-Lösung gewinnen beide Seiten, weil eine Lösung gefunden wird, die die wesentlichen Interessen aller berücksichtigt. Sie gilt als nachhaltigste Konfliktlösung, erfordert aber Offenheit, Kooperation und das Trennen von Positionen und Interessen."},{"id":"Z-KK-012","f":4,"sub":"Konflikte","t":"mc","q":"Worin unterscheiden sich Kompromiss und Konsens (Win-Win)?","o":[{"t":"Beim Kompromiss geben beide Seiten etwas auf; beim Konsens wird eine von allen voll getragene Lösung gefunden","ok":1},{"t":"Beide sind identisch"},{"t":"Beim Kompromiss verliert nur eine Seite"},{"t":"Konsens bedeutet, dass niemand zustimmt"}],"e":"Ein Kompromiss ist ein Mittelweg, bei dem jede Seite Zugeständnisse macht (jeder gewinnt und verliert etwas). Ein Konsens (Win-Win) ist eine gemeinsam erarbeitete Lösung, die alle voll mittragen. Der Konsens ist tragfähiger, aber aufwendiger."},{"id":"Z-KK-013","f":4,"sub":"Konflikte","t":"mc","q":"Wann kann die Strategie „Vermeiden/Rückzug“ im Konflikt sinnvoll sein?","o":[{"t":"Bei unwichtigen Nebensächlichkeiten oder wenn eine Abkühlung nötig ist","ok":1},{"t":"Immer, bei jedem Konflikt"},{"t":"Bei zentralen, dringend zu klärenden Problemen"},{"t":"Nie"}],"e":"Vermeiden kann kurzfristig angebracht sein, wenn der Streitpunkt unwichtig ist, die Emotionen erst abkühlen sollen oder Informationen fehlen. Als Dauerstrategie bei wichtigen Themen ist Vermeiden schädlich, weil der Konflikt ungelöst weiterschwelt."},{"id":"Z-KK-014","f":4,"sub":"Konflikte","t":"mc","q":"Welche Konfliktstrategie führt tendenziell zu einer „Verlierer-Seite“ (win-lose)?","o":[{"t":"Das einseitige Durchsetzen der eigenen Interessen","ok":1},{"t":"Die Zusammenarbeit"},{"t":"Der Konsens"},{"t":"Der faire Kompromiss"}],"e":"Beim Durchsetzen (Konkurrenz) setzt eine Seite ihre Interessen gegen die andere durch – ein Gewinner, ein Verlierer (win-lose). Das kann schnell sein, hinterlässt aber oft Unzufriedenheit und belastet die Beziehung, was Folgekonflikte begünstigt."},{"id":"Z-KK-015","f":4,"sub":"Konflikte","t":"mc","q":"Welche Haltung ist Voraussetzung für eine kooperative (Win-Win-)Konfliktlösung?","o":[{"t":"Sachlichkeit, gegenseitiger Respekt und die Bereitschaft, hinter den Positionen die eigentlichen Interessen zu suchen","ok":1},{"t":"Rechthaberei und Sieg um jeden Preis"},{"t":"Ignorieren der Gegenseite"},{"t":"Persönliche Angriffe"}],"e":"Kooperative Lösungen gelingen, wenn beide sachlich und respektvoll bleiben, aktiv zuhören und von den starren Positionen zu den dahinterliegenden Interessen und Bedürfnissen vordringen. So lassen sich neue, für beide vorteilhafte Optionen finden."},{"id":"Z-KK-016","f":4,"sub":"Konflikte","t":"mc","q":"Wie sollte eine Führungskraft bei einem Konflikt zwischen zwei Mitarbeitern vorgehen?","o":[{"t":"Neutral bleiben, beide Seiten anhören, moderieren und gemeinsam eine tragfähige Lösung erarbeiten","ok":1},{"t":"Vorschnell Partei ergreifen"},{"t":"Den Konflikt ignorieren"},{"t":"Beide öffentlich bloßstellen"}],"e":"Die Führungskraft sollte unparteiisch bleiben, beiden Seiten aktiv zuhören, die Sach- von der Beziehungsebene trennen, gemeinsam nach Lösungen suchen und Vereinbarungen treffen. Vorschnelles Urteilen oder Ignorieren verschärft den Konflikt."},{"id":"Z-KK-017","f":4,"sub":"Konflikte","t":"mc","q":"Was versteht man unter Mediation?","o":[{"t":"Die Konfliktvermittlung durch einen neutralen Dritten, der die Parteien zu einer eigenen Lösung führt","ok":1},{"t":"Ein Gerichtsurteil"},{"t":"Die einseitige Entscheidung des Chefs"},{"t":"Das Ignorieren des Konflikts"}],"e":"Bei der Mediation unterstützt ein allparteilicher Dritter (Mediator) die Konfliktparteien dabei, selbst eine einvernehmliche Lösung zu finden. Der Mediator entscheidet nicht, sondern moderiert den Prozess und sorgt für faire Kommunikation."},{"id":"Z-KK-018","f":4,"sub":"Konflikte","t":"mc","q":"Warum sollten Konflikte möglichst frühzeitig angesprochen werden?","o":[{"t":"Weil sie sich sonst verschärfen (eskalieren) und schwerer zu lösen sind","ok":1},{"t":"Weil sie sich immer von selbst lösen"},{"t":"Weil frühes Ansprechen verboten ist"},{"t":"Weil das die Umsatzsteuer erhöht"}],"e":"Frühes, sachliches Ansprechen verhindert, dass sich Spannungen aufschaukeln und persönliche Verletzungen hinzukommen. Auf niedriger Eskalationsstufe sind Konflikte meist noch mit Win-Win-Lösungen zu bewältigen; später wird es deutlich schwieriger."},{"id":"Z-KK-019","f":4,"sub":"Konflikte","t":"mc","q":"Welche Regel gilt für ein konstruktives Kritikgespräch?","o":[{"t":"Unter vier Augen, sachlich, konkret auf das Verhalten bezogen und lösungsorientiert","ok":1},{"t":"Öffentlich und mit persönlichen Angriffen"},{"t":"Ohne konkreten Anlass"},{"t":"Nur mit Verallgemeinerungen"}],"e":"Kritik wirkt, wenn sie zeitnah, unter vier Augen, sachlich und an konkretem Verhalten festgemacht wird, den Mitarbeiter zu Wort kommen lässt und auf eine Verbesserung zielt. Persönliche Abwertung und öffentliche Kritik schaden dagegen."},{"id":"Z-KK-020","f":4,"sub":"Konflikte","t":"mc","q":"Warum sind Ich-Botschaften im Kritik-/Konfliktgespräch günstig?","o":[{"t":"Sie schildern die eigene Wahrnehmung, ohne den anderen anzuklagen, und verringern so Abwehr","ok":1},{"t":"Sie greifen den anderen stärker an"},{"t":"Sie sind unverständlich"},{"t":"Sie verlängern den Streit"}],"e":"Ich-Botschaften („Ich habe wahrgenommen …, das wirkt auf mich …“) beschreiben die eigene Sicht und Wirkung, statt Vorwürfe zu erheben. Sie wirken weniger angreifend als Du-Botschaften („Du machst immer …“) und halten das Gespräch konstruktiv."},{"id":"Z-KK-021","f":4,"sub":"Konflikte","t":"mc","q":"Welche Regel gilt für gutes Feedback?","o":[{"t":"Konkret, zeitnah, beschreibend statt wertend und in angemessener Form","ok":1},{"t":"Möglichst pauschal und verletzend"},{"t":"Erst Monate später"},{"t":"Nur negative Punkte nennen"}],"e":"Wirksames Feedback bezieht sich auf konkretes, beobachtbares Verhalten, erfolgt zeitnah, beschreibt statt zu urteilen (Ich-Botschaften), benennt Positives wie Verbesserungswürdiges und wird so gegeben, dass der Empfänger es annehmen kann."},{"id":"Z-KK-022","f":4,"sub":"Konflikte","t":"mc","q":"Wie sollte man Feedback als Empfänger aufnehmen?","o":[{"t":"Zuhören, nachfragen, es als Chance zur Entwicklung sehen und nicht sofort rechtfertigen","ok":1},{"t":"Sich sofort verteidigen und alles abstreiten"},{"t":"Das Feedback ignorieren"},{"t":"Den Feedbackgeber angreifen"}],"e":"Als Empfänger hört man aktiv zu, fragt bei Unklarheiten nach, bedankt sich und prüft das Feedback in Ruhe, statt sich reflexhaft zu rechtfertigen. So wird Feedback zur Lernchance. Man darf die eigene Sicht schildern, sollte aber offen bleiben."},{"id":"Z-KK-023","f":4,"sub":"Konflikte","t":"mc","q":"Worin unterscheiden sich Kooperation und Konkurrenz im Betrieb?","o":[{"t":"Kooperation ist die Zusammenarbeit auf ein gemeinsames Ziel hin, Konkurrenz das Streben auf Kosten anderer","ok":1},{"t":"Beide sind identisch"},{"t":"Kooperation bedeutet Gegeneinander"},{"t":"Konkurrenz bedeutet Zusammenarbeit"}],"e":"Bei der Kooperation arbeiten Personen/Abteilungen zusammen und unterstützen sich, um gemeinsame Ziele zu erreichen. Bei der Konkurrenz versucht jeder, auf Kosten der anderen zu gewinnen. In Maßen kann Wettbewerb anspornen, übertrieben schadet er der Zusammenarbeit."},{"id":"Z-KK-024","f":4,"sub":"Konflikte","t":"mc","q":"Welche Voraussetzung fördert die Kooperation zwischen Abteilungen?","o":[{"t":"Gemeinsame Ziele, offene Kommunikation und gegenseitiges Vertrauen","ok":1},{"t":"Abschottung und Misstrauen"},{"t":"Widersprüchliche Ziele"},{"t":"Informationszurückhaltung"}],"e":"Bereichsübergreifende Zusammenarbeit gelingt, wenn übergeordnete gemeinsame Ziele bestehen, Informationen offen geteilt werden und Vertrauen herrscht. „Silodenken“, konkurrierende Ziele und zurückgehaltene Informationen behindern die Kooperation."},{"id":"Z-KK-025","f":4,"sub":"Konflikte","t":"mc","q":"Was kann die Führungskraft tun, um eine kooperative Zusammenarbeit im Team zu fördern?","o":[{"t":"Gemeinsame Ziele setzen, offene Kommunikation vorleben und faire Regeln vereinbaren","ok":1},{"t":"Mitarbeiter gegeneinander ausspielen"},{"t":"Informationen zurückhalten"},{"t":"Konflikte schüren"}],"e":"Kooperation wächst, wenn die Führungskraft gemeinsame Ziele betont, Erfolge des Teams würdigt, offene und faire Kommunikation vorlebt, Zusammenarbeit belohnt und klare Spielregeln vereinbart. Ihr Vorbild prägt das Miteinander maßgeblich."},{"id":"Z-KK-026","f":4,"sub":"Konflikte","t":"open","q":"Nennen und erläutern Sie die fünf Grundstrategien im Umgang mit Konflikten (nach Thomas/Kilmann).","a":"Nach Thomas/Kilmann lassen sich fünf Grundmuster unterscheiden, die sich nach dem Maß an Durchsetzung eigener Interessen und Kooperationsbereitschaft ordnen: (1) Durchsetzen (Konkurrenz/Kampf): Man verfolgt konsequent die eigenen Interessen, notfalls gegen die andere Seite (win-lose). Sinnvoll bei Eile oder Grundsatzfragen, belastet aber die Beziehung. (2) Nachgeben (Anpassung): Man stellt die eigenen Interessen zurück und gibt der anderen Seite nach. Sinnvoll, wenn das Thema für einen selbst unwichtig, für den anderen aber wichtig ist. (3) Vermeiden (Rückzug/Flucht): Man geht dem Konflikt aus dem Weg. Kurzfristig sinnvoll bei Nebensächlichkeiten oder um abzukühlen, als Dauerlösung schädlich. (4) Kompromiss: Beide Seiten machen Zugeständnisse und treffen sich in der Mitte; jeder gewinnt und verliert etwas. (5) Zusammenarbeit/Kooperation: Beide suchen gemeinsam nach einer Lösung, die die wesentlichen Interessen aller erfüllt (Win-Win/Konsens). Diese Strategie ist am nachhaltigsten, aber am aufwendigsten. Welche Strategie passt, hängt von Situation, Bedeutung des Themas und Beziehung ab; die kooperative Win-Win-Lösung ist meist anzustreben.","e":"Die fünf Muster: Durchsetzen (win-lose), Nachgeben, Vermeiden, Kompromiss, Zusammenarbeit (Win-Win). Ideal ist meist die kooperative Lösung; die Wahl ist situationsabhängig."},{"id":"Z-KK-027","f":4,"sub":"Konflikte","t":"open","q":"Wie sollte eine Führungskraft bei einem eskalierenden Konflikt zwischen zwei Mitarbeitern vorgehen? Beschreiben Sie ein sinnvolles Vorgehen.","a":"Die Führungskraft sollte den Konflikt nicht ignorieren, sondern zeitnah und strukturiert eingreifen. Zunächst verschafft sie sich einen sachlichen Überblick und lädt die Beteiligten zu einem ungestörten Gespräch unter vier Augen bzw. zu einem gemeinsamen, moderierten Gespräch ein. Im Gespräch bleibt sie neutral (allparteilich) und ergreift nicht vorschnell Partei. Sie lässt beide Seiten nacheinander ausreden, hört aktiv zu und lässt sich die Sichtweisen und dahinterliegenden Interessen schildern. Dabei trennt sie die Sach- von der Beziehungsebene: Verletzte Gefühle werden ernst genommen und angesprochen, denn solange die Beziehungsebene gestört ist, gelingt keine sachliche Einigung. Anschließend leitet sie die Beteiligten an, gemeinsam nach Lösungen zu suchen, die die wesentlichen Interessen beider berücksichtigen (möglichst Win-Win). Die vereinbarte Lösung wird konkret festgehalten (wer tut was), und es wird ein Termin zur Überprüfung vereinbart. Wichtig sind Sachlichkeit, Respekt, Vertraulichkeit und Fairness. Gelingt keine Einigung, kann eine Mediation durch einen neutralen Dritten helfen.","e":"Vorgehen: neutral bleiben, beide anhören, Sach- von Beziehungsebene trennen, gemeinsam Win-Win-Lösung erarbeiten, konkret vereinbaren und nachhalten. Nicht ignorieren, nicht vorschnell Partei ergreifen."},{"id":"Z-KK-028","f":4,"sub":"Konflikte","t":"open","q":"Erläutern Sie den Unterschied zwischen Sach- und Beziehungsebene eines Konflikts und warum diese Unterscheidung für die Konfliktlösung wichtig ist.","a":"Jeder Konflikt hat eine Sach- und eine Beziehungsebene. Auf der Sachebene geht es um den eigentlichen Streitgegenstand – etwa unterschiedliche Meinungen über das richtige Vorgehen, um Ziele, Aufgaben oder die Verteilung von Ressourcen. Auf der Beziehungsebene geht es um das persönliche Verhältnis der Beteiligten: um Wertschätzung, Respekt, Sympathie oder Antipathie, verletzte Gefühle und Vertrauen. Das Eisbergmodell verdeutlicht, dass die Sachebene nur der sichtbare Teil ist, während die oft entscheidende Beziehungsebene unter der Oberfläche liegt. Für die Konfliktlösung ist die Unterscheidung wichtig, weil scheinbar sachliche Auseinandersetzungen ihre eigentliche Ursache häufig auf der Beziehungsebene haben. Solange diese gestört ist – etwa durch Kränkungen oder Misstrauen –, blockiert sie die sachliche Einigung: Argumente werden nicht mehr offen geprüft, sondern durch die getrübte Beziehung gefiltert. Deshalb muss man zunächst die Beziehungsebene klären (Gefühle ansprechen, Respekt wiederherstellen), bevor eine sachliche Lösung gefunden werden kann. Wer nur auf der Sachebene diskutiert, obwohl das Problem auf der Beziehungsebene liegt, wird den Konflikt nicht dauerhaft lösen.","e":"Sachebene = Streitgegenstand; Beziehungsebene = persönliches Verhältnis (Eisberg: meist verborgen und entscheidend). Erst die Beziehungsebene klären, dann die Sache – sonst bleibt der Konflikt ungelöst."},{"id":"Z-KK-029","f":4,"sub":"Konflikte","t":"mc","q":"Was ist ein Warnsignal (Symptom) für einen schwelenden Konflikt im Team?","o":[{"t":"Zunehmende Gereiztheit, Rückzug, „Dienst nach Vorschrift“ oder auffällige Sticheleien","ok":1},{"t":"Offene, konstruktive Zusammenarbeit"},{"t":"Hohe Zufriedenheit aller"},{"t":"Reibungslose Kommunikation"}],"e":"Anzeichen latenter Konflikte sind u. a. gereizte Stimmung, Rückzug und Schweigen, sinkende Kooperationsbereitschaft, Sticheleien, Schuldzuweisungen oder steigende Fehlzeiten. Wer solche Symptome früh erkennt, kann rechtzeitig gegensteuern."},{"id":"Z-KK-030","f":4,"sub":"Konflikte","t":"mc","q":"Welche Aussage über den richtigen Zeitpunkt von Lob und Kritik trifft zu?","o":[{"t":"Lob kann auch öffentlich erfolgen, Kritik dagegen möglichst unter vier Augen","ok":1},{"t":"Kritik gehört vor das ganze Team"},{"t":"Lob sollte heimlich bleiben"},{"t":"Beides ist grundsätzlich zu vermeiden"}],"e":"Anerkennung darf ruhig sichtbar sein und wirkt dann motivierend auf andere. Kritik dagegen erfolgt möglichst unter vier Augen, um den Mitarbeiter nicht bloßzustellen und die Bereitschaft zur Verhaltensänderung zu erhalten."},{"id":"Z-KK-031","f":4,"sub":"Konflikte","t":"mc","q":"Was bedeutet es, im Konflikt „hart in der Sache, aber weich zur Person“ zu sein?","o":[{"t":"Man vertritt seine sachlichen Interessen bestimmt, bleibt aber im Umgang mit der Person respektvoll","ok":1},{"t":"Man greift die Person hart an"},{"t":"Man gibt in der Sache immer nach"},{"t":"Man vermeidet jedes Gespräch"}],"e":"Dieser Grundsatz (aus dem Harvard-Konzept) trennt Sache und Person: In der Sache verhandelt man klar und interessenorientiert, im Umgang bleibt man wertschätzend und fair. So lassen sich Interessen durchsetzen, ohne die Beziehung zu zerstören."},{"id":"Z-KK-032","f":4,"sub":"Konflikte","t":"mc","q":"Warum ist es sinnvoll, im Konflikt hinter den Positionen die Interessen zu suchen?","o":[{"t":"Weil sich hinter starren Positionen oft vereinbare Interessen verbergen, die neue Lösungen ermöglichen","ok":1},{"t":"Weil Positionen immer unvereinbar sind"},{"t":"Weil Interessen unwichtig sind"},{"t":"Weil man so schneller streitet"}],"e":"Positionen sind die geforderten Ergebnisse („Ich will X“), Interessen die dahinterstehenden Bedürfnisse („weil mir Y wichtig ist“). Werden die Interessen offengelegt, finden sich oft kreative Lösungen, die beiden gerecht werden (Win-Win), auch wenn die Positionen zunächst gegensätzlich schienen."},{"id":"Z-KK-033","f":4,"sub":"Konflikte","t":"mc","q":"Welche Konfliktstrategie führt am ehesten zu einer dauerhaft tragfähigen Lösung?","o":[{"t":"Die kooperative Zusammenarbeit (Win-Win/Konsens)","ok":1},{"t":"Das dauerhafte Vermeiden"},{"t":"Das einseitige Durchsetzen"},{"t":"Das ständige Nachgeben"}],"e":"Die kooperative Lösung berücksichtigt die Interessen beider Seiten und wird daher von allen mitgetragen – das macht sie am tragfähigsten. Vermeiden lässt den Konflikt schwelen, Durchsetzen erzeugt Verlierer, ständiges Nachgeben führt zu Unzufriedenheit."},{"id":"Z-KK-034","f":4,"sub":"Konflikte","t":"mc","q":"Was gehört zu einer offenen, konfliktarmen Kommunikationskultur im Team?","o":[{"t":"Sachliche Auseinandersetzung, aktives Zuhören, Feedback und wertschätzender Umgang","ok":1},{"t":"Persönliche Angriffe und Schuldzuweisungen"},{"t":"Zurückhalten von Informationen"},{"t":"Ignorieren von Problemen"}],"e":"Eine gute Kommunikationskultur ermöglicht es, Probleme früh und sachlich anzusprechen, ohne dass daraus persönliche Konflikte werden. Aktives Zuhören, konstruktives Feedback, Offenheit und Respekt beugen Eskalationen vor und stärken die Zusammenarbeit."},{"id":"Z-KK-035","f":4,"sub":"Konflikte","t":"mc","q":"Welche Wirkung hat übermäßige interne Konkurrenz zwischen Kollegen?","o":[{"t":"Sie kann Zusammenarbeit, Informationsaustausch und Betriebsklima beeinträchtigen","ok":1},{"t":"Sie fördert immer die Zusammenarbeit"},{"t":"Sie hat keine Auswirkungen"},{"t":"Sie verbessert stets das Klima"}],"e":"Ein gewisser Wettbewerb kann anspornen. Übertriebene interne Konkurrenz führt jedoch dazu, dass Informationen zurückgehalten werden, Misstrauen entsteht und die Kooperation leidet. Führungskräfte sollten daher Zusammenarbeit belohnen und gemeinsame Ziele betonen."},{"id":"Z-KK-036","f":4,"sub":"Konflikte","t":"mc","q":"Was ist beim Ansprechen eines Konflikts hinsichtlich der Formulierung zu beachten?","o":[{"t":"Sachlich bleiben, konkretes Verhalten benennen und Ich-Botschaften statt Vorwürfe verwenden","ok":1},{"t":"Möglichst viele Verallgemeinerungen wie „immer“ und „nie“ benutzen"},{"t":"Den anderen persönlich abwerten"},{"t":"Vorwürfe in Du-Form häufen"}],"e":"Wer konkretes Verhalten sachlich beschreibt und mit Ich-Botschaften die eigene Wahrnehmung schildert, ermöglicht ein lösungsorientiertes Gespräch. Pauschalisierungen („immer“, „nie“), Vorwürfe und persönliche Abwertungen führen dagegen zu Abwehr und Eskalation."},{"id":"Z-KK-037","f":4,"sub":"Konflikte","t":"mc","q":"Welche Rolle spielt aktives Zuhören in der Konfliktlösung?","o":[{"t":"Es zeigt dem anderen Wertschätzung, klärt die Interessen und deeskaliert das Gespräch","ok":1},{"t":"Es verlängert den Konflikt unnötig"},{"t":"Es ist überflüssig"},{"t":"Es dient nur der eigenen Argumentation"}],"e":"Durch aktives Zuhören (Zuwenden, Nachfragen, Zusammenfassen) fühlt sich der andere ernst genommen, Missverständnisse werden ausgeräumt und die eigentlichen Interessen werden sichtbar. Das senkt die emotionale Spannung und schafft die Basis für eine gemeinsame Lösung."},{"id":"Z-KK-038","f":4,"sub":"Konflikte","t":"mc","q":"Wann ist ein rasches, klares Durchsetzen (Machtwort) durch die Führungskraft im Konflikt vertretbar?","o":[{"t":"In Not-/Gefahrensituationen oder bei Grundsatzfragen, in denen schnell entschieden werden muss","ok":1},{"t":"Immer und in jedem Fall"},{"t":"Nie, unter keinen Umständen"},{"t":"Nur bei unwichtigen Kleinigkeiten"}],"e":"Meist ist eine kooperative Lösung vorzuziehen. In Ausnahmefällen – bei Gefahr, Zeitdruck oder unverhandelbaren Grundsätzen/Vorschriften – muss die Führungskraft jedoch klar entscheiden und durchsetzen. Als Dauerstil ist Durchsetzen ungeeignet."},{"id":"Z-KK-039","f":4,"sub":"Konflikte","t":"mc","q":"Warum ist das Vermeiden von Konflikten als Dauerstrategie problematisch?","o":[{"t":"Ungelöste Konflikte schwelen weiter, belasten das Klima und brechen später oft heftiger aus","ok":1},{"t":"Weil Konflikte dadurch verschwinden"},{"t":"Weil Vermeiden immer die beste Lösung ist"},{"t":"Weil es die Zusammenarbeit verbessert"}],"e":"Wer Konflikte dauerhaft aus dem Weg geht, löst die Ursachen nicht. Die Spannungen bleiben bestehen, belasten Zusammenarbeit und Klima und entladen sich später häufig verstärkt. Wichtige Konflikte sollten daher aktiv, aber sachlich angegangen werden."},{"id":"Z-KK-040","f":4,"sub":"Konflikte","t":"mc","q":"Was ist ein Vorteil, wenn Konflikte im Team konstruktiv ausgetragen werden?","o":[{"t":"Probleme werden geklärt, die Zusammenarbeit und Lösungen verbessern sich, das Vertrauen kann wachsen","ok":1},{"t":"Das Team zerbricht immer"},{"t":"Es entstehen nur Verlierer"},{"t":"Die Leistung sinkt zwangsläufig"}],"e":"Konstruktiv ausgetragene Konflikte bringen unterschiedliche Sichtweisen zusammen, decken Verbesserungspotenziale auf und führen zu besseren, breit getragenen Lösungen. Wird fair miteinander umgegangen, stärkt das langfristig Vertrauen und Zusammenhalt."},{"id":"Z-PE-001","f":4,"sub":"Personalentwicklung","t":"mc","q":"Was versteht man unter Personalentwicklung (PE)?","o":[{"t":"Alle Maßnahmen zur Förderung und Qualifizierung der Mitarbeiter entsprechend den betrieblichen und persönlichen Zielen","ok":1},{"t":"Die Berechnung der Löhne"},{"t":"Die Entlassung von Personal"},{"t":"Die Buchführung"}],"e":"Personalentwicklung umfasst Bildung (Aus-/Fort-/Weiterbildung), Förderung und Laufbahnplanung. Ziel ist, die Qualifikation und Motivation der Mitarbeiter zu erhalten und auszubauen – zum Nutzen des Unternehmens und der Beschäftigten."},{"id":"Z-PE-002","f":4,"sub":"Personalentwicklung","t":"mc","q":"Welchen Nutzen hat Personalentwicklung für das Unternehmen?","o":[{"t":"Qualifizierte, motivierte Mitarbeiter, geringere Fluktuation und bessere Wettbewerbsfähigkeit","ok":1},{"t":"Nur höhere Kosten ohne Nutzen"},{"t":"Ausschließlich Nachteile"},{"t":"Sie ist gesetzlich verboten"}],"e":"PE sichert das benötigte Können im Betrieb, erhöht Motivation und Bindung, erleichtert die Besetzung von Stellen aus den eigenen Reihen und stärkt die Anpassungs- und Wettbewerbsfähigkeit. Die Kosten sind eine Investition in die Zukunft."},{"id":"Z-PE-003","f":4,"sub":"Personalentwicklung","t":"mc","q":"Was steht am Anfang einer systematischen Personalentwicklung?","o":[{"t":"Die Ermittlung des Bildungs-/Qualifizierungsbedarfs (Soll-Ist-Vergleich der Qualifikationen)","ok":1},{"t":"Die Kündigung von Mitarbeitern"},{"t":"Die Wahl der Rechtsform"},{"t":"Der Kauf neuer Maschinen"}],"e":"Zunächst wird der Bedarf ermittelt: Welche Qualifikationen werden (künftig) benötigt, welche sind vorhanden? Aus dieser Lücke (Soll-Ist) leiten sich gezielte Entwicklungsmaßnahmen ab. So wird nicht am Bedarf vorbei geschult."},{"id":"Z-PE-004","f":4,"sub":"Personalentwicklung","t":"mc","q":"Was bedeutet Personalentwicklung „on the job“?","o":[{"t":"Lernen und Entwicklung direkt am Arbeitsplatz während der Tätigkeit","ok":1},{"t":"Lernen ausschließlich in externen Seminaren"},{"t":"Vorbereitung auf den Ruhestand"},{"t":"Lernen vor Arbeitsbeginn im Betrieb"}],"e":"„On the job“ findet die Entwicklung am Arbeitsplatz statt – z. B. durch Einarbeitung, Unterweisung, Job Rotation/Enrichment, Coaching oder Mentoring. Vorteil: hoher Praxisbezug und direkte Anwendung."},{"id":"Z-PE-005","f":4,"sub":"Personalentwicklung","t":"mc","q":"Was bedeutet Personalentwicklung „off the job“?","o":[{"t":"Lernen außerhalb des Arbeitsplatzes, z. B. in Seminaren, Lehrgängen oder Schulungen","ok":1},{"t":"Lernen direkt am Arbeitsplatz"},{"t":"Lernen während der Maschinenwartung"},{"t":"Gar kein Lernen"}],"e":"„Off the job“ erfolgt losgelöst vom Arbeitsplatz in Seminaren, Kursen oder Lehrgängen. Vorteil: störungsfreies, systematisches Lernen; Nachteil: der Praxistransfer muss anschließend sichergestellt werden."},{"id":"Z-PE-006","f":4,"sub":"Personalentwicklung","t":"mc","q":"Was kennzeichnet Personalentwicklung „near the job“?","o":[{"t":"Arbeitsplatznahes Lernen, z. B. in Projekten, Qualitätszirkeln oder Lernwerkstätten","ok":1},{"t":"Lernen in weit entfernten Ländern"},{"t":"Lernen nach dem Ausscheiden"},{"t":"Lernen ohne jeden Praxisbezug"}],"e":"„Near the job“ verbindet Lernen und Arbeiten in Arbeitsplatznähe – etwa durch Projektarbeit, Qualitätszirkel oder Lernstatt. So bleibt der Praxisbezug erhalten, ohne dass der reguläre Arbeitsablauf gestört wird."},{"id":"Z-PE-007","f":4,"sub":"Personalentwicklung","t":"mc","q":"Was versteht man unter Mentoring als PE-Maßnahme?","o":[{"t":"Eine erfahrene Person begleitet und fördert einen weniger erfahrenen Mitarbeiter über längere Zeit","ok":1},{"t":"Die einmalige Unterweisung an einer Maschine"},{"t":"Ein externes Wochenendseminar"},{"t":"Die Kündigung eines Mitarbeiters"}],"e":"Beim Mentoring gibt ein erfahrener Mentor sein Wissen und seine Erfahrung an einen Mentee weiter, unterstützt bei der Einarbeitung und Entwicklung und dient als Ansprechpartner. Es fördert Wissenstransfer, Bindung und Orientierung."},{"id":"Z-PE-008","f":4,"sub":"Personalentwicklung","t":"mc","q":"Worin unterscheiden sich Ausbildung, Fortbildung und Umschulung?","o":[{"t":"Ausbildung vermittelt einen Erstberuf, Fortbildung baut darauf auf (Anpassung/Aufstieg), Umschulung führt in einen neuen Beruf","ok":1},{"t":"Alle drei sind identisch"},{"t":"Fortbildung ist der Erstberuf"},{"t":"Umschulung ist eine Erstausbildung"}],"e":"Die (Erst-)Ausbildung führt zu einem Berufsabschluss. Die Fortbildung baut auf einer Ausbildung auf und dient der Anpassung an neue Anforderungen (Anpassungsfortbildung) oder dem beruflichen Aufstieg (z. B. Meister). Die Umschulung befähigt für einen anderen Beruf."},{"id":"Z-PE-009","f":4,"sub":"Personalentwicklung","t":"mc","q":"Was ist das Ziel einer Anpassungsfortbildung?","o":[{"t":"Vorhandene Kenntnisse an veränderte Anforderungen (z. B. neue Technik, Vorschriften) anzupassen","ok":1},{"t":"Einen völlig neuen Beruf zu erlernen"},{"t":"Die Erstausbildung zu ersetzen"},{"t":"Mitarbeiter zu entlassen"}],"e":"Die Anpassungsfortbildung hält die berufliche Handlungsfähigkeit auf dem aktuellen Stand, indem sie an neue Technologien, Verfahren oder rechtliche Vorgaben heranführt. Die Aufstiegsfortbildung (z. B. zum Meister) zielt dagegen auf eine höhere Qualifikation."},{"id":"Z-PE-010","f":4,"sub":"Personalentwicklung","t":"mc","q":"Wie ist die duale Berufsausbildung in Deutschland organisiert?","o":[{"t":"An zwei Lernorten: im Betrieb (Praxis) und in der Berufsschule (Theorie)","ok":1},{"t":"Nur in der Berufsschule"},{"t":"Nur an der Universität"},{"t":"Ausschließlich im Ausland"}],"e":"Das duale System kombiniert die praktische Ausbildung im Betrieb mit dem theoretischen Unterricht in der Berufsschule. Grundlage ist u. a. das Berufsbildungsgesetz (BBiG); die Ausbildung endet mit einer Prüfung vor der zuständigen Stelle (z. B. IHK)."},{"id":"Z-PE-011","f":4,"sub":"Personalentwicklung","t":"mc","q":"Was regelt die Ausbildereignungsverordnung (AEVO)?","o":[{"t":"Die berufs- und arbeitspädagogische Eignung, die Ausbilder nachweisen müssen","ok":1},{"t":"Die Höhe des Ausbildungsentgelts im Detail"},{"t":"Die Steuererklärung des Betriebs"},{"t":"Die Wahl der Rechtsform"}],"e":"Die AEVO regelt den Nachweis der berufs- und arbeitspädagogischen Eignung (früher „Ada-Schein“). Wer ausbildet, muss neben der fachlichen auch diese pädagogische Eignung besitzen, um Auszubildende ordnungsgemäß anleiten zu können."},{"id":"Z-PE-012","f":4,"sub":"Personalentwicklung","t":"mc","q":"Welches Gesetz bildet die wesentliche Grundlage der betrieblichen Berufsausbildung?","o":[{"t":"Das Berufsbildungsgesetz (BBiG)","ok":1},{"t":"Das Handelsgesetzbuch (HGB)"},{"t":"Das Betriebsverfassungsgesetz (BetrVG)"},{"t":"Das Bürgerliche Gesetzbuch (BGB) allein"}],"e":"Das Berufsbildungsgesetz (BBiG) regelt u. a. den Ausbildungsvertrag, die Rechte und Pflichten von Auszubildenden und Ausbildenden, die Ausbildungsordnung und die Prüfungen. Für bestimmte Handwerksberufe gilt zusätzlich die Handwerksordnung."},{"id":"Z-PE-013","f":4,"sub":"Personalentwicklung","t":"mc","q":"Aus welchen vier Stufen besteht die Vier-Stufen-Methode der Unterweisung?","o":[{"t":"Vorbereiten – Vormachen/Erklären – Nachmachen lassen – Üben/selbstständig anwenden","ok":1},{"t":"Planen – Kaufen – Verkaufen – Kontrollieren"},{"t":"Sammeln – Ordnen – Bewerten – Verwerfen"},{"t":"Fragen – Antworten – Prüfen – Benoten"}],"e":"Die Vier-Stufen-Methode: (1) Vorbereiten (Lernenden einstimmen, Vorkenntnisse klären), (2) Vormachen und Erklären durch den Ausbilder, (3) Nachmachen lassen (Lernender führt aus und erklärt), (4) Üben und selbstständiges Anwenden (Festigung). Sie eignet sich besonders für praktische Tätigkeiten."},{"id":"Z-PE-014","f":4,"sub":"Personalentwicklung","t":"mc","q":"Was geschieht in der dritten Stufe der Vier-Stufen-Methode?","o":[{"t":"Der Lernende macht die Tätigkeit selbst nach und erläutert dabei die Arbeitsschritte","ok":1},{"t":"Der Ausbilder macht alles allein vor"},{"t":"Es wird nur zugeschaut"},{"t":"Die Prüfung findet statt"}],"e":"In Stufe 3 führt der Lernende die Tätigkeit selbst aus und erklärt dabei, was und warum er es tut. So zeigt sich, ob er es verstanden hat; der Ausbilder korrigiert bei Bedarf. Anschließend folgt das eigenständige Üben (Stufe 4)."},{"id":"Z-PE-015","f":4,"sub":"Personalentwicklung","t":"mc","q":"Für welche Lerninhalte eignet sich die Vier-Stufen-Methode besonders?","o":[{"t":"Für das Erlernen praktischer, manueller Fertigkeiten und Arbeitsabläufe","ok":1},{"t":"Für rein theoretische Grundsatzdiskussionen"},{"t":"Für die Bilanzierung"},{"t":"Für gar keine Inhalte"}],"e":"Die Vier-Stufen-Methode ist ideal, um praktische Handgriffe und Abläufe systematisch zu vermitteln (Vormachen–Nachmachen–Üben). Für die Vermittlung von Wissen und das Fördern selbstständigen Denkens eignen sich eher Lehrgespräch oder Leittextmethode."},{"id":"Z-PE-016","f":4,"sub":"Personalentwicklung","t":"mc","q":"Was kennzeichnet das Lehrgespräch als Ausbildungsmethode?","o":[{"t":"Der Ausbilder erarbeitet den Stoff im Dialog mit dem Lernenden durch gezielte Fragen","ok":1},{"t":"Der Ausbilder hält einen reinen Monolog"},{"t":"Der Lernende arbeitet ohne jede Anleitung"},{"t":"Es findet keine Kommunikation statt"}],"e":"Beim Lehrgespräch führt der Ausbilder den Lernenden durch geschickte Fragen zum Ergebnis, statt es vorzugeben. Das aktiviert Denken und Vorwissen und fördert Verständnis und selbstständiges Erarbeiten – geeignet für Wissen und Zusammenhänge."},{"id":"Z-PE-017","f":4,"sub":"Personalentwicklung","t":"mc","q":"Welche Lerntypen werden häufig unterschieden?","o":[{"t":"Visueller, auditiver, haptisch-motorischer und kommunikativer Lerntyp","ok":1},{"t":"Schneller und langsamer Lohntyp"},{"t":"Fixer und variabler Typ"},{"t":"Nur ein einziger Lerntyp"}],"e":"Man unterscheidet u. a. den visuellen (Sehen/Lesen), auditiven (Hören), haptisch-motorischen (Tun/Anfassen) und kommunikativen (Gespräch) Lerntyp. Die meisten Menschen mischen mehrere. Abwechslungsreiche Methoden erreichen alle Typen besser."},{"id":"Z-PE-018","f":4,"sub":"Personalentwicklung","t":"mc","q":"Warum sollten in der Ausbildung mehrere Sinne angesprochen und Methoden abgewechselt werden?","o":[{"t":"Weil abwechslungsreiches, mehrkanaliges Lernen das Verständnis und das Behalten verbessert","ok":1},{"t":"Weil das die Ausbildung verkürzt"},{"t":"Weil nur Zuhören am besten wirkt"},{"t":"Weil Methodenwechsel verboten ist"}],"e":"Je mehr Sinne beteiligt sind (Sehen, Hören, Tun, Sprechen), desto besser werden Inhalte verstanden und behalten. Methodenvielfalt hält zudem die Aufmerksamkeit hoch und erreicht unterschiedliche Lerntypen."},{"id":"Z-PE-019","f":4,"sub":"Personalentwicklung","t":"mc","q":"Welche Bedeutung hat das Wiederholen und Üben für den Lernerfolg?","o":[{"t":"Es festigt das Gelernte und wirkt dem Vergessen entgegen","ok":1},{"t":"Es ist überflüssig"},{"t":"Es verschlechtert das Behalten"},{"t":"Es ersetzt jedes Verständnis"}],"e":"Ohne Wiederholung wird viel Gelerntes rasch vergessen (Vergessenskurve). Regelmäßiges Üben und Anwenden verankert Wissen und Fertigkeiten dauerhaft und macht sie sicher abrufbar. Verteiltes Üben ist dabei wirksamer als einmaliges „Pauken“."},{"id":"Z-PE-020","f":4,"sub":"Personalentwicklung","t":"mc","q":"Welche Rolle spielt die Motivation des Lernenden für den Lernerfolg?","o":[{"t":"Eine große Rolle – motivierte Lernende lernen schneller, tiefer und behalten mehr","ok":1},{"t":"Keine Rolle"},{"t":"Motivation behindert das Lernen"},{"t":"Nur der Ausbilder muss motiviert sein"}],"e":"Motivation ist ein Schlüsselfaktor: Wer den Sinn erkennt, Interesse hat und Erfolgserlebnisse erfährt, lernt engagierter und nachhaltiger. Ausbilder fördern Motivation durch Praxisbezug, erreichbare Ziele, Lob und Einbeziehung der Lernenden."},{"id":"Z-PE-021","f":4,"sub":"Personalentwicklung","t":"mc","q":"Was ist das Ziel einer gründlichen Einarbeitung neuer Mitarbeiter?","o":[{"t":"Schnelle fachliche und soziale Integration sowie sichere Beherrschung der Aufgaben","ok":1},{"t":"Möglichst wenig Information zu geben"},{"t":"Den neuen Mitarbeiter zu verunsichern"},{"t":"Die Probezeit zu verkürzen"}],"e":"Eine gute Einarbeitung macht neue Mitarbeiter fachlich handlungsfähig und bindet sie sozial ins Team ein. Das verkürzt die Anlaufzeit, beugt Fehlern und Frust vor, erhöht die Zufriedenheit und senkt die Gefahr einer frühen Kündigung."},{"id":"Z-PE-022","f":4,"sub":"Personalentwicklung","t":"mc","q":"Welchen Zweck hat die arbeitsschutzrechtliche Unterweisung der Mitarbeiter?","o":[{"t":"Über Gefahren, Schutzmaßnahmen und sicheres Verhalten am Arbeitsplatz zu informieren","ok":1},{"t":"Die Löhne zu berechnen"},{"t":"Die Bilanz zu erstellen"},{"t":"Werbung zu verteilen"}],"e":"Die Sicherheitsunterweisung (vor Aufnahme der Tätigkeit und danach regelmäßig) informiert über Gefährdungen, Schutzeinrichtungen und richtiges Verhalten. Sie ist eine Pflicht des Arbeitgebers/Vorgesetzten und dient der Unfallverhütung (vgl. Arbeitsschutzrecht)."},{"id":"Z-PE-023","f":4,"sub":"Personalentwicklung","t":"mc","q":"Was ist das betriebliche Vorschlagswesen (Ideenmanagement)?","o":[{"t":"Ein System, mit dem Mitarbeiter Verbesserungsvorschläge einreichen und dafür anerkannt/prämiert werden","ok":1},{"t":"Ein Verzeichnis der Maschinen"},{"t":"Die Lohnabrechnung"},{"t":"Ein Kündigungsverfahren"}],"e":"Das betriebliche Vorschlagswesen nutzt das Wissen der Mitarbeiter für Verbesserungen (Qualität, Kosten, Sicherheit). Gute Vorschläge werden bewertet, umgesetzt und honoriert. Das fördert Motivation, Mitdenken und kontinuierliche Verbesserung (KVP)."},{"id":"Z-PE-024","f":4,"sub":"Personalentwicklung","t":"mc","q":"Welchen Vorteil hat es, Führungsnachwuchs aus den eigenen Reihen zu entwickeln?","o":[{"t":"Die Kandidaten kennen den Betrieb, die Bindung steigt und Einarbeitungszeiten verkürzen sich","ok":1},{"t":"Es entstehen nur Nachteile"},{"t":"Externe Kandidaten sind immer besser"},{"t":"Interne Entwicklung ist verboten"}],"e":"Interne Nachwuchskräfte kennen Abläufe, Kultur und Kollegen, sind schneller einsatzbereit und stärker gebunden; zudem wirkt die Aufstiegsperspektive motivierend auf die Belegschaft. Ergänzend können externe Kräfte neue Impulse einbringen."},{"id":"Z-PE-025","f":4,"sub":"Personalentwicklung","t":"mc","q":"Welche Kompetenzarten werden im Rahmen beruflicher Handlungsfähigkeit unterschieden?","o":[{"t":"Fach-, Methoden-, Sozial- und Selbst-(Personal-)kompetenz","ok":1},{"t":"Nur Fachkompetenz"},{"t":"Bar-, Buch- und Sachkompetenz"},{"t":"Fixe und variable Kompetenz"}],"e":"Berufliche Handlungskompetenz setzt sich zusammen aus Fachkompetenz (Fachwissen/Können), Methodenkompetenz (Arbeits-/Lerntechniken), Sozialkompetenz (Zusammenarbeit, Kommunikation) und Selbst-/Personalkompetenz (Eigenverantwortung, Selbstorganisation)."},{"id":"Z-PE-026","f":4,"sub":"Personalentwicklung","t":"open","q":"Erläutern Sie die Vier-Stufen-Methode der Unterweisung und wofür sie sich eignet.","a":"Die Vier-Stufen-Methode ist eine bewährte Methode, um praktische Fertigkeiten und Arbeitsabläufe systematisch zu vermitteln. Sie verläuft in vier Schritten: (1) Vorbereiten: Der Ausbilder stellt einen guten Kontakt her, nimmt dem Lernenden die Hemmung, klärt Vorkenntnisse, erläutert Sinn und Ziel der Tätigkeit und bereitet Arbeitsplatz und Material vor. (2) Vormachen und Erklären: Der Ausbilder führt die Tätigkeit langsam und richtig vor und erklärt dabei jeden wichtigen Schritt sowie das Warum (Kernpunkte). (3) Nachmachen lassen: Der Lernende führt die Tätigkeit nun selbst aus und erklärt dabei, was und warum er es tut. So zeigt sich, ob er es verstanden hat; der Ausbilder beobachtet, lobt und korrigiert bei Bedarf. (4) Üben und selbstständiges Anwenden: Der Lernende übt die Tätigkeit eigenständig, bis er sie sicher beherrscht; der Ausbilder bleibt ansprechbar und kontrolliert das Ergebnis. Die Methode eignet sich besonders für das Erlernen manueller, praktischer Fertigkeiten und Arbeitsabläufe. Für das Vermitteln von Wissen und Zusammenhängen oder das Fördern selbstständigen Denkens sind dagegen Methoden wie das Lehrgespräch oder die Leittextmethode besser geeignet.","e":"Stufen: Vorbereiten → Vormachen/Erklären → Nachmachen lassen (mit Erklären) → Üben/selbstständig anwenden. Ideal für praktische Fertigkeiten."},{"id":"Z-PE-027","f":4,"sub":"Personalentwicklung","t":"open","q":"Unterscheiden Sie Personalentwicklung „on the job“, „off the job“ und „near the job“ mit je einem Beispiel.","a":"Die drei Begriffe unterscheiden den Lernort. 1) On the job (am Arbeitsplatz): Die Entwicklung findet direkt bei der Ausübung der Tätigkeit statt. Beispiele sind Einarbeitung, Unterweisung, Job Rotation, Coaching oder Mentoring. Vorteil: hoher Praxisbezug und unmittelbare Anwendung; Nachteil: der laufende Betrieb kann das Lernen stören. 2) Off the job (außerhalb des Arbeitsplatzes): Gelernt wird losgelöst vom Arbeitsplatz, z. B. in Seminaren, Lehrgängen, Schulungen oder Fachtagungen. Vorteil: systematisches, störungsfreies Lernen; Nachteil: der Transfer des Gelernten in die Praxis muss anschließend sichergestellt werden. 3) Near the job (arbeitsplatznah): Lernen und Arbeiten werden in Arbeitsplatznähe verbunden, z. B. in Projektarbeit, Qualitätszirkeln oder einer Lernwerkstatt (Lernstatt). Vorteil: praxisnah, ohne den regulären Ablauf direkt zu stören. In der Praxis werden die Formen oft kombiniert, um Theorie und Praxis wirksam zu verbinden. Ergänzend gibt es „into the job“ (Vorbereitung auf eine neue Aufgabe, z. B. Trainee/Einarbeitung) und „out of the job“ (z. B. Vorbereitung auf den Ruhestand).","e":"On the job = am Arbeitsplatz (z. B. Einarbeitung, Coaching); off the job = extern (z. B. Seminar); near the job = arbeitsplatznah (z. B. Projekt, Qualitätszirkel)."},{"id":"Z-PE-028","f":4,"sub":"Personalentwicklung","t":"open","q":"Welche Bedeutung hat die Personalentwicklung für Unternehmen und Mitarbeiter? Nennen Sie je zwei Aspekte.","a":"Personalentwicklung nützt beiden Seiten. Für das Unternehmen: (1) Sie sichert die benötigten Qualifikationen und die Anpassungs- und Wettbewerbsfähigkeit, indem Mitarbeiter mit neuen Anforderungen (Technik, Verfahren, Vorschriften) Schritt halten. (2) Sie erhöht Motivation und Bindung und ermöglicht es, Stellen aus den eigenen Reihen zu besetzen; das senkt Fluktuation, Fehlbesetzungen und Rekrutierungskosten. Für die Mitarbeiter: (1) Sie erweitern ihre Kenntnisse und Fähigkeiten, sichern ihre Beschäftigungsfähigkeit und eröffnen sich Aufstiegs- und Entwicklungschancen. (2) Sie erleben Wertschätzung, mehr Handlungssicherheit und Zufriedenheit, weil sie ihren Aufgaben gewachsen sind und sich weiterentwickeln können. Damit die Investition wirkt, sollte PE am tatsächlichen Bedarf ausgerichtet und der Praxistransfer des Gelernten sichergestellt werden. Insgesamt ist Personalentwicklung eine Investition in die Zukunft, von der Betrieb und Beschäftigte gleichermaßen profitieren.","e":"Für den Betrieb: gesicherte Qualifikation/Wettbewerbsfähigkeit und höhere Bindung/geringere Fluktuation. Für Mitarbeiter: Beschäftigungsfähigkeit/Aufstiegschancen und Wertschätzung/Zufriedenheit."},{"id":"Z-PE-029","f":4,"sub":"Personalentwicklung","t":"mc","q":"Welche Aussage zur Aufstiegsfortbildung ist richtig?","o":[{"t":"Sie führt zu einer höheren Qualifikation, z. B. zum Geprüften Meister","ok":1},{"t":"Sie ersetzt die Erstausbildung"},{"t":"Sie ist ein neuer Erstberuf"},{"t":"Sie dient nur der Anpassung an neue Technik"}],"e":"Die Aufstiegsfortbildung baut auf einer Berufsausbildung und Praxis auf und qualifiziert für höhere Aufgaben (z. B. Meister, Fachwirt, Techniker). Sie unterscheidet sich von der Anpassungsfortbildung, die nur das vorhandene Können aktualisiert."},{"id":"Z-PE-030","f":4,"sub":"Personalentwicklung","t":"mc","q":"Was ist bei der Auswahl einer Personalentwicklungsmaßnahme entscheidend?","o":[{"t":"Dass sie zum ermittelten Bedarf, zu den Zielen und zur Person passt","ok":1},{"t":"Dass sie möglichst teuer ist"},{"t":"Dass sie möglichst weit weg stattfindet"},{"t":"Dass sie nichts mit der Tätigkeit zu tun hat"}],"e":"Eine PE-Maßnahme wirkt nur, wenn sie am tatsächlichen Qualifizierungsbedarf ansetzt, die betrieblichen und persönlichen Ziele unterstützt und zur Vorbildung und Lernweise des Mitarbeiters passt. Danach richten sich Inhalt, Methode und Ort."},{"id":"Z-PE-031","f":4,"sub":"Personalentwicklung","t":"mc","q":"Warum ist der Praxistransfer nach einer externen Schulung („off the job“) besonders wichtig?","o":[{"t":"Weil das Gelernte sonst nicht angewendet wird und verpufft","ok":1},{"t":"Weil Transfer verboten ist"},{"t":"Weil externe Schulungen nie nützen"},{"t":"Weil der Transfer die Kosten senkt"}],"e":"Wissen aus Seminaren nützt nur, wenn es im Arbeitsalltag angewendet wird. Ohne bewussten Transfer (z. B. konkrete Umsetzungsvorhaben, Unterstützung durch die Führungskraft, Übung) geht der Lerneffekt schnell verloren. Der Transfer entscheidet über den Erfolg."},{"id":"Z-PE-032","f":4,"sub":"Personalentwicklung","t":"mc","q":"Was fördert das betriebliche Vorschlagswesen neben konkreten Verbesserungen zusätzlich?","o":[{"t":"Motivation, Mitdenken und Identifikation der Mitarbeiter","ok":1},{"t":"Nur zusätzliche Bürokratie ohne Nutzen"},{"t":"Die Senkung der Löhne"},{"t":"Die Auflösung von Teams"}],"e":"Wird das Wissen der Mitarbeiter ernst genommen, umgesetzt und honoriert, steigen Motivation, Eigeninitiative und Identifikation mit dem Betrieb. Das Vorschlagswesen ist damit zugleich ein Instrument der Beteiligung und der kontinuierlichen Verbesserung."},{"id":"Z-PE-033","f":4,"sub":"Personalentwicklung","t":"mc","q":"Welche Aussage über lebenslanges Lernen trifft zu?","o":[{"t":"Wegen des raschen Wandels von Technik und Anforderungen ist kontinuierliche Weiterbildung notwendig","ok":1},{"t":"Nach der Ausbildung ist kein Lernen mehr nötig"},{"t":"Lernen endet mit dem Berufseinstieg"},{"t":"Weiterbildung ist grundsätzlich schädlich"}],"e":"Technischer Fortschritt, Digitalisierung und veränderte Anforderungen machen es erforderlich, Wissen und Fähigkeiten fortlaufend zu aktualisieren. Lebenslanges Lernen sichert die Beschäftigungsfähigkeit der Mitarbeiter und die Wettbewerbsfähigkeit des Betriebs."},{"id":"Z-PE-034","f":4,"sub":"Personalentwicklung","t":"mc","q":"Welche Kompetenz beschreibt die Fähigkeit zur Zusammenarbeit und Kommunikation mit anderen?","o":[{"t":"Die Sozialkompetenz","ok":1},{"t":"Die Fachkompetenz"},{"t":"Die Methodenkompetenz"},{"t":"Die Selbstkompetenz"}],"e":"Sozialkompetenz umfasst Team-, Kommunikations- und Konfliktfähigkeit sowie Kooperationsbereitschaft. Sie ergänzt die Fachkompetenz (Wissen/Können), die Methodenkompetenz (Arbeitstechniken) und die Selbstkompetenz (Eigenverantwortung, Selbstorganisation)."},{"id":"Z-PE-035","f":4,"sub":"Personalentwicklung","t":"mc","q":"Wie sollte ein Ausbilder auf Fehler eines Auszubildenden reagieren?","o":[{"t":"Sachlich, geduldig und lernförderlich – Fehler als normalen Teil des Lernprozesses behandeln","ok":1},{"t":"Mit Spott und Bloßstellung vor anderen"},{"t":"Mit Ignorieren jedes Fehlers"},{"t":"Mit sofortiger Kündigung"}],"e":"Fehler gehören zum Lernen. Ein guter Ausbilder bleibt geduldig, erklärt sachlich Ursache und richtiges Vorgehen, ermutigt und lässt üben. Bloßstellung oder harte Strafen erzeugen Angst und behindern das Lernen; Ignorieren verhindert Verbesserung."}];
</script>
<script>
(function(){
"use strict";

/* ===== Fächer ===== */
var FACH = {1:"Rechtsbewusstes Handeln",2:"Betriebswirtschaftliches Handeln",3:"Methoden der Information, Kommunikation und Planung",4:"Zusammenarbeit im Betrieb"};
var FACH_KURZ = {1:"Recht",2:"BWL",3:"Methoden",4:"Zusammenarbeit"};
var SUB_ORDER = ["Arbeitsrecht","Betriebsverfassung","Sozialversicherung","Arbeitsschutz","Umweltrecht","Produkthaftung/Datenschutz",
  "Volkswirtschaft","Rechtsformen","Betriebsorganisation","Materialwirtschaft","Kostenrechnung","Rechnungswesen",
  "Projektmanagement","Kreativitätstechniken","Statistik","Präsentation","Kommunikation","EDV",
  "Motivation","Führungsstile","Führungsmethoden","Gruppen","Konflikte","Personalentwicklung"];

var ALL = (window.KVM_QUESTIONS||[]).slice();

/* ===== progress (localStorage, Leitner boxes) ===== */
var LS_KEY='kvm_progress_v1', MASTER_BOX=3, MAX_BOX=5;
var progress=loadProgress();
function loadProgress(){try{var raw=localStorage.getItem(LS_KEY);return raw?JSON.parse(raw):{};}catch(e){return {};}}
function saveProgress(){try{localStorage.setItem(LS_KEY,JSON.stringify(progress));}catch(e){}}
function pget(id){return progress[id]||{seen:0,correct:0,wrong:0,box:0};}
function recordResult(id,correct){var p=pget(id);p.seen++;if(correct){p.correct++;p.box=Math.min(MAX_BOX,p.box+1);}else{p.wrong++;p.box=0;}p.last=correct?1:0;progress[id]=p;saveProgress();}

/* ===== helpers ===== */
function $(id){return document.getElementById(id);}
function shuffle(a){a=a.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}
function qForFach(f){return ALL.filter(function(q){return q.f===f;});}
function qForScope(f,sub){return ALL.filter(function(q){return q.f===f && (sub==='*'||q.sub===sub);});}
function subsOfFach(f){var s=[];qForFach(f).forEach(function(q){if(s.indexOf(q.sub)<0)s.push(q.sub);});s.sort(function(a,b){return SUB_ORDER.indexOf(a)-SUB_ORDER.indexOf(b);});return s;}
function fachCounts(){var c={};ALL.forEach(function(q){c[q.f]=(c[q.f]||0)+1;});return c;}

/* ===== STATE ===== */
var ROUND_LEN=20, SIM_LEN=30, SIM_SECONDS=60*60;
var state={fach:1,sub:'*',mode:null,pool:[],shuffledOpts:[],idx:0,results:[],wrong:[],answered:false,revealed:false,timerId:null,timeLeft:0};

/* ===== HOME rendering ===== */
function renderProgress(){
  var counts=fachCounts(); var total=ALL.length;
  var mastered=0,seen=0;
  ALL.forEach(function(q){var p=progress[q.id];if(p&&p.seen>0){seen++;if(p.box>=MASTER_BOX)mastered++;}});
  $("pMastered").textContent=mastered;$("pSeen").textContent=seen;$("pOpen").textContent=total-seen;
  $("pFill").style.width=(total?Math.round(mastered/total*100):0)+"%";
  var storageOn=true;try{localStorage.setItem('__t','1');localStorage.removeItem('__t');}catch(e){storageOn=false;}
  $("pNote").textContent=storageOn?"„Gemeistert“ heißt: diese Frage mehrmals in Folge richtig beantwortet. Dein Fortschritt wird auf diesem Gerät gespeichert.":
    "Hinweis: In dieser Vorschau ist die dauerhafte Speicherung inaktiv. Auf einer echten Webseite oder lokal im Browser geöffnet merkt sich die App deinen Fortschritt.";
}

function renderFachGrid(){
  var counts=fachCounts(); var grid=$("fachGrid"); grid.innerHTML="";
  [1,2,3,4].forEach(function(f){
    var n=counts[f]||0;
    var b=document.createElement("button"); b.className="fach"+(state.fach===f?" active":"");
    if(n===0)b.disabled=true;
    var mastered=0;qForFach(f).forEach(function(q){var p=progress[q.id];if(p&&p.box>=MASTER_BOX)mastered++;});
    var pct=n?Math.round(mastered/n*100):0;
    b.innerHTML='<span class="fnum">'+f+'</span><span class="fmeta"><span class="fname">'+FACH[f]+'</span>'+
      '<span class="fsub">'+(n?FACH_KURZ[f]+' · '+mastered+'/'+n+' gemeistert':'in Vorbereitung')+'</span>'+
      (n?'<span class="minibar"><span class="mf" style="width:'+pct+'%"></span></span>':'')+
      '</span><span class="fcount">'+(n?n:'–')+'</span>';
    if(n>0)b.addEventListener("click",function(){state.fach=f;state.sub='*';renderFachGrid();renderSubChips();updateModeCards();});
    grid.appendChild(b);
  });
}

function renderSubChips(){
  var wrap=$("subChips"); wrap.innerHTML=""; var subs=subsOfFach(state.fach);
  var mk=function(sub,label){
    var n=qForScope(state.fach,sub).length;
    var b=document.createElement("button"); b.className="chip"+(state.sub===sub?" active":"");
    b.innerHTML=label+' <span class="n">'+n+'</span>';
    b.addEventListener("click",function(){state.sub=sub;renderSubChips();updateModeCards();});
    wrap.appendChild(b);
  };
  mk('*','Alle Bereiche');
  subs.forEach(function(s){mk(s,s);});
}

function scopeLabel(){return state.sub==='*'?FACH_KURZ[state.fach]+' – alle Bereiche':state.sub;}
function countWeak(){var f=state.fach,sub=state.sub;return qForScope(f,sub).filter(function(q){var p=progress[q.id];return !p||p.seen===0||p.last===0||p.box<MASTER_BOX;}).length;}

function updateModeCards(){
  var scopeN=qForScope(state.fach,state.sub).length;
  $("trainScope").textContent=scopeLabel();
  $("trainDesc").textContent=Math.min(ROUND_LEN,scopeN)+" Fragen aus „"+scopeLabel()+"“ mit sofortiger Auswertung und Erklärung. Neue und zuletzt falsche Fragen werden bevorzugt.";
  var weakN=countWeak();
  $("weakDesc").textContent=weakN>0?("Gezielt üben: "+Math.min(ROUND_LEN,weakN)+" von "+weakN+" noch nicht gemeisterten Fragen in „"+scopeLabel()+"“."):"Super – in diesem Bereich ist aktuell alles gemeistert. Wähle einen anderen Bereich oder starte ein normales Training.";
  $("btnWeak").disabled=weakN===0;
  var fachN=qForFach(state.fach).length;
  $("simDesc").textContent=Math.min(SIM_LEN,fachN)+" Fragen aus dem ganzen Fach „"+FACH_KURZ[state.fach]+"“ · 60 Minuten · bestanden ab 50 %.";
}

/* ===== pick questions with weighting ===== */
function weightedPick(candidates,n){
  // sort: unseen first, then last-wrong, then lowest box, then random
  var scored=candidates.map(function(q){var p=progress[q.id]||{seen:0,box:0,last:null};
    var pr = p.seen===0?0 : (p.last===0?1 : 2+p.box);
    return {q:q,pr:pr,r:Math.random()};});
  scored.sort(function(a,b){return a.pr-b.pr || a.r-b.r;});
  return scored.slice(0,n).map(function(s){return s.q;});
}

/* ===== ROUND ===== */
function startRound(mode){
  state.mode=mode;
  if(mode==='train'){
    var cand=qForScope(state.fach,state.sub);
    state.pool=shuffle(weightedPick(cand,Math.min(ROUND_LEN,cand.length)));
  }else if(mode==='weak'){
    var cw=qForScope(state.fach,state.sub).filter(function(q){var p=progress[q.id];return !p||p.seen===0||p.last===0||p.box<MASTER_BOX;});
    state.pool=shuffle(weightedPick(cw,Math.min(ROUND_LEN,cw.length)));
  }else if(mode==='sim'){
    var byfach=qForFach(state.fach);
    state.pool=shuffle(byfach).slice(0,Math.min(SIM_LEN,byfach.length));
  }else if(mode==='retry'){
    state.pool=shuffle(state.wrong);
  }
  state.shuffledOpts=state.pool.map(function(q){return q.t==='mc'?shuffle(q.o):null;});
  state.idx=0;state.results=[];state.wrong=[];
  clearInterval(state.timerId);
  if(mode==='sim'){state.timeLeft=SIM_SECONDS;$("qTimer").hidden=false;renderTimer();
    state.timerId=setInterval(function(){state.timeLeft--;renderTimer();if(state.timeLeft<=0){clearInterval(state.timerId);finishRound(true);}},1000);
  }else{$("qTimer").hidden=true;}
  buildProtocol();show("scrQuiz");renderQuestion();
}
function renderTimer(){var m=Math.floor(state.timeLeft/60),s=state.timeLeft%60;var el=$("qTimer");el.textContent=(m<10?"0":"")+m+":"+(s<10?"0":"")+s;el.classList.toggle("low",state.timeLeft<=120);}
function buildProtocol(){var p=$("protocol");p.innerHTML="";state.pool.forEach(function(_,i){var d=document.createElement("div");d.className="seg";d.id="seg"+i;p.appendChild(d);});}

function setActions(html){$("qActions").innerHTML=html;}

function renderQuestion(){
  var q=state.pool[state.idx];state.answered=false;state.revealed=false;
  $("qFach").textContent=q.f+". "+FACH_KURZ[q.f];
  $("qCount").textContent="Frage "+(state.idx+1)+"/"+state.pool.length;
  var typeEl=$("qType");
  if(q.t==='mc'){typeEl.textContent="Auswahlfrage";typeEl.className="qtype mc";}else{typeEl.textContent="Offene Frage";typeEl.className="qtype open";}
  $("qSubLabel").textContent=q.sub;
  $("qText").textContent=q.q;
  state.pool.forEach(function(_,i){var s=$("seg"+i);s.className="seg"+(i===state.idx?" cur":(state.results[i]===true?" ok":(state.results[i]===false?" err":"")));});

  var opts=$("qOpts"),open=$("qOpen"),fb=$("qFeedback");
  fb.hidden=true;
  if(q.t==='mc'){
    open.hidden=true;opts.hidden=false;opts.innerHTML="";var letters=["A","B","C","D","E"];
    state.shuffledOpts[state.idx].forEach(function(o,i){
      var b=document.createElement("button");b.className="opt";b.dataset.i=i;
      b.innerHTML='<span class="key">'+letters[i]+'</span><span>'+o.t+'</span>';
      b.addEventListener("click",function(){if(state.answered)return;opts.querySelectorAll(".opt").forEach(function(x){x.classList.remove("sel");});b.classList.add("sel");enableCheck();});
      opts.appendChild(b);
    });
    setActions('<button class="primary" id="btnCheck" disabled>Antwort prüfen</button>');
    $("btnCheck").addEventListener("click",checkMc);
  }else{
    opts.hidden=true;open.hidden=false;open.className="openbox";
    $("oaLabel").hidden=false;$("oaText").hidden=true;$("oaText").textContent=q.a;
    setActions('<button class="primary" id="btnReveal">Antwort anzeigen</button>');
    $("btnReveal").addEventListener("click",revealOpen);
  }
}
function enableCheck(){var b=$("btnCheck");if(b)b.disabled=false;}

function checkMc(){
  if(state.answered)return;var q=state.pool[state.idx];
  var sel=$("qOpts").querySelector(".opt.sel");if(!sel)return;
  var chosen=state.shuffledOpts[state.idx][parseInt(sel.dataset.i,10)];var correct=!!chosen.ok;
  $("qOpts").querySelectorAll(".opt").forEach(function(b,i){var o=state.shuffledOpts[state.idx][i];b.disabled=true;
    if(o.ok)b.classList.add("reveal-ok");else if(b===sel)b.classList.add("reveal-err");else b.classList.add("dim");});
  finalize(correct,q);
}
function revealOpen(){
  state.revealed=true;var q=state.pool[state.idx];
  $("qOpen").className="openbox revealed";$("oaLabel").hidden=true;$("oaText").hidden=false;
  setActions('<div class="split"><button class="btn-no" id="btnNo">Nicht gewusst</button><button class="btn-ok" id="btnYes">Gewusst</button></div>');
  $("btnYes").addEventListener("click",function(){finalize(true,q);});
  $("btnNo").addEventListener("click",function(){finalize(false,q);});
}

function finalize(correct,q){
  state.answered=true;state.results[state.idx]=correct;if(!correct)state.wrong.push(q);
  recordResult(q.id,correct);
  $("seg"+state.idx).className="seg "+(correct?"ok":"err");
  var fb=$("qFeedback");fb.className="feedback "+(correct?"good":"bad");
  $("fbHead").textContent=correct?"✓ Richtig":"✗ Leider falsch";
  var body="";
  if(q.t==='mc'){body="<p>"+q.e+"</p>";}
  else{body="<p>"+(correct?"Gut. ":"")+ (q.e?q.e:"")+"</p>";}
  $("fbBody").innerHTML=body;fb.hidden=false;
  var last=state.idx===state.pool.length-1;
  setActions('<button class="primary" id="btnNext">'+(last?"Zum Ergebnis →":"Weiter →")+'</button>');
  $("btnNext").addEventListener("click",next);$("btnNext").focus();
}
function next(){if(state.idx===state.pool.length-1){finishRound(false);}else{state.idx++;renderQuestion();}}

function finishRound(timeUp){
  clearInterval(state.timerId);
  if(timeUp){for(var i=0;i<state.pool.length;i++){if(state.results[i]===undefined){state.results[i]=false;state.wrong.push(state.pool[i]);recordResult(state.pool[i].id,false);}}}
  var total=state.pool.length;var right=state.results.filter(function(r){return r===true;}).length;var pct=total?Math.round(right/total*100):0;
  var C=282.7,fg=$("ringFg");fg.style.strokeDashoffset=C;
  requestAnimationFrame(function(){requestAnimationFrame(function(){fg.style.strokeDashoffset=C*(1-pct/100);});});
  $("ringPct").textContent=pct+" %";
  var badge=$("resBadge");
  if(state.mode==='sim'){badge.hidden=false;var pass=pct>=50;badge.className="badge "+(pass?"pass":"fail");badge.textContent=pass?"Bestanden (≥ 50 %)":"Nicht bestanden (< 50 %)";$("resTitle").textContent="Prüfungssimulation";}
  else{badge.hidden=true;$("resTitle").textContent=(state.mode==='weak'?"Schwächen-Training":"Trainingsrunde");}
  $("resLine").innerHTML="<b>"+right+"</b> von <b>"+total+"</b> richtig"+(timeUp?" · Zeit abgelaufen":"");

  var bd=$("breakdown");bd.innerHTML="";
  var subs=[];state.pool.forEach(function(q){if(subs.indexOf(q.sub)<0)subs.push(q.sub);});
  subs.sort(function(a,b){return SUB_ORDER.indexOf(a)-SUB_ORDER.indexOf(b);});
  subs.forEach(function(sub){
    var idxs=[];state.pool.forEach(function(q,i){if(q.sub===sub)idxs.push(i);});
    var r=idxs.filter(function(i){return state.results[i]===true;}).length;var p=Math.round(r/idxs.length*100);
    var row=document.createElement("div");row.className="b-row";
    row.innerHTML='<div class="b-top"><span class="b-name">'+sub+'</span><span class="b-num">'+r+'/'+idxs.length+' · '+p+' %</span></div><div class="b-bar"><div class="b-fill" style="width:'+p+'%"></div></div>';
    bd.appendChild(row);
  });
  var wu=[];state.wrong.forEach(function(q){if(wu.indexOf(q)<0)wu.push(q);});state.wrong=wu;
  $("btnRetryWrong").hidden=state.wrong.length===0;$("wrongCount").textContent=state.wrong.length;
  show("scrResult");
}

function show(id){["scrHome","scrQuiz","scrResult"].forEach(function(s){$(s).hidden=(s!==id);});
  if(id==="scrHome"){renderProgress();renderFachGrid();renderSubChips();updateModeCards();}
  window.scrollTo(0,0);}

/* ===== events ===== */
$("btnTraining").addEventListener("click",function(){startRound('train');});
$("btnWeak").addEventListener("click",function(){startRound('weak');});
$("btnSim").addEventListener("click",function(){startRound('sim');});
$("btnQuit").addEventListener("click",function(){clearInterval(state.timerId);show("scrHome");});
$("btnAgain").addEventListener("click",function(){startRound(state.mode==='retry'?'train':state.mode);});
$("btnHome").addEventListener("click",function(){show("scrHome");});
$("btnRetryWrong").addEventListener("click",function(){startRound('retry');});
$("btnReset").addEventListener("click",function(){
  if(confirm("Deinen gesamten Lernfortschritt auf diesem Gerät wirklich zurücksetzen?")){progress={};saveProgress();renderProgress();renderFachGrid();renderSubChips();updateModeCards();}
});
document.addEventListener("keydown",function(ev){
  if($("scrQuiz").hidden)return;var q=state.pool[state.idx];if(!q)return;
  if(state.answered){if(ev.key==="Enter"||ev.key===" "){ev.preventDefault();var n=$("btnNext");if(n)n.click();}return;}
  if(q.t==='mc'){var k=parseInt(ev.key,10);if(k>=1&&k<=(state.shuffledOpts[state.idx].length)){var btns=$("qOpts").querySelectorAll(".opt");if(btns[k-1])btns[k-1].click();}
    if(ev.key==="Enter"){var c=$("btnCheck");if(c&&!c.disabled)c.click();}}
});

/* ===== init ===== */
(function init(){
  var counts=fachCounts(); var done=Object.keys(counts).length; var total=ALL.length;
  $("homeSub").innerHTML="<b>"+total+" Wissensfragen</b> in "+done+" von 4 Fächern · Fahrschul-Prinzip mit Fortschrittsspeicherung"+(done<4?" · weitere Fächer folgen":"");
  $("footerNote").innerHTML="Übungsfragen eigenständig formuliert, orientiert am DIHK-Rahmenplan und an Krause/Krause (Kiehl). Rechtsstände und veränderliche Werte (z. B. Beiträge) Stand 2025, ohne Gewähr.";
  // default to first fach that has questions
  for(var f=1;f<=4;f++){if((counts[f]||0)>0){state.fach=f;break;}}
  show("scrHome");
})();
})();
</script>
