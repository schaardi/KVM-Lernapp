ation = Prozess (wann/wie/wo?)."},{"id":"B-OR-043","f":2,"sub":"Betriebsorganisation","t":"open","q":"Vergleichen Sie Einlinien- und Stab-Linien-System hinsichtlich ihrer Vor- und Nachteile.","a":"Im Einliniensystem hat jede Stelle genau einen Vorgesetzten; Weisungen laufen eindeutig über den Instanzenweg. Vorteile sind klare Zuständigkeiten, eindeutige Verantwortlichkeiten und Übersichtlichkeit. Nachteile sind lange Dienstwege, eine mögliche Überlastung der oberen Instanzen und geringe Flexibilität. Das Stab-Linien-System ergänzt das Einliniensystem um Stabsstellen, die die Instanzen fachlich beraten und Entscheidungen vorbereiten, aber keine Weisungsbefugnis gegenüber der Linie haben. Vorteile sind die Entlastung der Instanzen und die Nutzung von Spezialwissen bei erhaltener Einheit der Auftragserteilung. Nachteile sind mögliche Spannungen zwischen Stab und Linie (die Stäbe entwickeln Konzepte, tragen aber keine Verantwortung für die Umsetzung) und ein höherer Verwaltungsaufwand.","e":"Das Stab-Linien-System kombiniert die klare Weisungsstruktur der Linie mit der Fachkompetenz von Stäben, ohne die Einheit der Auftragserteilung aufzugeben."},{"id":"B-OR-044","f":2,"sub":"Betriebsorganisation","t":"open","q":"Nennen Sie die drei Phasen des Veränderungsmodells nach Lewin und erläutern Sie kurz, was in jeder Phase geschieht.","a":"Das Modell von Kurt Lewin unterscheidet drei Phasen: (1) Auftauen (unfreezing) – die bestehende Ordnung wird infrage gestellt, Veränderungsbedarf und -bereitschaft werden geweckt, Widerstände abgebaut und Betroffene informiert und einbezogen. (2) Verändern/Bewegen (moving) – die eigentliche Veränderung wird umgesetzt, neue Verfahren, Strukturen oder Verhaltensweisen werden eingeführt und eingeübt; diese Phase ist oft von Unsicherheit geprägt. (3) Stabilisieren/Einfrieren (refreezing) – der neue Zustand wird gefestigt und in den Alltag integriert, damit kein Rückfall in alte Muster erfolgt (z. B. durch Schulung, Kontrolle und Anerkennung).","e":"Ohne die dritte Phase (Stabilisieren) besteht die Gefahr, dass die Organisation in gewohnte Verhaltensmuster zurückfällt."},{"id":"B-OR-045","f":2,"sub":"Betriebsorganisation","t":"mc","q":"Was ist ein wesentlicher Nachteil einer sehr steilen Hierarchie (viele Ebenen, kleine Leitungsspanne)?","o":[{"t":"Lange Informations- und Entscheidungswege","ok":1},{"t":"Überlastung durch zu viele direkt Unterstellte"},{"t":"Fehlende Kontrolle"},{"t":"Zu wenig Führung"}],"e":"Steile Hierarchien mit kleiner Leitungsspanne ermöglichen intensive Führung und Kontrolle, führen aber zu vielen Ebenen und dadurch zu langen Kommunikations- und Entscheidungswegen sowie höherem Verwaltungsaufwand."},{"id":"B-MW-001","f":2,"sub":"Materialwirtschaft","t":"mc","q":"Welches Ziel verfolgt die Materialwirtschaft (\"6 R der Logistik\")?","o":[{"t":"Das richtige Material, in richtiger Menge und Qualität, zur richtigen Zeit, am richtigen Ort, zu den richtigen Kosten bereitzustellen","ok":1},{"t":"Möglichst hohe Lagerbestände aufzubauen"},{"t":"Ausschließlich den Einkaufspreis zu senken"},{"t":"Die Zahl der Lieferanten zu maximieren"}],"e":"Die „6 R“ bringen das Ziel der Materialwirtschaft auf den Punkt: richtiges Material, richtige Menge, richtige Qualität, richtige Zeit, richtiger Ort, richtige Kosten. Materialbereitschaft und Kostenminimierung stehen dabei im Spannungsverhältnis."},{"id":"B-MW-002","f":2,"sub":"Materialwirtschaft","t":"mc","q":"Welche drei grundlegenden Beschaffungsarten (Bereitstellungsprinzipien) werden unterschieden?","o":[{"t":"Vorratsbeschaffung, fertigungssynchrone Beschaffung (Just-in-Time) und Einzelbeschaffung im Bedarfsfall","ok":1},{"t":"Einkauf, Verkauf und Lagerung"},{"t":"Bar-, Ziel- und Ratenkauf"},{"t":"Import, Export und Transit"}],"e":"Man unterscheidet die Vorratsbeschaffung (Lagerhaltung auf Vorrat), die fertigungssynchrone Beschaffung (JIT – Anlieferung genau bei Bedarf) und die Einzelbeschaffung im Bedarfsfall (erst bei konkretem Auftrag)."},{"id":"B-MW-003","f":2,"sub":"Materialwirtschaft","t":"mc","q":"Nach welchem Kriterium klassifiziert die ABC-Analyse die Materialien?","o":[{"t":"Nach ihrem wertmäßigen Anteil am Gesamtverbrauch","ok":1},{"t":"Nach dem Gewicht"},{"t":"Nach der Lieferzeit"},{"t":"Nach dem Alphabet"}],"e":"Die ABC-Analyse ordnet Materialien nach ihrem Verbrauchswert (Menge × Preis). A-Güter haben hohen Wert-, geringen Mengenanteil; C-Güter umgekehrt. So kann man die Beschaffung auf die wertintensiven A-Güter konzentrieren."},{"id":"B-MW-004","f":2,"sub":"Materialwirtschaft","t":"mc","q":"Wodurch sind A-Güter in der ABC-Analyse gekennzeichnet?","o":[{"t":"Geringer Mengenanteil, aber hoher Wertanteil","ok":1},{"t":"Hoher Mengenanteil, geringer Wertanteil"},{"t":"Gleich hoher Mengen- und Wertanteil"},{"t":"Nur geringer Wert"}],"e":"A-Güter machen typischerweise nur etwa 15–20 % der Menge, aber rund 70–80 % des Werts aus. Auf sie sollte sich die Disposition konzentrieren (z. B. genaue Bedarfsplanung, Preisverhandlungen)."},{"id":"B-MW-005","f":2,"sub":"Materialwirtschaft","t":"mc","q":"Was untersucht die XYZ-Analyse (ergänzend zur ABC-Analyse)?","o":[{"t":"Die Vorhersagegenauigkeit bzw. Regelmäßigkeit des Verbrauchs","ok":1},{"t":"Den Wertanteil der Güter"},{"t":"Die Farbe der Güter"},{"t":"Die Zahl der Lieferanten"}],"e":"Die XYZ-Analyse gliedert nach Verbrauchsverlauf: X = gleichmäßiger Verbrauch (gut planbar), Y = schwankend/saisonal, Z = unregelmäßig (schlecht planbar). Kombiniert mit der ABC-Analyse steuert sie die Beschaffungsstrategie."},{"id":"B-MW-006","f":2,"sub":"Materialwirtschaft","t":"mc","q":"Welcher Zielkonflikt bestimmt die optimale Bestellmenge?","o":[{"t":"Mit der Bestellmenge sinken die Bestellkosten je Stück, aber die Lagerhaltungskosten steigen","ok":1},{"t":"Beide Kostenarten steigen immer gleich"},{"t":"Es gibt keinen Zielkonflikt"},{"t":"Nur der Einkaufspreis zählt"}],"e":"Große Bestellmengen bedeuten seltenere Bestellungen (geringere bestellfixe Kosten je Stück), aber höhere Lagerbestände und damit höhere Lagerhaltungskosten. Die optimale Bestellmenge minimiert die Summe beider Kosten (Andler-Formel)."},{"id":"B-MW-007","f":2,"sub":"Materialwirtschaft","t":"mc","q":"Wie berechnet sich der Meldebestand (Bestellpunkt)?","o":[{"t":"Tagesverbrauch × Beschaffungszeit + Mindestbestand","ok":1},{"t":"Höchstbestand − Mindestbestand"},{"t":"Bestellmenge ÷ 2"},{"t":"Einkaufspreis × Menge"}],"e":"Meldebestand = (durchschnittlicher Tagesverbrauch × Lieferzeit) + Sicherheits-(Mindest-)bestand. Wird er erreicht, wird bestellt, damit die Lieferung eintrifft, bevor der Mindestbestand angegriffen wird."},{"id":"B-MW-008","f":2,"sub":"Materialwirtschaft","t":"mc","q":"Welche Funktion hat der Mindest-(Sicherheits-)bestand?","o":[{"t":"Er dient als Puffer gegen Lieferverzögerungen und unerwarteten Mehrverbrauch","ok":1},{"t":"Er ist der maximal mögliche Lagerbestand"},{"t":"Er entspricht der Bestellmenge"},{"t":"Er ist immer null"}],"e":"Der Mindest-/Sicherheits-(„eiserne“)Bestand sichert die Lieferfähigkeit bei Störungen (verspätete Lieferung, Qualitätsmängel, Mehrbedarf). Er sollte nur in Ausnahmefällen angegriffen werden."},{"id":"B-MW-009","f":2,"sub":"Materialwirtschaft","t":"mc","q":"Ein Artikel hat einen Tagesverbrauch von 50 Stück, die Lieferzeit beträgt 6 Tage und der Mindestbestand 200 Stück. Wie hoch ist der Meldebestand?","o":[{"t":"500 Stück","ok":1},{"t":"300 Stück"},{"t":"350 Stück"},{"t":"800 Stück"}],"e":"Meldebestand = Tagesverbrauch × Lieferzeit + Mindestbestand = 50 × 6 + 200 = 300 + 200 = 500 Stück."},{"id":"B-MW-010","f":2,"sub":"Materialwirtschaft","t":"mc","q":"Wie ist die Umschlagshäufigkeit des Lagers definiert?","o":[{"t":"Materialverbrauch (Wareneinsatz) ÷ durchschnittlicher Lagerbestand","ok":1},{"t":"Durchschnittlicher Lagerbestand ÷ Verbrauch"},{"t":"Höchstbestand ÷ Mindestbestand"},{"t":"Bestellmenge × Preis"}],"e":"Umschlagshäufigkeit = Verbrauch ÷ durchschnittlicher Lagerbestand. Sie gibt an, wie oft der Bestand pro Periode „umgeschlagen“ (verbraucht und ersetzt) wird. Je höher, desto geringer die Kapitalbindung."},{"id":"B-MW-011","f":2,"sub":"Materialwirtschaft","t":"mc","q":"Der Jahresverbrauch beträgt 600.000 €, der durchschnittliche Lagerbestand 50.000 €. Wie hoch ist die Umschlagshäufigkeit?","o":[{"t":"12","ok":1},{"t":"6"},{"t":"10"},{"t":"120"}],"e":"Umschlagshäufigkeit = Verbrauch ÷ ⌀ Lagerbestand = 600.000 ÷ 50.000 = 12. Der Lagerbestand wird also zwölfmal im Jahr umgeschlagen."},{"id":"B-MW-012","f":2,"sub":"Materialwirtschaft","t":"mc","q":"Wie berechnet sich die durchschnittliche Lagerdauer (mit 360 Tagen)?","o":[{"t":"360 ÷ Umschlagshäufigkeit","ok":1},{"t":"Umschlagshäufigkeit ÷ 360"},{"t":"360 × Umschlagshäufigkeit"},{"t":"Bestand ÷ 360"}],"e":"Durchschnittliche Lagerdauer = 360 ÷ Umschlagshäufigkeit. Bei einer Umschlagshäufigkeit von 12 beträgt die Lagerdauer 360 ÷ 12 = 30 Tage."},{"id":"B-MW-013","f":2,"sub":"Materialwirtschaft","t":"mc","q":"Die Umschlagshäufigkeit beträgt 8. Wie lang ist die durchschnittliche Lagerdauer (360 Tage)?","o":[{"t":"45 Tage","ok":1},{"t":"30 Tage"},{"t":"8 Tage"},{"t":"60 Tage"}],"e":"Durchschnittliche Lagerdauer = 360 ÷ Umschlagshäufigkeit = 360 ÷ 8 = 45 Tage. Eine kürzere Lagerdauer bindet weniger Kapital und senkt die Lagerkosten."},{"id":"B-MW-014","f":2,"sub":"Materialwirtschaft","t":"mc","q":"Wie kann der durchschnittliche Lagerbestand vereinfacht berechnet werden?","o":[{"t":"(Anfangsbestand + Endbestand) ÷ 2","ok":1},{"t":"Anfangsbestand − Endbestand"},{"t":"Anfangsbestand × Endbestand"},{"t":"Endbestand ÷ 2"}],"e":"Vereinfacht: (Anfangsbestand + Endbestand) ÷ 2. Genauer wird der Durchschnitt aus Anfangsbestand und den zwölf Monatsendbeständen geteilt durch 13 gebildet."},{"id":"B-MW-015","f":2,"sub":"Materialwirtschaft","t":"mc","q":"Wie ist der Höchstbestand definiert?","o":[{"t":"Mindestbestand + Bestellmenge","ok":1},{"t":"Meldebestand − Mindestbestand"},{"t":"Tagesverbrauch × 360"},{"t":"Durchschnittsbestand ÷ 2"}],"e":"Der Höchstbestand ergibt sich, wenn zum Mindestbestand die volle Bestellmenge hinzukommt: Höchstbestand = Mindestbestand + Bestellmenge. Er begrenzt die Kapitalbindung nach oben."},{"id":"B-MW-016","f":2,"sub":"Materialwirtschaft","t":"mc","q":"Was ist ein wesentliches Ziel der Just-in-Time-Beschaffung?","o":[{"t":"Anlieferung des Materials genau dann, wenn es benötigt wird – geringe Lagerbestände","ok":1},{"t":"Möglichst große Vorräte anzulegen"},{"t":"Die Zahl der Lieferungen zu minimieren"},{"t":"Die Qualitätskontrolle abzuschaffen"}],"e":"Just-in-Time zielt auf produktions-/bedarfssynchrone Anlieferung, um Lagerbestände und Kapitalbindung zu minimieren. Voraussetzung sind zuverlässige Lieferanten und stabile Abläufe."},{"id":"B-MW-017","f":2,"sub":"Materialwirtschaft","t":"mc","q":"Welches Risiko ist mit der Just-in-Time-Beschaffung verbunden?","o":[{"t":"Bei Lieferstörungen kommt es mangels Puffer schnell zu Produktionsstillständen","ok":1},{"t":"Zu hohe Lagerkosten"},{"t":"Überfüllte Lager"},{"t":"Kein Risiko"}],"e":"Da kaum Sicherheitsbestände vorgehalten werden, führt jede Lieferverzögerung (z. B. Stau, Streik, Lieferantenausfall) rasch zu Engpässen. JIT verlagert Risiken auf eine hohe Prozess- und Lieferzuverlässigkeit."},{"id":"B-MW-018","f":2,"sub":"Materialwirtschaft","t":"mc","q":"Nach welchem Prinzip steuert ein Kanban-System den Materialnachschub?","o":[{"t":"Nach dem Hol-(Pull-)Prinzip: Verbrauch löst über eine Karte/Signal die Nachlieferung aus","ok":1},{"t":"Nach dem Bring-(Push-)Prinzip mit zentraler Vorplanung"},{"t":"Nach dem Zufallsprinzip"},{"t":"Ohne jede Steuerung"}],"e":"Kanban arbeitet nach dem Pull-Prinzip: Erst der tatsächliche Verbrauch an einer Verbrauchsstelle signalisiert (per Kanban-Karte) den Bedarf und stößt die Nachlieferung an. Das reduziert Bestände und Überproduktion."},{"id":"B-MW-019","f":2,"sub":"Materialwirtschaft","t":"mc","q":"In welcher Reihenfolge werden in der Bezugskalkulation die Preisstufen ermittelt?","o":[{"t":"Listeneinkaufspreis − Rabatt = Zieleinkaufspreis − Skonto = Bareinkaufspreis + Bezugskosten = Bezugspreis (Einstandspreis)","ok":1},{"t":"Bezugspreis − Rabatt = Listeneinkaufspreis"},{"t":"Einstandspreis + Gewinn = Listenpreis"},{"t":"Skonto + Rabatt = Verkaufspreis"}],"e":"Bezugskalkulation: Vom Listeneinkaufspreis werden Lieferrabatt und Lieferskonto abgezogen; hinzu kommen die Bezugskosten (Fracht, Verpackung, Versicherung). Ergebnis ist der Bezugs-/Einstandspreis – die Basis für Angebotsvergleich und Kalkulation."},{"id":"B-MW-020","f":2,"sub":"Materialwirtschaft","t":"mc","q":"Der Listeneinkaufspreis beträgt 1.000 €. Es werden 10 % Rabatt und anschließend 2 % Skonto gewährt. Wie hoch ist der Bareinkaufspreis?","o":[{"t":"882 €","ok":1},{"t":"880 €"},{"t":"900 €"},{"t":"780 €"}],"e":"Listenpreis 1.000 € − 10 % Rabatt = 900 € (Zieleinkaufspreis). Davon 2 % Skonto = 18 €, also 900 − 18 = 882 € Bareinkaufspreis. Bezugskosten kämen für den Einstandspreis noch hinzu."},{"id":"B-MW-021","f":2,"sub":"Materialwirtschaft","t":"mc","q":"Welche Kriterien sind bei einem qualitativen Angebotsvergleich (Lieferantenauswahl) relevant?","o":[{"t":"Qualität, Liefertreue/-zuverlässigkeit, Service und Zahlungsbedingungen","ok":1},{"t":"Nur der Nettopreis"},{"t":"Nur die Entfernung"},{"t":"Nur der Firmenname"}],"e":"Neben dem quantitativen Vergleich (Einstandspreise per Bezugskalkulation) berücksichtigt der qualitative Vergleich weiche Faktoren wie Qualität, Termintreue, Zuverlässigkeit, Service und Konditionen – häufig gewichtet in einer Nutzwertanalyse."},{"id":"B-MW-022","f":2,"sub":"Materialwirtschaft","t":"mc","q":"Welche Überlegung steht bei „Make or Buy“ (Eigenfertigung oder Fremdbezug) im Vordergrund?","o":[{"t":"Vergleich der relevanten Kosten sowie Qualität, Kapazität, Know-how und Abhängigkeit","ok":1},{"t":"Nur der Bekanntheitsgrad des Lieferanten"},{"t":"Ausschließlich die Farbe des Produkts"},{"t":"Nur die Rechtsform"}],"e":"Bei Make-or-Buy werden Eigenfertigungs- und Bezugskosten verglichen; hinzu kommen qualitative Faktoren wie freie Kapazität, Qualität, eigenes Know-how, Termintreue und die Abhängigkeit vom Lieferanten."},{"id":"B-MW-023","f":2,"sub":"Materialwirtschaft","t":"mc","q":"Wie werden Werkstoffe unterschieden, die als Hauptbestandteil in das Erzeugnis eingehen?","o":[{"t":"Als Rohstoffe","ok":1},{"t":"Als Hilfsstoffe"},{"t":"Als Betriebsstoffe"},{"t":"Als Handelswaren"}],"e":"Rohstoffe bilden den Hauptbestandteil des Erzeugnisses. Hilfsstoffe gehen als Nebenbestandteil ein (z. B. Schrauben, Leim). Betriebsstoffe werden bei der Produktion verbraucht, ohne ins Produkt einzugehen (z. B. Kraftstoff, Schmieröl)."},{"id":"B-MW-024","f":2,"sub":"Materialwirtschaft","t":"mc","q":"Wozu zählen Kraftstoff und Schmieröl für einen Fuhrpark materialwirtschaftlich?","o":[{"t":"Zu den Betriebsstoffen","ok":1},{"t":"Zu den Rohstoffen"},{"t":"Zu den Hilfsstoffen"},{"t":"Zu den Fertigteilen"}],"e":"Kraftstoffe, Schmier- und Reinigungsmittel sind Betriebsstoffe: Sie werden für den Betrieb der Betriebsmittel (hier der Fahrzeuge) verbraucht, gehen aber nicht in ein Erzeugnis ein."},{"id":"B-MW-025","f":2,"sub":"Materialwirtschaft","t":"mc","q":"Welche Funktion erfüllt ein Lager u. a.?","o":[{"t":"Ausgleichs-/Überbrückungsfunktion zwischen Beschaffung/Produktion und Absatz","ok":1},{"t":"Es erhöht bewusst die Durchlaufzeit"},{"t":"Es ersetzt die Buchhaltung"},{"t":"Es dient nur der Zierde"}],"e":"Lagerfunktionen sind u. a. Überbrückung/Ausgleich zeitlicher Differenzen zwischen Beschaffung und Verbrauch, Sicherung der Lieferfähigkeit, Umform-/Veredelungsfunktion (z. B. Reifung) und Spekulationsfunktion (Vorratskauf bei erwarteten Preissteigerungen)."},{"id":"B-MW-026","f":2,"sub":"Materialwirtschaft","t":"mc","q":"Welche Teilbereiche werden in der Logistik typischerweise unterschieden?","o":[{"t":"Beschaffungs-, Produktions-, Distributions- und Entsorgungslogistik","ok":1},{"t":"Einkaufs-, Verkaufs- und Steuerlogistik"},{"t":"Nur die Transportlogistik"},{"t":"Finanz-, Personal- und Rechtslogistik"}],"e":"Entlang der Wertschöpfung gliedert sich die Logistik in Beschaffungs-, Produktions-, Distributions-(Absatz-) und Entsorgungslogistik. Sie steuert die Material-, Waren- und Informationsflüsse."},{"id":"B-MW-027","f":2,"sub":"Materialwirtschaft","t":"mc","q":"Was versteht man unter Kommissionierung?","o":[{"t":"Das auftragsbezogene Zusammenstellen von Artikeln aus dem Lagerbestand","ok":1},{"t":"Die Bezahlung einer Provision"},{"t":"Die Wahl des Aufsichtsrats"},{"t":"Die Preisverhandlung mit Lieferanten"}],"e":"Beim Kommissionieren werden aus dem Gesamtsortiment die für einen konkreten Auftrag benötigten Artikel und Mengen zusammengestellt – ein zentraler Vorgang in Lager und Distribution."},{"id":"B-MW-028","f":2,"sub":"Materialwirtschaft","t":"open","q":"Erläutern Sie den Zielkonflikt, der bei der Bestimmung der optimalen Bestellmenge zu lösen ist.","a":"Bei der optimalen Bestellmenge stehen zwei gegenläufige Kostenarten im Konflikt. Auf der einen Seite stehen die bestellfixen Kosten (Bestellkosten): Sie fallen je Bestellvorgang an (z. B. Verwaltung, Angebotseinholung, Wareneingang). Bestellt man große Mengen, sind seltener Bestellungen nötig, sodass die Bestellkosten je Stück sinken. Auf der anderen Seite stehen die Lagerhaltungskosten (z. B. Kapitalbindung, Lagerraum, Versicherung, Schwund): Sie steigen mit der Bestellmenge, weil größere Mengen länger und in größerem Umfang gelagert werden müssen. Die optimale Bestellmenge liegt dort, wo die Summe aus Bestell- und Lagerhaltungskosten am geringsten ist (Minimum der Gesamtkosten). Rechnerisch wird sie mit der Andler-Formel ermittelt.","e":"Große Menge = wenig Bestellkosten, aber viel Lagerkosten; kleine Menge = umgekehrt. Optimal ist das Kostenminimum der Summe beider."},{"id":"B-MW-029","f":2,"sub":"Materialwirtschaft","t":"open","q":"Nennen und erläutern Sie die drei Bereitstellungsprinzipien (Beschaffungsarten) der Materialwirtschaft mit je einem Vor- und Nachteil.","a":"1) Vorratsbeschaffung: Material wird auf Vorrat beschafft und gelagert. Vorteil: hohe Lieferbereitschaft und Unabhängigkeit von Lieferschwankungen; Nachteil: hohe Lagerkosten und Kapitalbindung. 2) Fertigungssynchrone Beschaffung (Just-in-Time): Material wird genau dann angeliefert, wenn es benötigt wird. Vorteil: geringe Lagerbestände und Kapitalbindung; Nachteil: hohe Abhängigkeit von zuverlässigen Lieferanten – bei Störungen droht Produktionsstillstand. 3) Einzelbeschaffung im Bedarfsfall: Material wird erst bei konkretem Auftrag beschafft. Vorteil: minimale Lagerhaltung, kein Absatzrisiko; Nachteil: lange Beschaffungszeiten und geringe kurzfristige Lieferfähigkeit. Die Wahl hängt u. a. vom Wert, der Verbrauchsregelmäßigkeit (ABC/XYZ) und der Lieferzuverlässigkeit ab.","e":"Faustregel: hochwertige, gut planbare A-/X-Güter eignen sich für JIT; geringwertige C-Güter oft für Vorratsbeschaffung."},{"id":"B-MW-030","f":2,"sub":"Materialwirtschaft","t":"open","q":"Eine Spedition hat einen Jahresverbrauch an Reifen im Wert von 480.000 € und einen durchschnittlichen Lagerbestand von 40.000 €. Berechnen Sie die Umschlagshäufigkeit und die durchschnittliche Lagerdauer (360 Tage) und erläutern Sie die Aussagekraft.","a":"Umschlagshäufigkeit = Verbrauch ÷ durchschnittlicher Lagerbestand = 480.000 € ÷ 40.000 € = 12. Durchschnittliche Lagerdauer = 360 ÷ Umschlagshäufigkeit = 360 ÷ 12 = 30 Tage. Aussage: Der Lagerbestand wird zwölfmal im Jahr umgeschlagen und liegt im Durchschnitt 30 Tage im Lager. Eine hohe Umschlagshäufigkeit (kurze Lagerdauer) bedeutet geringe Kapitalbindung und niedrige Lagerkosten. Sinkt die Umschlagshäufigkeit, steigt die Kapitalbindung – dann sollte man Bestände und Bestellmengen überprüfen.","e":"Umschlagshäufigkeit und Lagerdauer sind zentrale Kennzahlen der Lagerwirtschaft: Je höher der Umschlag, desto effizienter das Lager."},{"id":"B-KR-001","f":2,"sub":"Kostenrechnung","t":"mc","q":"Wie sind Kosten definiert?","o":[{"t":"Bewerteter, betriebsbedingter (sachzielbezogener) Güterverzehr einer Periode","ok":1},{"t":"Jeder Abfluss von Zahlungsmitteln"},{"t":"Der gesamte Aufwand der GuV"},{"t":"Der Gewinn eines Zeitraums"}],"e":"Kosten sind der bewertete, leistungsbezogene (betriebsbedingte) Verzehr von Gütern und Diensten in einer Periode. Nicht jeder Aufwand ist Kosten (neutraler Aufwand) und nicht jede Kostenart hat gleich hohen Aufwand (kalkulatorische Kosten)."},{"id":"B-KR-002","f":2,"sub":"Kostenrechnung","t":"mc","q":"Was versteht man unter einer Auszahlung?","o":[{"t":"Den Abfluss liquider Mittel (Bar- und Buchgeld)","ok":1},{"t":"Den betriebsbedingten Güterverzehr"},{"t":"Den Wert aller zugegangenen Güter"},{"t":"Den Periodenerfolg"}],"e":"Die Auszahlung mindert den Bestand an Zahlungsmitteln. Davon zu unterscheiden sind Ausgabe (Wert der beschafften Güter), Aufwand (periodisierter Werteverzehr, GuV) und Kosten (betriebsbedingter Verzehr)."},{"id":"B-KR-003","f":2,"sub":"Kostenrechnung","t":"mc","q":"Was ist neutraler Aufwand?","o":[{"t":"Aufwand, der nicht dem eigentlichen Betriebszweck dient (betriebsfremd, periodenfremd oder außerordentlich)","ok":1},{"t":"Aufwand, der zugleich Kosten ist"},{"t":"Kalkulatorische Kosten"},{"t":"Der gesamte Materialverbrauch"}],"e":"Neutraler Aufwand entsteht z. B. betriebsfremd (Spende), periodenfremd (Steuernachzahlung für Vorjahre) oder außerordentlich (Verkauf unter Buchwert). Er ist Aufwand, aber keine Kosten."},{"id":"B-KR-004","f":2,"sub":"Kostenrechnung","t":"mc","q":"Was sind Grundkosten (Zweckaufwand)?","o":[{"t":"Kosten, denen Aufwand in gleicher Höhe gegenübersteht","ok":1},{"t":"Kosten ohne jeglichen Aufwand"},{"t":"Neutraler Aufwand"},{"t":"Nur kalkulatorische Kosten"}],"e":"Grundkosten sind der Teil der Kosten, dem betrieblicher Zweckaufwand in gleicher Höhe entspricht (z. B. Materialverbrauch, Löhne). Ihnen stehen die kalkulatorischen Kosten gegenüber."},{"id":"B-KR-005","f":2,"sub":"Kostenrechnung","t":"mc","q":"Welche Kostenart ist ein Beispiel für kalkulatorische Kosten?","o":[{"t":"Kalkulatorischer Unternehmerlohn","ok":1},{"t":"Fertigungsmaterial"},{"t":"Akkordlöhne"},{"t":"Eingangsfracht eines Auftrags"}],"e":"Kalkulatorische Kosten (Unternehmerlohn, Zinsen, Miete, Abschreibungen, Wagnisse) sichern eine verursachungsgerechte Kalkulation unabhängig vom handels-/steuerrechtlichen Aufwand."},{"id":"B-KR-006","f":2,"sub":"Kostenrechnung","t":"mc","q":"Worin unterscheiden sich Zusatzkosten und Anderskosten?","o":[{"t":"Zusatzkosten stehen kein Aufwand gegenüber; Anderskosten steht Aufwand in anderer Höhe gegenüber","ok":1},{"t":"Beide sind identisch"},{"t":"Zusatzkosten sind immer höher"},{"t":"Anderskosten kommen nie vor"}],"e":"Zusatzkosten (z. B. kalk. Unternehmerlohn, kalk. Eigenkapitalzinsen) haben keinen Aufwand als Gegenstück. Anderskosten (z. B. kalk. Abschreibung, kalk. Miete) treten an die Stelle eines Aufwands in abweichender Höhe."},{"id":"B-KR-007","f":2,"sub":"Kostenrechnung","t":"mc","q":"Warum wird ein kalkulatorischer Unternehmerlohn angesetzt?","o":[{"t":"Um die Arbeitsleistung des mitarbeitenden Einzelunternehmers/Personengesellschafters kalkulatorisch zu erfassen","ok":1},{"t":"Weil er als Aufwand in der GuV steht"},{"t":"Um Steuern zu sparen"},{"t":"Er ist gesetzlich als Gehalt vorgeschrieben"}],"e":"Der Einzelunternehmer erhält kein Gehalt (kein Aufwand), leistet aber Arbeit. Damit die Selbstkosten vergleichbar sind, wird ein kalkulatorischer Unternehmerlohn in Höhe eines angemessenen Geschäftsführergehalts angesetzt."},{"id":"B-KR-008","f":2,"sub":"Kostenrechnung","t":"mc","q":"Was ist Leistung im Sinne der Kosten- und Leistungsrechnung?","o":[{"t":"Das bewertete Ergebnis der betrieblichen Leistungserstellung einer Periode","ok":1},{"t":"Jeder Zahlungseingang"},{"t":"Der gesamte Ertrag der GuV"},{"t":"Der Gewinn"}],"e":"Leistung ist das betriebsbedingte, bewertete Ergebnis der Leistungserstellung (Gegenstück zu den Kosten). Neutraler Ertrag (z. B. Zinserträge, Anlagenverkauf) ist Ertrag, aber keine Leistung."},{"id":"B-KR-009","f":2,"sub":"Kostenrechnung","t":"mc","q":"Wie ergibt sich das Betriebsergebnis in der Kostenrechnung?","o":[{"t":"Leistung (Erlöse) − Kosten","ok":1},{"t":"Ertrag − Aufwand der GuV"},{"t":"Einzahlungen − Auszahlungen"},{"t":"Umsatz − Steuern"}],"e":"Betriebsergebnis = betriebliche Leistung − Kosten. Das Unternehmensergebnis (GuV) berücksichtigt dagegen auch neutrale Erträge und Aufwendungen."},{"id":"B-KR-010","f":2,"sub":"Kostenrechnung","t":"mc","q":"Welche drei Stufen bauen aufeinander auf?","o":[{"t":"Kostenartenrechnung (welche Kosten?) → Kostenstellenrechnung (wo?) → Kostenträgerrechnung (wofür?)","ok":1},{"t":"Bilanz → GuV → Anhang"},{"t":"Beschaffung → Produktion → Absatz"},{"t":"Plan → Ist → Soll"}],"e":"Die Kostenrechnung gliedert sich in Kostenartenrechnung (welche Kosten fallen an – Einzel-/Gemeinkosten), Kostenstellenrechnung (wo entstehen sie – meist im BAB) und Kostenträgerrechnung (wofür – Kalkulation)."},{"id":"B-KR-011","f":2,"sub":"Kostenrechnung","t":"mc","q":"Wie unterscheiden sich Einzel- und Gemeinkosten?","o":[{"t":"Einzelkosten sind einem Kostenträger direkt zurechenbar, Gemeinkosten nur über Schlüssel/Zuschläge","ok":1},{"t":"Einzelkosten sind immer fix"},{"t":"Gemeinkosten fallen nur in der Verwaltung an"},{"t":"Es gibt keinen Unterschied"}],"e":"Einzelkosten (z. B. Fertigungsmaterial, Fertigungslöhne) lassen sich dem Erzeugnis direkt zuordnen. Gemeinkosten (z. B. Miete, Meistergehalt, Energie) betreffen mehrere Träger und werden über Zuschlagssätze verteilt."},{"id":"B-KR-012","f":2,"sub":"Kostenrechnung","t":"mc","q":"Welche Aussage zu fixen Kosten trifft zu?","o":[{"t":"Sie sind beschäftigungsunabhängig; je Stück sinken sie mit steigender Menge (Fixkostendegression)","ok":1},{"t":"Sie steigen proportional mit der Menge"},{"t":"Sie sind je Stück konstant"},{"t":"Sie entstehen nur in der Fertigung"}],"e":"Fixkosten (Miete, Gehälter, Abschreibungen) fallen unabhängig von der Ausbringung an. Bei steigender Menge verteilen sie sich auf mehr Stücke – die Fixkosten je Stück sinken (Degression)."},{"id":"B-KR-013","f":2,"sub":"Kostenrechnung","t":"mc","q":"Wie verhalten sich variable Stückkosten bei proportionalem Kostenverlauf?","o":[{"t":"Sie bleiben je Stück konstant; die gesamten variablen Kosten steigen mit der Menge","ok":1},{"t":"Sie steigen je Stück"},{"t":"Sie sind immer null"},{"t":"Sie sinken je Stück"}],"e":"Bei proportionalen (linearen) variablen Kosten sind die variablen Kosten je Stück konstant; die Gesamtkosten steigen linear mit der Ausbringungsmenge."},{"id":"B-KR-014","f":2,"sub":"Kostenrechnung","t":"mc","q":"Die Fixkosten betragen 120.000 €. Wie hoch sind die Fixkosten je Stück bei 4.000 Stück?","o":[{"t":"30 €","ok":1},{"t":"60 €"},{"t":"40 €"},{"t":"120 €"}],"e":"Fixkosten je Stück = Fixkosten ÷ Menge = 120.000 € ÷ 4.000 = 30 €. Bei 2.000 Stück wären es 60 € – die Degression zeigt sich in sinkenden Stückfixkosten."},{"id":"B-KR-015","f":2,"sub":"Kostenrechnung","t":"mc","q":"Fixkosten 50.000 €, variable Stückkosten 20 €, Menge 3.000 Stück. Wie hoch sind die Gesamtkosten?","o":[{"t":"110.000 €","ok":1},{"t":"70.000 €"},{"t":"60.000 €"},{"t":"150.000 €"}],"e":"Gesamtkosten = Fixkosten + (variable Stückkosten × Menge) = 50.000 + (20 × 3.000) = 50.000 + 60.000 = 110.000 €."},{"id":"B-KR-016","f":2,"sub":"Kostenrechnung","t":"mc","q":"Wozu dient der Betriebsabrechnungsbogen (BAB)?","o":[{"t":"Zur Verteilung der Gemeinkosten auf die Kostenstellen und zur Ermittlung der Gemeinkostenzuschlagssätze","ok":1},{"t":"Zur Berechnung der Lohnsteuer"},{"t":"Zur Erstellung der Bilanz"},{"t":"Zur Personalplanung"}],"e":"Im BAB werden die Gemeinkosten den Kostenstellen (z. B. Material, Fertigung, Verwaltung, Vertrieb) zugeordnet. Daraus ergeben sich die Zuschlagssätze für die Kalkulation."},{"id":"B-KR-017","f":2,"sub":"Kostenrechnung","t":"mc","q":"Welche Funktion hat die Kostenstellenrechnung im Gefüge der Kostenrechnung?","o":[{"t":"Sie ist das Bindeglied zwischen Kostenarten- und Kostenträgerrechnung","ok":1},{"t":"Sie ersetzt die Bilanz"},{"t":"Sie berechnet nur den Gewinn"},{"t":"Sie hat keine Verbindung zu den anderen Stufen"}],"e":"Die Kostenstellenrechnung verteilt die Gemeinkosten verursachungsgerecht auf die Stellen und liefert die Zuschlagssätze – damit verbindet sie die Kostenarten- mit der Kostenträgerrechnung."},{"id":"B-KR-018","f":2,"sub":"Kostenrechnung","t":"mc","q":"Wie berechnet man einen Gemeinkostenzuschlagssatz?","o":[{"t":"Gemeinkosten ÷ Zuschlagsbasis (Einzelkosten) × 100","ok":1},{"t":"Einzelkosten ÷ Gemeinkosten × 100"},{"t":"Gemeinkosten × Menge"},{"t":"Umsatz ÷ Gewinn"}],"e":"Zuschlagssatz (%) = Gemeinkosten ÷ Zuschlagsbasis × 100. Basis der Materialgemeinkosten sind die Materialeinzelkosten, der Fertigungsgemeinkosten die Fertigungseinzelkosten (Löhne)."},{"id":"B-KR-019","f":2,"sub":"Kostenrechnung","t":"mc","q":"Die Materialgemeinkosten betragen 30.000 €, die Materialeinzelkosten 150.000 €. Wie hoch ist der Materialgemeinkostenzuschlagssatz?","o":[{"t":"20 %","ok":1},{"t":"5 %"},{"t":"25 %"},{"t":"50 %"}],"e":"MGK-Zuschlag = MGK ÷ MEK × 100 = 30.000 ÷ 150.000 × 100 = 20 %. Auf jeden Euro Materialeinzelkosten entfallen 20 Cent Materialgemeinkosten."},{"id":"B-KR-020","f":2,"sub":"Kostenrechnung","t":"mc","q":"Die Fertigungsgemeinkosten betragen 240.000 €, die Fertigungslöhne (FEK) 120.000 €. Wie hoch ist der Fertigungsgemeinkostenzuschlag?","o":[{"t":"200 %","ok":1},{"t":"50 %"},{"t":"20 %"},{"t":"120 %"}],"e":"FGK-Zuschlag = FGK ÷ FEK × 100 = 240.000 ÷ 120.000 × 100 = 200 %. Zuschlagssätze über 100 % sind bei kapitalintensiver Fertigung üblich."},{"id":"B-KR-021","f":2,"sub":"Kostenrechnung","t":"mc","q":"Was sind Hilfskostenstellen?","o":[{"t":"Kostenstellen, die keine direkte Leistung am Kostenträger erbringen, sondern andere Kostenstellen unterstützen (z. B. innerbetrieblicher Transport, Reparatur)","ok":1},{"t":"Kostenstellen, die direkt am Produkt arbeiten"},{"t":"Nur die Verwaltung"},{"t":"Kostenstellen ohne Kosten"}],"e":"Hilfskostenstellen erbringen innerbetriebliche Leistungen für andere Stellen. Ihre Kosten werden im Rahmen der innerbetrieblichen Leistungsverrechnung auf die Hauptkostenstellen umgelegt."},{"id":"B-KR-022","f":2,"sub":"Kostenrechnung","t":"mc","q":"In welcher Reihenfolge verläuft die Zuschlagskalkulation?","o":[{"t":"Material- + Fertigungskosten = Herstellkosten → + Verwaltung/Vertrieb = Selbstkosten → + Gewinn = Barverkaufspreis","ok":1},{"t":"Selbstkosten → Herstellkosten → Verkaufspreis"},{"t":"Verkaufspreis → Gewinn → Selbstkosten"},{"t":"Gewinn → Material → Fertigung"}],"e":"MEK + MGK = Materialkosten; FEK + FGK = Fertigungskosten; beide ergeben die Herstellkosten. Plus Verwaltungs- und Vertriebsgemeinkosten die Selbstkosten; plus Gewinnzuschlag den Barverkaufspreis."},{"id":"B-KR-023","f":2,"sub":"Kostenrechnung","t":"mc","q":"Woraus setzen sich die Herstellkosten zusammen?","o":[{"t":"Aus Materialkosten (MEK + MGK) und Fertigungskosten (FEK + FGK)","ok":1},{"t":"Aus Selbstkosten plus Gewinn"},{"t":"Aus Verwaltungs- und Vertriebskosten"},{"t":"Nur aus dem Fertigungsmaterial"}],"e":"Herstellkosten = Materialkosten + Fertigungskosten. Sie sind Grundlage für die Bewertung von Halb-/Fertigerzeugnissen und für die weitere Kalkulation bis zu den Selbstkosten."},{"id":"B-KR-024","f":2,"sub":"Kostenrechnung","t":"mc","q":"MEK 400 €, MGK-Zuschlag 10 %, FEK 200 €, FGK-Zuschlag 200 %. Wie hoch sind die Herstellkosten?","o":[{"t":"1.040 €","ok":1},{"t":"840 €"},{"t":"1.200 €"},{"t":"640 €"}],"e":"Material: 400 + 10 % = 440 €. Fertigung: 200 + 200 % = 200 + 400 = 600 €. Herstellkosten = 440 + 600 = 1.040 €."},{"id":"B-KR-025","f":2,"sub":"Kostenrechnung","t":"mc","q":"Die Herstellkosten betragen 1.000 €. Verwaltungsgemeinkosten 10 %, Vertriebsgemeinkosten 5 %. Wie hoch sind die Selbstkosten?","o":[{"t":"1.150 €","ok":1},{"t":"1.100 €"},{"t":"1.050 €"},{"t":"1.500 €"}],"e":"Selbstkosten = Herstellkosten + VwGK + VtGK = 1.000 + 10 % (100) + 5 % (50) = 1.150 €. Verwaltungs- und Vertriebsgemeinkosten werden meist auf die Herstellkosten aufgeschlagen."},{"id":"B-KR-026","f":2,"sub":"Kostenrechnung","t":"mc","q":"Die Selbstkosten betragen 1.000 €, der Gewinnzuschlag 15 %. Wie hoch ist der Barverkaufspreis (netto)?","o":[{"t":"1.150 €","ok":1},{"t":"1.015 €"},{"t":"850 €"},{"t":"1.500 €"}],"e":"Barverkaufspreis = Selbstkosten × (1 + Gewinnzuschlag) = 1.000 € × 1,15 = 1.150 €. Auf die Selbstkosten wird der kalkulierte Gewinn aufgeschlagen."},{"id":"B-KR-027","f":2,"sub":"Kostenrechnung","t":"mc","q":"Was ergänzt die Zuschlagskalkulation gegenüber der Divisionskalkulation?","o":[{"t":"Sie eignet sich für Einzel-/Serienfertigung mit unterschiedlichen Erzeugnissen und verteilt Gemeinkosten über Zuschläge","ok":1},{"t":"Sie ist nur bei einem einzigen Produkt anwendbar"},{"t":"Sie verzichtet auf Gemeinkosten"},{"t":"Sie berechnet nur den Gewinn"}],"e":"Die Zuschlagskalkulation trennt Einzel- und Gemeinkosten und ist bei unterschiedlichen Erzeugnissen (Einzel-/Serienfertigung) geeignet. Die Divisionskalkulation passt für gleichartige Massenprodukte."},{"id":"B-KR-028","f":2,"sub":"Kostenrechnung","t":"mc","q":"Für welche Fertigungsart eignet sich die einfache Divisionskalkulation?","o":[{"t":"Für die Massenfertigung eines einzigen, gleichartigen Produkts","ok":1},{"t":"Für die Einzelfertigung sehr unterschiedlicher Produkte"},{"t":"Für die Sortenfertigung"},{"t":"Für Dienstleistungen mit Einzelkalkulation"}],"e":"Die Divisionskalkulation (Selbstkosten ÷ Menge = Stückkosten) setzt ein einheitliches Produkt voraus (z. B. Zement, Strom). Bei artverwandten Sorten nutzt man die Äquivalenzziffernkalkulation."},{"id":"B-KR-029","f":2,"sub":"Kostenrechnung","t":"mc","q":"Die gesamten Selbstkosten betragen 800.000 € bei einer Ausbringung von 10.000 Stück. Wie hoch sind die Stückselbstkosten (Divisionskalkulation)?","o":[{"t":"80 €","ok":1},{"t":"8 €"},{"t":"800 €"},{"t":"125 €"}],"e":"Stückkosten = Gesamtkosten ÷ Menge = 800.000 € ÷ 10.000 = 80 € je Stück."},{"id":"B-KR-030","f":2,"sub":"Kostenrechnung","t":"mc","q":"Für welche Fertigung ist die Äquivalenzziffernkalkulation typisch?","o":[{"t":"Für die Sortenfertigung artverwandter Produkte, die sich in einem Kostenverhältnis ausdrücken lassen","ok":1},{"t":"Für völlig unterschiedliche Einzelprodukte"},{"t":"Für ein einziges Massenprodukt"},{"t":"Für reine Handelsware"}],"e":"Bei der Sortenfertigung (z. B. verschiedene Papierstärken, Biersorten) drücken Äquivalenzziffern das Kostenverhältnis der Sorten zu einer Einheitssorte aus; darüber werden die Gesamtkosten verteilt."},{"id":"B-KR-031","f":2,"sub":"Kostenrechnung","t":"mc","q":"Gesamtkosten 100.000 €. Sorte A: 1.000 Stück (ÄZ 1,0), Sorte B: 2.000 Stück (ÄZ 1,5), Sorte C: 500 Stück (ÄZ 2,0). Wie hoch sind die Stückkosten der Sorte B?","o":[{"t":"30 €","ok":1},{"t":"20 €"},{"t":"40 €"},{"t":"45 €"}],"e":"Rechnungseinheiten: A = 1.000×1,0 = 1.000; B = 2.000×1,5 = 3.000; C = 500×2,0 = 1.000; Summe = 5.000 RE. Kosten je RE = 100.000 ÷ 5.000 = 20 €. Stückkosten B = 20 € × 1,5 = 30 €."},{"id":"B-KR-032","f":2,"sub":"Kostenrechnung","t":"mc","q":"Wie berechnet sich der Maschinenstundensatz?","o":[{"t":"Maschinenabhängige Kosten ÷ Maschinenlaufzeit (Stunden)","ok":1},{"t":"Fertigungslöhne ÷ Maschinenzahl"},{"t":"Umsatz ÷ Maschinenlaufzeit"},{"t":"Gewinn ÷ Stunden"}],"e":"Maschinenstundensatz = maschinenabhängige Gemeinkosten (z. B. kalk. Abschreibung, Zinsen, Energie, Instandhaltung) ÷ Maschinenlaufzeit. Er verrechnet Fertigungsgemeinkosten verursachungsgerechter als ein pauschaler Lohnzuschlag."},{"id":"B-KR-033","f":2,"sub":"Kostenrechnung","t":"mc","q":"Die maschinenabhängigen Kosten betragen 60.000 €/Jahr, die Maschinenlaufzeit 1.500 Stunden. Wie hoch ist der Maschinenstundensatz?","o":[{"t":"40 €/Stunde","ok":1},{"t":"25 €/Stunde"},{"t":"4 €/Stunde"},{"t":"90 €/Stunde"}],"e":"Maschinenstundensatz = 60.000 € ÷ 1.500 h = 40 €/Stunde. Je Maschinenstunde werden also 40 € an maschinenabhängigen Kosten verrechnet."},{"id":"B-KR-034","f":2,"sub":"Kostenrechnung","t":"open","q":"Erläutern Sie den Unterschied zwischen Aufwand und Kosten und geben Sie je ein Beispiel für neutralen Aufwand und für kalkulatorische Kosten.","a":"Aufwand ist der gesamte, in der Gewinn- und Verlustrechnung erfasste periodisierte Werteverzehr eines Unternehmens. Kosten sind demgegenüber nur der bewertete, betriebsbedingte (leistungsbezogene) Güterverzehr einer Periode. Die beiden Größen decken sich nicht vollständig: Es gibt Aufwand, der keine Kosten ist – den neutralen Aufwand (z. B. eine Spende, eine periodenfremde Steuernachzahlung oder ein außerordentlicher Verlust aus dem Verkauf einer Anlage unter Buchwert). Und es gibt Kosten, denen kein oder ein anders hoher Aufwand gegenübersteht – die kalkulatorischen Kosten (z. B. kalkulatorischer Unternehmerlohn, kalkulatorische Zinsen auf das Eigenkapital, kalkulatorische Abschreibung, kalkulatorische Miete oder Wagnisse). Diese Abgrenzung sorgt dafür, dass die Kalkulation nur die betriebsbedingten Werteverzehre verursachungsgerecht abbildet.","e":"Merksatz: Zweckaufwand = Grundkosten (deckungsgleich); daneben gibt es neutralen Aufwand (Aufwand ohne Kosten) und kalkulatorische Kosten (Kosten ohne bzw. mit abweichendem Aufwand)."},{"id":"B-KR-035","f":2,"sub":"Kostenrechnung","t":"open","q":"Ein Erzeugnis verursacht Materialeinzelkosten von 500 €, der Materialgemeinkostenzuschlag beträgt 20 %, die Fertigungseinzelkosten betragen 300 € bei einem Fertigungsgemeinkostenzuschlag von 150 %. Ermitteln Sie die Herstellkosten. Berechnen Sie anschließend die Selbstkosten bei 10 % Verwaltungs- und 5 % Vertriebsgemeinkosten.","a":"Materialkosten = MEK + MGK = 500 € + 20 % von 500 € = 500 € + 100 € = 600 €. Fertigungskosten = FEK + FGK = 300 € + 150 % von 300 € = 300 € + 450 € = 750 €. Herstellkosten = Materialkosten + Fertigungskosten = 600 € + 750 € = 1.350 €. Selbstkosten = Herstellkosten + Verwaltungsgemeinkosten (10 % von 1.350 € = 135 €) + Vertriebsgemeinkosten (5 % von 1.350 € = 67,50 €) = 1.350 € + 135 € + 67,50 € = 1.552,50 €.","e":"Schema: MEK+MGK und FEK+FGK ergeben die Herstellkosten; plus VwGK und VtGK (auf die Herstellkosten) die Selbstkosten. Ein Gewinnzuschlag würde anschließend zum Barverkaufspreis führen."},{"id":"B-KR-036","f":2,"sub":"Kostenrechnung","t":"mc","q":"Worin unterscheiden sich Voll- und Teilkostenrechnung?","o":[{"t":"Die Vollkostenrechnung verteilt alle Kosten, die Teilkostenrechnung nur die variablen Kosten auf die Kostenträger","ok":1},{"t":"Die Teilkostenrechnung ignoriert die Erlöse"},{"t":"Die Vollkostenrechnung kennt keine Gemeinkosten"},{"t":"Es gibt keinen Unterschied"}],"e":"Die Vollkostenrechnung rechnet sämtliche Kosten (auch fixe) den Erzeugnissen zu. Die Teilkostenrechnung (Deckungsbeitragsrechnung) belastet die Träger nur mit variablen Kosten und behandelt die Fixkosten als Block."},{"id":"B-KR-037","f":2,"sub":"Kostenrechnung","t":"mc","q":"Welcher Nachteil wird der Vollkostenrechnung für kurzfristige Entscheidungen vorgeworfen?","o":[{"t":"Sie proportionalisiert die Fixkosten und kann so zu Fehlentscheidungen führen","ok":1},{"t":"Sie erfasst keine Einzelkosten"},{"t":"Sie ist zu einfach"},{"t":"Sie kennt keine Kostenstellen"}],"e":"Weil die Vollkostenrechnung auch fixe Kosten den Stücken zurechnet (als wären sie variabel), erscheinen bei sinkender Menge die Stückkosten höher. Für kurzfristige Entscheidungen (z. B. Zusatzauftrag) eignet sich die Teilkostenrechnung besser."},{"id":"B-KR-038","f":2,"sub":"Kostenrechnung","t":"mc","q":"Was ist der Deckungsbeitrag?","o":[{"t":"Erlös minus variable Kosten – der Beitrag zur Deckung der Fixkosten und zum Gewinn","ok":1},{"t":"Umsatz minus Steuern"},{"t":"Gewinn minus Fixkosten"},{"t":"Preis minus Gewinnzuschlag"}],"e":"Der Deckungsbeitrag deckt zunächst die Fixkosten; was darüber hinausgeht, ist Gewinn. Er ist Grundlage für Programm-, Preis- und Zusatzauftragsentscheidungen."},{"id":"B-KR-039","f":2,"sub":"Kostenrechnung","t":"mc","q":"Wie berechnet sich der Stück-Deckungsbeitrag?","o":[{"t":"Verkaufspreis − variable Stückkosten","ok":1},{"t":"Verkaufspreis − Fixkosten je Stück"},{"t":"Verkaufspreis − Selbstkosten"},{"t":"Fixkosten ÷ Menge"}],"e":"Stück-DB = Verkaufspreis je Stück − variable Kosten je Stück. Er gibt an, wie viel jedes verkaufte Stück zur Deckung der Fixkosten (und danach zum Gewinn) beiträgt."},{"id":"B-KR-040","f":2,"sub":"Kostenrechnung","t":"mc","q":"Verkaufspreis 200 €/Stück, variable Kosten 120 €/Stück. Wie hoch ist der Stück-Deckungsbeitrag?","o":[{"t":"80 €","ok":1},{"t":"320 €"},{"t":"120 €"},{"t":"40 €"}],"e":"Stück-DB = Preis − variable Stückkosten = 200 € − 120 € = 80 €. Jedes verkaufte Stück trägt 80 € zur Fixkostendeckung bei."},{"id":"B-KR-041","f":2,"sub":"Kostenrechnung","t":"mc","q":"Bei einem Stück-Deckungsbeitrag von 80 € und einer Absatzmenge von 5.000 Stück: Wie hoch ist der Gesamt-Deckungsbeitrag?","o":[{"t":"400.000 €","ok":1},{"t":"40.000 €"},{"t":"16.000 €"},{"t":"4.000.000 €"}],"e":"Gesamt-DB = Stück-DB × Menge = 80 € × 5.000 = 400.000 €. Von diesem Betrag sind die Fixkosten zu decken."},{"id":"B-KR-042","f":2,"sub":"Kostenrechnung","t":"mc","q":"Gesamt-Deckungsbeitrag 400.000 €, Fixkosten 300.000 €. Wie hoch ist das Betriebsergebnis?","o":[{"t":"100.000 € Gewinn","ok":1},{"t":"700.000 € Gewinn"},{"t":"100.000 € Verlust"},{"t":"300.000 € Gewinn"}],"e":"Betriebsergebnis = Gesamt-DB − Fixkosten = 400.000 € − 300.000 € = 100.000 € Gewinn. Übersteigt der Gesamt-DB die Fixkosten, entsteht Gewinn."},{"id":"B-KR-043","f":2,"sub":"Kostenrechnung","t":"mc","q":"Was bezeichnet die Gewinnschwelle (Break-even-Point)?","o":[{"t":"Die Menge, bei der der Gesamt-Deckungsbeitrag die Fixkosten genau deckt (Erlöse = Gesamtkosten)","ok":1},{"t":"Den höchsten möglichen Umsatz"},{"t":"Den Punkt maximaler Kapazität"},{"t":"Den niedrigsten Einkaufspreis"}],"e":"Am Break-even-Point (Nutzschwelle/Gewinnschwelle) sind Erlöse und Gesamtkosten gleich; das Betriebsergebnis ist null. Darüber beginnt die Gewinnzone, darunter die Verlustzone."},{"id":"B-KR-044","f":2,"sub":"Kostenrechnung","t":"mc","q":"Wie berechnet sich die Break-even-Menge?","o":[{"t":"Fixkosten ÷ Stück-Deckungsbeitrag","ok":1},{"t":"Fixkosten × Stück-Deckungsbeitrag"},{"t":"Umsatz ÷ Fixkosten"},{"t":"Variable Kosten ÷ Preis"}],"e":"Break-even-Menge = Fixkosten ÷ Stück-DB. Ab dieser Menge sind die Fixkosten gedeckt; jede weitere Einheit erhöht den Gewinn um den Stück-DB."},{"id":"B-KR-045","f":2,"sub":"Kostenrechnung","t":"mc","q":"Fixkosten 300.000 €, Stück-Deckungsbeitrag 80 €. Wie hoch ist die Break-even-Menge?","o":[{"t":"3.750 Stück","ok":1},{"t":"2.400 Stück"},{"t":"375 Stück"},{"t":"24.000.000 Stück"}],"e":"Break-even-Menge = Fixkosten ÷ Stück-DB = 300.000 € ÷ 80 € = 3.750 Stück. Erst ab der 3.750. Einheit erwirtschaftet der Betrieb Gewinn."},{"id":"B-KR-046","f":2,"sub":"Kostenrechnung","t":"mc","q":"Fixkosten 200.000 €, Verkaufspreis 100 €, variable Stückkosten 60 €. Wie hoch ist der Break-even-Umsatz?","o":[{"t":"500.000 €","ok":1},{"t":"200.000 €"},{"t":"333.333 €"},{"t":"800.000 €"}],"e":"Stück-DB = 100 − 60 = 40 €; DB-Faktor = DB ÷ Preis = 40 ÷ 100 = 0,4. Break-even-Umsatz = Fixkosten ÷ DB-Faktor = 200.000 ÷ 0,4 = 500.000 €. (Break-even-Menge = 200.000 ÷ 40 = 5.000 Stück × 100 € = 500.000 €.)"},{"id":"B-KR-047","f":2,"sub":"Kostenrechnung","t":"mc","q":"Wo liegt die kurzfristige Preisuntergrenze?","o":[{"t":"Bei den variablen Stückkosten (Deckung der variablen Kosten)","ok":1},{"t":"Bei den Selbstkosten (Vollkosten)"},{"t":"Beim Listenverkaufspreis"},{"t":"Bei null"}],"e":"Kurzfristig (bei freier Kapazität und zur Beschäftigungssicherung) liegt die Preisuntergrenze bei den variablen Kosten: Solange der Preis diese deckt, trägt der Auftrag noch zur Fixkostendeckung bei. Langfristig müssen die Vollkosten (Selbstkosten) gedeckt sein."},{"id":"B-KR-048","f":2,"sub":"Kostenrechnung","t":"mc","q":"Ein Zusatzauftrag wird zu 90 €/Stück angeboten; die variablen Stückkosten betragen 70 €, die Vollkosten 100 €. Es besteht freie Kapazität. Sollte der Auftrag angenommen werden?","o":[{"t":"Ja, denn der Preis (90 €) liegt über den variablen Kosten (70 €) – der Deckungsbeitrag ist positiv (20 €)","ok":1},{"t":"Nein, weil er unter den Vollkosten liegt"},{"t":"Nein, weil kein Gewinn entsteht"},{"t":"Das lässt sich nicht beurteilen"}],"e":"Bei freier Kapazität ist die kurzfristige Preisuntergrenze relevant (variable Kosten). Da 90 € > 70 €, liefert jeder Stück einen Deckungsbeitrag von 20 € und verbessert das Betriebsergebnis – der Auftrag sollte angenommen werden."},{"id":"B-KR-049","f":2,"sub":"Kostenrechnung","t":"mc","q":"Wonach werden Produkte bei einem Kapazitätsengpass in das Programm aufgenommen?","o":[{"t":"Nach dem höchsten Deckungsbeitrag je Engpasseinheit (relativer DB)","ok":1},{"t":"Nach dem höchsten Verkaufspreis"},{"t":"Nach dem niedrigsten Gewinn"},{"t":"Nach dem Alphabet"}],"e":"Bei einem Engpass (z. B. begrenzte Maschinenstunden) zählt nicht der absolute Stück-DB, sondern der Deckungsbeitrag je Einheit des Engpassfaktors. Das Produkt mit dem höchsten relativen DB wird bevorzugt gefertigt."},{"id":"B-KR-050","f":2,"sub":"Kostenrechnung","t":"mc","q":"Was versteht man unter Leerkosten?","o":[{"t":"Den Teil der Fixkosten, der auf nicht genutzte Kapazität entfällt (Unterbeschäftigung)","ok":1},{"t":"Variable Kosten bei Vollauslastung"},{"t":"Kosten ohne jede Ursache"},{"t":"Den Gewinn"}],"e":"Bei Unterbeschäftigung teilen sich die Fixkosten in Nutzkosten (auf die genutzte Kapazität) und Leerkosten (auf die ungenutzte Kapazität). Leerkosten sind unproduktiv und sollten durch bessere Auslastung verringert werden."},{"id":"B-KR-051","f":2,"sub":"Kostenrechnung","t":"mc","q":"Was ist ein Vorteil der mehrstufigen Deckungsbeitragsrechnung (Fixkostenschichtung)?","o":[{"t":"Die Fixkosten werden differenziert zugeordnet (z. B. Erzeugnis-, Gruppen-, Bereichs-, Unternehmensfixkosten)","ok":1},{"t":"Sie verzichtet ganz auf Fixkosten"},{"t":"Sie rechnet Fixkosten den Stücken zu"},{"t":"Sie ist mit der Vollkostenrechnung identisch"}],"e":"Die mehrstufige DB-Rechnung spaltet den Fixkostenblock in Schichten auf (Erzeugnis-, Erzeugnisgruppen-, Bereichs-, Unternehmensfixkosten). So lässt sich erkennen, welche Ebene noch positiv zum Ergebnis beiträgt."},{"id":"B-KR-052","f":2,"sub":"Kostenrechnung","t":"mc","q":"Warum eignet sich die Deckungsbeitragsrechnung gut für kurzfristige Entscheidungen?","o":[{"t":"Weil sie mit variablen (entscheidungsrelevanten) Kosten rechnet und die Fixkosten nicht proportionalisiert","ok":1},{"t":"Weil sie die Fixkosten auf die Stücke verteilt"},{"t":"Weil sie den Gewinn ignoriert"},{"t":"Weil sie keine Kosten berücksichtigt"}],"e":"Kurzfristig sind die Fixkosten meist nicht beeinflussbar (nicht entscheidungsrelevant). Die Deckungsbeitragsrechnung stellt die variablen Kosten in den Vordergrund und liefert damit die richtige Basis für Zusatzaufträge, Programm- und Preisentscheidungen."},{"id":"B-KR-053","f":2,"sub":"Kostenrechnung","t":"mc","q":"In welcher Reihenfolge verläuft die Handelskalkulation (Vorwärtskalkulation)?","o":[{"t":"Bezugs-(Einstands-)preis + Handlungskosten = Selbstkosten + Gewinn = Barverkaufspreis → (+ Skonto/Provision) Zielverkaufspreis → (+ Rabatt) Listenverkaufspreis","ok":1},{"t":"Listenverkaufspreis − Gewinn = Einstandspreis"},{"t":"Selbstkosten − Handlungskosten = Bezugspreis"},{"t":"Verkaufspreis + Rabatt = Barverkaufspreis"}],"e":"Handelskalkulation: Einstandspreis + Handlungskosten = Selbstkosten; + Gewinn = Barverkaufspreis; + Kundenskonto und Vertreterprovision = Zielverkaufspreis; + Kundenrabatt = Listenverkaufspreis (netto); + Umsatzsteuer = Bruttoverkaufspreis."},{"id":"B-KR-054","f":2,"sub":"Kostenrechnung","t":"mc","q":"Wie berechnet sich die Handelsspanne (in Prozent)?","o":[{"t":"(Verkaufspreis − Einstandspreis) ÷ Verkaufspreis × 100","ok":1},{"t":"(Verkaufspreis − Einstandspreis) ÷ Einstandspreis × 100"},{"t":"Einstandspreis ÷ Verkaufspreis × 100"},{"t":"Gewinn ÷ Umsatz × 100"}],"e":"Die Handelsspanne (Marge) bezieht die Differenz aus Verkaufs- und Einstandspreis auf den Verkaufspreis. Der Kalkulationszuschlag bezieht dieselbe Differenz dagegen auf den Einstandspreis."},{"id":"B-KR-055","f":2,"sub":"Kostenrechnung","t":"mc","q":"Einstandspreis 60 €, Verkaufspreis 100 €. Wie hoch ist die Handelsspanne?","o":[{"t":"40 %","ok":1},{"t":"66,7 %"},{"t":"60 %"},{"t":"140 %"}],"e":"Handelsspanne = (VKP − EKP) ÷ VKP × 100 = (100 − 60) ÷ 100 × 100 = 40 %. Bezogen auf den Verkaufspreis beträgt die Spanne 40 %."},{"id":"B-KR-056","f":2,"sub":"Kostenrechnung","t":"mc","q":"Einstandspreis 60 €, Verkaufspreis 100 €. Wie hoch ist der Kalkulationszuschlag?","o":[{"t":"66,7 %","ok":1},{"t":"40 %"},{"t":"60 %"},{"t":"166,7 %"}],"e":"Kalkulationszuschlag = (VKP − EKP) ÷ EKP × 100 = (100 − 60) ÷ 60 × 100 = 66,7 %. Er bezieht den Aufschlag auf den Einstandspreis (nicht auf den Verkaufspreis wie die Handelsspanne)."},{"id":"B-KR-057","f":2,"sub":"Kostenrechnung","t":"mc","q":"Einstandspreis 200 €, Handlungskostenzuschlag 25 %, Gewinnzuschlag 20 %. Wie hoch ist der Barverkaufspreis?","o":[{"t":"300 €","ok":1},{"t":"290 €"},{"t":"250 €"},{"t":"270 €"}],"e":"Selbstkosten = Einstandspreis + Handlungskosten = 200 € + 25 % (50 €) = 250 €. Barverkaufspreis = Selbstkosten + Gewinn = 250 € + 20 % (50 €) = 300 €."},{"id":"B-KR-058","f":2,"sub":"Kostenrechnung","t":"mc","q":"Was umfasst der Handlungskostenzuschlag im Handel?","o":[{"t":"Die eigenen Kosten des Handelsbetriebs (z. B. Personal, Miete, Lager) bezogen auf den Wareneinsatz","ok":1},{"t":"Nur den Gewinn"},{"t":"Nur die Umsatzsteuer"},{"t":"Den Einkaufspreis der Ware"}],"e":"Handlungskosten sind die Gemeinkosten des Handelsbetriebs (Personal, Raum, Lager, Verwaltung). Der Handlungskostenzuschlag = Handlungskosten ÷ Wareneinsatz × 100 wird auf den Einstandspreis aufgeschlagen, um die Selbstkosten zu ermitteln."},{"id":"B-KR-059","f":2,"sub":"Kostenrechnung","t":"mc","q":"Worin unterscheiden sich Vor- und Nachkalkulation?","o":[{"t":"Die Vorkalkulation ermittelt den Preis vor der Auftragsausführung, die Nachkalkulation prüft die tatsächlichen Kosten danach","ok":1},{"t":"Beide erfolgen nach der Ausführung"},{"t":"Die Nachkalkulation legt den Angebotspreis fest"},{"t":"Es gibt keinen Unterschied"}],"e":"Die Vorkalkulation dient der Angebots-/Preisermittlung vor Ausführung. Die Nachkalkulation vergleicht nach Abschluss die Ist-Kosten mit der Vorkalkulation und deckt Abweichungen (Kalkulationsdifferenzen) auf."},{"id":"B-KR-060","f":2,"sub":"Kostenrechnung","t":"open","q":"Ein Produkt wird für 150 € verkauft; die variablen Stückkosten betragen 90 €, die Fixkosten der Periode 240.000 €. Berechnen Sie den Stück-Deckungsbeitrag und die Break-even-Menge und erläutern Sie deren Bedeutung.","a":"Stück-Deckungsbeitrag = Verkaufspreis − variable Stückkosten = 150 € − 90 € = 60 €. Break-even-Menge = Fixkosten ÷ Stück-Deckungsbeitrag = 240.000 € ÷ 60 € = 4.000 Stück. Bedeutung: Jedes verkaufte Stück trägt 60 € zur Deckung der Fixkosten bei. Bei 4.000 Stück sind die Fixkosten vollständig gedeckt und das Betriebsergebnis ist null (Gewinnschwelle). Verkauft der Betrieb weniger, macht er Verlust; verkauft er mehr, erzielt er Gewinn – und zwar je zusätzlicher Einheit 60 €. Die Kennzahl zeigt also, welche Mindestmenge abgesetzt werden muss, um die Verlustzone zu verlassen.","e":"Break-even-Menge = Fixkosten ÷ Stück-DB. Ab dieser Menge beginnt die Gewinnzone; jede weitere Einheit steigert den Gewinn um den Stück-Deckungsbeitrag."},{"id":"B-KR-061","f":2,"sub":"Kostenrechnung","t":"open","q":"Erläutern Sie die kurzfristige und die langfristige Preisuntergrenze und wann welche relevant ist.","a":"Die kurzfristige Preisuntergrenze liegt bei den variablen Stückkosten. Solange der erzielbare Preis die variablen Kosten deckt, liefert jeder Auftrag noch einen positiven Deckungsbeitrag und hilft, die ohnehin anfallenden Fixkosten zu decken. Sie ist relevant, wenn freie Kapazitäten vorhanden sind, es um die Beschäftigungssicherung geht oder ein einmaliger Zusatzauftrag angenommen werden soll – auch wenn er die Vollkosten nicht deckt. Die langfristige Preisuntergrenze liegt bei den Selbstkosten (Vollkosten). Auf Dauer müssen alle Kosten – auch die fixen – über die Preise verdient werden, sonst gerät das Unternehmen in die Verlustzone und kann nicht bestehen. Sie ist maßgeblich für die dauerhafte Preispolitik und Angebotskalkulation.","e":"Merksatz: kurzfristig = variable Kosten (Deckungsbeitrag zählt), langfristig = Vollkosten (alle Kosten müssen gedeckt sein)."},{"id":"B-KR-062","f":2,"sub":"Kostenrechnung","t":"open","q":"Ein Großhändler kauft eine Ware zu einem Einstandspreis von 250 € ein. Der Handlungskostenzuschlag beträgt 20 %, der Gewinnzuschlag 15 %. Ermitteln Sie die Selbstkosten und den Barverkaufspreis.","a":"Selbstkosten = Einstandspreis + Handlungskosten = 250 € + 20 % von 250 € = 250 € + 50 € = 300 €. Barverkaufspreis = Selbstkosten + Gewinn = 300 € + 15 % von 300 € = 300 € + 45 € = 345 €. Der Barverkaufspreis (netto, vor Kundenskonto, Provision, Rabatt und Umsatzsteuer) beträgt somit 345 €.","e":"Schema der Handelskalkulation: Einstandspreis + Handlungskosten = Selbstkosten; + Gewinn = Barverkaufspreis; danach folgen ggf. Skonto/Provision (Zielverkaufspreis), Rabatt (Listenverkaufspreis) und Umsatzsteuer (Bruttoverkaufspreis)."},{"id":"B-RW-001","f":2,"sub":"Rechnungswesen","t":"mc","q":"Welche Hauptaufgaben hat das betriebliche Rechnungswesen?","o":[{"t":"Dokumentation, Information, Kontrolle und Grundlage für Dispositionen/Planung","ok":1},{"t":"Nur die Lohnzahlung"},{"t":"Ausschließlich die Werbung"},{"t":"Nur die Personalauswahl"}],"e":"Das Rechnungswesen erfasst und wertet Geschäftsvorfälle aus. Es dient der Dokumentation (Aufzeichnung), Information (interne/externe Adressaten), Kontrolle (Soll-Ist) und der Vorbereitung von Entscheidungen."},{"id":"B-RW-002","f":2,"sub":"Rechnungswesen","t":"mc","q":"Welche Bereiche gehören zum Rechnungswesen?","o":[{"t":"Finanzbuchhaltung (Bilanz/GuV), Kosten-/Leistungsrechnung, Statistik und Planungsrechnung","ok":1},{"t":"Nur die Bilanz"},{"t":"Einkauf, Produktion und Vertrieb"},{"t":"Nur die Steuererklärung"}],"e":"Das Rechnungswesen umfasst die (externe) Finanzbuchhaltung mit Jahresabschluss, die (interne) Kosten- und Leistungsrechnung, die Betriebsstatistik/Vergleichsrechnung sowie die Planungsrechnung."},{"id":"B-RW-003","f":2,"sub":"Rechnungswesen","t":"mc","q":"Was versteht man unter Inventur?","o":[{"t":"Die mengen- und wertmäßige Bestandsaufnahme aller Vermögensteile und Schulden zu einem Stichtag","ok":1},{"t":"Das Verzeichnis der Mitarbeiter"},{"t":"Die Bilanz in Kontoform"},{"t":"Die Gewinnermittlung"}],"e":"Die Inventur ist die tatsächliche Bestandsaufnahme (körperlich durch Zählen/Messen/Wiegen oder buchmäßig). Ihr Ergebnis wird im Inventar (ausführliches Verzeichnis) festgehalten."},{"id":"B-RW-004","f":2,"sub":"Rechnungswesen","t":"mc","q":"Was ist der Unterschied zwischen Inventar und Bilanz?","o":[{"t":"Das Inventar ist ein ausführliches Bestandsverzeichnis (Staffelform), die Bilanz eine verkürzte Gegenüberstellung (Kontoform) von Vermögen und Kapital","ok":1},{"t":"Beide sind identisch"},{"t":"Das Inventar zeigt nur den Gewinn"},{"t":"Die Bilanz ist ausführlicher als das Inventar"}],"e":"Das Inventar listet alle Vermögensgegenstände und Schulden detailliert auf. Die Bilanz fasst diese zu Gruppen zusammen und stellt Vermögen (Aktiva) und Kapital (Passiva) in Kontoform gegenüber."},{"id":"B-RW-005","f":2,"sub":"Rechnungswesen","t":"mc","q":"Was steht in einer Bilanz auf der Aktivseite?","o":[{"t":"Die Mittelverwendung: Anlage- und Umlaufvermögen","ok":1},{"t":"Das Eigen- und Fremdkapital"},{"t":"Nur die Schulden"},{"t":"Umsatz und Gewinn"}],"e":"Aktiva = Vermögen (Mittelverwendung): Anlagevermögen (langfristig) und Umlaufvermögen (kurzfristig). Passiva = Kapital/Mittelherkunft (Eigen- und Fremdkapital). Beide Seiten sind gleich hoch (Bilanzgleichung)."},{"id":"B-RW-006","f":2,"sub":"Rechnungswesen","t":"mc","q":"Was steht in einer Bilanz auf der Passivseite?","o":[{"t":"Die Mittelherkunft: Eigenkapital und Fremdkapital","ok":1},{"t":"Das Anlage- und Umlaufvermögen"},{"t":"Nur die Vorräte"},{"t":"Nur die Maschinen"}],"e":"Die Passivseite zeigt die Herkunft der Mittel: Eigenkapital (Einlagen, einbehaltene Gewinne) und Fremdkapital (Verbindlichkeiten, Rückstellungen). Sie erklärt, wie das Vermögen finanziert wurde."},{"id":"B-RW-007","f":2,"sub":"Rechnungswesen","t":"mc","q":"Worin unterscheiden sich Anlage- und Umlaufvermögen?","o":[{"t":"Anlagevermögen dient dem Betrieb dauerhaft, Umlaufvermögen ist zum kurzfristigen Verbrauch/Umsatz bestimmt","ok":1},{"t":"Beide sind identisch"},{"t":"Umlaufvermögen bleibt dauerhaft im Betrieb"},{"t":"Anlagevermögen wird sofort verbraucht"}],"e":"Anlagevermögen (z. B. Grundstücke, Fahrzeuge, Maschinen, Beteiligungen) dient dem Betrieb langfristig. Umlaufvermögen (z. B. Vorräte, Forderungen, Kasse/Bank) wird kurzfristig umgeschlagen."},{"id":"B-RW-008","f":2,"sub":"Rechnungswesen","t":"mc","q":"Was zeigt die Gewinn- und Verlustrechnung (GuV)?","o":[{"t":"Die Gegenüberstellung von Aufwendungen und Erträgen zur Ermittlung des Periodenerfolgs","ok":1},{"t":"Nur die Vermögensgegenstände"},{"t":"Nur die Zahlungseingänge"},{"t":"Die Bestände zum Stichtag"}],"e":"Die GuV stellt die Aufwendungen den Erträgen einer Periode gegenüber. Überwiegen die Erträge, entsteht ein Gewinn, sonst ein Verlust. Sie ergänzt die Bilanz um die Erfolgsrechnung."},{"id":"B-RW-009","f":2,"sub":"Rechnungswesen","t":"mc","q":"Wofür stehen die Grundsätze ordnungsmäßiger Buchführung (GoB)?","o":[{"t":"Für Regeln wie Klarheit, Wahrheit, Vollständigkeit, Einzelbewertung, Vorsicht und Stetigkeit","ok":1},{"t":"Für die Höhe des Gewinns"},{"t":"Für die Preisgestaltung"},{"t":"Für die Lohnabrechnung"}],"e":"Die GoB (teils kodifiziert im HGB) verlangen u. a. Klarheit und Übersichtlichkeit, Richtigkeit/Wahrheit, Vollständigkeit, Einzelbewertung, das Vorsichtsprinzip (Realisations- und Imparitätsprinzip) sowie Bilanzkontinuität/Stetigkeit."},{"id":"B-RW-010","f":2,"sub":"Rechnungswesen","t":"mc","q":"Was besagt das Vorsichtsprinzip (Imparitätsprinzip) der Bilanzierung?","o":[{"t":"Vorhersehbare Risiken/Verluste sind zu berücksichtigen, noch nicht realisierte Gewinne dagegen nicht","ok":1},{"t":"Gewinne sind stets sofort auszuweisen"},{"t":"Risiken werden ignoriert"},{"t":"Alle künftigen Chancen sind zu aktivieren"}],"e":"Das Vorsichtsprinzip schützt Gläubiger: Nach dem Realisationsprinzip werden Gewinne erst bei Realisierung erfasst, nach dem Imparitätsprinzip drohende Verluste aber bereits, sobald sie erkennbar sind."},{"id":"B-RW-011","f":2,"sub":"Rechnungswesen","t":"mc","q":"Welche Inventurverfahren werden u. a. unterschieden?","o":[{"t":"Stichtagsinventur, permanente Inventur und verlegte Inventur","ok":1},{"t":"Bar- und Zielinventur"},{"t":"Einkaufs- und Verkaufsinventur"},{"t":"Netto- und Bruttoinventur"}],"e":"Bei der Stichtagsinventur wird zum Bilanzstichtag gezählt; die permanente Inventur nutzt die laufende Lagerbuchführung; die verlegte Inventur erfolgt an einem anderen Tag innerhalb eines zulässigen Zeitraums mit Fortschreibung/Rückrechnung."},{"id":"B-RW-012","f":2,"sub":"Rechnungswesen","t":"mc","q":"Ab wann ist ein Einzelkaufmann nach § 241a HGB von der handelsrechtlichen Buchführungspflicht befreit? (Stand 2024/2025)","o":[{"t":"Wenn er an zwei aufeinanderfolgenden Stichtagen nicht mehr als 800.000 € Umsatz und 80.000 € Gewinn erzielt","ok":1},{"t":"Ab einem Umsatz von 1 €"},{"t":"Nie"},{"t":"Nur Kapitalgesellschaften sind befreit"}],"e":"§ 241a HGB (Werte seit 2024 angehoben): Einzelkaufleute, die die Grenzen von 800.000 € Umsatz und 80.000 € Jahresüberschuss nicht überschreiten, sind von der doppelten Buchführung und Bilanzierung befreit; eine Einnahmenüberschussrechnung genügt."},{"id":"B-RW-013","f":2,"sub":"Rechnungswesen","t":"mc","q":"Wie werden Finanzierungsarten nach der Herkunft der Mittel unterschieden?","o":[{"t":"Außenfinanzierung (von außen zugeführt) und Innenfinanzierung (aus dem Unternehmen selbst)","ok":1},{"t":"Bar- und Buchfinanzierung"},{"t":"Kurz- und Langfinanzierung nur"},{"t":"Import- und Exportfinanzierung"}],"e":"Nach der Mittelherkunft unterscheidet man Außenfinanzierung (Kapital von außen: Einlagen, Kredite) und Innenfinanzierung (Kapital aus dem Unternehmen: einbehaltene Gewinne, Abschreibungsgegenwerte). Nach der Rechtsstellung: Eigen- und Fremdfinanzierung."},{"id":"B-RW-014","f":2,"sub":"Rechnungswesen","t":"mc","q":"Was ist Selbstfinanzierung?","o":[{"t":"Innenfinanzierung durch Einbehaltung (Thesaurierung) erwirtschafteter Gewinne","ok":1},{"t":"Aufnahme eines Bankkredits"},{"t":"Ausgabe neuer Aktien"},{"t":"Verkauf von Anlagevermögen"}],"e":"Bei der Selbstfinanzierung werden Gewinne nicht ausgeschüttet, sondern im Unternehmen belassen. Das stärkt das Eigenkapital, ohne dass externe Geldgeber nötig sind (Form der Innen- und Eigenfinanzierung)."},{"id":"B-RW-015","f":2,"sub":"Rechnungswesen","t":"mc","q":"Welche Kapitalart liegt bei einem Bankdarlehen vor?","o":[{"t":"Fremdkapital (Außenfinanzierung)","ok":1},{"t":"Eigenkapital"},{"t":"Innenfinanzierung"},{"t":"Beteiligungskapital"}],"e":"Ein Darlehen wird von außen zugeführt und muss verzinst und zurückgezahlt werden – es ist Fremdkapital. Der Kreditgeber hat keine Mitsprache- oder Gewinnrechte wie ein Gesellschafter."},{"id":"B-RW-016","f":2,"sub":"Rechnungswesen","t":"mc","q":"Welche der folgenden ist eine Kreditsicherheit?","o":[{"t":"Die Bürgschaft","ok":1},{"t":"Der Umsatz"},{"t":"Die Abschreibung"},{"t":"Der Deckungsbeitrag"}],"e":"Kreditsicherheiten sichern den Rückzahlungsanspruch. Personensicherheiten sind z. B. Bürgschaft; Sachsicherheiten z. B. Sicherungsübereignung, Grundschuld/Hypothek, Pfandrecht und Eigentumsvorbehalt."},{"id":"B-RW-017","f":2,"sub":"Rechnungswesen","t":"mc","q":"Warum gilt das Ausnutzen eines Lieferantenkredits (Verzicht auf Skonto) meist als teuer?","o":[{"t":"Weil der auf das Jahr hochgerechnete Skontosatz einen sehr hohen effektiven Zinssatz ergibt","ok":1},{"t":"Weil keine Zinsen anfallen"},{"t":"Weil er zinslos ist"},{"t":"Weil der Lieferant zahlt"}],"e":"Verzichtet man auf z. B. 2 % Skonto, um erst nach längerer Frist zu zahlen, entspricht das – auf ein Jahr hochgerechnet – oft einem effektiven Jahreszins von deutlich über 20 %. Die Skontonutzung (ggf. über Kontokorrentkredit) ist daher meist günstiger."},{"id":"B-RW-018","f":2,"sub":"Rechnungswesen","t":"mc","q":"Was ist Leasing?","o":[{"t":"Die entgeltliche Nutzungsüberlassung von Anlagegütern über einen bestimmten Zeitraum (ohne Eigentumserwerb)","ok":1},{"t":"Der endgültige Kauf einer Maschine"},{"t":"Der Verkauf von Forderungen"},{"t":"Eine Form der Abschreibung"}],"e":"Beim Leasing überlässt der Leasinggeber ein Gut gegen Raten zur Nutzung; der Leasingnehmer wird i. d. R. nicht Eigentümer. Vorteil: Liquiditätsschonung, planbare Raten; Nachteil: in der Summe oft teurer als Kauf."},{"id":"B-RW-019","f":2,"sub":"Rechnungswesen","t":"mc","q":"Was versteht man unter Factoring?","o":[{"t":"Den Verkauf von Forderungen an einen Finanzdienstleister (Factor) zur sofortigen Liquidität","ok":1},{"t":"Die Aufnahme eines Darlehens"},{"t":"Die Ausgabe von Aktien"},{"t":"Die Rückstellung für Risiken"}],"e":"Beim Factoring verkauft ein Unternehmen seine Forderungen an einen Factor und erhält sofort Liquidität. Je nach Vertrag übernimmt der Factor auch das Ausfallrisiko (echtes Factoring) und das Debitorenmanagement."},{"id":"B-RW-020","f":2,"sub":"Rechnungswesen","t":"mc","q":"Was besagt die goldene Finanzierungsregel (Fristenkongruenz)?","o":[{"t":"Langfristig gebundenes Vermögen soll langfristig, kurzfristig gebundenes kurzfristig finanziert werden","ok":1},{"t":"Alles ist kurzfristig zu finanzieren"},{"t":"Eigenkapital ist überflüssig"},{"t":"Fremdkapital darf nie genutzt werden"}],"e":"Nach der goldenen Finanzierungsregel soll die Kapitalbindungsdauer der Vermögensbindungsdauer entsprechen: Anlagevermögen langfristig, Umlaufvermögen kurzfristig finanzieren – so wird die Zahlungsfähigkeit gesichert."},{"id":"B-RW-021","f":2,"sub":"Rechnungswesen","t":"mc","q":"Welche Verfahren zählen zu den statischen Investitionsrechnungen?","o":[{"t":"Kostenvergleichs-, Gewinnvergleichs-, Rentabilitätsvergleichs- und Amortisationsrechnung","ok":1},{"t":"Kapitalwert- und interne Zinsfußmethode"},{"t":"Bilanz und GuV"},{"t":"ABC- und XYZ-Analyse"}],"e":"Statische Verfahren (ohne Zinseszins, meist einperiodig) sind Kostenvergleich, Gewinnvergleich, Rentabilitätsvergleich und Amortisationsrechnung. Dynamische Verfahren (mit Zeitwert des Geldes) sind Kapitalwert, interner Zinsfuß und Annuität."},{"id":"B-RW-022","f":2,"sub":"Rechnungswesen","t":"mc","q":"Was ermittelt die Amortisationsrechnung (Pay-off-Methode)?","o":[{"t":"Den Zeitraum, in dem das eingesetzte Kapital über die Rückflüsse zurückfließt","ok":1},{"t":"Den Gewinn je Stück"},{"t":"Die Umschlagshäufigkeit"},{"t":"Den Verkaufspreis"}],"e":"Die Amortisationsrechnung bestimmt die Wiedergewinnungszeit: Amortisationszeit = Anschaffungswert ÷ jährlicher Rückfluss. Je kürzer, desto geringer das Risiko der Kapitalbindung."},{"id":"B-RW-023","f":2,"sub":"Rechnungswesen","t":"mc","q":"Eine Investition kostet 100.000 €; der jährliche Rückfluss beträgt 25.000 €. Wie hoch ist die Amortisationszeit?","o":[{"t":"4 Jahre","ok":1},{"t":"2,5 Jahre"},{"t":"5 Jahre"},{"t":"0,25 Jahre"}],"e":"Amortisationszeit = Anschaffungswert ÷ jährlicher Rückfluss = 100.000 € ÷ 25.000 € = 4 Jahre. Nach vier Jahren ist das eingesetzte Kapital zurückgeflossen."},{"id":"B-RW-024","f":2,"sub":"Rechnungswesen","t":"mc","q":"Welchen Vorteil hat die dynamische gegenüber der statischen Investitionsrechnung?","o":[{"t":"Sie berücksichtigt den zeitlichen Anfall der Zahlungen (Zeitwert des Geldes durch Auf-/Abzinsung)","ok":1},{"t":"Sie ist ungenauer"},{"t":"Sie ignoriert die Zahlungen"},{"t":"Sie rechnet ohne Zahlen"}],"e":"Dynamische Verfahren (Kapitalwert, interner Zinsfuß, Annuität) berücksichtigen, dass Zahlungen zu unterschiedlichen Zeitpunkten unterschiedlich viel wert sind, und zinsen sie auf einen Bezugszeitpunkt ab – genauer, aber aufwendiger."},{"id":"B-RW-025","f":2,"sub":"Rechnungswesen","t":"mc","q":"Wie berechnet sich die Eigenkapitalrentabilität?","o":[{"t":"Gewinn ÷ Eigenkapital × 100","ok":1},{"t":"Gewinn ÷ Umsatz × 100"},{"t":"Umsatz ÷ Kapital"},{"t":"Eigenkapital ÷ Gesamtkapital × 100"}],"e":"Eigenkapitalrentabilität = Gewinn ÷ Eigenkapital × 100. Sie zeigt die Verzinsung des eingesetzten Eigenkapitals und sollte über der Verzinsung einer risikofreien Anlage liegen."},{"id":"B-RW-026","f":2,"sub":"Rechnungswesen","t":"mc","q":"Ein Betrieb erzielt 60.000 € Gewinn bei 400.000 € Eigenkapital. Wie hoch ist die Eigenkapitalrentabilität?","o":[{"t":"15 %","ok":1},{"t":"6,7 %"},{"t":"40 %"},{"t":"1,5 %"}],"e":"EK-Rentabilität = Gewinn ÷ Eigenkapital × 100 = 60.000 ÷ 400.000 × 100 = 15 %."},{"id":"B-RW-027","f":2,"sub":"Rechnungswesen","t":"mc","q":"Wie ist die Umsatzrentabilität definiert?","o":[{"t":"Gewinn ÷ Umsatz × 100","ok":1},{"t":"Gewinn ÷ Eigenkapital × 100"},{"t":"Umsatz ÷ Gewinn"},{"t":"Kosten ÷ Umsatz × 100"}],"e":"Umsatzrentabilität (Umsatzrendite) = Gewinn ÷ Umsatz × 100. Sie zeigt, wie viel vom Umsatz als Gewinn verbleibt."},{"id":"B-RW-028","f":2,"sub":"Rechnungswesen","t":"mc","q":"Bei 1.000.000 € Umsatz und 50.000 € Gewinn beträgt die Umsatzrentabilität …","o":[{"t":"5 %","ok":1},{"t":"20 %"},{"t":"2 %"},{"t":"50 %"}],"e":"Umsatzrentabilität = Gewinn ÷ Umsatz × 100 = 50.000 ÷ 1.000.000 × 100 = 5 %."},{"id":"B-RW-029","f":2,"sub":"Rechnungswesen","t":"mc","q":"Wie berechnet sich die Gesamtkapitalrentabilität?","o":[{"t":"(Gewinn + Fremdkapitalzinsen) ÷ Gesamtkapital × 100","ok":1},{"t":"Gewinn ÷ Eigenkapital × 100"},{"t":"Umsatz ÷ Gesamtkapital"},{"t":"Gewinn ÷ Umsatz × 100"}],"e":"Gesamtkapitalrentabilität = (Gewinn + Fremdkapitalzinsen) ÷ Gesamtkapital × 100. Die Fremdkapitalzinsen werden hinzugerechnet, weil die Kennzahl die Verzinsung des gesamten eingesetzten Kapitals unabhängig von der Finanzierung misst."},{"id":"B-RW-030","f":2,"sub":"Rechnungswesen","t":"mc","q":"Wie ist die Eigenkapitalquote definiert?","o":[{"t":"Eigenkapital ÷ Gesamtkapital × 100","ok":1},{"t":"Fremdkapital ÷ Eigenkapital"},{"t":"Gewinn ÷ Eigenkapital"},{"t":"Umsatz ÷ Eigenkapital"}],"e":"Eigenkapitalquote = Eigenkapital ÷ Gesamtkapital × 100. Eine hohe Quote bedeutet größere finanzielle Stabilität und Unabhängigkeit von Gläubigern (Krisenfestigkeit)."},{"id":"B-RW-031","f":2,"sub":"Rechnungswesen","t":"mc","q":"Das Eigenkapital beträgt 300.000 €, das Gesamtkapital 500.000 €. Wie hoch ist die Eigenkapitalquote?","o":[{"t":"60 %","ok":1},{"t":"40 %"},{"t":"166,7 %"},{"t":"30 %"}],"e":"Eigenkapitalquote = Eigenkapital ÷ Gesamtkapital × 100 = 300.000 ÷ 500.000 × 100 = 60 %. Das Fremdkapital beträgt entsprechend 40 %."},{"id":"B-RW-032","f":2,"sub":"Rechnungswesen","t":"mc","q":"Was misst die Liquidität 1. Grades (Barliquidität)?","o":[{"t":"Das Verhältnis der flüssigen Mittel zu den kurzfristigen Verbindlichkeiten","ok":1},{"t":"Den Gewinn je Stück"},{"t":"Das gesamte Anlagevermögen"},{"t":"Die Umschlagshäufigkeit"}],"e":"Liquidität 1. Grades = flüssige Mittel ÷ kurzfristige Verbindlichkeiten × 100. Die Liquidität 2. Grades bezieht zusätzlich die kurzfristigen Forderungen, die 3. Grades auch die Vorräte ein."},{"id":"B-RW-033","f":2,"sub":"Rechnungswesen","t":"mc","q":"Was beschreibt der Return on Investment (ROI)?","o":[{"t":"Die Gesamtkapitalrentabilität, zerlegt in Umsatzrentabilität × Kapitalumschlag","ok":1},{"t":"Nur den Umsatz"},{"t":"Die Zahl der Mitarbeiter"},{"t":"Die Lagerdauer"}],"e":"ROI = Umsatzrentabilität × Kapitalumschlag = (Gewinn ÷ Umsatz) × (Umsatz ÷ Kapital) = Gewinn ÷ Kapital. Er zeigt, wie rentabel das eingesetzte Kapital arbeitet, und lässt sich in Teilkennzahlen aufschlüsseln (Kennzahlensystem)."},{"id":"B-RW-034","f":2,"sub":"Rechnungswesen","t":"mc","q":"Was drückt der Cash-Flow aus?","o":[{"t":"Den in einer Periode erwirtschafteten Zahlungsmittelüberschuss (Innenfinanzierungskraft)","ok":1},{"t":"Den Bilanzgewinn nach Steuern"},{"t":"Die Höhe des Fremdkapitals"},{"t":"Die Zahl der Aufträge"}],"e":"Der Cash-Flow ist der Überschuss der Einzahlungen über die Auszahlungen einer Periode. Er zeigt, wie viel Geld das Unternehmen aus eigener Kraft für Investitionen, Schuldentilgung und Ausschüttungen erwirtschaftet."},{"id":"B-RW-035","f":2,"sub":"Rechnungswesen","t":"mc","q":"Welche Aufgabe hat das Controlling?","o":[{"t":"Planung, Steuerung und Kontrolle sowie die Versorgung der Führung mit entscheidungsrelevanten Informationen","ok":1},{"t":"Nur die Kontrolle der Mitarbeiter"},{"t":"Ausschließlich die Werbung"},{"t":"Die Lohnzahlung"}],"e":"Controlling unterstützt die Unternehmensführung: Es koordiniert Planung, Steuerung und Kontrolle und liefert Kennzahlen und Analysen (z. B. Soll-Ist-Vergleiche). „To control“ bedeutet steuern, nicht nur kontrollieren."},{"id":"B-RW-036","f":2,"sub":"Rechnungswesen","t":"mc","q":"Worin unterscheiden sich operatives und strategisches Controlling?","o":[{"t":"Operatives Controlling ist kurzfristig und zahlenorientiert, strategisches Controlling langfristig und auf Erfolgspotenziale gerichtet","ok":1},{"t":"Beide sind identisch"},{"t":"Strategisches Controlling ist kurzfristig"},{"t":"Operatives Controlling betrachtet nur die Zukunft"}],"e":"Operatives Controlling steuert das laufende Geschäft (Kosten, Erlöse, Liquidität, Soll-Ist). Strategisches Controlling sichert langfristig die Erfolgspotenziale und Wettbewerbsfähigkeit (Chancen/Risiken, Stärken/Schwächen)."},{"id":"B-RW-037","f":2,"sub":"Rechnungswesen","t":"mc","q":"Was ist ein Soll-Ist-Vergleich?","o":[{"t":"Die Gegenüberstellung geplanter und tatsächlicher Werte zur Erkennung von Abweichungen","ok":1},{"t":"Der Vergleich zweier Lieferanten"},{"t":"Die Berechnung des Verkaufspreises"},{"t":"Die Wahl der Rechtsform"}],"e":"Beim Soll-Ist-Vergleich werden Plangrößen (Soll) mit den erreichten Werten (Ist) verglichen. Abweichungen werden analysiert (Abweichungsanalyse) und lösen bei Bedarf Steuerungsmaßnahmen aus – Kern des Controlling-Regelkreises."},{"id":"B-RW-038","f":2,"sub":"Rechnungswesen","t":"mc","q":"Welche Instrumente umfasst der Marketing-Mix (die \"4 P\")?","o":[{"t":"Produkt-, Preis-, Distributions- und Kommunikationspolitik","ok":1},{"t":"Planung, Produktion, Personal, Preis"},{"t":"Preis, Prämie, Provision, Prozent"},{"t":"Beschaffung, Bestand, Bezug, Bilanz"}],"e":"Der Marketing-Mix kombiniert die vier Instrumente Produktpolitik (Product), Preispolitik (Price), Distributionspolitik (Place) und Kommunikationspolitik (Promotion), um Marktziele zu erreichen."},{"id":"B-RW-039","f":2,"sub":"Rechnungswesen","t":"open","q":"Erläutern Sie den Unterschied zwischen Eigen- und Fremdfinanzierung und nennen Sie zu jeder je ein Beispiel.","a":"Bei der Eigenfinanzierung wird dem Unternehmen Eigenkapital zugeführt. Die Kapitalgeber sind Eigentümer/Gesellschafter, haften mit, haben Mitsprache- und Gewinnrechte, und das Kapital steht dauerhaft (unbefristet) zur Verfügung. Beispiele: Einlagen der Gesellschafter, Ausgabe neuer Aktien oder die Selbstfinanzierung durch einbehaltene Gewinne. Bei der Fremdfinanzierung wird dem Unternehmen Fremdkapital von außen überlassen. Die Kapitalgeber sind Gläubiger, haben Anspruch auf Zins und Rückzahlung, aber keine Mitsprache- oder Gewinnrechte, und das Kapital ist befristet. Beispiele: Bankdarlehen, Kontokorrentkredit, Lieferantenkredit oder eine Anleihe. Ein hoher Eigenkapitalanteil erhöht die Stabilität, Fremdkapital kann jedoch über den Leverage-Effekt die Eigenkapitalrentabilität steigern.","e":"Merksatz: Eigenkapital = Eigentümer, unbefristet, haftend, mit Gewinnbeteiligung; Fremdkapital = Gläubiger, befristet, mit festem Zinsanspruch."},{"id":"B-RW-040","f":2,"sub":"Rechnungswesen","t":"open","q":"Beschreiben Sie den Aufbau einer Bilanz und erläutern Sie, was Aktiv- und Passivseite jeweils aussagen.","a":"Die Bilanz ist eine stichtagsbezogene Gegenüberstellung von Vermögen und Kapital in Kontoform. Auf der linken Seite (Aktiva) steht das Vermögen, gegliedert in Anlagevermögen (dauerhaft dem Betrieb dienend, z. B. Grundstücke, Fahrzeuge, Maschinen) und Umlaufvermögen (kurzfristig gebunden, z. B. Vorräte, Forderungen, Kasse/Bank). Die Aktivseite zeigt also die Mittelverwendung – wofür das Kapital eingesetzt wurde. Auf der rechten Seite (Passiva) steht das Kapital, gegliedert in Eigenkapital (Einlagen und einbehaltene Gewinne) und Fremdkapital (Verbindlichkeiten, Rückstellungen). Die Passivseite zeigt die Mittelherkunft – woher das Kapital stammt bzw. wie das Vermögen finanziert wurde. Da jedes Vermögen finanziert sein muss, sind beide Seiten immer gleich hoch (Bilanzgleichung: Summe Aktiva = Summe Passiva).","e":"Kurz: Aktiva = Vermögen/Mittelverwendung (Anlage- und Umlaufvermögen); Passiva = Kapital/Mittelherkunft (Eigen- und Fremdkapital); beide Seiten sind gleich hoch."},{"id":"B-RW-041","f":2,"sub":"Rechnungswesen","t":"open","q":"Eine Investition erfordert einen Kapitaleinsatz von 240.000 €. Der jährliche Gewinn beträgt 36.000 €, der jährliche Rückfluss (Gewinn + Abschreibung) 60.000 €. Berechnen Sie die Rentabilität der Investition und die Amortisationszeit.","a":"Rentabilität = jährlicher Gewinn ÷ Kapitaleinsatz × 100 = 36.000 € ÷ 240.000 € × 100 = 15 %. Amortisationszeit = Kapitaleinsatz ÷ jährlicher Rückfluss = 240.000 € ÷ 60.000 € = 4 Jahre. Die Investition verzinst das eingesetzte Kapital also mit 15 % pro Jahr, und der Kapitaleinsatz fließt nach vier Jahren über die Rückflüsse zurück. Für die Rentabilität ist der Gewinn maßgeblich, für die Amortisation der gesamte Rückfluss einschließlich der Abschreibungen, weil auch die Abschreibungsgegenwerte als Einzahlungen zurückfließen.","e":"Wichtig: Für die Amortisationszeit wird der Rückfluss (Gewinn + Abschreibung) verwendet, nicht nur der Gewinn – die Abschreibung ist ein nicht auszahlungswirksamer Aufwand und fließt als Liquidität zurück."},{"id":"M-PM-001","f":3,"sub":"Projektmanagement","t":"mc","q":"Welches Merkmal ist KEIN typisches Kennzeichen eines Projekts (DIN 69901)?","o":[{"t":"Dauerhaft wiederkehrende Routineaufgabe","ok":1},{"t":"Einmaligkeit der Bedingungen"},{"t":"Klar definiertes Ziel"},{"t":"Zeitliche Begrenzung"}],"e":"Projekte sind einmalig, zielorientiert, zeitlich und finanziell begrenzt, komplex und haben eine eigene Organisation. Wiederkehrende Routineaufgaben gehören in die Linienorganisation."},{"id":"M-PM-002","f":3,"sub":"Projektmanagement","t":"mc","q":"Aus welchen Zielgrößen besteht das „magische Dreieck“ des Projektmanagements?","o":[{"t":"Zeit, Kosten und Qualität (Leistung)","ok":1},{"t":"Umsatz, Gewinn, Rentabilität"},{"t":"Mensch, Maschine, Material"},{"t":"Planen, Steuern, Kontrollieren"}],"e":"Termin-, Kosten- und Leistungsziel stehen in Wechselwirkung: Ändert man eine Größe, wirkt sich das auf die anderen aus. Das Projektziel liegt im Zentrum des Dreiecks."},{"id":"M-PM-003","f":3,"sub":"Projektmanagement","t":"mc","q":"Was geschieht typischerweise, wenn in einem Projekt die verfügbare Zeit stark verkürzt wird (magisches Dreieck)?","o":[{"t":"Es steigen tendenziell die Kosten oder die Qualität/Leistung leidet","ok":1},{"t":"Alle drei Ziele verbessern sich"},{"t":"Es ändert sich nichts"},{"t":"Die Kosten sinken automatisch"}],"e":"Die drei Ecken stehen im Zielkonflikt. Eine Terminverkürzung erfordert meist mehr Ressourcen (höhere Kosten) oder führt zu Abstrichen bei Umfang/Qualität."},{"id":"M-PM-004","f":3,"sub":"Projektmanagement","t":"mc","q":"In welcher Reihenfolge verlaufen die Projektphasen idealtypisch?","o":[{"t":"Definition/Initiierung → Planung → Durchführung/Steuerung → Abschluss","ok":1},{"t":"Planung → Definition → Abschluss → Durchführung"},{"t":"Durchführung → Planung → Definition"},{"t":"Abschluss → Durchführung → Planung"}],"e":"Ein Projekt durchläuft die Phasen Definition (Ziele, Auftrag), Planung (Struktur, Termine, Ressourcen, Kosten), Durchführung/Steuerung (Umsetzung, Controlling) und Abschluss (Übergabe, Auswertung)."},{"id":"M-PM-005","f":3,"sub":"Projektmanagement","t":"mc","q":"Was wird in der Projektdefinitionsphase festgelegt?","o":[{"t":"Projektziel, Rahmenbedingungen, Auftrag und grobe Ressourcen (Projektauftrag)","ok":1},{"t":"Die genauen Vorgangsdauern im Netzplan"},{"t":"Die Abschlussdokumentation"},{"t":"Die endgültige Rechnung"}],"e":"In der Definitionsphase werden Ziele (möglichst SMART), Nutzen, Rahmenbedingungen, grober Zeit- und Kostenrahmen sowie Verantwortlichkeiten geklärt und im Projektauftrag festgehalten."},{"id":"M-PM-006","f":3,"sub":"Projektmanagement","t":"mc","q":"Wozu dient ein Projektstrukturplan (PSP)?","o":[{"t":"Zur vollständigen Zerlegung des Projekts in Teilaufgaben und Arbeitspakete","ok":1},{"t":"Zur Berechnung der Umsatzsteuer"},{"t":"Zur Darstellung der Aufbauorganisation des Gesamtunternehmens"},{"t":"Zur Erstellung der Bilanz"}],"e":"Der PSP gliedert das Gesamtprojekt hierarchisch in Teilaufgaben bis hinunter zu den Arbeitspaketen (kleinste planbare Einheiten). Er ist die Grundlage für Termin-, Kosten- und Ressourcenplanung."},{"id":"M-PM-007","f":3,"sub":"Projektmanagement","t":"mc","q":"Was ist ein Arbeitspaket im Projektstrukturplan?","o":[{"t":"Die kleinste, klar abgegrenzte und zurechenbare Einheit des PSP","ok":1},{"t":"Das gesamte Projekt"},{"t":"Ein einzelner Mitarbeiter"},{"t":"Ein Meilenstein"}],"e":"Ein Arbeitspaket ist die unterste Ebene des PSP: eine in sich geschlossene Aufgabe mit definiertem Ergebnis, Verantwortlichem, Aufwand und Termin. Es lässt sich einzeln planen und kontrollieren."},{"id":"M-PM-008","f":3,"sub":"Projektmanagement","t":"mc","q":"Wie unterscheiden sich Lastenheft und Pflichtenheft?","o":[
