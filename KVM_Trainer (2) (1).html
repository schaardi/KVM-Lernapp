":[{"t":"Der Moderator leitet und strukturiert neutral den Gruppenprozess, statt selbst Inhalte vorzutragen","ok":1},{"t":"Der Moderator hält den Fachvortrag"},{"t":"Beide Rollen sind identisch"},{"t":"Der Referent bleibt neutral"}],"e":"Der Moderator steuert den Ablauf, aktiviert die Gruppe und bleibt inhaltlich neutral; die Ergebnisse erarbeiten die Teilnehmer. Der Referent vermittelt dagegen selbst Inhalte (Vortrag)."},{"id":"M-PR-021","f":3,"sub":"Präsentation","t":"mc","q":"In welcher Reihenfolge verläuft ein Moderationszyklus typischerweise?","o":[{"t":"Einstieg → Themen sammeln → Thema auswählen → bearbeiten → Maßnahmen planen → Abschluss","ok":1},{"t":"Abschluss → Einstieg → Maßnahmen"},{"t":"Maßnahmen → Einstieg → Themen sammeln"},{"t":"Bearbeiten → Einstieg → sammeln"}],"e":"Der Moderationszyklus: Einstieg (Orientierung, Klima), Themen sammeln, Thema auswählen/priorisieren, Thema bearbeiten, Maßnahmen vereinbaren (Wer macht was bis wann?) und Abschluss (Zusammenfassung, Ausblick)."},{"id":"M-PR-022","f":3,"sub":"Präsentation","t":"mc","q":"Was ist eine Kartenabfrage in der Moderation?","o":[{"t":"Teilnehmer schreiben ihre Beiträge auf Karten, die dann gesammelt und geordnet werden","ok":1},{"t":"Eine Abstimmung per Handzeichen"},{"t":"Das Verteilen von Spielkarten"},{"t":"Eine Bezahlmethode"}],"e":"Bei der Kartenabfrage notiert jeder seine Gedanken (kurz, lesbar) auf Karten. Diese werden an einer Pinnwand gesammelt und thematisch geclustert. Vorteil: Auch zurückhaltende Teilnehmer kommen zu Wort, viele Ideen entstehen parallel."},{"id":"M-PR-023","f":3,"sub":"Präsentation","t":"mc","q":"Wozu dient eine Punktabfrage (Mehrpunktabfrage) in der Moderation?","o":[{"t":"Zum Priorisieren/Gewichten von Themen oder Lösungen durch Vergabe von Klebepunkten","ok":1},{"t":"Zur Berechnung des Deckungsbeitrags"},{"t":"Zur Zeiterfassung"},{"t":"Zur Sitzordnung"}],"e":"Bei der Punktabfrage kleben die Teilnehmer Punkte an die aus ihrer Sicht wichtigsten Optionen. So wird schnell und transparent eine Rangfolge/Gewichtung sichtbar – hilfreich zur Auswahl von Themen oder Maßnahmen."},{"id":"M-PR-024","f":3,"sub":"Präsentation","t":"mc","q":"Was versteht man unter „Clustern“ in der Moderation?","o":[{"t":"Das Zusammenfassen inhaltlich verwandter Beiträge/Karten zu Gruppen","ok":1},{"t":"Das Löschen von Beiträgen"},{"t":"Das Verschlüsseln von Daten"},{"t":"Das Zählen der Teilnehmer"}],"e":"Beim Clustern werden gesammelte Karten/Beiträge nach thematischer Zusammengehörigkeit gruppiert und mit Oberbegriffen versehen. So entsteht aus vielen Einzelbeiträgen eine übersichtliche Struktur."},{"id":"M-PR-025","f":3,"sub":"Präsentation","t":"mc","q":"Welche Frageart öffnet ein Gespräch und lädt zu ausführlichen Antworten ein?","o":[{"t":"Die offene Frage (W-Frage)","ok":1},{"t":"Die geschlossene Ja/Nein-Frage"},{"t":"Die Suggestivfrage"},{"t":"Die rhetorische Frage"}],"e":"Offene Fragen (Wer, Was, Wie, Warum, Wozu) regen zu ausführlichen Antworten an und fördern die Beteiligung. Geschlossene Fragen (Antwort: Ja/Nein) eignen sich eher zum Abschließen oder Präzisieren."},{"id":"M-PR-026","f":3,"sub":"Präsentation","t":"mc","q":"Welche Haltung sollte ein Moderator gegenüber den inhaltlichen Beiträgen einnehmen?","o":[{"t":"Neutral und wertschätzend – er bewertet die Beiträge nicht selbst","ok":1},{"t":"Er setzt seine eigene Meinung durch"},{"t":"Er kritisiert schwache Beiträge offen"},{"t":"Er ignoriert unbequeme Beiträge"}],"e":"Der Moderator bleibt allparteilich und wertneutral, damit sich alle einbringen. Er strukturiert, fasst zusammen und sorgt für ein gutes Klima, drängt der Gruppe aber keine eigene Meinung auf."},{"id":"M-PR-027","f":3,"sub":"Präsentation","t":"mc","q":"Was gehört zum „Moderationskoffer“ bzw. zur Metaplantechnik?","o":[{"t":"Pinnwände, Moderationskarten, Stifte, Klebepunkte und Nadeln","ok":1},{"t":"Nur ein Laptop"},{"t":"Eine Registrierkasse"},{"t":"Werkzeuge zur Maschinenwartung"}],"e":"Die Metaplantechnik nutzt Pinnwände, Karten in verschiedenen Formen/Farben, Stifte, Klebepunkte und Nadeln, um Beiträge sichtbar zu sammeln, zu ordnen und zu bewerten – die Grundausstattung im Moderationskoffer."},{"id":"M-PR-028","f":3,"sub":"Präsentation","t":"mc","q":"Wie sollte ein Moderator mit einer „Killerphrase“ (z. B. „Das geht bei uns sowieso nicht.“) umgehen?","o":[{"t":"Sie aufgreifen, hinterfragen und sachlich in eine konstruktive Bahn lenken","ok":1},{"t":"Den Sprecher persönlich angreifen"},{"t":"Die Sitzung sofort beenden"},{"t":"Die Aussage kommentarlos übergehen und den Sprecher ignorieren"}],"e":"Killerphrasen blockieren die Diskussion. Der Moderator nimmt den Einwand ernst, fragt nach (z. B. „Was genau spricht dagegen?“) und lenkt so von pauschaler Ablehnung zu konkreten, lösbaren Punkten – ohne den Sprecher bloßzustellen."},{"id":"M-PR-029","f":3,"sub":"Präsentation","t":"mc","q":"Womit sollte eine Moderation abschließen?","o":[{"t":"Mit einem Maßnahmenplan: Wer macht was bis wann?","ok":1},{"t":"Mit einer offenen Frage ohne Ergebnis"},{"t":"Mit dem Verteilen von Werbung"},{"t":"Ohne jedes Ergebnis"}],"e":"Am Ende steht ein konkreter Maßnahmenplan mit klaren Verantwortlichkeiten und Terminen (Wer? Was? Bis wann?). Nur so führen die erarbeiteten Ergebnisse zu verbindlichen Taten."},{"id":"M-PR-030","f":3,"sub":"Präsentation","t":"mc","q":"Welche Regel gilt für konstruktives Feedback?","o":[{"t":"Konkret, sachlich und beschreibend formulieren (Ich-Botschaften), nicht pauschal abwertend","ok":1},{"t":"Möglichst verletzend sein"},{"t":"Nur allgemeine Urteile abgeben"},{"t":"Ausschließlich Negatives nennen"}],"e":"Gutes Feedback beschreibt konkretes Verhalten (statt zu urteilen), bleibt sachlich, nutzt Ich-Botschaften und benennt Positives wie Verbesserungswürdiges. So kann der Empfänger es annehmen und daraus lernen."},{"id":"M-PR-031","f":3,"sub":"Präsentation","t":"open","q":"Beschreiben Sie den klassischen Aufbau einer Präsentation (Einleitung, Hauptteil, Schluss) und die Aufgabe jedes Teils.","a":"Eine Präsentation gliedert sich klassisch in drei Teile. Die Einleitung stellt den Kontakt zum Publikum her, nennt Thema und Ziel, gibt einen Überblick über den Ablauf (roter Faden) und weckt mit einem Aufhänger (z. B. Frage, Beispiel, überraschende Zahl) das Interesse. Der Hauptteil vermittelt die eigentlichen Inhalte in einer nachvollziehbaren Struktur: Argumente und Informationen werden logisch geordnet, durch Beispiele und Visualisierungen veranschaulicht und auf das Ziel ausgerichtet. Der Schluss fasst die Kernaussagen zusammen, zieht ein klares Fazit und endet – je nach Ziel – mit einer Handlungsaufforderung oder Empfehlung; oft folgt eine Gelegenheit für Fragen. Wichtig ist, dass sich der rote Faden durch alle drei Teile zieht und die zentrale Botschaft am Ende hängen bleibt.","e":"Merksatz: Einleitung = Interesse wecken und orientieren; Hauptteil = Inhalte strukturiert vermitteln; Schluss = zusammenfassen und Fazit/Appell."},{"id":"M-PR-032","f":3,"sub":"Präsentation","t":"open","q":"Nennen Sie fünf Grundsätze für die Gestaltung guter Präsentationsfolien.","a":"1) Weniger ist mehr: nur die Kernaussagen auf die Folie, keine ganzen Textwände (z. B. 6-mal-6-Regel). 2) Gute Lesbarkeit: ausreichend große Schrift, klare Schriftart und hoher Kontrast zwischen Schrift und Hintergrund. 3) Visualisieren statt beschreiben: Zusammenhänge mit Diagrammen, Bildern oder Grafiken darstellen, statt sie in Fließtext zu erklären. 4) Einheitliches, ruhiges Layout: durchgängige Gestaltung (Farben, Schriften, Aufbau), sparsamer Einsatz von Effekten und Animationen. 5) Eine Kernbotschaft pro Folie: jede Folie transportiert einen klaren Gedanken, unterstützt durch eine aussagekräftige Überschrift. Ergänzend gilt: Folien unterstützen den Vortrag, sie ersetzen ihn nicht – der Vortragende spricht frei und liest die Folien nicht ab.","e":"Kerngedanke: Folien sollen die Aussage visuell unterstützen – klar, lesbar, einheitlich und nicht überladen."},{"id":"M-PR-033","f":3,"sub":"Präsentation","t":"open","q":"Erläutern Sie die Rolle des Moderators und nennen Sie zwei Moderationstechniken zur Beteiligung der Gruppe.","a":"Der Moderator leitet und strukturiert den Gruppenprozess, ohne selbst Inhalte vorzutragen oder zu bewerten. Er bleibt inhaltlich neutral (allparteilich), sorgt für ein gutes Arbeitsklima, aktiviert alle Teilnehmer, hält den roten Faden und die Zeit im Blick, fasst Ergebnisse zusammen und führt am Ende zu verbindlichen Maßnahmen. Die inhaltlichen Ergebnisse erarbeitet die Gruppe selbst. Zwei Techniken zur Beteiligung: (1) Die Kartenabfrage – jeder Teilnehmer schreibt seine Beiträge auf Karten, die gesammelt und thematisch geclustert werden; so kommen auch zurückhaltende Personen zu Wort und es entstehen viele Ideen parallel. (2) Die Punktabfrage (Mehrpunktabfrage) – die Teilnehmer vergeben Klebepunkte an die aus ihrer Sicht wichtigsten Optionen, wodurch schnell und transparent eine Priorisierung sichtbar wird.","e":"Kurz: Moderator = neutraler Prozessleiter (nicht Inhaltsgeber). Beteiligungstechniken u. a. Kartenabfrage (sammeln/clustern) und Punktabfrage (priorisieren)."},{"id":"M-PR-034","f":3,"sub":"Präsentation","t":"mc","q":"Warum sollte ein Vortragender seine Folien nicht einfach ablesen?","o":[{"t":"Weil das langweilig wirkt und die Zuhörer schneller selbst lesen als er spricht","ok":1},{"t":"Weil Ablesen gesetzlich verboten ist"},{"t":"Weil Folien keine Schrift enthalten dürfen"},{"t":"Weil das die Umsatzsteuer erhöht"}],"e":"Wird die Folie Wort für Wort vorgelesen, ist der Vortrag redundant und ermüdend – das Publikum liest schneller. Der Vortragende soll frei sprechen, erläutern und ergänzen; die Folie liefert nur Stichworte und Bilder."},{"id":"M-PR-035","f":3,"sub":"Präsentation","t":"mc","q":"Was ist bei der Wahl des Präsentationsmediums vor allem zu berücksichtigen?","o":[{"t":"Ziel, Inhalt, Gruppengröße und die räumlich-technischen Gegebenheiten","ok":1},{"t":"Nur der persönliche Geschmack"},{"t":"Nur der Preis des Beamers"},{"t":"Die Rechtsform des Unternehmens"}],"e":"Das passende Medium hängt vom Ziel, den Inhalten, der Teilnehmerzahl und den Rahmenbedingungen (Raum, Technik, Licht) ab. Für kleine, interaktive Runden eignen sich Flipchart/Pinnwand, für strukturierte Vorträge vor größerem Publikum eher Beamer und Folien."},{"id":"M-IK-001","f":3,"sub":"Kommunikation","t":"mc","q":"Aus welchen Grundelementen besteht das Sender-Empfänger-Modell der Kommunikation?","o":[{"t":"Sender, Nachricht, Kanal/Medium, Empfänger und Rückmeldung (Feedback)","ok":1},{"t":"Angebot, Nachfrage und Preis"},{"t":"Bilanz, GuV und Anhang"},{"t":"Nur Sender und Nachricht"}],"e":"Der Sender kodiert eine Nachricht und überträgt sie über einen Kanal an den Empfänger, der sie dekodiert. Über das Feedback prüft der Sender, ob die Botschaft richtig ankam. Störungen (Rauschen) können den Prozess beeinträchtigen."},{"id":"M-IK-002","f":3,"sub":"Kommunikation","t":"mc","q":"Was bezeichnet man in der Kommunikation als „Kodieren“?","o":[{"t":"Das Umsetzen des Gedankens des Senders in Zeichen (Sprache, Schrift, Gesten)","ok":1},{"t":"Das Verstehen der Nachricht durch den Empfänger"},{"t":"Eine Störung des Kanals"},{"t":"Die Verschlüsselung von Passwörtern"}],"e":"Beim Kodieren formt der Sender seine Botschaft in Zeichen (Worte, Schrift, Körpersprache). Der Empfänger dekodiert sie, also legt sie aus. Missverständnisse entstehen, wenn Kodierung und Dekodierung nicht übereinstimmen."},{"id":"M-IK-003","f":3,"sub":"Kommunikation","t":"mc","q":"Welche vier Seiten hat eine Nachricht nach dem Kommunikationsmodell von Schulz von Thun?","o":[{"t":"Sachinhalt, Selbstoffenbarung, Beziehung und Appell","ok":1},{"t":"Sender, Empfänger, Kanal, Feedback"},{"t":"Zeit, Kosten, Qualität, Umfang"},{"t":"Mensch, Maschine, Material, Methode"}],"e":"Nach dem „Vier-Seiten-“ oder „Vier-Ohren-Modell“ enthält jede Nachricht zugleich einen Sachinhalt (Worüber?), eine Selbstoffenbarung (Was gebe ich von mir preis?), einen Beziehungshinweis (Wie stehe ich zu dir?) und einen Appell (Wozu will ich dich bewegen?)."},{"id":"M-IK-004","f":3,"sub":"Kommunikation","t":"mc","q":"Warum können bei einer Nachricht nach Schulz von Thun Missverständnisse entstehen?","o":[{"t":"Weil Sender und Empfänger die vier Seiten unterschiedlich betonen bzw. „hören“","ok":1},{"t":"Weil Nachrichten nur eine Bedeutung haben"},{"t":"Weil Feedback verboten ist"},{"t":"Weil Sprache immer eindeutig ist"}],"e":"Der Empfänger hört mit „vier Ohren“ und kann eine andere Seite in den Vordergrund stellen als der Sender gemeint hat (z. B. eine sachliche Aussage als Angriff auf die Beziehung deuten). Das führt zu Missverständnissen."},{"id":"M-IK-005","f":3,"sub":"Kommunikation","t":"mc","q":"Was besagt das erste Axiom von Watzlawick?","o":[{"t":"„Man kann nicht nicht kommunizieren.“","ok":1},{"t":"„Kommunikation ist immer sachlich.“"},{"t":"„Nur Worte übermitteln Botschaften.“"},{"t":"„Schweigen ist keine Kommunikation.“"}],"e":"Nach Watzlawick teilt sich jedes Verhalten mit – auch Schweigen, Wegsehen oder Nichtstun haben Mitteilungscharakter. Daher „kann man nicht nicht kommunizieren“."},{"id":"M-IK-006","f":3,"sub":"Kommunikation","t":"mc","q":"Was unterscheidet nach Watzlawick den Inhalts- vom Beziehungsaspekt einer Nachricht?","o":[{"t":"Der Inhaltsaspekt betrifft die Sachinformation, der Beziehungsaspekt, wie die Partner zueinander stehen","ok":1},{"t":"Beide sind identisch"},{"t":"Der Inhaltsaspekt ist immer unwichtig"},{"t":"Der Beziehungsaspekt betrifft nur Zahlen"}],"e":"Jede Kommunikation hat einen Inhalts- (das „Was“) und einen Beziehungsaspekt (das „Wie“), wobei der Beziehungsaspekt den Inhaltsaspekt bestimmt. Eine gestörte Beziehung überlagert oft die Sachebene."},{"id":"M-IK-007","f":3,"sub":"Kommunikation","t":"mc","q":"Was veranschaulicht das Eisbergmodell der Kommunikation?","o":[{"t":"Dass nur ein kleiner Teil (Sachebene) sichtbar ist, während der größere Teil (Beziehungsebene/Gefühle) verborgen bleibt","ok":1},{"t":"Dass Kommunikation immer kalt ist"},{"t":"Dass nur Zahlen zählen"},{"t":"Dass Feedback überflüssig ist"}],"e":"Wie beim Eisberg liegt der größte Teil unter der Oberfläche: Über der Wasserlinie die Sachebene, darunter die verborgene Beziehungsebene mit Gefühlen, Werten und Motiven, die die Kommunikation stark beeinflusst."},{"id":"M-IK-008","f":3,"sub":"Kommunikation","t":"mc","q":"Was zählt zur paraverbalen Kommunikation?","o":[{"t":"Tonfall, Lautstärke, Sprechtempo und Betonung","ok":1},{"t":"Der reine Wortinhalt"},{"t":"Gestik und Mimik"},{"t":"Der geschriebene Text"}],"e":"Paraverbale Signale sind die „Begleitmusik“ des Sprechens: Stimmlage, Lautstärke, Tempo, Betonung, Pausen. Verbal = Wortinhalt, nonverbal = Körpersprache (Gestik, Mimik, Haltung)."},{"id":"M-IK-009","f":3,"sub":"Kommunikation","t":"mc","q":"Worin unterscheiden sich Einweg- und Zweiwegkommunikation?","o":[{"t":"Bei der Zweiwegkommunikation gibt es Rückmeldung (Dialog), bei der Einwegkommunikation nicht","ok":1},{"t":"Beide sind identisch"},{"t":"Einwegkommunikation ist immer genauer"},{"t":"Zweiwegkommunikation hat keinen Empfänger"}],"e":"Einwegkommunikation (z. B. Aushang, Rundschreiben) läuft ohne direkte Rückmeldung – schnell, aber fehleranfällig. Zweiwegkommunikation (Gespräch) ermöglicht Rückfragen und Feedback, ist genauer, aber zeitaufwendiger."},{"id":"M-IK-010","f":3,"sub":"Kommunikation","t":"mc","q":"Was versteht man unter aktivem Zuhören?","o":[{"t":"Aufmerksames Zuhören mit Nachfragen und dem Zusammenfassen des Gehörten, um Verständnis zu sichern","ok":1},{"t":"Zuhören und gleichzeitig anderes erledigen"},{"t":"Den anderen ständig unterbrechen"},{"t":"Nur auf die eigene Antwort warten"}],"e":"Aktives Zuhören bedeutet, sich voll auf den Sprecher zu konzentrieren, durch Rückfragen und Paraphrasieren („Habe ich richtig verstanden, dass …?“) Verständnis zu sichern und dem Gegenüber Wertschätzung zu zeigen."},{"id":"M-IK-011","f":3,"sub":"Kommunikation","t":"mc","q":"Warum sind Ich-Botschaften in Konfliktgesprächen oft günstiger als Du-Botschaften?","o":[{"t":"Weil sie die eigene Wahrnehmung schildern, ohne den anderen anzugreifen – das mindert Abwehr","ok":1},{"t":"Weil sie schärfer angreifen"},{"t":"Weil sie unverständlicher sind"},{"t":"Weil sie länger dauern"}],"e":"Ich-Botschaften („Ich habe den Eindruck …“, „Mir ist wichtig …“) beschreiben das eigene Empfinden, statt Vorwürfe zu erheben. Du-Botschaften („Du machst immer …“) wirken anklagend und lösen Widerstand aus."},{"id":"M-IK-012","f":3,"sub":"Kommunikation","t":"mc","q":"Worin unterscheiden sich Daten und Informationen?","o":[{"t":"Daten sind Zeichen/Werte; erst durch Bedeutung im Zusammenhang werden sie zu Informationen","ok":1},{"t":"Beide sind identisch"},{"t":"Informationen sind immer falsch"},{"t":"Daten haben immer eine Bedeutung"}],"e":"Daten sind zunächst bedeutungsneutrale Zeichen/Werte (z. B. „42“). Erst im Kontext und mit Zweckbezug werden sie zu Informationen (z. B. „42 verspätete Sendungen heute“), die Entscheidungen ermöglichen."},{"id":"M-IK-013","f":3,"sub":"Kommunikation","t":"mc","q":"Was bedeutet „Holschuld“ beim betrieblichen Informationsfluss?","o":[{"t":"Der Mitarbeiter muss sich benötigte Informationen selbst beschaffen","ok":1},{"t":"Die Information wird ihm automatisch zugestellt"},{"t":"Informationen dürfen nicht weitergegeben werden"},{"t":"Nur der Chef holt Informationen"}],"e":"Bei der Holschuld liegt es beim Empfänger, sich zu informieren (z. B. Aushänge, Intranet lesen). Bei der Bringschuld muss der Sender die Information aktiv zustellen. Wichtige Informationen sollten eine Bringschuld sein."},{"id":"M-IK-014","f":3,"sub":"Kommunikation","t":"mc","q":"Welche Folge hat ein „Information Overload“ (Informationsüberflutung)?","o":[{"t":"Wichtige Informationen gehen unter, Entscheidungen werden erschwert","ok":1},{"t":"Die Entscheidungsqualität steigt immer"},{"t":"Es gibt keine Auswirkung"},{"t":"Es entstehen automatisch weniger Fehler"}],"e":"Zu viele (oft ungefilterte) Informationen überfordern den Empfänger; Wesentliches wird übersehen und Entscheidungen verzögern sich. Abhilfe schaffen Filterung, klare Zuständigkeiten und zielgerichtete Verteilung (das Richtige an die Richtigen)."},{"id":"M-IK-015","f":3,"sub":"Kommunikation","t":"mc","q":"Was ist mit vertikaler Kommunikation im Betrieb gemeint?","o":[{"t":"Kommunikation zwischen verschiedenen Hierarchieebenen (z. B. Vorgesetzter ↔ Mitarbeiter)","ok":1},{"t":"Kommunikation zwischen gleichrangigen Stellen"},{"t":"Kommunikation nur mit Kunden"},{"t":"Die Wahl der Rechtsform"}],"e":"Vertikale Kommunikation verläuft entlang der Hierarchie (top-down: Anweisungen/Ziele; bottom-up: Berichte/Rückmeldungen). Horizontale Kommunikation findet zwischen gleichrangigen Stellen/Abteilungen statt."},{"id":"M-IK-016","f":3,"sub":"Kommunikation","t":"mc","q":"Was versteht man unter informeller Kommunikation („Flurfunk“)?","o":[{"t":"Den ungeplanten, inoffiziellen Informationsaustausch neben den offiziellen Wegen","ok":1},{"t":"Die offizielle Bekanntmachung der Geschäftsleitung"},{"t":"Das gesetzlich vorgeschriebene Berichtswesen"},{"t":"Eine Rundmail"}],"e":"Informelle Kommunikation läuft über persönliche Kontakte außerhalb der offiziellen Kanäle. Sie ist schnell und kann das Klima fördern, verbreitet aber auch Gerüchte und unbestätigte Informationen."},{"id":"M-IK-017","f":3,"sub":"Kommunikation","t":"mc","q":"Was gehört zur Vorbereitung einer Besprechung?","o":[{"t":"Ziel festlegen, Tagesordnung erstellen und rechtzeitig einladen (mit Zeit, Ort, Themen)","ok":1},{"t":"Erst während der Sitzung das Thema suchen"},{"t":"Ohne Tagesordnung starten"},{"t":"Niemanden einladen"}],"e":"Eine effiziente Besprechung braucht ein klares Ziel, eine Tagesordnung (mit Themen und Zeitrahmen) und eine rechtzeitige Einladung der richtigen Teilnehmer. Das spart Zeit und macht das Ergebnis planbar."},{"id":"M-IK-018","f":3,"sub":"Kommunikation","t":"mc","q":"Worin unterscheiden sich Verlaufs- und Ergebnisprotokoll?","o":[{"t":"Das Verlaufsprotokoll gibt den Gesprächsverlauf wieder, das Ergebnisprotokoll nur die Ergebnisse/Beschlüsse","ok":1},{"t":"Beide sind identisch"},{"t":"Das Ergebnisprotokoll enthält jedes Wort"},{"t":"Das Verlaufsprotokoll enthält keine Themen"}],"e":"Das Verlaufsprotokoll dokumentiert den Ablauf mit Wortbeiträgen und Diskussion; das Ergebnisprotokoll hält nur die Resultate, Beschlüsse und Maßnahmen (Wer/Was/Bis wann) fest. Für die Praxis genügt meist das Ergebnisprotokoll."},{"id":"M-IK-019","f":3,"sub":"Kommunikation","t":"mc","q":"Was sollte ein Ergebnisprotokoll mindestens enthalten?","o":[{"t":"Beschlüsse, Maßnahmen mit Verantwortlichen und Terminen sowie Datum/Teilnehmer","ok":1},{"t":"Nur die Uhrzeit"},{"t":"Ausschließlich Werbung"},{"t":"Die privaten Adressen aller Teilnehmer"}],"e":"Ein brauchbares Ergebnisprotokoll nennt Datum, Teilnehmer, behandelte Themen und vor allem die Beschlüsse und offenen Maßnahmen mit Verantwortlichen und Fristen. So ist die Umsetzung nachvollziehbar."},{"id":"M-IK-020","f":3,"sub":"Kommunikation","t":"mc","q":"Welche Regel steigert die Effizienz von Besprechungen?","o":[{"t":"Beginn und Ende pünktlich einhalten und beim Thema (Tagesordnung) bleiben","ok":1},{"t":"Ohne Zeitrahmen diskutieren"},{"t":"Möglichst viele sachfremde Themen einbringen"},{"t":"Keine Ergebnisse festhalten"}],"e":"Pünktlichkeit, eine eingehaltene Tagesordnung, klare Moderation, Zeitdisziplin und ein Ergebnisprotokoll machen Besprechungen effizient. Abschweifen und fehlende Ergebnissicherung sind die häufigsten Zeitfresser."},{"id":"M-IK-021","f":3,"sub":"Kommunikation","t":"mc","q":"Worin unterscheiden sich synchrone und asynchrone Kommunikation?","o":[{"t":"Synchron erfolgt gleichzeitig (z. B. Telefon), asynchron zeitversetzt (z. B. E-Mail)","ok":1},{"t":"Beide sind identisch"},{"t":"Asynchron ist immer schneller"},{"t":"Synchron hat keinen Empfänger"}],"e":"Synchrone Kommunikation findet in Echtzeit statt (Gespräch, Telefon, Videokonferenz) – sofortige Rückmeldung. Asynchrone Kommunikation ist zeitversetzt (E-Mail, Brief, Nachricht) – flexibel, aber ohne unmittelbares Feedback."},{"id":"M-IK-022","f":3,"sub":"Kommunikation","t":"mc","q":"Wann ist ein persönliches Gespräch der E-Mail vorzuziehen?","o":[{"t":"Bei heiklen, komplexen oder emotional bedeutsamen Themen, die schnelle Rückfragen erfordern","ok":1},{"t":"Bei der Weitergabe eines langen Dateianhangs"},{"t":"Wenn eine schriftliche Dokumentation nötig ist"},{"t":"Nie"}],"e":"Persönliche oder telefonische Gespräche eignen sich für sensible, missverständnisanfällige oder emotionale Themen, weil Tonfall und Körpersprache mitwirken und sofort geklärt werden kann. E-Mails passen für sachliche, dokumentationspflichtige oder umfangreiche Informationen."},{"id":"M-IK-023","f":3,"sub":"Kommunikation","t":"mc","q":"Welches Kriterium spricht für die Wahl der E-Mail als Kommunikationsmittel?","o":[{"t":"Der Bedarf an schriftlicher Dokumentation und das gleichzeitige Erreichen mehrerer Empfänger","ok":1},{"t":"Ein hochemotionales Konfliktgespräch"},{"t":"Der Wunsch nach sofortiger körpersprachlicher Rückmeldung"},{"t":"Eine vertrauliche mündliche Absprache"}],"e":"E-Mails sind vorteilhaft, wenn Informationen dokumentiert, an mehrere Empfänger verteilt oder mit Anhängen versehen werden sollen und keine sofortige Reaktion nötig ist. Für Konflikte und sehr sensible Themen sind sie ungeeignet."},{"id":"M-IK-024","f":3,"sub":"Kommunikation","t":"mc","q":"Wozu dient ein Intranet im Unternehmen?","o":[{"t":"Als internes Netzwerk zur Bereitstellung von Informationen und Anwendungen für die Mitarbeiter","ok":1},{"t":"Als öffentliche Webseite für Kunden"},{"t":"Als Buchführungssystem des Finanzamts"},{"t":"Als Werbeplattform im Internet"}],"e":"Das Intranet ist ein firmeninternes, geschütztes Netzwerk. Es stellt Informationen (Formulare, Richtlinien, News), Anwendungen und Dokumente zentral bereit und unterstützt die interne Kommunikation und Zusammenarbeit."},{"id":"M-IK-025","f":3,"sub":"Kommunikation","t":"mc","q":"Was ist eine häufige Ursache für Kommunikationsstörungen?","o":[{"t":"Unklare Formulierungen, fehlendes Feedback oder Störungen auf dem Übertragungsweg","ok":1},{"t":"Zu klare Sprache"},{"t":"Zu viel Feedback"},{"t":"Eine funktionierende Leitung"}],"e":"Missverständnisse entstehen durch mehrdeutige oder unklare Botschaften, unterschiedliche „Codes“ von Sender und Empfänger, fehlendes Feedback sowie äußere Störungen (Lärm, technische Probleme). Klarheit und Rückfragen beugen vor."},{"id":"M-IK-026","f":3,"sub":"Kommunikation","t":"mc","q":"Was ist der Vorteil einer klaren Bringschuld bei sicherheitsrelevanten Informationen?","o":[{"t":"Die Information erreicht sicher jeden Betroffenen, da sie aktiv zugestellt wird","ok":1},{"t":"Die Mitarbeiter müssen selbst suchen"},{"t":"Die Information bleibt geheim"},{"t":"Es entsteht kein Aufwand"}],"e":"Bei sicherheitsrelevanten Informationen (z. B. Gefahren, neue Vorschriften) ist die Bringschuld sinnvoll: Der Verantwortliche stellt sie aktiv zu (Unterweisung, direkte Ansprache), sodass sich niemand auf Unkenntnis berufen kann."},{"id":"M-IK-027","f":3,"sub":"Kommunikation","t":"mc","q":"Was versteht man unter „Feedback“ im Kommunikationsprozess?","o":[{"t":"Die Rückmeldung des Empfängers an den Sender darüber, wie die Nachricht angekommen ist","ok":1},{"t":"Die erste Nachricht des Senders"},{"t":"Eine Störung des Kanals"},{"t":"Die Verschlüsselung der Nachricht"}],"e":"Feedback schließt den Kommunikationskreis: Der Empfänger meldet zurück, ob und wie er die Botschaft verstanden hat. Erst dadurch kann der Sender Missverständnisse erkennen und korrigieren."},{"id":"M-IK-028","f":3,"sub":"Kommunikation","t":"mc","q":"Welche Informationsquelle gilt als „intern“?","o":[{"t":"Betriebliche Statistiken und Berichte aus dem eigenen Unternehmen","ok":1},{"t":"Ein Fachartikel in einer Zeitschrift"},{"t":"Statistiken des Statistischen Bundesamts"},{"t":"Ein Wettbewerberprospekt"}],"e":"Interne Informationsquellen stammen aus dem Unternehmen selbst (z. B. Buchhaltung, BDE, Berichte, Statistiken). Externe Quellen kommen von außen (Ämter, Verbände, Fachliteratur, Internet, Wettbewerber)."},{"id":"M-IK-029","f":3,"sub":"Kommunikation","t":"mc","q":"Was ist ein Nachteil rein informeller Kommunikation für die Informationsqualität?","o":[{"t":"Informationen können unvollständig, verzerrt oder unbestätigt (Gerüchte) sein","ok":1},{"t":"Sie ist zu langsam"},{"t":"Sie ist immer schriftlich dokumentiert"},{"t":"Sie erreicht niemanden"}],"e":"Über informelle Kanäle verbreiten sich Informationen zwar schnell, aber oft unkontrolliert und verändert (Stille-Post-Effekt). Wichtige und verbindliche Informationen sollten daher über offizielle Wege abgesichert werden."},{"id":"M-IK-030","f":3,"sub":"Kommunikation","t":"mc","q":"Was sollte am Ende einer Besprechung stehen?","o":[{"t":"Eine Zusammenfassung der Ergebnisse und ein Maßnahmenplan (Wer, Was, Bis wann)","ok":1},{"t":"Eine neue, ungeklärte Grundsatzdebatte"},{"t":"Das Verteilen von Werbegeschenken"},{"t":"Ein abrupter Abbruch ohne Ergebnis"}],"e":"Zum Abschluss werden die Ergebnisse zusammengefasst und offene Aufgaben mit Verantwortlichen und Terminen festgehalten. Das schafft Verbindlichkeit und ist Grundlage für die Nachverfolgung."},{"id":"M-IK-031","f":3,"sub":"Kommunikation","t":"open","q":"Erläutern Sie das Sender-Empfänger-Modell und nennen Sie mögliche Ursachen für Kommunikationsstörungen.","a":"Im Sender-Empfänger-Modell möchte ein Sender eine Botschaft übermitteln. Er kodiert seinen Gedanken in Zeichen (Sprache, Schrift, Körpersprache) und sendet die Nachricht über einen Kanal (Medium) an den Empfänger. Dieser dekodiert die Zeichen, legt sie also aus und versteht eine Botschaft. Über das Feedback meldet der Empfänger zurück, wie die Nachricht angekommen ist, sodass der Sender Missverständnisse erkennen kann. Störungen können an vielen Stellen auftreten: Der Sender formuliert unklar oder mehrdeutig; Sender und Empfänger benutzen unterschiedliche „Codes“ (Fachsprache, Sprachniveau, kultureller Hintergrund); der Kanal ist gestört (Lärm, technische Probleme, schlechte Verbindung); der Empfänger hört unaufmerksam zu oder interpretiert die Nachricht anders als gemeint (z. B. sachliche Aussage als persönlicher Angriff). Fehlt zudem das Feedback, bleiben Missverständnisse unbemerkt. Vorbeugen kann man durch klare Sprache, empfängergerechte Formulierung, aktives Zuhören und Rückfragen.","e":"Kern: Sender → kodieren → Kanal → Empfänger → dekodieren → Feedback. Störquellen: unklare Botschaft, unterschiedliche Codes, Kanalstörungen, unaufmerksamer Empfänger, fehlendes Feedback."},{"id":"M-IK-032","f":3,"sub":"Kommunikation","t":"open","q":"Erläutern Sie das Vier-Seiten-Modell (Vier-Ohren-Modell) von Schulz von Thun anhand eines Beispiels.","a":"Nach dem Vier-Seiten-Modell von Schulz von Thun enthält jede Nachricht gleichzeitig vier Botschaften: (1) Sachinhalt – die reine Sachinformation (Worüber informiere ich?). (2) Selbstoffenbarung – was der Sender von sich preisgibt (Was ist mit mir?). (3) Beziehung – wie der Sender zum Empfänger steht (Was halte ich von dir, wie stehen wir zueinander?). (4) Appell – wozu der Sender den Empfänger bewegen möchte (Was soll der andere tun?). Der Empfänger kann mit „vier Ohren“ hören und eine andere Seite betonen als gemeint. Beispiel: Ein Meister sagt zum Mitarbeiter „Das Fahrzeug ist noch nicht beladen.“ Sachinhalt: Das Fahrzeug ist leer. Selbstoffenbarung: Der Meister hat den Ablauf im Blick / ist in Sorge um den Termin. Beziehung: je nach Tonfall Wertschätzung oder Kritik. Appell: „Beladen Sie es bitte jetzt.“ Hört der Mitarbeiter vor allem auf dem Beziehungsohr, kann er die sachliche Feststellung als Vorwurf missverstehen. Missverständnisse lassen sich durch klare Formulierung, passenden Tonfall und Rückfragen vermeiden.","e":"Vier Seiten: Sachinhalt, Selbstoffenbarung, Beziehung, Appell. Der Empfänger kann eine andere Seite „hören“ als gemeint – das ist eine häufige Quelle von Missverständnissen."},{"id":"M-IK-033","f":3,"sub":"Kommunikation","t":"open","q":"Nennen Sie die Schritte einer gut vorbereiteten Besprechung von der Vorbereitung bis zur Nachbereitung.","a":"Vorbereitung: Zunächst wird das Ziel der Besprechung festgelegt (Was soll erreicht werden?). Dann werden die richtigen Teilnehmer bestimmt, eine Tagesordnung mit Themen und Zeitrahmen erstellt und rechtzeitig eine Einladung mit Ort, Zeit und Themen versandt; nötige Unterlagen werden beigefügt. Durchführung: Die Besprechung beginnt pünktlich; eine Moderation führt durch die Tagesordnung, achtet auf Zeitdisziplin und Zielorientierung, bindet die Teilnehmer ein und sorgt dafür, dass beim Thema geblieben wird. Ergebnissicherung: Beschlüsse und Aufgaben werden festgehalten – wer macht was bis wann – und in einem (meist Ergebnis-)Protokoll dokumentiert. Abschluss: Die Ergebnisse werden zusammengefasst und der nächste Schritt bzw. Termin benannt. Nachbereitung: Das Protokoll wird zeitnah an die Teilnehmer verteilt, die vereinbarten Maßnahmen werden umgesetzt und ihre Erledigung nachverfolgt (Follow-up).","e":"Ablauf: Ziel/Tagesordnung/Einladung (Vorbereitung) → Moderation und Zeitdisziplin (Durchführung) → Protokoll mit Maßnahmen (Ergebnissicherung) → Verteilen und Nachverfolgen (Nachbereitung)."},{"id":"M-IK-034","f":3,"sub":"Kommunikation","t":"mc","q":"Was besagt das Watzlawick-Axiom zur „Interpunktion“ von Kommunikationsabläufen?","o":[{"t":"Jeder Partner setzt subjektiv Anfang und Ursache/Wirkung anders – das kann zu Konflikten führen","ok":1},{"t":"Kommunikation hat keinen Anfang"},{"t":"Nur der Sender bestimmt den Ablauf"},{"t":"Interpunktion betrifft nur Satzzeichen"}],"e":"Nach Watzlawick gliedert jeder Beteiligte den Kommunikationsablauf für sich in Ursache und Wirkung (Interpunktion). Wenn beide unterschiedlich „interpunktieren“ (z. B. „Ich ziehe mich zurück, weil du nörgelst“ vs. „Ich nörgle, weil du dich zurückziehst“), entstehen Teufelskreise und Konflikte."},{"id":"M-IK-035","f":3,"sub":"Kommunikation","t":"mc","q":"Warum ist es sinnvoll, empfängergerecht zu kommunizieren?","o":[{"t":"Weil die Botschaft nur wirkt, wenn sie an Vorwissen, Sprache und Erwartungen des Empfängers angepasst ist","ok":1},{"t":"Weil der Empfänger keine Rolle spielt"},{"t":"Weil Fachsprache immer verstanden wird"},{"t":"Weil es die Umsatzsteuer senkt"}],"e":"Erfolgreiche Kommunikation richtet sich nach dem Empfänger: Sprache, Detailtiefe und Beispiele müssen zu dessen Vorwissen und Erwartungen passen. Zu viel Fachjargon oder falsches Niveau führen zu Unverständnis und Missverständnissen."},{"id":"M-DV-001","f":3,"sub":"EDV","t":"mc","q":"Wofür steht das EVA-Prinzip in der Datenverarbeitung?","o":[{"t":"Eingabe – Verarbeitung – Ausgabe","ok":1},{"t":"Erfassen – Verwalten – Archivieren"},{"t":"Einkauf – Verkauf – Absatz"},{"t":"Entwickeln – Vertreiben – Anwenden"}],"e":"Das EVA-Prinzip beschreibt den grundlegenden Ablauf der elektronischen Datenverarbeitung: Daten werden eingegeben, verarbeitet und als Ergebnis ausgegeben (oft ergänzt um die Speicherung)."},{"id":"M-DV-002","f":3,"sub":"EDV","t":"mc","q":"Welches Gerät ist ein Eingabegerät?","o":[{"t":"Die Tastatur","ok":1},{"t":"Der Monitor"},{"t":"Der Drucker"},{"t":"Der Lautsprecher"}],"e":"Eingabegeräte (Tastatur, Maus, Scanner, Mikrofon) übermitteln Daten an den Rechner. Monitor, Drucker und Lautsprecher sind Ausgabegeräte, die Ergebnisse ausgeben."},{"id":"M-DV-003","f":3,"sub":"EDV","t":"mc","q":"Welche Aufgabe hat die CPU (Prozessor)?","o":[{"t":"Sie steuert den Rechner und führt die Rechen- und Verarbeitungsoperationen aus","ok":1},{"t":"Sie speichert Daten dauerhaft"},{"t":"Sie zeigt Bilder an"},{"t":"Sie druckt Dokumente"}],"e":"Die CPU (Central Processing Unit) ist das „Gehirn“ des Computers: Sie steuert die Abläufe und verarbeitet die Daten (Rechen- und Steuerwerk). Sie ist Teil der Verarbeitungseinheit."},{"id":"M-DV-004","f":3,"sub":"EDV","t":"mc","q":"Was ist typisch für den Arbeitsspeicher (RAM)?","o":[{"t":"Er ist ein schneller, flüchtiger Speicher – die Daten gehen beim Ausschalten verloren","ok":1},{"t":"Er speichert Daten dauerhaft"},{"t":"Er ist ein Eingabegerät"},{"t":"Er ersetzt die Festplatte dauerhaft"}],"e":"Das RAM (Random Access Memory) hält Programme und Daten während der Nutzung bereit. Es ist sehr schnell, aber flüchtig: Ohne Strom gehen die Inhalte verloren. Dauerhafte Speicherung übernehmen Festplatte/SSD."},{"id":"M-DV-005","f":3,"sub":"EDV","t":"mc","q":"Worin unterscheiden sich flüchtige und nicht flüchtige Speicher?","o":[{"t":"Flüchtige Speicher (RAM) verlieren die Daten ohne Strom, nicht flüchtige (SSD/Festplatte) behalten sie","ok":1},{"t":"Beide verlieren die Daten"},{"t":"Nicht flüchtige Speicher sind immer schneller"},{"t":"Es gibt keinen Unterschied"}],"e":"Flüchtiger Speicher (RAM) benötigt Strom, um Daten zu halten. Nicht flüchtige Speicher (SSD, Festplatte, USB-Stick) bewahren die Daten auch ohne Stromversorgung – daher dienen sie der dauerhaften Speicherung."},{"id":"M-DV-006","f":3,"sub":"EDV","t":"mc","q":"Worin unterscheiden sich Systemsoftware und Anwendungssoftware?","o":[{"t":"Systemsoftware (z. B. Betriebssystem) steuert den Rechner, Anwendungssoftware löst Aufgaben des Nutzers","ok":1},{"t":"Beide sind identisch"},{"t":"Anwendungssoftware steuert die Hardware"},{"t":"Systemsoftware ist nur ein Spiel"}],"e":"Systemsoftware (v. a. das Betriebssystem) verwaltet die Hardware und schafft die Arbeitsgrundlage. Anwendungssoftware (Textverarbeitung, Tabellenkalkulation, ERP …) dient der Erledigung konkreter Nutzeraufgaben."},{"id":"M-DV-007","f":3,"sub":"EDV","t":"mc","q":"Welche Aufgabe hat ein Betriebssystem?","o":[{"t":"Es verwaltet die Hardware und Ressourcen und stellt die Schnittstelle zwischen Nutzer und Rechner bereit","ok":1},{"t":"Es berechnet die Umsatzsteuer"},{"t":"Es ist ein Tabellenkalkulationsprogramm"},{"t":"Es druckt automatisch alle Dateien"}],"e":"Das Betriebssystem (z. B. Windows, Linux, macOS) steuert und verwaltet Prozessor, Speicher, Geräte und Dateien, führt Programme aus und bietet dem Nutzer eine Bedienoberfläche."},{"id":"M-DV-008","f":3,"sub":"EDV","t":"mc","q":"Wofür wird eine Tabellenkalkulation (z. B. Excel) typischerweise eingesetzt?","o":[{"t":"Zur Berechnung, Auswertung und grafischen Darstellung von Zahlen in Zeilen und Spalten","ok":1},{"t":"Zur reinen Textverarbeitung von Briefen"},{"t":"Zum Steuern der Hardware"},{"t":"Zur Bildbearbeitung"}],"e":"Tabellenkalkulationen organisieren Daten in Zellen (Zeilen/Spalten), rechnen mit Formeln und Funktionen, führen Analysen durch und erstellen Diagramme – ideal für Kalkulationen, Auswertungen und Kennzahlen."},{"id":"M-DV-009","f":3,"sub":"EDV","t":"mc","q":"Womit beginnt in einer Tabellenkalkulation eine Formel?","o":[{"t":"Mit einem Gleichheitszeichen (=)","ok":1},{"t":"Mit einem Doppelpunkt (:)"},{"t":"Mit einem Stern (*)"},{"t":"Mit einem Fragezeichen (?)"}],"e":"Eine Formel wird mit „=“ eingeleitet (z. B. =A1+B1 oder =SUMME(A1:A10)). Erst dadurch erkennt das Programm, dass gerechnet und nicht nur Text angezeigt werden soll."},{"id":"M-DV-010","f":3,"sub":"EDV","t":"mc","q":"Worin unterscheiden sich relativer und absoluter Zellbezug?","o":[{"t":"Ein relativer Bezug passt sich beim Kopieren an, ein absoluter (mit $) bleibt fest","ok":1},{"t":"Beide sind identisch"},{"t":"Der absolute Bezug ändert sich immer"},{"t":"Relative Bezüge sind verboten"}],"e":"Relative Bezüge (z. B. A1) verschieben sich beim Kopieren mit. Absolute Bezüge werden mit Dollarzeichen fixiert ($A$1) und bleiben beim Kopieren unverändert – wichtig z. B. für einen festen Faktor oder Zinssatz."},{"id":"M-DV-011","f":3,"sub":"EDV","t":"mc","q":"Welche Funktion berechnet in einer Tabellenkalkulation den Durchschnitt?","o":[{"t":"MITTELWERT","ok":1},{"t":"SUMME"},{"t":"WENN"},{"t":"ANZAHL"}],"e":"MITTELWERT (bzw. AVERAGE) berechnet das arithmetische Mittel eines Bereichs. SUMME addiert, ANZAHL zählt Werte, WENN prüft eine Bedingung und gibt je nach Ergebnis unterschiedliche Werte aus."},{"id":"M-DV-012","f":3,"sub":"EDV","t":"mc","q":"Wozu dient die WENN-Funktion in der Tabellenkalkulation?","o":[{"t":"Zur Auswertung einer Bedingung mit zwei möglichen Ergebnissen (dann/sonst)","ok":1},{"t":"Zum Addieren von Zahlen"},{"t":"Zum Sortieren von Text"},{"t":"Zum Drucken der Tabelle"}],"e":"Die WENN-Funktion (=WENN(Bedingung; Wert_wenn_wahr; Wert_wenn_falsch)) prüft eine Bedingung und gibt je nach Ergebnis den einen oder anderen Wert zurück – z. B. „bestanden“/„nicht bestanden“."},{"id":"M-DV-013","f":3,"sub":"EDV","t":"mc","q":"Was ist ein Datensatz in einer Datenbank?","o":[{"t":"Die Gesamtheit der zusammengehörenden Daten eines Objekts (eine Zeile der Tabelle)","ok":1},{"t":"Eine einzelne Spalte"},{"t":"Der Name der Datenbank"},{"t":"Ein Diagramm"}],"e":"Ein Datensatz (Zeile) fasst alle Informationen zu einem Objekt zusammen (z. B. ein Kunde mit Nummer, Name, Adresse). Ein Datenfeld (Spalte) enthält eine einzelne Eigenschaft (z. B. „Name“)."},{"id":"M-DV-014","f":3,"sub":"EDV","t":"mc","q":"Welche Aufgabe hat der Primärschlüssel in einer Datenbanktabelle?","o":[{"t":"Er identifiziert jeden Datensatz eindeutig","ok":1},{"t":"Er verschlüsselt die Datenbank"},{"t":"Er löscht doppelte Diagramme"},{"t":"Er bestimmt die Schriftart"}],"e":"Der Primärschlüssel (z. B. Kundennummer) ist ein eindeutiges Merkmal, das jeden Datensatz unverwechselbar kennzeichnet. Er verhindert Dubletten und ermöglicht Beziehungen zwischen Tabellen (relationale Datenbank)."},{"id":"M-DV-015","f":3,"sub":"EDV","t":"mc","q":"Wozu dient eine Abfrage (Query) in einer Datenbank?","o":[{"t":"Zum gezielten Herausfiltern und Auswerten von Daten nach bestimmten Kriterien","ok":1},{"t":"Zum Ausschalten des Rechners"},{"t":"Zum Drucken des Betriebssystems"},{"t":"Zum Verschlüsseln von Passwörtern"}],"e":"Mit einer Abfrage werden aus (großen) Datenbeständen gezielt die gewünschten Datensätze nach Kriterien ausgewählt, sortiert und ausgewertet – z. B. „alle Kunden aus Region X mit Umsatz über Y“."},{"id":"M-DV-016","f":3,"sub":"EDV","t":"mc","q":"Wofür steht die Abkürzung LAN?","o":[{"t":"Local Area Network – ein räumlich begrenztes (lokales) Netzwerk","ok":1},{"t":"Long Access Node"},{"t":"Large Application Number"},{"t":"Logic And Number"}],"e":"Ein LAN (Local Area Network) verbindet Geräte in einem begrenzten Bereich (z. B. Gebäude, Standort). Ein WAN (Wide Area Network) verbindet dagegen räumlich weit entfernte Netze (z. B. über das Internet)."},{"id":"M-DV-017","f":3,"sub":"EDV","t":"mc","q":"Was kennzeichnet eine Client-Server-Architektur?","o":[{"t":"Ein zentraler Server stellt Dienste/Daten bereit, die von mehreren Clients genutzt werden","ok":1},{"t":"Jeder Rechner arbeitet völlig isoliert"},{"t":"Es gibt keine Server"},{"t":"Nur ein einzelner Rechner ist beteiligt"}],"e":"Im Client-Server-Modell hält der Server zentrale Ressourcen bereit (Dateien, Datenbanken, Anwendungen, Druckdienste), die die Clients (Arbeitsplätze) anfordern. Vorteile sind zentrale Verwaltung, Datensicherung und Rechtevergabe."},{"id":"M-DV-018","f":3,"sub":"EDV","t":"mc","q":"Worin unterscheiden sich Internet, Intranet und Extranet?","o":[{"t":"Internet ist öffentlich, Intranet firmenintern, Extranet ein für ausgewählte Externe geöffneter Bereich","ok":1},{"t":"Alle drei sind öffentlich"},{"t":"Intranet ist für jeden zugänglich"},{"t":"Extranet ist rein privat und nicht vernetzt"}],"e":"Das Internet ist das weltweite, öffentliche Netz. Das Intranet ist ein geschütztes, firmeninternes Netz. Das Extranet erweitert das Intranet für bestimmte externe Partner (z. B. Lieferanten, Kunden) mit kontrolliertem Zugang."},{"id":"M-DV-019","f":3,"sub":"EDV","t":"mc","q":"Was versteht man unter Cloud Computing?","o":[{"t":"Die Nutzung von IT-Ressourcen (Speicher, Software, Rechenleistung) über das Internet als Dienstleistung","ok":1},{"t":"Das Speichern von Daten nur auf dem eigenen PC"},{"t":"Ein Wetterdienst"},{"t":"Ein reines Textprogramm"}],"e":"Beim Cloud Computing werden IT-Leistungen bedarfsgerecht über das Internet bezogen (z. B. Onlinespeicher, Software as a Service). Vorteile: Flexibilität, ortsunabhängiger Zugriff, keine eigene Infrastruktur; zu beachten sind Datenschutz und Abhängigkeit vom Anbieter."},{"id":"M-DV-020","f":3,"sub":"EDV","t":"mc","q":"Welcher Aspekt ist beim Einsatz von Cloud-Diensten besonders kritisch zu prüfen?","o":[{"t":"Datenschutz, Datensicherheit und der Speicherort der Daten","ok":1},{"t":"Die Farbe der Benutzeroberfläche"},{"t":"Die Schriftgröße"},{"t":"Der Name des Anbieters"}],"e":"Da Daten außer Haus gespeichert werden, sind Datenschutz (v. a. bei personenbezogenen Daten, DSGVO), Datensicherheit, Verfügbarkeit und der geografische Speicherort (Serverstandort/Drittland) sorgfältig zu prüfen."},{"id":"M-DV-021","f":3,"sub":"EDV","t":"mc","q":"Worin unterscheiden sich Datenschutz und Datensicherheit?","o":[{"t":"Datenschutz schützt personenbezogene Daten (Persönlichkeitsrecht), Datensicherheit schützt alle Daten technisch/organisatorisch vor Verlust und Missbrauch","ok":1},{"t":"Beide bedeuten dasselbe"},{"t":"Datenschutz betrifft nur Maschinen"},{"t":"Datensicherheit betrifft nur Werbung"}],"e":"Datenschutz zielt auf den Schutz personenbezogener Daten und das Recht auf informationelle Selbstbestimmung (rechtlich, DSGVO/BDSG). Datensicherheit umfasst die technischen und organisatorischen Maßnahmen, um alle Daten vor Verlust, Manipulation und unbefugtem Zugriff zu schützen."},{"id":"M-DV-022","f":3,"sub":"EDV","t":"mc","q":"Welche drei Schutzziele stehen im Mittelpunkt der Datensicherheit?","o":[{"t":"Vertraulichkeit, Integrität und Verfügbarkeit","ok":1},{"t":"Schnelligkeit, Farbe und Größe"},{"t":"Umsatz, Gewinn und Rentabilität"},{"t":"Eingabe, Verarbeitung und Ausgabe"}],"e":"Die klassischen Schutzziele (VIV/CIA) sind Vertraulichkeit (nur Berechtigte haben Zugriff), Integrität (Daten sind korrekt und unverändert) und Verfügbarkeit (Daten sind bei Bedarf nutzbar)."},{"id":"M-DV-023","f":3,"sub":"EDV","t":"mc","q":"Was bedeutet das Schutzziel „Integrität“?","o":[{"t":"Daten sind korrekt, vollständig und vor unbemerkter Veränderung geschützt","ok":1},{"t":"Daten sind für jeden zugänglich"},{"t":"Daten sind möglichst schnell"},{"t":"Daten werden gelöscht"}],"e":"Integrität bedeutet, dass Daten richtig und unverändert bleiben und Manipulationen erkannt werden. Verletzt wäre sie z. B. durch unbemerktes Ändern von Datensätzen oder Übertragungsfehler."},{"id":"M-DV-024","f":3,"sub":"EDV","t":"mc","q":"Wozu dient eine Datensicherung (Backup)?","o":[{"t":"Zur Wiederherstellung von Daten nach Verlust (z. B. durch Defekt, Löschung, Angriff)","ok":1},{"t":"Zur Beschleunigung des Rechners"},{"t":"Zum Drucken von Dokumenten"},{"t":"Zur Bildbearbeitung"}],"e":"Ein Backup ist eine Sicherungskopie der Daten. Geht das Original durch Hardwaredefekt, versehentliches Löschen, Diebstahl oder Schadsoftware verloren, lässt sich der Datenbestand aus dem Backup wiederherstellen."},{"id":"M-DV-025","f":3,"sub":"EDV","t":"mc","q":"Was besagt die 3-2-1-Regel der Datensicherung?","o":[{"t":"Drei Kopien der Daten auf zwei verschiedenen Medien, davon eine an einem anderen Ort","ok":1},{"t":"Drei Passwörter, zwei Nutzer, ein Server"},{"t":"Drei Backups pro Stunde"},{"t":"Zwei Kopien, ein Passwort"}],"e":"Die 3-2-1-Regel empfiehlt: mindestens 3 Kopien der Daten, auf 2 unterschiedlichen Speichermedien, und 1 Kopie räumlich getrennt (extern/offsite). So bleibt bei lokalem Schaden (Brand, Diebstahl) eine Sicherung erhalten."},{"id":"M-DV-026","f":3,"sub":"EDV","t":"mc","q":"Warum sollte mindestens eine Sicherungskopie räumlich getrennt aufbewahrt werden?","o":[{"t":"Damit bei Ereignissen wie Brand, Wasser oder Diebstahl am Standort nicht alle Kopien zerstört werden","ok":1},{"t":"Weil das schneller ist"},{"t":"Weil es gesetzlich verboten ist, sie am selben Ort zu lagern"},{"t":"Aus Platzgründen"}],"e":"Läge die Sicherung am selben Ort wie das Original, würden Brand, Wasserschaden oder Diebstahl beide vernichten. Eine externe (offsite) Kopie – z. B. in einem anderen Gebäude oder in der Cloud – schützt vor solchen Standortschäden."},{"id":"M-DV-027","f":3,"sub":"EDV","t":"mc","q":"Worin unterscheidet sich eine Voll- von einer inkrementellen Datensicherung?","o":[{"t":"Die Vollsicherung kopiert alle Daten, die inkrementelle nur die seit der letzten Sicherung geänderten","ok":1},{"t":"Beide kopieren immer alles"},{"t":"Die inkrementelle Sicherung ist immer größer"},{"t":"Es gibt keinen Unterschied"}],"e":"Die Vollsicherung kopiert den gesamten Bestand (aufwendig, aber einfach wiederherstellbar). Die inkrementelle Sicherung erfasst nur die seit der letzten (Voll- oder inkrementellen) Sicherung geänderten Daten – schneller und speichersparender, aber die Wiederherstellung ist komplexer."},{"id":"M-DV-028","f":3,"sub":"EDV","t":"mc","q":"Wozu dient die Verschlüsselung von Daten?","o":[{"t":"Daten so umzuwandeln, dass nur Berechtigte mit dem passenden Schlüssel sie lesen können","ok":1},{"t":"Daten schneller zu übertragen"},{"t":"Daten zu löschen"},{"t":"Daten bunt darzustellen"}],"e":"Verschlüsselung wandelt lesbare Daten in einen für Unbefugte unlesbaren Code um. Nur mit dem richtigen Schlüssel lassen sie sich wieder entschlüsseln. Sie schützt die Vertraulichkeit – bei Speicherung und Übertragung (z. B. HTTPS/TLS)."},{"id":"M-DV-029","f":3,"sub":"EDV","t":"mc","q":"Woran erkennt man eine verschlüsselte (gesicherte) Verbindung im Webbrowser?","o":[{"t":"An „https://“ bzw. dem Schloss-Symbol","ok":1},{"t":"An „http://“ ohne Schloss"},{"t":"An einer roten Schrift"},{"t":"An der Dateigröße"}],"e":"Eine mit TLS/SSL verschlüsselte Verbindung zeigt sich durch „https://“ und ein Schloss-Symbol. Die Daten zwischen Browser und Server werden verschlüsselt übertragen – wichtig z. B. bei Anmeldungen und Zahlungen."},{"id":"M-DV-030","f":3,"sub":"EDV","t":"mc","q":"Was kennzeichnet ein sicheres Passwort?","o":[{"t":"Ausreichende Länge sowie eine Mischung aus Groß-/Kleinbuchstaben, Ziffern und Sonderzeichen","ok":1},{"t":"Der eigene Vorname"},{"t":"„123456“"},{"t":"Das Wort „passwort“"}],"e":"Sichere Passwörter sind lang und komplex (Buchstaben in beiden Schreibweisen, Ziffern, Sonderzeichen), enthalten keine leicht erratbaren Begriffe (Namen, Geburtsdaten) und werden nicht mehrfach verwendet. Passphrasen sind eine gute Alternative."},{"id":"M-DV-031","f":3,"sub":"EDV","t":"mc","q":"Was ist die Zwei-Faktor-Authentifizierung (2FA)?","o":[{"t":"Eine Anmeldung mit zwei unabhängigen Nachweisen (z. B. Passwort plus Code aufs Handy)","ok":1},{"t":"Zwei Passwörter hintereinander"},{"t":"Zweimaliges Anklicken des Anmeldeknopfes"},{"t":"Zwei Benutzernamen"}],"e":"Bei der 2FA wird die Identität durch zwei verschiedene Faktoren bestätigt – etwas, das man weiß (Passwort), und etwas, das man hat/ist (Einmalcode, Token, Fingerabdruck). Selbst bei gestohlenem Passwort bleibt der Zugang so geschützt."},{"id":"M-DV-032","f":3,"sub":"EDV","t":"mc","q":"Wozu dient ein Berechtigungskonzept (Zugriffsrechte)?","o":[{"t":"Jeder Nutzer erhält nur die Zugriffsrechte, die er für seine Aufgabe benötigt","ok":1},{"t":"Alle Nutzer haben Zugriff auf alles"},{"t":"Niemand darf auf Daten zugreifen"},{"t":"Es regelt die Schriftgröße"}],"e":"Nach dem Prinzip der minimalen Rechte erhält jeder nur die für seine Tätigkeit nötigen Zugriffe (Lesen/Ändern/Löschen). Das begrenzt Schäden durch Fehler oder Missbrauch und schützt sensible Daten."},{"id":"M-DV-033","f":3,"sub":"EDV","t":"mc","q":"Was ist Schadsoftware (Malware)?","o":[{"t":"Programme, die Schaden anrichten sollen (z. B. Viren, Würmer, Trojaner, Ransomware)","ok":1},{"t":"Ein Tabellenkalkulationsprogramm"},{"t":"Ein Betriebssystem"},{"t":"Ein Sicherungslaufwerk"}],"e":"Malware ist ein Sammelbegriff für schädliche Programme: Viren (verbreiten sich über Wirtsdateien), Würmer (verbreiten sich selbstständig über Netze), Trojaner (getarnte Schadprogramme) und Ransomware (Erpressung durch Datenverschlüsselung)."},{"id":"M-DV-034","f":3,"sub":"EDV","t":"mc","q":"Was ist charakteristisch für Ransomware (Erpressungstrojaner)?","o":[{"t":"Sie verschlüsselt Daten und fordert Lösegeld für die Freigabe","ok":1},{"t":"Sie beschleunigt den Rechner"},{"t":"Sie sichert automatisch alle Daten"},{"t":"Sie ist ein legales Backup-Programm"}],"e":"Ransomware verschlüsselt die Daten des Opfers und verlangt für die Entschlüsselung ein Lösegeld. Bester Schutz sind aktuelle Backups (offline), Updates, Vorsicht bei Anhängen/Links und Virenschutz – nicht die Zahlung des Lösegelds."},{"id":"M-DV-035","f":3,"sub":"EDV","t":"mc","q":"Was versteht man unter Phishing?","o":[{"t":"Das Erschleichen vertraulicher Daten über gefälschte E-Mails/Webseiten","ok":1},{"t":"Das Sichern von Daten"},{"t":"Das Verschlüsseln von Festplatten"},{"t":"Eine Datenbankabfrage"}],"e":"Beim Phishing geben sich Angreifer über täuschend echte E-Mails oder Webseiten als vertrauenswürdig aus, um Zugangsdaten, Passwörter oder Bankdaten zu „angeln“. Misstrauen bei Links/Anhängen und die Prüfung der Absenderadresse schützen davor."},{"id":"M-DV-036","f":3,"sub":"EDV","t":"mc","q":"Was ist „Social Engineering“?","o":[{"t":"Das gezielte Ausnutzen menschlichen Verhaltens (Vertrauen, Hilfsbereitschaft), um an Informationen zu gelangen","ok":1},{"t":"Der Bau sozialer Netzwerke"},{"t":"Ein Verschlüsselungsverfahren"},{"t":"Eine Datensicherungsmethode"}],"e":"Beim Social Engineering manipulieren Angreifer Menschen (z. B. per Anruf als vermeintlicher IT-Support), um Passwörter oder Zugänge zu erhalten. Der „Faktor Mensch“ ist oft die größte Schwachstelle – Schulung und Sensibilisierung sind entscheidend."},{"id":"M-DV-037","f":3,"sub":"EDV","t":"mc","q":"Welche Aufgabe hat eine Firewall?","o":[{"t":"Sie kontrolliert den Datenverkehr zwischen Netzen und blockiert unerwünschte Zugriffe","ok":1},{"t":"Sie sichert Daten automatisch"},{"t":"Sie beschleunigt den Drucker"},{"t":"Sie erstellt Diagramme"}],"e":"Eine Firewall überwacht den ein- und ausgehenden Netzwerkverkehr nach festgelegten Regeln und blockiert unerlaubte Verbindungen. Sie schützt das interne Netz vor Angriffen von außen (ersetzt aber nicht den Virenschutz)."},{"id":"M-DV-038","f":3,"sub":"EDV","t":"mc","q":"Warum sind regelmäßige Software-Updates für die Sicherheit wichtig?","o":[{"t":"Weil sie bekannte Sicherheitslücken schließen, die sonst von Angreifern ausgenutzt werden können","ok":1},{"t":"Weil sie den Bildschirm heller machen"},{"t":"Weil sie die Schriftart ändern"},{"t":"Weil sie die Umsatzsteuer senken"}],"e":"Updates beseitigen entdeckte Schwachstellen in Betriebssystem und Programmen. Werden sie nicht eingespielt, bleiben bekannte Sicherheitslücken offen und werden von Schadsoftware und Angreifern gezielt ausgenutzt."},{"id":"M-DV-039","f":3,"sub":"EDV","t":"mc","q":"Wozu dient eine unterbrechungsfreie Stromversorgung (USV)?","o":[{"t":"Sie überbrückt kurzzeitige Stromausfälle und schützt so vor Datenverlust und Hardwareschäden","ok":1},{"t":"Sie verschlüsselt Daten"},{"t":"Sie beschleunigt das Internet"},{"t":"Sie ersetzt das Backup"}],"e":"Eine USV liefert bei Stromausfall für kurze Zeit Strom aus Akkus, sodass Systeme kontrolliert weiterlaufen oder geordnet heruntergefahren werden können. Das verhindert Datenverlust und Schäden an Servern – ein Baustein der Verfügbarkeit."},{"id":"M-DV-040","f":3,"sub":"EDV","t":"mc","q":"Welche Kriterien sind bei der Auswahl neuer EDV/Software wichtig?","o":[{"t":"Anforderungen/Bedarf, Kompatibilität, Kosten, Support, Sicherheit und Erweiterbarkeit","ok":1},{"t":"Nur die Farbe des Programms"},{"t":"Nur der Markenname"},{"t":"Ausschließlich der niedrigste Preis"}],"e":"Die Auswahl sollte sich am tatsächlichen Bedarf orientieren und Kompatibilität (zu vorhandenen Systemen), Anschaffungs- und Folgekosten, Support/Wartung, Datensicherheit, Benutzerfreundlichkeit und Zukunftsfähigkeit (Skalierbarkeit) berücksichtigen."},{"id":"M-DV-041","f":3,"sub":"EDV","t":"open","q":"Erläutern Sie den Unterschied zwischen Datenschutz und Datensicherheit.","a":"Datenschutz und Datensicherheit werden oft verwechselt, verfolgen aber unterschiedliche Ziele. Der Datenschutz befasst sich mit dem Schutz personenbezogener Daten und dem Recht des Einzelnen auf informationelle Selbstbestimmung. Er ist rechtlich geprägt (DSGVO, BDSG) und regelt, ob und wie personenbezogene Daten erhoben, verarbeitet und genutzt werden dürfen (z. B. Zweckbindung, Einwilligung, Betroffenenrechte). Die Datensicherheit umfasst dagegen alle technischen und organisatorischen Maßnahmen, um Daten – gleich welcher Art – vor Verlust, Manipulation und unbefugtem Zugriff zu schützen. Ihre Schutzziele sind Vertraulichkeit, Integrität und Verfügbarkeit; typische Maßnahmen sind Zugriffsrechte, Verschlüsselung, Backups, Firewalls und Virenschutz. Beide hängen zusammen: Guter Datenschutz setzt Datensicherheit voraus – ohne technische Sicherung lassen sich personenbezogene Daten nicht wirksam schützen.","e":"Merksatz: Datenschutz = rechtlicher Schutz personenbezogener Daten (Persönlichkeitsrecht); Datensicherheit = technisch-organisatorischer Schutz aller Daten (Vertraulichkeit, Integrität, Verfügbarkeit)."},{"id":"M-DV-042","f":3,"sub":"EDV","t":"open","q":"Nennen Sie die drei Schutzziele der Datensicherheit und erläutern Sie jedes kurz.","a":"Die drei klassischen Schutzziele der Datensicherheit sind: (1) Vertraulichkeit – Daten dürfen nur von dazu Berechtigten eingesehen oder genutzt werden; Unbefugte werden ausgeschlossen (z. B. durch Zugriffsrechte, Passwörter und Verschlüsselung). (2) Integrität – Daten müssen korrekt, vollständig und unverändert bleiben; unbemerkte oder unbefugte Änderungen sind zu verhindern bzw. erkennbar zu machen (z. B. durch Prüfsummen, Zugriffskontrollen). (3) Verfügbarkeit – die Daten und Systeme müssen dann funktionsfähig und nutzbar sein, wenn sie gebraucht werden; Ausfälle sind zu vermeiden (z. B. durch Backups, redundante Systeme und eine unterbrechungsfreie Stromversorgung). Diese Ziele werden mit VIV (bzw. englisch CIA) abgekürzt und bilden die Grundlage jedes Sicherheitskonzepts.","e":"VIV/CIA: Vertraulichkeit (nur Berechtigte), Integrität (korrekt/unverändert), Verfügbarkeit (bei Bedarf nutzbar)."},{"id":"M-DV-043","f":3,"sub":"EDV","t":"open","q":"Erläutern Sie die Bedeutung regelmäßiger Datensicherungen und beschreiben Sie die 3-2-1-Regel.","a":"Regelmäßige Datensicherungen (Backups) sind unverzichtbar, weil Daten jederzeit verloren gehen können – durch Hardwaredefekte, versehentliches Löschen, Diebstahl, Brand, Wasserschäden oder Angriffe mit Schadsoftware (z. B. Ransomware). Ohne aktuelle Sicherung sind solche Daten oft unwiederbringlich verloren, was den Betrieb erheblich stören kann. Ein Backup ermöglicht die Wiederherstellung und begrenzt den Schaden. Die 3-2-1-Regel gibt eine bewährte Faustregel für sichere Backups vor: Es sollten mindestens drei Kopien der Daten vorhanden sein (das Original und zwei Sicherungen), diese auf zwei verschiedenen Speichermedien (z. B. Festplatte und Cloud/Bandlaufwerk), und mindestens eine Kopie sollte räumlich getrennt (offsite) aufbewahrt werden. So bleibt selbst bei einem lokalen Totalschaden – etwa Brand oder Diebstahl am Standort – eine nutzbare Sicherung erhalten. Wichtig ist außerdem, die Wiederherstellung regelmäßig zu testen.","e":"3-2-1: 3 Kopien, 2 verschiedene Medien, 1 davon außer Haus. Backups schützen vor Datenverlust – die Rücksicherung sollte getestet werden."},{"id":"M-DV-044","f":3,"sub":"EDV","t":"open","q":"Welche organisatorischen und technischen Maßnahmen tragen zur IT-Sicherheit im Betrieb bei? Nennen Sie mindestens fünf.","a":"Zur IT-Sicherheit tragen sowohl technische als auch organisatorische Maßnahmen bei. Technisch: (1) aktueller Virenschutz und eine Firewall; (2) regelmäßige Software- und Sicherheitsupdates, um bekannte Lücken zu schließen; (3) Verschlüsselung sensibler Daten bei Speicherung und Übertragung (z. B. HTTPS/TLS); (4) regelmäßige Datensicherungen nach der 3-2-1-Regel, deren Rücksicherung getestet wird; (5) sichere Authentifizierung durch starke Passwörter und Zwei-Faktor-Authentifizierung; (6) eine unterbrechungsfreie Stromversorgung für kritische Systeme. Organisatorisch: (7) ein Berechtigungskonzept nach dem Prinzip der minimalen Rechte; (8) klare Richtlinien und die Schulung/Sensibilisierung der Mitarbeiter (u. a. gegen Phishing und Social Engineering); (9) Regelungen für den Umgang mit mobilen Geräten und Datenträgern; (10) Notfall- und Wiederanlaufpläne. Erst das Zusammenspiel von Technik, Organisation und aufmerksamen Mitarbeitern (Faktor Mensch) sorgt für wirksame Sicherheit.","e":"Wichtig ist die Kombination aus Technik (Virenschutz, Firewall, Updates, Verschlüsselung, Backup, 2FA) und Organisation (Rechtekonzept, Schulung, Richtlinien, Notfallpläne)."},{"id":"M-DV-045","f":3,"sub":"EDV","t":"mc","q":"Was ist der Vorteil einer zentralen Datenhaltung auf einem Server gegenüber lokalen Einzelkopien?","o":[{"t":"Einheitlicher, aktueller Datenbestand sowie zentrale Sicherung und Rechteverwaltung","ok":1},{"t":"Jeder arbeitet mit einer eigenen, womöglich veralteten Version"},{"t":"Es gibt keine Datensicherung"},{"t":"Die Daten sind für niemanden zugänglich"}],"e":"Bei zentraler Datenhaltung greifen alle Berechtigten auf denselben aktuellen Datenbestand zu (keine widersprüchlichen Versionen). Sicherung, Zugriffsrechte und Pflege erfolgen zentral, was Konsistenz und Sicherheit erhöht."},{"id":"R-AR-001","f":1,"sub":"Arbeitsrecht","t":"mc","q":"Welche Rangfolge der arbeitsrechtlichen Rechtsquellen ist zutreffend (von hoch nach niedrig)?","o":[{"t":"EU-Recht – Grundgesetz – Gesetze – Tarifvertrag – Betriebsvereinbarung – Arbeitsvertrag","ok":1},{"t":"Arbeitsvertrag – Betriebsvereinbarung – Tarifvertrag – Gesetze – Grundgesetz"},{"t":"Tarifvertrag – Gesetze – Grundgesetz – EU-Recht – Arbeitsvertrag"},{"t":"Betriebsvereinbarung – Arbeitsvertrag – Gesetze – Tarifvertrag"}],"e":"Die Normenpyramide reicht vom EU-Recht über GG und Gesetze zu Tarifvertrag, Betriebsvereinbarung und Arbeitsvertrag. Rangniedrigere Regelungen dürfen höherrangige nur zugunsten des Arbeitnehmers durchbrechen (Günstigkeitsprinzip)."},{"id":"R-AR-002","f":1,"sub":"Arbeitsrecht","t":"mc","q":"Was besagt das Günstigkeitsprinzip im Arbeitsrecht?","o":[{"t":"Eine rangniedrigere Regelung setzt sich durch, wenn sie für den Arbeitnehmer günstiger ist","ok":1},{"t":"Der Arbeitgeber darf stets die für ihn günstigste Regelung wählen"},{"t":"Das jeweils neueste Gesetz verdrängt alle älteren Regelungen"},{"t":"Tarifverträge gelten immer vor dem Gesetz"}],"e":"Das Günstigkeitsprinzip durchbricht das Rangprinzip: Weicht z. B. der Arbeitsvertrag zugunsten des Arbeitnehmers vom Tarifvertrag ab, gilt die günstigere Regelung."},{"id":"R-AR-003","f":1,"sub":"Arbeitsrecht","t":"mc","q":"Rechtlich handelt es sich beim Arbeitsvertrag um einen besonderen …","o":[{"t":"Dienstvertrag (§§ 611 ff. BGB)","ok":1},{"t":"Werkvertrag (§§ 631 ff. BGB)"},{"t":"Kaufvertrag (§§ 433 ff. BGB)"},{"t":"Auftrag (§§ 662 ff. BGB)"}],"e":"Der Arbeitsvertrag ist ein Unterfall des Dienstvertrags. Geschuldet wird die Tätigkeit (Dienst), nicht ein bestimmter Erfolg wie beim Werkvertrag."},{"id":"R-AR-004","f":1,"sub":"Arbeitsrecht","t":"mc","q":"Worin unterscheidet sich der Arbeitsvertrag (Dienstvertrag) vom Werkvertrag?","o":[{"t":"Beim Dienstvertrag wird die Tätigkeit geschuldet, beim Werkvertrag ein bestimmter Erfolg","ok":1},{"t":"Der Dienstvertrag schuldet einen Erfolg, der Werkvertrag nur Bemühen"},{"t":"Beide schulden denselben Leistungserfolg"},{"t":"Der Werkvertrag ist immer unbefristet"}],"e":"Der Dienstverpflichtete schuldet das Tätigwerden (das Bemühen), der Werkunternehmer dagegen das fertige Werk (den Erfolg)."},{"id":"R-AR-005","f":1,"sub":"Arbeitsrecht","t":"mc","q":"Worauf stützt sich das Weisungs-(Direktions-)recht des Arbeitgebers?","o":[{"t":"§ 106 GewO – nähere Bestimmung von Inhalt, Ort und Zeit der Arbeit nach billigem Ermessen","ok":1},{"t":"Allein auf das Grundgesetz"},{"t":"Ausschließlich auf den Tarifvertrag"},{"t":"Ein solches Recht existiert nicht"}],"e":"§ 106 GewO erlaubt dem Arbeitgeber, Inhalt, Ort und Zeit der Leistung zu konkretisieren, soweit nicht Vertrag, Tarif, Betriebsvereinbarung oder Gesetz entgegenstehen – und stets nur nach billigem Ermessen."},{"id":"R-AR-006","f":1,"sub":"Arbeitsrecht","t":"mc","q":"Welche Pflicht zählt zu den Hauptpflichten des Arbeitnehmers?","o":[{"t":"Die Arbeitsleistung persönlich zu erbringen","ok":1},{"t":"Die Zahlung des Arbeitsentgelts"},{"t":"Die Fürsorge für den Betrieb"},{"t":"Die Gewährung von Urlaub"}],"e":"Hauptpflicht des Arbeitnehmers ist die persönliche Arbeitsleistung; Hauptpflicht des Arbeitgebers ist die Entgeltzahlung. Treue- und Fürsorgepflicht sind Nebenpflichten."},{"id":"R-AR-007","f":1,"sub":"Arbeitsrecht","t":"mc","q":"Die Entgeltzahlung ist rechtlich die Hauptpflicht …","o":[{"t":"des Arbeitgebers","ok":1},{"t":"des Arbeitnehmers"},{"t":"des Betriebsrats"},{"t":"der Krankenkasse"}],"e":"Aus dem Arbeitsvertrag folgt als Hauptpflicht des Arbeitgebers die Zahlung des vereinbarten Entgelts (§ 611a Abs. 2 BGB)."},{"id":"R-AR-008","f":1,"sub":"Arbeitsrecht","t":"mc","q":"Welches Formerfordernis gilt nach § 623 BGB für eine Kündigung des Arbeitsverhältnisses?","o":[{"t":"Schriftform mit eigenhändiger Unterschrift; die elektronische Form ist ausgeschlossen","ok":1},{"t":"Mündliche Erklärung genügt"},{"t":"E-Mail oder Textform ist ausreichend"},{"t":"Kündigung ist formfrei möglich"}],"e":"§ 623 BGB verlangt für Kündigung und Auflösungsvertrag die Schriftform; eine Kündigung per E-Mail, Fax oder mündlich ist unwirksam."},{"id":"R-AR-009","f":1,"sub":"Arbeitsrecht","t":"mc","q":"Wie lautet die gesetzliche Grundkündigungsfrist nach § 622 Abs. 1 BGB?","o":[{"t":"Vier Wochen zum 15. oder zum Ende eines Kalendermonats","ok":1},{"t":"Zwei Wochen zum Wochenende"},{"t":"Ein Monat zum Quartalsende"},{"t":"Sechs Wochen zum Monatsende"}],"e":"Die Grundfrist beträgt vier Wochen (= 28 Tage) zum 15. oder zum Monatsende. Für den Arbeitgeber verlängert sie sich mit zunehmender Betriebszugehörigkeit."},{"id":"R-AR-010","f":1,"sub":"Arbeitsrecht","t":"mc","q":"Welche Kündigungsfrist muss der Arbeitgeber nach 5 Jahren Betriebszugehörigkeit einhalten (§ 622 II BGB)?","o":[{"t":"2 Monate zum Monatsende","ok":1},{"t":"1 Monat zum Monatsende"},{"t":"3 Monate zum Monatsende"},{"t":"4 Wochen zum 15."}],"e":"Staffelung des § 622 Abs. 2 BGB: nach 2 Jahren 1 Monat, nach 5 Jahren 2 Monate, nach 8 Jahren 3 Monate – jeweils zum Monatsende."},{"id":"R-AR-011","f":1,"sub":"Arbeitsrecht","t":"mc","q":"Wie lange ist die Kündigungsfrist des Arbeitgebers nach 10 Jahren Betriebszugehörigkeit?","o":[{"t":"4 Monate zum Monatsende","ok":1},{"t":"3 Monate zum Monatsende"},{"t":"5 Monate zum Monatsende"},{"t":"2 Monate zum Monatsende"}],"e":"§ 622 Abs. 2 BGB: nach 8 Jahren 3 Monate, nach 10 Jahren 4 Monate, nach 12 Jahren 5 Monate."},{"id":"R-AR-012","f":1,"sub":"Arbeitsrecht","t":"mc","q":"Welche Kündigungsfrist gilt für den Arbeitgeber nach 20 Jahren Betriebszugehörigkeit?","o":[{"t":"7 Monate zum Monatsende","ok":1},{"t":"6 Monate zum Monatsende"},{"t":"5 Monate zum Monatsende"},{"t":"8 Monate zum Monatsende"}],"e":"Die längste gesetzliche Stufe des § 622 Abs. 2 BGB: nach 15 Jahren 6 Monate, nach 20 Jahren 7 Monate zum Monatsende."},{"id":"R-AR-013","f":1,"sub":"Arbeitsrecht","t":"mc","q":"Welche Kündigungsfrist gilt während einer wirksam vereinbarten Probezeit (§ 622 III BGB)?","o":[{"t":"Zwei Wochen, ohne festen Endtermin","ok":1},{"t":"Vier Wochen zum Monatsende"},{"t":"Eine Woche"},{"t":"Kündigung ist ausgeschlossen"}],"e":"Innerhalb einer Probezeit von höchstens sechs Monaten kann mit einer Frist von zwei Wochen ohne festen Termin gekündigt werden."},{"id":"R-AR-014","f":1,"sub":"Arbeitsrecht","t":"mc","q":"Wie lange darf eine Probezeit höchstens dauern?","o":[{"t":"6 Monate","ok":1},{"t":"3 Monate"},{"t":"12 Monate"},{"t":"4 Wochen"}],"e":"Die gesetzliche Höchstdauer der Probezeit beträgt sechs Monate; sie deckt sich mit der Wartezeit für den allgemeinen Kündigungsschutz nach dem KSchG."},{"id":"R-AR-015","f":1,"sub":"Arbeitsrecht","t":"mc","q":"Gelten die verlängerten Kündigungsfristen des § 622 Abs. 2 BGB gesetzlich auch für eine Kündigung durch den Arbeitnehmer?","o":[{"t":"Nein – sie gelten gesetzlich nur für die Arbeitgeberkündigung; für den Arbeitnehmer bleibt es bei der Grundfrist, sofern nichts anderes vereinbart ist","ok":1},{"t":"Ja, sie gelten immer für beide Seiten"},{"t":"Nein, für den Arbeitnehmer gelten stets kürzere gesetzliche Stufen"},{"t":"Sie gelten nur für Auszubildende"}],"e":"Die Staffelung verlängert nur die Arbeitgeberfrist. Für den Arbeitnehmer bleibt es bei vier Wochen – vertraglich kann jedoch eine Gleichstellung vereinbart werden (nicht länger als für den Arbeitgeber)."},{"id":"R-AR-016","f":1,"sub":"Arbeitsrecht","t":"mc","q":"Innerhalb welcher Frist muss eine außerordentliche (fristlose) Kündigung nach Kenntnis des wichtigen Grundes erklärt werden?","o":[{"t":"Innerhalb von 2 Wochen (§ 626 II BGB)","ok":1},{"t":"Innerhalb von 4 Wochen"},{"t":"Innerhalb von 3 Tagen"},{"t":"Es besteht keine Frist"}],"e":"§ 626 Abs. 2 BGB: Die fristlose Kündigung ist nur binnen zwei Wochen möglich, nachdem der Kündigungsberechtigte von den maßgebenden Tatsachen erfahren hat."},{"id":"R-AR-017","f":1,"sub":"Arbeitsrecht","t":"mc","q":"Was ist Voraussetzung einer außerordentlichen Kündigung nach § 626 BGB?","o":[{"t":"Ein wichtiger Grund, der die Fortsetzung bis zum Fristablauf unzumutbar macht","ok":1},{"t":"Lediglich ein sachlicher Grund"},{"t":"Die Zustimmung der Krankenkasse"},{"t":"Ein Betriebsratsbeschluss"}],"e":"Erforderlich ist ein wichtiger Grund, bei dem dem Kündigenden die Einhaltung der Frist nicht zumutbar ist (z. B. Diebstahl, Tätlichkeit). Regelmäßig ist eine Interessenabwägung vorzunehmen."},{"id":"R-AR-018","f":1,"sub":"Arbeitsrecht","t":"mc","q":"Welche drei Kündigungsgründe erkennt das KSchG als sozial gerechtfertigt an?","o":[{"t":"Personen-, verhaltens- und betriebsbedingte Gründe","ok":1},{"t":"Alters-, geschlechts- und herkunftsbedingte Gründe"},{"t":"Wetter-, saison- und auftragsbedingte Gründe"},{"t":"Steuer-, bilanz- und finanzbedingte Gründe"}],"e":"§ 1 KSchG: Eine ordentliche Kündigung ist sozial gerechtfertigt, wenn sie personenbedingt (z. B. Krankheit), verhaltensbedingt (z. B. Pflichtverletzung) oder betriebsbedingt (Wegfall des Arbeitsplatzes) ist."},{"id":"R-AR-019","f":1,"sub":"Arbeitsrecht","t":"mc","q":"Unter welchen Voraussetzungen findet der allgemeine Kündigungsschutz des KSchG Anwendung?","o":[{"t":"Betrieb mit i. d. R. mehr als 10 Arbeitnehmern und Betriebszugehörigkeit von mehr als 6 Monaten","ok":1},{"t":"In jedem Betrieb ab dem ersten Arbeitstag"},{"t":"Nur in tarifgebundenen Betrieben"},{"t":"Erst ab 50 Arbeitnehmern"}],"e":"Der allgemeine Kündigungsschutz greift nach sechs Monaten Wartezeit und nur in Betrieben mit mehr als zehn regelmäßig Beschäftigten (Kleinbetriebsklausel, § 23 KSchG)."},{"id":"R-AR-020","f":1,"sub":"Arbeitsrecht","t":"mc","q":"Innerhalb welcher Frist muss eine Kündigungsschutzklage beim Arbeitsgericht erhoben werden?","o":[{"t":"Innerhalb von 3 Wochen ab Zugang der Kündigung","ok":1},{"t":"Innerhalb von 2 Wochen"},{"t":"Innerhalb von 4 Wochen"},{"t":"Innerhalb von 6 Monaten"}],"e":"§ 4 KSchG: Die Klage ist binnen drei Wochen nach Zugang der schriftlichen Kündigung zu erheben; sonst gilt die Kündigung grundsätzlich als wirksam (§ 7 KSchG)."},{"id":"R-AR-021","f":1,"sub":"Arbeitsrecht","t":"mc","q":"Welche Kündigungsart verbindet die Beendigung mit dem Angebot, zu geänderten Bedingungen weiterzuarbeiten?","o":[{"t":"Änderungskündigung","ok":1},{"t":"Außerordentliche Kündigung"},{"t":"Teilkündigung"},{"t":"Massenentlassung"}],"e":"Bei der Änderungskündigung wird das Arbeitsverhältnis gekündigt und zugleich die Fortsetzung zu neuen Bedingungen angeboten; der Arbeitnehmer kann das Angebot unter Vorbehalt annehmen (§ 2 KSchG)."},{"id":"R-AR-022","f":1,"sub":"Arbeitsrecht","t":"mc","q":"Welche Funktion hat die Abmahnung im Arbeitsverhältnis?","o":[{"t":"Rüge- und Warnfunktion – sie ist regelmäßig Voraussetzung einer verhaltensbedingten Kündigung","ok":1},{"t":"Sie beendet das Arbeitsverhältnis sofort"},{"t":"Sie verlängert automatisch die Probezeit"},{"t":"Sie ist eine Form der Gehaltserhöhung"}],"e":"Die Abmahnung beanstandet ein konkretes Fehlverhalten (Rügefunktion) und kündigt Konsequenzen an (Warnfunktion). Ohne vorherige Abmahnung ist eine verhaltensbedingte Kündigung meist unwirksam."},{"id":"R-AR-023","f":1,"sub":"Arbeitsrecht","t":"mc","q":"Wer genießt besonderen Kündigungsschutz?","o":[{"t":"Schwangere, Beschäftigte in Elternzeit, Betriebsratsmitglieder und schwerbehinderte Menschen","ok":1},{"t":"Ausschließlich befristet Beschäftigte"},{"t":"Nur Arbeitnehmer über 60 Jahre"},{"t":"Alle Arbeitnehmer ab dem ersten Tag gleichermaßen"}],"e":"Sonderkündigungsschutz besteht u. a. nach MuSchG (Schwangere), BEEG (Elternzeit), KSchG/BetrVG (Betriebsratsmitglieder) und SGB IX (Schwerbehinderte, Zustimmung des Integrationsamts)."},{"id":"R-AR-024","f":1,"sub":"Arbeitsrecht","t":"open","q":"Ein Arbeitnehmer ist seit 9 Jahren im Betrieb beschäftigt. Der Arbeitgeber möchte ordentlich kündigen. Welche Kündigungsfrist muss er einhalten? Nennen Sie die Rechtsgrundlage und begründen Sie kurz.","a":"Nach § 622 Abs. 2 BGB beträgt die Kündigungsfrist bei einer Betriebszugehörigkeit von 8 Jahren 3 Monate zum Monatsende. Die nächste Stufe (10 Jahre = 4 Monate) ist noch nicht erreicht, da erst 9 Jahre vorliegen. Maßgeblich ist die jeweils vollendete Beschäftigungsdauer; es gilt daher die 3-Monats-Frist zum Ende eines Kalendermonats.","e":"Die Staffelung des § 622 Abs. 2 BGB knüpft an volle Beschäftigungsjahre an; die höhere Stufe gilt erst ab Erreichen der jeweiligen Jahresgrenze."},{"id":"R-AR-025","f":1,"sub":"Arbeitsrecht","t":"mc","q":"Wie hoch ist die werktägliche Höchstarbeitszeit nach § 3 ArbZG grundsätzlich?","o":[{"t":"8 Stunden, verlängerbar auf 10 Stunden bei entsprechendem Ausgleich","ok":1},{"t":"12 Stunden ohne Ausnahme"},{"t":"6 Stunden"},{"t":"10 Stunden, ohne jede Ausnahme"}],"e":"§ 3 ArbZG: grundsätzlich 8 Stunden; eine Verlängerung auf 10 Stunden ist zulässig, wenn im Durchschnitt von 6 Kalendermonaten oder 24 Wochen 8 Stunden nicht überschritten werden."},{"id":"R-AR-026","f":1,"sub":"Arbeitsrecht","t":"mc","q":"Innerhalb welchen Zeitraums muss die auf 10 Stunden verlängerte Arbeitszeit wieder auf durchschnittlich 8 Stunden ausgeglichen werden?","o":[{"t":"Innerhalb von 6 Kalendermonaten bzw. 24 Wochen","ok":1},{"t":"Innerhalb von 2 Wochen"},{"t":"Innerhalb von 12 Monaten"},{"t":"Ein Ausgleich ist nicht erforderlich"}],"e":"§ 3 Satz 2 ArbZG verlangt den Ausgleich auf den 8-Stunden-Schnitt binnen sechs Kalendermonaten oder 24 Wochen."},{"id":"R-AR-027","f":1,"sub":"Arbeitsrecht","t":"mc","q":"Welche Ruhepause schreibt das ArbZG bei einer Arbeitszeit von mehr als 6 bis zu 9 Stunden vor?","o":[{"t":"Mindestens 30 Minuten","ok":1},{"t":"Mindestens 15 Minuten"},{"t":"Mindestens 60 Minuten"},{"t":"Keine Pause vorgeschrieben"}],"e":"§ 4 ArbZG: bei 6 bis 9 Stunden mindestens 30 Minuten, bei mehr als 9 Stunden mindestens 45 Minuten Ruhepause, aufteilbar in Zeitabschnitte von je 15 Minuten."},{"id":"R-AR-028","f":1,"sub":"Arbeitsrecht","t":"mc","q":"Wie lange muss die ununterbrochene Ruhezeit nach Beendigung der täglichen Arbeitszeit mindestens betragen?","o":[{"t":"11 Stunden","ok":1},{"t":"8 Stunden"},{"t":"12 Stunden"},{"t":"9 Stunden"}],"e":"§ 5 ArbZG: nach Arbeitsende mindestens 11 Stunden ununterbrochene Ruhezeit (in bestimmten Bereichen um bis zu 1 Stunde verkürzbar bei Ausgleich)."},{"id":"R-AR-029","f":1,"sub":"Arbeitsrecht","t":"mc","q":"Welche Personengruppe ist vom Geltungsbereich des ArbZG weitgehend ausgenommen?","o":[{"t":"Leitende Angestellte","ok":1},{"t":"Alle Vollzeitbeschäftigten"},{"t":"Auszubildende"},{"t":"Teilzeitbeschäftigte"}],"e":"§ 18 ArbZG nimmt u. a. leitende Angestellte, Chefärzte und bestimmte Beschäftigte im öffentlichen Dienst aus."},{"id":"R-AR-030","f":1,"sub":"Arbeitsrecht","t":"mc","q":"Wie hoch ist der gesetzliche Mindesturlaub bei einer Sechs-Tage-Woche nach dem BUrlG?","o":[{"t":"24 Werktage pro Jahr","ok":1},{"t":"20 Werktage"},{"t":"30 Werktage"},{"t":"18 Werktage"}],"e":"§ 3 BUrlG: mindestens 24 Werktage (= 4 Wochen). Bei einer Fünf-Tage-Woche entspricht das 20 Arbeitstagen."},{"id":"R-AR-031","f":1,"sub":"Arbeitsrecht","t":"mc","q":"Wie viele Urlaubstage entsprechen dem gesetzlichen Mindesturlaub bei einer Fünf-Tage-Woche?","o":[{"t":"20 Arbeitstage","ok":1},{"t":"24 Arbeitstage"},{"t":"25 Arbeitstage"},{"t":"30 Arbeitstage"}],"e":"Umrechnung: 24 Werktage ÷ 6 × 5 = 20 Arbeitstage. Der Mindesturlaub entspricht immer vier Wochen, unabhängig von der Verteilung der Arbeitstage."},{"id":"R-AR-032","f":1,"sub":"Arbeitsrecht","t":"mc","q":"Nach welcher Wartezeit besteht erstmals der volle gesetzliche Urlaubsanspruch?","o":[{"t":"Nach 6 Monaten Bestehen des Arbeitsverhältnisses","ok":1},{"t":"Nach 3 Monaten"},{"t":"Sofort ab dem ersten Tag"},{"t":"Nach 12 Monaten"}],"e":"§ 4 BUrlG: Der volle Urlaubsanspruch wird erstmals nach sechsmonatigem Bestehen des Arbeitsverhältnisses erworben. Vorher besteht ein anteiliger Anspruch (1/12 je vollen Monat)."},{"id":"R-AR-033","f":1,"sub":"Arbeitsrecht","t":"mc","q":"Bis wann ist gesetzlicher Urlaub bei Übertragung ins Folgejahr grundsätzlich zu nehmen?","o":[{"t":"Bis zum 31. März des Folgejahres","ok":1},{"t":"Bis zum 30. Juni des Folgejahres"},{"t":"Bis zum 31. Dezember des Folgejahres"},{"t":"Eine Übertragung ist ausgeschlossen"}],"e":"§ 7 Abs. 3 BUrlG: Urlaub muss grundsätzlich im laufenden Jahr genommen werden; bei dringenden Gründen ist eine Übertragung bis zum 31. März des Folgejahres möglich. (Der Arbeitgeber muss den Arbeitnehmer allerdings auf drohenden Verfall hinweisen.)"},{"id":"R-AR-034","f":1,"sub":"Arbeitsrecht","t":"mc","q":"Wie viel Zusatzurlaub steht schwerbehinderten Menschen nach dem SGB IX zu?","o":[{"t":"Eine Arbeitswoche zusätzlich (bei Fünf-Tage-Woche 5 Arbeitstage)","ok":1},{"t":"10 zusätzliche Tage"},{"t":"2 zusätzliche Tage"},{"t":"Kein Zusatzurlaub"}],"e":"§ 208 SGB IX: Schwerbehinderte haben Anspruch auf eine zusätzliche Urlaubswoche – bei Fünf-Tage-Woche fünf Arbeitstage."},{"id":"R-AR-035","f":1,"sub":"Arbeitsrecht","t":"mc","q":"Wie lange besteht im Krankheitsfall Anspruch auf Entgeltfortzahlung durch den Arbeitgeber?","o":[{"t":"Bis zu 6 Wochen (42 Kalendertage)","ok":1},{"t":"Bis zu 12 Wochen"},{"t":"Bis zu 2 Wochen"},{"t":"Unbegrenzt"}],"e":"§ 3 EFZG: Bei unverschuldeter Arbeitsunfähigkeit zahlt der Arbeitgeber bis zu sechs Wochen das Entgelt fort; danach zahlt die Krankenkasse Krankengeld."},{"id":"R-AR-036","f":1,"sub":"Arbeitsrecht","t":"mc","q":"Nach welcher Dauer des Arbeitsverhältnisses entsteht der Anspruch auf Entgeltfortzahlung im Krankheitsfall?","o":[{"t":"Nach 4 Wochen ununterbrochenen Bestehens des Arbeitsverhältnisses","ok":1},{"t":"Sofort ab dem ersten Tag"},{"t":"Nach 6 Monaten"},{"t":"Nach 3 Monaten"}],"e":"§ 3 Abs. 3 EFZG: Der Anspruch entsteht erstmals nach vierwöchiger ununterbrochener Dauer des Arbeitsverhältnisses."},{"id":"R-AR-037","f":1,"sub":"Arbeitsrecht","t":"mc","q":"Voraussetzung der Entgeltfortzahlung im Krankheitsfall ist, dass die Arbeitsunfähigkeit …","o":[{"t":"unverschuldet ist","ok":1},{"t":"mindestens 14 Tage dauert"},{"t":"vom Betriebsrat genehmigt wurde"},{"t":"im Ausland eingetreten ist"}],"e":"Der Anspruch besteht nur bei unverschuldeter Arbeitsunfähigkeit. Ein Verschulden liegt etwa bei grob fahrlässiger Selbstgefährdung vor."},{"id":"R-AR-038","f":1,"sub":"Arbeitsrecht","t":"mc","q":"Welche Schutzfristen gelten nach dem MuSchG grundsätzlich um die Entbindung?","o":[{"t":"6 Wochen vor und 8 Wochen nach der Entbindung","ok":1},{"t":"4 Wochen vorher und 4 Wochen nachher"},{"t":"8 Wochen vorher und 6 Wochen nachher"},{"t":"12 Wochen vorher und 12 Wochen nachher"}],"e":"§ 3 MuSchG: grundsätzlich 6 Wochen vor und 8 Wochen nach der Entbindung; bei Früh- und Mehrlingsgeburten sowie bei Behinderung des Kindes verlängert sich die Frist danach auf 12 Wochen."},{"id":"R-AR-039","f":1,"sub":"Arbeitsrecht","t":"mc","q":"Auf wie viele Wochen verlängert sich die nachgeburtliche Mutterschutzfrist bei einer Mehrlings- oder Frühgeburt?","o":[{"t":"12 Wochen","ok":1},{"t":"10 Wochen"},{"t":"8 Wochen"},{"t":"6 Wochen"}],"e":"Bei Mehrlings- und Frühgeburten (sowie bei Behinderung des Kindes) verlängert sich die Schutzfrist nach der Entbindung von 8 auf 12 Wochen (§ 3 Abs. 2 MuSchG)."},{"id":"R-AR-040","f":1,"sub":"Arbeitsrecht","t":"mc","q":"Wie lange gilt das Kündigungsverbot nach dem MuSchG?","o":[{"t":"Während der Schwangerschaft und bis 4 Monate nach der Entbindung","ok":1},{"t":"Nur während der Schutzfristen"},{"t":"Bis zum Ende der Elternzeit"},{"t":"Es gibt kein Kündigungsverbot"}],"e":"§ 17 MuSchG: Ab Kenntnis der Schwangerschaft bis vier Monate nach der Entbindung ist eine Kündigung grundsätzlich unzulässig; Ausnahmen bedürfen der behördlichen Zustimmung."},{"id":"R-BR-001","f":1,"sub":"Betriebsverfassung","t":"mc","q":"Ab welcher Betriebsgröße kann nach § 1 BetrVG ein Betriebsrat gewählt werden?","o":[{"t":"Ab 5 ständigen wahlberechtigten Arbeitnehmern, von denen 3 wählbar sind","ok":1},{"t":"Ab 10 Arbeitnehmern"},{"t":"Ab 20 Arbeitnehmern"},{"t":"In jedem Betrieb unabhängig von der Größe"}],"e":"§ 1 BetrVG: In Betrieben mit mindestens fünf ständigen wahlberechtigten Arbeitnehmern, von denen drei wählbar sind, kann ein Betriebsrat gewählt werden."},{"id":"R-BR-002","f":1,"sub":"Betriebsverfassung","t":"mc","q":"Ab welchem Alter ist ein Arbeitnehmer nach dem BetrVG wahlberechtigt (aktives Wahlrecht)?","o":[{"t":"Ab 16 Jahren","ok":1},{"t":"Ab 18 Jahren"},{"t"
