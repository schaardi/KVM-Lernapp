<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KVM-Trainer · Basisqualifikationen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --steel:#EDF1F3; --paper:#FFFFFF; --ink:#17272E; --muted:#5C6B72;
    --petrol:#0C6C78; --petrol-deep:#084F58; --petrol-soft:#E3F0F1;
    --amber:#D9820A; --amber-soft:#FBEFD9;
    --ok:#2C8A4E; --ok-soft:#E4F2E9; --err:#C0472F; --err-soft:#F7E6E1;
    --line:#D4DCDF; --line-strong:#B7C3C7;
    --shadow:0 1px 2px rgba(16,42,50,.06),0 10px 30px rgba(16,42,50,.08);
    --disp:'Barlow Condensed',system-ui,sans-serif;
    --body:'Inter',system-ui,sans-serif;
    --mono:'IBM Plex Mono',ui-monospace,Menlo,monospace;
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{margin:0;font-family:var(--body);background:var(--steel);color:var(--ink);line-height:1.5;padding:14px 12px 40px;min-height:100vh}
  .app{max-width:580px;margin:0 auto}
  button{font-family:var(--body);cursor:pointer}
  [hidden]{display:none!important}
  .card{background:var(--paper);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);overflow:hidden}

  /* HOME */
  .mast{border-bottom:2px solid var(--ink);background:radial-gradient(circle at 1px 1px, rgba(12,108,120,.10) 1px, transparent 1.4px) 0 0/15px 15px,linear-gradient(180deg,#fbfdfd,#f3f7f8);padding:20px 18px 16px}
  .eyebrow{font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--petrol);margin:0 0 5px}
  .mast h1{font-family:var(--disp);font-weight:700;text-transform:uppercase;font-size:clamp(28px,7vw,38px);line-height:.96;margin:0}
  .mast .sub{font-size:12.5px;color:var(--muted);margin:8px 0 0}
  .mast .sub b{color:var(--ink)}
  .home-section{padding:16px 18px;border-bottom:1px solid var(--line)}
  .home-section:last-child{border-bottom:0}
  .h-label{font-family:var(--mono);font-size:10.5px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin:0 0 10px;display:flex;justify-content:space-between;align-items:center}
  .h-label .reset{font-family:var(--body);text-transform:none;letter-spacing:0;color:var(--muted);border:1px solid var(--line-strong);background:#fff;border-radius:6px;padding:3px 8px;font-size:10.5px}
  .h-label .reset:hover{border-color:var(--err);color:var(--err)}

  /* progress summary */
  .prog-wrap{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .prog-cell{background:#f6fafa;border:1px solid var(--line);border-radius:10px;padding:11px 12px;text-align:center}
  .prog-cell .num{font-family:var(--disp);font-weight:700;font-size:26px;line-height:1;color:var(--petrol-deep)}
  .prog-cell .lbl{font-size:10.5px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.05em}
  .prog-bar{height:9px;border-radius:5px;background:#dde5e8;overflow:hidden;margin-top:12px}
  .prog-bar .fill{height:100%;background:linear-gradient(90deg,var(--petrol),var(--amber));border-radius:5px;transition:width .5s}
  .prog-note{font-size:11px;color:var(--muted);margin-top:7px;text-align:center}

  /* Fach selector */
  .fach-grid{display:grid;gap:8px}
  .fach{display:flex;align-items:center;gap:11px;width:100%;text-align:left;border:1.5px solid var(--line-strong);background:#fff;border-radius:10px;padding:12px 13px;transition:border-color .15s,background .15s}
  .fach:not(:disabled):hover{border-color:var(--petrol);background:#f6fafa}
  .fach.active{border-color:var(--petrol);background:var(--petrol-soft)}
  .fach:disabled{opacity:.5;cursor:not-allowed}
  .fach .fnum{font-family:var(--disp);font-weight:700;font-size:20px;color:var(--petrol);width:26px;text-align:center;flex:0 0 auto}
  .fach.active .fnum{color:var(--petrol-deep)}
  .fach .fmeta{flex:1 1 auto;min-width:0}
  .fach .fname{font-weight:600;font-size:14.5px;line-height:1.25}
  .fach .fsub{font-size:11px;color:var(--muted);margin-top:1px}
  .fach .fcount{font-family:var(--mono);font-size:12px;color:var(--muted);flex:0 0 auto}
  .fach .minibar{height:5px;border-radius:3px;background:#dde5e8;overflow:hidden;margin-top:6px}
  .fach .minibar .mf{height:100%;background:var(--petrol);border-radius:3px}

  .chips{display:flex;flex-wrap:wrap;gap:7px}
  .chip{border:1px solid var(--line-strong);background:#fff;border-radius:18px;padding:7px 12px;font-size:12.5px;font-weight:500;color:var(--ink);display:inline-flex;gap:6px;align-items:center;transition:all .15s}
  .chip .n{font-family:var(--mono);font-size:10.5px;color:var(--muted)}
  .chip:hover{border-color:var(--petrol)}
  .chip.active{background:var(--petrol);border-color:var(--petrol);color:#fff}
  .chip.active .n{color:#bfe0e4}

  .modes{display:grid;gap:10px}
  .mode{display:block;width:100%;text-align:left;border:1px solid var(--line-strong);border-radius:10px;background:#fff;padding:14px 15px;transition:border-color .15s,background .15s}
  .mode:not(:disabled):hover{border-color:var(--petrol);background:#f6fafa}
  .mode:disabled{opacity:.5;cursor:not-allowed}
  .mode .m-title{display:flex;align-items:center;gap:9px;font-family:var(--disp);font-weight:700;text-transform:uppercase;font-size:19px;letter-spacing:.02em;color:var(--ink)}
  .mode .m-title .tag{font-family:var(--mono);font-size:10px;letter-spacing:.08em;color:#fff;border-radius:4px;padding:2px 7px;text-transform:uppercase;background:var(--ink)}
  .mode.sim .m-title .tag{background:var(--amber)}
  .mode.weak .m-title .tag{background:var(--petrol)}
  .mode .m-desc{font-size:12.5px;color:var(--muted);margin-top:5px}

  /* QUIZ */
  .quizhead{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--line);background:#fbfdfd}
  .iconbtn{border:1px solid var(--line-strong);background:#fff;border-radius:8px;width:34px;height:34px;font-size:15px;line-height:1;color:var(--muted);flex:0 0 auto}
  .iconbtn:hover{border-color:var(--err);color:var(--err)}
  .q-meta{flex:1 1 auto;min-width:0}
  .q-fach{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--petrol);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .q-count{font-family:var(--mono);font-size:12.5px;font-weight:600;color:var(--ink)}
  .timer{font-family:var(--mono);font-size:14px;font-weight:600;color:var(--petrol-deep);background:var(--petrol-soft);border:1px solid #bcd9dd;border-radius:8px;padding:6px 10px;white-space:nowrap}
  .timer.low{color:var(--err);background:var(--err-soft);border-color:#e4b3a7}

  .protocol{display:flex;gap:3px;padding:10px 14px 12px;background:#fbfdfd;border-bottom:1px solid var(--line);flex-wrap:wrap}
  .seg{flex:1 1 auto;height:6px;border-radius:3px;background:#dde5e8;min-width:3px;transition:background .2s}
  .seg.cur{background:var(--petrol);animation:pulse 1.4s ease-in-out infinite}
  .seg.ok{background:var(--ok)} .seg.err{background:var(--err)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}

  .qbody{padding:18px 16px 16px}
  .qtype{font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;display:inline-flex;align-items:center;gap:6px;margin:0 0 5px;padding:3px 9px;border-radius:12px}
  .qtype.mc{color:var(--petrol-deep);background:var(--petrol-soft)}
  .qtype.open{color:#7a4a00;background:var(--amber-soft)}
  .qsub{font-family:var(--mono);font-size:10px;color:var(--muted);margin-left:8px;letter-spacing:.06em}
  .qtext{font-size:16.5px;font-weight:600;line-height:1.45;margin:10px 0 16px}

  .opts{display:grid;gap:9px}
  .opt{display:flex;gap:11px;align-items:flex-start;text-align:left;width:100%;border:1.5px solid var(--line-strong);border-radius:10px;background:#fff;padding:12px 13px;font-size:14.5px;line-height:1.4;color:var(--ink);transition:border-color .12s,background .12s}
  .opt .key{font-family:var(--mono);font-weight:600;font-size:12px;color:var(--muted);border:1px solid var(--line-strong);border-radius:6px;padding:2px 7px;flex:0 0 auto;margin-top:1px}
  .opt:not(:disabled):hover{border-color:var(--petrol)}
  .opt.sel{border-color:var(--petrol);background:var(--petrol-soft)}
  .opt.sel .key{border-color:var(--petrol);color:var(--petrol-deep)}
  .opt.reveal-ok{border-color:var(--ok);background:var(--ok-soft)}
  .opt.reveal-ok .key{border-color:var(--ok);color:var(--ok)}
  .opt.reveal-err{border-color:var(--err);background:var(--err-soft)}
  .opt.reveal-err .key{border-color:var(--err);color:var(--err)}
  .opt:disabled{cursor:default} .opt.dim{opacity:.5}

  /* open question */
  .openbox{border:1px dashed var(--line-strong);border-radius:10px;padding:14px;background:#fbfdfd;color:var(--muted);font-size:13.5px}
  .openbox.revealed{border-style:solid;border-color:var(--amber);background:var(--amber-soft);color:var(--ink)}
  .openbox .oa-label{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#7a4a00;margin:0 0 6px}
  .openbox .oa-text{font-size:14px;line-height:1.5}

  .feedback{margin-top:14px;border-radius:10px;padding:13px 14px;font-size:14px;border:1px solid}
  .feedback.good{background:var(--ok-soft);border-color:#b9dcc5}
  .feedback.bad{background:var(--err-soft);border-color:#e8beb2}
  .feedback.neutral{background:#f2f6f7;border-color:var(--line-strong)}
  .fb-head{font-family:var(--disp);text-transform:uppercase;font-weight:700;font-size:17px;letter-spacing:.03em;margin:0 0 5px;display:flex;align-items:center;gap:8px}
  .feedback.good .fb-head{color:var(--ok)} .feedback.bad .fb-head{color:var(--err)} .feedback.neutral .fb-head{color:var(--petrol-deep)}
  .fb-body{color:var(--ink)} .fb-body p{margin:0}

  .qactions{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
  .primary{flex:1 1 auto;border:0;border-radius:10px;background:var(--petrol);color:#fff;font-size:15px;font-weight:600;padding:13px 16px;transition:background .15s}
  .primary:hover{background:var(--petrol-deep)}
  .primary:disabled{background:#a9c3c7;cursor:default}
  .ghost{border:1px solid var(--line-strong);background:#fff;color:var(--ink);border-radius:10px;font-size:14px;font-weight:500;padding:12px 15px}
  .ghost:hover{border-color:var(--petrol)}
  .split{display:flex;gap:10px;flex:1 1 auto}
  .btn-ok{flex:1 1 0;border:1.5px solid var(--ok);background:var(--ok-soft);color:var(--ok);border-radius:10px;font-size:14.5px;font-weight:600;padding:12px}
  .btn-ok:hover{background:#d3ecdb}
  .btn-no{flex:1 1 0;border:1.5px solid var(--err);background:var(--err-soft);color:var(--err);border-radius:10px;font-size:14.5px;font-weight:600;padding:12px}
  .btn-no:hover{background:#f2ddd5}

  /* RESULT */
  .res-hero{display:flex;align-items:center;gap:18px;padding:22px 18px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#fbfdfd,#f3f7f8)}
  .ring{width:104px;height:104px;flex:0 0 auto}
  .ring svg{transform:rotate(-90deg)}
  .ring .bg{fill:none;stroke:#dde5e8;stroke-width:10}
  .ring .fg{fill:none;stroke:var(--petrol);stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset .8s ease}
  .ring .pct{font-family:var(--disp);font-weight:700;font-size:26px;fill:var(--ink);transform:rotate(90deg);transform-origin:center}
  .res-txt h2{font-family:var(--disp);text-transform:uppercase;font-weight:700;font-size:24px;margin:0 0 4px}
  .badge{display:inline-block;font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;font-weight:600;border-radius:14px;padding:4px 12px;margin-bottom:7px}
  .badge.pass{background:var(--ok-soft);color:var(--ok);border:1px solid #b9dcc5}
  .badge.fail{background:var(--err-soft);color:var(--err);border:1px solid #e8beb2}
  .res-txt p{margin:0;font-size:13px;color:var(--muted)} .res-txt p b{color:var(--ink);font-family:var(--mono)}
  .breakdown{padding:16px 18px;border-bottom:1px solid var(--line)}
  .b-row{margin-bottom:11px} .b-row:last-child{margin-bottom:0}
  .b-top{display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:4px}
  .b-top .b-name{font-weight:600} .b-top .b-num{font-family:var(--mono);color:var(--muted)}
  .b-bar{height:8px;border-radius:4px;background:#e2e9eb;overflow:hidden}
  .b-fill{height:100%;border-radius:4px;background:var(--petrol)}
  .res-actions{padding:16px 18px;display:grid;gap:10px}
  .btn-amber{border:0;border-radius:10px;background:var(--amber);color:#fff;font-size:15px;font-weight:600;padding:13px 16px}
  .btn-amber:hover{filter:brightness(.94)}

  .banner{margin:0 0 14px;background:var(--amber-soft);border:1px solid #edd4a6;border-radius:10px;padding:10px 12px;font-size:12px;color:#6d4a12}
  footer{max-width:580px;margin:14px auto 0;font-size:11px;color:var(--muted);text-align:center;padding:0 8px}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="app">

  <!-- HOME -->
  <div class="card" id="scrHome">
    <div class="mast">
      <p class="eyebrow">KVM-Trainer · IHK-Prüfungsvorbereitung</p>
      <h1>Kraftverkehrsmeister<br>Basisqualifikationen</h1>
      <p class="sub" id="homeSub"></p>
    </div>

    <div class="home-section">
      <p class="h-label">Dein Lernfortschritt <button class="reset" id="btnReset">Zurücksetzen</button></p>
      <div class="prog-wrap">
        <div class="prog-cell"><div class="num" id="pMastered">0</div><div class="lbl">Gemeistert</div></div>
        <div class="prog-cell"><div class="num" id="pSeen">0</div><div class="lbl">Gesehen</div></div>
        <div class="prog-cell"><div class="num" id="pOpen">0</div><div class="lbl">Offen</div></div>
      </div>
      <div class="prog-bar"><div class="fill" id="pFill" style="width:0%"></div></div>
      <p class="prog-note" id="pNote"></p>
    </div>

    <div class="home-section">
      <p class="h-label">Prüfungsfach</p>
      <div class="fach-grid" id="fachGrid"></div>
    </div>

    <div class="home-section" id="subSection">
      <p class="h-label">Themenbereich</p>
      <div class="chips" id="subChips"></div>
    </div>

    <div class="home-section">
      <p class="h-label">Modus</p>
      <div class="modes">
        <button class="mode" id="btnTraining">
          <span class="m-title"><span class="tag">Training</span><span id="trainScope">Alle Bereiche</span></span>
          <span class="m-desc" id="trainDesc">20 Fragen mit sofortiger Auswertung und Erklärung. Neue Fragen werden bevorzugt.</span>
        </button>
        <button class="mode weak" id="btnWeak">
          <span class="m-title"><span class="tag">Fokus</span>Schwächen üben</span>
          <span class="m-desc" id="weakDesc">Gezielt die Fragen, die du noch nicht kannst oder zuletzt falsch hattest.</span>
        </button>
        <button class="mode sim" id="btnSim">
          <span class="m-title"><span class="tag">Klausur</span>Prüfungssimulation</span>
          <span class="m-desc" id="simDesc">30 Fragen aus dem ganzen Fach · 60 Minuten · bestanden ab 50 %.</span>
        </button>
      </div>
    </div>
  </div>

  <!-- QUIZ -->
  <div class="card" id="scrQuiz" hidden>
    <div class="quizhead">
      <button class="iconbtn" id="btnQuit" title="Runde beenden" aria-label="Runde beenden">✕</button>
      <div class="q-meta">
        <div class="q-fach" id="qFach">–</div>
        <div class="q-count" id="qCount">Frage 1/20</div>
      </div>
      <div class="timer" id="qTimer" hidden>60:00</div>
    </div>
    <div class="protocol" id="protocol" aria-hidden="true"></div>
    <div class="qbody">
      <div><span class="qtype mc" id="qType">Auswahlfrage</span><span class="qsub" id="qSubLabel"></span></div>
      <p class="qtext" id="qText"></p>
      <div class="opts" id="qOpts"></div>
      <div class="openbox" id="qOpen" hidden>
        <p class="oa-label" id="oaLabel">Überlege deine Antwort, dann aufdecken</p>
        <div class="oa-text" id="oaText" hidden></div>
      </div>
      <div class="feedback" id="qFeedback" hidden role="status" aria-live="polite">
        <p class="fb-head" id="fbHead"></p>
        <div class="fb-body" id="fbBody"></div>
      </div>
      <div class="qactions" id="qActions"></div>
    </div>
  </div>

  <!-- RESULT -->
  <div class="card" id="scrResult" hidden>
    <div class="res-hero">
      <div class="ring">
        <svg viewBox="0 0 104 104" width="104" height="104">
          <circle class="bg" cx="52" cy="52" r="45"></circle>
          <circle class="fg" id="ringFg" cx="52" cy="52" r="45" stroke-dasharray="282.7" stroke-dashoffset="282.7"></circle>
          <text class="pct" id="ringPct" x="52" y="60" text-anchor="middle">0 %</text>
        </svg>
      </div>
      <div class="res-txt">
        <span class="badge pass" id="resBadge" hidden>Bestanden</span>
        <h2 id="resTitle">Ergebnis</h2>
        <p id="resLine">–</p>
      </div>
    </div>
    <div class="breakdown" id="breakdown"></div>
    <div class="res-actions">
      <button class="btn-amber" id="btnRetryWrong" hidden>Nur Fehler wiederholen (<span id="wrongCount">0</span>)</button>
      <button class="primary" id="btnAgain">Neue Runde starten</button>
      <button class="ghost" id="btnHome">Zur Startseite</button>
    </div>
  </div>

</div>
<footer id="footerNote"></footer>

<script>
window.KVM_QUESTIONS = [{"id":"B-VW-001","f":2,"sub":"Volkswirtschaft","t":"mc","q":"Welche Faktoren zählt die Volkswirtschaftslehre zu den (originären) Produktionsfaktoren?","o":[{"t":"Boden, Arbeit und Kapital","ok":1},{"t":"Werkstoffe, Betriebsmittel und Arbeit"},{"t":"Angebot, Nachfrage und Preis"},{"t":"Gewinn, Umsatz und Kosten"}],"e":"Volkswirtschaftlich unterscheidet man die Produktionsfaktoren Boden (Natur), Arbeit und Kapital. Betriebswirtschaftlich (nach Gutenberg) sind es Werkstoffe, Betriebsmittel und ausführende Arbeit sowie der dispositive Faktor."},{"id":"B-VW-002","f":2,"sub":"Volkswirtschaft","t":"mc","q":"Welche Faktoren zählen zu den betrieblichen Elementarfaktoren nach Gutenberg?","o":[{"t":"Werkstoffe, Betriebsmittel und objektbezogene (ausführende) Arbeit","ok":1},{"t":"Boden, Arbeit und Kapital"},{"t":"Planung, Organisation und Kontrolle"},{"t":"Beschaffung, Produktion und Absatz"}],"e":"Die Elementarfaktoren sind Werkstoffe, Betriebsmittel und objektbezogene Arbeit. Hinzu kommt der dispositive Faktor (Leitung, Planung, Organisation, Kontrolle), der die Elementarfaktoren kombiniert."},{"id":"B-VW-003","f":2,"sub":"Volkswirtschaft","t":"mc","q":"Was gehört zum dispositiven Faktor?","o":[{"t":"Leitung, Planung, Organisation und Kontrolle","ok":1},{"t":"Rohstoffe und Hilfsstoffe"},{"t":"Maschinen und Werkzeuge"},{"t":"Akkordarbeit am Band"}],"e":"Der dispositive (leitende) Faktor umfasst die Geschäfts- und Betriebsleitung mit Planung, Organisation und Kontrolle. Er lenkt und kombiniert die Elementarfaktoren."},{"id":"B-VW-004","f":2,"sub":"Volkswirtschaft","t":"mc","q":"Was besagt das ökonomische Prinzip in seiner Minimalvariante?","o":[{"t":"Ein vorgegebenes Ziel mit möglichst geringem Mitteleinsatz erreichen","ok":1},{"t":"Mit gegebenen Mitteln den größtmöglichen Ertrag erzielen"},{"t":"Kosten und Ertrag stets gleichsetzen"},{"t":"Immer den höchsten Preis verlangen"}],"e":"Minimalprinzip: gegebenes Ziel – minimaler Einsatz. Maximalprinzip: gegebener Einsatz – maximales Ergebnis. Beide sind Ausprägungen des Wirtschaftlichkeitsprinzips (Rationalprinzip)."},{"id":"B-VW-005","f":2,"sub":"Volkswirtschaft","t":"mc","q":"Was besagt das Maximalprinzip?","o":[{"t":"Mit einem gegebenen Mitteleinsatz das bestmögliche Ergebnis erzielen","ok":1},{"t":"Ein festes Ziel mit minimalem Aufwand erreichen"},{"t":"Möglichst wenig zu produzieren"},{"t":"Kosten zu maximieren"}],"e":"Beim Maximalprinzip ist der Einsatz vorgegeben und der Ertrag zu maximieren – das Gegenstück zum Minimalprinzip (festes Ziel, minimaler Einsatz)."},{"id":"B-VW-006","f":2,"sub":"Volkswirtschaft","t":"mc","q":"Wodurch entsteht die wirtschaftliche Knappheit von Gütern?","o":[{"t":"Durch unbegrenzte Bedürfnisse bei begrenzten Mitteln zu ihrer Befriedigung","ok":1},{"t":"Durch zu niedrige Preise"},{"t":"Durch staatliche Vorschriften allein"},{"t":"Weil es keine freien Güter gibt"}],"e":"Das ökonomische Grundproblem: Den nahezu unbegrenzten menschlichen Bedürfnissen stehen begrenzte (knappe) Mittel gegenüber. Knappheit zwingt zum wirtschaftlichen Handeln (Auswahl, Verzicht)."},{"id":"B-VW-007","f":2,"sub":"Volkswirtschaft","t":"mc","q":"Worin unterscheiden sich freie und wirtschaftliche (knappe) Güter?","o":[{"t":"Freie Güter sind unbegrenzt verfügbar und kostenlos, wirtschaftliche Güter sind knapp und haben einen Preis","ok":1},{"t":"Freie Güter sind teurer"},{"t":"Wirtschaftliche Güter sind immer kostenlos"},{"t":"Es gibt keinen Unterschied"}],"e":"Freie Güter (z. B. Luft) stehen unbegrenzt und ohne Preis zur Verfügung. Wirtschaftliche Güter sind knapp; für sie muss ein Preis gezahlt werden. Nur wirtschaftliche Güter sind Gegenstand der Wirtschaft."},{"id":"B-VW-008","f":2,"sub":"Volkswirtschaft","t":"mc","q":"Wie werden Güter, die der Produktion anderer Güter dienen, bezeichnet?","o":[{"t":"Produktions-(Investitions-)güter","ok":1},{"t":"Konsumgüter"},{"t":"Freie Güter"},{"t":"Luxusgüter"}],"e":"Produktions-/Investitionsgüter (z. B. Maschinen, Werkstoffe) werden zur Herstellung anderer Güter eingesetzt. Konsumgüter dienen unmittelbar der Bedürfnisbefriedigung der Verbraucher."},{"id":"B-VW-009","f":2,"sub":"Volkswirtschaft","t":"mc","q":"Worin unterscheiden sich Verbrauchs- und Gebrauchsgüter?","o":[{"t":"Verbrauchsgüter gehen bei der Nutzung unter, Gebrauchsgüter können mehrfach/langfristig genutzt werden","ok":1},{"t":"Verbrauchsgüter sind immer teurer"},{"t":"Gebrauchsgüter werden sofort verbraucht"},{"t":"Es gibt keinen Unterschied"}],"e":"Verbrauchsgüter (z. B. Kraftstoff, Rohstoffe) werden bei der Verwendung aufgezehrt. Gebrauchsgüter (z. B. Fahrzeuge, Maschinen) sind langlebig und mehrfach nutzbar."},{"id":"B-VW-010","f":2,"sub":"Volkswirtschaft","t":"mc","q":"In welcher Reihenfolge verläuft der Weg von der Bedürfnisbefriedigung zur Marktwirksamkeit?","o":[{"t":"Bedürfnis → Bedarf → Nachfrage","ok":1},{"t":"Nachfrage → Bedarf → Bedürfnis"},{"t":"Bedarf → Bedürfnis → Angebot"},{"t":"Angebot → Nachfrage → Bedürfnis"}],"e":"Aus einem Bedürfnis (Mangelempfinden) wird durch Kaufkraft ein Bedarf; tritt der Bedarf am Markt auf, wird er zur Nachfrage. Nur die mit Kaufkraft ausgestattete Nachfrage ist marktwirksam."},{"id":"B-VW-011","f":2,"sub":"Volkswirtschaft","t":"mc","q":"Wie unterscheidet man Existenz-, Kultur- und Luxusbedürfnisse?","o":[{"t":"Nach der Dringlichkeit: lebensnotwendig, gehoben-üblich, über das Übliche hinaus","ok":1},{"t":"Nach dem Preis der Güter"},{"t":"Nach dem Hersteller"},{"t":"Nach der Region"}],"e":"Existenzbedürfnisse sind lebensnotwendig (Essen, Wohnen), Kulturbedürfnisse entsprechen dem üblichen Lebensstandard (z. B. Fernseher), Luxusbedürfnisse gehen darüber hinaus. Man unterscheidet zudem Individual- und Kollektivbedürfnisse."},{"id":"B-VW-012","f":2,"sub":"Volkswirtschaft","t":"mc","q":"Wie bildet sich auf einem freien Markt der Gleichgewichtspreis?","o":[{"t":"Im Schnittpunkt von Angebot und Nachfrage","ok":1},{"t":"Er wird vom Staat festgelegt"},{"t":"Er entspricht immer den Herstellkosten"},{"t":"Er wird ausgelost"}],"e":"Der Marktpreis (Gleichgewichtspreis) stellt sich dort ein, wo die nachgefragte Menge der angebotenen Menge entspricht – im Schnittpunkt von Angebots- und Nachfragekurve."},{"id":"B-VW-013","f":2,"sub":"Volkswirtschaft","t":"mc","q":"Wie reagiert die nachgefragte Menge nach dem Nachfragegesetz auf einen steigenden Preis (bei sonst gleichen Bedingungen)?","o":[{"t":"Sie sinkt","ok":1},{"t":"Sie steigt"},{"t":"Sie bleibt gleich"},{"t":"Sie verdoppelt sich"}],"e":"Nach dem Nachfragegesetz sinkt die nachgefragte Menge, wenn der Preis steigt, und umgekehrt. Beim Angebot ist es umgekehrt: Ein höherer Preis führt tendenziell zu einem höheren Angebot."},{"id":"B-VW-014","f":2,"sub":"Volkswirtschaft","t":"mc","q":"Welche Marktform liegt bei vielen Anbietern und vielen Nachfragern vor?","o":[{"t":"Polypol","ok":1},{"t":"Monopol"},{"t":"Angebotsoligopol"},{"t":"Nachfragemonopol"}],"e":"Beim Polypol treffen viele Anbieter auf viele Nachfrager. Beim Oligopol gibt es wenige, beim Monopol nur einen Anbieter (bzw. Nachfrager). Die Marktform beeinflusst den Preisspielraum."},{"id":"B-VW-015","f":2,"sub":"Volkswirtschaft","t":"mc","q":"Was kennzeichnet ein Monopol?","o":[{"t":"Ein einziger Anbieter steht vielen Nachfragern gegenüber","ok":1},{"t":"Viele Anbieter und viele Nachfrager"},{"t":"Wenige Anbieter"},{"t":"Ein einziger Nachfrager"}],"e":"Im (Angebots-)Monopol gibt es nur einen Anbieter; er hat einen großen preispolitischen Spielraum. Ein einziger Nachfrager wäre ein Nachfragemonopol."},{"id":"B-VW-016","f":2,"sub":"Volkswirtschaft","t":"mc","q":"In welcher Reihenfolge durchläuft die Konjunktur idealtypisch ihre Phasen?","o":[{"t":"Aufschwung → Hochkonjunktur → Abschwung → Tiefphase (Rezession/Depression)","ok":1},{"t":"Hochkonjunktur → Aufschwung → Tiefphase"},{"t":"Abschwung → Aufschwung → Hochkonjunktur"},{"t":"Tiefphase → Abschwung → Aufschwung"}],"e":"Der Konjunkturzyklus verläuft von Aufschwung (Expansion) über die Hochkonjunktur (Boom) zum Abschwung (Rezession) und zur Tiefphase (Depression), bevor ein neuer Aufschwung folgt."},{"id":"B-VW-017","f":2,"sub":"Volkswirtschaft","t":"mc","q":"Woran erkennt man typischerweise eine Hochkonjunktur (Boom)?","o":[{"t":"Hohe Auslastung, geringe Arbeitslosigkeit, steigende Preise/Löhne","ok":1},{"t":"Hohe Arbeitslosigkeit und fallende Preise"},{"t":"Stillstand der Produktion"},{"t":"Sinkende Nachfrage bei Überkapazitäten"}],"e":"Im Boom sind Kapazitäten hoch ausgelastet, die Arbeitslosigkeit ist niedrig, Preise und Löhne steigen; es droht Überhitzung/Inflation. Im Abschwung kehrt sich die Entwicklung um."},{"id":"B-VW-018","f":2,"sub":"Volkswirtschaft","t":"mc","q":"Welche Ziele umfasst das „magische Viereck“ der Wirtschaftspolitik (StabG)?","o":[{"t":"Preisniveaustabilität, hoher Beschäftigungsstand, außenwirtschaftliches Gleichgewicht, stetiges und angemessenes Wirtschaftswachstum","ok":1},{"t":"Gewinn, Umsatz, Rentabilität, Liquidität"},{"t":"Zeit, Kosten, Qualität, Umfang"},{"t":"Beschaffung, Produktion, Absatz, Finanzierung"}],"e":"Das Stabilitätsgesetz nennt vier Ziele: Preisniveaustabilität, hoher Beschäftigungsstand, außenwirtschaftliches Gleichgewicht und stetiges, angemessenes Wachstum. Sie stehen teils in Konflikt („magisch“)."},{"id":"B-VW-019","f":2,"sub":"Volkswirtschaft","t":"mc","q":"Was versteht man unter Inflation?","o":[{"t":"Einen anhaltenden Anstieg des allgemeinen Preisniveaus (Kaufkraftverlust des Geldes)","ok":1},{"t":"Ein anhaltendes Sinken des Preisniveaus"},{"t":"Einen einmaligen Preisanstieg eines Produkts"},{"t":"Eine Erhöhung der Gütermenge"}],"e":"Inflation ist der anhaltende Anstieg des allgemeinen Preisniveaus; das Geld verliert an Kaufkraft. Das Gegenteil ist die Deflation (anhaltendes Sinken des Preisniveaus)."},{"id":"B-VW-020","f":2,"sub":"Volkswirtschaft","t":"mc","q":"Was misst das Bruttoinlandsprodukt (BIP)?","o":[{"t":"Den Wert aller im Inland in einer Periode erzeugten Waren und Dienstleistungen","ok":1},{"t":"Den Gewinn aller Unternehmen"},{"t":"Die Summe aller Löhne"},{"t":"Den Staatshaushalt"}],"e":"Das BIP erfasst den Gesamtwert aller innerhalb der Landesgrenzen in einem Zeitraum produzierten Güter und Dienstleistungen und ist ein zentraler Indikator der Wirtschaftsleistung."},{"id":"B-VW-021","f":2,"sub":"Volkswirtschaft","t":"mc","q":"Welche Teilnehmer bildet der einfache Wirtschaftskreislauf ab?","o":[{"t":"Private Haushalte und Unternehmen","ok":1},{"t":"Staat, Banken und Ausland"},{"t":"Nur den Staat"},{"t":"Nur die Unternehmen"}],"e":"Der einfache Kreislauf zeigt den Austausch zwischen Haushalten (bieten Arbeit, erhalten Einkommen, fragen Güter nach) und Unternehmen. Der erweiterte Kreislauf ergänzt Staat, Banken und Ausland."},{"id":"B-VW-022","f":2,"sub":"Volkswirtschaft","t":"mc","q":"Welche Sektoren unterscheidet die Drei-Sektoren-Theorie?","o":[{"t":"Primärer (Urproduktion), sekundärer (Industrie) und tertiärer Sektor (Dienstleistungen)","ok":1},{"t":"Beschaffung, Produktion und Absatz"},{"t":"Öffentlich, privat und gemeinnützig"},{"t":"Klein, mittel und groß"}],"e":"Primärsektor: Land-/Forstwirtschaft, Bergbau (Urproduktion). Sekundärsektor: verarbeitendes Gewerbe/Industrie. Tertiärsektor: Dienstleistungen (u. a. Handel, Verkehr/Logistik)."},{"id":"B-VW-023","f":2,"sub":"Volkswirtschaft","t":"mc","q":"Welchem Wirtschaftssektor ist ein Speditions- und Logistikunternehmen zuzuordnen?","o":[{"t":"Dem tertiären Sektor (Dienstleistungen)","ok":1},{"t":"Dem primären Sektor"},{"t":"Dem sekundären Sektor"},{"t":"Keinem Sektor"}],"e":"Verkehrs- und Logistikdienstleistungen gehören zum tertiären Sektor. Dieser Dienstleistungssektor hat in modernen Volkswirtschaften den größten Anteil an der Wertschöpfung."},{"id":"B-VW-024","f":2,"sub":"Volkswirtschaft","t":"mc","q":"Welche Vorteile bringt die Arbeitsteilung?","o":[{"t":"Höhere Produktivität durch Spezialisierung, Übung und Zeitersparnis","ok":1},{"t":"Sie senkt immer die Qualität"},{"t":"Sie erhöht die Kosten je Stück"},{"t":"Sie ist ohne wirtschaftliche Bedeutung"}],"e":"Arbeitsteilung (z. B. berufliche, betriebliche, volkswirtschaftliche, internationale) steigert durch Spezialisierung und Routine die Produktivität. Nachteile können Monotonie und stärkere Abhängigkeit sein."},{"id":"B-VW-025","f":2,"sub":"Volkswirtschaft","t":"mc","q":"Was kennzeichnet die soziale Marktwirtschaft?","o":[{"t":"Marktwirtschaftliche Ordnung mit staatlichem Rahmen und sozialem Ausgleich","ok":1},{"t":"Vollständige staatliche Planung aller Prozesse"},{"t":"Völlig freier Markt ohne jede staatliche Regel"},{"t":"Abschaffung des Privateigentums"}],"e":"Die soziale Marktwirtschaft verbindet die Vorteile des freien Marktes (Wettbewerb, Privateigentum, Preisbildung) mit sozialem Ausgleich und staatlichem Ordnungsrahmen (z. B. Sozialversicherung, Kartellrecht)."},{"id":"B-VW-026","f":2,"sub":"Volkswirtschaft","t":"mc","q":"Was versteht man unter Kaufkraft?","o":[{"t":"Die Gütermenge, die man für einen bestimmten Geldbetrag erwerben kann","ok":1},{"t":"Die Menge des umlaufenden Geldes"},{"t":"Den Gewinn eines Unternehmens"},{"t":"Die Zahl der Beschäftigten"}],"e":"Kaufkraft bezeichnet, wie viele Güter/Dienstleistungen mit einer Geldeinheit gekauft werden können. Bei Inflation sinkt die Kaufkraft, weil die Preise steigen."},{"id":"B-VW-027","f":2,"sub":"Volkswirtschaft","t":"mc","q":"Was bewirkt eine Preisobergrenze (Höchstpreis) unterhalb des Gleichgewichtspreises?","o":[{"t":"Einen Nachfrageüberhang (Güterknappheit)","ok":1},{"t":"Einen Angebotsüberhang"},{"t":"Keine Auswirkung"},{"t":"Sinkende Nachfrage"}],"e":"Liegt ein staatlicher Höchstpreis unter dem Gleichgewichtspreis, übersteigt die Nachfrage das Angebot – es entsteht ein Nachfrageüberhang (Mangel). Ein Mindestpreis über dem Gleichgewicht führt umgekehrt zum Angebotsüberschuss."},{"id":"B-VW-028","f":2,"sub":"Volkswirtschaft","t":"mc","q":"Was beschreibt die Preiselastizität der Nachfrage?","o":[{"t":"Wie stark die nachgefragte Menge auf eine Preisänderung reagiert","ok":1},{"t":"Die Höhe des Gleichgewichtspreises"},{"t":"Die Zahl der Anbieter"},{"t":"Die Produktionskosten"}],"e":"Die Preiselastizität misst die relative Mengenänderung im Verhältnis zur relativen Preisänderung. Bei elastischer Nachfrage reagiert die Menge stark, bei unelastischer (z. B. Grundbedarf) nur schwach."},{"id":"B-VW-029","f":2,"sub":"Volkswirtschaft","t":"mc","q":"Was ist ein Kollektivbedürfnis?","o":[{"t":"Ein Bedürfnis, das nur gemeinschaftlich befriedigt werden kann (z. B. Sicherheit, Straßen)","ok":1},{"t":"Ein rein persönliches Bedürfnis"},{"t":"Ein Luxusbedürfnis"},{"t":"Ein Bedürfnis ohne Kaufkraft"}],"e":"Kollektivbedürfnisse (z. B. innere/äußere Sicherheit, Infrastruktur) werden gemeinschaftlich – meist durch den Staat – befriedigt. Individualbedürfnisse betreffen dagegen den Einzelnen."},{"id":"B-VW-030","f":2,"sub":"Volkswirtschaft","t":"mc","q":"Welche Aufgabe hat der Preis in der Marktwirtschaft NICHT?","o":[{"t":"Er garantiert jedem Anbieter einen festen Gewinn","ok":1},{"t":"Ausgleichsfunktion zwischen Angebot und Nachfrage"},{"t":"Lenkungsfunktion für die Produktion"},{"t":"Signal-/Informationsfunktion über Knappheit"}],"e":"Preise gleichen Angebot und Nachfrage aus, lenken Produktionsfaktoren und signalisieren Knappheit. Einen festen Gewinn garantieren sie nicht – im Wettbewerb tragen Anbieter das unternehmerische Risiko."},{"id":"B-VW-031","f":2,"sub":"Volkswirtschaft","t":"mc","q":"Was versteht man unter Produktivität (volkswirtschaftlich wie betrieblich)?","o":[{"t":"Das mengenmäßige Verhältnis von Output (Ertrag) zu Input (Faktoreinsatz)","ok":1},{"t":"Den erzielten Gewinn"},{"t":"Die Höhe der Löhne"},{"t":"Die Zahl der Betriebe"}],"e":"Produktivität = Ausbringungsmenge ÷ Faktoreinsatzmenge (z. B. Arbeitsproduktivität = Menge ÷ Arbeitsstunden). Sie ist eine reine Mengenrelation ohne Geldgrößen."},{"id":"B-VW-032","f":2,"sub":"Volkswirtschaft","t":"mc","q":"Ein Betrieb erstellt in 200 Arbeitsstunden 5.000 Sendungen. Wie hoch ist die Arbeitsproduktivität?","o":[{"t":"25 Sendungen je Stunde","ok":1},{"t":"40 Sendungen je Stunde"},{"t":"2,5 Sendungen je Stunde"},{"t":"1.000 Sendungen je Stunde"}],"e":"Arbeitsproduktivität = Ausbringung ÷ Arbeitsstunden = 5.000 ÷ 200 = 25 Sendungen/Stunde. Produktivität misst die Ergiebigkeit des Faktoreinsatzes rein mengenmäßig."},{"id":"B-VW-033","f":2,"sub":"Volkswirtschaft","t":"open","q":"Erläutern Sie das ökonomische Prinzip und seine beiden Ausprägungen.","a":"Das ökonomische Prinzip (Wirtschaftlichkeits- oder Rationalprinzip) verlangt, mit knappen Mitteln möglichst vernünftig umzugehen. Es hat zwei Ausprägungen: Beim Minimalprinzip ist ein bestimmtes Ziel vorgegeben und mit möglichst geringem Mitteleinsatz zu erreichen (z. B. eine feste Transportmenge mit möglichst wenig Kraftstoff befördern). Beim Maximalprinzip ist der Mitteleinsatz vorgegeben und damit das bestmögliche Ergebnis zu erzielen (z. B. mit einem festen Budget möglichst viele Aufträge abwickeln). Nicht zulässig ist es, beide Größen (Einsatz und Ergebnis) gleichzeitig zu optimieren.","e":"Merksatz: Minimalprinzip = festes Ziel, minimaler Einsatz; Maximalprinzip = fester Einsatz, maximales Ergebnis."},{"id":"B-VW-034","f":2,"sub":"Volkswirtschaft","t":"open","q":"Beschreiben Sie, wie sich auf einem vollkommenen Markt der Gleichgewichtspreis bildet, und was bei einem Nachfrageüberhang geschieht.","a":"Auf dem Markt treffen Angebot und Nachfrage aufeinander. Nach dem Nachfragegesetz sinkt die nachgefragte Menge mit steigendem Preis; nach dem Angebotsgesetz steigt die angebotene Menge mit steigendem Preis. Der Gleichgewichtspreis (Marktpreis) stellt sich dort ein, wo angebotene und nachgefragte Menge übereinstimmen – im Schnittpunkt beider Kurven. Liegt der Preis darunter, entsteht ein Nachfrageüberhang: Die Nachfrage übersteigt das Angebot, Güter werden knapp. Dadurch steigt der Preis tendenziell wieder, bis das Gleichgewicht erreicht ist.","e":"Der Preis hat eine Ausgleichsfunktion: Überschüsse und Knappheiten werden über Preisänderungen abgebaut, bis sich Angebot und Nachfrage entsprechen."},{"id":"B-VW-035","f":2,"sub":"Volkswirtschaft","t":"open","q":"Nennen Sie die vier Ziele des magischen Vierecks und erklären Sie, warum es als „magisch“ bezeichnet wird.","a":"Die vier gesamtwirtschaftlichen Ziele des Stabilitätsgesetzes sind: (1) Preisniveaustabilität, (2) ein hoher Beschäftigungsstand, (3) außenwirtschaftliches Gleichgewicht und (4) stetiges und angemessenes Wirtschaftswachstum. „Magisch“ heißt das Viereck, weil sich die Ziele nicht gleichzeitig in vollem Umfang erreichen lassen: Sie stehen teilweise in Konflikt (Zielkonflikt). Zum Beispiel kann kräftiges Wachstum mit hoher Beschäftigung die Preise steigen lassen und so die Preisniveaustabilität gefährden. Die Wirtschaftspolitik muss daher zwischen den Zielen abwägen.","e":"Häufig wird das Viereck um weitere Ziele (z. B. Umweltschutz, gerechte Einkommensverteilung) zum „magischen Sechseck“ erweitert."},{"id":"B-RF-001","f":2,"sub":"Rechtsformen","t":"mc","q":"Wie haftet ein eingetragener Einzelunternehmer (e. K.)?","o":[{"t":"Unbeschränkt mit Geschäfts- und Privatvermögen","ok":1},{"t":"Nur mit dem Geschäftsvermögen"},{"t":"Gar nicht"},{"t":"Nur bis 25.000 €"}],"e":"Der Einzelunternehmer haftet voll und persönlich (unbeschränkt), auch mit seinem Privatvermögen. Dafür entscheidet er allein und erhält den gesamten Gewinn."},{"id":"B-RF-002","f":2,"sub":"Rechtsformen","t":"mc","q":"Welches Mindestkapital ist zur Gründung eines Einzelunternehmens erforderlich?","o":[{"t":"Kein gesetzliches Mindestkapital","ok":1},{"t":"25.000 €"},{"t":"50.000 €"},{"t":"1 €"}],"e":"Für das Einzelunternehmen gibt es kein vorgeschriebenes Mindestkapital. Die einfache Gründung ist ein Vorteil; nachteilig sind die unbeschränkte Haftung und die begrenzte Kapitalbasis."},{"id":"B-RF-003","f":2,"sub":"Rechtsformen","t":"mc","q":"Auf welcher Rechtsgrundlage beruht die Gesellschaft bürgerlichen Rechts (GbR)?","o":[{"t":"§§ 705 ff. BGB","ok":1},{"t":"§§ 105 ff. HGB"},{"t":"GmbHG"},{"t":"AktG"}],"e":"Die GbR ist im BGB geregelt (§§ 705 ff.). Sie eignet sich für kleinere Zusammenschlüsse und Freiberufler; betreibt sie ein Handelsgewerbe, wird sie zur OHG."},{"id":"B-RF-004","f":2,"sub":"Rechtsformen","t":"mc","q":"Wie haften die Gesellschafter einer OHG?","o":[{"t":"Unbeschränkt, unmittelbar und gesamtschuldnerisch – auch mit Privatvermögen","ok":1},{"t":"Nur mit ihrer Einlage"},{"t":"Gar nicht"},{"t":"Nur der Geschäftsführer haftet"}],"e":"In der OHG (§§ 105 ff. HGB) haften alle Gesellschafter voll und persönlich. Das schafft hohe Kreditwürdigkeit, birgt aber hohes persönliches Risiko."},{"id":"B-RF-005","f":2,"sub":"Rechtsformen","t":"mc","q":"Wie werden die beiden Gesellschaftertypen einer KG bezeichnet?","o":[{"t":"Komplementär (Vollhafter) und Kommanditist (Teilhafter)","ok":1},{"t":"Vorstand und Aufsichtsrat"},{"t":"Gesellschafter und Prokurist"},{"t":"Aktionär und Vorstand"}],"e":"In der KG haftet der Komplementär unbeschränkt und führt die Geschäfte; der Kommanditist haftet nur bis zur Höhe seiner Einlage und ist von der Geschäftsführung ausgeschlossen."},{"id":"B-RF-006","f":2,"sub":"Rechtsformen","t":"mc","q":"Wie haftet ein Kommanditist in der KG?","o":[{"t":"Beschränkt bis zur Höhe seiner im Handelsregister eingetragenen Einlage","ok":1},{"t":"Unbeschränkt mit dem Privatvermögen"},{"t":"Gar nicht"},{"t":"Gesamtschuldnerisch für alle Schulden"}],"e":"Der Kommanditist (Teilhafter) haftet nur mit seiner Einlage. Ist die Einlage erbracht, ist seine persönliche Haftung grundsätzlich ausgeschlossen."},{"id":"B-RF-007","f":2,"sub":"Rechtsformen","t":"mc","q":"Wer haftet bei der GmbH & Co. KG unbeschränkt (als Komplementär)?","o":[{"t":"Die GmbH – dadurch wird die persönliche Haftung natürlicher Personen begrenzt","ok":1},{"t":"Jeder Kommanditist mit Privatvermögen"},{"t":"Der Geschäftsführer persönlich"},{"t":"Niemand"}],"e":"Bei der GmbH & Co. KG ist die Komplementärin eine GmbH. Da die GmbH nur mit ihrem Vermögen haftet, wird die persönliche Haftung natürlicher Personen faktisch beschränkt – eine beliebte Mischform."},{"id":"B-RF-008","f":2,"sub":"Rechtsformen","t":"mc","q":"Wie hoch ist das Mindest-Stammkapital einer GmbH?","o":[{"t":"25.000 €","ok":1},{"t":"50.000 €"},{"t":"10.000 €"},{"t":"100.000 €"}],"e":"§ 5 GmbHG: Das Stammkapital der GmbH beträgt mindestens 25.000 €. Bei der Anmeldung müssen mindestens 12.500 € eingezahlt sein."},{"id":"B-RF-009","f":2,"sub":"Rechtsformen","t":"mc","q":"Wie viel des Stammkapitals muss bei Anmeldung einer GmbH mindestens eingezahlt sein?","o":[{"t":"Mindestens die Hälfte, also 12.500 €","ok":1},{"t":"Das gesamte Stammkapital (25.000 €)"},{"t":"Nur 1 €"},{"t":"Nichts"}],"e":"Bei der Gründung müssen mindestens 12.500 € (die Hälfte des Mindeststammkapitals) tatsächlich eingezahlt bzw. als Sacheinlage erbracht sein."},{"id":"B-RF-010","f":2,"sub":"Rechtsformen","t":"mc","q":"Wie haftet eine GmbH gegenüber ihren Gläubigern?","o":[{"t":"Nur mit dem Gesellschaftsvermögen (die Gesellschafter grundsätzlich nicht persönlich)","ok":1},{"t":"Die Gesellschafter haften unbeschränkt mit Privatvermögen"},{"t":"Der Geschäftsführer haftet immer persönlich"},{"t":"Es besteht keine Haftung"}],"e":"Als juristische Person haftet die GmbH nur mit ihrem Gesellschaftsvermögen. Die Gesellschafter riskieren grundsätzlich nur ihre Einlage (Haftungsbeschränkung)."},{"id":"B-RF-011","f":2,"sub":"Rechtsformen","t":"mc","q":"Welche Organe hat eine GmbH?","o":[{"t":"Geschäftsführung und Gesellschafterversammlung (ggf. Aufsichtsrat)","ok":1},{"t":"Vorstand und Hauptversammlung"},{"t":"Nur den Prokuristen"},{"t":"Generalversammlung und Betriebsrat"}],"e":"Die GmbH wird durch die Geschäftsführung geleitet und vertreten; oberstes Organ ist die Gesellschafterversammlung. Ein Aufsichtsrat ist erst ab bestimmten Beschäftigtenzahlen (Mitbestimmung) verpflichtend."},{"id":"B-RF-012","f":2,"sub":"Rechtsformen","t":"mc","q":"Wie viel Mindeststammkapital benötigt eine Unternehmergesellschaft (haftungsbeschränkt) – UG?","o":[{"t":"1 € (mindestens)","ok":1},{"t":"25.000 €"},{"t":"12.500 €"},{"t":"50.000 €"}],"e":"Die UG (haftungsbeschränkt) kann bereits mit 1 € gegründet werden. Sie muss jedoch jährlich einen Teil des Gewinns (ein Viertel) als Rücklage ansparen, bis das GmbH-Stammkapital von 25.000 € erreicht ist."},{"id":"B-RF-013","f":2,"sub":"Rechtsformen","t":"mc","q":"Welche Pflicht trifft die UG (haftungsbeschränkt) hinsichtlich des Gewinns?","o":[{"t":"Sie muss ein Viertel des Jahresüberschusses in eine Rücklage einstellen, bis 25.000 € erreicht sind","ok":1},{"t":"Sie muss den gesamten Gewinn ausschütten"},{"t":"Sie darf keinen Gewinn erzielen"},{"t":"Sie hat keine besonderen Pflichten"}],"e":"Die UG muss so lange 25 % des Jahresüberschusses thesaurieren (ansparen), bis das Stammkapital das GmbH-Mindestkapital erreicht; danach kann sie in eine GmbH umfirmieren."},{"id":"B-RF-014","f":2,"sub":"Rechtsformen","t":"mc","q":"Wie hoch ist das Mindest-Grundkapital einer Aktiengesellschaft?","o":[{"t":"50.000 €","ok":1},{"t":"25.000 €"},{"t":"100.000 €"},{"t":"1 €"}],"e":"§ 7 AktG: Das Grundkapital der AG beträgt mindestens 50.000 €. Es ist in Aktien zerlegt, die Anteile am Grundkapital verbriefen."},{"id":"B-RF-015","f":2,"sub":"Rechtsformen","t":"mc","q":"Welche drei Organe hat eine Aktiengesellschaft?","o":[{"t":"Vorstand, Aufsichtsrat und Hauptversammlung","ok":1},{"t":"Geschäftsführer, Gesellschafterversammlung und Prokurist"},{"t":"Vorstand, Betriebsrat und Generalversammlung"},{"t":"Komplementär, Kommanditist und Aufsichtsrat"}],"e":"Der Vorstand leitet die AG eigenverantwortlich, der Aufsichtsrat überwacht ihn und bestellt ihn, die Hauptversammlung ist die Versammlung der Aktionäre (u. a. Wahl des Aufsichtsrats, Gewinnverwendung)."},{"id":"B-RF-016","f":2,"sub":"Rechtsformen","t":"mc","q":"Welche Aufgabe hat der Aufsichtsrat einer AG?","o":[{"t":"Er bestellt und überwacht den Vorstand","ok":1},{"t":"Er führt die laufenden Geschäfte"},{"t":"Er beschließt die Dividende allein"},{"t":"Er ist die Versammlung der Aktionäre"}],"e":"Der Aufsichtsrat bestellt und kontrolliert den Vorstand und berät ihn. Die laufende Leitung obliegt dem Vorstand; über die Gewinnverwendung entscheidet die Hauptversammlung."},{"id":"B-RF-017","f":2,"sub":"Rechtsformen","t":"mc","q":"Was verbrieft eine Aktie?","o":[{"t":"Einen Anteil am Grundkapital der AG und Mitgliedschaftsrechte","ok":1},{"t":"Einen festen Zinsanspruch wie eine Anleihe"},{"t":"Ein Darlehen an das Unternehmen"},{"t":"Ein Grundstücksrecht"}],"e":"Die Aktie verkörpert einen Anteil am Grundkapital und gewährt Mitgliedschaftsrechte (u. a. Stimmrecht in der Hauptversammlung, Anspruch auf Dividende). Anders als eine Anleihe ist sie kein Fremd-, sondern Eigenkapital."},{"id":"B-RF-018","f":2,"sub":"Rechtsformen","t":"mc","q":"Welchen vorrangigen Zweck verfolgt eine eingetragene Genossenschaft (eG)?","o":[{"t":"Die Förderung des Erwerbs oder der Wirtschaft ihrer Mitglieder","ok":1},{"t":"Die Gewinnmaximierung für externe Investoren"},{"t":"Die Verwaltung von Staatsvermögen"},{"t":"Ausschließlich gemeinnützige Spendensammlung"}],"e":"Die Genossenschaft dient dem Förderzweck: Sie soll den Erwerb oder die Wirtschaft ihrer Mitglieder unterstützen (z. B. Einkaufs-, Wohnungs-, Kreditgenossenschaften). Organe sind Vorstand, Aufsichtsrat und Generalversammlung."},{"id":"B-RF-019","f":2,"sub":"Rechtsformen","t":"mc","q":"Worin unterscheiden sich Personen- und Kapitalgesellschaften grundsätzlich?","o":[{"t":"Bei Personengesellschaften haften i. d. R. natürliche Personen persönlich; Kapitalgesellschaften sind juristische Personen mit beschränkter Haftung","ok":1},{"t":"Kapitalgesellschaften haben keine Organe"},{"t":"Personengesellschaften sind immer größer"},{"t":"Es gibt keinen Unterschied"}],"e":"Personengesellschaften (GbR, OHG, KG) beruhen auf den persönlich haftenden Gesellschaftern. Kapitalgesellschaften (GmbH, UG, AG) sind eigenständige juristische Personen; die Haftung ist auf das Gesellschaftsvermögen beschränkt."},{"id":"B-RF-020","f":2,"sub":"Rechtsformen","t":"mc","q":"Wer ist Istkaufmann nach § 1 HGB?","o":[{"t":"Wer ein Handelsgewerbe betreibt, das nach Art und Umfang einen kaufmännischen Geschäftsbetrieb erfordert","ok":1},{"t":"Jeder Freiberufler"},{"t":"Nur Kapitalgesellschaften"},{"t":"Jeder Arbeitnehmer"}],"e":"§ 1 HGB: Istkaufmann ist, wer ein Handelsgewerbe betreibt, das einen in kaufmännischer Weise eingerichteten Geschäftsbetrieb erfordert. Die Kaufmannseigenschaft entsteht kraft Gesetzes (Eintragung nur deklaratorisch)."},{"id":"B-RF-021","f":2,"sub":"Rechtsformen","t":"mc","q":"Was ist ein Formkaufmann?","o":[{"t":"Eine Handelsgesellschaft, die allein aufgrund ihrer Rechtsform Kaufmann ist (z. B. GmbH, AG)","ok":1},{"t":"Ein Kleingewerbetreibender"},{"t":"Ein Landwirt"},{"t":"Ein Freiberufler"}],"e":"Formkaufmann (§ 6 HGB) ist, wer kraft Rechtsform Kaufmann ist – unabhängig von der Art der Tätigkeit. Dazu zählen die Handelsgesellschaften (GmbH, UG, AG, eG)."},{"id":"B-RF-022","f":2,"sub":"Rechtsformen","t":"mc","q":"In welche Abteilungen ist das Handelsregister gegliedert?","o":[{"t":"Abteilung A (u. a. Einzelkaufleute, Personengesellschaften) und Abteilung B (Kapitalgesellschaften)","ok":1},{"t":"Abteilung Nord und Süd"},{"t":"Abteilung 1 bis 10"},{"t":"Es gibt keine Abteilungen"}],"e":"Das Handelsregister führt Abteilung A (Einzelkaufleute, OHG, KG) und Abteilung B (GmbH, AG, andere Kapitalgesellschaften). Es dient der Publizität und dem Rechtsverkehr."},{"id":"B-RF-023","f":2,"sub":"Rechtsformen","t":"mc","q":"Was versteht man unter der Firma eines Kaufmanns (§ 17 HGB)?","o":[{"t":"Den Namen, unter dem der Kaufmann seine Geschäfte betreibt und die Unterschrift abgibt","ok":1},{"t":"Das Betriebsgebäude"},{"t":"Die Gesamtheit der Mitarbeiter"},{"t":"Das Produktsortiment"}],"e":"§ 17 HGB: Die Firma ist der Handelsname des Kaufmanns. Unter ihr kann er klagen und verklagt werden. Nicht zu verwechseln mit dem Unternehmen als Ganzem."},{"id":"B-RF-024","f":2,"sub":"Rechtsformen","t":"mc","q":"Welcher Firmengrundsatz verlangt, dass die Firma keine irreführenden Angaben enthält?","o":[{"t":"Firmenwahrheit (Firmenklarheit)","ok":1},{"t":"Firmenbeständigkeit"},{"t":"Firmeneinheit"},{"t":"Firmenausschließlichkeit"}],"e":"Der Grundsatz der Firmenwahrheit/-klarheit verbietet irreführende Zusätze. Weitere Grundsätze: Firmenbeständigkeit, Firmeneinheit, Firmenausschließlichkeit (Unterscheidbarkeit) und die Pflicht zum Rechtsformzusatz."},{"id":"B-RF-025","f":2,"sub":"Rechtsformen","t":"mc","q":"Welchen Umfang hat die Prokura nach § 48 HGB grundsätzlich?","o":[{"t":"Sie ermächtigt zu allen Arten von Geschäften, die der Betrieb eines Handelsgewerbes mit sich bringt","ok":1},{"t":"Sie gilt nur für ein einzelnes Geschäft"},{"t":"Sie umfasst nur den Einkauf"},{"t":"Sie berechtigt zu gar nichts"}],"e":"Die Prokura ist eine weitreichende handelsrechtliche Vollmacht: Sie deckt alle gewöhnlichen und außergewöhnlichen Geschäfte des Handelsgewerbes ab. Der Umfang ist gesetzlich festgelegt und Dritten gegenüber nicht beschränkbar."},{"id":"B-RF-026","f":2,"sub":"Rechtsformen","t":"mc","q":"Wozu ist ein Prokurist trotz seiner weitreichenden Vollmacht NICHT ohne Weiteres berechtigt?","o":[{"t":"Grundstücke zu veräußern oder zu belasten (nur mit besonderer Befugnis)","ok":1},{"t":"Waren einzukaufen"},{"t":"Rechnungen zu begleichen"},{"t":"Mitarbeiter einzustellen"}],"e":"§ 49 HGB: Zur Veräußerung und Belastung von Grundstücken bedarf der Prokurist einer besonderen Befugnis. Ebenfalls ausgeschlossen sind u. a. die Erteilung von Prokura, die Unterzeichnung der Bilanz und die Anmeldung zum Handelsregister."},{"id":"B-RF-027","f":2,"sub":"Rechtsformen","t":"mc","q":"Was kennzeichnet die (allgemeine) Handlungsvollmacht nach § 54 HGB?","o":[{"t":"Sie ermächtigt zu den Geschäften, die der Betrieb eines derartigen Handelsgewerbes gewöhnlich mit sich bringt","ok":1},{"t":"Sie ist umfassender als die Prokura"},{"t":"Sie erlaubt stets die Aufnahme von Darlehen"},{"t":"Sie muss ins Handelsregister eingetragen werden"}],"e":"Die Handlungsvollmacht ist enger als die Prokura: Sie umfasst die branchenüblichen (gewöhnlichen) Geschäfte. Man unterscheidet General-, Art- und Spezialhandlungsvollmacht; eine Eintragung ins Handelsregister erfolgt nicht."},{"id":"B-RF-028","f":2,"sub":"Rechtsformen","t":"mc","q":"Welcher Steuer unterliegt der Gewinn eines Einzelunternehmens bzw. einer Personengesellschaft?","o":[{"t":"Der Einkommensteuer (beim Unternehmer bzw. den Gesellschaftern)","ok":1},{"t":"Der Körperschaftsteuer"},{"t":"Gar keiner Steuer"},{"t":"Nur der Umsatzsteuer"}],"e":"Der Gewinn von Einzelunternehmen und Personengesellschaften wird den Inhabern/Gesellschaftern zugerechnet und bei ihnen mit Einkommensteuer belegt. Zusätzlich fällt Gewerbesteuer an."},{"id":"B-RF-029","f":2,"sub":"Rechtsformen","t":"mc","q":"Welcher Steuer unterliegt der Gewinn einer Kapitalgesellschaft (z. B. GmbH)?","o":[{"t":"Der Körperschaftsteuer (zzgl. Gewerbesteuer)","ok":1},{"t":"Nur der Einkommensteuer der Gesellschafter"},{"t":"Gar keiner Steuer"},{"t":"Nur der Grundsteuer"}],"e":"Kapitalgesellschaften sind eigene Steuersubjekte: Ihr Gewinn unterliegt der Körperschaftsteuer und der Gewerbesteuer. Ausgeschüttete Gewinne werden beim Anteilseigner zusätzlich besteuert (Abgeltung-/Kapitalertragsteuer)."},{"id":"B-RF-030","f":2,"sub":"Rechtsformen","t":"mc","q":"Welche Kriterien sind bei der Wahl der Rechtsform besonders zu beachten?","o":[{"t":"Haftung, Kapitalbedarf, Leitungsbefugnis, Gewinnverteilung, Steuern, Publizität und Mitbestimmung","ok":1},{"t":"Nur die Farbe des Logos"},{"t":"Ausschließlich der Firmenname"},{"t":"Nur der Standort"}],"e":"Die Rechtsformwahl richtet sich u. a. nach Haftung, Kapitalbeschaffung, Leitungs- und Kontrollbefugnissen, Gewinn-/Verlustbeteiligung, Steuerbelastung, Publizitäts- und Mitbestimmungspflichten sowie Gründungsaufwand."},{"id":"B-RF-031","f":2,"sub":"Rechtsformen","t":"mc","q":"Welche Pflicht trifft Kapitalgesellschaften bezüglich ihres Jahresabschlusses?","o":[{"t":"Offenlegungs-(Publizitäts-)pflicht (Veröffentlichung im Unternehmensregister)","ok":1},{"t":"Sie müssen keinen Jahresabschluss erstellen"},{"t":"Sie dürfen den Abschluss nicht veröffentlichen"},{"t":"Nur die Steuererklärung ist offenzulegen"}],"e":"Kapitalgesellschaften müssen ihren Jahresabschluss offenlegen (Publizitätspflicht). Umfang und Fristen richten sich nach der Größenklasse (klein, mittel, groß)."},{"id":"B-RF-032","f":2,"sub":"Rechtsformen","t":"mc","q":"Nach welcher gesetzlichen Regel wird der Gewinn in einer OHG verteilt, wenn nichts anderes vereinbart ist (§ 121 HGB)?","o":[{"t":"Zuerst 4 % auf die Kapitalanteile, der Rest nach Köpfen","ok":1},{"t":"Vollständig nach Köpfen"},{"t":"Nur an den Geschäftsführer"},{"t":"Nach Umsatzanteil"}],"e":"§ 121 HGB (dispositiv): Von dem Jahresgewinn erhält jeder Gesellschafter zunächst 4 % auf seinen Kapitalanteil; der verbleibende Gewinn wird nach Köpfen verteilt. Meist wird jedoch eine abweichende Regelung im Gesellschaftsvertrag getroffen."},{"id":"B-RF-033","f":2,"sub":"Rechtsformen","t":"open","q":"Vergleichen Sie die Haftung bei einer OHG und bei einer GmbH.","a":"Bei der OHG haften alle Gesellschafter unbeschränkt, unmittelbar und gesamtschuldnerisch – das heißt mit ihrem gesamten Privatvermögen, jeder für die vollen Verbindlichkeiten, und Gläubiger können sich direkt an jeden Gesellschafter wenden. Dies verschafft der OHG hohe Kreditwürdigkeit, bedeutet für die Gesellschafter aber ein hohes persönliches Risiko. Bei der GmbH haftet dagegen nur die Gesellschaft mit ihrem Gesellschaftsvermögen, weil sie eine juristische Person ist. Die Gesellschafter riskieren grundsätzlich nur ihre Einlage (Haftungsbeschränkung); ihr Privatvermögen bleibt unberührt. Als Ausgleich verlangt der Gesetzgeber ein Mindeststammkapital von 25.000 €.","e":"Kernunterschied: OHG = unbeschränkte persönliche Haftung aller Gesellschafter; GmbH = Haftungsbeschränkung auf das Gesellschaftsvermögen, dafür Mindestkapital."},{"id":"B-RF-034","f":2,"sub":"Rechtsformen","t":"open","q":"Nennen Sie fünf Kriterien, die bei der Wahl der Rechtsform eine Rolle spielen, und erläutern Sie eines davon.","a":"Wichtige Kriterien der Rechtsformwahl sind: (1) Haftung (persönlich unbeschränkt oder beschränkt), (2) Kapitalbedarf und Möglichkeiten der Kapitalbeschaffung, (3) Leitungs- und Vertretungsbefugnis (wer entscheidet), (4) Gewinn- und Verlustbeteiligung, (5) Steuerbelastung, (6) Publizitäts- und Rechnungslegungspflichten, (7) Mitbestimmung sowie (8) Gründungsaufwand und -kosten. Beispiel Haftung: Wer sein Privatvermögen schützen möchte, wird eine Kapitalgesellschaft (z. B. GmbH) mit Haftungsbeschränkung wählen; wer den einfachen Gründungsweg bevorzugt und die volle Kontrolle behalten will, entscheidet sich eher für ein Einzelunternehmen, muss dann aber die unbeschränkte Haftung in Kauf nehmen.","e":"Die Rechtsformwahl ist stets eine Abwägung; kein Kriterium ist für sich allein ausschlaggebend."},{"id":"B-RF-035","f":2,"sub":"Rechtsformen","t":"open","q":"Erläutern Sie, was eine Prokura ist, und nennen Sie zwei Geschäfte, die ein Prokurist nicht ohne besondere Befugnis vornehmen darf.","a":"Die Prokura ist eine im HGB geregelte, besonders weitreichende Handlungsvollmacht (§ 48 HGB). Sie ermächtigt den Prokuristen zu allen Arten von gerichtlichen und außergerichtlichen Geschäften und Rechtshandlungen, die der Betrieb eines Handelsgewerbes mit sich bringt – auch zu außergewöhnlichen Geschäften. Ihr Umfang ist gesetzlich festgelegt und gegenüber Dritten nicht beschränkbar; die Erteilung wird ins Handelsregister eingetragen (deklaratorisch). Ohne besondere Befugnis darf ein Prokurist jedoch nicht: (1) Grundstücke veräußern oder belasten, (2) selbst Prokura erteilen; ebenso ausgeschlossen sind das Unterzeichnen der Bilanz, Anmeldungen zum Handelsregister und die Einstellung des Betriebs.","e":"Die Prokura ist umfassend, aber nicht grenzenlos – die „Grundlagengeschäfte“ des Unternehmens bleiben dem Inhaber vorbehalten."},{"id":"B-OR-001","f":2,"sub":"Betriebsorganisation","t":"mc","q":"Was ist die kleinste organisatorische Einheit der Aufbauorganisation?","o":[{"t":"Die Stelle","ok":1},{"t":"Die Abteilung"},{"t":"Die Instanz"},{"t":"Der Betrieb"}],"e":"Die Stelle ist die kleinste Einheit; sie bündelt Aufgaben, die eine gedachte Person mit normaler Eignung bewältigen kann. Mehrere Stellen werden zu Abteilungen zusammengefasst."},{"id":"B-OR-002","f":2,"sub":"Betriebsorganisation","t":"mc","q":"Was ist eine Instanz in der Aufbauorganisation?","o":[{"t":"Eine Leitungsstelle mit Weisungs- und Entscheidungsbefugnis","ok":1},{"t":"Eine reine Ausführungsstelle ohne Befugnisse"},{"t":"Eine beratende Stabsstelle"},{"t":"Ein einzelnes Arbeitsmittel"}],"e":"Eine Instanz ist eine Stelle mit Leitungsbefugnis: Sie darf Weisungen erteilen und Entscheidungen treffen (z. B. Meister, Abteilungsleiter). Ausführungsstellen haben keine Weisungsbefugnis."},{"id":"B-OR-003","f":2,"sub":"Betriebsorganisation","t":"mc","q":"Welche Aufgabe hat eine Stabsstelle?","o":[{"t":"Beratung und Unterstützung der Instanzen – ohne eigene Weisungsbefugnis","ok":1},{"t":"Erteilung von Weisungen an alle Mitarbeiter"},{"t":"Ausschließlich ausführende Tätigkeiten"},{"t":"Führung des gesamten Betriebs"}],"e":"Stabsstellen (z. B. Justiziariat, Assistenz der Geschäftsführung, Arbeitssicherheit) bereiten Entscheidungen vor und beraten; sie besitzen jedoch keine Weisungsbefugnis gegenüber der Linie."},{"id":"B-OR-004","f":2,"sub":"Betriebsorganisation","t":"mc","q":"In welche zwei Schritte gliedert sich die Stellenbildung?","o":[{"t":"Aufgabenanalyse und Aufgabensynthese","ok":1},{"t":"Planung und Kontrolle"},{"t":"Beschaffung und Absatz"},{"t":"Angebot und Nachfrage"}],"e":"Zuerst wird die Gesamtaufgabe in Teilaufgaben zerlegt (Aufgabenanalyse), anschließend werden diese zu Stellen zusammengefasst (Aufgabensynthese)."},{"id":"B-OR-005","f":2,"sub":"Betriebsorganisation","t":"mc","q":"Nach welchen Kriterien kann eine Aufgabe im Rahmen der Aufgabenanalyse zerlegt werden?","o":[{"t":"U. a. nach Verrichtung, Objekt, Rang, Phase und Zweckbeziehung","ok":1},{"t":"Nur nach dem Alphabet"},{"t":"Nur nach dem Gehalt"},{"t":"Nur nach dem Standort"}],"e":"Nach Kosiol lässt sich die Gesamtaufgabe nach Verrichtung (Tätigkeit), Objekt (Bezugsgegenstand), Rang (Leitung/Ausführung), Phase (Planung/Realisation/Kontrolle) und Zweckbeziehung gliedern."},{"id":"B-OR-006","f":2,"sub":"Betriebsorganisation","t":"mc","q":"Was kennzeichnet das Einliniensystem?","o":[{"t":"Jede Stelle erhält Weisungen von genau einer übergeordneten Instanz (Einheit der Auftragserteilung)","ok":1},{"t":"Jede Stelle hat mehrere Vorgesetzte"},{"t":"Es gibt keine Vorgesetzten"},{"t":"Nur Stäbe erteilen Weisungen"}],"e":"Im Einliniensystem verläuft der Instanzenweg eindeutig von oben nach unten; jede Stelle hat nur einen Vorgesetzten. Vorteil: klare Zuständigkeiten; Nachteil: lange Dienstwege, Überlastung der Instanzen."},{"id":"B-OR-007","f":2,"sub":"Betriebsorganisation","t":"mc","q":"Welcher Vorteil ist typisch für das Einliniensystem?","o":[{"t":"Klare, eindeutige Kompetenz- und Weisungsverhältnisse","ok":1},{"t":"Besonders kurze Dienstwege"},{"t":"Keinerlei Hierarchie"},{"t":"Mehrfachunterstellung jeder Stelle"}],"e":"Das Einliniensystem bietet eindeutige Zuständigkeiten und einen klaren Instanzenweg. Nachteilig sind lange Kommunikationswege und eine mögliche Überlastung der oberen Instanzen."},{"id":"B-OR-008","f":2,"sub":"Betriebsorganisation","t":"mc","q":"Was kennzeichnet das Mehrliniensystem (Funktionssystem nach Taylor)?","o":[{"t":"Eine Stelle kann von mehreren spezialisierten Instanzen Weisungen erhalten","ok":1},{"t":"Jede Stelle hat nur einen Vorgesetzten"},{"t":"Es gibt keine Weisungen"},{"t":"Nur eine einzige Leitungsebene"}],"e":"Im Mehrliniensystem erhält eine Stelle Weisungen von mehreren fachlich spezialisierten Vorgesetzten. Vorteil: Spezialisierung, kurze Wege; Nachteil: Gefahr von Kompetenzkonflikten und widersprüchlichen Anweisungen."},{"id":"B-OR-009","f":2,"sub":"Betriebsorganisation","t":"mc","q":"Wie entsteht das Stab-Linien-System?","o":[{"t":"Durch Ergänzung des Einliniensystems um beratende Stabsstellen","ok":1},{"t":"Durch Abschaffung aller Instanzen"},{"t":"Durch Verzicht auf Weisungen"},{"t":"Durch reine Projektarbeit"}],"e":"Das Stab-Linien-System verbindet die klaren Weisungswege des Einliniensystems mit der Fachkompetenz von Stabsstellen. Die Stäbe beraten, entscheiden aber nicht – so bleibt die Einheit der Auftragserteilung erhalten."},{"id":"B-OR-010","f":2,"sub":"Betriebsorganisation","t":"mc","q":"Was kennzeichnet die Matrixorganisation?","o":[{"t":"Eine mehrdimensionale Struktur, in der sich funktionale und objektbezogene Weisungslinien überschneiden","ok":1},{"t":"Eine reine Einlinienstruktur"},{"t":"Eine Organisation ohne Leitung"},{"t":"Eine Struktur nur nach Regionen"}],"e":"In der Matrixorganisation überlagern sich zwei Weisungslinien (z. B. Funktionen und Produkte/Projekte). Vorteil: direkte Wege, ganzheitliche Sicht; Nachteil: doppelte Unterstellung und mögliche Kompetenzkonflikte."},{"id":"B-OR-011","f":2,"sub":"Betriebsorganisation","t":"mc","q":"Was ist ein Merkmal der Spartenorganisation (divisionale Organisation)?","o":[{"t":"Gliederung nach Objekten wie Produktgruppen, Regionen oder Kundengruppen","ok":1},{"t":"Gliederung ausschließlich nach Funktionen"},{"t":"Verzicht auf jede Gliederung"},{"t":"Nur eine einzige Sparte"}],"e":"Die Spartenorganisation gliedert das Unternehmen nach Objekten (z. B. Produktsparten, Geschäftsbereiche, Regionen). Jede Sparte kann als eigenständiger Bereich (Profit-Center) geführt werden."},{"id":"B-OR-012","f":2,"sub":"Betriebsorganisation","t":"mc","q":"Worin unterscheiden sich funktionale und divisionale Organisation?","o":[{"t":"Funktional gliedert nach Verrichtungen (Einkauf, Produktion, Vertrieb), divisional nach Objekten (Produkte, Regionen)","ok":1},{"t":"Beide gliedern nach Funktionen"},{"t":"Divisional kennt keine Abteilungen"},{"t":"Es gibt keinen Unterschied"}],"e":"Die funktionale Organisation ordnet nach gleichartigen Tätigkeiten (Verrichtungsprinzip), die divisionale nach Objekten wie Produktgruppen oder Märkten (Objektprinzip)."},{"id":"B-OR-013","f":2,"sub":"Betriebsorganisation","t":"mc","q":"Was versteht man unter der Leitungsspanne (Kontrollspanne)?","o":[{"t":"Die Anzahl der einer Instanz unmittelbar unterstellten Stellen","ok":1},{"t":"Die Zahl der Hierarchieebenen"},{"t":"Die Dauer einer Weisung"},{"t":"Die Größe des Betriebs"}],"e":"Die Leitungsspanne gibt an, wie viele Mitarbeiter direkt einer Führungskraft unterstellt sind. Eine große Spanne führt zu flachen, eine kleine zu steilen Hierarchien (Leitungstiefe)."},{"id":"B-OR-014","f":2,"sub":"Betriebsorganisation","t":"mc","q":"Welche Folge hat eine sehr große Leitungsspanne?","o":[{"t":"Flache Hierarchie, aber Gefahr der Überlastung der Führungskraft","ok":1},{"t":"Sehr viele Hierarchieebenen"},{"t":"Keine Auswirkung"},{"t":"Automatisch geringere Kosten"}],"e":"Eine große Leitungsspanne verringert die Zahl der Ebenen (flache Hierarchie, kürzere Wege), kann die Führungskraft aber überfordern. Eine kleine Spanne ermöglicht intensivere Führung, erhöht aber die Ebenenzahl."},{"id":"B-OR-015","f":2,"sub":"Betriebsorganisation","t":"mc","q":"Was bezeichnet der Instanzen-(Dienst-)weg?","o":[{"t":"Den vorgeschriebenen Weg der Kommunikation entlang der Hierarchie","ok":1},{"t":"Den Weg der Waren durch die Fertigung"},{"t":"Die Fahrtroute des Fuhrparks"},{"t":"Den Weg zur Kantine"}],"e":"Der Dienstweg legt fest, über welche Instanzen Informationen und Anweisungen zu laufen haben. Er sichert klare Zuständigkeiten, kann aber zu Verzögerungen führen."},{"id":"B-OR-016","f":2,"sub":"Betriebsorganisation","t":"mc","q":"Was bedeutet Delegation im organisatorischen Sinn?","o":[{"t":"Die Übertragung von Aufgaben, Kompetenzen und Verantwortung auf nachgeordnete Stellen","ok":1},{"t":"Die Entlassung von Mitarbeitern"},{"t":"Die zentrale Entscheidung durch die Geschäftsleitung"},{"t":"Die Abschaffung von Stellen"}],"e":"Delegation verlagert Aufgaben samt der nötigen Befugnisse und der Verantwortung auf tiefere Ebenen. Sie entlastet Führungskräfte und fördert Motivation und Eigenverantwortung."},{"id":"B-OR-017","f":2,"sub":"Betriebsorganisation","t":"mc","q":"Welche drei Elemente müssen bei der Delegation nach dem Kongruenzprinzip übereinstimmen (AKV)?","o":[{"t":"Aufgabe, Kompetenz und Verantwortung","ok":1},{"t":"Anweisung, Kontrolle und Vergütung"},{"t":"Arbeit, Kapital und Boden"},{"t":"Analyse, Konzept und Vertrieb"}],"e":"Nach dem AKV-/Kongruenzprinzip müssen die übertragene Aufgabe, die dafür nötigen Kompetenzen (Befugnisse) und die Verantwortung deckungsgleich sein – niemand soll verantwortlich sein für etwas, das er nicht entscheiden darf."},{"id":"B-OR-018","f":2,"sub":"Betriebsorganisation","t":"mc","q":"Welches Problem entsteht, wenn jemandem Verantwortung ohne die entsprechende Kompetenz übertragen wird?","o":[{"t":"Er soll für Ergebnisse einstehen, kann sie aber mangels Befugnis nicht beeinflussen (Verstoß gegen das Kongruenzprinzip)","ok":1},{"t":"Es entsteht kein Problem"},{"t":"Die Aufgabe wird automatisch erfüllt"},{"t":"Die Kompetenz erhöht sich von selbst"}],"e":"Ohne die nötigen Befugnisse kann die betreffende Person die Aufgabe nicht sachgerecht erledigen, trägt aber dennoch die Verantwortung – ein klassischer Organisationsfehler."},{"id":"B-OR-019","f":2,"sub":"Betriebsorganisation","t":"mc","q":"Worin unterscheiden sich fachliche und disziplinarische Weisungsbefugnis?","o":[{"t":"Die fachliche betrifft das „Was/Wie“ der Arbeit, die disziplinarische die personellen/dienstrechtlichen Belange","ok":1},{"t":"Beide sind identisch"},{"t":"Die fachliche betrifft nur das Gehalt"},{"t":"Die disziplinarische betrifft nur die Arbeitszeit"}],"e":"Fachliche Weisungsbefugnis steuert die inhaltliche Aufgabenerfüllung; disziplinarische Befugnis betrifft personelle Angelegenheiten (z. B. Urlaub, Beurteilung). In der Matrixorganisation können sie auseinanderfallen."},{"id":"B-OR-020","f":2,"sub":"Betriebsorganisation","t":"mc","q":"Was bedeutet Dezentralisation von Entscheidungen?","o":[{"t":"Entscheidungsbefugnisse werden auf nachgeordnete Stellen verlagert","ok":1},{"t":"Alle Entscheidungen trifft die oberste Leitung"},{"t":"Es werden keine Entscheidungen getroffen"},{"t":"Die Zahl der Standorte wird reduziert"}],"e":"Bei der Dezentralisation liegen Entscheidungen näher am Ort des Geschehens (mehr Eigenverantwortung, schnellere Reaktion). Zentralisation bündelt Entscheidungen an der Spitze (einheitliche Steuerung)."},{"id":"B-OR-021","f":2,"sub":"Betriebsorganisation","t":"mc","q":"Was stellt ein Organigramm dar?","o":[{"t":"Die grafische Abbildung der Aufbauorganisation mit Stellen, Instanzen und deren Beziehungen","ok":1},{"t":"Den zeitlichen Ablauf eines Projekts"},{"t":"Die Kostenstruktur"},{"t":"Den Materialfluss im Lager"}],"e":"Das Organigramm (Organisationsschaubild) zeigt die hierarchische Struktur des Unternehmens – Stellen, Instanzen, Abteilungen und deren Über-/Unterordnung sowie Weisungsbeziehungen."},{"id":"B-OR-022","f":2,"sub":"Betriebsorganisation","t":"mc","q":"Was enthält eine Stellenbeschreibung typischerweise?","o":[{"t":"Bezeichnung, Ziel/Aufgaben, Über-/Unterstellung, Kompetenzen und Anforderungen der Stelle","ok":1},{"t":"Nur das Gehalt des Stelleninhabers"},{"t":"Ausschließlich den Namen der Person"},{"t":"Die Bilanz des Unternehmens"}],"e":"Eine Stellenbeschreibung dokumentiert stellenbezogen (personenunabhängig) Aufgaben, Ziele, Einordnung in die Hierarchie, Befugnisse, Anforderungen und Vertretungsregelungen."},{"id":"B-OR-023","f":2,"sub":"Betriebsorganisation","t":"mc","q":"Worin unterscheiden sich Aufbau- und Ablauforganisation?","o":[{"t":"Die Aufbauorganisation regelt die Struktur (wer?), die Ablauforganisation die Prozesse (wann, wie, wo?)","ok":1},{"t":"Beide regeln nur die Löhne"},{"t":"Die Ablauforganisation regelt die Hierarchie"},{"t":"Es gibt keinen Unterschied"}],"e":"Die Aufbauorganisation bildet das Gerüst (Stellen, Abteilungen, Weisungswege). Die Ablauforganisation gestaltet die Arbeitsprozesse in räumlicher und zeitlicher Hinsicht (Reihenfolge, Termine, Orte)."},{"id":"B-OR-024","f":2,"sub":"Betriebsorganisation","t":"mc","q":"Welche Ziele verfolgt die Ablauforganisation?","o":[{"t":"Hohe Kapazitätsauslastung, kurze Durchlaufzeiten und Termintreue","ok":1},{"t":"Möglichst viele Hierarchieebenen"},{"t":"Maximale Zahl an Stellen"},{"t":"Höchstmögliche Lagerbestände"}],"e":"Die Ablauforganisation soll Kapazitäten gut auslasten, Durchlaufzeiten verkürzen und Termine einhalten. Diese Ziele stehen teils im Konflikt (Dilemma der Ablaufplanung)."},{"id":"B-OR-025","f":2,"sub":"Betriebsorganisation","t":"mc","q":"Was beschreibt das „Dilemma der Ablaufplanung“?","o":[{"t":"Den Zielkonflikt zwischen hoher Kapazitätsauslastung und kurzer Durchlaufzeit","ok":1},{"t":"Den Streit über die Rechtsform"},{"t":"Den Konflikt zwischen Einkauf und Verkauf"},{"t":"Die Wahl des Standorts"}],"e":"Maximale Maschinenauslastung erfordert Warteschlangen (Puffer), was die Durchlaufzeit verlängert. Kurze Durchlaufzeiten wiederum bedingen freie Kapazitäten (Leerzeiten). Beide Ziele lassen sich nicht gleichzeitig voll erreichen."},{"id":"B-OR-026","f":2,"sub":"Betriebsorganisation","t":"mc","q":"Was steht bei der Prozessorganisation im Mittelpunkt?","o":[{"t":"Die durchgängige Gestaltung von Geschäftsprozessen entlang der Wertschöpfung","ok":1},{"t":"Die Zahl der Hierarchieebenen"},{"t":"Die Höhe des Grundkapitals"},{"t":"Die Farbe der Abteilungen"}],"e":"Die Prozessorganisation richtet die Organisation an durchgehenden Geschäftsprozessen (z. B. Auftragsabwicklung) statt an einzelnen Funktionen aus – Ziel sind schnelle, kundenorientierte Abläufe."},{"id":"B-OR-027","f":2,"sub":"Betriebsorganisation","t":"mc","q":"Was versteht man unter der Durchlaufzeit eines Auftrags?","o":[{"t":"Die gesamte Zeit von Beginn bis Ende der Bearbeitung, einschließlich Liege- und Transportzeiten","ok":1},{"t":"Nur die reine Maschinenzeit"},{"t":"Die Lieferzeit des Rohstoffs"},{"t":"Die Amortisationsdauer"}],"e":"Die Durchlaufzeit umfasst Bearbeitungs-, Rüst-, Transport-, Liege- und Kontrollzeiten. Ein großer Teil entfällt oft auf Liegezeiten – hier liegt Optimierungspotenzial."},{"id":"B-OR-028","f":2,"sub":"Betriebsorganisation","t":"mc","q":"Worin unterscheidet sich die formelle von der informellen Organisation?","o":[{"t":"Die formelle Organisation ist offiziell geregelt, die informelle entsteht ungeplant durch persönliche Beziehungen","ok":1},{"t":"Beide sind offiziell festgelegt"},{"t":"Die informelle ist im Organigramm dargestellt"},{"t":"Es gibt keinen Unterschied"}],"e":"Die formelle Organisation ergibt sich aus offiziellen Regelungen (Organigramm, Stellenbeschreibungen). Daneben bilden sich informelle Strukturen (Freundschaften, inoffizielle Meinungsführer), die das Betriebsklima stark beeinflussen."},{"id":"B-OR-029","f":2,"sub":"Betriebsorganisation","t":"mc","q":"Was besagt das organisatorische Substitutionsprinzip (Gutenberg)?","o":[{"t":"Gleichartige, wiederkehrende Fälle sollten generell geregelt, einmalige Fälle fallweise entschieden werden","ok":1},{"t":"Jeder Fall ist einzeln zu entscheiden"},{"t":"Alles ist starr zu regeln"},{"t":"Organisation ist überflüssig"}],"e":"Nach dem Substitutionsprinzip werden fallweise Regelungen durch generelle ersetzt, je häufiger und gleichartiger ein Vorgang auftritt. Zu viele Regeln führen zur Überorganisation, zu wenige zur Unterorganisation."},{"id":"B-OR-030","f":2,"sub":"Betriebsorganisation","t":"mc","q":"Was versteht man unter Überorganisation?","o":[{"t":"Zu viele starre Regelungen, die die Flexibilität einschränken","ok":1},{"t":"Zu wenige Regelungen"},{"t":"Eine optimale Organisation"},{"t":"Das Fehlen jeder Struktur"}],"e":"Überorganisation liegt vor, wenn zu viele detaillierte Regeln die Anpassungsfähigkeit hemmen. Unterorganisation bedeutet umgekehrt zu wenig Regelung, sodass Abläufe unklar und ineffizient werden."},{"id":"B-OR-031","f":2,"sub":"Betriebsorganisation","t":"mc","q":"Was kennzeichnet die reine Projektorganisation?","o":[{"t":"Die Projektmitarbeiter werden vollständig aus der Linie herausgelöst und dem Projektleiter unterstellt","ok":1},{"t":"Der Projektleiter hat keinerlei Befugnisse"},{"t":"Es gibt keinen Projektleiter"},{"t":"Die Mitarbeiter bleiben voll in der Linie"}],"e":"In der reinen Projektorganisation bildet das Projekt eine eigene Einheit; die Mitarbeiter sind für die Projektdauer dem Projektleiter voll unterstellt. Vorteil: klare Verantwortung, hohe Schlagkraft; Nachteil: Wiedereingliederung nach Projektende."},{"id":"B-OR-032","f":2,"sub":"Betriebsorganisation","t":"mc","q":"Was kennzeichnet die Einfluss-(Stab-)Projektorganisation?","o":[{"t":"Der Projektleiter hat nur beratende Funktion ohne Weisungsbefugnis; die Mitarbeiter bleiben in der Linie","ok":1},{"t":"Der Projektleiter hat volle Weisungsbefugnis"},{"t":"Es gibt kein Projekt"},{"t":"Die Linie wird aufgelöst"}],"e":"Bei der Einfluss-(Stab-)Projektorganisation koordiniert der Projektleiter nur (Stabsfunktion), ohne eigene Weisungsbefugnis. Vorteil: geringer Eingriff in die Linie; Nachteil: schwache Durchsetzungskraft."},{"id":"B-OR-033","f":2,"sub":"Betriebsorganisation","t":"mc","q":"Wie ist die Weisungsbefugnis in der Matrix-Projektorganisation verteilt?","o":[{"t":"Sie ist zwischen Projektleiter und Linienvorgesetztem geteilt","ok":1},{"t":"Nur der Projektleiter weist an"},{"t":"Nur die Linie weist an"},{"t":"Niemand hat Weisungsbefugnis"}],"e":"In der Matrix-Projektorganisation teilen sich Projekt- und Linienleitung die Weisungsbefugnis (z. B. Projektleiter fachlich, Linie disziplinarisch). Vorteil: flexibler Ressourceneinsatz; Nachteil: Konfliktpotenzial durch Doppelunterstellung."},{"id":"B-OR-034","f":2,"sub":"Betriebsorganisation","t":"mc","q":"Was ist das Ziel der Organisationsentwicklung (OE)?","o":[{"t":"Die geplante, längerfristige Veränderung einer Organisation unter Beteiligung der Betroffenen","ok":1},{"t":"Die einmalige Senkung der Löhne"},{"t":"Die Abschaffung des Betriebsrats"},{"t":"Die kurzfristige Gewinnmaximierung ohne Rücksicht auf Mitarbeiter"}],"e":"OE ist ein geplanter, ganzheitlicher Wandlungsprozess, der Strukturen und Verhalten verbessert und dabei die Mitarbeiter aktiv einbezieht (Betroffene zu Beteiligten machen), um Akzeptanz zu sichern."},{"id":"B-OR-035","f":2,"sub":"Betriebsorganisation","t":"mc","q":"Welche drei Phasen unterscheidet das Veränderungsmodell nach Kurt Lewin?","o":[{"t":"Auftauen (unfreezing) – Verändern (moving) – Stabilisieren (refreezing)","ok":1},{"t":"Planen – Bauen – Abreißen"},{"t":"Beschaffen – Produzieren – Verkaufen"},{"t":"Forming – Storming – Norming"}],"e":"Lewins Drei-Phasen-Modell des Wandels: Auftauen (Veränderungsbereitschaft schaffen), Verändern (neue Verfahren einführen) und Stabilisieren (das Neue verankern), damit kein Rückfall erfolgt."},{"id":"B-OR-036","f":2,"sub":"Betriebsorganisation","t":"mc","q":"Warum entsteht bei Veränderungsprozessen häufig Widerstand der Mitarbeiter?","o":[{"t":"Aus Angst vor Neuem, Unsicherheit und fehlender Information/Beteiligung","ok":1},{"t":"Weil Mitarbeiter grundsätzlich faul sind"},{"t":"Ausschließlich wegen des Wetters"},{"t":"Widerstand kommt nie vor"}],"e":"Widerstand resultiert oft aus Unsicherheit, Gewohnheit, Angst vor Kompetenz-/Statusverlust und mangelnder Einbindung. Frühzeitige Information, Beteiligung und Qualifizierung können ihn verringern."},{"id":"B-OR-037","f":2,"sub":"Betriebsorganisation","t":"mc","q":"Was versteht man unter einer „lernenden Organisation“?","o":[{"t":"Ein Unternehmen, das sich fortlaufend anpasst und Wissen systematisch nutzt und weiterentwickelt","ok":1},{"t":"Ein Unternehmen, das nur einmal geschult wurde"},{"t":"Eine Schule"},{"t":"Eine Organisation ohne Veränderung"}],"e":"Eine lernende Organisation entwickelt sich kontinuierlich weiter, indem sie Erfahrungen auswertet, Wissen teilt und Strukturen anpasst – Grundlage für dauerhafte Wettbewerbsfähigkeit."},{"id":"B-OR-038","f":2,"sub":"Betriebsorganisation","t":"mc","q":"Ein Meister hat 8 Mitarbeiter direkt unterstellt. Wie bezeichnet man diese Kennzahl?","o":[{"t":"Leitungs-(Kontroll-)spanne","ok":1},{"t":"Leitungstiefe"},{"t":"Durchlaufzeit"},{"t":"Fertigungstiefe"}],"e":"Die Zahl der direkt unterstellten Mitarbeiter ist die Leitungsspanne. Die Leitungstiefe bezeichnet dagegen die Zahl der Hierarchieebenen."},{"id":"B-OR-039","f":2,"sub":"Betriebsorganisation","t":"mc","q":"Welche Organisationsform eignet sich besonders für ein diversifiziertes Unternehmen mit sehr unterschiedlichen Produktgruppen?","o":[{"t":"Die Spartenorganisation (divisional)","ok":1},{"t":"Das reine Einliniensystem ohne Gliederung"},{"t":"Die Stabsorganisation ohne Linie"},{"t":"Keine Organisation"}],"e":"Bei stark unterschiedlichen Produktgruppen erlaubt die Spartenorganisation eine eigenständige, marktnahe Steuerung jedes Bereichs (oft als Profit-Center) und erhöht die Flexibilität."},{"id":"B-OR-040","f":2,"sub":"Betriebsorganisation","t":"mc","q":"Welche Aussage zur Matrixorganisation trifft zu?","o":[{"t":"Sie ermöglicht kurze Wege und Spezialisierung, birgt aber Kompetenzkonflikte durch Doppelunterstellung","ok":1},{"t":"Sie hat immer nur einen Vorgesetzten je Stelle"},{"t":"Sie kennt keine Konflikte"},{"t":"Sie ist mit dem Einliniensystem identisch"}],"e":"Die Matrix verbindet zwei Dimensionen (z. B. Funktion und Produkt). Vorteile sind direkte Kommunikation und ganzheitliche Problemlösung; Nachteil ist das Konfliktpotenzial durch die doppelte Weisungslinie."},{"id":"B-OR-041","f":2,"sub":"Betriebsorganisation","t":"open","q":"Erläutern Sie das AKV-(Kongruenz-)Prinzip der Delegation und warum es für erfolgreiche Führung wichtig ist.","a":"Das AKV-Prinzip verlangt, dass bei der Delegation drei Elemente deckungsgleich (kongruent) übertragen werden: die Aufgabe (was zu tun ist), die Kompetenz (die dafür nötigen Befugnisse und Entscheidungsrechte) und die Verantwortung (das Einstehenmüssen für das Ergebnis). Wichtig ist dies, weil ein Mitarbeiter eine Aufgabe nur dann sachgerecht und motiviert erledigen kann, wenn er auch die passenden Befugnisse hat. Erhält er Verantwortung ohne Kompetenz, soll er für etwas geradestehen, das er nicht beeinflussen darf – das führt zu Frustration und Fehlern. Umgekehrt darf Kompetenz ohne Verantwortung nicht bestehen, weil sonst niemand für die Folgen einsteht. Nur die Übereinstimmung aller drei sichert klare Zuständigkeit und wirksame Delegation.","e":"Kurz: Wer eine Aufgabe bekommt, braucht die passenden Befugnisse und trägt dafür die Verantwortung – alle drei müssen zusammenpassen."},{"id":"B-OR-042","f":2,"sub":"Betriebsorganisation","t":"open","q":"Beschreiben Sie den Unterschied zwischen Aufbau- und Ablauforganisation und nennen Sie je ein Beispiel.","a":"Die Aufbauorganisation legt die Struktur des Unternehmens fest: Sie bildet Stellen und Abteilungen, ordnet sie hierarchisch ein und regelt Weisungs- und Kommunikationsbeziehungen. Sie beantwortet die Frage „Wer ist wofür zuständig?“. Beispiel: ein Organigramm mit den Abteilungen Einkauf, Fuhrpark und Disposition sowie deren Leitungen. Die Ablauforganisation gestaltet dagegen die Arbeitsprozesse in räumlicher und zeitlicher Hinsicht – also Reihenfolge, Termine und Orte der Tätigkeiten. Sie beantwortet die Frage „Wann, wie und wo wird gearbeitet?“. Beispiel: der festgelegte Ablauf einer Auftragsabwicklung von der Annahme über die Tourenplanung bis zur Auslieferung. Aufbau- und Ablauforganisation greifen ineinander: Die Struktur bildet den Rahmen, in dem die Prozesse ablaufen.","e":"Merksatz: Aufbauorganisation = Struktur (wer?), Ablauforganis
