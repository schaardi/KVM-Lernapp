e","t":"mc","q":"Was kennzeichnet den Laissez-faire-Führungsstil?","o":[{"t":"Die Mitarbeiter werden weitgehend sich selbst überlassen; die Führungskraft greift kaum ein","ok":1},{"t":"Strenge Kontrolle jeder Handlung"},{"t":"Alleinentscheidung des Vorgesetzten"},{"t":"Enge Anweisung aller Schritte"}],"e":"Beim Laissez-faire-Stil haben die Mitarbeiter große Freiheiten; die Führungskraft hält sich zurück, gibt kaum Vorgaben oder Feedback. Bei sehr qualifizierten, selbstständigen Teams kann das funktionieren; oft drohen jedoch Orientierungslosigkeit, Konflikte und mangelnde Koordination."},{"id":"Z-FS-009","f":4,"sub":"Führungsstile","t":"mc","q":"Für welche Situation ist ein autoritärer Führungsstil am ehesten angemessen?","o":[{"t":"In Krisen oder Notfällen, in denen schnelle, klare Entscheidungen nötig sind","ok":1},{"t":"Bei kreativer Teamarbeit mit Experten"},{"t":"Wenn maximale Mitbestimmung gewünscht ist"},{"t":"Wenn Zeit für ausführliche Abstimmung besteht"}],"e":"Wenn es schnell gehen muss oder Gefahr im Verzug ist (z. B. Notfall, akute Störung), sind rasche, eindeutige Anweisungen sinnvoll. In komplexen, kreativen oder auf Beteiligung angewiesenen Situationen ist dagegen ein kooperativer Stil überlegen."},{"id":"Z-FS-010","f":4,"sub":"Führungsstile","t":"mc","q":"Was beschreibt das Führungskontinuum von Tannenbaum und Schmidt?","o":[{"t":"Eine stufenlose Skala von autoritär bis kooperativ/delegativ je nach Entscheidungsspielraum von Vorgesetztem und Gruppe","ok":1},{"t":"Eine Bedürfnispyramide"},{"t":"Eine Kostenrechnung"},{"t":"Ein Organigramm"}],"e":"Tannenbaum/Schmidt ordnen Führungsstile auf einem Kontinuum an: Von links (Vorgesetzter entscheidet und ordnet an) bis rechts (Gruppe entscheidet im vereinbarten Rahmen). Je weiter rechts, desto größer der Entscheidungsspielraum der Mitarbeiter."},{"id":"Z-FS-011","f":4,"sub":"Führungsstile","t":"mc","q":"Wovon hängt nach Tannenbaum/Schmidt die Wahl des Führungsstils ab?","o":[{"t":"Von der Führungskraft, den Mitarbeitern und der jeweiligen Situation","ok":1},{"t":"Ausschließlich vom Gehalt"},{"t":"Nur von der Rechtsform"},{"t":"Vom Wetter"}],"e":"Der passende Stil ergibt sich aus dem Zusammenspiel dreier Einflussgrößen: den Eigenschaften der Führungskraft, dem Können und Wollen der Mitarbeiter und den situativen Bedingungen (Aufgabe, Zeitdruck, Umfeld)."},{"id":"Z-FS-012","f":4,"sub":"Führungsstile","t":"mc","q":"Was geschieht auf dem Tannenbaum/Schmidt-Kontinuum, je weiter man sich zum kooperativen Pol bewegt?","o":[{"t":"Der Entscheidungsspielraum der Mitarbeiter wächst, der des Vorgesetzten nimmt ab","ok":1},{"t":"Der Vorgesetzte entscheidet zunehmend allein"},{"t":"Die Mitarbeiter verlieren jeden Einfluss"},{"t":"Es ändert sich nichts"}],"e":"Von links (autoritär) nach rechts (kooperativ/delegativ) verschiebt sich der Entscheidungsspielraum vom Vorgesetzten zur Gruppe: von „anordnen“ über „verkaufen“, „konsultieren“ bis „gemeinsam entscheiden/delegieren“."},{"id":"Z-FS-013","f":4,"sub":"Führungsstile","t":"mc","q":"Welche zwei Dimensionen bilden das Verhaltensgitter (Managerial Grid) von Blake und Mouton?","o":[{"t":"Sachorientierung (Betonung der Leistung) und Menschenorientierung (Betonung der Mitarbeiter)","ok":1},{"t":"Preis und Menge"},{"t":"Fixe und variable Kosten"},{"t":"Zeit und Geld"}],"e":"Das Verhaltensgitter spannt zwei Achsen auf: die Betonung der Aufgabe/Produktion (Sachorientierung) und die Betonung des Menschen (Mitarbeiterorientierung), jeweils auf einer Skala von 1 bis 9."},{"id":"Z-FS-014","f":4,"sub":"Führungsstile","t":"mc","q":"Welcher Führungsstil gilt im Verhaltensgitter (Blake/Mouton) als ideal?","o":[{"t":"Der Stil 9.9 (hohe Sach- und hohe Menschenorientierung, „Team-Management“)","ok":1},{"t":"Der Stil 1.1 (geringes Interesse an beidem)"},{"t":"Der Stil 9.1 (nur Aufgabenorientierung)"},{"t":"Der Stil 1.9 (nur Menschenorientierung)"}],"e":"Als Idealstil sehen Blake/Mouton das „Team-Management“ (9.9): hohe Orientierung sowohl an der Aufgabe als auch am Menschen. Ziel- und Mitarbeiterorientierung werden dabei bestmöglich verbunden."},{"id":"Z-FS-015","f":4,"sub":"Führungsstile","t":"mc","q":"Wofür steht im Verhaltensgitter der Stil 1.1?","o":[{"t":"Geringe Sach- und geringe Menschenorientierung (Überlebensmanagement)","ok":1},{"t":"Hohe Orientierung an beidem"},{"t":"Reine Aufgabenorientierung"},{"t":"Reine Menschenorientierung"}],"e":"Der Stil 1.1 („impoverished“/Überlebensmanagement) bedeutet minimales Engagement für Leistung wie für Menschen – die Führungskraft tut nur das Nötigste. Er gilt als schwächster Stil."},{"id":"Z-FS-016","f":4,"sub":"Führungsstile","t":"mc","q":"Wofür steht der Stil 9.1 im Verhaltensgitter?","o":[{"t":"Hohe Sach-, geringe Menschenorientierung (Befehl-Gehorsam/aufgabenorientiert)","ok":1},{"t":"Hohe Menschen-, geringe Sachorientierung"},{"t":"Gleichgewicht auf mittlerem Niveau"},{"t":"Geringes Interesse an beidem"}],"e":"Beim Stil 9.1 stehen Leistung und Ergebnis im Vordergrund, die Bedürfnisse der Mitarbeiter treten zurück (autoritär, Befehl-Gehorsam). Der Stil 1.9 („Glacéhandschuh“) betont umgekehrt vor allem die Mitarbeiter und Harmonie."},{"id":"Z-FS-017","f":4,"sub":"Führungsstile","t":"mc","q":"Wofür steht der Stil 5.5 im Verhaltensgitter?","o":[{"t":"Mittlere Sach- und mittlere Menschenorientierung (Kompromiss)","ok":1},{"t":"Höchste Orientierung an beidem"},{"t":"Geringstes Interesse an beidem"},{"t":"Reine Aufgabenorientierung"}],"e":"Der Stil 5.5 („Organisationsmanagement“) sucht einen Kompromiss auf mittlerem Niveau: Leistung und Zufriedenheit werden ausbalanciert, aber keines von beiden voll ausgeschöpft. Blake/Mouton halten 9.9 für überlegen."},{"id":"Z-FS-018","f":4,"sub":"Führungsstile","t":"mc","q":"Was ist die Grundidee des situativen Führungsstils (z. B. Hersey/Blanchard)?","o":[{"t":"Der Führungsstil wird an die Situation und den Reifegrad des Mitarbeiters angepasst","ok":1},{"t":"Es gibt genau einen besten Stil für alle Fälle"},{"t":"Der Stil richtet sich nur nach dem Gehalt"},{"t":"Führung ist überflüssig"}],"e":"Situative Führung geht davon aus, dass es keinen allgemein besten Stil gibt. Die Führungskraft passt ihr Verhalten an die Situation und vor allem an den Reifegrad (Können und Wollen) des Mitarbeiters an."},{"id":"Z-FS-019","f":4,"sub":"Führungsstile","t":"mc","q":"Welchen Führungsstil legt ein Mitarbeiter mit geringem Reifegrad (wenig Können und/oder Wollen) nahe?","o":[{"t":"Einen eher anweisenden, unterstützenden Stil (klare Vorgaben, enge Begleitung)","ok":1},{"t":"Vollständiges Delegieren ohne Begleitung"},{"t":"Gar keine Führung"},{"t":"Reines Laissez-faire"}],"e":"Bei geringer Reife braucht der Mitarbeiter Orientierung: klare Anweisungen, Unterstützung und engmaschiges Feedback (unterweisen/überzeugen). Mit wachsender Reife kann die Führungskraft stärker beteiligen und schließlich delegieren."},{"id":"Z-FS-020","f":4,"sub":"Führungsstile","t":"mc","q":"Welcher Führungsstil passt zu einem sehr erfahrenen, motivierten und selbstständigen Mitarbeiter?","o":[{"t":"Ein delegierender Stil mit großen Freiräumen","ok":1},{"t":"Enge, kleinteilige Kontrolle"},{"t":"Ständige detaillierte Anweisungen"},{"t":"Autoritäres Durchgreifen"}],"e":"Bei hoher Reife (großes Können und Wollen) kann die Führungskraft Aufgaben und Verantwortung weitgehend übertragen (delegieren). Enge Kontrolle würde hier eher demotivieren und die Eigeninitiative bremsen."},{"id":"Z-FS-021","f":4,"sub":"Führungsstile","t":"mc","q":"Worin unterscheiden sich ein- und zweidimensionale Führungsstilansätze?","o":[{"t":"Eindimensionale betrachten eine Achse (autoritär↔kooperativ), zweidimensionale zwei (Aufgaben- und Mitarbeiterorientierung)","ok":1},{"t":"Beide sind identisch"},{"t":"Zweidimensionale kennen keine Mitarbeiter"},{"t":"Eindimensionale haben zwei Achsen"}],"e":"Eindimensionale Ansätze (z. B. Lewin, Tannenbaum/Schmidt) ordnen Stile auf einer Linie von autoritär bis kooperativ. Zweidimensionale Ansätze (z. B. Blake/Mouton) berücksichtigen zusätzlich, wie stark Aufgabe und Mensch jeweils betont werden."},{"id":"Z-FS-022","f":4,"sub":"Führungsstile","t":"mc","q":"Welche Formen der Autorität einer Führungskraft werden unterschieden?","o":[{"t":"Amtsautorität (Position), fachliche Autorität (Kompetenz) und persönliche Autorität (Persönlichkeit)","ok":1},{"t":"Bar-, Buch- und Sachautorität"},{"t":"Fixe und variable Autorität"},{"t":"Nur die Amtsautorität"}],"e":"Amtsautorität ergibt sich aus der Stellung (verliehene Macht), fachliche Autorität aus Wissen und Können, persönliche (natürliche) Autorität aus Persönlichkeit, Vorbild und Vertrauen. Dauerhaft trägt vor allem die fachliche und persönliche Autorität."},{"id":"Z-FS-023","f":4,"sub":"Führungsstile","t":"mc","q":"Worin unterscheiden sich Amtsautorität und persönliche Autorität?","o":[{"t":"Amtsautorität beruht auf der Position, persönliche Autorität auf Kompetenz, Vorbild und Vertrauen","ok":1},{"t":"Beide sind identisch"},{"t":"Persönliche Autorität wird verliehen"},{"t":"Amtsautorität muss man sich erarbeiten"}],"e":"Die Amtsautorität ist mit der Stelle verbunden (formale Macht). Persönliche Autorität muss sich die Führungskraft durch Kompetenz, Glaubwürdigkeit und vorbildliches Verhalten erwerben; sie wirkt nachhaltiger als bloße Amtsmacht."},{"id":"Z-FS-024","f":4,"sub":"Führungsstile","t":"mc","q":"Warum ist die Vorbildfunktion der Führungskraft wichtig?","o":[{"t":"Mitarbeiter orientieren sich am Verhalten der Führungskraft; Glaubwürdigkeit entsteht durch Übereinstimmung von Reden und Handeln","ok":1},{"t":"Sie ist bedeutungslos"},{"t":"Nur Anweisungen zählen"},{"t":"Vorbild ist gesetzlich verboten"}],"e":"Führung wirkt stark über das Vorbild: Wer selbst engagiert, fair und verlässlich handelt, wird glaubwürdig und schafft Vertrauen. Widersprechen sich Worte und Taten, verliert die Führungskraft an Autorität und Wirkung."},{"id":"Z-FS-025","f":4,"sub":"Führungsstile","t":"mc","q":"Gibt es nach heutigem Verständnis den einen, immer besten Führungsstil?","o":[{"t":"Nein – der Führungserfolg hängt von Situation, Aufgabe und Mitarbeitern ab (situativ)","ok":1},{"t":"Ja, der autoritäre Stil ist immer am besten"},{"t":"Ja, der Laissez-faire-Stil ist immer am besten"},{"t":"Ja, es gibt einen für alle Fälle optimalen Stil"}],"e":"Die situative Führungslehre betont, dass der wirksamste Stil von den Umständen abhängt: von Aufgabe, Zeitdruck, Reifegrad der Mitarbeiter und Unternehmenskultur. Eine gute Führungskraft variiert ihr Verhalten flexibel."},{"id":"Z-FS-026","f":4,"sub":"Führungsstile","t":"mc","q":"Welcher Führungsstil fördert die Eigenverantwortung und Motivation der Mitarbeiter am stärksten?","o":[{"t":"Der kooperative Führungsstil","ok":1},{"t":"Der autoritäre Führungsstil"},{"t":"Der Laissez-faire-Stil"},{"t":"Der bürokratische Zwang"}],"e":"Der kooperative Stil beteiligt Mitarbeiter, delegiert Verantwortung und nutzt ihr Wissen – das stärkt Motivation, Identifikation und Eigenverantwortung. Laissez-faire überlässt zwar Freiraum, bietet aber zu wenig Orientierung und Rückhalt."},{"id":"Z-FS-027","f":4,"sub":"Führungsstile","t":"mc","q":"Was kann die Folge eines dauerhaft autoritären Führungsstils sein?","o":[{"t":"Geringe Eigeninitiative, Demotivation und starke Abhängigkeit vom Vorgesetzten","ok":1},{"t":"Maximale Kreativität der Mitarbeiter"},{"t":"Sehr hohe Eigenverantwortung"},{"t":"Keinerlei Auswirkung"}],"e":"Dauerhafte Anordnung ohne Beteiligung unterdrückt Eigeninitiative und Kreativität, mindert die Motivation und macht das Team stark von der Führungskraft abhängig – bei deren Ausfall entsteht schnell ein Vakuum."},{"id":"Z-FS-028","f":4,"sub":"Führungsstile","t":"mc","q":"Worin unterscheiden sich Macht und Autorität?","o":[{"t":"Macht ist die Möglichkeit, den eigenen Willen durchzusetzen; Autorität ist anerkannter Einfluss, dem freiwillig gefolgt wird","ok":1},{"t":"Beide sind identisch"},{"t":"Autorität beruht immer auf Zwang"},{"t":"Macht wird stets freiwillig anerkannt"}],"e":"Macht kann sich auf Zwang, Belohnung oder Position stützen. Autorität dagegen beruht auf Anerkennung (Kompetenz, Persönlichkeit); ihr folgt man freiwillig. Nachhaltige Führung setzt eher auf Autorität als auf reine Macht."},{"id":"Z-FS-029","f":4,"sub":"Führungsstile","t":"mc","q":"Welches Führungsverhalten passt am besten zu hochqualifizierten Experten, die eigenständig arbeiten?","o":[{"t":"Ziele vereinbaren und Freiräume geben (delegativ/kooperativ)","ok":1},{"t":"Jeden Arbeitsschritt vorschreiben"},{"t":"Ständige Kontrolle"},{"t":"Autoritäres Anordnen ohne Begründung"}],"e":"Fachexperten arbeiten am besten mit Zielvereinbarungen und Handlungsspielraum. Kleinteilige Vorgaben und Kontrolle würden ihr Wissen ungenutzt lassen und demotivieren; ein delegativer, kooperativer Stil nutzt ihr Potenzial."},{"id":"Z-FS-030","f":4,"sub":"Führungsstile","t":"mc","q":"Was bedeutet Aufgabenorientierung (Sachorientierung) im Führungsverhalten?","o":[{"t":"Der Fokus liegt auf Zielerreichung, Leistung, Struktur und Ergebnis","ok":1},{"t":"Der Fokus liegt nur auf den Gefühlen der Mitarbeiter"},{"t":"Es geht ausschließlich um Pausenregelungen"},{"t":"Es geht um die Höhe des Umsatzes des Betriebs"}],"e":"Aufgabenorientierte Führung betont Ziele, Planung, Organisation und Ergebniskontrolle. Die Mitarbeiterorientierung stellt dagegen Beziehungen, Bedürfnisse und Wohlbefinden in den Vordergrund. Gute Führung verbindet beides (vgl. 9.9)."},{"id":"Z-FS-031","f":4,"sub":"Führungsstile","t":"mc","q":"Was bedeutet Mitarbeiterorientierung im Führungsverhalten?","o":[{"t":"Der Fokus liegt auf Beziehungen, Bedürfnissen, Wertschätzung und Wohlbefinden der Mitarbeiter","ok":1},{"t":"Der Fokus liegt nur auf Zahlen und Terminen"},{"t":"Es geht ausschließlich um Maschinen"},{"t":"Es geht nur um Kosten"}],"e":"Mitarbeiterorientierte Führung achtet auf ein gutes Verhältnis, nimmt Bedürfnisse ernst, fördert und unterstützt. In Kombination mit Aufgabenorientierung entsteht das im Verhaltensgitter angestrebte Team-Management (9.9)."},{"id":"Z-FS-032","f":4,"sub":"Führungsstile","t":"mc","q":"Welche Gefahr besteht bei rein menschenorientierter Führung (Stil 1.9)?","o":[{"t":"Harmoniestreben kann die Zielerreichung und Leistung vernachlässigen","ok":1},{"t":"Die Mitarbeiter werden überfordert"},{"t":"Es entsteht zu viel Druck"},{"t":"Die Beziehungen leiden"}],"e":"Beim „Glacéhandschuh“-Stil (1.9) steht die gute Stimmung im Vordergrund, während Leistungsanforderungen und Ergebnisse zu kurz kommen können. Nötig ist ein Gleichgewicht aus Beziehungs- und Aufgabenorientierung."},{"id":"Z-FS-033","f":4,"sub":"Führungsstile","t":"mc","q":"Warum ist reines Laissez-faire in den meisten Betrieben problematisch?","o":[{"t":"Es fehlen Orientierung, Koordination und Feedback, was zu Konflikten und Leistungsabfall führen kann","ok":1},{"t":"Es ist zu autoritär"},{"t":"Es kontrolliert zu streng"},{"t":"Es motiviert immer optimal"}],"e":"Ohne Zielvorgaben, Koordination und Rückmeldung verlieren viele Teams die Orientierung; Zuständigkeiten verschwimmen, Konflikte und Leistungsschwankungen nehmen zu. Freiraum wirkt nur, wenn Ziele klar und die Mitarbeiter sehr selbstständig sind."},{"id":"Z-FS-034","f":4,"sub":"Führungsstile","t":"open","q":"Beschreiben Sie die drei klassischen Führungsstile nach Lewin mit je einem Vor- und Nachteil.","a":"1) Autoritärer Führungsstil: Die Führungskraft entscheidet allein und gibt Anweisungen; die Mitarbeiter führen aus. Vorteil: schnelle, klare Entscheidungen und eindeutige Verantwortung (gut in Krisen/bei Zeitdruck). Nachteil: geringe Motivation und Eigeninitiative, starke Abhängigkeit vom Vorgesetzten. 2) Kooperativer (demokratischer) Führungsstil: Die Mitarbeiter werden an Entscheidungen beteiligt, es wird delegiert und gemeinsam beraten. Vorteil: hohe Motivation, Nutzung des Mitarbeiterwissens, Förderung von Eigenverantwortung und Entlastung der Führungskraft. Nachteil: Entscheidungen dauern länger (Abstimmungsaufwand), in Krisen kann rasches Durchgreifen erschwert sein. 3) Laissez-faire-Führungsstil: Die Mitarbeiter werden weitgehend sich selbst überlassen, die Führungskraft greift kaum ein. Vorteil: große Freiräume, die bei sehr qualifizierten und selbstständigen Mitarbeitern kreativ genutzt werden können. Nachteil: fehlende Orientierung, Koordination und Rückmeldung, wodurch Konflikte, Unsicherheit und Leistungsabfall drohen.","e":"Merksatz: autoritär = Chef entscheidet (schnell, aber demotivierend); kooperativ = Beteiligung (motivierend, aber zeitaufwendig); laissez-faire = Freiraum (kreativ, aber ohne Führung riskant)."},{"id":"Z-FS-035","f":4,"sub":"Führungsstile","t":"open","q":"Erläutern Sie das Verhaltensgitter (Managerial Grid) von Blake und Mouton und nennen Sie den als ideal geltenden Stil.","a":"Das Verhaltensgitter von Blake und Mouton beschreibt Führungsverhalten anhand von zwei Dimensionen, die jeweils auf einer Skala von 1 bis 9 abgetragen werden: der Betonung der Aufgabe/Produktion (Sachorientierung, waagerechte Achse) und der Betonung des Menschen (Mitarbeiterorientierung, senkrechte Achse). Aus den Kombinationen ergeben sich charakteristische Stile: 1.1 (geringes Interesse an beidem – Überlebensmanagement), 9.1 (hohe Sach-, geringe Menschenorientierung – Befehl-Gehorsam/autoritär), 1.9 (geringe Sach-, hohe Menschenorientierung – „Glacéhandschuh“, Harmonie), 5.5 (mittlere Ausprägung bei beidem – Kompromiss/Organisationsmanagement) und 9.9 (hohe Sach- und hohe Menschenorientierung – Team-Management). Als idealer Stil gilt 9.9: Hier werden Zielerreichung und Mitarbeiterbedürfnisse gleichermaßen hoch gewichtet und bestmöglich miteinander verbunden. Die Grundaussage ist, dass wirksame Führung sowohl leistungs- als auch menschenorientiert sein sollte, statt nur eine Seite zu betonen.","e":"Zwei Achsen: Sach- und Menschenorientierung (je 1–9). Stile: 1.1, 9.1, 1.9, 5.5, 9.9. Ideal ist 9.9 (Team-Management) – hohe Orientierung an Aufgabe UND Mensch."},{"id":"Z-FS-036","f":4,"sub":"Führungsstile","t":"open","q":"Erklären Sie die Grundidee der situativen Führung und wie sich der Führungsstil mit dem Reifegrad des Mitarbeiters ändert.","a":"Die situative Führung geht davon aus, dass es keinen allgemein besten Führungsstil gibt, sondern dass die Führungskraft ihr Verhalten an die jeweilige Situation und vor allem an den Reifegrad des Mitarbeiters anpassen sollte. Der Reifegrad setzt sich aus dem Können (Fähigkeiten, Erfahrung) und dem Wollen (Motivation, Selbstvertrauen) zusammen. Bei geringem Reifegrad – der Mitarbeiter kann und/oder will die Aufgabe noch nicht sicher erfüllen – ist ein stark anweisender, unterstützender Stil sinnvoll: klare Vorgaben, enge Begleitung, viel Feedback (unterweisen und überzeugen). Mit wachsender Reife kann die Führungskraft schrittweise mehr beteiligen: Sie bindet den Mitarbeiter in Entscheidungen ein und unterstützt ihn (partizipieren). Bei hoher Reife – der Mitarbeiter ist erfahren, motiviert und selbstständig – kann sie Aufgaben und Verantwortung weitgehend übertragen und sich zurücknehmen (delegieren). Die Führungskraft passt also Aufgaben- und Beziehungsorientierung flexibel an die Entwicklung des Mitarbeiters an.","e":"Kern: kein Einheitsstil, sondern Anpassung an den Reifegrad (Können + Wollen). Von anweisen → überzeugen → beteiligen → delegieren mit steigender Reife."},{"id":"Z-FS-037","f":4,"sub":"Führungsstile","t":"mc","q":"Welche Aussage über den Zusammenhang von Menschenbild und Führungsstil ist richtig?","o":[{"t":"Das Menschenbild der Führungskraft (vgl. Theorie X/Y) beeinflusst maßgeblich ihren Führungsstil","ok":1},{"t":"Menschenbild und Führungsstil haben nichts miteinander zu tun"},{"t":"Nur das Gehalt bestimmt den Führungsstil"},{"t":"Der Führungsstil ist angeboren und unveränderlich"}],"e":"Wie eine Führungskraft ihre Mitarbeiter sieht, prägt ihr Verhalten: Ein negatives Menschenbild (Theorie X) führt eher zu Kontrolle und Anweisung, ein positives (Theorie Y) zu Vertrauen und Delegation. Führungsverhalten ist zudem erlern- und veränderbar."},{"id":"Z-FS-038","f":4,"sub":"Führungsstile","t":"mc","q":"Was ist ein Kennzeichen des kooperativen Führungsstils in Bezug auf Fehler?","o":[{"t":"Fehler werden als Lernchance gesehen und offen besprochen (konstruktive Fehlerkultur)","ok":1},{"t":"Fehler werden ausschließlich bestraft"},{"t":"Fehler werden ignoriert"},{"t":"Fehler werden vertuscht"}],"e":"Kooperative Führung pflegt eine offene, konstruktive Fehlerkultur: Fehler werden analysiert, um daraus zu lernen und Wiederholungen zu vermeiden, statt vorrangig Schuldige zu suchen. Das fördert Vertrauen, Offenheit und kontinuierliche Verbesserung."},{"id":"Z-FS-039","f":4,"sub":"Führungsstile","t":"mc","q":"Welche Bedeutung hat der Reifegrad des Mitarbeiters für die Delegation von Aufgaben?","o":[{"t":"Je höher der Reifegrad, desto mehr Verantwortung kann delegiert werden","ok":1},{"t":"Der Reifegrad spielt keine Rolle"},{"t":"Unerfahrenen sollte am meisten delegiert werden"},{"t":"Delegation ist immer gleich, unabhängig vom Mitarbeiter"}],"e":"Delegation setzt voraus, dass der Mitarbeiter die Aufgabe bewältigen kann und will. Mit steigendem Reifegrad kann die Führungskraft mehr Verantwortung übertragen und die Kontrolle lockern; bei geringer Reife ist engere Begleitung nötig."},{"id":"Z-FS-040","f":4,"sub":"Führungsstile","t":"mc","q":"Warum sollte eine Führungskraft ihren Führungsstil reflektieren und weiterentwickeln?","o":[{"t":"Weil Führungsverhalten erlernbar ist und an Mitarbeiter und Situationen angepasst werden sollte","ok":1},{"t":"Weil der Stil ohnehin unveränderlich ist"},{"t":"Weil nur das Gehalt zählt"},{"t":"Weil Reflexion verboten ist"}],"e":"Führung ist keine feste Eigenschaft, sondern eine erlern- und entwickelbare Kompetenz. Wer sein Verhalten reflektiert (z. B. über Feedback), kann flexibler auf unterschiedliche Mitarbeiter und Situationen eingehen und wirksamer führen."},{"id":"Z-FS-041","f":4,"sub":"Führungsstile","t":"mc","q":"Welche Kombination beschreibt den Idealstil 9.9 im Verhaltensgitter am besten?","o":[{"t":"Hohe Zielorientierung und hohe Wertschätzung der Mitarbeiter zugleich","ok":1},{"t":"Nur Ergebnisdruck ohne Rücksicht auf Mitarbeiter"},{"t":"Nur Harmonie ohne Leistungsanspruch"},{"t":"Minimales Engagement für beides"}],"e":"Der Stil 9.9 (Team-Management) verbindet hohe Aufgaben- mit hoher Mitarbeiterorientierung: Anspruchsvolle Ziele werden gemeinsam verfolgt, während die Mitarbeiter zugleich einbezogen, gefördert und wertgeschätzt werden."},{"id":"Z-FS-042","f":4,"sub":"Führungsstile","t":"mc","q":"Welche Autoritätsform muss sich eine Führungskraft durch Wissen und Können erarbeiten?","o":[{"t":"Die fachliche Autorität","ok":1},{"t":"Die Amtsautorität"},{"t":"Die verliehene Autorität"},{"t":"Die formale Autorität"}],"e":"Fachliche Autorität beruht auf nachgewiesener Kompetenz und Erfahrung – sie muss man sich erwerben. Die Amts-/formale Autorität ist dagegen an die Position gebunden und wird mit der Stelle verliehen."},{"id":"Z-FS-043","f":4,"sub":"Führungsstile","t":"mc","q":"Was folgt aus der Erkenntnis, dass Führungsstile situationsabhängig wirken?","o":[{"t":"Eine gute Führungskraft beherrscht mehrere Stile und wählt situativ den passenden aus","ok":1},{"t":"Man sollte immer denselben Stil verwenden"},{"t":"Führungsstile sind bedeutungslos"},{"t":"Nur der autoritäre Stil ist nötig"}],"e":"Da der Erfolg vom Kontext abhängt, ist Flexibilität gefragt: Die Führungskraft sollte verschiedene Stile beherrschen und je nach Aufgabe, Zeitdruck und Reifegrad der Mitarbeiter angemessen einsetzen (Stilrepertoire)."},{"id":"Z-FS-044","f":4,"sub":"Führungsstile","t":"mc","q":"Welche Aussage zum Zusammenhang von Vertrauen und Delegation trifft zu?","o":[{"t":"Delegation setzt Vertrauen voraus und stärkt es zugleich, wenn die Aufgabe gelingt","ok":1},{"t":"Delegation funktioniert ganz ohne Vertrauen am besten"},{"t":"Vertrauen schadet der Delegation"},{"t":"Delegation und Vertrauen schließen sich aus"}],"e":"Wer delegiert, muss dem Mitarbeiter zutrauen, die Aufgabe eigenverantwortlich zu erfüllen. Gelingt die übertragene Aufgabe, wächst das Vertrauen weiter – ein positiver Kreislauf, der Motivation und Entwicklung fördert."},{"id":"Z-FS-045","f":4,"sub":"Führungsstile","t":"open","q":"Warum gibt es keinen allgemein „besten“ Führungsstil? Begründen Sie und nennen Sie Einflussgrößen für die Stilwahl.","a":"Einen allgemein besten Führungsstil gibt es nicht, weil der Führungserfolg von den jeweiligen Umständen abhängt (situativer Ansatz). Ein Stil, der in der einen Lage optimal ist, kann in einer anderen versagen: In einer Krise oder bei Gefahr im Verzug sind schnelle, klare Anweisungen (eher autoritär) angebracht, während bei komplexen, kreativen Aufgaben mit qualifizierten Mitarbeitern ein kooperativer oder delegierender Stil bessere Ergebnisse bringt. Wichtige Einflussgrößen für die Stilwahl sind: (1) die Aufgabe/Situation (Dringlichkeit, Komplexität, Risiko, Zeitdruck), (2) die Mitarbeiter (Reifegrad aus Können und Wollen, Erfahrung, Selbstständigkeit, Erwartungen), (3) die Führungskraft selbst (Persönlichkeit, Erfahrung, Menschenbild) und (4) das Umfeld (Unternehmenskultur, Vorgaben, Ressourcen). Eine gute Führungskraft beherrscht daher mehrere Stile und passt ihr Verhalten flexibel an die Situation und die Menschen an, statt starr einem einzigen Muster zu folgen.","e":"Kernaussage: Führungserfolg ist situativ. Einflussgrößen: Situation/Aufgabe, Mitarbeiter (Reifegrad), Führungskraft und Umfeld. Ideal ist ein flexibles Stilrepertoire."},{"id":"Z-FM-001","f":4,"sub":"Führungsmethoden","t":"mc","q":"Was kennzeichnet „Management by Objectives“ (MbO)?","o":[{"t":"Führung durch Zielvereinbarung: Ziele werden gemeinsam vereinbart, der Weg bleibt dem Mitarbeiter überlassen","ok":1},{"t":"Führung durch ständige Detailkontrolle"},{"t":"Führung ohne jede Zielsetzung"},{"t":"Führung nur über das Gehalt"}],"e":"Beim MbO vereinbaren Führungskraft und Mitarbeiter gemeinsam klare Ziele. Der Mitarbeiter entscheidet weitgehend selbst über den Weg; kontrolliert wird das Ergebnis (Zielerreichung). Das fördert Motivation und Eigenverantwortung."},{"id":"Z-FM-002","f":4,"sub":"Führungsmethoden","t":"mc","q":"Welche Eigenschaften sollten Ziele im MbO haben (SMART)?","o":[{"t":"Spezifisch, messbar, attraktiv/akzeptiert, realistisch und terminiert","ok":1},{"t":"Schnell, modern, agil, riskant, teuer"},{"t":"Vage, unverbindlich und ohne Termin"},{"t":"Geheim, komplex, unerreichbar"}],"e":"Wirksame Ziele sind SMART: spezifisch (eindeutig), messbar, attraktiv/akzeptiert, realistisch (erreichbar) und terminiert. Nur klare, überprüfbare Ziele erlauben eine faire Erfolgskontrolle und motivieren."},{"id":"Z-FM-003","f":4,"sub":"Führungsmethoden","t":"mc","q":"Was kennzeichnet „Management by Exception“ (MbE)?","o":[{"t":"Führung nach dem Ausnahmeprinzip: Der Mitarbeiter entscheidet im Normalfall selbst, der Vorgesetzte greift nur bei Abweichungen ein","ok":1},{"t":"Der Vorgesetzte entscheidet jeden Einzelfall"},{"t":"Es gibt keine Zuständigkeiten"},{"t":"Alle Aufgaben werden delegiert, auch Führungsaufgaben"}],"e":"Beim MbE handelt der Mitarbeiter im festgelegten Rahmen selbstständig. Nur wenn Toleranzgrenzen überschritten werden oder außergewöhnliche Fälle auftreten (Ausnahmen), schaltet sich der Vorgesetzte ein. Das entlastet die Führungskraft."},{"id":"Z-FM-004","f":4,"sub":"Führungsmethoden","t":"mc","q":"Wann greift die Führungskraft beim Management by Exception ein?","o":[{"t":"Nur bei Abweichungen von der Norm bzw. in Ausnahme-/Sonderfällen","ok":1},{"t":"Bei jeder Routineentscheidung"},{"t":"Nie"},{"t":"Nur am Monatsende"}],"e":"Solange sich alles im vereinbarten Rahmen (Sollwerte, Toleranzen) bewegt, bleibt die Führungskraft außen vor. Erst bei Über-/Unterschreitungen oder unvorhergesehenen Ausnahmen greift sie steuernd ein."},{"id":"Z-FM-005","f":4,"sub":"Führungsmethoden","t":"mc","q":"Was kennzeichnet „Management by Delegation“ (MbD)?","o":[{"t":"Führung durch Übertragung von Aufgaben, Kompetenzen und Verantwortung auf die Mitarbeiter","ok":1},{"t":"Führung ohne jede Aufgabenverteilung"},{"t":"Der Vorgesetzte behält alle Aufgaben selbst"},{"t":"Delegation nur des Gehalts"}],"e":"Beim MbD werden Aufgaben zusammen mit den nötigen Befugnissen und der Verantwortung an die Mitarbeiter delegiert (Kongruenzprinzip). Das entlastet die Führung und fördert Selbstständigkeit; die Führungsverantwortung bleibt bei der Führungskraft."},{"id":"Z-FM-006","f":4,"sub":"Führungsmethoden","t":"mc","q":"Welcher Vorteil ist mit Management by Delegation verbunden?","o":[{"t":"Entlastung der Führungskraft sowie Förderung von Motivation und Eigenverantwortung der Mitarbeiter","ok":1},{"t":"Die Führungskraft wird stärker belastet"},{"t":"Die Mitarbeiter verlieren jede Verantwortung"},{"t":"Entscheidungen dauern immer länger"}],"e":"Durch Delegation kann sich die Führungskraft auf Führungs- und Steuerungsaufgaben konzentrieren, während die Mitarbeiter durch mehr Verantwortung und Handlungsspielraum motiviert und weiterentwickelt werden."},{"id":"Z-FM-007","f":4,"sub":"Führungsmethoden","t":"mc","q":"Welche drei Elemente müssen bei der Delegation zusammenpassen (Kongruenzprinzip)?","o":[{"t":"Aufgabe, Kompetenz und Verantwortung","ok":1},{"t":"Zeit, Kosten und Qualität"},{"t":"Preis, Menge und Termin"},{"t":"Lohn, Prämie und Zulage"}],"e":"Nach dem AKV-Prinzip müssen die übertragene Aufgabe, die dafür nötigen Befugnisse (Kompetenz) und die Verantwortung deckungsgleich sein. Nur so kann der Mitarbeiter die Aufgabe eigenverantwortlich und sachgerecht erfüllen."},{"id":"Z-FM-008","f":4,"sub":"Führungsmethoden","t":"mc","q":"Welche Aufgaben sollte eine Führungskraft grundsätzlich NICHT delegieren?","o":[{"t":"Zentrale Führungsaufgaben wie Zielsetzung, Personalentscheidungen und die Gesamtverantwortung","ok":1},{"t":"Routineaufgaben"},{"t":"Standardisierte Sachbearbeitung"},{"t":"Wiederkehrende Tätigkeiten"}],"e":"Delegierbar sind vor allem Routine- und Fachaufgaben. Nicht delegierbar sind echte Führungsaufgaben: das Setzen von Zielen, wichtige Personalentscheidungen, Beurteilung und die Gesamtverantwortung für das Team."},{"id":"Z-FM-009","f":4,"sub":"Führungsmethoden","t":"mc","q":"Für welche Art von Entscheidungen eignet sich das Ausnahmeprinzip (MbE) besonders?","o":[{"t":"Für wiederkehrende Routineentscheidungen, die klar geregelt werden können","ok":1},{"t":"Für einmalige Grundsatzentscheidungen"},{"t":"Für jede noch so kleine Rückfrage"},{"t":"Für gar keine Entscheidungen"}],"e":"MbE funktioniert gut, wenn sich Normalfälle klar von Ausnahmen abgrenzen lassen und Routineentscheidungen an die Mitarbeiter übertragbar sind. Bei häufig neuartigen, schwer regelbaren Situationen stößt das Prinzip an Grenzen."},{"id":"Z-FM-010","f":4,"sub":"Führungsmethoden","t":"mc","q":"In welcher Reihenfolge verläuft der Führungs-(Management-)regelkreis?","o":[{"t":"Zielsetzung → Planung → Entscheidung → Durchführung → Kontrolle","ok":1},{"t":"Kontrolle → Zielsetzung → Planung"},{"t":"Durchführung → Planung → Zielsetzung"},{"t":"Entscheidung → Kontrolle → Planung"}],"e":"Der Führungskreislauf umfasst Zielsetzung, Planung (Wege/Maßnahmen), Entscheidung, Durchführung (Realisierung) und Kontrolle (Soll-Ist-Vergleich). Aus der Kontrolle folgen ggf. neue Ziele oder Korrekturen – der Kreislauf beginnt von vorn."},{"id":"Z-FM-011","f":4,"sub":"Führungsmethoden","t":"mc","q":"Welche Funktion hat die Kontrolle als Führungsaufgabe?","o":[{"t":"Den Soll-Ist-Vergleich durchzuführen, Abweichungen zu erkennen und gegenzusteuern","ok":1},{"t":"Mitarbeiter zu schikanieren"},{"t":"Nur Schuldige zu suchen"},{"t":"Die Buchhaltung zu ersetzen"}],"e":"Kontrolle vergleicht die erreichten Ergebnisse (Ist) mit den Zielen (Soll), deckt Abweichungen und deren Ursachen auf und ermöglicht Korrekturmaßnahmen. Sie sollte sachlich und fair erfolgen, nicht als reine Fehlersuche."},{"id":"Z-FM-012","f":4,"sub":"Führungsmethoden","t":"mc","q":"Welche Kontrollart überprüft laufend während der Ausführung (nicht erst am Ende)?","o":[{"t":"Die Prozess-/Zwischenkontrolle","ok":1},{"t":"Die reine Endkontrolle"},{"t":"Gar keine Kontrolle"},{"t":"Die Vorkontrolle vor Beginn"}],"e":"Zwischen-/Prozesskontrollen begleiten die Durchführung und erlauben ein frühzeitiges Gegensteuern, bevor größere Abweichungen entstehen. Die Endkontrolle prüft erst das Ergebnis – dann sind Korrekturen oft zu spät."},{"id":"Z-FM-013","f":4,"sub":"Führungsmethoden","t":"mc","q":"Welche Arten von Mitarbeitergesprächen gibt es u. a.?","o":[{"t":"Zielvereinbarungs-, Beurteilungs-, Kritik-, Förder- und Anerkennungsgespräch","ok":1},{"t":"Nur das Kündigungsgespräch"},{"t":"Ausschließlich Small Talk"},{"t":"Nur Preisverhandlungen"}],"e":"Mitarbeitergespräche dienen verschiedenen Zwecken: Ziele vereinbaren, Leistung beurteilen, Kritik äußern, fördern/entwickeln, anerkennen oder z. B. nach Fehlzeiten ein Rückkehrgespräch führen. Jede Gesprächsart hat eigene Ziele und Regeln."},{"id":"Z-FM-014","f":4,"sub":"Führungsmethoden","t":"mc","q":"Wie sollte ein Kritikgespräch idealerweise geführt werden?","o":[{"t":"Unter vier Augen, sachlich, auf das konkrete Verhalten bezogen und mit dem Ziel einer Verbesserung","ok":1},{"t":"Öffentlich vor dem ganzen Team"},{"t":"Mit persönlichen Beleidigungen"},{"t":"Ohne konkreten Anlass"}],"e":"Kritik erfolgt möglichst zeitnah, unter vier Augen und sachlich: Sie benennt konkretes Verhalten (statt die Person abzuwerten), lässt den Mitarbeiter zu Wort kommen und mündet in eine Vereinbarung zur Verbesserung. Lob erfolgt dagegen gern auch öffentlich."},{"id":"Z-FM-015","f":4,"sub":"Führungsmethoden","t":"mc","q":"Warum sollte Kritik am Verhalten und nicht an der Person geübt werden?","o":[{"t":"Weil verhaltensbezogene Kritik veränderbar und weniger verletzend ist und Abwehr vermeidet","ok":1},{"t":"Weil die Person unwichtig ist"},{"t":"Weil Kritik grundsätzlich verboten ist"},{"t":"Weil das die Umsatzsteuer senkt"}],"e":"Wird konkretes Verhalten benannt („In der Situation X ist Y passiert“), kann der Mitarbeiter daran arbeiten. Persönliche Abwertung („Sie sind unfähig“) verletzt, löst Widerstand aus und ändert nichts. Sachlichkeit und Ich-Botschaften helfen."},{"id":"Z-FM-016","f":4,"sub":"Führungsmethoden","t":"mc","q":"Was gehört zur Vorbereitung eines Mitarbeitergesprächs?","o":[{"t":"Ziel klären, Fakten/Beispiele sammeln, Zeit und störungsfreien Rahmen einplanen","ok":1},{"t":"Das Gespräch spontan zwischen Tür und Angel führen"},{"t":"Keine Vorbereitung"},{"t":"Nur den Mitarbeiter vorbereiten lassen"}],"e":"Ein gutes Gespräch wird vorbereitet: Ziel und Anlass klären, konkrete Beobachtungen und Beispiele zusammenstellen, ausreichend Zeit und einen ungestörten Ort wählen und dem Mitarbeiter den Termin rechtzeitig ankündigen."},{"id":"Z-FM-017","f":4,"sub":"Führungsmethoden","t":"mc","q":"Welchem Zweck dient die Mitarbeiterbeurteilung?","o":[{"t":"Der objektiven Einschätzung von Leistung und Verhalten als Basis für Förderung, Entwicklung und Personalentscheidungen","ok":1},{"t":"Nur der Bestrafung"},{"t":"Der Berechnung der Umsatzsteuer"},{"t":"Der Wahl der Rechtsform"}],"e":"Die Beurteilung bewertet Leistung und Verhalten möglichst objektiv und nachvollziehbar. Sie ist Grundlage für Feedback, Personalentwicklung, Einsatzplanung, Beförderung und Vergütung und sollte anhand klarer Kriterien erfolgen."},{"id":"Z-FM-018","f":4,"sub":"Führungsmethoden","t":"mc","q":"Was versteht man beim Beurteilen unter dem „Halo-Effekt“ (Überstrahlung)?","o":[{"t":"Ein einzelnes hervorstechendes Merkmal überstrahlt die Gesamtbeurteilung","ok":1},{"t":"Eine besonders faire Bewertung"},{"t":"Die Tendenz zu strenger Bewertung"},{"t":"Ein technischer Messfehler"}],"e":"Beim Halo-Effekt prägt ein auffälliges Einzelmerkmal (positiv oder negativ) den Gesamteindruck, sodass andere Merkmale in dieselbe Richtung verzerrt beurteilt werden – z. B. „gepflegtes Auftreten“ überstrahlt die fachliche Bewertung."},{"id":"Z-FM-019","f":4,"sub":"Führungsmethoden","t":"mc","q":"Was bezeichnet die „Tendenz zur Mitte“ als Beurteilungsfehler?","o":[{"t":"Der Beurteiler vergibt vorwiegend mittlere Werte und vermeidet Extreme","ok":1},{"t":"Der Beurteiler bewertet alle zu gut"},{"t":"Der Beurteiler bewertet alle zu streng"},{"t":"Ein zufälliger Messfehler"}],"e":"Bei der Tendenz zur Mitte scheut der Beurteiler klare Positionen und vergibt überwiegend durchschnittliche Bewertungen. Dadurch werden echte Unterschiede zwischen Mitarbeitern verwischt und die Beurteilung verliert an Aussagekraft."},{"id":"Z-FM-020","f":4,"sub":"Führungsmethoden","t":"mc","q":"Was bezeichnen die Beurteilungsfehler „Milde-“ bzw. „Strenge-Effekt“?","o":[{"t":"Die durchgängige Tendenz, zu wohlwollend bzw. zu streng zu bewerten","ok":1},{"t":"Die Vergabe nur mittlerer Noten"},{"t":"Ein technischer Defekt"},{"t":"Die Bewertung nach dem Zufall"}],"e":"Der Milde-Effekt führt zu generell zu positiven, der Strenge-Effekt zu generell zu negativen Beurteilungen. Beide verzerren das Bild, weil sie nicht die tatsächliche Leistung, sondern die Grundhaltung des Beurteilers widerspiegeln."},{"id":"Z-FM-021","f":4,"sub":"Führungsmethoden","t":"mc","q":"Was beschreibt das „Andorra-Phänomen“ (Pygmalion-Effekt) bei der Beurteilung?","o":[{"t":"Erwartungen des Beurteilers beeinflussen das Verhalten des Beurteilten (selbsterfüllende Prophezeiung)","ok":1},{"t":"Ein Messfehler des Geräts"},{"t":"Die Bewertung nach Alphabet"},{"t":"Die Tendenz zur Mitte"}],"e":"Beim Andorra-/Pygmalion-Effekt werden Menschen so behandelt, wie man sie einschätzt – und beginnen, sich entsprechend zu verhalten. Positive Erwartungen fördern die Entwicklung, negative behindern sie (selbsterfüllende Prophezeiung)."},{"id":"Z-FM-022","f":4,"sub":"Führungsmethoden","t":"mc","q":"Wie lassen sich Beurteilungsfehler verringern?","o":[{"t":"Durch klare, einheitliche Kriterien, Schulung der Beurteiler und Bezug auf konkrete Beobachtungen","ok":1},{"t":"Durch reine Bauchentscheidungen"},{"t":"Durch Bewertung nach Sympathie"},{"t":"Gar nicht"}],"e":"Objektivere Beurteilungen entstehen durch festgelegte, nachvollziehbare Kriterien, geschulte Beurteiler, den Bezug auf konkrete Beispiele statt Pauschalurteile und ggf. mehrere Beurteiler. So werden typische Verzerrungen reduziert."},{"id":"Z-FM-023","f":4,"sub":"Führungsmethoden","t":"mc","q":"Was ist der „Kontrast- bzw. Reihenfolgeeffekt“ bei Beurteilungen?","o":[{"t":"Die Bewertung wird durch den Vergleich mit unmittelbar zuvor Beurteilten verzerrt","ok":1},{"t":"Eine besonders objektive Bewertung"},{"t":"Ein technischer Defekt"},{"t":"Die Tendenz zur Milde"}],"e":"Beim Kontrast-/Reihenfolgeeffekt beeinflusst der zuvor beurteilte Mitarbeiter die Bewertung des nächsten: Nach einem sehr guten wirkt ein durchschnittlicher schlechter (und umgekehrt). Klare Kriterien und Pausen mindern diesen Effekt."},{"id":"Z-FM-024","f":4,"sub":"Führungsmethoden","t":"mc","q":"Was sind Führungsgrundsätze?","o":[{"t":"Verbindliche Leitlinien für das Führungsverhalten und die Zusammenarbeit im Unternehmen","ok":1},{"t":"Die Höhe der Löhne"},{"t":"Ein Verzeichnis der Maschinen"},{"t":"Die Bilanz"}],"e":"Führungsgrundsätze legen fest, wie im Unternehmen geführt und zusammengearbeitet werden soll (z. B. Delegation, Information, Beteiligung, Umgang mit Fehlern, Anerkennung). Sie schaffen ein gemeinsames Führungsverständnis und Orientierung."},{"id":"Z-FM-025","f":4,"sub":"Führungsmethoden","t":"mc","q":"Warum ist regelmäßiges Feedback ein wichtiges Führungsinstrument?","o":[{"t":"Es gibt Orientierung über die eigene Leistung, fördert Entwicklung und beugt Missverständnissen vor","ok":1},{"t":"Es ist überflüssig"},{"t":"Es dient nur der Kritik"},{"t":"Es senkt die Umsatzsteuer"}],"e":"Feedback zeigt dem Mitarbeiter, wo er steht, was gut läuft und was er verbessern kann. Es fördert Lernen und Motivation, klärt Erwartungen und verhindert, dass sich Fehlentwicklungen unbemerkt verfestigen – idealerweise zeitnah und konkret."},{"id":"Z-FM-026","f":4,"sub":"Führungsmethoden","t":"mc","q":"Welche Regel gilt für wirksames Lob?","o":[{"t":"Konkret, ehrlich und zeitnah für eine bestimmte Leistung","ok":1},{"t":"Pauschal und selten"},{"t":"Nur einmal im Jahr"},{"t":"Ohne Bezug zu einer Leistung"}],"e":"Lob wirkt, wenn es sich auf eine konkrete Leistung bezieht, aufrichtig gemeint ist und zeitnah erfolgt. Pauschales oder inflationäres Lob verliert an Glaubwürdigkeit, ausbleibende Anerkennung demotiviert."},{"id":"Z-FM-027","f":4,"sub":"Führungsmethoden","t":"mc","q":"Was ist ein zentraler Vorteil der Führung durch Zielvereinbarung (MbO) für den Mitarbeiter?","o":[{"t":"Klarheit über Erwartungen und Handlungsspielraum bei der Umsetzung","ok":1},{"t":"Ständige Bevormundung"},{"t":"Keine Rückmeldung über die Leistung"},{"t":"Fehlende Ziele"}],"e":"Vereinbarte Ziele geben dem Mitarbeiter Orientierung und Sicherheit über das, was von ihm erwartet wird, lassen ihm aber Freiheit beim Weg dorthin. Das stärkt Eigenverantwortung, Motivation und die Identifikation mit den Zielen."},{"id":"Z-FM-028","f":4,"sub":"Führungsmethoden","t":"mc","q":"Worin unterscheiden sich Vorgabe- und Vereinbarungsziele?","o":[{"t":"Vorgabeziele setzt der Vorgesetzte fest, Vereinbarungsziele werden gemeinsam ausgehandelt","ok":1},{"t":"Beide sind identisch"},{"t":"Vereinbarungsziele setzt der Vorgesetzte allein"},{"t":"Vorgabeziele handelt das Team aus"}],"e":"Vorgabeziele werden „von oben“ gesetzt (autoritärer), Vereinbarungsziele partnerschaftlich ausgehandelt (MbO). Gemeinsam vereinbarte Ziele werden meist stärker akzeptiert und wirken motivierender, weil der Mitarbeiter beteiligt war."},{"id":"Z-FM-029","f":4,"sub":"Führungsmethoden","t":"mc","q":"Welche Gefahr besteht, wenn beim MbO ausschließlich quantitative Ziele vereinbart werden?","o":[{"t":"Wichtige, schwer messbare Aspekte (z. B. Qualität, Zusammenarbeit) geraten aus dem Blick","ok":1},{"t":"Es gibt keine Gefahr"},{"t":"Die Ziele werden zu weich"},{"t":"Der Mitarbeiter hat zu viel Freiraum"}],"e":"Werden nur leicht messbare Kennzahlen vereinbart, kann das zu einseitigem Verhalten führen (nur das „Zählbare“ zählt), während Qualität, Kundenzufriedenheit oder Teamgeist vernachlässigt werden. Sinnvoll ist eine Mischung aus quantitativen und qualitativen Zielen."},{"id":"Z-FM-030","f":4,"sub":"Führungsmethoden","t":"mc","q":"Welche Aussage über delegierte Verantwortung ist richtig?","o":[{"t":"Der Mitarbeiter übernimmt die Handlungsverantwortung, die Führungskraft behält die Führungsverantwortung","ok":1},{"t":"Mit der Delegation entfällt jede Verantwortung der Führungskraft"},{"t":"Nur die Führungskraft ist verantwortlich"},{"t":"Verantwortung kann gar nicht übertragen werden"}],"e":"Bei der Delegation trägt der Mitarbeiter die Verantwortung für die ordnungsgemäße Ausführung (Handlungs-/Durchführungsverantwortung). Die Führungskraft bleibt jedoch für Auswahl, Anleitung und Kontrolle verantwortlich (Führungs-/Ergebnisverantwortung)."},{"id":"Z-FM-031","f":4,"sub":"Führungsmethoden","t":"open","q":"Erläutern Sie die Führungsmethode „Management by Objectives“ (MbO) und nennen Sie zwei Vorteile.","a":"Management by Objectives ist die Führung durch Zielvereinbarung. Führungskraft und Mitarbeiter vereinbaren gemeinsam klare, möglichst SMART formulierte Ziele (spezifisch, messbar, attraktiv/akzeptiert, realistisch, terminiert). Wie diese Ziele erreicht werden, entscheidet der Mitarbeiter weitgehend selbst; er handelt im vereinbarten Rahmen eigenverantwortlich. Kontrolliert wird nicht der einzelne Arbeitsschritt, sondern das Ergebnis (die Zielerreichung), meist in regelmäßigen Gesprächen und am Ende des Zeitraums. Vorteile: (1) Höhere Motivation und Identifikation, weil der Mitarbeiter an der Zielbildung beteiligt ist und Handlungsspielraum erhält. (2) Klarheit und Orientierung über das, was erwartet wird, sowie eine faire, nachvollziehbare Erfolgskontrolle anhand der vereinbarten Ziele. Zusätzlich entlastet MbO die Führungskraft von Detailsteuerung und fördert die Eigenverantwortung. Wichtig ist, sowohl quantitative als auch qualitative Ziele zu berücksichtigen, damit nicht nur das leicht Messbare zählt.","e":"Kern: gemeinsame Zielvereinbarung (SMART), Freiheit beim Weg, Kontrolle des Ergebnisses. Vorteile u. a. Motivation/Eigenverantwortung und Klarheit/faire Erfolgskontrolle."},{"id":"Z-FM-032","f":4,"sub":"Führungsmethoden","t":"open","q":"Nennen und erläutern Sie vier typische Beurteilungsfehler.","a":"1) Halo-Effekt (Überstrahlung): Ein einzelnes auffälliges Merkmal (z. B. Redegewandtheit oder ein einziger Fehler) überstrahlt die Gesamtbeurteilung, sodass andere Merkmale in dieselbe Richtung verzerrt bewertet werden. 2) Tendenz zur Mitte: Der Beurteiler meidet Extremwerte und vergibt überwiegend mittlere Noten; dadurch verschwimmen die tatsächlichen Unterschiede zwischen den Mitarbeitern. 3) Milde- bzw. Strenge-Effekt: Der Beurteiler bewertet grundsätzlich zu wohlwollend (Milde) oder zu hart (Strenge), unabhängig von der wirklichen Leistung. 4) Andorra-Phänomen (Pygmalion-Effekt): Die Erwartungen des Beurteilers beeinflussen das Verhalten des Beurteilten – wer positiv eingeschätzt und entsprechend behandelt wird, entwickelt sich oft günstiger, wer negativ eingeschätzt wird, ungünstiger (selbsterfüllende Prophezeiung). Weitere Fehler sind der Kontrast-/Reihenfolgeeffekt und die Beurteilung nach Sympathie oder Vorurteil. Vermeiden lassen sich solche Verzerrungen durch klare, einheitliche Kriterien, geschulte Beurteiler und den Bezug auf konkrete Beobachtungen.","e":"Wichtige Fehler: Halo-Effekt, Tendenz zur Mitte, Milde-/Strenge-Effekt, Andorra-/Pygmalion-Effekt (dazu Kontrast-, Sympathie- und Vorurteilsfehler). Gegenmittel: klare Kriterien, Schulung, konkrete Beispiele."},{"id":"Z-FM-033","f":4,"sub":"Führungsmethoden","t":"open","q":"Vergleichen Sie Management by Exception (MbE) und Management by Delegation (MbD).","a":"Beide Methoden entlasten die Führungskraft und stärken die Eigenverantwortung der Mitarbeiter, setzen aber unterschiedliche Schwerpunkte. Management by Exception (Führung nach dem Ausnahmeprinzip) legt für die Mitarbeiter einen Handlungsrahmen mit Sollwerten und Toleranzgrenzen fest. Im Normalfall entscheiden und handeln die Mitarbeiter selbstständig; die Führungskraft greift nur ein, wenn Abweichungen oder außergewöhnliche Fälle (Ausnahmen) auftreten. Der Fokus liegt also auf der Kontrolle von Abweichungen. Management by Delegation (Führung durch Aufgabendelegation) überträgt dagegen konkrete Aufgaben zusammen mit den nötigen Kompetenzen und der Verantwortung dauerhaft auf die Mitarbeiter (Kongruenzprinzip AKV). Der Fokus liegt auf der klaren Zuweisung von Zuständigkeiten. Gemeinsamkeit: In beiden Fällen bleibt die Führungsverantwortung bei der Führungskraft, und die Mitarbeiter gewinnen Handlungsspielraum. Unterschied: MbE steuert primär über Ausnahmen/Abweichungen, MbD primär über die Übertragung fest umrissener Aufgabenbereiche. In der Praxis werden die Methoden oft kombiniert.","e":"MbE = Ausnahmeprinzip (Eingriff nur bei Abweichungen); MbD = Aufgabendelegation mit AKV. Gemeinsam: Entlastung und Eigenverantwortung, Führungsverantwortung bleibt oben."},{"id":"Z-FM-034","f":4,"sub":"Führungsmethoden","t":"mc","q":"Welche Aussage zum Verhältnis von Anerkennung und Kritik in der Führung trifft zu?","o":[{"t":"Beides ist wichtig: Anerkennung motiviert, konstruktive Kritik ermöglicht Verbesserung","ok":1},{"t":"Nur Kritik ist nötig"},{"t":"Nur Lob ist nötig"},{"t":"Weder Lob noch Kritik sind sinnvoll"}],"e":"Gute Führung nutzt beides ausgewogen: Anerkennung stärkt Motivation und Selbstwert, konstruktive Kritik zeigt Entwicklungsfelder auf. Fehlt die Anerkennung, sinkt die Motivation; fehlt die Kritik, bleiben Fehler unkorrigiert."},{"id":"Z-FM-035","f":4,"sub":"Führungsmethoden","t":"mc","q":"Was ist der Vorteil eines regelmäßigen (jährlichen) strukturierten Mitarbeitergesprächs?","o":[{"t":"Es schafft Zeit für Rückblick, Feedback, Ziele und Entwicklung abseits des Tagesgeschäfts","ok":1},{"t":"Es ersetzt jede tägliche Kommunikation"},{"t":"Es dient nur der Kontrolle"},{"t":"Es ist reine Zeitverschwendung"}],"e":"Das strukturierte Jahresgespräch bietet Raum, um jenseits des Alltags Leistung und Zusammenarbeit zu besprechen, Feedback zu geben, Ziele zu vereinbaren und Entwicklungsschritte zu planen. Es ergänzt – ersetzt aber nicht – die laufende Kommunikation."},{"id":"Z-FM-036","f":4,"sub":"Führungsmethoden","t":"mc","q":"Was sollte die Führungskraft beim Delegieren einer Aufgabe klar festlegen?","o":[{"t":"Ziel/Ergebnis, Befugnisse, Termine und den Rahmen der Verantwortung","ok":1},{"t":"Nur den Namen der Aufgabe"},{"t":"Ausschließlich die Farbe der Unterlagen"},{"t":"Nichts – der Mitarbeiter errät alles"}],"e":"Erfolgreiche Delegation braucht Klarheit: Was ist das Ziel/Ergebnis, welche Befugnisse und Mittel stehen zur Verfügung, bis wann ist die Aufgabe zu erledigen und in welchem Rahmen trägt der Mitarbeiter Verantwortung. Nur so kann er eigenständig handeln."},{"id":"Z-FM-037","f":4,"sub":"Führungsmethoden","t":"mc","q":"Welche Aussage über Kontrolle im Führungskreislauf ist richtig?","o":[{"t":"Kontrolle ist notwendig, sollte aber vertrauensvoll erfolgen und nicht in lückenlose Überwachung ausarten","ok":1},{"t":"Kontrolle ist überflüssig"},{"t":"Je mehr Kontrolle, desto besser"},{"t":"Kontrolle ersetzt Zielsetzung"}],"e":"Ohne Kontrolle bliebe unklar, ob Ziele erreicht werden. Sie sollte jedoch angemessen und vertrauensvoll sein: lückenlose Überwachung (Mikromanagement) demotiviert und untergräbt Eigenverantwortung. Ziel ist rechtzeitiges, sachliches Gegensteuern."},{"id":"Z-FM-038","f":4,"sub":"Führungsmethoden","t":"mc","q":"Welche Führungsmethode entlastet die Führungskraft besonders von Routineentscheidungen?","o":[{"t":"Management by Exception (Ausnahmeprinzip)","ok":1},{"t":"Ständige Detailkontrolle aller Vorgänge"},{"t":"Autoritäres Alleinentscheiden"},{"t":"Verzicht auf jede Regelung"}],"e":"Beim MbE erledigen die Mitarbeiter Routinefälle selbstständig im vorgegebenen Rahmen; die Führungskraft wird nur bei Ausnahmen/Abweichungen tätig. Das spart ihr Zeit für wichtigere Führungs- und Sonderaufgaben."},{"id":"Z-FM-039","f":4,"sub":"Führungsmethoden","t":"mc","q":"Wie sollten Ziele beim Grad ihrer Herausforderung bemessen sein, um zu motivieren?","o":[{"t":"Anspruchsvoll, aber realistisch erreichbar","ok":1},{"t":"So niedrig wie möglich"},{"t":"Praktisch unerreichbar hoch"},{"t":"Völlig beliebig"}],"e":"Ziele motivieren am stärksten, wenn sie fordern, ohne zu überfordern: Zu leichte Ziele reizen nicht, unerreichbare Ziele frustrieren. Ein anspruchsvolles, aber machbares Niveau fördert Anstrengung, Erfolgserlebnisse und Zufriedenheit."},{"id":"Z-FM-040","f":4,"sub":"Führungsmethoden","t":"mc","q":"Welchen Zweck hat das Rückkehr-(Fehlzeiten-)gespräch nach längerer Abwesenheit?","o":[{"t":"Den Mitarbeiter wieder einzugliedern, Informationen zu geben und Ursachen von Fehlzeiten wertschätzend zu klären","ok":1},{"t":"Den Mitarbeiter bloßzustellen"},{"t":"Sofort eine Kündigung auszusprechen"},{"t":"Die Fehlzeit zu ignorieren"}],"e":"Das Rückkehrgespräch signalisiert Wertschätzung, informiert über Neuigkeiten, erleichtert die Wiedereingliederung und ermöglicht es, mögliche (auch betriebliche) Ursachen von Fehlzeiten sachlich anzusprechen – nicht als Verhör, sondern als Fürsorge."},{"id":"Z-FM-041","f":4,"sub":"Führungsmethoden","t":"mc","q":"Was ist ein Nachteil, wenn eine Führungskraft zu wenig delegiert?","o":[{"t":"Sie überlastet sich selbst und hemmt die Entwicklung und Motivation der Mitarbeiter","ok":1},{"t":"Die Mitarbeiter sind überfordert"},{"t":"Die Führungskraft hat zu viel Freizeit"},{"t":"Es entstehen keine Nachteile"}],"e":"Wer alles selbst macht, gerät in Überlastung, wird zum Engpass und vernachlässigt echte Führungsaufgaben. Zugleich bleiben die Mitarbeiter unterfordert, entwickeln sich nicht weiter und fühlen sich wenig eingebunden."},{"id":"Z-FM-042","f":4,"sub":"Führungsmethoden","t":"mc","q":"Warum sollten Beurteilungskriterien vorab festgelegt und bekannt sein?","o":[{"t":"Um Objektivität, Vergleichbarkeit und Fairness der Beurteilung zu sichern","ok":1},{"t":"Um die Beurteilung geheim zu halten"},{"t":"Damit niemand die Kriterien kennt"},{"t":"Aus steuerlichen Gründen"}],"e":"Klare, im Voraus bekannte Kriterien machen Beurteilungen nachvollziehbar, vergleichbar und fair. Die Mitarbeiter wissen, worauf es ankommt, und typische Beurteilungsfehler sowie Willkür werden reduziert."},{"id":"Z-FM-043","f":4,"sub":"Führungsmethoden","t":"mc","q":"Welche Aussage über die Kombination von Führungsmethoden trifft zu?","o":[{"t":"In der Praxis werden Methoden wie MbO, MbE und MbD oft miteinander kombiniert","ok":1},{"t":"Es darf immer nur eine einzige Methode geben"},{"t":"Die Methoden schließen sich gegenseitig aus"},{"t":"Methoden sind bedeutungslos"}],"e":"Die „Management-by“-Techniken sind keine starren Alternativen: Häufig werden sie kombiniert – etwa Ziele vereinbaren (MbO), Aufgaben delegieren (MbD) und nur bei Abweichungen eingreifen (MbE). Entscheidend ist die passende Mischung für Situation und Team."},{"id":"Z-FM-044","f":4,"sub":"Führungsmethoden","t":"mc","q":"Was ist beim Setzen von Zielen im Team zusätzlich zu individuellen Zielen sinnvoll?","o":[{"t":"Gemeinsame Teamziele, die Zusammenarbeit und ein gemeinsames Ergebnis fördern","ok":1},{"t":"Ausschließlich Einzelziele, die zu Konkurrenz führen"},{"t":"Gar keine Ziele"},{"t":"Geheime Ziele je Person"}],"e":"Neben Einzelzielen fördern gemeinsame Teamziele die Kooperation und richten alle auf ein gemeinsames Ergebnis aus. Rein individuelle Ziele können sonst zu Konkurrenz statt Zusammenarbeit führen und den Teamgeist schwächen."},{"id":"Z-FM-045","f":4,"sub":"Führungsmethoden","t":"open","q":"Beschreiben Sie den Führungs-(Management-)regelkreis und erläutern Sie kurz jede Phase.","a":"Der Führungsregelkreis beschreibt Führung als fortlaufenden Kreislauf aus mehreren Phasen: (1) Zielsetzung – es wird festgelegt, was erreicht werden soll (möglichst klare, messbare Ziele). (2) Planung – es wird überlegt, mit welchen Maßnahmen, Mitteln und in welcher Reihenfolge die Ziele erreicht werden können; Alternativen werden entwickelt. (3) Entscheidung – aus den geplanten Alternativen wird die beste ausgewählt und festgelegt. (4) Durchführung/Realisierung – die Entscheidung wird umgesetzt; die Führungskraft informiert, koordiniert, motiviert und unterstützt die Mitarbeiter. (5) Kontrolle – die erreichten Ergebnisse (Ist) werden mit den Zielen (Soll) verglichen, Abweichungen und deren Ursachen analysiert. Aus der Kontrolle ergeben sich Konsequenzen: Bei Abweichungen wird gegengesteuert, Ziele oder Pläne werden angepasst, und der Kreislauf beginnt von vorn. So ist Führung ein ständiger, lernender Prozess und keine einmalige Handlung.","e":"Phasen: Zielsetzung → Planung → Entscheidung → Durchführung → Kontrolle → (erneute Zielsetzung/Korrektur). Die Kontrolle schließt den Kreis und stößt Verbesserungen an."},{"id":"Z-GR-001","f":4,"sub":"Gruppen","t":"mc","q":"Was kennzeichnet eine Gruppe im sozialpsychologischen Sinn?","o":[{"t":"Mehrere Personen mit gemeinsamem Ziel, direkter Interaktion, Zusammengehörigkeitsgefühl und gemeinsamen Normen/Rollen","ok":1},{"t":"Eine beliebige Menschenmenge ohne Bezug zueinander"},{"t":"Ein einzelner Mitarbeiter"},{"t":"Die gesamte Bevölkerung"}],"e":"Eine Gruppe besteht aus mehreren Personen, die über eine gewisse Dauer interagieren, ein gemeinsames Ziel verfolgen, ein Wir-Gefühl entwickeln und sich an gemeinsamen Normen und Rollen orientieren. Eine bloße Ansammlung von Menschen ist noch keine Gruppe."},{"id":"Z-GR-002","f":4,"sub":"Gruppen","t":"mc","q":"Worin unterscheiden sich formelle und informelle Gruppen?","o":[{"t":"Formelle Gruppen sind offiziell gebildet (z. B. Abteilung), informelle entstehen ungeplant durch persönliche Beziehungen","ok":1},{"t":"Beide sind identisch"},{"t":"Informelle Gruppen sind im Organigramm dargestellt"},{"t":"Formelle Gruppen entstehen zufällig"}],"e":"Formelle Gruppen werden vom Unternehmen bewusst geschaffen (Abteilungen, Projektteams) und im Organigramm abgebildet. Informelle Gruppen bilden sich ungeplant aufgrund von Sympathie, gemeinsamen Interessen oder Nähe."},{"id":"Z-GR-003","f":4,"sub":"Gruppen","t":"mc","q":"Was ist eine Primärgruppe?","o":[{"t":"Eine kleine Gruppe mit engen, persönlichen und dauerhaften Beziehungen (z. B. Familie, enges Team)","ok":1},{"t":"Eine große, anonyme Organisation"},{"t":"Die gesamte Belegschaft"},{"t":"Ein einmaliges Treffen Fremder"}],"e":"Primärgruppen zeichnen sich durch enge, persönliche und dauerhafte Kontakte aus (Familie, Freundeskreis, kleines Team). Sekundärgruppen sind größer und unpersönlicher, mit eher zweckorientierten Beziehungen (z. B. Großbetrieb, Verein)."},{"id":"Z-GR-004","f":4,"sub":"Gruppen","t":"mc","q":"In welcher Reihenfolge verlaufen die Gruppenphasen nach Tuckman?","o":[{"t":"Forming → Storming → Norming → Performing → (Adjourning)","ok":1},{"t":"Performing → Forming → Storming"},{"t":"Storming → Norming → Forming"},{"t":"Norming → Performing → Forming"}],"e":"Tuckman beschreibt die Phasen Forming (Orientierung/Kennenlernen), Storming (Konflikte/Positionskämpfe), Norming (Regeln und Zusammenhalt bilden sich), Performing (produktive Zusammenarbeit) und Adjourning (Auflösung)."},{"id":"Z-GR-005","f":4,"sub":"Gruppen","t":"mc","q":"Was geschieht in der Forming-Phase (nach Tuckman)?","o":[{"t":"Die Mitglieder lernen sich kennen und orientieren sich; das Verhalten ist eher vorsichtig und höflich","ok":1},{"t":"Es kommt zu heftigen Konflikten"},{"t":"Die Gruppe arbeitet auf Hochtouren"},{"t":"Die Gruppe löst sich auf"}],"e":"In der Orientierungsphase (Forming) tasten sich die Mitglieder ab, klären Erwartungen und Aufgaben und verhalten sich meist zurückhaltend. Rollen und Regeln sind noch unklar; Orientierung und Sicherheit werden gesucht."},{"id":"Z-GR-006","f":4,"sub":"Gruppen","t":"mc","q":"Wodurch ist die Storming-Phase gekennzeichnet?","o":[{"t":"Durch Konflikte, Machtkämpfe und Auseinandersetzungen um Rollen und Positionen","ok":1},{"t":"Durch reibungslose Zusammenarbeit"},{"t":"Durch das Kennenlernen"},{"t":"Durch die Auflösung der Gruppe"}],"e":"In der Konfrontationsphase (Storming) treten unterschiedliche Meinungen, Interessen und Machtansprüche zutage; es kommt zu Konflikten und Rangkämpfen. Diese Phase ist unangenehm, aber wichtig, um Rollen zu klären und weiterzukommen."},{"id":"Z-GR-007","f":4,"sub":"Gruppen","t":"mc","q":"Was passiert in der Norming-Phase?","o":[{"t":"Die Gruppe entwickelt gemeinsame Regeln/Normen, Rollen klären sich und der Zusammenhalt wächst","ok":1},{"t":"Die Konflikte eskalieren weiter"},{"t":"Es findet noch kein Austausch statt"},{"t":"Die Gruppe erreicht Höchstleistung"}],"e":"In der Organisierungs-/Normierungsphase einigt sich die Gruppe auf Spielregeln, Rollen und Umgangsformen. Konflikte werden beigelegt, das Wir-Gefühl und die Zusammenarbeit verbessern sich – die Basis für die Leistungsphase entsteht."},{"id":"Z-GR-008","f":4,"sub":"Gruppen","t":"mc","q":"Wodurch ist die Performing-Phase gekennzeichnet?","o":[{"t":"Die Gruppe arbeitet produktiv und zielorientiert zusammen und erbringt ihre volle Leistung","ok":1},{"t":"Die Mitglieder lernen sich gerade erst kennen"},{"t":"Es herrschen offene Machtkämpfe"},{"t":"Es gibt keine Zusammenarbeit"}],"e":"In der Leistungs-/Integrationsphase (Performing) sind Rollen und Regeln geklärt; die Gruppe konzentriert sich auf die Aufgabe, arbeitet effizient zusammen und nutzt ihre Stärken – hier entfaltet das Team seine volle Leistungsfähigkeit."},{"id":"Z-GR-009","f":4,"sub":"Gruppen","t":"mc","q":"Welche Bedeutung hat die Konfliktphase (Storming) für die Teamentwicklung?","o":[{"t":"Sie ist ein normaler, notwendiger Schritt, um Rollen zu klären und zu einem leistungsfähigen Team zu werden","ok":1},{"t":"Sie ist ein Zeichen für ein gescheitertes Team"},{"t":"Sie sollte um jeden Preis vermieden werden"},{"t":"Sie hat keine Bedeutung"}],"e":"Konflikte in der Storming-Phase gehören zur Entwicklung dazu: Erst durch die Auseinandersetzung um Rollen, Ziele und Einfluss kann die Gruppe tragfähige Regeln finden und in die produktive Phase gelangen. Eine Führungskraft sollte diese Phase konstruktiv begleiten."},{"id":"Z-GR-010","f":4,"sub":"Gruppen","t":"mc","q":"Was versteht man unter einer Rolle in einer Gruppe?","o":[{"t":"Die Gesamtheit der Verhaltenserwartungen, die an einen Positionsinhaber gerichtet werden","ok":1},{"t":"Die Höhe des Gehalts"},{"t":"Ein Theaterstück"},{"t":"Die Rechtsform"}],"e":"Eine Rolle ist das Bündel an Erwartungen, das die Gruppe (und das Umfeld) an das Verhalten einer Person in einer bestimmten Position knüpft. Rollen strukturieren die Zusammenarbeit und geben Orientierung."},{"id":"Z-GR-011","f":4,"sub":"Gruppen","t":"mc","q":"Welche Rollentypen lassen sich in Gruppen unterscheiden?","o":[{"t":"Aufgabenbezogene, beziehungsbezogene und selbstbezogene Rollen","ok":1},{"t":"Nur der Chef und der Praktikant"},{"t":"Nur materielle Rollen"},{"t":"Es gibt keine Rollen"}],"e":"Man unterscheidet aufgabenbezogene Rollen (fördern die Zielerreichung, z. B. Ideengeber, Koordinator), beziehungsbezogene Rollen (fördern das Miteinander, z. B. Vermittler, Ermutiger) und selbstbezogene Rollen (verfolgen eigene Interessen, z. B. Blockierer, Dominator)."},{"id":"Z-GR-012","f":4,"sub":"Gruppen","t":"mc","q":"Wer ist ein informeller Meinungsführer in einer Gruppe?","o":[{"t":"Eine Person, die ohne formale Vorgesetztenstellung großen Einfluss auf die Gruppe hat","ok":1},{"t":"Der offiziell ernannte Abteilungsleiter"},{"t":"Ein externer Berater"},{"t":"Ein Mitarbeiter ohne jeden Einfluss"}],"e":"Der informelle Führer/Meinungsführer besitzt keine formale Weisungsbefugnis, prägt aber durch Ansehen, Kompetenz oder Persönlichkeit die Meinungen und das Verhalten der Gruppe stark. Führungskräfte sollten solche Personen kennen und einbeziehen."},{"id":"Z-GR-013","f":4,"sub":"Gruppen","t":"mc","q":"Was sind Gruppennormen?","o":[{"t":"Meist ungeschriebene Regeln, die das Verhalten der Mitglieder steuern","ok":1},{"t":"Gesetzlich vorgeschriebene Maße"},{"t":"Die Höhe der Löhne"},{"t":"Technische DIN-Normen"}],"e":"Gruppennormen sind gemeinsame, oft unausgesprochene Verhaltensregeln (z. B. Umgangston, Leistungsniveau, Pünktlichkeit). Wer sie einhält, gehört dazu; wer sie verletzt, muss mit Missbilligung rechnen. Sie steuern das Verhalten stark."},{"id":"Z-GR-014","f":4,"sub":"Gruppen","t":"mc","q":"Was versteht man unter Konformität (Gruppendruck)?","o":[{"t":"Die Anpassung des eigenen Verhaltens/der Meinung an die Gruppe, um dazuzugehören","ok":1},{"t":"Die bewusste Abgrenzung von der Gruppe"},{"t":"Eine technische Norm"},{"t":"Die Ablehnung aller Regeln"}],"e":"Unter Gruppendruck passen Einzelne ihr Verhalten und ihre Meinung oft der Mehrheit an – teils gegen die eigene Überzeugung –, um Anerkennung zu erhalten und nicht ausgeschlossen zu werden. Das kann sinnvoll, aber auch problematisch sein (z. B. Groupthink)."},{"id":"Z-GR-015","f":4,"sub":"Gruppen","t":"mc","q":"Was bezeichnet die Rangordnung (Status) in einer Gruppe?","o":[{"t":"Die Über- und Unterordnung der Mitglieder nach Ansehen und Einfluss","ok":1},{"t":"Die alphabetische Reihenfolge"},{"t":"Die Sitzordnung in der Kantine"},{"t":"Die Gehaltsabrechnung"}],"e":"In Gruppen bildet sich eine Rangordnung heraus: Mitglieder mit hohem Status (durch Kompetenz, Persönlichkeit, Zugehörigkeitsdauer) haben mehr Einfluss und Ansehen. Die Rangordnung beeinflusst Kommunikation und Entscheidungen."},{"id":"Z-GR-016","f":4,"sub":"Gruppen","t":"mc","q":"Was versteht man unter Gruppenkohäsion?","o":[{"t":"Den Zusammenhalt und die Anziehungskraft der Gruppe auf ihre Mitglieder","ok":1},{"t":"Die Zahl der Mitglieder"},{"t":"Den Umsatz der Gruppe"},{"t":"Die Sitzordnung"}],"e":"Kohäsion ist der innere Zusammenhalt („Wir-Gefühl“). Eine hohe Kohäsion fördert Zufriedenheit, Zusammenarbeit und Bindung, kann aber – bei falscher Ausrichtung – auch Gruppendruck und Abschottung nach außen verstärken."},{"id":"Z-GR-017","f":4,"sub":"Gruppen","t":"mc","q":"Welche Wirkung kann eine hohe Gruppenkohäsion haben?","o":[{"t":"Sie steigert i. d. R. Zusammenarbeit und Zufriedenheit, kann aber auch Gruppendruck und Abgrenzung verstärken","ok":1},{"t":"Sie hat nur negative Folgen"},{"t":"Sie ist wirkungslos"},{"t":"Sie verhindert jede Zusammenarbeit"}],"e":"Starker Zusammenhalt wirkt meist positiv (Motivation, Loyalität, gute Kooperation). Ist die Gruppe jedoch gegen die Unternehmensziele eingestellt, kann hohe Kohäsion auch schädlich sein (Leistungszurückhaltung, Abschottung, Konformitätsdruck)."},{"id":"Z-GR-018","f":4,"sub":"Gruppen","t":"mc","q":"Welche Aussage zur Gruppengröße trifft am ehesten zu?","o":[{"t":"Kleinere Gruppen ermöglichen intensiveren Austausch; zu große Gruppen erschweren Abstimmung und Beteiligung","ok":1},{"t":"Je größer die Gruppe, desto besser die Zusammenarbeit immer"},{"t":"Die Gruppengröße spielt keine Rolle"},{"t":"Nur Einzelpersonen sind produktiv"}],"e":"In kleineren Gruppen kann sich jeder besser einbringen, die Kommunikation ist direkter. Sehr große Gruppen erschweren Koordination und Beteiligung, begünstigen Untergruppen und „Trittbrettfahren“. Die optimale Größe hängt von der Aufgabe ab."},{"id":"Z-GR-019","f":4,"sub":"Gruppen","t":"mc","q":"Was ist ein wesentlicher Vorteil der Teamarbeit?","o":[{"t":"Nutzung unterschiedlicher Fähigkeiten und Sichtweisen (Synergie) sowie gegenseitige Unterstützung","ok":1},{"t":"Es gibt keine Vorteile"},{"t":"Entscheidungen werden immer schneller"},{"t":"Verantwortung entfällt völlig"}],"e":"Teams bündeln verschiedene Kompetenzen und Perspektiven, was zu besseren Lösungen führen kann (Synergieeffekt: das Ergebnis ist mehr als die Summe der Einzelleistungen). Zudem motivieren Zusammenhalt und gegenseitige Hilfe."},{"id":"Z-GR-020","f":4,"sub":"Gruppen","t":"mc","q":"Was ist ein möglicher Nachteil der Teamarbeit?","o":[{"t":"Höherer Zeit-/Abstimmungsaufwand, Konfliktpotenzial und Gefahr des „Trittbrettfahrens“","ok":1},{"t":"Es gibt keine Nachteile"},{"t":"Entscheidungen sind immer besser"},{"t":"Jeder arbeitet automatisch gleich viel"}],"e":"Teamarbeit kostet Zeit für Abstimmung, kann Konflikte auslösen und verleitet Einzelne zum „Trittbrettfahren“ (soziales Faulenzen). Zudem droht bei starkem Anpassungsdruck das Gruppendenken (Groupthink)."},{"id":"Z-GR-021","f":4,"sub":"Gruppen","t":"mc","q":"Was versteht man unter dem Synergieeffekt bei Teamarbeit?","o":[{"t":"Das gemeinsame Ergebnis ist größer als die Summe der Einzelleistungen (1+1>2)","ok":1},{"t":"Das Ergebnis ist immer kleiner als die Einzelleistungen"},{"t":"Alle leisten genau gleich viel"},{"t":"Ein Synonym für Konflikt"}],"e":"Synergie entsteht, wenn das Zusammenwirken im Team mehr bewirkt als die Einzelnen für sich erreichen könnten – durch Kombination von Wissen, gegenseitige Ergänzung und Anregung. Voraussetzung sind gute Zusammenarbeit und passende Zusammensetzung."},{"id":"Z-GR-022","f":4,"sub":"Gruppen","t":"mc","q":"Was bezeichnet „soziales Faulenzen“ (Trittbrettfahren)?","o":[{"t":"Einzelne strengen sich in der Gruppe weniger an, weil die eigene Leistung weniger auffällt","ok":1},{"t":"Besonders hohe Einzelleistung"},{"t":"Eine Pausenregelung"},{"t":"Die gerechte Aufgabenteilung"}],"e":"Beim sozialen Faulenzen (Social Loafing) reduzieren Einzelne ihren Einsatz, wenn ihr Beitrag im Gesamtergebnis untergeht und nicht individuell zugerechnet wird. Klare Aufgaben, Verantwortlichkeiten und überschaubare Gruppengrößen wirken dem entgegen."},{"id":"Z-GR-023","f":4,"sub":"Gruppen","t":"mc","q":"Was versteht man unter „Groupthink“ (Gruppendenken)?","o":[{"t":"Übermäßiges Streben nach Einigkeit, wodurch kritische Einwände unterdrückt und Fehlentscheidungen begünstigt werden","ok":1},{"t":"Besonders kreatives Denken der Gruppe"},{"t":"Die Aufteilung der Arbeit"},{"t":"Eine Moderationstechnik"}],"e":"Beim Groupthink stellt eine (oft stark kohäsive) Gruppe die Harmonie über die Sache: Abweichende Meinungen werden zurückgehalten, Risiken ausgeblendet, Alternativen nicht geprüft. Das kann zu schlechten Entscheidungen führen. Abhilfe: offene Kritik zulassen, „Advocatus Diaboli“, externe Sicht."},{"id":"Z-GR-024","f":4,"sub":"Gruppen","t":"mc","q":"Wie kann Groupthink in einem Team verringert werden?","o":[{"t":"Kritische Meinungen ausdrücklich zulassen, Alternativen prüfen und ggf. einen „Advocatus Diaboli“ einsetzen","ok":1},{"t":"Jede abweichende Meinung verbieten"},{"t":"Nur die Führungskraft sprechen lassen"},{"t":"Entscheidungen ohne Diskussion treffen"}],"e":"Gegen Gruppendenken hilft eine offene Diskussionskultur: unterschiedliche Sichtweisen einholen, bewusst Gegenpositionen einnehmen lassen (Advocatus Diaboli), mehrere Alternativen ernsthaft prüfen und ggf. externe Meinungen einbeziehen."},{"id":"Z-GR-025","f":4,"sub":"Gruppen","t":"mc","q":"Was ist ein Intra-Rollenkonflikt?","o":[{"t":"Widersprüchliche Erwartungen an ein und dieselbe Rolle","ok":1},{"t":"Ein Konflikt zwischen zwei verschiedenen Rollen einer Person"},{"t":"Ein Konflikt zwischen zwei Abteilungen"},{"t":"Ein technischer Defekt"}],"e":"Beim Intra-Rollenkonflikt richten sich unvereinbare Erwartungen an dieselbe Rolle (z. B. der Meister soll zugleich strenger Kontrolleur und verständnisvoller Kumpel sein). Beim Inter-Rollenkonflikt kollidieren dagegen verschiedene Rollen einer Person (z. B. Beruf und Familie)."},{"id":"Z-GR-026","f":4,"sub":"Gruppen","t":"mc","q":"Was ist ein Inter-Rollenkonflikt?","o":[{"t":"Ein Konflikt zwischen zwei verschiedenen Rollen, die eine Person zugleich innehat","ok":1},{"t":"Widersprüchliche Erwartungen an dieselbe Rolle"},{"t":"Ein Konflikt zwischen Maschinen"},{"t":"Ein Rechtschreibfehler"}],"e":"Beim Inter-Rollenkonflikt lassen sich die Anforderungen unterschiedlicher Rollen einer Person schwer vereinbaren (z. B. Führungskraft und Kollege, Beruf und Familie). Er entsteht durch konkurrierende Erwartungen aus verschiedenen Lebens-/Aufgabenbereichen."},{"id":"Z-GR-027","f":4,"sub":"Gruppen","t":"mc","q":"Worin unterscheidet sich ein „Team“ von einer beliebigen Gruppe?","o":[{"t":"Ein Team verfolgt ein gemeinsames Ziel mit sich ergänzenden Fähigkeiten und ausgeprägtem Wir-Gefühl","ok":1},{"t":"Ein Team hat kein Ziel"},{"t":"Ein Team ist immer größer"},{"t":"Es gibt keinen Unterschied"}],"e":"Ein Team ist eine besonders eng zusammenarbeitende Gruppe: Die Mitglieder verfolgen ein gemeinsames Ziel, ergänzen sich in ihren Fähigkeiten, fühlen sich gemeinsam verantwortlich und haben ein starkes Zusammengehörigkeitsgefühl."},{"id":"Z-GR-028","f":4,"sub":"Gruppen","t":"mc","q":"Was sollte bei der Zusammensetzung eines leistungsfähigen Teams beachtet werden?","o":[{"t":"Eine sinnvolle Mischung sich ergänzender Fähigkeiten und Rollen","ok":1},{"t":"Ausschließlich gleiche Persönlichkeiten und Fähigkeiten"},{"t":"Möglichst viele Mitglieder ohne Rücksicht auf Kompetenz"},{"t":"Nur Freunde"}],"e":"Ein gutes Team vereint unterschiedliche, sich ergänzende Kompetenzen und Rollen (Fach-, Methoden-, Sozialkompetenz; Ideengeber, Umsetzer, Koordinator). Zu große Ähnlichkeit engt den Blick ein, zu viel Verschiedenheit ohne Zusammenhalt erzeugt Konflikte."},{"id":"Z-GR-029","f":4,"sub":"Gruppen","t":"mc","q":"Welche Aufgabe hat eine Führungskraft in der Storming-Phase eines Teams?","o":[{"t":"Konflikte konstruktiv moderieren, Rollen klären und die Gruppe zur Normierung führen","ok":1},{"t":"Konflikte ignorieren"},{"t":"Die Gruppe auflösen"},{"t":"Alle Diskussion verbieten"}],"e":"In der Konfliktphase sollte die Führungskraft die Auseinandersetzungen ernst nehmen und konstruktiv steuern: zuhören, vermitteln, Rollen und Regeln klären. So hilft sie dem Team, in die Norming- und Performing-Phase überzugehen."},{"id":"Z-GR-030","f":4,"sub":"Gruppen","t":"mc","q":"Welche Rolle nimmt ein „Blockierer“ in einer Gruppe ein?","o":[{"t":"Eine selbstbezogene, störende Rolle, die den Fortschritt behindert","ok":1},{"t":"Eine aufgabenfördernde Rolle"},{"t":"Eine beziehungsfördernde Rolle"},{"t":"Die Rolle des Moderators"}],"e":"Der Blockierer gehört zu den selbstbezogenen (dysfunktionalen) Rollen: Er widerspricht grundsätzlich, verzögert oder verhindert Entscheidungen und behindert die Gruppenarbeit. Die Führung/Moderation sollte solches Verhalten ansprechen und einbinden."},{"id":"Z-GR-031","f":4,"sub":"Gruppen","t":"open","q":"Beschreiben Sie die Phasen der Gruppenentwicklung nach Tuckman.","a":"Tuckman unterscheidet typische Phasen, die eine Gruppe durchläuft: (1) Forming (Orientierungs-/Einstiegsphase): Die Mitglieder lernen sich kennen, tasten sich ab und verhalten sich vorsichtig und höflich; Aufgaben, Rollen und Regeln sind noch unklar, man sucht Orientierung. (2) Storming (Konfrontations-/Konfliktphase): Unterschiedliche Meinungen, Interessen und Machtansprüche treten hervor; es kommt zu Konflikten und Rangkämpfen um Rollen und Positionen. Diese Phase ist anstrengend, aber notwendig. (3) Norming (Organisierungs-/Normierungsphase): Die Gruppe einigt sich auf gemeinsame Regeln und Umgangsformen, Rollen klären sich, Konflikte werden beigelegt und der Zusammenhalt wächst. (4) Performing (Leistungs-/Integrationsphase): Die Gruppe arbeitet produktiv, zielorientiert und effizient zusammen und entfaltet ihre volle Leistungsfähigkeit. (5) Adjourning (Auflösungsphase): Nach Erreichen des Ziels wird die Gruppe – etwa ein Projektteam – wieder aufgelöst; Ergebnisse werden gesichert und der Abschluss wird gestaltet. Eine Führungskraft sollte jede Phase passend begleiten, insbesondere die Konfliktphase konstruktiv moderieren.","e":"Merkfolge: Forming (Orientierung) → Storming (Konflikt) → Norming (Regeln/Zusammenhalt) → Performing (Leistung) → Adjourning (Auflösung)."},{"id":"Z-GR-032","f":4,"sub":"Gruppen","t":"open","q":"Nennen Sie je zwei Vor- und Nachteile der Teamarbeit.","a":"Vorteile der Teamarbeit: (1) Nutzung unterschiedlicher Fähigkeiten und Sichtweisen: Verschiedene Kompetenzen und Perspektiven ergänzen sich und führen oft zu besseren, kreativeren Lösungen (Synergieeffekt – das Ergebnis ist mehr als die Summe der Einzelleistungen). (2) Höhere Motivation und gegenseitige Unterstützung: Zusammenhalt, gemeinsame Verantwortung und Hilfe untereinander steigern Zufriedenheit und Leistungsbereitschaft; zudem verteilt sich das Wissen im Team. Nachteile der Teamarbeit: (1) Höherer Zeit- und Abstimmungsaufwand: Entscheidungen dauern länger, weil viele beteiligt sind und abgestimmt werden muss; es besteht Konfliktpotenzial. (2) Gefahr des „Trittbrettfahrens“ (soziales Faulenzen) und des Gruppendenkens (Groupthink): Einzelne strengen sich weniger an, wenn ihr Beitrag nicht auffällt, und der Wunsch nach Einigkeit kann kritische Einwände unterdrücken und zu Fehlentscheidungen führen. Diese Nachteile lassen sich durch klare Ziele und Verantwortlichkeiten, angemessene Gruppengröße und eine offene Diskussionskultur begrenzen.","e":"Vorteile: Synergie/verschiedene Kompetenzen und Motivation/Unterstützung. Nachteile: Zeit-/Abstimmungsaufwand und Trittbrettfahren/Groupthink."},{"id":"Z-GR-033","f":4,"sub":"Gruppen","t":"open","q":"Erklären Sie, was Gruppennormen und Gruppendruck sind und welche Bedeutung sie für die Zusammenarbeit haben.","a":"Gruppennormen sind gemeinsame, meist ungeschriebene Verhaltensregeln, an denen sich die Mitglieder einer Gruppe orientieren – zum Beispiel der übliche Umgangston, das erwartete Leistungsniveau, Pünktlichkeit oder Hilfsbereitschaft. Sie geben Orientierung, machen Verhalten berechenbar und stärken das Zusammengehörigkeitsgefühl. Gruppendruck (Konformitätsdruck) bezeichnet die Kraft, mit der die Gruppe die Einhaltung dieser Normen einfordert: Wer sich anpasst, erhält Anerkennung und Zugehörigkeit; wer abweicht, muss mit Missbilligung oder Ausgrenzung rechnen. Deshalb passen Einzelne ihr Verhalten und ihre Meinung oft der Mehrheit an, manchmal auch gegen die eigene Überzeugung. Bedeutung für die Zusammenarbeit: Normen und ein gewisser Druck können sehr positiv wirken, wenn sie leistungs- und kooperationsfördernd sind (z. B. hohe Qualitätsansprüche, gegenseitige Unterstützung). Sie können aber auch schaden, wenn sie sich gegen die Ziele richten (z. B. bewusste Leistungszurückhaltung) oder wenn der Druck kritische Meinungen unterdrückt und zu Gruppendenken führt. Eine Führungskraft sollte die Normen ihrer Gruppe kennen und positiv beeinflussen.","e":"Normen = ungeschriebene Verhaltensregeln; Gruppendruck = Kraft zur Anpassung. Wirkung kann förderlich (Qualität, Zusammenhalt) oder schädlich (Leistungszurückhaltung, Groupthink) sein."},{"id":"Z-GR-034","f":4,"sub":"Gruppen","t":"mc","q":"Welche Rolle fördert das gute Miteinander in der Gruppe (beziehungsbezogene Rolle)?","o":[{"t":"Der Vermittler/Ermutiger, der schlichtet und andere einbindet","ok":1},{"t":"Der Blockierer"},{"t":"Der Dominator"},{"t":"Der Trittbrettfahrer"}],"e":"Beziehungsbezogene Rollen wie Vermittler, Ermutiger oder „Türöffner“ sorgen für ein gutes Klima: Sie schlichten Konflikte, binden Zurückhaltende ein und stärken den Zusammenhalt. Sie ergänzen die aufgabenbezogenen Rollen, die die Zielerreichung vorantreiben."},{"id":"Z-GR-035","f":4,"sub":"Gruppen","t":"mc","q":"Warum sollte eine Führungskraft informelle Gruppen und Meinungsführer kennen?","o":[{"t":"Weil sie das Verhalten und die Stimmung im Team stark beeinflussen und für Veränderungen gewonnen werden können","ok":1},{"t":"Weil sie keine Bedeutung haben"},{"t":"Um sie zu bestrafen"},{"t":"Aus rein steuerlichen Gründen"}],"e":"Informelle Gruppen und Meinungsführer prägen Klima, Normen und Akzeptanz von Entscheidungen oft stärker als die formale Struktur. Wer sie kennt und einbindet, kann Informationen besser verbreiten, Widerstände abbauen und Veränderungen leichter durchsetzen."},{"id":"Z-GR-036","f":4,"sub":"Gruppen","t":"mc","q":"Welche Aussage über den Außenseiter/Sündenbock in einer Gruppe trifft zu?","o":[{"t":"Ihm werden häufig Fehler oder Probleme zugeschrieben; die Führungskraft sollte gegensteuern","ok":1},{"t":"Er hat den höchsten Status"},{"t":"Er ist immer der Meinungsführer"},{"t":"Ausgrenzung ist unproblematisch"}],"e":"Ein Sündenbock wird von der Gruppe für Probleme verantwortlich gemacht und ausgegrenzt, was das Klima und die Betroffenen schädigt. Die Führungskraft sollte solche Dynamiken erkennen, Ausgrenzung entgegenwirken und für ein faires Miteinander sorgen."},{"id":"Z-GR-037","f":4,"sub":"Gruppen","t":"mc","q":"Was ist bei der Bildung eines neuen Teams förderlich, um die Zusammenarbeit zu beschleunigen?","o":[{"t":"Ein gemeinsamer Start (z. B. Kick-off), Klärung von Zielen, Rollen und Spielregeln","ok":1},{"t":"Möglichst wenig Information"},{"t":"Unklare Zuständigkeiten"},{"t":"Verzicht auf jedes Kennenlernen"}],"e":"Ein bewusster Start mit Kennenlernen, gemeinsamer Zielklärung sowie Vereinbarung von Rollen und Spielregeln verkürzt die Orientierungs- und Konfliktphasen. Das Team findet schneller zu einer produktiven Zusammenarbeit (Performing)."},{"id":"Z-GR-038","f":4,"sub":"Gruppen","t":"mc","q":"Welche Wirkung hat ein starkes Wir-Gefühl (Kohäsion) auf die Bindung der Mitarbeiter?","o":[{"t":"Es erhöht in der Regel die Zufriedenheit und Bindung an Gruppe und Unternehmen","ok":1},{"t":"Es senkt immer die Bindung"},{"t":"Es hat keine Wirkung"},{"t":"Es führt automatisch zu Kündigungen"}],"e":"Ein ausgeprägter Zusammenhalt vermittelt Zugehörigkeit und Sicherheit, steigert Zufriedenheit und Motivation und bindet die Mitarbeiter stärker an Team und Unternehmen. Wichtig ist, dass die Gruppenziele mit den Unternehmenszielen übereinstimmen."},{"id":"Z-GR-039","f":4,"sub":"Gruppen","t":"mc","q":"Welche Führungshaltung unterstützt die Performing-Phase eines eingespielten Teams?","o":[{"t":"Zurückhaltende, delegierende Führung mit Freiräumen und Unterstützung bei Bedarf","ok":1},{"t":"Ständige Det
